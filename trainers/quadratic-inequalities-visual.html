<style>
*{box-sizing:border-box}body{margin:0;background:#e8e4db;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:#1f2937;padding:18px}.app{max-width:1100px;margin:auto;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 12px 36px #0002}.head{background:#1a1a2e;color:white;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}.title{font-size:20px;font-weight:900}.sub{font-size:12px;opacity:.7;margin-top:2px}.back{color:#cbd5e1;text-decoration:none;font-weight:800;font-size:12px}.back:hover{color:#fff}.main{display:grid;grid-template-columns:minmax(0,1fr) 340px}.boardWrap{background:#faf8f2;padding:14px;border-right:1px solid #e5e2d9}.board{width:100%;height:auto;border:1px solid #d6d3ca;border-radius:14px;background:#fffdf7;display:block}.panel{padding:14px;display:flex;flex-direction:column;gap:10px}.card{border:1.5px solid #e5e7eb;border-radius:12px;padding:12px;background:#f9fafb}.card h2{margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:#64748b}.task{font-size:22px;font-weight:900;font-family:Georgia,serif;text-align:center;color:#111827;line-height:1.35}.small{font-size:12px;color:#64748b;line-height:1.45}.row{display:flex;justify-content:space-between;gap:10px;font-size:14px;line-height:1.5;border-bottom:1px dashed #e5e7eb;padding:5px 0}.row:last-child{border-bottom:0}.value{font-weight:900}.msg{border-radius:12px;padding:12px;font-size:14px;font-weight:750;line-height:1.42}.info{background:#eff6ff;color:#1d4ed8}.ok{background:#f0fdf4;color:#15803d}.err{background:#fef2f2;color:#b91c1c}.warn{background:#fff7ed;color:#c2410c}.hintBox{display:none;background:#fff7ed;color:#9a3412;border:1.5px solid #fed7aa;border-radius:12px;padding:12px;font-size:13px;line-height:1.5}.hintBox.on{display:block}.bar{display:flex;gap:8px;flex-wrap:wrap;padding:12px 14px;background:#f9fafb;border-top:1px solid #e5e7eb}button{border:1.5px solid #d1d5db;border-radius:9px;background:#fff;color:#374151;padding:8px 13px;font:800 13px system-ui;cursor:pointer}button:hover{background:#f3f4f6}.primary{background:#1a1a2e;color:white;border-color:#1a1a2e}.good{background:#15803d;color:white;border-color:#15803d}.warnBtn{background:#fff7ed;color:#c2410c;border-color:#fdba74}.danger{background:#fee2e2;color:#991b1b;border-color:#fecaca}.menu{padding:28px;max-width:740px;margin:auto}.menu h2{text-align:center;font-size:30px;margin:0 0 8px}.menu p{text-align:center;color:#64748b;line-height:1.55}.menuGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}.menuBtn{padding:20px;border-radius:16px;text-align:center;background:#fff;border:2px solid #e5e7eb}.menuBtn:hover{border-color:#1a1a2e;background:#f8fafc}.menuIcon{font-size:30px}.menuName{font-size:18px;font-weight:950;margin-top:5px}.menuDesc{font-size:12px;color:#64748b;margin-top:4px;line-height:1.35}.chipRow{display:flex;gap:8px;flex-wrap:wrap}.chip{display:inline-flex;align-items:center;border:1px solid #d1d5db;background:#fff;border-radius:999px;padding:6px 9px;font-size:12px;font-weight:800}.chip.on{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}.choices{display:grid;gap:8px}.choice{display:block;width:100%;text-align:left;border-radius:12px;padding:10px 12px;background:#fff;font-weight:850;line-height:1.35}.choice.on{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}.choice.goodC{background:#dcfce7;border-color:#16a34a;color:#166534}.choice.badC{background:#fee2e2;border-color:#dc2626;color:#991b1b}.formula{font-family:Georgia,serif;font-weight:900;color:#111827}.zone{cursor:pointer}.zone:hover{opacity:.9}.progress{height:7px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin-bottom:10px}.progress span{display:block;height:100%;background:#1a1a2e}.topline{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:8px}.statLine{font-size:12px;color:#64748b}@media(max-width:860px){body{padding:8px}.main{grid-template-columns:1fr}.boardWrap{border-right:0;border-bottom:1px solid #e5e2d9}.head{flex-direction:column;align-items:flex-start}.task{font-size:19px}.menuGrid{grid-template-columns:1fr}}

<body>
<div class="app"><div class="head"><div><div class="title">📈 Квадратные неравенства</div><div class="sub">парабола → корни → числовая прямая → ответ</div></div><a class="back" href="../index.html">← к списку тренажёров</a></div><div id="app"></div></div>
<script>
const KEY='mathExamCourseProgress.v1',TOPIC='quadraticInequalitiesVisual';
const TASKS=[
{e:'x² − 49 < 0',r1:-7,r2:7,l1:'−7',l2:'7',sign:'lt',a:1,h:'Парабола вверх. Ниже оси x она между корнями.'},
{e:'x² − 64 ≥ 0',r1:-8,r2:8,l1:'−8',l2:'8',sign:'gte',a:1,h:'Парабола вверх. Неотрицательна вне корней, корни входят.'},
{e:'x² − 36 > 0',r1:-6,r2:6,l1:'−6',l2:'6',sign:'gt',a:1,h:'Больше нуля — там, где график выше оси x: вне корней.'},
{e:'x² − 25 ≤ 0',r1:-5,r2:5,l1:'−5',l2:'5',sign:'lte',a:1,h:'Не больше нуля — между корнями, корни входят.'},
{e:'(x + 3)(x − 8) ≥ 0',r1:-3,r2:8,l1:'−3',l2:'8',sign:'gte',a:1,h:'Произведение равно нулю при −3 и 8. Для ≥ 0 берём внешние промежутки.'},
{e:'(x + 2)(x − 7) ≤ 0',r1:-2,r2:7,l1:'−2',l2:'7',sign:'lte',a:1,h:'Для параболы вверх ≤ 0 — между корнями, точки закрашены.'},
{e:'(x + 5)(x − 9) > 0',r1:-5,r2:9,l1:'−5',l2:'9',sign:'gt',a:1,h:'> 0 при параболе вверх — два внешних луча.'},
{e:'(x + 6)(x − 1) < 0',r1:-6,r2:1,l1:'−6',l2:'1',sign:'lt',a:1,h:'< 0 при параболе вверх — промежуток между корнями.'},
{e:'7x − x² ≥ 0',r1:0,r2:7,l1:'0',l2:'7',sign:'gte',a:-1,h:'Парабола вниз. Неотрицательна между корнями, корни входят.'},
{e:'3x − x² > 0',r1:0,r2:3,l1:'0',l2:'3',sign:'gt',a:-1,h:'Парабола вниз. Больше нуля — между корнями, точки пустые.'},
{e:'4x − x² < 0',r1:0,r2:4,l1:'0',l2:'4',sign:'lt',a:-1,h:'Парабола вниз. Меньше нуля — вне корней.'},
{e:'49x² ≥ 36',r1:-6/7,r2:6/7,l1:'−6/7',l2:'6/7',sign:'gte',a:49,h:'49x² − 36 ≥ 0. Корни ±6/7. Берём внешние промежутки.'},
{e:'49x² ≤ 36',r1:-6/7,r2:6/7,l1:'−6/7',l2:'6/7',sign:'lte',a:49,h:'49x² − 36 ≤ 0. Между −6/7 и 6/7, точки входят.'},
{e:'x² < 9',r1:-3,r2:3,l1:'−3',l2:'3',sign:'lt',a:1,h:'x² − 9 < 0: между −3 и 3, точки пустые.'},
{e:'x² > 36',r1:-6,r2:6,l1:'−6',l2:'6',sign:'gt',a:1,h:'x² − 36 > 0: вне −6 и 6, точки пустые.'}
];
const PIC=[
{g:{r1:-7,r2:7,l1:'−7',l2:'7',zones:[false,true,false],closed:false},ans:'x² − 49 < 0',opts:['x² − 49 ≤ 0','x² − 49 < 0','x² + 49 > 0','x² − 49 > 0'],h:'Заштриховано между корнями, точки пустые: это < 0.'},
{g:{r1:-6,r2:6,l1:'−6',l2:'6',zones:[true,false,true],closed:false},ans:'x² − 36 > 0',opts:['x² − 36 > 0','x² − 36 < 0','x² + 36 > 0','x² + 36 < 0'],h:'Два внешних луча и пустые точки: это > 0.'},
{g:{r1:-8,r2:8,l1:'−8',l2:'8',zones:[false,true,false],closed:true},ans:'x² − 64 ≤ 0',opts:['x² + 64 ≥ 0','x² − 64 ≥ 0','x² − 64 ≤ 0','x² + 64 ≤ 0'],h:'Между корнями и точки закрашены: это ≤ 0.'},
{g:{r1:0,r2:7,l1:'0',l2:'7',zones:[true,false,true],closed:false},ans:'x² − 7x > 0',opts:['x² − 7x < 0','x² − 49 > 0','x² − 7x > 0','x² − 49 < 0'],h:'Вне 0 и 7, точки пустые: это > 0.'},
{g:{r1:0,r2:6,l1:'0',l2:'6',zones:[false,true,false],closed:false},ans:'6x − x² > 0',opts:['6x − x² > 0','6x − x² < 0','x² − 36 < 0','x² − 6x > 0'],h:'Между 0 и 6. Такая область получается у параболы вниз для > 0.'}
];
let screen='menu',mode='learn',tasks=[],idx=0,selected=[false,false,false],chosen=null,checked=false,hint=false,okCount=0,total=0;
const $=id=>document.getElementById(id);function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function loadStats(){try{let d=JSON.parse(localStorage.getItem(KEY)||'{}');return d[TOPIC]||{solved:0,correct:0,streak:0,bestStreak:0,history:[]}}catch{return{solved:0,correct:0,streak:0,bestStreak:0,history:[]}}}function saveStats(s){let d={};try{d=JSON.parse(localStorage.getItem(KEY)||'{}')}catch{}d[TOPIC]=s;localStorage.setItem(KEY,JSON.stringify(d))}function record(ok){let s=loadStats();s.solved++;if(ok){s.correct++;s.streak++;s.bestStreak=Math.max(s.bestStreak||0,s.streak)}else{s.streak=0}s.history=[ok?1:0,...(s.history||[])].slice(0,10);saveStats(s)}function resetStats(){if(confirm('Сбросить статистику?')){let d=JSON.parse(localStorage.getItem(KEY)||'{}');d[TOPIC]={solved:0,correct:0,streak:0,bestStreak:0,history:[]};localStorage.setItem(KEY,JSON.stringify(d));render()}}
function signText(s){return s==='gt'?'> 0':s==='gte'?'≥ 0':s==='lt'?'< 0':'≤ 0'}function strict(s){return s==='gt'||s==='lt'}function goodZones(t){let positive=t.a>0?(t.sign==='gt'||t.sign==='gte'):(t.sign==='lt'||t.sign==='lte');return positive?[true,false,true]:[false,true,false]}function zlab(i,t){if(i===0)return `(−∞; ${t.l1}${strict(t.sign)?')':']'}`;if(i===1)return `${strict(t.sign)?'(':'['}${t.l1}; ${t.l2}${strict(t.sign)?')':']'}`;return `${strict(t.sign)?'(':'['}${t.l2}; +∞)`}function ansText(t,z=selected){let p=[];z.forEach((v,i)=>{if(v)p.push(zlab(i,t))});return p.length?p.join(' ∪ '):'—'}
function start(m){mode=m;screen='task';tasks=m==='learn'?TASKS.slice(0,10):m==='practice'?shuffle(TASKS).slice(0,10):shuffle(PIC).slice(0,5);idx=0;selected=[false,false,false];chosen=null;checked=false;hint=false;okCount=0;total=0;render()}
function cur(){return tasks[idx]}function render(){let root=$('app');if(screen==='menu'){root.innerHTML=menuHTML();return}root.innerHTML=taskHTML();draw();renderStats()}
function menuHTML(){let s=loadStats(),pct=s.solved?Math.round(100*s.correct/s.solved):0;return `<div class="menu"><h2>Квадратные неравенства</h2><p>Смотрим на параболу, находим корни, выбираем промежутки на числовой прямой. Отдельно тренируем задания «по рисунку».</p><div class="menuGrid"><button class="menuBtn" onclick="start('learn')"><div class="menuIcon">📘</div><div class="menuName">Обучение</div><div class="menuDesc">10 задач с подсказками</div></button><button class="menuBtn" onclick="start('practice')"><div class="menuIcon">⚡</div><div class="menuName">Тренировка</div><div class="menuDesc">10 случайных задач</div></button><button class="menuBtn" onclick="start('picture')"><div class="menuIcon">📍</div><div class="menuName">По рисунку</div><div class="menuDesc">выбрать подходящее неравенство</div></button></div>${s.solved?`<div class="card" style="margin-top:18px;text-align:center"><b>Статистика:</b> решено ${s.solved}, верно ${s.correct}, точность ${pct}%, серия ${s.streak}<br><button class="danger" style="margin-top:10px" onclick="resetStats()">Сбросить статистику</button></div>`:''}</div>`}
function taskHTML(){let t=cur(),pct=Math.round(idx/tasks.length*100);let isPic=mode==='picture';return `<div class="main"><div class="boardWrap"><div class="topline"><span class="small"><b>${idx+1}</b> / ${tasks.length}</span><span class="small">${mode==='learn'?'Обучение':mode==='practice'?'Тренировка':'По рисунку'}</span></div><div class="progress"><span style="width:${pct}%"></span></div><svg id="board" class="board" viewBox="0 0 720 520" xmlns="http://www.w3.org/2000/svg"></svg></div><aside class="panel"><div class="card"><h2>Задание</h2><div class="task">${isPic?'Выберите неравенство по рисунку':t.e}</div><p class="small">${isPic?'Сначала определите: между корнями или вне корней; точки пустые или закрашенные.':'Кликните по промежуткам на нижней числовой прямой.'}</p></div>${isPic?choicesPanel(t):dataPanel(t)}<div id="msg" class="msg info">${isPic?'Выберите вариант ответа.':'Выберите промежутки и нажмите «Проверить».'}</div><div id="hintBox" class="hintBox ${hint?'on':''}">${isPic?t.h:t.h}</div><div class="card"><h2>Статистика</h2><p class="statLine">Решено: <b id="solved">0</b> · верно: <b id="correct">0</b> · серия: <b id="streak">0</b></p><button class="danger" onclick="resetStats()">Сбросить статистику</button></div></aside></div><div class="bar"><button class="primary" onclick="checkAnswer()">Проверить</button><button class="warnBtn" onclick="toggleHint()">Подсказка</button><button onclick="showSolution()">Показать решение</button><button class="good" onclick="nextTask()">Следующее задание</button><button onclick="screen='menu';render()">В меню</button></div>`}
function dataPanel(t){return `<div class="card"><h2>Опорные данные</h2><div class="row"><span>Корни</span><span class="value">${t.l1} и ${t.l2}</span></div><div class="row"><span>Парабола</span><span class="value">${t.a>0?'вверх':'вниз'}</span></div><div class="row"><span>Ищем</span><span class="value">${signText(t.sign)}</span></div><div class="row"><span>Точки</span><span class="value">${strict(t.sign)?'пустые':'закрашенные'}</span></div></div><div class="card"><h2>Выбрано</h2><div class="chipRow">${[0,1,2].map(i=>`<span onclick="toggleZone(${i})" class="chip ${selected[i]?'on':''}">${zlab(i,t)}</span>`).join('')}</div><p class="small">Ваш ответ: <span class="formula">${ansText(t)}</span></p></div>`}
function choicesPanel(t){return `<div class="card"><h2>Варианты</h2><div class="choices">${t.opts.map((o,i)=>`<button class="choice ${chosen===o?'on':''}" onclick="choose('${enc(o)}')">${i+1}) <span class="formula">${o}</span></button>`).join('')}</div></div>`}function enc(s){return s.replace(/'/g,"&#39;")}
function renderStats(){let s=loadStats();$('solved').textContent=s.solved||0;$('correct').textContent=s.correct||0;$('streak').textContent=s.streak||0}
function make(tag,a){let e=document.createElementNS('http://www.w3.org/2000/svg',tag);for(let k in a)e.setAttribute(k,a[k]);return e}function draw(){mode==='picture'?drawPic(cur().g):drawQuad(cur())}
function mapSetup(r1,r2){let min=Math.min(-10,r1-2),max=Math.max(10,r2+2);return{x:x=>64+(x-min)/(max-min)*592,min,max}}
function drawQuad(t){let svg=$('board');svg.innerHTML='';svg.appendChild(make('rect',{x:0,y:0,width:720,height:520,fill:'#fffdf7'}));let M=mapSetup(t.r1,t.r2),maxY=1;for(let i=0;i<=160;i++){let x=M.min+(M.max-M.min)*i/160,y=t.a*(x-t.r1)*(x-t.r2);maxY=Math.max(maxY,Math.abs(y))}let sc=145/maxY,ym=y=>225-y*sc;for(let gx=Math.ceil(M.min);gx<=Math.floor(M.max);gx++){let px=M.x(gx);svg.appendChild(make('line',{x1:px,y1:45,x2:px,y2:315,stroke:'#eee9df','stroke-width':1}))}svg.appendChild(make('line',{x1:48,y1:225,x2:680,y2:225,stroke:'#374151','stroke-width':2}));svg.appendChild(make('line',{x1:M.x(0),y1:42,x2:M.x(0),y2:315,stroke:'#d1d5db','stroke-width':1.5}));let pts=[];for(let i=0;i<=220;i++){let x=M.min+(M.max-M.min)*i/220,y=t.a*(x-t.r1)*(x-t.r2);pts.push(`${M.x(x).toFixed(1)},${ym(y).toFixed(1)}`)}svg.appendChild(make('polyline',{points:pts.join(' '),fill:'none',stroke:'#1a1a2e','stroke-width':4,'stroke-linecap':'round','stroke-linejoin':'round'}));[t.r1,t.r2].forEach((r,k)=>{let px=M.x(r);svg.appendChild(make('circle',{cx:px,cy:225,r:6,fill:'#7c3aed',stroke:'#fff','stroke-width':2}));let tx=make('text',{x:px,y:250,'text-anchor':'middle','font-family':'Georgia,serif','font-size':14,'font-weight':'900',fill:'#7c3aed'});tx.textContent=k?t.l2:t.l1;svg.appendChild(tx)});let cap=make('text',{x:360,y:28,'text-anchor':'middle','font-size':14,'font-weight':'900',fill:'#374151'});cap.textContent='График выражения: выше оси x — положительно, ниже — отрицательно';svg.appendChild(cap);drawLine(svg,t.r1,t.r2,t.l1,t.l2,430,selected,checked?goodZones(t):null,!strict(t.sign));svg.querySelectorAll('.zone').forEach(z=>z.addEventListener('click',()=>toggleZone(Number(z.getAttribute('data-zone')))))}
function drawPic(g){let svg=$('board');svg.innerHTML='';svg.appendChild(make('rect',{x:0,y:0,width:720,height:520,fill:'#fffdf7'}));let tx=make('text',{x:360,y:90,'text-anchor':'middle','font-size':24,'font-weight':'900',fill:'#1a1a2e'});tx.textContent='Какому неравенству соответствует рисунок?';svg.appendChild(tx);drawStaticLine(svg,g.r1,g.r2,g.l1,g.l2,260,g.zones,g.closed)}
function drawLine(svg,r1,r2,l1,l2,y,sel,corr,closed){let M=mapSetup(r1,r2),l=64,r=656,p1=M.x(r1),p2=M.x(r2);svg.appendChild(make('text',{x:360,y:y-52,'text-anchor':'middle','font-size':15,'font-weight':'900',fill:'#374151'})).textContent='Числовая прямая: выберите промежутки';svg.appendChild(make('line',{x1:l,y1:y,x2:r,y2:y,stroke:'#475569','stroke-width':3,'stroke-linecap':'round'}));[[l,p1],[p1,p2],[p2,r]].forEach((seg,i)=>{let color='transparent',op=0;if(corr&&corr[i]&&sel[i]){color='#16a34a';op=.55}else if(corr&&sel[i]&&!corr[i]){color='#dc2626';op=.55}else if(sel[i]){color='#2563eb';op=.35}svg.appendChild(make('rect',{class:'zone',x:seg[0],y:y-22,width:seg[1]-seg[0],height:44,rx:10,fill:color,opacity:op,'data-zone':i}))});drawPoints(svg,p1,p2,y,l1,l2,closed)}
function drawStaticLine(svg,r1,r2,l1,l2,y,zones,closed){let M=mapSetup(r1,r2),l=64,r=656,p1=M.x(r1),p2=M.x(r2);svg.appendChild(make('line',{x1:l,y1:y,x2:r,y2:y,stroke:'#475569','stroke-width':3,'stroke-linecap':'round'}));[[l,p1],[p1,p2],[p2,r]].forEach((seg,i)=>{if(zones[i])svg.appendChild(make('rect',{x:seg[0],y:y-22,width:seg[1]-seg[0],height:44,rx:10,fill:'#16a34a',opacity:.55}))});drawPoints(svg,p1,p2,y,l1,l2,closed)}
function drawPoints(svg,p1,p2,y,l1,l2,closed){[p1,p2].forEach((p,k)=>{svg.appendChild(make('circle',{cx:p,cy:y,r:8,fill:closed?'#111827':'#fff',stroke:'#111827','stroke-width':3}));let tx=make('text',{x:p,y:y+34,'text-anchor':'middle','font-family':'Georgia,serif','font-size':15,'font-weight':'900',fill:'#374151'});tx.textContent=k?l2:l1;svg.appendChild(tx)})}
function toggleZone(i){if(mode==='picture'||checked)return;selected[i]=!selected[i];render()}function choose(s){if(checked)return;chosen=s.replace(/&#39;/g,"'");render()}function toggleHint(){hint=!hint;let h=$('hintBox');if(h)h.className='hintBox '+(hint?'on':'')}
function checkAnswer(){let ok=false,t=cur();if(mode==='picture'){ok=chosen===t.ans}else{ok=selected.every((v,i)=>v===goodZones(t)[i])}checked=true;record(ok);total++;if(ok){okCount++;setMsg('Верно! Хорошо: корни делят прямую на нужные промежутки.','ok')}else setMsg(diag(t),'err');render();if(mode==='picture')paintChoices()}
function setMsg(txt,cls){let m=$('msg');m.innerHTML=txt;m.className='msg '+cls}function diag(t){if(mode==='picture')return 'Пока ошибка. Смотри: заштриховано между корнями или вне корней? Точки пустые или закрашенные?';let gz=goodZones(t),need=gz[1]?'между корнями':'вне корней';let why=t.a>0?'парабола направлена вверх':'парабола направлена вниз';return `Пока ошибка. Здесь нужно выбрать <b>${need}</b>. Проверь график: ${why}, ищем ${signText(t.sign)}.`}
function paintChoices(){let t=cur();[...document.querySelectorAll('.choice')].forEach(b=>{let txt=b.textContent.replace(/^\d+\)\s*/,'').trim();if(txt===t.ans)b.classList.add('goodC');else if(txt===chosen)b.classList.add('badC')})}
function showSolution(){let t=cur();checked=true;if(mode==='picture'){chosen=t.ans;setMsg('Показано решение. Сравните рисунок и знак неравенства.','warn')}else{selected=goodZones(t).slice();setMsg('Показано решение: <b>'+ansText(t)+'</b>','warn')}render();if(mode==='picture')paintChoices()}function nextTask(){idx++;if(idx>=tasks.length){screen='menu';render();return}selected=[false,false,false];chosen=null;checked=false;hint=false;render()}render();
</script>
</body>
</html>
