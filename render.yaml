services:
  - type: web
    name: mathexam-board-server
    runtime: node
    plan: free
    buildCommand: npm --prefix board-server install
    startCommand: npm --prefix board-server start
    healthCheckPath: /health
    autoDeploy: true
    buildFilter:
      paths:
        - board-server/**
        - trainers/board-compat.json
        - render.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ALLOWED_ORIGINS
        value: https://mathexam.space,http://localhost,http://localhost:3000,http://localhost:3001,http://127.0.0.1,http://127.0.0.1:3000,http://127.0.0.1:3001
