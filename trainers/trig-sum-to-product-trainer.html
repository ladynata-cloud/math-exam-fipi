<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренажёр: сумма синусов и косинусов → произведение</title>
<style>
  :root {
    --bg: #f7f2e8;
    --bg-deep: #efe8d8;
    --card: #ffffff;
    --ink: #1c2238;
    --ink-soft: #4f556e;
    --ink-mute: #888fa5;
    --line: #e4d9c1;
    --line-soft: #f0e8d6;
    --gold: #b08a3c;
    --gold-deep: #8b6a25;
    --gold-soft: #f6e9c4;
    --gold-glow: #fff4d6;
    --green: #4d7c52;
    --green-deep: #355a39;
    --green-soft: #dcebd6;
    --warn: #a66339;
    --warn-soft: #f3dfcd;
    --blue: #3a5680;
    --blue-soft: #dce5f0;
    --shadow: 0 1px 3px rgba(28,34,56,0.04), 0 1px 2px rgba(28,34,56,0.03);
    --shadow-md: 0 4px 12px rgba(28,34,56,0.06);
    --serif: 'Cambria', 'Georgia', 'Palatino Linotype', 'Book Antiqua', 'Times New Roman', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Helvetica Neue', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(at 10% 0%, rgba(176,138,60,0.06) 0, transparent 50%),
      radial-gradient(at 90% 100%, rgba(58,86,128,0.04) 0, transparent 50%);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.55;
    min-height: 100vh;
    padding: 18px 20px 40px;
  }

  .container { max-width: 1380px; margin: 0 auto; }

  /* ---------- HEADER ---------- */
  .header {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 24px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    box-shadow: var(--shadow);
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 22px;
    flex-wrap: wrap;
  }
  .home-link {
    color: var(--blue);
    text-decoration: none;
    font-size: 0.92rem;
    font-weight: 500;
    padding: 7px 12px;
    border-radius: 7px;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .home-link:hover { background: var(--blue-soft); }
  .title-block .title {
    font-family: var(--serif);
    font-size: 1.32rem;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.2;
    letter-spacing: -0.005em;
  }
  .title-block .subtitle {
    font-size: 0.84rem;
    color: var(--ink-soft);
    margin-top: 3px;
  }

  .modes {
    display: inline-flex;
    background: var(--bg-deep);
    padding: 4px;
    border-radius: 10px;
    border: 1px solid var(--line);
  }
  .mode-btn {
    border: none;
    background: transparent;
    padding: 8px 16px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 0.9rem;
    color: var(--ink-soft);
    font-family: inherit;
    transition: all 0.15s;
  }
  .mode-btn.active {
    background: var(--card);
    color: var(--ink);
    box-shadow: 0 1px 2px rgba(28,34,56,0.1);
    font-weight: 600;
  }

  /* ---------- SECTION BAR ---------- */
  .section-bar {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 18px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    box-shadow: var(--shadow);
  }
  .section-label {
    font-size: 0.78rem;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .section-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .section-btn {
    border: 1px solid var(--line);
    background: var(--card);
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.88rem;
    color: var(--ink);
    font-family: inherit;
    transition: all 0.15s;
  }
  .section-btn:hover { background: var(--gold-soft); border-color: var(--gold); }
  .section-btn.active {
    background: var(--gold);
    color: white;
    border-color: var(--gold);
  }

  .formula-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-left: auto;
    padding-left: 14px;
    border-left: 1px solid var(--line);
  }
  .formula-tab {
    border: 1px solid var(--line);
    background: var(--card);
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.82rem;
    font-family: var(--serif);
    color: var(--ink);
    transition: all 0.15s;
    min-width: 28px;
    text-align: center;
  }
  .formula-tab:hover { border-color: var(--gold); }
  .formula-tab.active {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
  }
  .formula-tab.completed {
    background: var(--green-soft);
    border-color: var(--green);
    color: var(--green-deep);
  }
  .formula-tab.active.completed {
    background: var(--green-deep);
    color: white;
    border-color: var(--green-deep);
  }

  /* ---------- MAIN LAYOUT ---------- */
  .main {
    display: grid;
    grid-template-columns: 1.15fr 1fr;
    gap: 14px;
  }
  @media (max-width: 920px) {
    .main { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px 24px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    min-height: 480px;
  }

  .panel-title {
    font-size: 0.74rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-mute);
    margin-bottom: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  /* ---------- MATH STYLES ---------- */
  .math {
    font-family: var(--serif);
    line-height: 1.7;
  }

  /* Fraction — inline-block with middle alignment so it sits on the math axis */
  .frac {
    display: inline-block;
    vertical-align: middle;
    text-align: center;
    font-size: 0.85em;
    margin: 0 2px;
    line-height: 1.1;
    position: relative;
    top: -0.05em;
  }
  .frac .num {
    display: block;
    border-bottom: 1.4px solid currentColor;
    padding: 0 5px 2px;
  }
  .frac .den {
    display: block;
    padding: 2px 5px 0;
  }
  /* Increase line-height in formula containers so centered fractions don't overlap surrounding lines */
  .math, .goal, .step-line, .option-card, .sub-block, .question, .derivation {
    line-height: 2.0;
  }

  /* Substitution block */
  .sub-block {
    background: linear-gradient(180deg, var(--blue-soft) 0%, #e8eef6 100%);
    border-left: 4px solid var(--blue);
    padding: 14px 18px 14px 16px;
    border-radius: 8px;
    margin-bottom: 16px;
  }
  .sub-block .sb-label {
    font-family: var(--sans);
    font-size: 0.72rem;
    color: var(--blue);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .sub-block .sb-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 24px;
    font-family: var(--serif);
    font-size: 1.08rem;
    color: var(--ink);
  }
  .sub-block .sb-line { white-space: nowrap; }
  @media (max-width: 480px) {
    .sub-block .sb-grid { grid-template-columns: 1fr; }
  }

  /* Goal formula */
  .goal {
    background: var(--gold-glow);
    border: 1px solid var(--gold);
    border-radius: 10px;
    padding: 14px 20px;
    margin-bottom: 18px;
    text-align: center;
    font-family: var(--serif);
    font-size: 1.4rem;
    color: var(--ink);
    position: relative;
  }
  .goal .goal-tag {
    position: absolute;
    top: -9px;
    left: 16px;
    background: var(--gold);
    color: white;
    font-family: var(--sans);
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Derivation lines */
  .derivation {
    display: flex;
    flex-direction: column;
    gap: 9px;
  }
  .derivation-empty {
    color: var(--ink-mute);
    font-style: italic;
    padding: 20px;
    text-align: center;
    border: 1.5px dashed var(--line);
    border-radius: 10px;
    font-size: 0.92rem;
  }
  .step-line {
    padding: 11px 14px 11px 18px;
    background: var(--bg);
    border-radius: 8px;
    border: 1px solid var(--line);
    border-left: 3px solid var(--ink-mute);
    font-family: var(--serif);
    font-size: 1.12rem;
    color: var(--ink);
    line-height: 1.55;
    position: relative;
    animation: slideIn 0.3s ease;
  }
  .step-line.current {
    background: linear-gradient(180deg, var(--gold-glow) 0%, var(--gold-soft) 100%);
    border-left-color: var(--gold);
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(176,138,60,0.1);
  }
  .step-line .step-num {
    font-family: var(--sans);
    font-size: 0.68rem;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
    margin-bottom: 4px;
    display: block;
  }
  .step-line .step-comment {
    font-family: var(--sans);
    font-size: 0.82rem;
    color: var(--ink-soft);
    font-style: italic;
    margin-top: 5px;
    display: block;
    line-height: 1.4;
  }

  /* Cancellations */
  .cancel {
    position: relative;
    background: var(--green-soft);
    color: var(--green-deep);
    padding: 1px 5px;
    border-radius: 4px;
    font-weight: 500;
  }
  .cancel::after {
    content: '';
    position: absolute;
    left: 4%;
    right: 4%;
    top: 50%;
    height: 1.5px;
    background: var(--green-deep);
    transform: rotate(-2deg);
  }
  .hl {
    background: rgba(176,138,60,0.18);
    padding: 1px 5px;
    border-radius: 4px;
  }
  .hl-blue {
    background: rgba(58,86,128,0.12);
    padding: 1px 5px;
    border-radius: 4px;
  }

  /* ---------- RIGHT PANEL ---------- */
  .question {
    font-size: 0.97rem;
    color: var(--ink);
    margin-bottom: 14px;
    padding: 12px 16px;
    background: var(--bg);
    border-radius: 8px;
    border-left: 3px solid var(--ink);
    line-height: 1.5;
  }
  .question .q-tag {
    display: inline-block;
    font-size: 0.7rem;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 700;
    margin-right: 8px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 9px;
    margin-bottom: 16px;
  }
  .option-card {
    background: var(--card);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 13px 16px;
    cursor: pointer;
    font-family: var(--serif);
    font-size: 1.08rem;
    text-align: left;
    color: var(--ink);
    transition: all 0.15s;
    width: 100%;
    line-height: 1.6;
    position: relative;
  }
  .option-card:hover:not(:disabled):not(.disabled) {
    border-color: var(--gold);
    background: var(--gold-glow);
    transform: translateY(-1px);
  }
  .option-card.selected {
    border-color: var(--gold);
    background: var(--gold-soft);
    box-shadow: 0 0 0 3px rgba(176,138,60,0.12);
  }
  .option-card.correct {
    border-color: var(--green);
    background: var(--green-soft);
    color: var(--green-deep);
  }
  .option-card.correct::after {
    content: '✓';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--green-deep);
    font-size: 1.3rem;
    font-weight: 700;
  }
  .option-card.wrong {
    border-color: var(--warn);
    background: var(--warn-soft);
    color: var(--warn);
  }
  .option-card.disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }

  /* Feedback */
  .feedback {
    padding: 12px 14px;
    border-radius: 8px;
    margin-bottom: 14px;
    font-size: 0.92rem;
    line-height: 1.5;
    display: none;
    animation: slideIn 0.25s ease;
  }
  .feedback.show { display: block; }
  .feedback.success {
    background: var(--green-soft);
    color: var(--green-deep);
    border-left: 3px solid var(--green);
  }
  .feedback.error {
    background: var(--warn-soft);
    color: var(--warn);
    border-left: 3px solid var(--warn);
  }
  .feedback.hint {
    background: var(--gold-soft);
    color: var(--ink);
    border-left: 3px solid var(--gold);
  }
  .feedback strong { color: inherit; font-weight: 700; }

  /* Buttons */
  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--line);
  }
  .btn {
    border: 1px solid var(--line);
    background: var(--card);
    padding: 9px 15px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.88rem;
    font-family: inherit;
    color: var(--ink);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover:not(:disabled) { background: var(--bg-deep); border-color: var(--ink-mute); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-primary {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
    font-weight: 600;
  }
  .btn-primary:hover:not(:disabled) { background: #2a3050; }
  .btn-ghost { color: var(--ink-soft); }
  .btn-warn { color: var(--warn); border-color: var(--warn-soft); }
  .btn-warn:hover:not(:disabled) { background: var(--warn-soft); }

  /* Completion screen */
  .completion {
    text-align: center;
    padding: 30px 16px;
    animation: slideIn 0.4s ease;
  }
  .completion .seal {
    width: 56px;
    height: 56px;
    margin: 0 auto 16px;
    border-radius: 50%;
    background: var(--green-soft);
    border: 2px solid var(--green);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--green-deep);
    font-size: 1.8rem;
    font-weight: 700;
  }
  .completion h3 {
    font-family: var(--serif);
    font-size: 1.3rem;
    margin: 0 0 8px;
    color: var(--ink);
  }
  .completion p {
    color: var(--ink-soft);
    margin: 0 0 18px;
    font-size: 0.92rem;
  }
  .completion .final-formula {
    font-family: var(--serif);
    font-size: 1.45rem;
    padding: 18px 20px;
    background: var(--green-soft);
    border: 2px solid var(--green);
    border-radius: 10px;
    margin: 14px 0 22px;
    color: var(--ink);
  }

  /* Teacher mode */
  .teacher-derivation {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .teacher-step {
    padding: 12px 16px;
    background: var(--bg);
    border-radius: 8px;
    border: 1px solid var(--line);
    border-left: 3px solid var(--gold);
    font-family: var(--serif);
    font-size: 1.1rem;
    color: var(--ink);
  }
  .teacher-step .ts-num {
    font-family: var(--sans);
    font-size: 0.68rem;
    color: var(--gold-deep);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
    display: block;
  }
  .teacher-step .ts-comment {
    font-family: var(--sans);
    font-size: 0.82rem;
    color: var(--ink-soft);
    font-style: italic;
    margin-top: 6px;
    line-height: 1.45;
  }

  /* Assembly section */
  .assembly-target {
    text-align: center;
    font-family: var(--serif);
    font-size: 1.5rem;
    padding: 20px;
    background: var(--bg);
    border-radius: 10px;
    margin-bottom: 18px;
    border: 1px solid var(--line);
  }
  .assembly-build {
    min-height: 70px;
    background: var(--gold-glow);
    border: 1.5px dashed var(--gold);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
    font-family: var(--serif);
    font-size: 1.3rem;
    text-align: center;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .assembly-build .placeholder {
    color: var(--ink-mute);
    font-style: italic;
    font-size: 0.92rem;
    font-family: var(--sans);
  }
  .assembly-block {
    display: inline-block;
    padding: 6px 12px;
    background: var(--gold);
    color: white;
    border-radius: 6px;
    font-family: var(--serif);
    font-size: 1.1rem;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .assembly-block:hover { transform: scale(1.05); }
  .assembly-pool {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  .pool-block {
    padding: 10px 14px;
    background: var(--card);
    border: 1.5px solid var(--line);
    border-radius: 8px;
    cursor: pointer;
    font-family: var(--serif);
    font-size: 1.05rem;
    color: var(--ink);
    transition: all 0.15s;
  }
  .pool-block:hover:not(.used) {
    border-color: var(--gold);
    background: var(--gold-glow);
  }
  .pool-block.used {
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* Progress footer */
  .progress {
    margin-top: 14px;
    padding: 14px 22px;
    background: var(--card);
    border-radius: 14px;
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
    box-shadow: var(--shadow);
  }
  .progress-text {
    font-size: 0.88rem;
    color: var(--ink-soft);
  }
  .progress-text strong { color: var(--ink); font-weight: 600; }
  .progress-stats {
    display: flex;
    gap: 18px;
    align-items: center;
    font-size: 0.86rem;
    color: var(--ink-soft);
    flex-wrap: wrap;
  }
  .progress-stats .stat {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .progress-stats .stat .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--ink-mute);
  }
  .progress-stats .stat.green .dot { background: var(--green); }
  .progress-stats .stat.gold .dot { background: var(--gold); }

  /* Animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(176,138,60,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(176,138,60,0); }
  }
  .pulse { animation: pulse 1.6s ease infinite; }

  /* Small helpers */
  .nowrap { white-space: nowrap; }
  .pad-x { padding: 0 2px; }
  .text-center { text-align: center; }
  .muted { color: var(--ink-mute); }
  .small { font-size: 0.85em; }

  /* Mobile tweaks */
  @media (max-width: 600px) {
    body { padding: 10px 12px 30px; }
    .panel { padding: 16px 16px; min-height: auto; }
    .header { padding: 14px 16px; }
    .section-bar { padding: 10px 12px; }
    .formula-tabs { margin-left: 0; padding-left: 0; border-left: none; width: 100%; padding-top: 8px; border-top: 1px solid var(--line); }
    .goal { font-size: 1.18rem; padding: 12px 14px; }
    .step-line, .option-card { font-size: 1rem; }
    .controls .btn { flex: 1 1 calc(50% - 4px); }
  }
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <a href="https://mathexam.space" class="home-link">← На главную</a>
      <div class="title-block">
        <div class="title">Преобразование суммы синусов и косинусов в произведение</div>
        <div class="subtitle">Учимся выводить четыре формулы через замену <em>p, q</em></div>
      </div>
    </div>
    <div class="modes" role="tablist">
      <button class="mode-btn active" data-mode="learn" type="button">Обучение</button>
      <button class="mode-btn" data-mode="practice" type="button">Тренировка</button>
      <button class="mode-btn" data-mode="teacher" type="button">Учитель</button>
    </div>
  </header>

  <!-- SECTION BAR -->
  <div class="section-bar">
    <span class="section-label">Раздел</span>
    <div class="section-tabs" id="section-tabs">
      <button class="section-btn active" data-section="derive" type="button">1. Вывод формул</button>
      <button class="section-btn" data-section="assemble" type="button">2. Сборка формулы</button>

const TOPIC_ID = 'trigSumToProductTrainer';

const STATE = {
  mode: 'learn',           // learn | practice | teacher
  section: 'derive',       // derive | assemble | product

  hintShown: false,
  // assembly state
  asmBuild: [],            // list of pool indices added

  // product state (no internal state beyond formulaIdx/selectedOpt)
  // progress
  progress: {
    derive: {},     // {sin_sum: {done:true, withHint:bool, errors:n}}

    product: {}

// ---------- STORAGE ----------
function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const all = JSON.parse(raw);
    const data = all && all[TOPIC_ID];
    if (data) {
      STATE.progress = Object.assign(STATE.progress, data.progress || {});
      STATE.stats = Object.assign(STATE.stats, data.stats || {});
    }
  } catch (e) { console.warn('progress load failed', e); }
}
function saveProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const all = raw ? JSON.parse(raw) : {};
    all[TOPIC_ID] = { progress: STATE.progress, stats: STATE.stats, updatedAt: Date.now() };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
  } catch (e) { console.warn('progress save failed', e); }
}

// ---------- RENDER: HEADER ----------
function renderModes() {
  $$('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === STATE.mode);
  });
}
function renderSections() {
  $$('.section-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.section === STATE.section);
  });
}
function renderFormulaTabs() {
  const tabs = $('#formula-tabs');
  tabs.innerHTML = '';
  const list = currentList();
  list.forEach((item, idx) => {
    const tab = el('button', { class: 'formula-tab', type: 'button' }, item.label);
    if (idx === STATE.formulaIdx) tab.classList.add('active');
    const p = STATE.progress[STATE.section][item.id];
    if (p && p.done) tab.classList.add('completed');
    tab.addEventListener('click', () => {
      STATE.formulaIdx = idx;
      resetStepState();
      render();
    });
    tabs.appendChild(tab);
  });
}

function currentList() {
  if (STATE.section === 'derive') return DERIVATIONS;
  if (STATE.section === 'assemble') return ASSEMBLIES;
  return PRODUCTS;
}

      <button class="btn" id="hint-btn" type="button" ${STATE.mode === 'practice' ? 'title="В тренировке подсказки тоже доступны, но засчитаются в прогресс"' : ''}>Подсказка</button>
      <button class="btn btn-ghost" id="reveal-btn" type="button">Показать решение</button>
      <button class="btn" id="next-step-btn" type="button" disabled>Дальше →</button>
    </div>
  `;

  // render options
  const opts = $('#options');
  step.options.forEach((o, idx) => {
    const card = el('button', { class: 'option-card', type: 'button', 'data-idx': idx }, o.html);
    if (STATE.selectedOpt === idx) card.classList.add('selected');
    if (STATE.attemptedWrong.has(idx)) card.classList.add('wrong', 'disabled');
    if (STATE.stepRevealed && o.correct) card.classList.add('correct');
    card.addEventListener('click', () => {
      if (STATE.stepRevealed) return;
      if (STATE.attemptedWrong.has(idx)) return;
      STATE.selectedOpt = idx;
      renderRight();
    });
    opts.appendChild(card);
  });

  $('#check-btn').addEventListener('click', checkStep);
  $('#hint-btn').addEventListener('click', showHint);
  $('#reveal-btn').addEventListener('click', revealStep);
  $('#next-step-btn').addEventListener('click', nextStep);
  $('#next-step-btn').disabled = !STATE.stepRevealed;
  $('#check-btn').disabled = STATE.selectedOpt === null || STATE.stepRevealed;
}

function renderAssembleRight() {
  const a = ASSEMBLIES[STATE.formulaIdx];
  const right = $('#right-panel');

  // already done?
  const prog = STATE.progress.assemble[a.id];
  if (STATE.asmFeedback === 'ok') {
    right.innerHTML = `
      <div class="panel-title">Готово</div>
      <div class="completion">
        <div class="seal">✓</div>
        <h3>Формула собрана!</h3>
        <p>Эта формула теперь у вас закреплена.</p>
        <div class="final-formula">${a.lhs} &nbsp;=&nbsp; ${a.target.join(' · ')}</div>
      </div>
      <div class="controls">
        <button class="btn" id="restart-btn" type="button">Собрать заново</button>
        <button class="btn btn-primary" id="next-formula-btn" type="button">Следующая →</button>
      </div>
    `;
    $('#restart-btn').addEventListener('click', () => {
      STATE.asmBuild = []; STATE.asmFeedback = null;
      delete STATE.progress.assemble[a.id];
      saveProgress();
      render();
    });
    $('#next-formula-btn').addEventListener('click', nextFormula);
    return;
  }

  right.innerHTML = `
    <div class="panel-title">Соберите правую часть</div>
    <div class="question"><span class="q-tag">Задание</span>Кликайте по блокам в нужном порядке, чтобы получить правую часть формулы. Когда соберёте — нажмите «Проверить».</div>
    <div class="feedback" id="feedback"></div>
    <div class="panel-title" style="margin-top:0">Доступные блоки</div>
    <div class="assembly-pool" id="asm-pool"></div>
    <div class="controls">
      <button class="btn btn-primary" id="check-asm-btn" type="button">Проверить</button>
      <button class="btn" id="hint-asm-btn" type="button">Подсказка</button>
      <button class="btn btn-ghost" id="clear-asm-btn" type="button">Очистить</button>
      <button class="btn" id="reveal-asm-btn" type="button">Показать решение</button>
    </div>
  `;

  const pool = $('#asm-pool');
  a.pool.forEach((b, idx) => {
    const used = STATE.asmBuild.includes(idx);
    const btn = el('button', { class: 'pool-block' + (used ? ' used' : ''), type: 'button' }, b);
    if (!used) {
      btn.addEventListener('click', () => {
        STATE.asmBuild.push(idx);
        STATE.asmFeedback = null;
        renderLeft(); renderRight();
      });
    }
    pool.appendChild(btn);
  });

  $('#check-asm-btn').addEventListener('click', checkAssembly);
  $('#hint-asm-btn').addEventListener('click', () => {
    markCurrentWithHint('assemble', a.id);
    recountStats(); saveProgress(); renderProgress();
    showFeedback($('#feedback'), 'hint', '<strong>Подсказка:</strong> ' + a.hint);
  });
  $('#clear-asm-btn').addEventListener('click', () => { STATE.asmBuild = []; STATE.asmFeedback = null; renderLeft(); renderRight(); });
  $('#reveal-asm-btn').addEventListener('click', () => {
    // Set asmBuild to the indices that match target
    STATE.asmBuild = [];
    a.target.forEach(t => {
      const i = a.pool.findIndex((p, idx) => p === t && !STATE.asmBuild.includes(idx));
      if (i !== -1) STATE.asmBuild.push(i);
    });
    STATE.asmFeedback = 'ok';
    STATE.progress.assemble[a.id] = { done: true, withHint: true };
    recountStats(); saveProgress();
    render();
  });
}

function renderAssemblyBuild() {
  const build = $('#asm-build');
  if (!build) return;
  const a = ASSEMBLIES[STATE.formulaIdx];
  build.innerHTML = '';
  if (STATE.asmBuild.length === 0) {
    build.innerHTML = '<span class="placeholder">Здесь появится правая часть — кликайте по блокам справа.</span>';
    return;
  }
  STATE.asmBuild.forEach((poolIdx, i) => {
    const block = el('span', { class: 'assembly-block' }, a.pool[poolIdx]);
    block.title = 'Кликните, чтобы убрать';
    block.addEventListener('click', () => {
      STATE.asmBuild.splice(i, 1);
      STATE.asmFeedback = null;
      renderLeft(); renderRight();
    });
    build.appendChild(block);
    if (i < STATE.asmBuild.length - 1) {
      build.appendChild(el('span', { class: 'muted' }, '·'));
    }
  });
}

function renderProductRight() {
  const p = PRODUCTS[STATE.formulaIdx];
  const right = $('#right-panel');

  if (STATE.stepRevealed) {
    right.innerHTML = `
      <div class="panel-title">Готово</div>
      <div class="completion">
        <div class="seal">✓</div>
        <h3>Верно!</h3>
        <div class="final-formula">${p.lhs} &nbsp;=&nbsp; ${p.options[0].html}</div>
        <p style="text-align: left; font-size: 0.92rem;">${p.explain}</p>
      </div>
      <div class="controls">
        <button class="btn" id="restart-btn" type="button">Заново</button>
        <button class="btn btn-primary" id="next-formula-btn" type="button">Следующая →</button>
      </div>
    `;
    $('#restart-btn').addEventListener('click', () => {
      STATE.selectedOpt = null; STATE.stepRevealed = false; STATE.attemptedWrong.clear();
      delete STATE.progress.product[p.id];
      saveProgress();
      render();
    });
    $('#next-formula-btn').addEventListener('click', nextFormula);
    return;
  }

  right.innerHTML = `
    <div class="panel-title">Выберите правильную формулу</div>
    <div class="question"><span class="q-tag">Задание</span>${p.prompt}</div>
    <div class="feedback" id="feedback"></div>
    <div class="options" id="options"></div>
    <div class="controls">
      <button class="btn btn-primary" id="check-btn" type="button">Проверить</button>
      <button class="btn" id="hint-btn" type="button">Подсказка</button>
      <button class="btn btn-ghost" id="reveal-btn" type="button">Показать решение</button>
    </div>
  `;

  const opts = $('#options');
  p.options.forEach((o, idx) => {
    const card = el('button', { class: 'option-card', type: 'button' }, o.html);
    if (STATE.selectedOpt === idx) card.classList.add('selected');
    if (STATE.attemptedWrong.has(idx)) card.classList.add('wrong', 'disabled');
    card.addEventListener('click', () => {
      if (STATE.attemptedWrong.has(idx)) return;
      STATE.selectedOpt = idx;
      renderRight();
    });
    opts.appendChild(card);
  });

  $('#check-btn').addEventListener('click', checkProduct);
  $('#hint-btn').addEventListener('click', () => showFeedback($('#feedback'), 'hint', p.hint));
  $('#reveal-btn').addEventListener('click', () => {
    STATE.stepRevealed = true;
    STATE.progress.product[p.id] = { done: true, withHint: true };
    recountStats(); saveProgress();
    render();
  });
  $('#check-btn').disabled = STATE.selectedOpt === null;
}

// ---------- ACTIONS: DERIVE ----------
function markCurrentWithHint(section, id) {
  const cur = STATE.progress[section][id] || {};
  STATE.progress[section][id] = Object.assign(cur, { withHint: true });
}

function checkStep() {
  const f = DERIVATIONS[STATE.formulaIdx];
  const step = f.steps[STATE.stepIdx];
  const sel = STATE.selectedOpt;
  if (sel == null) return;
  const opt = step.options[sel];

  if (opt.correct) {
    STATE.stepRevealed = true;
    renderLeft();
    renderRight();
    showFeedback($('#feedback'), 'success', '<strong>Верно!</strong> ' + (STATE.mode === 'learn' ? step.comment : 'Можно идти дальше.'));
  } else {
    STATE.attemptedWrong.add(sel);
    STATE.stats.err += 1;
    STATE.selectedOpt = null;
    saveProgress();
    const msg = STATE.mode === 'learn'
      ? (ERR[opt.err] || 'Не совсем так. Попробуй ещё раз — обрати внимание на знаки.')
      : '<strong>Неверно.</strong> Попробуй другой вариант.';
    renderRight();
    showFeedback($('#feedback'), 'error', msg);
  }
}

function showHint() {
  if (STATE.section === 'derive') {
    const f = DERIVATIONS[STATE.formulaIdx];
    const step = f.steps[STATE.stepIdx];
    STATE.hintShown = true;
    markCurrentWithHint('derive', f.id);
    recountStats();
    saveProgress();
    renderProgress();
    showFeedback($('#feedback'), 'hint', '<strong>Подсказка:</strong> ' + step.hint);
  }
}

function revealStep() {
  const f = DERIVATIONS[STATE.formulaIdx];
  const step = f.steps[STATE.stepIdx];
  STATE.stepRevealed = true;
  STATE.hintShown = true;
  markCurrentWithHint('derive', f.id);
  // auto-select the correct option visually
  STATE.selectedOpt = step.options.findIndex(o => o.correct);
  renderLeft();
  renderRight();
  showFeedback($('#feedback'), 'hint', '<strong>Правильный ответ показан.</strong> ' + step.comment);
  recountStats();
  saveProgress();
  renderProgress();
}

function nextStep() {
  const f = DERIVATIONS[STATE.formulaIdx];
  STATE.stepIdx += 1;
  STATE.selectedOpt = null;
  STATE.attemptedWrong.clear();
  STATE.stepRevealed = false;
  STATE.hintShown = false;
  if (STATE.stepIdx >= f.steps.length) {
    const cur = STATE.progress.derive[f.id] || {};
    STATE.progress.derive[f.id] = { done: true, withHint: cur.withHint || false };
    recountStats();
  }
  saveProgress();
  render();
}

function nextFormula() {
  const list = currentList();
  if (STATE.formulaIdx < list.length - 1) {
    STATE.formulaIdx += 1;
  } else {
    STATE.formulaIdx = 0;
  }
  resetStepState();
  render();
}
function prevFormula() {
  const list = currentList();
  if (STATE.formulaIdx > 0) STATE.formulaIdx -= 1;
  else STATE.formulaIdx = list.length - 1;
  resetStepState();
  render();
}

// ---------- ACTIONS: ASSEMBLE ----------
function checkAssembly() {
  const a = ASSEMBLIES[STATE.formulaIdx];
  const built = STATE.asmBuild.map(i => a.pool[i]);
  // Compare with target — order matters
  const same = built.length === a.target.length && built.every((b, i) => b === a.target[i]);
  // Allow commutative re-ordering: if blocks contain "2" or "-2" first, then two function blocks
  // We'll be strict: target order is canonical
  if (same) {
    STATE.asmFeedback = 'ok';
    const cur = STATE.progress.assemble[a.id] || {};
    STATE.progress.assemble[a.id] = { done: true, withHint: cur.withHint || false };
    recountStats(); saveProgress();
    render();
  } else {
    STATE.stats.err += 1;
    saveProgress();
    // Determine error type
    let msg = '';
    if (built.length !== a.target.length) {
      msg = `<strong>Нужно собрать ${a.target.length} блока(блоков).</strong> Сейчас собрано: ${built.length}.`;
    } else {
      // Check if the same set, just wrong order
      const sortedBuilt = [...built].sort();
      const sortedTarget = [...a.target].sort();
      if (sortedBuilt.join('|') === sortedTarget.join('|')) {
        msg = '<strong>Блоки правильные, но порядок другой.</strong> Стандартный порядок: число · sin(полусуммы/полуразности) · cos(полусуммы/полуразности).';
      } else {
        // Wrong block(s)
        if (a.id === 'asm_cos_diff' && !built.includes('−2')) {
          msg = '<strong>Не забудь минус!</strong> У разности косинусов перед двойкой стоит минус.';
        } else if (a.id === 'asm_sin_diff') {
          msg = '<strong>В разности синусов аргументы разные:</strong> внутри sin — полуразность, внутри cos — полусумма.';
        } else if (a.id === 'asm_cos_sum') {
          msg = '<strong>В сумме косинусов</strong> обе функции — косинусы, но аргументы разные: полусумма и полуразность.';
        } else {
          msg = 'Не совсем так. Проверь, какие функции и какие аргументы у нас в формуле.';
        }
      }
    }
    showFeedback($('#feedback'), 'error', msg);
  }
}

// ---------- ACTIONS: PRODUCT ----------
function checkProduct() {
  const p = PRODUCTS[STATE.formulaIdx];
  const sel = STATE.selectedOpt;
  if (sel == null) return;
  const opt = p.options[sel];
  if (opt.correct) {
    STATE.stepRevealed = true;
    const cur = STATE.progress.product[p.id] || {};
    STATE.progress.product[p.id] = { done: true, withHint: cur.withHint || false };
    recountStats(); saveProgress();
    render();
  } else {
    STATE.attemptedWrong.add(sel);
    STATE.stats.err += 1;
    saveProgress();
    STATE.selectedOpt = null;
    renderRight();
    const msg = STATE.mode === 'learn'
      ? (ERR[opt.err] || 'Не совсем так. Подумай ещё.')
      : '<strong>Неверно.</strong> Попробуй другой вариант.';
    showFeedback($('#feedback'), 'error', msg);
  }
}

// ---------- HELPERS ----------
function showFeedback(node, type, html) {
  if (!node) return;
  node.className = 'feedback show ' + type;
  node.innerHTML = html;
}

function resetStepState() {
  STATE.stepIdx = 0;
  STATE.selectedOpt = null;
  STATE.attemptedWrong = new Set();
  STATE.stepRevealed = false;
  STATE.hintShown = false;
  STATE.asmBuild = [];
  STATE.asmFeedback = null;
}

function recountStats() {
  let done = 0, hint = 0;
  ['derive', 'assemble', 'product'].forEach(sect => {
    Object.values(STATE.progress[sect]).forEach(p => {
      if (p.done) done += 1;
      if (p.withHint) hint += 1;
    });
  });
  STATE.stats.done = done;
  STATE.stats.hint = hint;
}

function renderProgress() {
  const total = DERIVATIONS.length + ASSEMBLIES.length + PRODUCTS.length;
  $('#progress-text').textContent = `${STATE.stats.done} / ${total}`;
  $('#stat-done').textContent = STATE.stats.done;
  $('#stat-hint').textContent = STATE.stats.hint;
  $('#stat-err').textContent = STATE.stats.err;
}

// ---------- MAIN RENDER ----------
function render() {
  renderModes();
  renderSections();
  renderFormulaTabs();
  renderLeft();
  renderRight();
  renderProgress();
}

// ---------- INIT ----------
function init() {
  loadProgress();

  // mode buttons
  $$('.mode-btn').forEach(b => {
    b.addEventListener('click', () => {
      STATE.mode = b.dataset.mode;
      render();
    });
  });

  // section buttons
  $$('.section-btn').forEach(b => {
    b.addEventListener('click', () => {
      STATE.section = b.dataset.section;
      STATE.formulaIdx = 0;
      resetStepState();
      render();
    });
  });

  // reset button
  $('#reset-btn').addEventListener('click', () => {
    if (!confirm('Сбросить весь прогресс по этой теме?')) return;
    STATE.progress = { derive: {}, assemble: {}, product: {} };
    STATE.stats = { done: 0, hint: 0, err: 0 };
    resetStepState();
    saveProgress();
    render();
  });

  recountStats();
  render();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
