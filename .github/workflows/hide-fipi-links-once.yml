name: Hide FIPI links once

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - name: Hide public FIPI cards
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');

          const files = ['oge/index.html', 'trainers/index.html'];
          let removedCards = 0;

          for (const file of files) {
            let html = fs.readFileSync(file, 'utf8');
            const before = html;

            html = html.replace(/\s*<article class="card" data-card data-title="[^"]*(?:фипи|fipi)[^"]*"[^>]*>[\s\S]*?<\/article>/gi, match => {
              removedCards += 1;
              return '';
            });

            if (file === 'oge/index.html') {
              html = html
                .replace('<b>8</b><span>рабочих входов</span>', '<b>7</b><span>рабочих входов</span>')
                .replace('Первая часть и банк заданий', 'Первая часть');
            }

            if (file === 'trainers/index.html') {
              html = html
                .replace('<b>37</b><span>основных входов</span>', '<b>35</b><span>основных входов</span>')
                .replace('ЕГЭ профиль</h2><div class="section-note">6 страниц</div>', 'ЕГЭ профиль</h2><div class="section-note">4 страницы</div>');
            }

            if (html !== before) fs.writeFileSync(file, html, 'utf8');
          }

          if (removedCards !== 3) {
            throw new Error(`Expected to remove 3 public FIPI cards, removed ${removedCards}`);
          }
          NODE

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch .github/workflows/hide-fipi-links-once.yml
          git add oge/index.html trainers/index.html
          git commit -m "hide fipi links from public catalog"
          git push origin HEAD:main
