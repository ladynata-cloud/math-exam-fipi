<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ОГЭ · Задание 25 — геометрия повышенной сложности</title>
<style>
  :root{
    --bg:#e8e4db; --paper:#fffdf7; --ink:#1a1a2e; --blue:#2d70b3; --green:#16a34a;
    --orange:#d97706; --red:#dc2626; --purple:#7c3aed; --pink:#db2777; --teal:#0d9488;
    --amber-bg:#fffbeb; --amber-bd:#fcd34d; --amber-tx:#b45309;
    --grid:#e7e1d2; --muted:#5b5750; --line:#d9d2c4;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    line-height:1.5; padding:14px;}
  .app{max-width:1020px; margin:0 auto; background:var(--paper);
    border-radius:18px; box-shadow:0 10px 40px rgba(26,26,46,.13); overflow:hidden;}
  .head{background:var(--ink); color:#f4f1ea; padding:16px 20px; display:flex;
    align-items:center; gap:14px; flex-wrap:wrap;}
  .head h1{font-size:18px; margin:0; font-weight:800; letter-spacing:.2px}
  .head .sub{font-size:12.5px; opacity:.72; margin-top:2px}
  .head .grow{flex:1}
  .badge{background:rgba(255,255,255,.14); border-radius:999px; padding:5px 12px;
    font-size:12px; font-weight:700}
  /* tabs */
  .tabs{display:flex; gap:2px; background:#ece7dc; padding:6px 8px 0; overflow-x:auto}
  .tab{border:none; background:transparent; padding:10px 16px; font-size:14px; font-weight:700;
    color:var(--muted); cursor:pointer; border-radius:10px 10px 0 0; white-space:nowrap}
  .tab.on{background:var(--paper); color:var(--ink); box-shadow:0 -2px 6px rgba(0,0,0,.04)}
  .wrap{padding:18px 20px 26px}
  /* generic */
  h2{font-size:16px; margin:0 0 10px}
  .row{display:flex; gap:14px; flex-wrap:wrap}
  .col{flex:1; min-width:280px}
  button{font-family:inherit}
  .btn{border:1.5px solid var(--ink); background:var(--ink); color:#fff; padding:9px 15px;
    border-radius:10px; font-size:14px; font-weight:700; cursor:pointer}
  .btn.ghost{background:transparent; color:var(--ink)}
  .btn.blue{background:var(--blue); border-color:var(--blue)}
  .btn.small{padding:6px 11px; font-size:13px}
  .btn:disabled{opacity:.45; cursor:default}
  .pill{display:inline-block; padding:3px 9px; border-radius:999px; font-size:11.5px; font-weight:700}
  .pill.tri{background:#e7f0fb; color:#1e5a97}
  .pill.trap{background:#e9f7ee; color:#15803d}
  .pill.par{background:#fdf0e3; color:#b45309}
  .pill.quad{background:#f3ecfb; color:#6d28d9}
  .pill.circ{background:#e6f6f4; color:#0f766e}
  /* type grid */
  .tgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px}
  .tcard{border:1.5px solid var(--line); border-radius:12px; padding:12px 13px; cursor:pointer;
    background:#fff; transition:border-color .12s, transform .06s; position:relative}
  .tcard:hover{border-color:var(--blue)}
  .tcard:active{transform:translateY(1px)}
  .tcard .no{position:absolute; top:10px; right:12px; font-size:12px; font-weight:800; color:#b8b1a3}
  .tcard .tt{font-weight:800; font-size:13.5px; margin:2px 0 6px; padding-right:24px}
  .tcard .dsc{font-size:12px; color:var(--muted); line-height:1.4}
  .tcard .err-badge{display:inline-block; margin-top:8px; background:#fdecea; color:var(--red);
    font-size:11px; font-weight:800; padding:2px 8px; border-radius:999px}
  /* figure */
  .fig{background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:8px;
    display:flex; justify-content:center; align-items:center}
  .fig svg{max-width:100%; height:auto; display:block}
  /* task card */
  .task{border:1.5px solid var(--line); border-radius:14px; padding:16px; background:#fff}
  .cond{font-size:14.5px; line-height:1.6}
  .given{background:#f7f4ec; border-radius:10px; padding:10px 13px; font-size:13.5px; margin:12px 0}
  .steps{margin:6px 0 0; padding:0; list-style:none; counter-reset:st}
  .steps li{position:relative; padding:11px 12px 11px 42px; border-bottom:1px solid #f0ece2; font-size:14px}
  .steps li:last-child{border-bottom:none}
  .steps li::before{counter-increment:st; content:counter(st); position:absolute; left:11px; top:11px;
    width:22px; height:22px; background:var(--ink); color:#fff; border-radius:50%; font-size:12px;
    font-weight:800; display:flex; align-items:center; justify-content:center}
  .steps li.final{background:#f0f9f2; border-radius:0 0 10px 10px}
  .steps li.final::before{background:var(--green)}
  .why{margin-top:7px}
  .why-btn{border:none; background:var(--amber-bg); color:var(--amber-tx); border:1px solid var(--amber-bd);
    padding:3px 10px; border-radius:999px; font-size:11.5px; font-weight:800; cursor:pointer}
  .why-body{margin-top:7px; background:var(--amber-bg); border:1px solid var(--amber-bd);
    border-radius:9px; padding:9px 11px; font-size:12.5px; color:#7a4d0c; line-height:1.5; display:none}
  .why-body.open{display:block}
  .ans-final{font-size:16px; font-weight:800}
  .ans-final b{color:var(--green)}
  /* fraction */
  .frac{display:inline-flex; flex-direction:column; text-align:center; vertical-align:middle;
    margin:0 2px; line-height:1.05}
  .frac .n{border-bottom:1.4px solid currentColor; padding:0 4px 1px}
  .frac .d{padding:1px 4px 0}
  .sq{font-size:.72em; vertical-align:super}
  .rt{border-top:1.4px solid currentColor; padding:0 2px}
  .rad{font-size:1.02em}
  /* input / practice */
  .ansrow{display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:14px}
  input.num{border:1.6px solid var(--line); border-radius:10px; padding:9px 12px; font-size:15px;
    width:150px; font-family:inherit}
  input.num:focus{outline:none; border-color:var(--blue)}
  .fb{margin-top:12px; padding:11px 13px; border-radius:10px; font-size:13.5px; line-height:1.5; display:none}
  .fb.show{display:block}
  .fb.ok{background:#eaf7ee; border:1px solid #bfe6cb; color:#15803d}
  .fb.err{background:#fdecea; border:1px solid #f3c6c0; color:#b3271b}
  .fb.warn{background:#fff7e8; border:1px solid #f6dca0; color:#92610a}
  .stat{font-size:12.5px; color:var(--muted); margin-top:10px}
  .hintbox{margin-top:12px; border:1px dashed var(--blue); border-radius:10px; padding:0; overflow:hidden}
  .hintstep{padding:10px 13px; border-bottom:1px solid #eef1f6; font-size:13.5px; background:#f6f9fd}
  .hintstep:last-child{border-bottom:none}
  /* тренажёрная проводка по шагам */
  .guidebox{margin-top:12px; border:1.5px solid var(--blue); border-radius:12px; overflow:hidden; background:#f6f9fd}
  .guidehead{background:var(--blue); color:#fff; font-weight:800; font-size:12.5px; padding:9px 13px; letter-spacing:.2px}
  .gsteps{margin:0; padding:0; list-style:none; counter-reset:gs}
  .gsteps li{position:relative; padding:12px 13px 13px 44px; border-bottom:1px solid #e3ebf4; font-size:13.5px; line-height:1.55}
  .gsteps li:last-child{border-bottom:none}
  .gsteps li::before{counter-increment:gs; content:counter(gs); position:absolute; left:11px; top:12px;
    width:23px; height:23px; border-radius:50%; background:#c7d7ea; color:#1e3a5c; font-weight:800;
    font-size:12px; display:flex; align-items:center; justify-content:center}
  .gsteps li.done::before{content:'✓'; background:var(--green); color:#fff}
  .gsteps li.rev::before{background:var(--orange); color:#fff}
  .gsteps li.cur::before{background:var(--blue); color:#fff}
  .gq{font-weight:600}
  .gaskl{font-size:14px; font-weight:800}
  .gtip{margin-top:9px; font-size:12.5px; color:#7a4d0c; background:var(--amber-bg);
    border:1px solid var(--amber-bd); border-radius:9px; padding:8px 11px; display:none; line-height:1.5}
  .gtip.on{display:block}
  .gdone{margin-top:8px; font-size:13px; color:#15803d; font-weight:700}
  .gdone.rev{color:#b45309}
  .gcta{margin-top:9px; font-size:13.5px; font-weight:600; color:#1e3a5c; background:#eef5fc;
    border:1px dashed var(--blue); border-radius:9px; padding:9px 11px; line-height:1.5}
  /* quiz */
  .qtop{display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:12px}
  .qprog{flex:1; height:8px; background:#ece7dc; border-radius:99px; overflow:hidden}
  .qprog i{display:block; height:100%; background:var(--blue); width:0; transition:width .25s}
  .dots{display:flex; gap:6px; flex-wrap:wrap; margin:8px 0}
  .dot{width:13px; height:13px; border-radius:50%; background:#d9d2c4}
  .dot.g{background:var(--green)} .dot.r{background:var(--red)} .dot.y{background:var(--orange)}
  .law{background:var(--amber-bg); border:1.5px solid var(--amber-bd); border-radius:12px; padding:14px 16px;
    margin-top:14px}
  .law h3{margin:0 0 6px; color:var(--amber-tx); font-size:14px}
  .review{margin-top:12px}
  .review .rline{font-size:13.5px; padding:6px 0; border-bottom:1px solid #f0ece2}
  /* reference */
  .refmap{display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:10px}
  .refcard{border:1.5px solid var(--line); border-radius:12px; padding:13px; cursor:pointer; background:#fff}
  .refcard:hover{border-color:var(--teal)}
  .refcard .rt2{font-weight:800; font-size:13.5px; margin-bottom:5px}
  .refcard .kf{font-size:13px; color:var(--blue); margin-top:6px}
  .notsheet{background:#f3ecfb; border:1px solid #d9c8f2; border-radius:9px; padding:9px 11px;
    font-size:12px; color:#6d28d9; margin-top:8px}
  .notsheet b{display:block; margin-bottom:3px}
  .muted{color:var(--muted); font-size:13px}
  .backline{margin-bottom:12px}
  .link{background:none; border:none; color:var(--blue); font-weight:700; cursor:pointer; font-size:13.5px; padding:0}
  @media(max-width:720px){
    .wrap{padding:14px 13px 22px}
    .head h1{font-size:16px}
    .col{min-width:100%}
  }
</style>
</head>
<body>
<div class="app">
  <div class="head">
    <div>
      <h1>Задание 25 · геометрия повышенной сложности</h1>
      <div class="sub">ОГЭ по математике · 16 типов · разбор, тренировка, зачёт</div>
    </div>
    <div class="grow"></div>
    <div class="badge" id="modeBadge">Разбор</div>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab on" data-tab="learn">Разбор</button>
    <button class="tab" data-tab="train">Тренировка</button>
    <button class="tab" data-tab="exam">Зачёт</button>
    <button class="tab" data-tab="ref">Справочник</button>
  </div>
  <div class="wrap">
    <div id="panel-learn"></div>
    <div id="panel-train" style="display:none"></div>
    <div id="panel-exam" style="display:none"></div>
    <div id="panel-ref" style="display:none"></div>
  </div>
</div>
<script>
"use strict";
/* ======================================================================
   ЯДРО: хранилище, форматирование, SVG-помощники честного черчения
   ====================================================================== */
const TID='oge25-geometriya';
const KEY='mathExamCourseProgress.v1';
function loadStore(){ try{ return JSON.parse(localStorage.getItem(KEY)||'{}'); }catch(e){ return {}; } }
function saveStore(o){ try{ localStorage.setItem(KEY,JSON.stringify(o)); }catch(e){} }
function state(){ const s=loadStore(); if(!s[TID]) s[TID]={runs:0,best:0,events:[],passed:false,errByType:{}}; return s; }
function commit(mut){ const s=state(); mut(s[TID]); saveStore(s); }
function logEvent(ev){ commit(t=>{ t.events=t.events||[]; t.events.push(Object.assign({t:Date.now()},ev)); if(t.events.length>300) t.events=t.events.slice(-300); }); }
function bumpErr(typeId){ commit(t=>{ t.errByType=t.errByType||{}; t.errByType[typeId]=(t.errByType[typeId]||0)+1; }); }
function getErrByType(){ return (state()[TID].errByType)||{}; }

/* ---------- числовое сравнение и разбор ответа ученика ---------- */
function parseNum(s){
  if(s==null) return NaN;
  s=(''+s).trim().replace(',', '.').replace(/\s+/g,'');
  if(s==='') return NaN;
  return Number(s);
}
function approxEq(a,b,rel=1e-3,abs=1e-6){ if(!isFinite(a)||!isFinite(b)) return false; return Math.abs(a-b)<=Math.max(abs, rel*Math.max(1,Math.abs(b))); }

/* ---------- форматирование формул (HTML, стопочные дроби, радикалы) ---------- */
function frac(n,d){ return `<span class="frac"><span class="n">${n}</span><span class="d">${d}</span></span>`; }
function sq(x){ return `${x}<span class="sq">2</span>`; }
function rad(x){ return `<span class="rad">√</span><span class="rt">${x}</span>`; }
/* точный радикал k*√r (упрощённый) как строка HTML */
function simpRad(nUnderInt){ // √nUnder -> a√b
  let n=nUnderInt, a=1;
  for(let f=2; f*f<=n; f++){ while(n%(f*f)===0){ n/=f*f; a*=f; } }
  if(n===1) return `${a}`;
  if(a===1) return rad(n);
  return `${a}${rad(n)}`;
}
/* красивая дробь p/q (сокращённая), как десятичная строка если конечная, иначе p/q */
function gcd(a,b){ a=Math.abs(a);b=Math.abs(b); while(b){[a,b]=[b,a%b];} return a||1; }
function fmtNum(x){
  if(Math.abs(x-Math.round(x))<1e-9) return ''+Math.round(x);
  // до 3 знаков, без хвостовых нулей
  let r=(Math.round(x*1000)/1000);
  return (''+r).replace('.', ',');
}

/* ====================== SVG: подгонка и примитивы ====================== */
/* fit: центрирует мировые точки (y вверх) в вьюпорт vw×vh с полями pad, флип Y */
function fit(pts, vw, vh, pad){
  let minx=1e18,miny=1e18,maxx=-1e18,maxy=-1e18;
  pts.forEach(p=>{ if(p[0]<minx)minx=p[0]; if(p[0]>maxx)maxx=p[0]; if(p[1]<miny)miny=p[1]; if(p[1]>maxy)maxy=p[1]; });
  const w=(maxx-minx)||1, h=(maxy-miny)||1;
  const s=Math.min((vw-2*pad)/w,(vh-2*pad)/h);
  const cx=(minx+maxx)/2, cy=(miny+maxy)/2;
  const m=(x,y)=>[ +(vw/2+(x-cx)*s).toFixed(2), +(vh/2-(y-cy)*s).toFixed(2) ];
  return {m, s, vw, vh};
}
const esc=t=>(''+t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
/* линия (экранные коорд) */
function svL(a,b,o={}){ const st=o.stroke||'#1a1a2e', w=o.w||2, d=o.dash?` stroke-dasharray="${o.dash}"`:''; const lc=o.cap?` stroke-linecap="${o.cap}"`:''; return `<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="${st}" stroke-width="${w}"${d}${lc}/>`; }
function svPoly(pts,o={}){ const st=o.stroke||'#1a1a2e', w=o.w||2, f=o.fill||'none', d=o.dash?` stroke-dasharray="${o.dash}"`:''; const p=pts.map(q=>q.join(',')).join(' '); return `<polyline points="${p}" fill="${f}" stroke="${st}" stroke-width="${w}"${d} stroke-linejoin="round" stroke-linecap="round"/>`; }
function svPolygon(pts,o={}){ const st=o.stroke||'#1a1a2e', w=o.w||2, f=o.fill||'none'; const p=pts.map(q=>q.join(',')).join(' '); return `<polygon points="${p}" fill="${f}" stroke="${st}" stroke-width="${w}" stroke-linejoin="round"/>`; }
function svCirc(c,r,o={}){ const st=o.stroke||'#1a1a2e', w=o.w||2, f=o.fill||'none', d=o.dash?` stroke-dasharray="${o.dash}"`:''; return `<circle cx="${c[0]}" cy="${c[1]}" r="${r}" fill="${f}" stroke="${st}" stroke-width="${w}"${d}/>`; }
function svDot(c,o={}){ const r=o.r||4, f=o.fill||'#1a1a2e', st=o.stroke||'#fffdf7', w=o.w||1.6; return `<circle cx="${c[0]}" cy="${c[1]}" r="${r}" fill="${f}" stroke="${st}" stroke-width="${w}"/>`; }
/* текст с белым ореолом */
function svTxt(p,t,o={}){ const fs=o.fs||15, fw=o.fw||800, col=o.col||'#1a1a2e', anc=o.anchor||'middle', bl=o.baseline||'middle';
  const dx=o.dx||0, dy=o.dy||0;
  const common=`x="${p[0]+dx}" y="${p[1]+dy}" font-size="${fs}" font-weight="${fw}" text-anchor="${anc}" dominant-baseline="${bl}" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif"`;
  return `<text ${common} stroke="#fffdf7" stroke-width="3.4" stroke-linejoin="round" fill="none">${esc(t)}</text><text ${common} fill="${col}">${esc(t)}</text>`;
}
/* дуга угла как полилиния (экранные коорд): вершина V, к точкам P1,P2, радиус r px, n делений */
function svArc(V,P1,P2,r,o={}){
  let a1=Math.atan2(P1[1]-V[1],P1[0]-V[0]), a2=Math.atan2(P2[1]-V[1],P2[0]-V[0]);
  let da=a2-a1; while(da<=-Math.PI) da+=2*Math.PI; while(da>Math.PI) da-=2*Math.PI;
  const N=Math.max(8,Math.round(Math.abs(da)/0.12)); const pts=[];
  for(let i=0;i<=N;i++){ const a=a1+da*i/N; pts.push([+(V[0]+r*Math.cos(a)).toFixed(2), +(V[1]+r*Math.sin(a)).toFixed(2)]); }
  const dbl=o.double? svPoly(pts.map(q=>[V[0]+(q[0]-V[0])*1.24,V[1]+(q[1]-V[1])*1.24]),{stroke:o.stroke||'#d97706',w:o.w||2.4}):'';
  return svPoly(pts,{stroke:o.stroke||'#d97706',w:o.w||2.4})+dbl;
}
/* заполненный сектор (заливка угла) */
function svSector(V,P1,P2,r,o={}){
  let a1=Math.atan2(P1[1]-V[1],P1[0]-V[0]), a2=Math.atan2(P2[1]-V[1],P2[0]-V[0]);
  let da=a2-a1; while(da<=-Math.PI) da+=2*Math.PI; while(da>Math.PI) da-=2*Math.PI;
  const N=Math.max(8,Math.round(Math.abs(da)/0.12)); const pts=[V];
  for(let i=0;i<=N;i++){ const a=a1+da*i/N; pts.push([+(V[0]+r*Math.cos(a)).toFixed(2), +(V[1]+r*Math.sin(a)).toFixed(2)]); }
  return svPolygon(pts,{fill:o.fill||'rgba(45,112,179,.15)',stroke:'none',w:0});
}
/* метка прямого угла: угол в V, стороны к P1,P2, размер d px */
function svRight(V,P1,P2,o={}){
  const d=o.d||13, st=o.stroke||'#16a34a', w=o.w||2;
  const u1=norm(sub(P1,V)), u2=norm(sub(P2,V));
  const a=[V[0]+u1[0]*d, V[1]+u1[1]*d];
  const b=[V[0]+u2[0]*d, V[1]+u2[1]*d];
  const c=[V[0]+(u1[0]+u2[0])*d, V[1]+(u1[1]+u2[1])*d];
  return svPoly([a,c,b],{stroke:st,w});
}
/* засечки равенства на отрезке A-B (экранные), n штук */
function svTicks(A,B,n,o={}){
  const st=o.stroke||'#1a1a2e', w=o.w||2, len=o.len||7, gap=o.gap||5;
  const mid=[(A[0]+B[0])/2,(A[1]+B[1])/2];
  const u=norm(sub(B,A)); const p=[-u[1],u[0]]; // перпендикуляр
  const out=[]; const start=-(n-1)/2;
  for(let i=0;i<n;i++){ const off=(start+i)*gap; const cx=mid[0]+u[0]*off, cy=mid[1]+u[1]*off;
    out.push(svL([cx-p[0]*len/2,cy-p[1]*len/2],[cx+p[0]*len/2,cy+p[1]*len/2],{stroke:st,w})); }
  return out.join('');
}
/* маленькие вектор-помощники (экранные или мировые — линейные) */
function sub(a,b){ return [a[0]-b[0],a[1]-b[1]]; }
function add(a,b){ return [a[0]+b[0],a[1]+b[1]]; }
function mul(a,k){ return [a[0]*k,a[1]*k]; }
function len2(a){ return Math.hypot(a[0],a[1]); }
function norm(a){ const l=len2(a)||1; return [a[0]/l,a[1]/l]; }
function mid(a,b){ return [(a[0]+b[0])/2,(a[1]+b[1])/2]; }
function lerp(a,b,t){ return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t]; }
/* пересечение окружностей (мировые) для построения треугольника по сторонам */
function circInter(c1,r1,c2,r2, upper){
  const d=len2(sub(c2,c1)); if(d>r1+r2+1e-9||d<Math.abs(r1-r2)-1e-9) return null;
  const a=(r1*r1-r2*r2+d*d)/(2*d); const h=Math.sqrt(Math.max(0,r1*r1-a*a));
  const p=add(c1, mul(norm(sub(c2,c1)),a));
  const per=[ -(c2[1]-c1[1])/d, (c2[0]-c1[0])/d ];
  const s1=[p[0]+per[0]*h, p[1]+per[1]*h]; const s2=[p[0]-per[0]*h, p[1]-per[1]*h];
  return (upper? (s1[1]>=s2[1]?s1:s2) : (s1[1]<s2[1]?s1:s2));
}
/* треугольник по трём сторонам: A=(0,0), C=(b,0), B сверху; a=BC,b=AC,c=AB */
function triFromSides(a,b,c){
  const A=[0,0], C=[b,0];
  const B=circInter(A,c,C,a,true);
  return {A,B:B||[b/2,Math.max(1,c)],C};
}
/* обёртка svg */
function svgWrap(inner, vw, vh){ return `<svg viewBox="0 0 ${vw} ${vh}" width="${vw}" height="${vh}" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`; }

const DEG=x=>x*180/Math.PI, RAD=x=>x*Math.PI/180;
function rayCircle(P,dir,O,r){ // точка на луче P+t·dir, лежащая на окружности (t>0, дальняя)
  const f=sub(P,O); const a=dir[0]*dir[0]+dir[1]*dir[1];
  const b=2*(f[0]*dir[0]+f[1]*dir[1]); const c=f[0]*f[0]+f[1]*f[1]-r*r;
  const disc=b*b-4*a*c; if(disc<0) return null; const sd=Math.sqrt(disc);
  const t1=(-b+sd)/(2*a), t2=(-b-sd)/(2*a); const t=Math.max(t1,t2);
  return [P[0]+dir[0]*t, P[1]+dir[1]*t];
}
function lineInter(p1,p2,p3,p4){ // пересечение прямых (p1p2) и (p3p4)
  const d=(p1[0]-p2[0])*(p3[1]-p4[1])-(p1[1]-p2[1])*(p3[0]-p4[0]); if(Math.abs(d)<1e-12) return null;
  const a=p1[0]*p2[1]-p1[1]*p2[0], b=p3[0]*p4[1]-p3[1]*p4[0];
  return [ (a*(p3[0]-p4[0])-(p1[0]-p2[0])*b)/d, (a*(p3[1]-p4[1])-(p1[1]-p2[1])*b)/d ];
}

/* helper: coef·√under, упрощая радикал и внося рациональный coef */
function radScaleStr(coef, under){
  // coef может быть дробным. Приведём к виду (p/q)·√under, затем упростим √under и внесём.
  // упростим √under = a·√u
  let u=under, a=1; for(let f=2; f*f<=u; f++){ while(u%(f*f)===0){ u/=f*f; a*=f; } }
  let val=coef*a; // рациональный множитель перед √u
  const vr=Math.round(val*1e6)/1e6;
  if(u===1){ return fmtNum(coef*a); }
  // если множитель целый — красиво
  if(Math.abs(vr-Math.round(vr))<1e-9) return `${Math.round(vr)}${rad(u)}`;
  return `${fmtNum(vr)}${rad(u)}`;
}

  build(p){
    const [r1,r2]=p; const d=r1+r2; const dist=4*r1*r2/d;
    const steps=[
      {h:`Пусть O₁, O₂ — центры (радиусы r₁ = ${r1}, r₂ = ${r2}), точка касания T, <b>d = O₁O₂ = r₁ + r₂ = ${d}</b>. Общие касательные AC и BD симметричны относительно линии центров, поэтому A, B (и C, D) симметричны, а хорды <b>AB ⟂ O₁O₂</b> и <b>CD ⟂ O₁O₂</b> ⇒ <b>AB ∥ CD</b>.`, why:`Конфигурация симметрична относительно прямой центров, значит хорды перпендикулярны ей и параллельны между собой.`, ask:{label:'d = O₁O₂', v:d, q:`Окружности касаются внешним образом, поэтому расстояние между центрами d = O₁O₂ равно сумме радиусов. Посчитай d.`, tip:`d = r₁ + r₂ = ${r1} + ${r2}.`}},
      {h:`Проекции точек касания на линию центров дают положения хорд. Для внешней касательной перпендикуляры O₁A и O₂C параллельны; из подобия проекция даёт расстояние между хордами <b>${frac('d² − (r₁ − r₂)²','d')}</b>.`, why:`O₁A ∥ O₂C (обе ⟂ касательной); проекции точек касания на O₁O₂ отстоят на (d² − (r₁−r₂)²)/d.`},
      {h:`Так как d = r₁ + r₂: <b>d² − (r₁ − r₂)² = (r₁+r₂)² − (r₁−r₂)² = 4r₁r₂</b>. Значит расстояние <b>= ${frac('4r₁r₂','r₁ + r₂')} = ${frac(''+4*r1*r2, ''+d)} = ${fmtNum(dist)}</b>.`, why:null, ask:{label:'расстояние', v:dist, q:`Расстояние между хордами = (d² − (r₁ − r₂)²)/d, а при d = r₁ + r₂ это упрощается до 4·r₁·r₂/(r₁ + r₂). Радиусы даны, d ты нашёл. Посчитай расстояние (можно округлить до сотых).`, tip:`расстояние = 4·r₁·r₂ / (r₁ + r₂) = ${4*r1*r2} / ${d}.`}}
    ];
    return {ans:[{label:'расстояние',v:dist,exact:fmtNum(dist)}], steps, geo:{r1,r2}};
  },
  draw(p){
    const [r1,r2]=p; const d=r1+r2; const O1=[0,0], O2=[d,0], T=[r1,0];
    const nx=(r1-r2)/d, ny=Math.sqrt(Math.max(0,1-nx*nx));

    s+=svL(A_,B_,{stroke:'#d97706',w:2.4}); s+=svL(C_,D_,{stroke:'#d97706',w:2.4}); // хорды AB, CD

    s+=svDot(T_,{r:3.5,fill:'#dc2626'});
    [[A_,'A',[-6,-12]],[B_,'B',[-6,13]],[C_,'C',[9,-11]],[D_,'D',[9,13]],[O1_,'O₁',[0,15]],[O2_,'O₂',[0,15]],[T_,'T',[4,-11]]].forEach(([q,t,dxy])=>{ s+=svDot(q,{r:3.5}); s+=svTxt(q,t,{dx:dxy[0],dy:dxy[1],fs:13}); });
    return svgWrap(s,VW,VH);
  },
  refKey:`Хорды AB, CD ⟂ линии центров; расстояние = (d²−(r₁−r₂)²)/d = 4r₁r₂/(r₁+r₂).`,
  refWhy:`Симметрия относительно линии центров + проекции точек касания дают положения параллельных хорд.`,
  notSheet:null

/* ---------- ТИП 11: вписанный четырёхугольник, угол между диагоналями ---------- */
TYPES.push({

  build(p){

      {h:`Угол между хордами AC и BD равен полусумме дуг, на которые опираются: <b>∠AKB = ½(⌣AB + ⌣CD)</b>. Значит <b>⌣AB + ⌣CD = 120°</b>.`, why:`Угол между двумя пересекающимися хордами равен полусумме заключённых между ними дуг.`},
      {h:`Пусть ⌣AB = 2α, ⌣CD = 2γ, тогда <b>α + γ = 60°</b>. Хорда равна 2R·sin(половины дуги): <b>AB = 2R·sinα</b>, <b>CD = 2R·sinγ</b>.`, why:`Длина хорды окружности радиуса R равна 2R·sin(половины стягиваемой дуги).`},
      {h:`Из <b>cos(α + γ) = cos60° = ½</b> и <b>cosα·cosγ − sinα·sinγ = ½</b>, подставив sinα = ${frac('AB','2R')}, sinγ = ${frac('CD','2R')}, после упрощения:<br><b>AB² + CD² + AB·CD = 3R²</b>.`, why:`Возводя равенство для косинуса в квадрат и заменяя cos² = 1 − sin², радикалы сокращаются.`, ask:{label:'AB² + CD² + AB·CD', v:under, q:`После упрощения вышло AB² + CD² + AB·CD = 3R². Стороны AB и CD даны в условии. Посчитай левую часть — величину AB² + CD² + AB·CD (целое число).`, tip:`${AB}² + ${CD}² + ${AB}·${CD}.`}},
      {h:`<b>R = √${frac('AB² + CD² + AB·CD','3')} = √${frac(''+under,'3')} = √${under/3} = ${radScaleStr(1,under/3)}</b>.`, why:null, ask:{label:'R', v:R, q:`Из 3R² = (найденная величина) вырази радиус: R = √((AB² + CD² + AB·CD)/3). Посчитай R (можно округлить до сотых).`, tip:`R = √( ${under} / 3 ) = √${under/3}.`}}
    ];
    return {ans:[{label:'R',v:R,exact:radScaleStr(1,under/3)}], steps, geo:{AB,CD,R}};
  },
  draw(p){
    const [AB,CD]=p; const R=Math.sqrt((AB*AB+CD*CD+AB*CD)/3);
    const al=Math.asin(Math.min(1,AB/(2*R))), ga=Math.asin(Math.min(1,CD/(2*R)));
    const O=[0,0];
    const angA=Math.PI/2+al, angB=Math.PI/2-al;
    const angC=Math.PI/2-al-RAD(120), angD=angC-2*ga;
    const P=(t)=>[R*Math.cos(t),R*Math.sin(t)];
    const A=P(angA),B=P(angB),C=P(angC),D=P(angD);
    const K=lineInter(A,C,B,D);
    const M=fit([A,B,C,D,[R,0],[-R,0],[0,R],[0,-R]],VW,VH,PAD).m;
    const A_=M(...A),B_=M(...B),C_=M(...C),D_=M(...D),O_=M(...O),K_=K?M(...K):O_;
    const Rpx=len2(sub(M(R,0),O_));
    let s='';

    s+=svPolygon([A_,B_,C_,D_],{stroke:'#1a1a2e',w:2.2,fill:'rgba(45,112,179,0.05)'});
    s+=svL(A_,C_,{stroke:'#2d70b3',w:1.8}); s+=svL(B_,D_,{stroke:'#0d9488',w:1.8});
    if(K){ s+=svArc(K_,A_,B_,16,{stroke:'#d97706',w:2.2}); s+=svTxt(K_,'60°',{dx:0,dy:-15,fs:11,col:'#b45309'}); s+=svDot(K_,{r:3,fill:'#d97706'}); }
    s+=svTxt(mid(A_,B_),`${AB}`,{dx:-6,dy:-8,fs:12,col:'#1e5a97'});
    s+=svTxt(mid(C_,D_),`${CD}`,{dx:8,dy:6,fs:12,col:'#0f766e'});
    [[A_,'A',[-13,-4]],[B_,'B',[8,-12]],[C_,'C',[13,6]],[D_,'D',[-13,8]],[K_,'K',[10,10]]].forEach(([q,t,dxy])=>{ s+=svDot(q,{r:3.6}); s+=svTxt(q,t,{dx:dxy[0],dy:dxy[1],fs:13}); });
    return svgWrap(s,VW,VH);
  },
  refKey:`∠AKB = ½(⌣AB+⌣CD) ⇒ ⌣AB+⌣CD=120°; AB=2R·sinα, CD=2R·sinγ (α+γ=60°) ⇒ R = √((AB²+CD²+AB·CD)/3).`,
  refWhy:`Угол между хордами связывает дуги; выражение хорд через R и тригонометрия суммы углов дают радиус.`,

/* ---------- ТИП 12: окружность через M,N на AC, касается луча AB ---------- */
TYPES.push({
  id:12, topic:'Окружность', pill:'circ', tag:'касательная и секущая из точки',
  title:'Окружность через две точки стороны, касающаяся второй стороны',
  pool:[[9,11,11,6],[4,15,15,4],[36,44,11,6],[9,32,8,3],[18,40,5,3],[9,35,35,6],[8,30,15,4],[18,22,11,6],[12,21,7,4],[16,39,39,8],[24,42,7,4],[12,45,15,4]],
  cond(p){ const [m,n,under,den]=p; return `На стороне <b>AC</b> треугольника <b>ABC</b> отмечены точки <b>M</b> и <b>N</b> так, что <b>AM = ${m}</b>, <b>AN = ${n}</b> (точка M лежит между A и N). Окружность проходит через точки <b>M</b> и <b>N</b> и касается луча <b>AB</b>. Найдите радиус этой окружности, если <b>cos∠BAC = ${frac(simpRad(under),''+den)}</b>.`; },
  build(p){
    const [m,n,under,den]=p;
    const cosA=Math.sqrt(under)/den, sinA=Math.sqrt(den*den-under)/den, sd=Math.round(Math.sqrt(den*den-under));
    const P=(m+n)/2, AT=Math.sqrt(m*n), rt=Math.round(Math.sqrt(m*n*under));
    const R=(P - AT*cosA)/sinA;
    const atStr=simpRad(m*n);
    const steps=[
      {h:`Пусть окружность касается луча <b>AB</b> в точке <b>T</b>. Прямая AC — секущая (проходит через M и N), AB — касательная. По теореме о касательной и секущей из точки A:<br><b>AT² = AM · AN = ${m}·${n} = ${m*n}</b>, откуда <b>AT = ${atStr}</b>.`, why:`Квадрат отрезка касательной равен произведению секущей на её внешнюю часть (степень точки A относительно окружности): AT² = AM·AN.`, ask:{label:'AT² = AM·AN', v:m*n, q:`AB — касательная, AC — секущая через M и N. По теореме о касательной и секущей AT² = AM·AN. Значения AM и AN даны в условии. Посчитай AT² — целое число.`, tip:`AT² = AM · AN = ${m} · ${n}.`}},
      {h:`Пусть <b>O</b> — центр, <b>R</b> — радиус, обозначим <b>∠OAB = β</b>. Так как AB — касательная в T, то <b>OT ⟂ AB</b>, <b>OT = R</b>, и в прямоугольном треугольнике AOT: <b>AT = AO·cos β</b>, &nbsp; <b>R = AO·sin β</b>.`, why:`Радиус в точку касания перпендикулярен касательной; отсюда AT — проекция AO на AB, а R — «высота» AO над AB.`},
      {h:`Середина хорды <b>MN</b> — основание перпендикуляра из O на AC, поэтому её расстояние от A равно <b>${frac('AM + AN','2')} = ${fmtNum(P)}</b> и равно <b>AO·cos∠OAC</b>, где <b>∠OAC = ∠BAC − β</b>.`, why:`Перпендикуляр из центра к хорде делит её пополам; проекция AO на AC даёт середину MN.`},
      {h:`Раскроем <b>AO·cos(∠BAC − β)</b> по формуле косинуса разности:<br><b>cos∠BAC·(AO cos β) + sin∠BAC·(AO sin β) = ${fmtNum(P)}</b><br>⇒ <b>cos∠BAC·AT + sin∠BAC·R = ${fmtNum(P)}</b>.`, why:`cos(x−β)=cos x·cos β+sin x·sin β; подставляем AT=AO cos β и R=AO sin β.`},
      {h:`Выразим радиус из последнего равенства:<br><b>R = ${frac('(AM+AN)/2 − AT·cos∠BAC','sin∠BAC')}</b>.`, why:null},
      {h:(()=>{ const num1=P*den-rt; const rhs = (sd===1) ? `${fmtNum(P*den)} − ${rt} = ${fmtNum(R)}` : `${frac(fmtNum(P*den)+' − '+rt,''+sd)} = ${frac(fmtNum(num1),''+sd)} = ${fmtNum(R)}`;
        return `Подставим <b>cos∠BAC = ${frac(simpRad(under),''+den)}</b> и <b>sin∠BAC = ${frac(''+sd,''+den)}</b>. Тогда <b>AT·cos∠BAC = ${atStr}·${frac(simpRad(under),''+den)} = ${frac(''+rt,''+den)}</b>. Умножим числитель и знаменатель на ${den}:<br><b>R = ${rhs}</b>.`; })(), why:null, ask:{label:'R', v:R, q:`Подставь cos∠BAC и sin∠BAC и доведи до числа радиус R = ((AM + AN)/2 − AT·cos∠BAC) / sin∠BAC. Посчитай R (можно округлить до сотых).`, tip:`sin∠BAC = ${sd}/${den}; в числителе (AM+AN)/2 − AT·cos∠BAC, где (AM+AN)/2 = ${fmtNum(P)}.`}}
    ];
    return {ans:[{label:'R',v:R,exact:fmtNum(R)}], steps, geo:{m,n,under,den}};
  },
  draw(p){
    const [m,n,under,den]=p;
    const cosA=Math.sqrt(under)/den, sinA=Math.sqrt(den*den-under)/den;
    const P=(m+n)/2, AT=Math.sqrt(m*n), k=(AT - P*cosA)/sinA, R=(P - AT*cosA)/sinA;
    const al=Math.acos(cosA);
    const A=[0,0], C=[n*1.32,0], Mp=[m,0], Np=[n,0], O=[P,k];
    const T=[AT*Math.cos(al),AT*Math.sin(al)];
    const Blen=AT*1.5, B=[Blen*Math.cos(al),Blen*Math.sin(al)];
    const F=fit([A,B,C,Mp,Np,O,T,[O[0]+R,O[1]],[O[0]-R,O[1]],[O[0],O[1]+R],[O[0],O[1]-R]],VW,VH,PAD).m;
    const A_=F(...A),B_=F(...B),C_=F(...C),M_=F(...Mp),N_=F(...Np),O_=F(...O),T_=F(...T);

    s+=svPolygon([A_,B_,C_],{stroke:'#1a1a2e',w:2.2,fill:'rgba(45,112,179,0.05)'});
    s+=svL(O_,T_,{stroke:'#0d9488',w:1.5,dash:'4 3'});
    s+=svRight(T_,A_,O_,{d:9,stroke:'#16a34a',w:1.7});
    s+=svArc(A_,C_,B_,20,{stroke:'#d97706',w:1.9});
    s+=svTxt(mid(A_,M_),`${m}`,{dx:0,dy:13,fs:11,col:'#2d70b3'});
    s+=svTxt(mid(A_,N_),`${n}`,{dx:0,dy:-12,fs:11,col:'#7c3aed'});
    [[A_,'A',[-12,5]],[B_,'B',[5,-12]],[C_,'C',[13,5]],[M_,'M',[-1,-13]],[N_,'N',[3,14]],[T_,'T',[11,-7]],[O_,'O',[12,4]]].forEach(([q,t,dxy])=>{ s+=svDot(q,{r:3.6}); s+=svTxt(q,t,{dx:dxy[0],dy:dxy[1],fs:13}); });
    return svgWrap(s,VW,VH);
  },
  refKey:`Касательная и секущая из A: AT²=AM·AN. Проекции AO на стороны (AT=AO cosβ, R=AO sinβ, середина MN=AO cos(∠A−β)) и косинус разности ⇒ R=((AM+AN)/2 − √(AM·AN)·cos∠A)/sin∠A.`,
  refWhy:`Степень точки даёт длину касательной; проектируя центр на обе стороны угла и применяя формулу косинуса разности, выражаем радиус.`,
  notSheet:`Теорема о касательной и секущей (AT²=AM·AN) на листе справочных материалов не приведена.`
});

/* ---------- ТИП 13: биссектриса делит высоту в отношении p:q ---------- */
TYPES.push({
  id:13, topic:'Треугольник', pill:'tri', tag:'cos∠A = q : p',
  title:'Биссектриса, делящая высоту треугольника',
  pool:[[17,15,16],[25,24,14],[5,4,12],[41,40,18],[13,12,10],[5,4,18],[5,3,16],[13,12,20],[5,4,6],[5,3,8]],
  cond(p){ const [pp,qq,BC]=p; return `Высота <b>BH</b> треугольника <b>ABC</b> и биссектриса, проведённая из вершины <b>A</b>, пересекаются в точке <b>K</b>. Оказалось, что <b>BK : KH = ${pp} : ${qq}</b> (считая от вершины B). Найдите радиус окружности, описанной около треугольника ABC, если <b>BC = ${BC}</b>.`; },
  build(p){
    const [pp,qq,BC]=p;
    const disc=pp*pp-qq*qq, sd=Math.round(Math.sqrt(disc));
    const R=BC*pp/(2*Math.sqrt(disc));
    const steps=[
      {h:`Точка <b>K</b> лежит на биссектрисе угла <b>A</b>, значит она равноудалена от сторон <b>AB</b> и <b>AC</b>. Так как <b>BH ⟂ AC</b>, расстояние от K до AC — это отрезок <b>KH</b>.`, why:`Каждая точка биссектрисы угла равноудалена от его сторон.`},
      {h:`Обозначим <b>∠A = α</b>. Разберём прямоугольный треугольник <b>ABH</b> (∠H = 90°). Приравнивая расстояние от K до AB к KH, после упрощения получаем <b>p·cos α = q</b>, то есть <b>cos α = ${frac(''+qq,''+pp)}</b>.`, why:`Проекции в прямоугольном треугольнике ABH и условие равноудалённости K от сторон дают связь cos α = KH:BK = q:p.`, ask:{label:'cos α', v:qq/pp, q:`Из равноудалённости точки K от сторон угла A и разбора прямоугольного △ABH выходит p·cos α = q, где p : q — данное отношение BK : KH. Найди cos α (десятичной дробью).`, tip:`cos α = q / p = ${qq} / ${pp}.`}},
      {h:`Тогда <b>sin α = √(1 − cos²α) = ${frac('√(p² − q²)','p')} = ${frac(''+sd,''+pp)}</b>.`, why:`Основное тригонометрическое тождество.`},
      {h:`По теореме синусов сторона <b>BC</b> лежит против угла <b>A</b>: <b>${frac('BC','sin α')} = 2R</b>, поэтому<br><b>R = ${frac('BC','2 sin α')} = ${frac('BC·p','2√(p² − q²)')} = ${frac(''+BC+'·'+pp,'2·'+sd)} = ${fmtNum(R)}</b>.`, why:`Теорема синусов: сторона = 2R·синус противолежащего угла.`, ask:{label:'R', v:R, q:`Сначала sin α = √(1 − cos²α). Затем по теореме синусов BC = 2R·sin α, откуда R = BC/(2 sin α). Сторона BC дана. Посчитай R (можно округлить до сотых).`, tip:`sin α = √(p² − q²)/p = ${sd}/${pp}; R = BC / (2·sin α) = (${BC}·${pp}) / (2·${sd}).`}}

  notSheet:`Формулы «расстояние от инцентра до вершины = r/sin(½угла)» и «s=r·Σctg(½угла)» на листе отсутствуют.`
});

/* ---------- ТИП 16: равнобедренный, вневписанная у апекса → инрадиус ---------- */
TYPES.push({
  id:16, topic:'Треугольник', pill:'tri', tag:'r·rₐ = (s−b)(s−c)',
  title:'Вписанная и вневписанная окружности равнобедренного треугольника',
  pool:[[12,8],[16,16],[24,16],[12,9],[24,18],[16,10],[20,25],[8,8],[18,27],[14,14]],
  cond(p){ const [AC,rB]=p; return `В равнобедренном треугольнике <b>ABC</b> с основанием <b>AC = ${AC}</b> вневписанная окружность касается основания AC и продолжений боковых сторон; её радиус равен <b>${rB}</b>. Найдите радиус окружности, вписанной в треугольник ABC.`; },
  build(p){
    const [AC,rB]=p; const r=(AC/2)*(AC/2)/rB;
    const steps=[
      {h:`Обозначим стороны: основание <b>AC = b = ${AC}</b>, боковые <b>AB = CB</b>. Полупериметр <b>s = ${frac('AB + CB + AC','2')}</b>. Так как треугольник равнобедренный (AB = CB), то <b>s − AB = s − CB = ${frac('AC','2')} = ${fmtNum(AC/2)}</b>.`, why:`Для равнобедренного треугольника два «касательных отрезка» s−AB и s−CB равны половине основания.`, ask:{label:'s − AB', v:AC/2, q:`Для равнобедренного треугольника (AB = CB) касательные отрезки s − AB и s − CB равны половине основания. Основание AC дано. Чему равно s − AB?`, tip:`s − AB = AC / 2 = ${AC} / 2.`}},
      {h:`Вписанная окружность имеет радиус <b>r = ${frac('S','s')}</b>, вневписанная (у вершины B, против основания) — <b>r_B = ${frac('S','s − AC')}</b>, где S — площадь. Перемножим:<br><b>r · r_B = ${frac('S²','s(s − AC)')}</b>.`, why:`r=S/s, а вневписанный радиус против стороны AC равен S/(s−AC).`},
      {h:`По формуле Герона <b>S² = s(s−AB)(s−CB)(s−AC)</b>, поэтому<br><b>r · r_B = ${frac('s(s−AB)(s−CB)(s−AC)','s(s−AC)')} = (s−AB)(s−CB) = (${frac('AC','2')})²</b>.`, why:`Квадрат площади по Герону сокращается с s(s−AC), оставляя произведение двух равных касательных отрезков.`},
      {h:`Отсюда <b>r = ${frac('(AC/2)²','r_B')} = ${frac(''+(AC/2*AC/2),''+rB)} = ${fmtNum(r)}</b>.`, why:null, ask:{label:'r', v:r, q:`Получено r·r_B = (AC/2)². Значит r = (AC/2)² / r_B. Основание AC и радиус вневписанной r_B даны в условии. Посчитай r (можно округлить до сотых).`, tip:`r = (AC/2)² / r_B = ${AC/2*AC/2} / ${rB}.`}}
    ];
    return {ans:[{label:'r',v:r,exact:fmtNum(r)}], steps, geo:{AC,rB}};
  },
  draw(p){
    const [AC,rB]=p; const w=AC/2, r=(w*w)/rB;
    const h=2*w*w*r/(w*w-r*r);
    const A=[-w,0], C=[w,0], B=[0,h];
    const In=[0,r], Ex=[0,-rB];
    function footLine(O,P1,P2){ const d=norm(sub(P2,P1)); const t=(O[0]-P1[0])*d[0]+(O[1]-P1[1])*d[1]; return [P1[0]+d[0]*t,P1[1]+d[1]*t]; }
    const TexAB=footLine(Ex,A,B), TexCB=footLine(Ex,C,B);
    const F=fit([A,C,B,[0,r+r*0+r],In,Ex,[Ex[0]+rB,Ex[1]],[Ex[0]-rB,Ex[1]],[Ex[0],Ex[1]-rB],[Ex[0],Ex[1]+rB],TexAB,TexCB],VW,VH,PAD).m;
    const A_=F(...A),C_=F(...C),B_=F(...B),In_=F(...In),Ex_=F(...Ex),TAB_=F(...TexAB),TCB_=F(...TexCB),base0=F(0,0);
    const rpx=len2(sub(F(In[0]+r,In[1]),In_)), rBpx=len2(sub(F(Ex[0]+rB,Ex[1]),Ex_));
    let s='';
    s+=svL(A_,TAB_,{stroke:'#c9c0ae',w:1.4,dash:'3 3'}); s+=svL(C_,TCB_,{stroke:'#c9c0ae',w:1.4,dash:'3 3'});
    s+=svCirc(Ex_,rBpx,{stroke:'#d97706',w:1.7,dash:'5 4'});
    s+=svPolygon([A_,B_,C_],{stroke:'#1a1a2e',w:2.4,fill:'rgba(45,112,179,0.05)'});
    s+=svCirc(In_,rpx,{stroke:'#16a34a',w:1.9});
    s+=svTicks(A_,B_,1,{stroke:'#1a1a2e'}); s+=svTicks(C_,B_,1,{stroke:'#1a1a2e'});
    s+=svDot(base0,{r:3,fill:'#d97706'});
    s+=svL(Ex_,base0,{stroke:'#d97706',w:1.4,dash:'3 3'});
    s+=svTxt(mid(Ex_,base0),`${rB}`,{dx:9,dy:0,fs:11,col:'#b45309'});
    s+=svTxt(mid(A_,C_),`${AC}`,{dx:0,dy:-13,fs:12,col:'#1a1a2e'});
    s+=svTxt(In_,'r',{dx:0,dy:0,fs:12,col:'#15803d'});
    [[A_,'A',[-13,4]],[C_,'C',[13,4]],[B_,'B',[0,-14]],[Ex_,'',[0,0]]].forEach(([q,t,dxy])=>{ if(t){ s+=svDot(q,{r:3.6}); s+=svTxt(q,t,{dx:dxy[0],dy:dxy[1],fs:13}); } });
    return svgWrap(s,VW,VH);
  },
  refKey:`Для равнобедренного треугольника s−AB=s−CB=AC/2. Из r=S/s и r_B=S/(s−AC) и формулы Герона: r·r_B=(s−AB)(s−CB)=(AC/2)² ⇒ r=(AC/2)²/r_B.`,
  refWhy:`Произведение радиусов вписанной и вневписанной окружностей равно произведению «касательных отрезков», которое для равнобедренного случая равно (AC/2)².`,
  notSheet:`Связь r·r_B=(s−a)(s−c) и вообще вневписанная окружность на листе справочных материалов не упоминаются.`
});

const $=id=>document.getElementById(id);

const byId=id=>TYPES.find(t=>t.id===id);
function rnd(a){ return a[Math.floor(Math.random()*a.length)]; }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* пошаговый список решения (для разбора и «сдаюсь») */
function stepsHTML(steps, revealN){
  const N = (revealN==null)? steps.length : Math.min(revealN, steps.length);
  let h='<ol class="steps">';
  for(let i=0;i<N;i++){ const st=steps[i]; const fin=(i===steps.length-1);
    h+=`<li class="${fin?'final':''}"><div>${st.h}</div>`;
    if(st.why){ h+=`<div class="why"><button class="why-btn" data-act="why">почему это верно?</button><div class="why-body">${st.why}</div></div>`; }
    h+='</li>';
  }
  h+='</ol>';
  return h;
}
function topWeak(n){
  const e=getErrByType(); const arr=Object.keys(e).map(k=>[+k,e[k]]).filter(x=>x[1]>0).sort((a,b)=>b[1]-a[1]).slice(0,n);
  return arr.map(x=>byId(x[0])).filter(Boolean);
}

/* -------------------- ТРЕНИРОВКА -------------------- */
let trS=null; // {id,p,b,hints,wrong,done,surrender}
function renderTrain(){
  if(!trS){ renderTrainPicker(); return; }
  const T=byId(trS.id), b=trS.b;
  const inputs=b.ans.map((a,i)=>`<label style="font-size:13.5px;font-weight:700">${a.label} =
     <input class="num" data-ai="${i}" inputmode="decimal" placeholder="число" ${trS.done?'disabled':''}></label>`).join(' ');
  let h=`<div class="backline"><button class="link" data-act="train-pick">← выбрать другой тип</button>
      &nbsp;·&nbsp; <span class="pill ${T.pill}">${PILLNAME[T.pill]}</span> <b style="font-size:13px">№${T.id}. ${T.title}</b></div>
    <div class="row">
      <div class="col" style="max-width:520px"><div class="fig">${T.draw(trS.p)}</div></div>
      <div class="col">
        <div class="task"><div class="cond">${T.cond(trS.p)}</div>
          <div class="ansrow">${inputs}</div>
          ${b.ans.length>1?'<div class="muted" style="margin-top:6px">Заполните все поля. Иррациональные ответы — десятичной дробью (можно округлить до сотых).</div>':'<div class="muted" style="margin-top:6px">Иррациональный ответ вводите десятичной дробью (можно округлить до сотых).</div>'}
          <div class="ansrow">
            <button class="btn blue" data-act="tr-check" ${trS.done?'disabled':''}>Проверить</button>
            ${(!trS.gmode&&!trS.done)?`<button class="btn ghost small" data-act="tr-hint">🪜 Шаг за шагом</button>`:''}
            ${(!trS.done)?`<button class="btn ghost small" data-act="tr-give">Сдаюсь — решение</button>`:''}
          </div>
          <div class="fb ${trS.fb?('show '+trS.fb.k):''}" id="trFb">${trS.fb?trS.fb.msg:''}</div>
          <div class="stat">Пройдено шагов: ${trS.gres?trS.gres.filter(Boolean).length:0} · подсказок: ${trS.hints} · неверных попыток: ${trS.wrong}</div>
          ${trS.done?'<div class="ansrow"><button class="btn" data-act="tr-next" data-id="'+trS.id+'">Следующая задача →</button></div>':''}
        </div>
      </div>
    </div>`;
  if(trS.gmode){ h+=guidedHTML(); }
  else if(trS.reveal>0){ h+=`<div class="hintbox">${stepsHTML(b.steps, trS.reveal)}</div>`; }
  $('panel-train').innerHTML=h;
}
/* ---- тренажёрная проводка по решению ---- */
function gClose(v, target){ return approxEq(v, target, 6e-3, 0.02); }
function gInfo(){ const steps=trS.b.steps; const last=steps.length-1; const finalAsk=!!(steps[last]&&steps[last].ask); return {last, finalAsk, gT: finalAsk?last:Math.max(0,last-1)}; }
function isFinalAskStep(i){ const g=gInfo(); return g.finalAsk && i===g.last; }
function gFinalCTA(){ return `<div class="gcta">${trS.b.gcta || 'Дальше — сам: доведи решение до числа, впиши ответ в поле выше и нажми «Проверить».'}</div>`; }
function guidedHTML(){
  const b=trS.b, steps=b.steps; const {last,finalAsk,gT}=gInfo();
  let h='<div class="guidebox"><div class="guidehead">🪜 ПРОВОДКА ПО РЕШЕНИЮ — на каждом шаге считаешь сам</div><ol class="gsteps">';
  for(let i=0;i<=trS.gstep;i++){
    const st=steps[i]; const res=trS.gres[i]||''; const cur=(i===trS.gstep);
    const asking = st.ask && cur && !res;
    const cls = asking?'cur' : (res==='rev'?'rev':'done');
    h+=`<li class="${cls}">`;
    if(asking){
      h+=`<div class="gq">${st.ask.q}</div>
          <div class="ansrow" style="margin-top:10px">
            <label class="gaskl">${st.ask.label} = <input class="num" id="gAsk" inputmode="decimal" placeholder="число"></label>
            <button class="btn blue small" data-act="g-check">Проверить шаг</button>
            ${st.ask.tip?`<button class="btn ghost small" data-act="g-tip">подсказка</button>`:''}
            <button class="btn ghost small" data-act="g-reveal">показать</button>
          </div>`;
      if(st.ask.tip) h+=`<div class="gtip${trS.gtip?' on':''}">💡 ${st.ask.tip}</div>`;
      if(trS.gfb) h+=`<div class="fb show ${trS.gfb.k}" style="margin-top:9px">${trS.gfb.msg}</div>`;
    } else {
      h+=`<div class="gh">${st.h}</div>`;
      if(st.ask && res) h+=`<div class="gdone ${res==='rev'?'rev':''}">${st.ask.label} = <b>${fmtNum(st.ask.v)}</b> — ${res==='rev'?'показано':'ты посчитал верно ✓'}</div>`;
      if(cur){
        if(i<gT) h+=`<div style="margin-top:9px"><button class="btn ghost small" data-act="g-next">Дальше →</button></div>`;
        else if(!finalAsk) h+= gFinalCTA();
      }
    }
    h+='</li>';
  }
  h+='</ol></div>';
  return h;
}
function gNext(){ const g=gInfo(); if(trS.gstep<g.gT){ trS.gstep++; trS.gfb=null; trS.gtip=false; } renderTrain(); }
function gCheck(){
  const st=trS.b.steps[trS.gstep]; if(!st.ask) return;
  const inp=document.getElementById('gAsk'); const v=parseNum(inp?inp.value:'');
  if(!isFinite(v)){ trS.gfb={k:'warn',msg:'Впиши число в поле шага.'}; renderTrain(); return; }
  if(gClose(v, st.ask.v)){
    trS.gres[trS.gstep]='ok'; trS.gfb=null; trS.gtip=false;
    logEvent({e:'hint', task:trS.id, step:trS.gstep, kind:'guide-ok'});
    if(isFinalAskStep(trS.gstep)){ finishGuided('ok'); return; }
    renderTrain();
  } else {
    trS.gfb={k:'err',msg:'Пока не сходится. Проверь вычисления' + (st.ask.tip?' или загляни в «подсказку».':'.')};
    renderTrain();
  }
}
function gReveal(){
  const st=trS.b.steps[trS.gstep]; if(!st.ask) return;
  trS.gres[trS.gstep]='rev'; trS.gfb=null; trS.gtip=false;
  if(isFinalAskStep(trS.gstep)){ finishGuided('rev'); return; }
  trS.hints++; logEvent({e:'hint', task:trS.id, step:trS.gstep, kind:'guide-reveal'});
  renderTrain();
}
function finishGuided(mode){
  trS.done=true; const b=trS.b; const ansTxt=b.ans.map(a=>`${a.label} = ${a.exact}`).join(', ');
  if(mode==='ok'){
    trS.fb={k:'ok',msg:`Верно! Шаг за шагом ты дошёл до ответа: ${ansTxt}. Засчитано как решение по шагам.`};
    logEvent({e:'solved', task:trS.id, via:'guided', mistakes:trS.wrong, hints:trS.hints});
  } else {
    trS.surrender=true;
    trS.fb={k:'warn',msg:`Ответ показан: ${ansTxt}. Эта задача засчитана как «сдалась».`};
    bumpErr(trS.id); logEvent({e:'solved', task:trS.id, via:'surrender', mistakes:trS.wrong, hints:trS.hints});
  }
  renderTrain();
}
function renderTrainPicker(){
  const weak=topWeak(3);
  let h='<div class="muted" style="margin-bottom:12px">Выберите тип для тренировки. Числа в каждой задаче меняются; чертёж перестраивается под них.</div>';
  if(weak.length){ h+='<div class="law" style="margin-bottom:14px"><h3>Стоит повторить (больше всего ошибок)</h3><div>'+weak.map(T=>`<button class="btn ghost small" data-act="train-this" data-id="${T.id}" style="margin:3px 5px 3px 0">№${T.id}. ${T.title}</button>`).join('')+'</div></div>'; }
  h+='<div class="tgrid">';
  for(const T of TYPES){ h+=`<div class="tcard" data-act="train-this" data-id="${T.id}"><div class="no">№${T.id}</div><span class="pill ${T.pill}">${PILLNAME[T.pill]}</span><div class="tt">${T.title}</div><div class="dsc">${T.tag}</div></div>`; }
  h+='</div>';
  $('panel-train').innerHTML=h;
}
function startTrain(id){ newTrainTask(id); switchTab('train'); }
function newTrainTask(id){
  const T=byId(id); const p=rnd(T.pool);
  trS={id, p, b:T.build(p), hints:0, wrong:0, reveal:0, done:false, surrender:false, fb:null,
       gmode:false, gstep:0, gres:[], gfb:null, gtip:false};
  logEvent({e:'task_start', task:id, kind:'train'});
  renderTrain();
}
function trCheck(){
  const T=byId(trS.id), b=trS.b; let allOK=true, any=false;
  document.querySelectorAll('#panel-train input[data-ai]').forEach(inp=>{
    const i=+inp.dataset.ai; const v=parseNum(inp.value);
    if(inp.value.trim()!=='') any=true;
    if(!approxEq(v, b.ans[i].v, 2e-3)) allOK=false;
  });
  if(!any){ trS.fb={k:'warn',msg:'Введите ответ в поле.'}; renderTrain(); return; }
  if(allOK){
    trS.done=true;
    const via = trS.surrender?'surrender':(trS.gmode?'guided':(trS.hints>0?'hint':'direct'));
    const ansTxt=b.ans.map(a=>`${a.label} = ${a.exact}`).join(', ');
    const note = trS.gmode?' (по шагам)':(trS.hints>0?' (с подсказками)':'');
    trS.fb={k:'ok',msg:`Верно! ${ansTxt}.${note}`};
    if(!trS.surrender) logEvent({e:'solved', task:trS.id, via, mistakes:trS.wrong, hints:trS.hints});
  } else {
    trS.wrong++; bumpErr(trS.id);
    trS.fb={k:'err',msg:'Не сходится. Проверьте вычисления или откройте «🪜 Шаг за шагом».'};
    logEvent({e:'quiz_wrong', task:trS.id, mode:'train'});
  }
  renderTrain();
}
function trHint(){
  if(trS.done) return;
  if(!trS.gmode){ trS.gmode=true; trS.gstep=0; trS.gres=[]; trS.gfb=null; trS.gtip=false;
    logEvent({e:'hint', task:trS.id, step:0, kind:'guide-open'}); }
  renderTrain();
}
function trGive(){
  const b=trS.b; trS.gmode=false; trS.reveal=b.steps.length; trS.surrender=true; trS.done=true;
  const ansTxt=b.ans.map(a=>`${a.label} = ${a.exact}`).join(', ');
  trS.fb={k:'warn',msg:`Полное решение открыто. Ответ: ${ansTxt}. Засчитано как «сдалась».`};
  bumpErr(trS.id);
  logEvent({e:'solved', task:trS.id, via:'surrender', mistakes:trS.wrong, hints:trS.hints});
  renderTrain();
}

/* -------------------- ЗАЧЁТ -------------------- */
const EXAM_QUOTA={tri:3, trap:2, par:1, quad:1, circ:1}; // 8 вопросов, квоты по темам
let exS=null;
function buildExam(){
  const byPill={}; for(const T of TYPES){ (byPill[T.pill]=byPill[T.pill]||[]).push(T); }
  const qs=[];
  for(const pill of Object.keys(EXAM_QUOTA)){
    const pool=shuffle(byPill[pill]||[]); const need=EXAM_QUOTA[pill];
    for(let i=0;i<need;i++){ const T=pool[i%pool.length]; const p=rnd(T.pool); qs.push({id:T.id, p, b:T.build(p)}); }
  }
  return shuffle(qs);
}
function renderExamIntro(){
  if(exS){ renderExam(); return; }
  const weak=topWeak(3);
  const st=state()[TID];
  let h=`<h2>Зачёт по заданию 25</h2>
    <div class="muted" style="margin-bottom:12px">${Object.values(EXAM_QUOTA).reduce((a,b)=>a+b,0)} задач с квотами по темам (треугольник, трапеция, параллелограмм, четырёхугольник, окружность). Режим зачёта: <b>без подсказок, одна попытка на задачу</b>. Числа случайные.</div>`;
  if(weak.length){ h+='<div class="law" style="margin-bottom:14px"><h3>Ваши слабые места (по тренировке)</h3><div class="muted" style="margin-bottom:6px">Эти типы стоит повторить в «Разборе» перед зачётом:</div><div>'+weak.map(T=>`<span class="pill ${T.pill}" style="margin:2px 4px 2px 0">№${T.id} · ${T.title}</span>`).join('')+'</div></div>'; }
  if(st.best>0){ h+=`<div class="stat">Лучший результат: <b>${st.best}</b> · попыток зачёта: ${st.runs}</div>`; }
  h+='<div class="ansrow"><button class="btn blue" data-act="exam-start">Начать зачёт →</button></div>';
  $('panel-exam').innerHTML=h;
}
function startExam(){
  exS={list:buildExam(), i:0, res:[]};
  commit(t=>{ t.runs=(t.runs||0)+1; });
  logEvent({e:'start', kind:'exam'});
  renderExam();
}
function renderExam(){
  if(exS.i>=exS.list.length){ return renderExamFin(); }
  const q=exS.list[exS.i], T=byId(q.id), b=q.b;
  const total=exS.list.length;
  const inputs=b.ans.map((a,i)=>`<label style="font-size:13.5px;font-weight:700">${a.label} = <input class="num" data-ai="${i}" inputmode="decimal" placeholder="число"></label>`).join(' ');
  let dots=''; for(let k=0;k<total;k++){ const r=exS.res[k]; dots+=`<div class="dot ${r?(r.correct?'g':'r'):''}"></div>`; }
  let h=`<div class="qtop"><div class="qprog"><i style="width:${Math.round(exS.i/total*100)}%"></i></div><div style="font-size:13px;font-weight:700">Задача ${exS.i+1} из ${total}</div></div>
    <div class="dots">${dots}</div>
    <div class="row">
      <div class="col" style="max-width:520px"><div class="fig">${T.draw(q.p)}</div></div>
      <div class="col"><div class="task">
        <span class="pill ${T.pill}">${PILLNAME[T.pill]}</span>
        <div class="cond" style="margin-top:8px">${T.cond(q.p)}</div>
        <div class="ansrow">${inputs}</div>
        <div class="muted" style="margin-top:6px">Иррациональный ответ — десятичной дробью (округление до сотых).</div>
        <div class="ansrow"><button class="btn blue" data-act="exam-answer">Ответить</button></div>
        <div class="fb" id="exFb"></div>
      </div></div>
    </div>`;
  $('panel-exam').innerHTML=h;
}
function examAnswer(){
  const q=exS.list[exS.i], b=q.b; let allOK=true, any=false;
  document.querySelectorAll('#panel-exam input[data-ai]').forEach(inp=>{
    const i=+inp.dataset.ai; if(inp.value.trim()!=='') any=true;
    if(!approxEq(parseNum(inp.value), b.ans[i].v, 2e-3)) allOK=false;
  });
  if(!any){ const fb=$('exFb'); fb.className='fb show warn'; fb.textContent='Введите ответ.'; return; }
  exS.res[exS.i]={correct:allOK};
  if(!allOK) bumpErr(q.id);
  logEvent({e:allOK?'quiz_ok':'quiz_wrong', task:q.id, mode:'exam'});
  const fb=$('exFb'); fb.className='fb show '+(allOK?'ok':'err');
  const ansTxt=b.ans.map(a=>`${a.label} = ${a.exact}`).join(', ');
  fb.innerHTML=allOK?`Верно! ${ansTxt}`:`Неверно. Правильный ответ: ${ansTxt}`;
  // авто-переход через короткую паузу заменяем кнопкой (среда без таймеров-эффектов): показать «Далее»
  fb.innerHTML += `<div class="ansrow"><button class="btn small" data-act="exam-next">${exS.i+1<exS.list.length?'Следующая →':'Итоги →'}</button></div>`;
}
function examNext(){ exS.i++; renderExam(); }
function renderExamFin(){
  const total=exS.list.length, score=exS.res.filter(r=>r&&r.correct).length;
  commit(t=>{ if(score>(t.best||0)) t.best=score; t.passed=true; });
  logEvent({e:'finish', score, total, kind:'exam'});
  let dots=''; for(const r of exS.res){ dots+=`<div class="dot ${r&&r.correct?'g':'r'}"></div>`; }
  // разбор неверных
  let wrongList=exS.list.map((q,k)=>({q,k})).filter(x=>!(exS.res[x.k]&&exS.res[x.k].correct));
  let rev='';
  if(wrongList.length){ rev='<div class="review"><h3 style="font-size:14px;margin:14px 0 6px">Разобрать ошибки:</h3>'+
    wrongList.map(({q})=>{ const T=byId(q.id); return `<div class="rline">№${T.id}. ${T.title} — <button class="link" data-act="train-this" data-id="${T.id}">тренировать этот тип →</button></div>`; }).join('')+'</div>'; }
  const law = score===total
    ? 'Отличный результат! Все ключевые теоремы вне листа справочных материалов вы применяете уверенно.'
    : 'Задание 25 держится на теоремах, которых нет на листе справочных материалов. Повторите отмеченные типы в «Разборе» — там для каждого объяснено, <i>почему</i> работает ключевой шаг.';
  let h=`<h2>Зачёт завершён</h2>
    <div style="font-size:40px;font-weight:800;color:${score===total?'var(--green)':'var(--ink)'}">${score} / ${total}</div>
    <div class="dots" style="margin:10px 0 4px">${dots}</div>
    <div class="law"><h3>Итог</h3><div style="font-size:13.5px">${law}</div></div>
    ${rev}
    <div class="ansrow"><button class="btn blue" data-act="exam-again">Пройти ещё раз</button> <button class="btn ghost" data-act="go-learn">К разбору типов</button></div>`;
  $('panel-exam').innerHTML=h;
  exS=null;
}

/* -------------------- СПРАВОЧНИК -------------------- */
function renderRef(){
  let h=`<div class="notsheet" style="margin-bottom:16px"><b>Как устроен этот справочник</b>Задание 25 почти целиком опирается на факты, которых <b>нет</b> на официальном листе справочных материалов ОГЭ. Ниже — ключевые теоремы и приёмы по типам: что применяем, <i>почему</i> это работает и чего именно не найти на листе. По кнопке можно сразу перейти к тренировке типа.</div>`;
  const groups={}; for(const T of TYPES){ (groups[T.pill]=groups[T.pill]||[]).push(T); }
  for(const pill of ['tri','trap','par','quad','circ']){
    const list=groups[pill]; if(!list) continue;
    h+=`<h2 style="margin:16px 0 8px"><span class="pill ${pill}">${PILLNAME[pill]}</span></h2><div class="refmap">`;
    for(const T of list){
      h+=`<div class="refcard">
        <div class="rt2">№${T.id}. ${T.title}</div>
        <div style="font-size:12.5px;color:var(--muted)">${T.tag}</div>
        <div class="kf">${T.refKey}</div>
        <div style="font-size:12.5px;color:#7a4d0c;background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:8px;padding:8px 10px;margin-top:8px"><b>Почему применимо:</b> ${T.refWhy}</div>
        <div class="notsheet">${T.notSheet}</div>
        <div style="margin-top:10px"><button class="btn blue small" data-act="train-this" data-id="${T.id}">Тренировать →</button></div>
      </div>`;
    }
    h+='</div>';
  }
  $('panel-ref').innerHTML=h;
}

/* -------------------- ДЕЛЕГИРОВАНИЕ СОБЫТИЙ -------------------- */
document.addEventListener('click', function(ev){
  const el=ev.target.closest('[data-act]'); 
  const tabBtn=ev.target.closest('.tab');
  if(tabBtn){ switchTab(tabBtn.dataset.tab); return; }
  if(!el) return;
  const act=el.dataset.act, id=el.dataset.id? +el.dataset.id : null;
  switch(act){
    case 'learn-open': learnType=id; renderLearn(); break;
    case 'learn-back': learnType=null; renderLearn(); break;
    case 'train-this': trS=null; startTrain(id); break;
    case 'train-pick': trS=null; renderTrain(); break;
    case 'tr-check': trCheck(); break;
    case 'tr-hint': trHint(); break;
    case 'tr-give': trGive(); break;
    case 'g-check': gCheck(); break;
    case 'g-reveal': gReveal(); break;
    case 'g-next': gNext(); break;
    case 'g-tip': trS.gtip=!trS.gtip; renderTrain(); break;
    case 'tr-next': newTrainTask(id); break;
    case 'exam-start': startExam(); break;
    case 'exam-answer': examAnswer(); break;
    case 'exam-next': examNext(); break;
    case 'exam-again': exS=null; renderExamIntro(); break;
    case 'go-learn': switchTab('learn'); break;
    case 'why': { const bd=el.parentElement.querySelector('.why-body'); if(bd){ const op=bd.classList.toggle('open'); el.textContent=op?'скрыть объяснение':'почему это верно?'; } break; }
  }
});

/* -------------------- СТАРТ -------------------- */
function init(){ commit(()=>{}); switchTab('learn'); }
init();
</script>
