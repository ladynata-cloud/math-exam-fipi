<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Биссектриса угла — циркуль и линейка</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#e8e4db;font-family:system-ui,-apple-system,'Segoe UI',Arial,sans-serif;color:#1f2937;padding:18px}
.app{max-width:980px;margin:auto;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 12px 36px #0002}
.head{background:#1a1a2e;color:#fff;padding:16px 20px;display:flex;gap:12px;align-items:center;justify-content:space-between}
.title{font-size:21px;font-weight:900}
.sub{font-size:13px;opacity:.72;margin-top:2px}
.badge{background:#ffffff22;border:1px solid #ffffff33;border-radius:999px;padding:7px 12px;font-size:13px;font-weight:800;white-space:nowrap}
.back{color:#cbd5e1;text-decoration:none;font-weight:800;font-size:13px}
.back:hover{color:#fff}
.success{display:none;background:#dcfce7;color:#14532d;font-weight:800;padding:10px 20px;font-size:15px;border-bottom:1px solid #bbf7d0}
.main{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:0}
.work{background:#faf8f2;padding:14px;border-right:1px solid #e5e2d9}
canvas{width:100%;height:auto;display:block;border:1px solid #d6d3ca;border-radius:14px;background:#fffdf7;touch-action:none;cursor:crosshair}
.side{padding:14px;display:flex;flex-direction:column;gap:10px}
.card{border:1.5px solid #e5e7eb;border-radius:12px;padding:12px;background:#f9fafb}
.card h2{margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:#64748b}
.task{font-size:16px;line-height:1.5}
.task b{color:#1a1a2e}
.steps{font-size:13px;color:#64748b;font-weight:800;margin-top:8px}
.msg{border-radius:12px;padding:12px;font-size:15px;font-weight:750;line-height:1.42}
.info{background:#eff6ff;color:#1d4ed8}
.ok{background:#f0fdf4;color:#15803d}
.err{background:#fef2f2;color:#b91c1c}
.why{display:none;background:#fffbeb;border:1.5px solid #fcd34d;border-radius:12px;padding:12px;font-size:14px;line-height:1.5;color:#374151}
.why b{color:#b45309}
.law{display:none;background:#ecfdf5;border:1.5px solid #bbf7d0;border-radius:12px;padding:14px;font-size:14.5px;line-height:1.55;color:#14532d}
.law b{color:#166534}
.law .nb{margin-top:8px;color:#334155}
.law .bridge{margin-top:10px;color:#475569}
.law .bridge a{color:#b45309;font-weight:800;text-decoration:none}
.bar{display:flex;gap:8px;flex-wrap:wrap;padding:12px 14px;background:#f9fafb;border-top:1px solid #e5e7eb;align-items:center}
button.tool{border:1.5px solid #d1d5db;border-radius:9px;background:#fff;color:#374151;padding:9px 14px;font:800 14px system-ui;cursor:pointer}
button.tool:hover{background:#f3f4f6}
button.tool.active{border-color:#2d70b3;background:#eaf2fb;color:#1d4ed8}
.spacer{flex:1}
.next{display:none;background:#16a34a;color:#fff;border-color:#16a34a;margin-top:4px}
.next:hover{background:#15803d}
@media(max-width:820px){
  body{padding:8px}.main{grid-template-columns:1fr}
  .work{border-right:0;border-bottom:1px solid #e5e2d9}
  .head{flex-direction:column;align-items:flex-start}.side{padding:12px}
  .bar{position:sticky;bottom:0}
}
</style>
</head>
<body>
<div class="app">
  <div class="head">
    <div>
      <div class="title">📐 Биссектриса угла</div>
      <div class="sub">Глава II · построения · циркуль и линейка</div>
    </div>
    <div style="display:flex;gap:12px;align-items:center">
      <div class="badge" id="badge">Циркуль и линейка</div>
      <a class="back" href="../index.html">← к списку</a>
    </div>
  </div>
  <div class="success" id="successBar"></div>

  <div class="main" id="mainArea">
    <div class="work"><canvas id="cv" width="640" height="460"></canvas></div>
    <aside class="side">
      <div class="card" id="taskCard">
        <h2 id="taskTtl">Задача</h2>
        <div class="task" id="taskText"></div>
        <div class="steps" id="stepText"></div>
      </div>
      <div id="msg" class="msg info"></div>
      <div id="why" class="why"></div>
      <button class="tool next" id="proofBtn" onclick="proofNext()">Дальше →</button>
      <div id="law" class="law"></div>
    </aside>
  </div>

  <div class="bar" id="bar">
    <button class="tool" id="btnCompass" onclick="selectTool('compass')">⊙ Циркуль</button>
    <button class="tool" id="btnLine" onclick="selectTool('line')">／ Линейка</button>
    <span class="spacer"></span>
    <button class="tool" onclick="showHint()">💡 Подсказка</button>
    <button class="tool" onclick="undo()">↶ Отмена</button>
    <button class="tool" onclick="reset()">↺ Сброс</button>
  </div>
</div>

<script>
/* ───────── ПРОГРЕСС / ЖУРНАЛ ───────── */
const SK='mathExamCourseProgress.v1', TID='ch2-constr-angle-bisector';
function lS(){try{const d=JSON.parse(localStorage.getItem(SK)||'{}');return d[TID]||{runs:0,events:[]}}catch{return{runs:0,events:[]}}}
function sS(s){try{const d=JSON.parse(localStorage.getItem(SK)||'{}');d[TID]=s;localStorage.setItem(SK,JSON.stringify(d))}catch{}}
function logE(ev,extra){try{const s=lS();s.events=(s.events||[]);s.events.push({t:Date.now(),e:ev,step,...(extra||{})});if(s.events.length>300)s.events=s.events.slice(-300);sS(s)}catch{}}

/* ───────── ХОЛСТ ───────── */
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const W=640,H=460,PI=Math.PI;
const dpr=Math.min(window.devicePixelRatio||1,2);
cv.width=W*dpr;cv.height=H*dpr;cv.style.aspectRatio=W+'/'+H;ctx.scale(dpr,dpr);
const PULSE=()=>1+0.16*Math.sin(Date.now()/240);

/* ───────── ПАЛИТРА / ПРИМИТИВЫ ───────── */
const COL={DARK:'#1a1a2e',GREY:'#94a3b8',ARC:'#0d9488',LINE:'#2d70b3',G:'#16a34a',PUL:'#7c3aed',A:'#d97706',B:'#db2777',O:'#1a1a2e'};
function sub(p,q){return{x:p.x-q.x,y:p.y-q.y}}
function nrm(v){const m=Math.hypot(v.x,v.y)||1;return{x:v.x/m,y:v.y/m}}
function hexA(h,a){const n=parseInt(h.slice(1),16);return 'rgba('+(n>>16&255)+','+(n>>8&255)+','+(n&255)+','+a+')';}
function bg(){ ctx.clearRect(0,0,W,H);ctx.fillStyle='#fffdf7';ctx.fillRect(0,0,W,H);ctx.fillStyle='#e7e1d2';
  for(let x=20;x<W;x+=25)for(let y=20;y<H;y+=25){ctx.beginPath();ctx.arc(x,y,1.15,0,7);ctx.fill()} }
function lab(x,y,txt,col,size){ ctx.font='900 '+(size||16)+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.lineWidth=4;ctx.strokeStyle='rgba(255,253,247,.95)';ctx.strokeText(txt,x,y); ctx.fillStyle=col;ctx.fillText(txt,x,y);ctx.textBaseline='alphabetic'; }
function dotF(x,y,r,fill,stroke){ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fillStyle=fill;ctx.fill();if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke()}}
function dotHollow(x,y,r,stroke){ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fillStyle='#fffdf7';ctx.fill();ctx.strokeStyle=stroke;ctx.lineWidth=2.4;ctx.stroke();}
function seg(p,q,col,w){ctx.strokeStyle=col;ctx.lineWidth=w||2.8;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.stroke();}
function arcDraw(cx,cy,r,a0,a1,col,w,alpha){ ctx.save();ctx.globalAlpha=alpha==null?0.8:alpha;ctx.strokeStyle=col;ctx.lineWidth=w||1.9;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(cx,cy,r,a0,a1);ctx.stroke();ctx.restore(); }
function ring(x,y,r,col){ctx.save();ctx.strokeStyle=col;ctx.lineWidth=2.6;ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.stroke();ctx.restore();}
function drawAngle(V,P,Q,col,r0){
  const a1=Math.atan2(P.y-V.y,P.x-V.x), a2=Math.atan2(Q.y-V.y,Q.x-V.x);
  let d=a2-a1; while(d<=-PI)d+=2*PI; while(d>PI)d-=2*PI; const acw=d<0;
  ctx.beginPath();ctx.arc(V.x,V.y,r0,a1,a1+d,acw); ctx.lineWidth=3;ctx.strokeStyle=col;ctx.lineCap='round';ctx.stroke();
}
function tickMark(p,q,n,col){ const mx=(p.x+q.x)/2,my=(p.y+q.y)/2; let dx=q.x-p.x,dy=q.y-p.y;const L=Math.hypot(dx,dy)||1;dx/=L;dy/=L; const nx=-dy,ny=dx;
  for(let i=0;i<n;i++){const off=(i-(n-1)/2)*5,cx=mx+dx*off,cy=my+dy*off; ctx.beginPath();ctx.moveTo(cx-nx*5,cy-ny*5);ctx.lineTo(cx+nx*5,cy+ny*5);ctx.strokeStyle=col||COL.DARK;ctx.lineWidth=2;ctx.stroke();} }

/* ───────── ГЕОМЕТРИЯ (чистая) ───────── */
const EPS=1e-7;
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function interLL(a,b,c,d){ const den=(a.x-b.x)*(c.y-d.y)-(a.y-b.y)*(c.x-d.x); if(Math.abs(den)<EPS) return null;
  const t=((a.x-c.x)*(c.y-d.y)-(a.y-c.y)*(c.x-d.x))/den; return {x:a.x+t*(b.x-a.x), y:a.y+t*(b.y-a.y)}; }
function interLC(a,b,O,r){ const dx=b.x-a.x,dy=b.y-a.y,fx=a.x-O.x,fy=a.y-O.y; const A=dx*dx+dy*dy,B=2*(fx*dx+fy*dy),Cc=fx*fx+fy*fy-r*r;
  let dsc=B*B-4*A*Cc; if(dsc<-EPS) return []; dsc=Math.max(dsc,0); const s=Math.sqrt(dsc),out=[];
  [(-B-s)/(2*A),(-B+s)/(2*A)].forEach((t,i)=>{ if(i===0||s>EPS) out.push({x:a.x+t*dx,y:a.y+t*dy}); }); return out; }
function interCC(O1,r1,O2,r2){ const d=dist(O1,O2); if(d<EPS || d>r1+r2+EPS || d<Math.abs(r1-r2)-EPS) return [];
  const aa=(r1*r1-r2*r2+d*d)/(2*d); let h2=r1*r1-aa*aa; if(h2<0) h2=0; const h=Math.sqrt(h2);
  const xm=O1.x+aa*(O2.x-O1.x)/d, ym=O1.y+aa*(O2.y-O1.y)/d; const rx=-(O2.y-O1.y)*(h/d), ry=(O2.x-O1.x)*(h/d);
  return h<EPS ? [{x:xm,y:ym}] : [{x:xm+rx,y:ym+ry},{x:xm-rx,y:ym-ry}]; }

/* ───────── УГОЛ (дано) ───────── */
const O0={x:150,y:390}, ANG1=-20*PI/180, ANG2=-70*PI/180, SIDELEN=360;
const DIR1={x:Math.cos(ANG1),y:Math.sin(ANG1)}, DIR2={x:Math.cos(ANG2),y:Math.sin(ANG2)};
const S1={x:O0.x+DIR1.x*SIDELEN,y:O0.y+DIR1.y*SIDELEN}, S2={x:O0.x+DIR2.x*SIDELEN,y:O0.y+DIR2.y*SIDELEN};

/* ───────── МОДЕЛЬ ───────── */
let P=[], L=[], C=[]; let pid=0;
function ptByName(n){return P.find(p=>p.name===n);}
function arcByName(n){return C.find(c=>c.name===n);}
function addPtXY(x,y,kind,name){P.push({id:'p'+(pid++),x,y,kind,name});return ptByName(name);}
function addArcSpan(centerName,r,a0,a1,name){C.push({center:centerName,r,a0,a1,name});}
function addLine(n1,n2,name,kind){L.push({a:n1,b:n2,name,kind:kind||'line'});}
function rayHit(O,dir,r){ const far={x:O.x+dir.x*1000,y:O.y+dir.y*1000}; const hits=interLC(O,far,O,r);
  return hits.find(p=>((p.x-O.x)*dir.x+(p.y-O.y)*dir.y)>0) || hits[0]; }

/* ───────── СОСТОЯНИЕ ───────── */
let step=0, phase='build', proofStep=0, opening=null, tool='compass';
let comp=null, armed=null, lastReject=null, mistakes=0, hints=0, undoStack=[], initSnap=null;
function takeSnap(){ return JSON.stringify({P,L,C,opening,step,phase,proofStep,pid}); }
function loadSnap(s){ const o=JSON.parse(s); P.length=0;o.P.forEach(p=>P.push(p)); L.length=0;o.L.forEach(l=>L.push(l)); C.length=0;o.C.forEach(c=>C.push(c));
  opening=o.opening; step=o.step; phase=o.phase; proofStep=o.proofStep; pid=o.pid; armed=null; comp=null; lastReject=null; }
function pushUndo(){ undoStack.push(takeSnap()); }

/* ───────── ПРИВЯЗКА ───────── */
function worldPos(e){ const r=cv.getBoundingClientRect(); const k=Math.max(1,W/r.width); return {x:(e.clientX-r.left)*k, y:(e.clientY-r.top)*k}; }
function pick(w){ const r=cv.getBoundingClientRect(); const k=Math.max(1,W/r.width); const R=28*k; let best=null,bd=R;
  for(const p of P){ const dd=Math.hypot(p.x-w.x,p.y-w.y); if(dd<bd){bd=dd;best=p;} } return best; }

/* ───────── ДЕЙСТВИЯ ───────── */
function reject(t){ lastReject=t; mistakes++; setMsg(t,'err'); logE('step_reject',{reason:t}); }
function tryArc(centerPt, rGiven, isDrag){
  if(phase!=='build') return;
  let r; if(isDrag){ r=rGiven; } else { if(opening==null){ reject('Сначала раскрой циркуль: нажми на точку и потяни.'); return; } r=opening; }
  if(step===0){
    if(!centerPt || centerPt.name!=='O'){ reject('Поставь ножку циркуля в вершину O.'); return; }
    if(r<50){ reject('Дуга слишком мала — увеличь радиус, чтобы пересечь обе стороны.'); return; }
    if(r>SIDELEN-15){ reject('Дуга вышла за концы сторон — возьми радиус поменьше.'); return; }
    pushUndo(); opening=r; addArcSpan('O',r,ANG2,ANG1,'arcO');
    const A=rayHit(O0,DIR1,r), B=rayHit(O0,DIR2,r);
    addPtXY(A.x,A.y,'inter','A'); addPtXY(B.x,B.y,'inter','B');
    step=1; tool='compass'; lastReject=null;
    setMsg('Дуга пересекла стороны в точках A и B. Теперь равными засечками из A и B поймаем точку внутри угла.','ok');
    logE('draw_arc',{c:'O',r:Math.round(r)}); updateUI();
  } else if(step===1){
    if(!centerPt || centerPt.name!=='A'){ reject('Дугу проводим из точки A — поставь ножку в A.'); return; }
    const hAB=dist(ptByName('A'),ptByName('B'))/2;
    if(r<=hAB+2){ reject('Раствор меньше половины AB — дуги из A и B не пересекутся. Раскрой шире.'); return; }
    pushUndo(); opening=r; const A=ptByName('A'),B=ptByName('B'); const fAB=Math.atan2(B.y-A.y,B.x-A.x);
    addArcSpan('A',r,fAB-1.9,fAB+1.9,'arcA'); step=2; tool='compass'; lastReject=null;
    setMsg('Дуга из A готова, раствор зафиксирован. Тем же раствором — просто коснись B.','ok');
    logE('draw_arc',{c:'A',r:Math.round(r)}); updateUI();
  } else if(step===2){
    if(!centerPt || centerPt.name!=='B'){ reject('Вторую дугу проводим из точки B — поставь ножку в B.'); return; }
    const r2=arcByName('arcA').r;
    if(Math.abs(r-r2)>3){ reject('Дуги из A и B должны быть одного раствора — не меняй раскрытие (просто коснись B).'); return; }
    pushUndo(); opening=r2; const A=ptByName('A'),B=ptByName('B'); const fBA=Math.atan2(A.y-B.y,A.x-B.x);
    addArcSpan('B',r2,fBA-1.9,fBA+1.9,'arcB');
    const hits=interCC(A,r2,B,r2); hits.sort((u,v)=>dist(v,O0)-dist(u,O0)); const Cp=hits[0];
    addPtXY(Cp.x,Cp.y,'inter','C'); step=3; tool='line'; lastReject=null;
    setMsg('Дуги пересеклись в точке C. Возьми линейку и проведи луч из O через C.','ok');
    logE('draw_arc',{c:'B'}); updateUI();
  } else { reject('Сейчас нужна линейка: луч из O через C.'); }
}
function tryLine(n1,n2){
  if(phase!=='build') return;
  if(step!==3){ reject('Сначала циркулем построй дуги и точку C.'); return; }
  const s=new Set([n1,n2]);
  if(!(s.has('O')&&s.has('C'))){
    if(s.has('A')||s.has('B')) reject('Луч проводим из вершины O через точку C (пересечение засечек), не через A или B.');
    else reject('Проведи луч из вершины O через точку C.');
    return;
  }
  pushUndo(); addLine('O','C','result','ray');
  phase='proof'; proofStep=0; tool=null; lastReject=null;
  setMsg('Луч построен. Разберёмся, почему он делит угол пополам.','info'); logE('draw_line',{a:'O',b:'C'}); updateUI();
}
function bisectorOK(){
  const C=ptByName('C'); if(!C) return false;
  const oc=nrm(sub(C,O0));
  const a1=Math.acos(Math.max(-1,Math.min(1,oc.x*DIR1.x+oc.y*DIR1.y)));
  const a2=Math.acos(Math.max(-1,Math.min(1,oc.x*DIR2.x+oc.y*DIR2.y)));
  return Math.abs(a1-a2)<0.01;
}
function proofNext(){
  if(phase==='proof'&&proofStep===0){ proofStep=1; updateUI(); logE('proof',{s:1}); }
  else if(phase==='proof'&&proofStep===1){ finishNow(); }
}
function finishNow(){ phase='done'; const s=lS(); s.runs=(s.runs||0)+1; s.passed=true; sS(s); logE('finish',{mistakes,hints}); updateUI(); }
function undo(){ if(phase!=='build') return; const s=undoStack.pop(); loadSnap(s||initSnap); setMsg('Шаг отменён.','info'); updateUI(); }
function reset(){ undoStack=[]; loadSnap(initSnap); mistakes=0; hints=0; setMsg('Холст очищен. Дано: угол с вершиной O.','info'); updateUI(); }
function showHint(){ if(phase!=='build') return; hints++; logE('hint');
  const h=['Поставь ножку циркуля в вершину O, нажми и тяни — дуга должна пересечь обе стороны.',
           'Поставь ножку в A, нажми и тяни — раскрой шире половины AB.',
           'Не меняя раствора, просто коснись точки B — вторая дуга встанет сама, появится C.',
           'Возьми линейку и проведи луч из вершины O через точку C.'][step];
  setMsg('💡 '+h,'info'); }

/* ───────── УКАЗАТЕЛЬ ───────── */
cv.addEventListener('pointerdown',e=>{
  if(phase!=='build') return; const w=worldPos(e), p=pick(w);
  if(tool==='compass'){ if(!p){ reject('Ставь ножку циркуля в точку, не на глаз.'); return; } comp={center:p,r:0,active:true}; try{cv.setPointerCapture(e.pointerId)}catch{} }
  else if(tool==='line'){ if(!p){ reject('Веди линию через построенные точки, не на глаз.'); return; }
    if(!armed){ armed=p; setMsg('Точка '+(p.name||'')+' выбрана. Теперь вторая.','info'); }
    else { if(p.id!==armed.id) tryLine(armed.name,p.name); armed=null; } }
});
cv.addEventListener('pointermove',e=>{ if(comp&&comp.active){ const w=worldPos(e); comp.r=Math.hypot(w.x-comp.center.x,w.y-comp.center.y); } });
cv.addEventListener('pointerup',e=>{ if(comp&&comp.active){ const c=comp.center, isDrag=comp.r>8, r=comp.r; comp=null; try{cv.releasePointerCapture(e.pointerId)}catch{} tryArc(c,r,isDrag); } });

/* ───────── ОТРИСОВКА ───────── */
function lineExt(p,q,extA,extB){ const d=nrm(sub(q,p)); return [{x:p.x-d.x*extA,y:p.y-d.y*extA},{x:q.x+d.x*extB,y:q.y+d.y*extB}]; }
function draw(){
  bg();
  const O=O0, Aa=ptByName('A'), Bb=ptByName('B'), Cc=ptByName('C');
  const arcAlpha=phase==='build'?0.8:0.32;
  // стороны угла
  seg(O,S1,COL.DARK,3); seg(O,S2,COL.DARK,3);
  // дуги
  C.forEach(c=>{ arcDraw(ptByName(c.center).x,ptByName(c.center).y,c.r,c.a0,c.a1,COL.ARC,1.9,arcAlpha); });
  // предпросмотр
  if(comp&&comp.active){ const rr=Math.min(comp.r,SIDELEN); if(step===0) arcDraw(O.x,O.y,rr,ANG2,ANG1,COL.ARC,1.6,0.5);
    else arcDraw(comp.center.x,comp.center.y,rr, -PI, PI, COL.ARC,1.4,0.4);
    seg(comp.center,{x:comp.center.x+Math.min(comp.r,SIDELEN),y:comp.center.y},COL.ARC,1,);
  }
  const proofDone=(phase==='proof'&&proofStep===1), done=phase==='done';
  // результат-луч
  if(Cc && (phase==='proof'||phase==='done')){ const ext=lineExt(O,Cc,0,70); const col=(proofDone||done)?COL.G:COL.LINE; seg(O,ext[1],col,(proofDone||done)?3.4:2.8); }
  // доказательство шаг 0: равные радиусы
  if(phase==='proof'&&proofStep===0&&Aa&&Bb&&Cc){
    seg(O,Aa,COL.ARC,1.8); tickMark(O,Aa,1,COL.ARC); seg(O,Bb,COL.ARC,1.8); tickMark(O,Bb,1,COL.ARC);
    seg(Aa,Cc,COL.B,1.8); tickMark(Aa,Cc,2,COL.B); seg(Bb,Cc,COL.B,1.8); tickMark(Bb,Cc,2,COL.B);
  }
  // доказательство шаг 1 / готово: равные углы
  if((proofDone||done)&&Cc){ drawAngle(O,Aa,Cc,COL.A,26); drawAngle(O,Cc,Bb,COL.A,26); }
  // точки A,B
  if(Aa){ dotHollow(Aa.x,Aa.y,4.6,COL.ARC); lab(Aa.x+14,Aa.y-4,'A',COL.A,15); }
  if(Bb){ dotHollow(Bb.x,Bb.y,4.6,COL.ARC); lab(Bb.x-14,Bb.y-4,'B',COL.B,15); }
  // точка C
  if(Cc){ const pul=(step===3&&phase==='build'); dotHollow(Cc.x,Cc.y,pul?5*PULSE():4.8,(proofDone||done)?COL.G:COL.ARC); if(pul) ring(Cc.x,Cc.y,11*PULSE(),COL.PUL); lab(Cc.x+15,Cc.y,'C',(proofDone||done)?COL.G:COL.ARC,15); }
  // вершина O
  dotF(O.x,O.y,5,COL.O); lab(O.x-15,O.y+6,'O',COL.O,16);
  if(armed){ ring(armed.x,armed.y,12,COL.PUL); }
  // пульс цели
  if(phase==='build'){
    if(step===0) ring(O.x,O.y,14*PULSE(),COL.PUL);
    else if(step===1&&Aa) ring(Aa.x,Aa.y,13*PULSE(),COL.PUL);
    else if(step===2&&Bb) ring(Bb.x,Bb.y,13*PULSE(),COL.PUL);
  }
}

/* ───────── UI ───────── */
function setMsg(t,cls){const el=document.getElementById('msg');el.textContent=t;el.className='msg '+cls;}
const STEP_INSTR=[
  'Дугой <b>произвольного радиуса</b> из вершины <b>O</b> пересеки обе стороны (нажми на O и тяни) — появятся точки A и B.',
  'Раскрой циркуль <b>шире половины</b> AB и проведи дугу из точки <b>A</b> (нажми на A и тяни).',
  'Тем же раствором проведи дугу из точки <b>B</b> — просто коснись B. Дуги пересекутся в точке <b>C</b>.',
  'Возьми <b>линейку</b> и проведи луч из вершины <b>O</b> через точку <b>C</b>.'
];
function selectTool(t){
  if(phase!=='build') return;
  tool=t;
  updateTool();
}
function updateTool(){ document.getElementById('btnCompass').classList.toggle('active',tool==='compass'); document.getElementById('btnLine').classList.toggle('active',tool==='line'); }
function updateUI(){
  updateTool();
  const why=document.getElementById('why'), law=document.getElementById('law'), pb=document.getElementById('proofBtn'),
        sc=document.getElementById('taskCard'), succ=document.getElementById('successBar');
  if(phase==='build'){
    sc.style.display=''; why.style.display='none'; law.style.display='none'; pb.style.display='none'; succ.style.display='none';
    document.getElementById('taskTtl').textContent='Задача';
    document.getElementById('taskText').innerHTML='Разделить угол с вершиной <b>O</b> пополам — построить его <b>биссектрису</b> циркулем и линейкой.';
    document.getElementById('stepText').innerHTML='Шаг '+(step+1)+' из 4 · '+STEP_INSTR[step];
  } else if(phase==='proof'){
    sc.style.display='none'; why.style.display='block'; pb.style.display='inline-block'; law.style.display='none'; succ.style.display='none';
    if(proofStep===0){ why.innerHTML='<b>Почему OC — биссектриса?</b><br>OA = OB — радиусы первой дуги; AC = BC — радиусы второй дуги (один раствор). Сторона OC — общая для двух треугольников.'; pb.textContent='Дальше →'; }
    else { why.innerHTML='Значит <b>△OAC = △OBC</b> по трём сторонам ⟹ <b>∠AOC = ∠BOC</b>. Луч OC делит угол пополам — это биссектриса.'; pb.textContent='Завершить →'; }
  } else {
    sc.style.display='none'; why.style.display='none'; pb.style.display='none'; law.style.display='block'; succ.style.display='block';
    succ.textContent='Готово — биссектриса построена.';
    law.innerHTML='<b>Закон.</b> Чтобы построить биссектрису угла: дугой из вершины засечь обе стороны (точки A и B); <b>равными дугами</b> из A и B получить точку C; провести <b>луч OC</b>. Он делит угол пополам.'+
      '<div class="nb">Решение единственно: биссектриса у угла одна.</div>'+
      '<div class="bridge">Тот же приём дуги-из-точки и равных засечек даёт <a href="ch2-constr-perpendicular-point.html">перпендикуляр к прямой через точку</a> — следующий шаг.</div>';
  }
}

/* ───────── СТАРТ ───────── */
addPtXY(O0.x,O0.y,'given','O');
initSnap=takeSnap();
setMsg('Дано: угол с вершиной O. Возьми циркуль и начни с дуги из вершины.','info');
updateUI();
(function loop(){draw();requestAnimationFrame(loop)})();
</script>
