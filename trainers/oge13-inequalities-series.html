function drawTextBoard(lines,title='Решаем как в ОГЭ'){let svg=$('board');svg.innerHTML='';svg.appendChild(make('rect',{x:0,y:0,width:740,height:560,fill:'#fffdf7'}));let t=make('text',{x:370,y:70,'text-anchor':'middle','font-size':22,'font-weight':'900',fill:'#1a1a2e'});t.textContent=title;svg.appendChild(t);lines.forEach((line,i)=>{let tx=make('text',{x:70,y:140+i*46,'font-size':24,'font-family':'Georgia,serif','font-weight':'900',fill:'#111827'});tx.textContent=line;svg.appendChild(tx)});}function drawSystem(t){let svg=$('board');svg.innerHTML='';svg.appendChild(make('rect',{x:0,y:0,width:740,height:560,fill:'#fffdf7'}));let cap=make('text',{x:370,y:55,'text-anchor':'middle','font-size':18,'font-weight':'900',fill:'#374151'});cap.textContent='Пересечение двух неравенств';svg.appendChild(cap);let min=-10,max=10;t.rays.forEach(r=>{min=Math.min(min,r.v-2);max=Math.max(max,r.v+2)});function xm(v){return 70+(v-min)/(max-min)*600}t.rays.forEach((ray,i)=>{let y=170+i*90,l=70,r=670,p=xm(ray.v);drawAxis(svg,y,l,r);let x1=ray.dir==='left'?l:p,x2=ray.dir==='left'?p:r;svg.appendChild(make('rect',{x:x1,y:y-17,width:x2-x1,height:34,rx:8,fill:i?'#16a34a':'#2563eb',opacity:.35}));svg.appendChild(make('circle',{cx:p,cy:y,r:7,fill:ray.closed?'#111827':'#fff',stroke:'#111827','stroke-width':3}));let tx=make('text',{x:p,y:y+32,'text-anchor':'middle','font-family':'Georgia,serif','font-size':15,'font-weight':'900',fill:'#374151'});tx.textContent=String(ray.v).replace('.',',').replace('-', '−');svg.appendChild(tx);let lab=make('text',{x:70,y:y-28,'font-size':18,'font-family':'Georgia,serif','font-weight':'900',fill:i?'#15803d':'#1d4ed8'});lab.textContent=t.e[i];svg.appendChild(lab)});let ans=make('text',{x:370,y:410,'text-anchor':'middle','font-size':16,'font-weight':'900',fill:'#64748b'});ans.textContent='Выберите общий промежуток в вариантах справа';svg.appendChild(ans)}
function renderTabs(){let box=$('tabs');box.innerHTML='';MODS.forEach(([m,n])=>{let b=document.createElement('button');b.className='tab '+(m===mod?'on':'');b.textContent=n;b.onclick=()=>{mod=m;resetState();renderAll()};box.appendChild(b)})}
function current(){return DATA[mod][idx[mod]%DATA[mod].length]}function renderPanel(){let t=current(),p=$('modulePanel');p.innerHTML='';$('hintBox').className='hintBox';$('hintBox').innerHTML=t.hint||'Сначала определите тип задания, потом смотрите на границы и знак.';if(mod==='quad'){$('taskText').textContent=t.e;$('taskNote').textContent='Кликните по промежуткам на числовой прямой под графиком.';p.innerHTML=`<div class="card"><h2>Опорные данные</h2><div class="row"><span>Нули</span><span class="value">${t.l1} и ${t.l2}</span></div><div class="row"><span>Ищем</span><span class="value">${signText(t.sign)}</span></div><div class="row"><span>Точки</span><span class="value">${strict(t.sign)?'пустые':'закрашенные'}</span></div></div><div class="card"><h2>Выбрано</h2><div class="chipRow" id="chips"></div><p class="small">Ваш ответ: <span class="formula" id="ansPrev"></span></p></div>`;renderChips(t);drawQuad(t);return}if(mod==='linear'||mod==='special'||mod==='systems'||mod==='graph'){let choices=t.options||[];$('taskText').textContent=mod==='special'?t.q:mod==='systems'?t.e.join('\n'):mod==='graph'?'Выберите неравенство по рисунку':t.e;$('taskNote').textContent=mod==='linear'?'Выберите решение неравенства.':mod==='systems'?'Выберите решение системы неравенств.':mod==='graph'?'Смотрите: между корнями или вне корней; точки пустые или закрашенные.':'ОГЭ любит вопросы “нет решений” и “любое число”.';p.innerHTML=`<div class="card"><h2>Варианты ответа</h2><div class="choices" id="choices"></div></div>`;let cb=$('choices');choices.forEach((c,i)=>{let b=document.createElement('button');b.className='choice '+(selectedChoice===c?'on':'');b.innerHTML=(i+1)+') <span class="formula">'+c+'</span>';b.onclick=()=>{if(!checked&&!solution){selectedChoice=c;renderAll()}};cb.appendChild(b)});if(mod==='graph')drawGraphTask(t);else if(mod==='systems')drawSystem(t);else drawTextBoard(mod==='linear'?[t.e]:t.options,mod==='special'?'Особый случай квадратного неравенства':'Линейное неравенство');}}
function renderChips(t){let box=$('chips');if(!box)return;box.innerHTML='';[0,1,2].forEach(i=>{let sp=document.createElement('span');sp.className='chip '+(selectedZones[i]?'on':'');sp.textContent=zlab(i,t);sp.onclick=()=>toggleZone(i);box.appendChild(sp)});$('ansPrev').textContent=answerText(t)}function toggleZone(i){if(checked||solution)return;selectedZones[i]=!selectedZones[i];renderAll()}function resetState(){selectedChoice=null;selectedZones=[false,false,false];checked=false;solution=false;setMsg('Выберите ответ и нажмите «Проверить».','info')}function renderAll(){renderTabs();renderPanel();renderStats()}function checkAnswer(){let t=current(),ok=false;if(mod==='quad'){ok=selectedZones.every((v,i)=>v===correctZones(t)[i])}else ok=selectedChoice===t.ans;checked=true;if(ok){setMsg('Верно!','ok');rec(true)}else{setMsg('Пока ошибка. Нажмите «Подсказка» или «Показать решение».','err');rec(false)}renderAll();if(mod!=='quad'){[...document.querySelectorAll('.choice')].forEach(b=>{let txt=b.textContent.replace(/^\d+\)\s*/,'').trim();if(txt===t.ans)b.classList.add('goodC');else if(txt===selectedChoice)b.classList.add('badC')})}}
function showSolution(){let t=current();solution=true;checked=true;if(mod==='quad'){selectedZones=correctZones(t).slice();setMsg('Решение: <b>'+answerText(t)+'</b>','warn')}else{selectedChoice=t.ans;setMsg('Правильный ответ: <b>'+t.ans+'</b>','warn')}renderAll();if(mod!=='quad'){[...document.querySelectorAll('.choice')].forEach(b=>{let txt=b.textContent.replace(/^\d+\)\s*/,'').trim();if(txt===t.ans)b.classList.add('goodC')})}}
function toggleHint(){$('hintBox').classList.toggle('on')}function nextTask(){idx[mod]=(idx[mod]+1)%DATA[mod].length;resetState();renderAll()}renderAll();
</script>
