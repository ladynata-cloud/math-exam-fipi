name: Board Live Health Poll PR53

on:
  push:
    branches:
      - ci/board-ttl-live-check-pr53
  pull_request:
    branches:
      - main

jobs:
  board-live-health:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Poll live health without creating rooms
        env:
          BOARD_BASE_URL: 'https://mathexam-board-ladynata.amvera.io'
        run: |
          node <<'NODE'
          const assert = require('node:assert/strict');

          async function getHealth(label) {
            const res = await fetch(`${process.env.BOARD_BASE_URL}/health`, {
              headers: {
                'Cache-Control': 'no-cache',
                Pragma: 'no-cache'
              }
            });
            assert.equal(res.status, 200, `${label} status`);
            const body = await res.json();
            assert.equal(body.ok, true, `${label} ok`);
            assert.equal(typeof body.rooms, 'number', `${label} rooms type`);
            console.log(`${label}: ${JSON.stringify(body)}`);
            return body;
          }

          const first = await getHealth('health poll first');
          await new Promise(resolve => setTimeout(resolve, 1000));
          const second = await getHealth('health poll second');
          console.log(JSON.stringify({ first, second }, null, 2));
          NODE
