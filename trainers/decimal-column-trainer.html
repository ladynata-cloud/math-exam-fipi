<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Десятичный столбик</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f7f7f5;color:#1f2330;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif}.wrap{max-width:1120px;margin:0 auto;padding:16px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px}.back{color:#526070;text-decoration:none;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:8px 12px;font-weight:800}.top h1{margin:0;font-size:26px}.mode{display:flex;gap:6px;background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:4px}.mode button{border:0;background:transparent;border-radius:10px;padding:8px 12px;font-weight:900;cursor:pointer}.mode button.on{background:#3b6ea8;color:#fff}.grid{display:grid;grid-template-columns:1.05fr .95fr;gap:16px}@media(max-width:860px){.grid{grid-template-columns:1fr}}.card{background:#fff;border:1px solid #e5e7eb;border-radius:20px;padding:18px;box-shadow:0 12px 28px rgba(15,23,42,.07)}.example{text-align:center;font-size:34px;font-weight:950;margin:6px 0 14px}.example span{color:#3b6ea8}.board{display:flex;justify-content:center;overflow:auto;padding:8px}.column{font-family:Consolas,Menlo,monospace;font-size:34px;font-weight:900;line-height:1.25;background:repeating-linear-gradient(to right,#fff 0 42px,#eef2f7 42px 43px);border:1px solid #e5e7eb;border-radius:14px;padding:14px;min-width:330px}.row{display:grid;grid-template-columns:repeat(8,42px);justify-content:center}.cell{height:46px;display:flex;align-items:center;justify-content:center;border-radius:8px}.sign{color:#3b6ea8}.comma{color:#b3261e}.bar{height:6px;border-top:3px solid #1f2330;margin:4px 0}.answer .cell{background:#e3f5ec;color:#1f7a4d}.activeCell{outline:3px dashed #3b6ea8;background:#e6efff}.stepTag{display:inline-block;background:#e6efff;color:#3b6ea8;border-radius:999px;padding:5px 10px;font-weight:950;font-size:12px;text-transform:uppercase;letter-spacing:.06em}.title{font-size:21px;font-weight:950;margin:10px 0 5px}.help{color:#6b7280;line-height:1.5;margin:0 0 12px}.choices{display:grid;gap:10px}.choice{border:2px solid #e5e7eb;background:#fff;border-radius:14px;padding:12px;text-align:left;font:inherit;cursor:pointer}.choice:hover{border-color:#3b6ea8}.choice.good{border-color:#1f7a4d;background:#e3f5ec}.choice.bad{border-color:#b3261e;background:#fde7e5}.inputLine{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.inputLine input{font-size:24px;font-weight:900;max-width:180px;padding:10px 12px;border:2px solid #e5e7eb;border-radius:12px}.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.btn{border:1px solid #e5e7eb;background:#fff;border-radius:12px;padding:10px 14px;font-weight:950;cursor:pointer}.btn.primary{background:#3b6ea8;color:#fff;border-color:#3b6ea8}.msg{display:none;margin-top:12px;border-radius:14px;padding:12px;line-height:1.45}.msg.ok{display:block;background:#e3f5ec;color:#1f7a4d}.msg.err{display:block;background:#fde7e5;color:#b3261e}.msg.warn{display:block;background:#fff3dd;color:#8a5a00}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}.stat{background:#f8fafc;border:1px solid #e5e7eb;border-radius:14px;text-align:center;padding:10px}.stat b{display:block;font-size:22px;color:#3b6ea8}.stat span{font-size:11px;color:#6b7280;text-transform:uppercase;font-weight:950}.note{background:#fff7ed;border:1px solid #fed7aa;color:#7c2d12;border-radius:16px;padding:12px;margin-top:12px;line-height:1.45}.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;color:#6b7280;font-size:13px}.pill{background:#f1f5f9;border-radius:999px;padding:5px 9px;font-weight:800}
</style>
</head>
<body>
<div class="wrap">
<header class="top"><div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap"><a class="back" href="../index.html">← Назад</a><h1>Десятичный столбик</h1></div><div class="mode"><button id="learnBtn" class="on">Обучение</button><button id="trainBtn">Тренировка</button></div></header>
<div class="grid">
<section class="card"><div class="example" id="example"></div><div class="board"><div class="column" id="column"></div></div><div class="legend"><span class="pill">запятая под запятой</span><span class="pill">нули можно дописать</span><span class="pill">считаем справа налево</span></div></section>
<section class="card"><span class="stepTag" id="tag"></span><div class="title" id="title"></div><p class="help" id="help"></p><div id="body"></div><div id="msg" class="msg"></div><div class="btns"><button class="btn primary" id="check">Проверить</button><button class="btn" id="hint">Подсказка</button><button class="btn" id="solution">Показать решение</button><button class="btn" id="next">Следующий пример →</button></div><div class="stats"><div class="stat"><b id="solved">0</b><span>решено</span></div><div class="stat"><b id="correct">0</b><span>верно</span></div><div class="stat"><b id="streak">0</b><span>серия</span></div><div class="stat"><b id="best">0</b><span>рекорд</span></div></div><div class="note">Идея тренажёра: ученик не просто вводит ответ, а проходит алгоритм: выровнять запись, дописать нули, посчитать, поставить запятую, записать итог.</div></section>
</div>
</div>
<script>
const TASKS=[['12.4','3.75','+'],['8.6','2.35','+'],['15.03','4.7','+'],['9.2','3.48','-'],['20.05','7.8','-'],['6.4','1.275','+'],['14.5','0.86','-'],['3.75','2.4','+']];
const STORE='mathExamCourseProgress.v1',TOPIC='decimalColumnTrainer';let mode='learn',order=[...TASKS.keys()],pos=0,task,step=1,selected=null,typed='',hadError=false,recorded=false;
function norm(x){return String(x).replace(',','.')}function places(x){let p=norm(x).split('.')[1];return p?p.length:0}function pad(x,n){let [a,b='']=norm(x).split('.');return a+'.'+b.padEnd(n,'0')}function calc(){let [a,b,op]=task;let n=Math.max(places(a),places(b));let A=Math.round(Number(pad(a,n))*10**n),B=Math.round(Number(pad(b,n))*10**n);let C=op==='+'?A+B:A-B;return {n,A:pad(a,n),B:pad(b,n),ans:(C/10**n).toFixed(n),raw:C}}function nice(x){return String(x).replace('.',',').replace(/,?0+$/,'')}function digitsRow(str,sign){let s=str.replace('.',',');s=s.padStart(7,' ');let html='<div class="row">';for(let i=0;i<8;i++){let ch=i===0?sign:s[i-1]||' ';let cls=ch===','?'comma':i===0?'sign':'';html+=`<div class="cell ${cls}">${ch===' '?'':ch}</div>`}return html+'</div>'}function renderColumn(){let r=calc();let html=digitsRow(r.A,task[2])+digitsRow(r.B,'');html+='<div class="bar"></div>';if(step>=4)html+=digitsRow(r.ans,'=');else html+='<div class="row answer">'+Array.from({length:8},(_,i)=>`<div class="cell ${step===3&&i>1?'activeCell':''}">${step>=3&&i>1?'?':''}</div>`).join('')+'</div>';column.innerHTML=html;example.innerHTML=`${task[0].replace('.',',')} <span>${task[2]}</span> ${task[1].replace('.',',')} = ?`}function setStep(s){step=s;selected=null;typed='';msg.className='msg';msg.textContent='';renderColumn();renderStep()}function renderStep(){tag.textContent=`Шаг ${step} из 5`;if(step===1){title.textContent='Выбери правильную запись';help.textContent='В десятичных дробях запятая должна стоять под запятой.';let r=calc();let opts=[`  ${r.A.replace('.',',')}\n${task[2]} ${r.B.replace('.',',')}`,`${task[0].replace('.',',')}\n${task[2]}    ${task[1].replace('.',',')}`,` ${task[0].replace('.',',')}\n${task[2]} ${task[1].replace('.',',')}`];body.innerHTML='<div class="choices">'+opts.map((o,i)=>`<button class="choice" onclick="pick(${i},this)"><pre style="margin:0;font:700 20px Consolas,monospace">${o}</pre></button>`).join('')+'</div>'}if(step===2){title.textContent='Дописать нули';help.textContent='Нули справа после запятой не меняют дробь, но помогают считать по разрядам.';let r=calc();body.innerHTML=`<div class="choices"><button class="choice" onclick="pick(0,this)">${task[0].replace('.',',')} → ${r.A.replace('.',',')}<br>${task[1].replace('.',',')} → ${r.B.replace('.',',')}</button><button class="choice" onclick="pick(1,this)">Нули дописывать никогда нельзя</button><button class="choice" onclick="pick(2,this)">Запятые можно не выравнивать</button></div>`}if(step===3){title.textContent='Посчитать по разрядам';help.textContent='Считаем справа налево, как с натуральными числами.';let r=calc();body.innerHTML=`<div class="inputLine"><span>Введи результат без лишних слов:</span><input id="ansInput" placeholder="${r.ans.replace('.',',')}" oninput="typed=this.value"></div>`}if(step===4){title.textContent='Поставить запятую';help.textContent='В ответе запятая стоит под запятыми исходных чисел.';body.innerHTML='<div class="choices"><button class="choice" onclick="pick(0,this)">Запятая под запятыми</button><button class="choice" onclick="pick(1,this)">Запятая в конце ответа</button><button class="choice" onclick="pick(2,this)">Запятую можно убрать всегда</button></div>'}if(step===5){title.textContent='Записать итог';help.textContent='Можно отбросить лишние нули справа после запятой.';let r=calc();body.innerHTML=`<div class="inputLine"><span>Итоговый ответ:</span><input id="finalInput" oninput="typed=this.value" placeholder="${nice(r.ans)}"></div>`}}function pick(i,el){selected=i;document.querySelectorAll('.choice').forEach(b=>b.classList.remove('good','bad'));el.classList.add('good')}function show(kind,t){msg.className='msg '+kind;msg.textContent=t}function checkStep(){let r=calc();if(step===1){if(selected===0){show('ok','Да, запятая под запятой.');setTimeout(()=>setStep(2),500)}else{hadError=true;show('err','Проверь выравнивание: целая часть под целой, дробная под дробной.')}}else if(step===2){if(selected===0){show('ok','Верно: нули можно дописать справа.');setTimeout(()=>setStep(3),500)}else{hadError=true;show('err','Нули справа после запятой не меняют число: 3,7 = 3,70.')}}else if(step===3){let v=norm(typed.trim());if(v==r.ans||Number(v)==Number(r.ans)){show('ok','Верно, по разрядам посчитано правильно.');setTimeout(()=>setStep(4),500)}else{hadError=true;show('err','Пока ошибка. Считай справа налево и следи за переносом или заниманием.')}}else if(step===4){if(selected===0){show('ok','Да, запятая стоит под запятыми.');setTimeout(()=>setStep(5),500)}else{hadError=true;show('err','Запятая в ответе ставится под запятыми исходных чисел.')}}else if(step===5){let v=norm(typed.trim());if(v==r.ans||Number(v)==Number(r.ans)){show('ok','Готово! Пример решён.');finish(!hadError)}else{hadError=true;show('err','Сверь итог с записью в столбик.')}}}function finish(ok){if(recorded)return;recorded=true;let d=JSON.parse(localStorage.getItem(STORE)||'{}');d.topics=d.topics||{};let s=d.topics[TOPIC]||{solved:0,correct:0,streak:0,bestStreak:0};s.solved++;if(ok){s.correct++;s.streak++;s.bestStreak=Math.max(s.bestStreak,s.streak)}else{s.streak=0}d.topics[TOPIC]=s;localStorage.setItem(STORE,JSON.stringify(d));stats()}function stats(){let d=JSON.parse(localStorage.getItem(STORE)||'{}'),s=d.topics&&d.topics[TOPIC]||{solved:0,correct:0,streak:0,bestStreak:0};solved.textContent=s.solved;correct.textContent=s.correct;streak.textContent=s.streak;best.textContent=s.bestStreak}function nextTask(){if(!recorded&&step>1)finish(false);pos=(pos+1)%order.length;load()}function load(){task=TASKS[order[pos]];hadError=false;recorded=false;setStep(1);stats()}function shuffle(){order.sort(()=>Math.random()-.5);pos=0;load()}check.onclick=checkStep;hint.onclick=()=>show('warn',['Запятая под запятой.','Нули справа после запятой число не меняют.','Считай справа налево.','Запятая ответа под запятыми.','Лишние нули справа можно убрать.'][step-1]);solution.onclick=()=>{hadError=true;let r=calc();show('warn',`Решение: ${r.A.replace('.',',')} ${task[2]} ${r.B.replace('.',',')} = ${r.ans.replace('.',',')} = ${nice(r.ans)}`)};next.onclick=nextTask;learnBtn.onclick=()=>{mode='learn';learnBtn.classList.add('on');trainBtn.classList.remove('on');order=[...TASKS.keys()];pos=0;load()};trainBtn.onclick=()=>{mode='train';trainBtn.classList.add('on');learnBtn.classList.remove('on');shuffle()};window.pick=pick;load();
</script>
</body>
</html>
