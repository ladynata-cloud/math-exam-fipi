<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ОГЭ · Задание 16 — окружность</title>
<style>
:root{
  --page:#e8e4db; --card:#ffffff; --canvas:#fffdf7; --ink:#1a1a2e; --muted:#687080;
  --line:#ddd6c6; --blue:#2d70b3; --good:#16a34a; --bad:#dc2626; --warn:#c2410c;
  --amber:#d97706; --pink:#db2777; --teal:#0d9488; --violet:#7c3aed; --soft:#f6f2e7;
}
*{box-sizing:border-box}
body{margin:0;background:var(--page);color:var(--ink);font:16px/1.55 system-ui,-apple-system,"Segoe UI",Arial,sans-serif}
.app{max-width:1020px;margin:18px auto 40px;background:var(--card);border-radius:18px;box-shadow:0 14px 40px rgba(26,26,46,.14);overflow:hidden}
.head{background:var(--ink);color:#f5f2ea;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
.head h1{margin:0;font-family:Georgia,serif;font-size:26px;font-weight:700}
.head h1 .num{color:#f2b134}
.head .sub{font-size:13.5px;color:#c9c4b6;margin-top:3px}
.stats{display:flex;gap:10px;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.09);border-radius:10px;padding:6px 12px;min-width:78px;text-align:center}
.stat .n{font-weight:800;font-size:20px}
.stat .l{font-size:10.5px;color:#c9c4b6;text-transform:uppercase;letter-spacing:.07em}
.tabs{display:flex;gap:8px;flex-wrap:wrap;padding:14px 22px 0}
.tab{border:1px solid var(--line);background:var(--card);padding:9px 15px;border-radius:10px;cursor:pointer;font:inherit;font-weight:700;color:var(--ink)}
.tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.tab .cnt{font-weight:400;color:var(--muted);font-size:13px}
.tab.active .cnt{color:#c9c4b6}
main{padding:18px 22px 26px}
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.chip{border:1px solid var(--line);background:var(--soft);border-radius:999px;padding:6px 13px;cursor:pointer;font:inherit;font-size:13.5px;font-weight:700;color:#444}
.chip.on{background:var(--blue);border-color:var(--blue);color:#fff}
.chip.src{background:#fff}
.grid{display:grid;grid-template-columns:360px 1fr;gap:20px;align-items:start}
@media(max-width:840px){.grid{grid-template-columns:1fr}}
.diagram{border:1px solid var(--line);border-radius:14px;background:var(--canvas);padding:6px;display:flex;align-items:center;justify-content:center}
.diagram svg{max-width:100%;height:auto;display:block}
.meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.tag{font-size:12px;border-radius:999px;padding:4px 10px;font-weight:700}
.tag.topic{background:#e8f0f7;color:#1d4d78}
.tag.arch{background:#f5e9e9;color:#8b2e2e}
.tag.gen{background:#f2ecdc;color:#75591e}
.task{font-family:Georgia,serif;font-size:19.5px;line-height:1.5}
.frac{display:inline-flex;flex-direction:column;vertical-align:middle;text-align:center;line-height:1.08;font-size:.86em;margin:0 2px}
.frac .fn{border-bottom:1.6px solid currentColor;padding:0 4px}
.frac .fd{padding:0 4px}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:16px 0 4px}
input.ans{font-size:20px;padding:9px 12px;border:2px solid var(--line);border-radius:10px;width:150px;font-family:Georgia,serif}
input.ans:focus{outline:none;border-color:var(--blue)}
button{font:inherit;font-weight:700;border:1px solid var(--ink);background:var(--ink);color:#fff;border-radius:10px;padding:10px 16px;cursor:pointer}
button.sec{background:#fff;color:var(--ink)}
button.blue{background:var(--blue);border-color:var(--blue)}
button.soft{background:var(--soft);color:var(--ink);border-color:var(--line)}
button:disabled{opacity:.45;cursor:default}
.fb{display:none;border-left:4px solid var(--line);padding:11px 14px;border-radius:9px;background:#f6f6f4;margin-top:12px;font-size:15px}
.fb.show{display:block}
.fb.ok{border-color:var(--good);background:#e9f6ee}
.fb.bad{border-color:var(--bad);background:#fbeaea}
.fb.diag{border-color:var(--warn);background:#fdf1e7}
.sol{display:none;border:1px solid var(--line);border-radius:12px;background:var(--canvas);margin-top:12px;padding:14px 16px}
.sol.show{display:block}
.sol h4{margin:0 0 8px;font-size:14px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.sol ol{margin:0;padding-left:20px}
.sol li{margin:6px 0}
.law{border:1.5px solid #b7e0c4;background:#eef9f1;border-radius:12px;padding:12px 15px;margin-top:12px;font-family:Georgia,serif}
.law b{color:#14733a}
.refcall{margin-top:12px;border:1px dashed #b9ab7e;background:#fffbeb;border-radius:11px;padding:10px 13px;font-size:14.5px;cursor:pointer}
.refcall:hover{background:#fef6d8}
.refcall .t{font-weight:800;color:#8a6a12}
.rowbtns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.srcnote{font-size:12.5px;color:var(--muted);margin-top:10px}
.progressline{font-size:13.5px;color:var(--muted);margin:2px 0 12px}
.dots{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.dot{width:15px;height:15px;border-radius:50%;background:#d8d2c2}
.dot.g{background:var(--good)}.dot.y{background:#eab308}.dot.r{background:var(--bad)}
.fin{border:1px solid var(--line);border-radius:14px;background:var(--canvas);padding:20px;text-align:center}
.fin .score{font-family:Georgia,serif;font-size:40px;font-weight:800}
.route{margin-top:12px;text-align:left;border-top:1px dashed var(--line);padding-top:12px}
.route li{margin:5px 0}
/* Разбор */
.rzgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:10px}
.rzcard{border:1px solid var(--line);border-radius:12px;padding:11px 13px;cursor:pointer;background:var(--card)}
.rzcard:hover{border-color:var(--blue)}
.rzcard.done{background:#eef9f1;border-color:#b7e0c4}
.rzcard .nm{font-weight:800;font-size:14.5px}
.rzcard .tp{font-size:12px;color:var(--muted);margin-top:2px}
.rzcard .ok{color:var(--good);font-size:12.5px;font-weight:700;margin-top:4px}
.steps{margin-top:12px}
.step{border-left:3px solid var(--blue);background:#f2f6fa;border-radius:0 9px 9px 0;padding:9px 13px;margin:8px 0;font-size:15.5px}
.backlink{color:var(--blue);cursor:pointer;font-weight:700;font-size:14px;margin-bottom:10px;display:inline-block}
/* Справочник */
.refgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:760px){.refgrid{grid-template-columns:1fr}}
.refcard{border:1px solid var(--line);border-radius:14px;background:var(--canvas);padding:15px 17px}
.refcard.hot{border-color:var(--amber);box-shadow:0 0 0 3px rgba(217,119,6,.22)}
.refcard h3{margin:0 0 8px;font-family:Georgia,serif;font-size:18px}
.refcard .fx{font-family:Georgia,serif;font-size:18px;margin:7px 0;letter-spacing:.01em}
.refcard .use{font-size:13px;color:var(--muted);margin-top:9px;border-top:1px dashed var(--line);padding-top:8px}
.bank{margin-top:20px;border:1px solid var(--line);border-radius:14px;padding:15px 17px;background:#fff}
.bank h3{margin:0 0 7px;font-family:Georgia,serif}
.bank .codes{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.bank a{color:var(--blue);text-decoration:none;border:1px solid var(--line);border-radius:8px;padding:4px 9px;font-family:Consolas,monospace;font-size:13px;font-weight:700}
.bank a:hover{border-color:var(--blue)}
.quizq{font-size:13.5px;color:var(--muted);margin-bottom:8px;font-weight:700}
.smallnote{font-size:13px;color:var(--muted)}
kbd{background:var(--soft);border:1px solid var(--line);border-radius:6px;padding:1px 6px;font-size:13px}

/* Лист ОГЭ: карта с пинами */
.sheetwrap{border:1px solid var(--line);border-radius:14px;background:#fff;overflow:auto;max-height:78vh}
.sheetinner{position:relative;width:100%;transition:width .25s ease;min-width:320px}
.sheetinner.zoomed{width:190%}
.sheetinner img{width:100%;display:block;-webkit-user-select:none;user-select:none}
.pin{position:absolute;transform:translate(-50%,-88%);cursor:pointer;z-index:3;filter:drop-shadow(0 3px 3px rgba(0,0,0,.35));border:none;background:none;padding:0}
.pin .cap{width:25px;height:25px;border-radius:50%;background:radial-gradient(circle at 34% 30%,#ff9d9d,#e03e3e 55%,#8f1d1d);border:1.5px solid #7a1616;position:relative;transition:transform .15s}
.pin .cap::after{content:'';position:absolute;left:6px;top:5px;width:8px;height:5px;border-radius:50%;background:rgba(255,255,255,.75)}
.pin .needle{width:2.4px;height:9px;background:linear-gradient(#9aa0a6,#5f6368);margin:-1px auto 0;border-radius:0 0 2px 2px}
.pin .bdg{position:absolute;right:-8px;top:-8px;background:#1a1a2e;color:#fff;font-size:10.5px;font-weight:800;border-radius:999px;padding:1px 5px;border:1.5px solid #fff}
.pin:hover .cap{transform:scale(1.14)}
.pin.on .cap{background:radial-gradient(circle at 34% 30%,#b9f6cf,#16a34a 55%,#0b5c2a);border-color:#0b5c2a}
.pin.on{animation:pinpulse 1.1s ease-in-out infinite}
@keyframes pinpulse{0%,100%{transform:translate(-50%,-88%) scale(1)}50%{transform:translate(-50%,-88%) scale(1.16)}}
.pinpanel{border:1.5px dashed #b9ab7e;background:#fffbeb;border-radius:12px;padding:13px 16px;margin:12px 0}
.pinpanel h3{margin:0 0 4px;font-family:Georgia,serif;font-size:18px}
.pinpanel .why{font-size:14px;color:#6b5410;margin-bottom:8px}
.subrow{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin:6px 0;border-bottom:1px dotted var(--line);padding-bottom:6px}
.subrow:last-child{border-bottom:none;padding-bottom:0}
.subrow .nm{font-weight:700;font-size:14.5px;flex:1;min-width:180px}
.subrow .cnt{font-size:12px;color:var(--muted)}
.minibtn{font-size:12.5px;padding:5px 10px;border-radius:8px}
.missing{border:1px solid var(--line);border-radius:12px;background:#f2f6fa;padding:12px 15px;margin:12px 0}
.missing b{font-family:Georgia,serif}
.misschip{display:inline-block;margin:4px 5px 0 0;padding:4px 11px;border-radius:999px;background:#fff;border:1px solid var(--line);cursor:pointer;font-size:13px;font-weight:700}
.misschip:hover{border-color:var(--blue);color:var(--blue)}
.sheetbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.trsub{background:#efe9fb;border-color:#c9b7f2;color:#5a2ecc}
.weak{color:var(--bad);font-size:12.5px;font-weight:800;margin-top:4px}
</style>
</head>
<body>
<div class="app">
  <div class="head">
    <div>
      <h1>ОГЭ · Задание <span class="num">16</span> — окружность</h1>
      <div class="sub">углы · описанная и вписанная окружности · касательные, хорды, секущие · чертёж честно строится под числа</div>
    </div>
    <div class="stats">
      <div class="stat"><div class="n" id="stSolved">0</div><div class="l">решено</div></div>
      <div class="stat"><div class="n" id="stGood">0</div><div class="l">верно</div></div>
      <div class="stat"><div class="n" id="stStreak">0</div><div class="l">стрик</div></div>
      <div class="stat"><div class="n" id="stBest">—</div><div class="l">зачёт</div></div>
    </div>
  </div>
  <nav class="tabs">
    <button class="tab active" data-tab="razbor">Разбор <span class="cnt" id="cntRz"></span></button>
    <button class="tab" data-tab="train">Тренировка</button>
    <button class="tab" data-tab="quiz">Зачёт</button>
    <button class="tab" data-tab="refs">Справочник</button>
  </nav>
  <main id="main"></main>
</div>
<script>
'use strict';
/* ================= ОГЭ-16 «Окружность» — ядро ================= */
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const rad=a=>a*Math.PI/180, degf=a=>a*180/Math.PI;
const n2=x=>Math.round(x*100)/100;
const ri=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
const pick=a=>a[Math.floor(Math.random()*a.length)];
const dist=(P,Q)=>Math.hypot(P.x-Q.x,P.y-Q.y);
function pol(c,r,a){return {x:c.x+r*Math.cos(rad(a)), y:c.y-r*Math.sin(rad(a))};}
function angleAt(V,P,Q){ // угол между лучами V→P и V→Q, градусы 0..180
  const ux=P.x-V.x, uy=P.y-V.y, vx=Q.x-V.x, vy=Q.y-V.y;
  const d=(ux*vx+uy*vy)/(Math.hypot(ux,uy)*Math.hypot(vx,vy));
  return degf(Math.acos(Math.max(-1,Math.min(1,d))));
}
function distToLine(P,A,B){ // расстояние от P до прямой AB
  const dx=B.x-A.x, dy=B.y-A.y;
  return Math.abs(dy*(P.x-A.x)-dx*(P.y-A.y))/Math.hypot(dx,dy);
}
function fmtNum(x){ // 6.72 → «6,72»
  let s=String(n2(x)); return s.replace('.',',');
}
function frac(a,b){return `<span class="frac"><span class="fn">${a}</span><span class="fd">${b}</span></span>`;}
const SQ3='√3', SQ2='√2';

/* ---------- SVG-библиотека (Конституция: без стрелок; засечки=равенство; цвет дуги=класс равенства) ---------- */
const COL={ink:'#1a1a2e',blue:'#2d70b3',amber:'#d97706',pink:'#db2777',teal:'#0d9488',violet:'#7c3aed',good:'#16a34a',grey:'#8a8478'};
let _uid=0;
function CF(W,H,title,body){
  const id='p'+(_uid++);
  return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" role="img" aria-label="${title}" xmlns="http://www.w3.org/2000/svg"><title>${title}</title>`+
  `<defs><pattern id="${id}" width="25" height="25" patternUnits="userSpaceOnUse"><circle cx="4" cy="4" r="1.15" fill="#e7e1d2"/></pattern></defs>`+
  `<rect x="0" y="0" width="${W}" height="${H}" fill="#fffdf7"/><rect x="0" y="0" width="${W}" height="${H}" fill="url(#${id})"/>`+body+`</svg>`;
}
function seg(P,Q,col=COL.ink,w=2.1,dash){
  return `<line x1="${n2(P.x)}" y1="${n2(P.y)}" x2="${n2(Q.x)}" y2="${n2(Q.y)}" stroke="${col}" stroke-width="${w}" stroke-linecap="round"${dash?` stroke-dasharray="${dash}"`:''}/>`;
}
function circleEl(c,R,col=COL.ink,w=2.3,fill='none',dash){
  return `<circle cx="${n2(c.x)}" cy="${n2(c.y)}" r="${n2(R)}" stroke="${col}" stroke-width="${w}" fill="${fill}"${dash?` stroke-dasharray="${dash}"`:''}/>`;
}
function dotP(P,col=COL.ink,r=4){
  return `<circle cx="${n2(P.x)}" cy="${n2(P.y)}" r="${r+2}" fill="#fffdf7"/><circle cx="${n2(P.x)}" cy="${n2(P.y)}" r="${r}" fill="${col}"/>`;
}
function lab(x,y,t,size=16,anchor='middle',col=COL.ink){
  return `<text x="${n2(x)}" y="${n2(y)}" font-family="Georgia,serif" font-size="${size}" font-weight="700" fill="${col}" text-anchor="${anchor}" paint-order="stroke" stroke="#fffdf7" stroke-width="4.5" stroke-linejoin="round">${t}</text>`;
}
function mathAng(V,P){return degf(Math.atan2(-(P.y-V.y),P.x-V.x));}
function arcPolyline(V,r,a1,delta,col,w=3.2){
  const n=Math.max(10,Math.round(Math.abs(delta)/6)); let pts=[];
  for(let i=0;i<=n;i++){const a=a1+delta*i/n; const p=pol(V,r,a); pts.push(`${n2(p.x)},${n2(p.y)}`);}
  return `<polyline points="${pts.join(' ')}" fill="none" stroke="${col}" stroke-width="${w}" stroke-linecap="round"/>`;
}
function normDelta(d){while(d>180)d-=360;while(d<=-180)d+=360;return d;}
/* дуга угла в вершине V между лучами на P и Q; label — текст значения; n — число дужек */
function angArc(V,P,Q,col,r=24,label=null,n=1){
  const a1=mathAng(V,P), d=normDelta(mathAng(V,Q)-a1);
  let s='';
  for(let i=0;i<n;i++) s+=arcPolyline(V,r-6*i,a1,d,col);
  if(label!=null){
    const extreme=Math.abs(d)>=140||Math.abs(d)<=18;
    const lp=pol(V,r+(extreme?24:14),a1+d/2);
    s+=lab(lp.x,lp.y+5,label,15,'middle',col);
  }
  return s;
}
function rightSq(V,P,Q,s=13){
  const a1=mathAng(V,P),a2=mathAng(V,Q);
  const u=pol({x:0,y:0},s,a1), v=pol({x:0,y:0},s,a2);
  const p1={x:V.x+u.x,y:V.y+u.y}, p2={x:V.x+u.x+v.x,y:V.y+u.y+v.y}, p3={x:V.x+v.x,y:V.y+v.y};
  return `<path d="M ${n2(p1.x)} ${n2(p1.y)} L ${n2(p2.x)} ${n2(p2.y)} L ${n2(p3.x)} ${n2(p3.y)}" fill="none" stroke="${COL.good}" stroke-width="2.4"/>`+
         `<path d="M ${n2(V.x)} ${n2(V.y)} L ${n2(p1.x)} ${n2(p1.y)} L ${n2(p2.x)} ${n2(p2.y)} L ${n2(p3.x)} ${n2(p3.y)} Z" fill="rgba(22,163,74,.10)" stroke="none"/>`;
}
function ticks(P,Q,n=1,col=COL.ink){
  const mx=(P.x+Q.x)/2,my=(P.y+Q.y)/2,dx=Q.x-P.x,dy=Q.y-P.y,L=Math.hypot(dx,dy);
  const ux=dx/L,uy=dy/L,nx=-uy,ny=ux; let s='';
  for(let i=0;i<n;i++){const off=(i-(n-1)/2)*6, cx=mx+ux*off, cy=my+uy*off;
    s+=`<line x1="${n2(cx-nx*6)}" y1="${n2(cy-ny*6)}" x2="${n2(cx+nx*6)}" y2="${n2(cy+ny*6)}" stroke="${col}" stroke-width="2.4" stroke-linecap="round"/>`;}
  return s;
}
function midLab(P,Q,t,off=13,col=COL.ink){ // подпись у середины отрезка, смещена по нормали
  const mx=(P.x+Q.x)/2,my=(P.y+Q.y)/2,dx=Q.x-P.x,dy=Q.y-P.y,L=Math.hypot(dx,dy)||1;
  return lab(mx-(-dy/L)*off,my-(dx/L)*off+5,t,15,'middle',col);
}
function vLab(V,c,t,extra=17){ // подпись точки на окружности: наружу от центра c
  const a=mathAng(c,V); const p=pol(c,dist(c,V)+extra,a); return lab(p.x,p.y+5,t);
}
/* fit: вписать точки и окружности в кадр */
function makeFit(pts,circles,W,H,pad=30){
  let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  const upd=(x,y)=>{x0=Math.min(x0,x);y0=Math.min(y0,y);x1=Math.max(x1,x);y1=Math.max(y1,y);};
  pts.forEach(p=>upd(p.x,p.y));
  circles.forEach(c=>{upd(c.c.x-c.R,c.c.y-c.R);upd(c.c.x+c.R,c.c.y+c.R);});
  const k=Math.min((W-2*pad)/(x1-x0),(H-2*pad)/(y1-y0));
  const ox=(W-k*(x1-x0))/2-k*x0, oy=(H-k*(y1-y0))/2-k*y0;
  return {T:p=>({x:p.x*k+ox,y:p.y*k+oy}), k};
}

/* ================= Построители чертежей =================
   Каждый возвращает {svg, chk:[…]} — chk исполняет геоаудит self-test.
   Типы chk: circ (точка на окружности), ang (угол равен), perp, ratio, tanl (касание), par (параллельность) */

const CTR={x:170,y:152}, RR=112;
function chkCirc(P,c,R){return {t:'circ',P,c,R};}
function chkAng(V,P,Q,want){return {t:'ang',V,P,Q,want};}
function chkPerp(V,P,Q){return {t:'ang',V,P,Q,want:90};}
function chkRatio(a,b,want){return {t:'ratio',a,b,want};}
function chkTanl(A,B,c,R){return {t:'tanl',A,B,c,R};}
function chkPar(a,b){return {t:'par',a,b};}

/* 1. Вписанный + центральный: ∠AOB=c, C на большой дуге */
function figInsCentral(c,names={A:'A',B:'B',C:'C'},givenAtO=true){
  const O=CTR,R=RR;
  const A=pol(O,R,270-c/2),B=pol(O,R,270+c/2),C=pol(O,R,90);
  let b=circleEl(O,R)+seg(O,A)+seg(O,B)+seg(C,A)+seg(C,B);
  b+=angArc(O,A,B,COL.amber,26,givenAtO?c+'°':'?')+angArc(C,A,B,COL.pink,30,givenAtO?'?':c/2+'°');

/* 16. Описанный четырёхугольник по касательным отрезкам t=[tA,tB,tC,tD] */
function figTanQuad(tt,labels,askIdx=3){
  let lo=0.05,hi=1000;
  for(let i=0;i<70;i++){const m=(lo+hi)/2;
    const f=tt.reduce((s,t)=>s+2*Math.atan(t/m),0)-2*Math.PI;
    if(f>0)lo=m;else hi=m;}
  const rho=(lo+hi)/2;
  const half=tt.map(t=>degf(Math.atan(t/rho)));
  const phi=[215]; for(let k=1;k<4;k++) phi.push(phi[k-1]+half[k-1]+half[k]);
  const V=phi.map((p,k)=>pol({x:0,y:0},Math.hypot(rho,tt[k]),-p)); // экранное y вниз: минус
  const fit=makeFit(V,[{c:{x:0,y:0},R:rho}],360,310,42);
  const P=V.map(fit.T), c=fit.T({x:0,y:0}), r=rho*fit.k;
  const nm=['A','B','C','D'];
  let b=circleEl(c,r);
  let chk=[];
  for(let k=0;k<4;k++){
    const Q=P[(k+1)%4];
    b+=seg(P[k],Q);
    b+=midLab(P[k],Q,(k===askIdx)?'?':fmtNum(labels[k]),-16,(k===askIdx)?COL.pink:COL.blue);
    chk.push(chkTanl(P[k],Q,c,r));
  }
  for(let k=0;k<3;k++) chk.push(chkRatio([P[k],P[(k+1)%4]],[P[3],P[0]],labels[k]/labels[3]));
  b+=dotP(c,COL.ink,3.4);
  P.forEach((p,k)=>{b+=dotP(p)+vLab(p,c,nm[k]);});
  return {svg:CF(360,310,'Четырёхугольник ABCD, описанный около окружности',b),chk};
}
/* 17. Описанная трапеция ABCD (AD, BC — основания) по трём сторонам ab,bc,cd — бисекция по ρ */
function figTanTrapSides(ab,bc,cd){
  const ad=ab+cd-bc;
  let lo=0.01,hi=Math.min(ab,cd)/2-1e-6;
  for(let i=0;i<80;i++){const m=(lo+hi)/2;
    const g=Math.sqrt(ab*ab-4*m*m)+Math.sqrt(cd*cd-4*m*m)-(ad-bc);
    if(g>0)lo=m;else hi=m;}
  const rho=(lo+hi)/2,h=2*rho;
  const dx1=Math.sqrt(ab*ab-h*h);
  const A={x:0,y:0},D={x:ad,y:0},B={x:dx1,y:-h},C2={x:dx1+bc,y:-h};
  const alpha=Math.atan2(h,dx1), x0=rho/Math.tan(alpha/2);
  const O={x:x0,y:-rho};
  return tanTrapDraw(A,B,C2,D,O,rho,{ab,bc,cd},'ad');
}
/* 17b. Описанная трапеция от радиуса (для «найдите высоту»): iso или скошенная */
function figTanTrapR(r,iso){
  const l1=iso?2.5*r:2.9*r, l2=iso?2.5*r:2.2*r;
  const h=2*r, dx1=Math.sqrt(l1*l1-h*h), dx2=Math.sqrt(l2*l2-h*h);
  const bc=(l1+l2-dx1-dx2)/2, ad=bc+dx1+dx2;
  const A={x:0,y:0},D={x:ad,y:0},B={x:dx1,y:-h},C2={x:dx1+bc,y:-h};
  const alpha=Math.atan2(h,dx1), x0=r/Math.tan(alpha/2);
  const O={x:x0,y:-r};
  return tanTrapDraw(A,B,C2,D,O,r,null,'h');
}
function tanTrapDraw(A,B,C2,D,O,rho,sideVals,ask){
  const fit=makeFit([A,B,C2,D],[{c:O,R:rho}],380,300,40);
  const [a,b2,c2,d2]=[A,B,C2,D].map(fit.T), o=fit.T(O), r=rho*fit.k;
  let b=circleEl(o,r)+seg(a,b2)+seg(b2,c2)+seg(c2,d2)+seg(d2,a);

/* 18. Треугольник с вписанной окружностью, честные периметр Per и радиус r; g — данная сторона (основание) */
function figSprTri(Per,r,g){
  const s=Per/2, S=r*s;
  const uv=S*S/(s*(s-g)); // u=s−b, v=s−c: u+v=g, u·v=uv
  const disc=g*g/4-uv; if(disc<=0) return null;
  const u=g/2+Math.sqrt(disc), v=g-u;
  const bAC=s-u, cBC=s-v;                 // AC и BC
  const A={x:0,y:0},B={x:g,y:0};
  const x=(g*g+bAC*bAC-cBC*cBC)/(2*g), y2=bAC*bAC-x*x;
  if(y2<=0) return null;
  const C2={x:x,y:-Math.sqrt(y2)};
  const I={x:(cBC*A.x+bAC*B.x+g*C2.x)/Per, y:(cBC*A.y+bAC*B.y+g*C2.y)/Per};
  const fit=makeFit([A,B,C2],[{c:I,R:r}],360,300,40);
  const [a2,b2,c3]=[A,B,C2].map(fit.T), o=fit.T(I), rr=r*fit.k;
  const M={x:o.x,y:a2.y};
  let bd=circleEl(o,rr)+seg(a2,b2)+seg(b2,c3)+seg(c3,a2);
  bd+=seg(o,M,COL.teal,2.6)+rightSq(M,o,{x:M.x+30,y:M.y})+midLab(o,M,'r',-14,COL.teal);
  bd+=midLab(a2,b2,fmtNum(g),15,COL.blue);
  bd+=dotP(o,COL.ink,3.4)+lab(o.x+13,o.y-6,'O')+dotP(a2)+dotP(b2)+dotP(c3);
  bd+=lab(a2.x-13,a2.y+17,'A')+lab(b2.x+13,b2.y+17,'B')+lab(c3.x+2,c3.y-12,'C');
  return {svg:CF(360,300,'Треугольник с вписанной окружностью',bd),
    chk:[chkTanl(a2,b2,o,rr),chkTanl(b2,c3,o,rr),chkTanl(c3,a2,o,rr),
         chkRatio([a2,b2],[b2,c3],g/cBC),
         {t:'perim',pts:[a2,b2,c3],base:[a2,b2],want:Per/g}]};
}
/* 19. Ромб ABCD с вписанной окружностью; m,n — полудиагонали (m — вдоль AC) */

function footToLine(P,A,B){
  const dx=B.x-A.x,dy=B.y-A.y,L2=dx*dx+dy*dy;

/* 24. Пересекающиеся хорды AC и BD в точке P */
function figChordsX(ap,pc,bp,pd,ask='ap'){

    if(p2>0){Pm=Math.sqrt(p2);
      if(Pm>Math.abs(ap-pc)*s/2+2 && Pm>Math.abs(bp-pd)*s/2+2) break;}

  const A={x:Pc.x-ap*s*D1.x,y:Pc.y-ap*s*D1.y},C2={x:Pc.x+pc*s*D1.x,y:Pc.y+pc*s*D1.y};

diamMON:{topic:'ug',name:'Центральный угол в равнобедренном △MON',ref:'radiso',

diamsPair:{topic:'ug',name:'Диаметры AC и BD: ∠AOD ↔ ∠ACB',ref:'insc',

  calc:p=>p.given==='O'?(180-p.x)/2:180-2*p.x,

    :`В окружности с центром O отрезки AC и BD — диаметры. Угол ACB равен ${p.x}°. Найдите угол AOD. Ответ дайте в градусах.`,

      `∠ACB = ${180-p.x}° : 2 = ${(180-p.x)/2}°.`]
    :[`∠ACB — вписанный над дугой AB, значит дуга AB = 2·${p.x}° = ${2*p.x}°, и центральный ∠AOB = ${2*p.x}°.`,
      `∠AOD смежный с ∠AOB: ∠AOD = 180° − ${2*p.x}° = ${180-2*p.x}°.`],
  diag:p=>p.given==='O'

      {v:p.x,m:'∠AOD не равен вписанному углу: сначала найдите центральный ∠AOB = 2·∠ACB, затем смежный.'}]},

mnDiam:{topic:'ug',name:'Углы на одну дугу через диаметр',ref:'insc',

diamTri:{topic:'ug',name:'Сторона-диаметр: прямоугольный треугольник',ref:'insc',
  refWhy:'Сторона проходит через центр — значит, это диаметр, и угол напротив неё прямой (вторая строка карточки).',

  text:p=>p.side==='AC'

    `Острые углы прямоугольного треугольника в сумме дают 90°: ∠${ask} = 90° − ${p.a}° = ${90-p.a}°.`];},
  diag:p=>[{v:180-p.a,m:'Вы вычли из 180° и забыли, что угол напротив диаметра прямой: два оставшихся угла в сумме дают 90°.'},

diamPif:{topic:'ug',name:'Гипотенуза-диаметр и Пифагор',ref:'insc',
  refWhy:'AB — диаметр, поэтому ∠C = 90°: катет находится по теореме Пифагора.',
  law:'Сторона-диаметр даёт прямой угол напротив; дальше работает теорема Пифагора.',
  calc:p=>Math.sqrt(4*p.R*p.R-p.bc*p.bc),
  gen:()=>{const t=pick([[5,12,13],[6,8,10],[8,15,17],[9,12,15],[7,24,25],[20,21,29]]);
    return {R:t[2]/2,bc:t[1]};},
  proto:{R:6.5,bc:12},
  text:p=>`Центр окружности, описанной около треугольника ABC, лежит на стороне AB. Радиус окружности равен ${fmtNum(p.R)}. Найдите AC, если BC = ${p.bc}.`,
  fig:p=>figDiamPif(p.R,p.bc),
  sol:p=>{const d=2*p.R,ans=Math.sqrt(d*d-p.bc*p.bc);
    return [`Центр лежит на AB — значит, AB — диаметр: AB = 2R = ${fmtNum(d)}.`,
    `Вписанный ∠C опирается на диаметр: ∠C = 90°.`,
    `По теореме Пифагора: AC = √(AB² − BC²) = √(${fmtNum(d*d)} − ${p.bc*p.bc}) = ${fmtNum(ans)}.`];},
  diag:p=>{const d=2*p.R,arr=[
    {v:2*p.R-p.bc,m:'Гипотенуза и катет напрямую не вычитаются — работает теорема Пифагора: AC = √(AB² − BC²).'},
    {v:d*d-p.bc*p.bc,m:'Вы нашли КВАДРАТ катета — извлеките корень.'},
    {v:Math.sqrt(p.R*p.R-p.bc*p.bc),m:'Вы взяли радиус вместо диаметра: гипотенуза AB = 2R.'},
    {v:Math.sqrt(d*d+p.bc*p.bc),m:'Катет меньше гипотенузы: под корнем должна стоять РАЗНОСТЬ квадратов.'}];
    return arr;}},

eqR2a:{topic:'opis',name:'Равносторонний: сторона по радиусу описанной',ref:'reg',
  refWhy:'Для равностороннего треугольника R = a/√3 — отсюда a = R·√3.',
  law:'У равностороннего треугольника a = R·√3, где R — радиус описанной окружности.',
  calc:p=>3*p.k, gen:()=>({k:ri(1,9)}), proto:{k:2},
  text:p=>`Радиус окружности, описанной около равностороннего треугольника, равен ${rd3(p.k)}. Найдите длину стороны этого треугольника.`,
  fig:p=>figEqCircum('R',rd3(p.k)),
  sol:p=>[`Для равностороннего треугольника R = a/√3, значит a = R·√3.`,
    `a = ${rd3(p.k)} · √3 = ${p.k}·3 = ${3*p.k}.`],
  diag:p=>[{v:n2(p.k*Math.sqrt(3)),m:'Это сам радиус (≈'+fmtNum(p.k*Math.sqrt(3))+'). Сторона: a = R·√3.'},
    {v:6*p.k,m:'Вы удвоили лишний раз: a = R·√3 = '+p.k+'√3·√3 = '+3*p.k+'.'},
    {v:1.5*p.k,m:'Похоже на R·√3/2 — это половина стороны либо путаница с высотой. Формула: a = R·√3.'}]},

eqDist2a:{topic:'opis',name:'Равносторонний: сторона по расстоянию до сторон',ref:'reg',

  law:'Расстояние от центра равностороннего треугольника до стороны — радиус вписанной окружности: a = 2√3·r.',
  calc:p=>3*p.k, gen:()=>({k:ri(1,6)}), proto:{k:1},
  text:p=>`В окружность с центром в точке O вписан равносторонний треугольник. Расстояние от точки O до сторон треугольника равно ${frac(rd3(p.k),'2')}. Найдите сторону треугольника.`,
  fig:p=>figEqCircum('dist',rd3(p.k)+'/2'),
  sol:p=>[`Расстояние от центра до стороны — радиус вписанной окружности: r = ${rd3(p.k)}/2.`,
    `Для равностороннего треугольника a = 2√3·r.`,
    `a = 2√3 · ${rd3(p.k)}/2 = √3·${rd3(p.k)} = ${3*p.k}.`],

    {v:6*p.k,m:'Лишнее удвоение: 2√3 · '+rd3(p.k)+'/2 — двойки сокращаются.'},
    {v:n2(p.k*Math.sqrt(3)),m:'Это диаметр вписанной окружности (2r). Сторона: a = 2√3·r.'}]},

sinR:{topic:'opis',name:'Радиус по стороне и противолежащему углу',ref:'sinr',
  refWhy:'Известны сторона AB и противолежащий угол C — прямой случай формулы R = AB/(2·sin C).',
  law:'R = a/(2·sin α), где α — угол, противолежащий стороне a (следствие теоремы синусов).',
  calc:p=>p.k,
  gen:()=>({C:pick([30,45,60]),k:ri(2,12)}), proto:{C:45,k:6},
  abTxt:p=>p.C===30?String(p.k):(p.C===45?rd2(p.k):rd3(p.k)),
  text(p){const ab=this.abTxt(p);
    return `В треугольнике ABC угол C равен ${p.C}°, AB = ${ab}. Найдите радиус окружности, описанной около этого треугольника.`;},
  fig(p){return figSinR(p.C,this.abTxt(p));},
  sol(p){const ab=this.abTxt(p), s={30:'1/2',45:'√2/2',60:'√3/2'}[p.C];
    return [`По следствию из теоремы синусов R = AB/(2·sin C).`,
    `sin ${p.C}° = ${s}.`,
    `R = ${ab} / (2·${s}) = ${p.k}.`];},
  diag:p=>[{v:2*p.k,m:'Вы нашли ДИАМЕТР (AB/sin C). Радиус вдвое меньше.'},
    {v:n2(p.k/2),m:'Двойка учтена дважды: R = AB/(2·sin C), делить на 2 нужно один раз.'}]},

sqMidO:{topic:'opis',name:'Квадрат и окружность из середины стороны',ref:'chord',
  refWhy:'OA — гипотенуза прямоугольного треугольника ADO с катетами a и a/2: работает Пифагор.',
  law:'R² = a² + (a/2)² = 5a²/4 — площадь квадрата ищется через теорему Пифагора.',

tanQuad:{topic:'vpis',name:'Описанный четырёхугольник',ref:'tangq',

  sides:p=>[p.t[0]+p.t[1],p.t[1]+p.t[2],p.t[2]+p.t[3],p.t[3]+p.t[0]],
  text(p){const s=this.sides(p);
    return `Четырёхугольник ABCD описан около окружности, AB = ${s[0]}, BC = ${s[1]}, CD = ${s[2]}. Найдите AD.`;},
  fig(p){return figTanQuad(p.t,this.sides(p),3);},
  sol(p){const s=this.sides(p);

  diag(p){const s=this.sides(p);return [
    {v:s[0]+s[1]-s[2],m:'Складываются ПРОТИВОПОЛОЖНЫЕ стороны: AB + CD = BC + AD.'},
    {v:s[1]+s[2]-s[0],m:'Пары перепутаны: противоположны AB с CD и BC с AD.'},
    {v:s[0]+s[1]+s[2],m:'Это сумма трёх сторон. Используйте равенство AB + CD = BC + AD.'}];}},

tanTrap:{topic:'vpis',name:'Описанная трапеция: четвёртая сторона',ref:'tangq',
  refWhy:'Трапеция описана около окружности — значит, для её сторон работает AB + CD = BC + AD.',
  law:'Для описанной трапеции, как и для любого описанного четырёхугольника: AB + CD = BC + AD.',
  calc:p=>p.ab+p.cd-p.bc,
  gen:()=>{const fam={6:[[8,10]],8:[[6,10],[15,17]],12:[[5,13],[9,15],[16,20]]};
    const h=pick([6,8,12]); const pr=fam[h];
    const p1=pick(pr),p2=pick(pr);
    const l1=p1[1],l2=p2[1],dx1=p1[0],dx2=p2[0];
    const bc=(l1+l2-dx1-dx2)/2;
    if(bc<1) return {ab:11,bc:6,cd:9};
    return {ab:l1,bc,cd:l2};},
  proto:{ab:11,bc:6,cd:9},
  text:p=>`Трапеция ABCD с основаниями AD и BC описана около окружности, AB = ${p.ab}, BC = ${p.bc}, CD = ${p.cd}. Найдите AD.`,
  fig:p=>figTanTrapSides(p.ab,p.bc,p.cd),
  sol:p=>[`Трапеция описана около окружности, значит суммы противоположных сторон равны: AB + CD = BC + AD.`,
    `${p.ab} + ${p.cd} = ${p.bc} + AD.`,
    `AD = ${p.ab} + ${p.cd} − ${p.bc} = ${p.ab+p.cd-p.bc}.`],
  diag:p=>[{v:p.ab+p.bc-p.cd,m:'Складываются ПРОТИВОПОЛОЖНЫЕ стороны: боковые AB и CD против оснований BC и AD.'},
    {v:p.ab+p.bc+p.cd,m:'Это сумма трёх сторон. Работает равенство AB + CD = BC + AD.'},
    {v:p.bc,m:'Основания описанной трапеции не обязаны быть равными: используйте AB + CD = BC + AD.'}]},

rhombR:{topic:'vpis',name:'Ромб: радиус вписанной окружности',ref:'spr',
  refWhy:'Радиус вписанной в ромб окружности — высота прямоугольного треугольника из половинок диагоналей.',
  law:'Диагонали ромба перпендикулярны и делятся пополам; r = произведение полудиагоналей / сторона.',
  calc:p=>{const f=p.fam==='34'?[3,4,5]:[7,24,25];return f[0]*f[1]/f[2]*p.k;},
  gen:()=>({fam:pick(['34','724']),k:ri(1,3)}), proto:{fam:'724',k:1},
  geo:p=>{const f=p.fam==='34'?[3,4,5]:[7,24,25];
    return {m:f[1]*p.k, nn:f[0]*p.k, c:f[2]*p.k, d:2*f[1]*p.k, fr:[f[0],f[1]]};},
  text(p){const g=this.geo(p);
    return `Диагональ AC ромба ABCD равна ${g.d}, а tg∠BCA = ${frac(String(g.fr[0]),String(g.fr[1]))}. Найдите радиус окружности, вписанной в ромб.`;},
  fig(p){const g=this.geo(p);return figRhomb(g.m,g.nn,String(g.d));},
  sol(p){const g=this.geo(p);const ans=g.m*g.nn/g.c;
    return [`Диагонали ромба перпендикулярны и точкой пересечения O делятся пополам: OC = ${g.d}/2 = ${g.m}.`,
    `tg∠BCA = BO/OC, значит BO = OC · ${g.fr[0]}/${g.fr[1]} = ${g.nn}.`,
    `Сторона ромба: BC = √(BO² + OC²) = √(${g.nn*g.nn} + ${g.m*g.m}) = ${g.c}.`,
    `Радиус вписанной окружности — расстояние от O до стороны, то есть высота прямоугольного треугольника BOC из вершины O: r = BO·OC/BC = ${g.nn}·${g.m}/${g.c} = ${fmtNum(ans)}.`];},
  diag(p){const g=this.geo(p);const ans=g.m*g.nn/g.c;return [
    {v:n2(2*ans),m:'Вы нашли высоту ромба (диаметр вписанной окружности). Радиус вдвое меньше.'},
    {v:g.nn,m:'Это половина второй диагонали (BO). Радиус — высота треугольника BOC: r = BO·OC/BC.'},
    {v:2*g.nn,m:'Это вся вторая диагональ. Радиус — высота треугольника BOC: r = BO·OC/BC.'}];}},

tanExt:{topic:'kas',name:'Касательная из внешней точки',ref:'tang',
  refWhy:'Касательная перпендикулярна радиусу в точке касания — возникает прямоугольный треугольник и Пифагор.',
  law:'Касательная перпендикулярна радиусу, проведённому в точку касания: BT = √(AB² − R²).',
  calc:p=>Math.sqrt((p.ac+p.cb)*(p.ac+p.cb)-p.ac*p.ac),
  gen:()=>{const t=pick([[3,4,5],[4,3,5],[5,12,13],[12,5,13],[8,15,17],[15,8,17],[7,24,25],[24,7,25],[20,21,29],[21,20,29]]);
    const k=ri(1,6); return {ac:t[0]*k,cb:(t[2]-t[0])*k};},
  proto:{ac:75,cb:10},
  text:p=>`На отрезке AB выбрана точка C так, что AC = ${p.ac} и BC = ${p.cb}. Построена окружность с центром A, проходящая через C. Найдите длину отрезка касательной, проведённой из точки B к этой окружности.`,
  fig:p=>figTanExt(p.ac,p.cb),
  sol:p=>{const d=p.ac+p.cb,ans=Math.sqrt(d*d-p.ac*p.ac);
    return [`Радиус окружности равен AC = ${p.ac}; расстояние от центра до внешней точки: AB = ${p.ac} + ${p.cb} = ${d}.`,
    `Касательная BT перпендикулярна радиусу AT: треугольник ATB прямоугольный с прямым углом при T.`,
    `По теореме Пифагора: BT = √(AB² − AT²) = √(${d*d} − ${p.ac*p.ac}) = ${fmtNum(ans)}.`];},
  diag:p=>{const d=p.ac+p.cb;return [
    {v:p.cb,m:'BC — не касательная (она лежит на прямой через центр). Касательная BT ⊥ AT, работает Пифагор в треугольнике ATB.'},
    {v:d,m:'Это вся длина AB — гипотенуза. Касательная — катет: BT = √(AB² − R²).'},
    {v:d*d-p.ac*p.ac,m:'Вы нашли КВАДРАТ касательной — извлеките корень.'}];}},

chordDist:{topic:'kas',name:'Хорда по расстоянию от центра',ref:'chord',
  refWhy:'Перпендикуляр из центра делит хорду пополам: полухорда, расстояние и радиус связаны Пифагором.',

secTan:{topic:'kas',name:'Касательная и секущая',ref:'power',
  refWhy:'Из одной точки проведены касательная и секущая: AK² = AB·AC.',
  law:'Квадрат касательной равен произведению секущей на её внешнюю часть: AK² = AB·AC.',
  calc:p=>Math.sqrt(p.ab*p.ac),
  gen:()=>{for(let i=0;i<80;i++){const t=ri(3,12);
      const ds=[]; for(let d=2;d<t;d++) if((t*t)%d===0 && t*t/d-d>=2 && t*t/d<=9*d) ds.push(d);
      if(ds.length){const ab=pick(ds); return {ab,ac:t*t/ab};}}
    return {ab:2,ac:8};},
  proto:{ab:2,ac:8},
  text:p=>`Через точку A, лежащую вне окружности, проведены две прямые. Одна прямая касается окружности в точке K. Другая прямая пересекает окружность в точках B и C, причём AB = ${p.ab}, AC = ${p.ac}. Найдите AK.`,
  fig:p=>figSecTan(p.ab,p.ac),
  sol:p=>[`Для касательной и секущей из одной точки: AK² = AB · AC.`,
    `AK² = ${p.ab} · ${p.ac} = ${p.ab*p.ac}.`,
    `AK = √${p.ab*p.ac} = ${fmtNum(Math.sqrt(p.ab*p.ac))}.`],
  diag:p=>[{v:p.ab*p.ac,m:'Это AK² — произведение AB·AC. Извлеките корень.'},

    {v:p.ac-p.ab,m:'Это длина хорды BC. Касательная: AK = √(AB·AC).'}]},

chordsX:{topic:'kas',name:'Пересекающиеся хорды',ref:'power',
  refWhy:'Хорды пересекаются внутри окружности: произведения их отрезков равны, AP·PC = BP·PD.',
  law:'Для пересекающихся хорд AP·PC = BP·PD.',
  calc:p=>p.bp*p.dp/p.cp,

  text:p=>`Хорды AC и BD окружности пересекаются в точке P, BP = ${p.bp}, CP = ${p.cp}, DP = ${p.dp}. Найдите AP.`,

  diag:p=>[{v:n2(p.bp*p.cp/p.dp),m:'Отрезки перепутаны: перемножаются отрезки ОДНОЙ хорды: AP·CP = BP·DP.'},

/* ================= Сборка задач ================= */
function build(k,p,meta){
  const sub=SUBS[k];
  const ans=sub.calc(p);
  const fig=sub.fig.call(sub,p);
  const text=(meta&&meta.text)||sub.text.call(sub,p);
  const sol=sub.sol.call(sub,p);
  const diag=(sub.diag?sub.diag.call(sub,p):[]).filter(d=>isFinite(d.v)&&Math.abs(d.v-ans)>1e-9&&d.m);
  return Object.assign({k,sub,p,ans,fig,text,sol,diag},meta||{});
}
function buildGen(k){return build(k,SUBS[k].gen(),{kind:'gen'});}
function buildArchive(e){const meta={kind:'arch',nums:e.nums}; if(e.text)meta.text=e.text; return build(e.sub,e.p,meta);}

/* ================= Ответы ================= */
function parseAns(s){
  s=String(s==null?'':s).trim().replace(',','.').replace(/\s+/g,'');
  if(!s)return NaN;
  const m=s.match(/^(-?\d+(?:\.\d+)?)\/(\d+(?:\.\d+)?)$/);
  if(m)return parseFloat(m[1])/parseFloat(m[2]);
  return /^-?\d+(?:\.\d+)?$/.test(s)?parseFloat(s):NaN;
}
function eqAns(v,ans){return isFinite(v)&&Math.abs(v-ans)<=Math.max(1e-6,Math.abs(ans)*1e-6)+1e-9;}
function matchDiag(v,diag){for(const d of diag){if(Math.abs(v-d.v)<=Math.max(0.006,Math.abs(d.v)*1e-6))return d.m;}return null;}

function noteTag(sub){return sub.note?`<span class="tag" style="background:#efeae0;color:#7a6a4f">${sub.note}</span>`:'';}
function refcallHtml(sub){

function figHtml(t){return `<div class="diagram">${t.fig?t.fig.svg:''}</div>`;}
function solHtml(t,show){

function updStats(){
  $('#stSolved').textContent=st.train.solved;

function bindRefcalls(root){

function switchTab(tb){

function render(){

/* ---------- Тренировка ---------- */
function pickTrainTask(){
  const subOk=k=>!trSubOnly||k===trSubOnly;
  const topicOk=e=>(trFilter.topic==='all'||SUBS[e.sub].topic===trFilter.topic)&&subOk(e.sub);
  const wantArch=trFilter.src==='arch'||(trFilter.src==='mix'&&Math.random()<0.5);
  if(wantArch){
    let pool=ARCHIVE.filter(e=>topicOk(e)&&!trArchSeen.has(e.nums[0]));
    if(!pool.length){trArchSeen.clear();trArchNote=true;pool=ARCHIVE.filter(topicOk);}
    if(pool.length){const e=pick(pool);trArchSeen.add(e.nums[0]);return buildArchive(e);}
  }
  const keys=Object.keys(SUBS).filter(k=>(trFilter.topic==='all'||SUBS[k].topic===trFilter.topic)&&subOk(k));
  return buildGen(pick(keys.length?keys:Object.keys(SUBS)));
}
function startTrainSub(k){trSubOnly=k;trFilter.topic='all';trTask=null;trArchSeen.clear();trArchNote=false;switchTab('train');}
function startRazborSub(k){rzOpen=k;rzStep=0;switchTab('razbor');}
function renderTrain(){
  if(!trTask){trTask=pickTrainTask();trAtt=2;trDone=false;logEv('task_start',{kind:trTask.kind,sub:trTask.k});}
  const t=trTask;
  const chips=[['all','Все темы'],...Object.entries(TOPICS)].map(([v,n])=>
    `<button class="chip${trFilter.topic===v?' on':''}" data-topic="${v}">${n}</button>`).join('');
  const srcs=[['mix','Вперемешку'],['arch','Архив'],['gen','Генератор']].map(([v,n])=>
    `<button class="chip src${trFilter.src===v?' on':''}" data-src="${v}">${n}</button>`).join('');
  const srcTag=t.kind==='arch'
    ?`<span class="tag arch">РешуОГЭ № ${t.nums.join(', № ')}</span>`
    :`<span class="tag gen">генератор</span>`;
  const archNote=trArchNote?`<div class="smallnote" style="color:var(--warn);margin-bottom:8px">Архив по этому фильтру пройден полностью — дальше пойдут повторы и задачи генератора.</div>`:'';
  const subChip=trSubOnly?`<button class="chip on trsub" id="trSubOff">Тип: ${SUBS[trSubOnly].name} ✕</button>`:'';
  $('#main').innerHTML=`<div class="filters">${chips}<span style="width:10px"></span>${srcs}${subChip}</div>
  ${''/*архивная заметка*/}${archNote}
  <div class="meta">${tagTopic(t.sub.topic)}${srcTag}${noteTag(t.sub)}<span class="smallnote">${t.sub.name}</span></div>
  <div class="grid"><div>${figHtml(t)}</div><div>
    <div class="task">${t.text}</div>
    <div class="controls"><input class="ans" id="ans" inputmode="decimal" placeholder="ответ" autocomplete="off">
      <button id="check">Проверить</button>
      <button class="soft" id="giveup" style="display:none">Сдаюсь — решение</button>
      <button class="blue" id="next" style="display:none">Следующая →</button></div>
    <div class="fb" id="fb"></div>
    ${solHtml(t,false)}
  </div></div>`;
  bindRefcalls();
  $$('.chip').forEach(ch=>ch.addEventListener('click',()=>{
    if(ch.dataset.topic){trFilter.topic=ch.dataset.topic;trSubOnly=null;}
    else if(ch.dataset.src){trFilter.src=ch.dataset.src;}
    trTask=null;trArchSeen.clear();trArchNote=false;render();
  }));
  const off=$('#trSubOff'); if(off)off.addEventListener('click',()=>{trSubOnly=null;trTask=null;render();});
  const fb=$('#fb'), inp=$('#ans');
  const finish=(good)=>{trDone=true;$('#next').style.display='';$('#giveup').style.display='none';
    st.train.solved++; if(good)st.train.good++; else st.train.bad++; save(); updStats();};
  $('#check').addEventListener('click',()=>{
    if(trDone)return;
    const v=parseAns(inp.value);
    if(!isFinite(v)){fb.className='fb show';fb.innerHTML='Введите число (можно десятичную дробь через запятую или дробь вида 168/25).';return;}
    if(eqAns(v,t.ans)){
      fb.className='fb ok show';fb.innerHTML=`Верно! Ответ ${fmtNum(t.ans)}.`;
      streak++; $('#solBox').classList.add('show');
      logEv('solved',{sub:t.k,mistakes:2-trAtt}); finish(true);
    } else {
      streak=0; trAtt--;
      const d=matchDiag(v,t.diag);
      fb.className=d?'fb diag show':'fb bad show';
      fb.innerHTML=(d||'Пока неверно. Взгляните на чертёж: что дано и на какую дугу или отрезок опирается искомое?')+(trAtt>0?` <i>(осталась ${trAtt} попытка)</i>`:'');
      logEv('opt_wrong',{sub:t.k,pick:v});
      if(trAtt<=0){$('#giveup').style.display='';}
    }
  });
  $('#giveup').addEventListener('click',()=>{
    fb.className='fb show';fb.innerHTML=`Правильный ответ: <b>${fmtNum(t.ans)}</b>. Разберите решение ниже.`;
    $('#solBox').classList.add('show'); logEv('hint',{sub:t.k,via:'giveup'}); finish(false);
  });
  $('#next').addEventListener('click',()=>{trTask=null;render();});
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')$('#check').click();});
  inp.focus();
}

/* ---------- Зачёт ---------- */
const QUIZ_QUOTA={ug:3,opis:2,vpis:3,kas:2};
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startQuiz(){
  let keys=[];
  for(const tk in QUIZ_QUOTA){
    const pool=shuffle(Object.keys(SUBS).filter(k=>SUBS[k].topic===tk&&SUBS[k].quiz!==false));
    keys=keys.concat(pool.slice(0,QUIZ_QUOTA[tk]));
  }
  shuffle(keys);
  qz={items:keys.map(buildGen),i:0,results:[],answered:false};
  logEv('start',{kind:'quiz'});
}
function renderQuiz(){
  const main=$('#main');
  if(!qz){
    const w=weakStats(), top=Object.entries(w).filter(([k,n])=>n>=2&&SUBS[k]).sort((a,b)=>b[1]-a[1]).slice(0,3);
    const weakHtml=top.length?`<div class="route" style="text-align:left"><b>Ваши слабые типы (по журналу ошибок):</b><ul>${
      top.map(([k,n])=>`<li>${SUBS[k].name} — ошибок: ${n} <button class="sec minibtn" data-rz="${k}">Разбор</button> <button class="blue minibtn" data-tr="${k}">Тренировать</button></li>`).join('')
    }</ul></div>`:'';
    main.innerHTML=`<div class="fin"><div style="font-family:Georgia,serif;font-size:22px;margin-bottom:8px">Зачёт: 10 задач, тип скрыт, одна попытка на вопрос</div>
    <div class="smallnote">Состав честный: 3 задачи на углы, 2 — описанная окружность, 3 — вписанная, 2 — касательные и хорды.</div>
    <div class="rowbtns" style="justify-content:center"><button id="qStart">Начать зачёт</button></div>
    ${st.best!=null?`<div class="smallnote" style="margin-top:8px">Лучший результат: ${st.best}/10</div>`:''}
    ${weakHtml}</div>`;
    $('#qStart').addEventListener('click',()=>{startQuiz();render();});
    $$('.subrow button, .pinpanel .misschip').forEach(bt=>{
      if(bt.dataset.rz)bt.addEventListener('click',()=>startRazborSub(bt.dataset.rz));
      else if(bt.dataset.tr)bt.addEventListener('click',()=>startTrainSub(bt.dataset.tr));
    });
    return;
  }
  if(qz.i>=qz.items.length)return renderQuizFinal();
  const t=qz.items[qz.i];
  main.innerHTML=`<div class="quizq">Вопрос ${qz.i+1} из ${qz.items.length}</div>
  <div class="grid"><div>${figHtml(t)}</div><div>
    <div class="task">${t.text}</div>
    <div class="controls"><input class="ans" id="qAns" inputmode="decimal" placeholder="ответ" autocomplete="off">
      <button id="qCheck">Ответить</button>
      <button class="blue" id="qNext" style="display:none">${qz.i===qz.items.length-1?'К результатам':'Дальше →'}</button></div>
    <div class="fb" id="qFb"></div>
    ${solHtml(t,false)}
  </div></div>`;
  bindRefcalls();
  const fb=$('#qFb'), inp=$('#qAns');
  $('#qCheck').addEventListener('click',()=>{
    if(qz.answered)return;
    const v=parseAns(inp.value);
    if(!isFinite(v)){fb.className='fb show';fb.innerHTML='Введите число.';return;}
    qz.answered=true;
    const ok=eqAns(v,t.ans);
    qz.results.push({ok,sub:t.k});
    fb.className=ok?'fb ok show':'fb bad show';
    fb.innerHTML=ok?`Верно!`:`Неверно. Правильный ответ: <b>${fmtNum(t.ans)}</b>.`;
    $('#solBox').classList.add('show');
    logEv(ok?'quiz_ok':'quiz_wrong',{sub:t.k,pick:v});
    $('#qNext').style.display='';$('#qCheck').disabled=true;
  });
  $('#qNext').addEventListener('click',()=>{qz.i++;qz.answered=false;render();});
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')$('#qCheck').click();});
  inp.focus();
}
function renderQuizFinal(){
  const score=qz.results.filter(r=>r.ok).length;
  st.runs++; if(st.best==null||score>st.best)st.best=score;
  st.passed=true; save(); logEv('finish',{score});
  const dots=qz.results.map(r=>`<span class="dot ${r.ok?'g':'r'}"></span>`).join('');
  const failed=[...new Set(qz.results.filter(r=>!r.ok).map(r=>r.sub))];
  const route=failed.length
    ?`<div class="route"><b>Маршрут повторения:</b><ul>${failed.map(k=>`<li>${TOPICS[SUBS[k].topic]} — «${SUBS[k].name}» (вкладка «Разбор»)</li>`).join('')}</ul></div>`
    :`<div class="route"><b>Все темы закрыты — отличный результат!</b></div>`;
  $('#main').innerHTML=`<div class="fin"><div class="score">${score} / ${qz.items.length}</div>
    <div class="dots" style="justify-content:center">${dots}</div>${route}
    <div class="rowbtns" style="justify-content:center"><button id="qAgain">Пройти ещё раз</button></div></div>`;
  qz=null; updStats();
  $('#qAgain').addEventListener('click',()=>{startQuiz();render();});
}

/* ================= Self-test (?selftest=1): мат-аудит + геометрический аудит ================= */
function auditFig(f,errs,tag){
  if(!f||!f.svg){errs.push(tag+': нет фигуры');return;}
  if(!/^<svg[\s>]/.test(f.svg)||!/<\/svg>$/.test(f.svg)){errs.push(tag+': повреждён svg');return;}
  const op=(f.svg.match(/</g)||[]).length;
  for(const c of f.chk||[]){
    if(c.t==='circ'){const d=Math.abs(dist(c.P,c.c)-c.R);if(d>0.8)errs.push(tag+': точка не на окружности ('+n2(d)+'px)');}
    else if(c.t==='ang'){const a=angleAt(c.V,c.P,c.Q);if(Math.abs(a-c.want)>1.5)errs.push(tag+': угол '+n2(a)+'° ≠ '+n2(c.want)+'°');}
    else if(c.t==='ratio'){const r=dist(c.a[0],c.a[1])/dist(c.b[0],c.b[1]);if(Math.abs(r-c.want)>0.005*Math.max(1,c.want))errs.push(tag+': отношение длин '+n2(r)+' ≠ '+n2(c.want));}
    else if(c.t==='tanl'){const d=Math.abs(distToLine(c.c,c.A,c.B)-c.R);if(d>0.8)errs.push(tag+': прямая не касается окружности ('+n2(d)+'px)');}
    else if(c.t==='par'){const a1=Math.atan2(c.a[1].y-c.a[0].y,c.a[1].x-c.a[0].x),a2=Math.atan2(c.b[1].y-c.b[0].y,c.b[1].x-c.b[0].x);
      let d=Math.abs(degf(a1-a2))%180;d=Math.min(d,180-d);if(d>0.8)errs.push(tag+': стороны не параллельны ('+n2(d)+'°)');}
    else if(c.t==='sin'){const s=Math.sin(rad(angleAt(c.V,c.P,c.Q)));if(Math.abs(s-c.want)>0.01)errs.push(tag+': sin '+n2(s)+' ≠ '+c.want);}
    else if(c.t==='tan'){const tn=Math.tan(rad(angleAt(c.V,c.P,c.Q)));if(Math.abs(tn-c.want)>0.012*(1+c.want))errs.push(tag+': tg '+n2(tn)+' ≠ '+n2(c.want));}
    else if(c.t==='perim'){const P=c.pts,per=dist(P[0],P[1])+dist(P[1],P[2])+dist(P[2],P[0]);
      const r=per/dist(c.base[0],c.base[1]);if(Math.abs(r-c.want)>0.006*c.want)errs.push(tag+': периметр/сторона '+n2(r)+' ≠ '+n2(c.want));}
  }
}
function selftest(N){
  N=N||25;
  const errs=[],seen=new Set();
  let figs=0;
  for(const e of ARCHIVE){
    e.nums.forEach(n=>{if(seen.has(n))errs.push('дубль № '+n);seen.add(n);});
    if(!SUBS[e.sub]){errs.push('№'+e.nums[0]+': нет подтипа '+e.sub);continue;}
    let t;
    try{t=buildArchive(e);}catch(ex){errs.push('№'+e.nums[0]+': исключение '+ex.message);continue;}
    if(!isFinite(t.ans))errs.push('№'+e.nums[0]+': неконечный ответ');
    else if(Math.abs(t.ans-e.exp)>1e-6)errs.push('№'+e.nums[0]+': ответ '+t.ans+' ≠ эталон '+e.exp);
    if(!t.text||t.text.length<25)errs.push('№'+e.nums[0]+': подозрительно короткий текст');
    if(!t.sol||t.sol.length<2)errs.push('№'+e.nums[0]+': решение короче двух шагов');
    auditFig(t.fig,errs,'№'+e.nums[0]);figs++;
  }
  for(const k in SUBS){
    try{auditFig(build(k,SUBS[k].proto,{}).fig,errs,k+'(proto)');figs++;}
    catch(ex){errs.push(k+'(proto): исключение '+ex.message);}
    for(let i=0;i<N;i++){
      let t;
      try{t=buildGen(k);}catch(ex){errs.push(k+': исключение '+ex.message);break;}
      if(!isFinite(t.ans)||t.ans<=0)errs.push(k+': плохой ответ '+t.ans+' при p='+JSON.stringify(t.p));
      if(!t.diag||!t.diag.length)errs.push(k+': пустая диагностика при p='+JSON.stringify(t.p));
      auditFig(t.fig,errs,k);figs++;
    }
  }
  // карта листа
  if(typeof SHEET_IMG!=='string'||SHEET_IMG.slice(0,11)!=='data:image/')errs.push('лист: SHEET_IMG не data-URI');
  const pinIds=new Set();
  for(const p of PINS){
    if(pinIds.has(p.id))errs.push('пин-дубль '+p.id); pinIds.add(p.id);
    if(!(p.x>2&&p.x<98&&p.y>2&&p.y<98))errs.push('пин '+p.id+': координаты вне листа');
    if(!p.subs.length)errs.push('пин '+p.id+': нет подтипов');
    p.subs.forEach(k=>{if(!SUBS[k])errs.push('пин '+p.id+': неизвестный подтип '+k);});
    p.refs.forEach(r=>{if(!REFS.find(x=>x.id===r))errs.push('пин '+p.id+': неизвестная карточка '+r);});
    if(!p.why||p.why.length<25)errs.push('пин '+p.id+': пустое «зачем»');
  }
  SHEET_MISSING.forEach(m=>{if(!REFS.find(x=>x.id===m.ref))errs.push('missing: неизвестная карточка '+m.ref);});
  // зачёт: квоты и исключения
  for(let s=0;s<12;s++){
    let keys=[];
    for(const tk in QUIZ_QUOTA){
      const pool=Object.keys(SUBS).filter(k=>SUBS[k].topic===tk&&SUBS[k].quiz!==false);
      if(pool.length<QUIZ_QUOTA[tk])errs.push('зачёт: в теме '+tk+' меньше подтипов, чем квота');
      keys=keys.concat(pool.slice(0,QUIZ_QUOTA[tk]));
    }
    if(keys.length!==10)errs.push('зачёт: сумма квот '+keys.length+' ≠ 10');
    if(keys.includes('rtHyp45'))errs.push('зачёт: rtHyp45 не должен попадать в зачёт');
  }
  // insCen: оба направления встречаются и считаются верно
  let sawRev=false,sawDir=false;
  for(let i=0;i<60;i++){const t=buildGen('insCen'); if(t.p.rev){sawRev=true;if(t.ans!==t.p.c)errs.push('insCen rev: ответ '+t.ans+' ≠ '+t.p.c);}
    else{sawDir=true;if(t.ans!==t.p.c/2)errs.push('insCen: ответ '+t.ans+' ≠ '+t.p.c/2);}}
  if(!sawRev||!sawDir)errs.push('insCen: одно из направлений не генерируется');
  return {ok:errs.length===0,errs:errs.slice(0,80),figs,archive:ARCHIVE.length,subs:Object.keys(SUBS).length,pins:PINS.length};
}

(function init(){
  if(typeof document==='undefined')return;
  let selftestMode=false;
  try{selftestMode=/(?:\?|&)selftest=1/.test(location.search);}catch(e){}
  if(selftestMode){
    const r=selftest(40);
    $('#main').innerHTML=`<div class="fin"><div class="score" style="color:${r.ok?'#16a34a':'#dc2626'}">${r.ok?'SELFTEST OK':'SELFTEST FAIL'}</div>
      <div class="smallnote">архив: ${r.archive} карточек · подтипов: ${r.subs} · проверено фигур: ${r.figs}</div>
      ${r.errs.length?`<div class="route"><ul>${r.errs.map(e=>`<li>${e}</li>`).join('')}</ul></div>`:''}</div>`;
    return;
  }
  $$('.tab').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));
  logEv('start',{});
  render();
})();
