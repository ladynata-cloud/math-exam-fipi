<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Задачи на машину Тьюринга</title>
<style>
  :root {
    --bg: #f3f1ea;
    --bg-soft: #ebe7dc;
    --card: #ffffff;
    --card-warm: #fbfaf6;
    --border: #d8d2c2;
    --border-strong: #b9b1a0;
    --text: #1a1d22;
    --text-soft: #5b6470;
    --text-dim: #8a8f99;
    --accent: #1f3a5f;
    --accent-hover: #2a4d75;
    --accent-soft: #e3ebf3;
    --ok-bg: #e7f1e9;
    --ok-border: #b6d1bd;
    --ok-text: #155427;
    --err-bg: #f6e2e1;
    --err-border: #e3b8b6;
    --err-text: #7d1f1d;
    --hint-bg: #fdf3d7;
    --hint-border: #e6cf86;
    --hint-text: #5f4a0e;
    --head: #fbbf24;
    --head-strong: #b78410;
    --shadow: 0 1px 2px rgba(20, 24, 30, 0.04), 0 4px 14px rgba(20, 24, 30, 0.05);
    --radius: 12px;
    --radius-sm: 7px;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    --serif: ui-serif, Georgia, "Times New Roman", serif;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  .page-header {
    background: linear-gradient(180deg, #fcfbf7 0%, #f3f1ea 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px 20px 24px;
  }
  .page-header .inner { max-width: 1060px; margin: 0 auto; }
  .page-header h1 {
    font-family: var(--serif);
    font-weight: 650;
    font-size: clamp(27px, 4vw, 38px);
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  .page-header p.subtitle {
    margin: 0;
    max-width: 780px;
    color: var(--text-soft);
  }

  .tab-bar {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px 0;
  }
  .tab-bar .inner {
    max-width: 1060px;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .tab-btn {
    appearance: none;
    background: transparent;
    border: 1px solid transparent;
    border-bottom: none;
    border-top-left-radius: 8px;
    border-top-right-radius: 8px;
    padding: 9px 14px 10px;
    font-family: var(--sans);
    font-size: 14.5px;
    color: var(--text-soft);
    cursor: pointer;
    transition: background .12s, color .12s;
  }
  .tab-btn:hover { color: var(--text); background: var(--card-warm); }
  .tab-btn.active {
    background: var(--card);
    color: var(--accent);
    border-color: var(--border);
    border-bottom: 1px solid var(--card);
    margin-bottom: -1px;
    font-weight: 600;
  }

  main {
    max-width: 1060px;
    margin: 0 auto;
    padding: 22px 20px 60px;
    display: grid;
    gap: 20px;
  }

  .tab-panel { display: none; gap: 20px; }
  .tab-panel.active { display: grid; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 22px 22px 24px;
  }
  .card h2 {
    font-family: var(--serif);
    font-weight: 650;
    font-size: 23px;
    margin: 0 0 14px;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .card h3 {
    font-family: var(--serif);
    font-weight: 650;
    font-size: 18px;
    margin: 18px 0 8px;
  }
  .card h4 {
    font-family: var(--sans);
    font-weight: 650;
    font-size: 15px;
    margin: 14px 0 6px;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .card p { margin: 8px 0; }

  .badge {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-soft);
    border: 1px solid #c8d6e6;
    border-radius: 999px;
    padding: 2px 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-family: var(--sans);
  }
  .badge.muted { color: var(--text-soft); background: var(--bg-soft); border-color: var(--border); }
  .badge.warn { color: var(--hint-text); background: var(--hint-bg); border-color: var(--hint-border); }

  code { font-family: var(--mono); font-size: 0.93em; background: var(--bg-soft); padding: 1px 5px; border-radius: 4px; }
  code.lambda { background: #fff1cf; border: 1px solid #ecd58f; color: #6a4f0f; }
  .mono { font-family: var(--mono); }
  .lambda { font-family: var(--mono); }
  .formula { font-family: var(--mono); background: #f8f5ec; border: 1px solid #e3dcc4; padding: 2px 7px; border-radius: 5px; }

  .muted { color: var(--text-soft); }
  .small { font-size: 14px; }

  .form-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin: 10px 0;
  }
  label { display: inline-flex; flex-direction: column; gap: 4px; font-size: 14px; color: var(--text-soft); }
  label > span { font-weight: 500; }
  input[type="number"], input[type="text"], select {
    font-family: var(--sans);
    font-size: 15px;
    padding: 7px 10px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    background: #fff;
    color: var(--text);
    min-width: 0;
  }
  input[type="number"]:focus, input[type="text"]:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(31, 58, 95, 0.12);
  }

  button {
    appearance: none;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
    font-family: var(--sans);
    font-size: 14.5px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background .12s, border-color .12s, transform .04s;
  }
  button:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  button:active { transform: translateY(1px); }
  button.secondary { background: var(--accent-soft); color: var(--accent); border-color: #c8d6e6; }
  button.secondary:hover { background: #d4e1ee; }
  button.ghost { background: transparent; color: var(--text-soft); border-color: var(--border-strong); }
  button.ghost:hover { background: var(--bg-soft); color: var(--text); }
  button.warning { background: #fff; color: var(--err-text); border-color: var(--err-border); }
  button.warning:hover { background: #fbecea; }
  button.small { padding: 5px 11px; font-size: 13px; }

  table.program {
    border-collapse: collapse;
    margin: 8px 0 4px;
    font-family: var(--mono);
    font-size: 14.5px;
    background: var(--card-warm);
    border-radius: 6px;
    overflow: hidden;
  }
  table.program th, table.program td {
    border: 1px solid var(--border);
    padding: 9px 14px;
    min-width: 80px;
    text-align: center;
  }
  table.program thead th { background: var(--bg-soft); color: var(--text-soft); font-weight: 600; }
  table.program tbody th { background: var(--bg-soft); color: var(--text); font-weight: 600; }
  table.program td.empty { color: var(--text-dim); background: #fafaf5; }
  .program-table-wrap { overflow-x: auto; }

  .feedback {
    margin-top: 10px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-size: 14.5px;
    display: none;
    line-height: 1.5;
  }
  .feedback.show { display: block; }
  .feedback.ok { background: var(--ok-bg); border: 1px solid var(--ok-border); color: var(--ok-text); }
  .feedback.err { background: var(--err-bg); border: 1px solid var(--err-border); color: var(--err-text); }
  .feedback.hint { background: var(--hint-bg); border: 1px solid var(--hint-border); color: var(--hint-text); }

  .soft-box {
    background: var(--card-warm);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin: 10px 0;
  }
  .drill-string {
    font-family: var(--mono);
    font-size: 22px;
    letter-spacing: 0.06em;
    margin: 6px 0 10px;
  }
  .trail-mark { background: #fff1cf; padding: 0 3px; border-radius: 3px; }

  .tape {
    display: flex;
    flex-wrap: nowrap;
    overflow-x: auto;
    padding: 10px;
    background: var(--card-warm);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin: 10px 0;
  }
  .cell {
    flex: 0 0 auto;
    width: 36px;
    height: 44px;
    border: 1px solid var(--border-strong);
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 17px;
    margin-right: -1px;
    position: relative;
  }
  .cell.lambda-cell { background: #fff8e1; color: #8a6d1c; }
  .cell.head {
    background: var(--head);
    box-shadow: inset 0 0 0 2px var(--head-strong);
    font-weight: 700;
  }
  .cell .pos {
    position: absolute;
    bottom: -16px;
    font-size: 10px;
    color: var(--text-dim);
    font-family: var(--sans);
  }
  .tape-info {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin: 12px 0 0;
    color: var(--text-soft);
    font-size: 14px;
  }
  .tape-info .kv b { color: var(--text); margin-right: 4px; }
  .tape-cmd { font-family: var(--mono); }

  .examples-list {
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  }
  .example {
    background: var(--card-warm);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
  }
  .example .params { font-family: var(--mono); font-weight: 600; }
  .example .mode { color: var(--text-soft); font-size: 14px; margin: 4px 0 8px; }

  details.collapsible {
    background: var(--card-warm);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
  }
  details.collapsible summary { cursor: pointer; font-weight: 600; color: var(--accent); }
  details.collapsible[open] summary { margin-bottom: 8px; }

  .tiny-examples { display: grid; gap: 10px; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); margin: 10px 0; }
  .tiny-example { background: var(--card-warm); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; font-family: var(--mono); }
  .tiny-example .arrow { margin: 0 6px; color: var(--text-soft); }

  .pill-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 6px 0 8px; }
  .pill { background: var(--bg-soft); border: 1px solid var(--border); padding: 3px 10px; border-radius: 999px; font-size: 13px; color: var(--text-soft); }

  .task-box { background: var(--card-warm); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; margin: 8px 0; }
  .task-empty { color: var(--text-dim); }
  .task-program { margin: 8px 0 12px; }

  .solution {
    margin-top: 12px;
    padding: 14px 16px;
    background: #f4f6f1;
    border: 1px solid #d5dec6;
    border-radius: var(--radius-sm);
    font-size: 15px;
  }
  .solution h3 { margin-top: 6px; }

  .tests { display: grid; gap: 6px; margin-top: 6px; }
  .test-row { display: flex; gap: 8px; align-items: baseline; font-size: 14px; padding: 5px 8px; border-radius: 4px; }
  .test-row:nth-child(even) { background: var(--card-warm); }
  .test-row .status { font-family: var(--mono); font-weight: 700; }
  .test-row .status.ok { color: var(--ok-text); }
  .test-row .status.fail { color: var(--err-text); }
  .test-summary { margin-top: 8px; font-weight: 600; }

  .choice-list { display: grid; gap: 4px; margin: 8px 0; }
  .choice-list label { flex-direction: row; align-items: flex-start; gap: 8px; color: var(--text); }
  .choice-list input { margin-top: 4px; }

  .guide-shell { display: grid; gap: 14px; }
  .guide-nav { display: grid; gap: 6px; grid-template-columns: repeat(6, minmax(0, 1fr)); }
  .guide-step { background: var(--card-warm); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 9px; font-size: 13px; color: var(--text-soft); text-align: center; cursor: pointer; transition: background .12s; }
  .guide-step:hover { background: var(--bg-soft); }
  .guide-step.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .guide-panel { background: var(--card-warm); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; }
  .guide-panel h3 { margin-top: 4px; }

  .library-list { display: grid; gap: 10px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
  .library-card {
    background: var(--card-warm);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color .12s, box-shadow .12s;
  }
  .library-card:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(31,58,95,0.08); }
  .library-card.active { border-color: var(--accent); background: #fff; box-shadow: 0 2px 12px rgba(31,58,95,0.1); }
  .library-card .lib-id { font-family: var(--mono); font-size: 12px; color: var(--text-dim); }
  .library-card .lib-title { font-weight: 600; margin: 4px 0; }
  .library-card .lib-meta { font-size: 13px; color: var(--text-soft); }

  .library-detail {
    margin-top: 16px;
    padding: 16px 18px;
    background: #fff;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  .library-detail h3 { margin-top: 6px; }
  .library-detail .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin: 6px 0 12px;
    font-size: 14px;
    color: var(--text-soft);
  }

  .admin-list { display: grid; gap: 6px; }
  .admin-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: baseline;
    padding: 6px 10px;
    background: var(--card-warm);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
  }
  .admin-row .a-id { font-family: var(--mono); font-weight: 600; color: var(--text); }
  .admin-row .a-status { font-size: 12px; color: var(--hint-text); background: var(--hint-bg); border: 1px solid var(--hint-border); padding: 1px 7px; border-radius: 999px; }

  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin: 6px 0 12px; }
  .toolbar .filter-btn {
    appearance: none;
    background: var(--card-warm);
    border: 1px solid var(--border);
    color: var(--text-soft);
    border-radius: 999px;
    padding: 4px 12px;
    font-size: 13px;
    cursor: pointer;
  }
  .toolbar .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .uni-editor { display: grid; gap: 10px; }
  .uni-editor textarea {
    width: 100%;
    min-height: 120px;
    font-family: var(--mono);
    font-size: 14px;
    padding: 10px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    resize: vertical;
  }
  .uni-program-table input.cmd-input {
    width: 110px;
    font-family: var(--mono);
    font-size: 13px;
    padding: 4px 6px;
  }
  .uni-program-table td.empty-cmd { background: #fafaf5; }

  .binary-converter { display: grid; gap: 6px; background: var(--card-warm); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin: 8px 0; }
  .binary-converter .conv-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .binary-converter .conv-out {
    font-family: var(--mono);
    font-size: 17px;
    background: #fff;
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 4px;
    min-width: 100px;
    display: inline-block;
  }

  @media (max-width: 720px) {
    .card { padding: 18px 16px 20px; }
    table.program th, table.program td { padding: 8px 12px; min-width: 70px; }
    .cell { width: 30px; height: 38px; font-size: 15px; }
    .guide-nav { grid-template-columns: 1fr; }
    .tab-btn { padding: 8px 10px; font-size: 13.5px; }
  }

  /* Доп. классы для вкладок «Универсальный разбор» и «Библиотека» */
  .library-grid {
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    margin-top: 8px;
  }
  .uni-program-list {
    display: grid;
    gap: 8px;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    margin-top: 8px;
  }
  button.library-card {
    appearance: none;
    text-align: left;
    font: inherit;
    color: var(--text);
    width: 100%;
  }
  .lib-filter { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 12px; }
  .chip {
    appearance: none;
    background: var(--card-warm);
    border: 1px solid var(--border);
    color: var(--text-soft);
    border-radius: 999px;
    padding: 4px 12px;
    font-size: 13px;
    cursor: pointer;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .chip.small { padding: 3px 9px; font-size: 12.5px; }
  .lib-pill {
    display: inline-block;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 1px 9px;
    font-size: 12px;
    color: var(--text-soft);
  }

  /* Лента в универсальном симуляторе и в библиотеке */
  .tape-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    font-family: var(--mono);
    font-size: 16px;
    padding: 6px 0;
  }
  .tape-cell {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 26px;
    height: 30px;
    padding: 0 6px;
    border: 1px solid var(--border);
    background: #fff;
    border-radius: 4px;
  }
  .tape-cell.blank { background: #fff8e1; color: #8a6d1c; border-color: #ecd58f; }
  .tape-cell.head {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(31, 58, 95, 0.18) inset;
    font-weight: 700;
  }

  .trace-log {
    background: var(--card-warm);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    max-height: 220px;
    overflow-y: auto;
  }
  .trace-row { padding: 2px 0; border-bottom: 1px dotted #e4e0d3; }
  .trace-row:last-child { border-bottom: none; }

  /* Служебные блоки */
  .admin-details, .autotest-host details {
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    background: #fffaf0;
    margin-top: 14px;
  }
  .admin-details > summary, .autotest-host details > summary {
    cursor: pointer;
    font-weight: 600;
    color: var(--text-soft);
  }
  .admin-row .admin-id { font-family: var(--mono); font-weight: 600; }
  .admin-row .admin-status {
    font-size: 12px;
    color: var(--hint-text);
    background: var(--hint-bg);
    border: 1px solid var(--hint-border);
    padding: 1px 7px;
    border-radius: 999px;
  }
  .admin-row .admin-note { flex: 1 1 320px; }

  .autotest-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 8px;
    font-size: 14px;
  }
  .autotest-table th, .autotest-table td {
    text-align: left;
    padding: 5px 8px;
    border-bottom: 1px solid var(--border);
  }
  .autotest-table tr.ok td { background: #f1faf1; }
  .autotest-table tr.err td { background: #fdecec; color: #7d1f1f; }

  /* Обёртка для широких таблиц: на узких экранах даёт горизонтальный скролл
     внутри блока, чтобы страница целиком не съезжала. */
  .scroll-x-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .scroll-x-wrap > table { min-width: 460px; }

  .badge.ok { background: #d6f1d6; color: #1f5520; border: 1px solid #a9d8a9; }
  .badge.err { background: #fadcdc; color: #7d1f1f; border: 1px solid #e4a8a8; }
  .err-text { color: #7d1f1f; }

  /* ===== Учебные компоненты ===== */
  /* Бета-метка в заголовке */
  .beta-badge {
    display: inline-block; margin-left: 10px;
    background: #fef0d8; color: #6b4d1f; border: 1px solid #e3c89a;
    border-radius: 10px; padding: 2px 10px; font-size: 12px; font-weight: 500;

<script>
"use strict";

/* ============================================================
   Константы и универсальное ядро машины Тьюринга
   ============================================================ */
const LAMBDA = "λ";
const MAX_STEPS = 100000;

/**
 * Создать состояние симуляции МТ.
 * @param {string} inputString - исходная лента (без пустых символов)
 * @param {"nearest_blank_right"|"nearest_blank_left"} headStart
 * @param {string} startState
 * @param {string} blankSymbol
 */
function createTMSimulation(inputString, headStart, startState, blankSymbol = LAMBDA) {
  const tape = new Map();
  for (let i = 0; i < inputString.length; i++) tape.set(i, inputString[i]);
  const head = headStart === "nearest_blank_right" ? inputString.length : -1;
  return {
    tape,
    head,
    state: startState,
    step: 0,
    finished: false,
    error: null,
    lastCommand: null,
    minPos: 0,
    maxPos: Math.max(inputString.length - 1, 0),
    inputLength: inputString.length,
    blankSymbol
  };
}

/** Один шаг МТ. Возвращает {ok, finished, error?}. */
function stepTM(sim, program) {
  if (sim.finished) return { ok: false, error: "Машина уже остановлена", finished: true };
  const cur = sim.tape.get(sim.head) ?? sim.blankSymbol;
  const row = program[sim.state];
  const cmd = row ? row[cur] : null;
  if (!cmd) {
    sim.finished = true;
    sim.error = `Нет команды для (${sim.state}, ${cur})`;
    return { ok: false, error: sim.error, finished: true };
  }
  sim.tape.set(sim.head, cmd.write);
  if (sim.head < sim.minPos) sim.minPos = sim.head;
  if (sim.head > sim.maxPos) sim.maxPos = sim.head;
  sim.lastCommand = { ...cmd, fromState: sim.state, fromSymbol: cur };
  if (cmd.move === "L") sim.head--;
  else if (cmd.move === "R") sim.head++;
  sim.state = cmd.next;
  sim.step++;
  if (cmd.move === "S") sim.finished = true;
  return { ok: true, finished: sim.finished, command: sim.lastCommand };
}

/** Запуск до остановки с защитой по MAX_STEPS. */
function runTMFull(sim, program, maxSteps = MAX_STEPS) {
  while (!sim.finished && sim.step < maxSteps) {
    const r = stepTM(sim, program);
    if (!r.ok) return { ok: false, error: r.error };
  }
  if (!sim.finished) return { ok: false, error: "Превышено максимальное число шагов" };
  return { ok: true };
}

/** Получить итоговую ленту (между не-пустыми клетками). */
function readFinalTape(sim) {
  let s = sim.minPos, e = sim.maxPos;
  while (s <= e && (sim.tape.get(s) ?? sim.blankSymbol) === sim.blankSymbol) s++;
  while (e >= s && (sim.tape.get(e) ?? sim.blankSymbol) === sim.blankSymbol) e--;
  let str = "";
  if (s <= e) for (let i = s; i <= e; i++) str += (sim.tape.get(i) ?? sim.blankSymbol);
  return str;
}

/** Удобная обёртка для тестов. */
function simulateOnce(input, headStart, program, startState = "q0", blankSymbol = LAMBDA) {
  const sim = createTMSimulation(input, headStart, startState, blankSymbol);
  const r = runTMFull(sim, program);
  if (!r.ok) return { ok: false, error: r.error, sim };
  return { ok: true, finalTape: readFinalTape(sim), sim };
}

/* ============================================================
   Вспомогательные утилиты
   ============================================================ */
function decToBin(n) {
  if (!Number.isInteger(n) || n < 0) return null;
  if (n === 0) return "0";
  return n.toString(2);
}
function binToDec(s) {
  if (typeof s !== "string" || s.length === 0) return 0;
  if (!/^[01]+$/.test(s)) return NaN;
  return parseInt(s, 2);
}
function countChar(s, ch) { let c = 0; for (const x of s) if (x === ch) c++; return c; }
function countTrailingZeros(s) {
  let t = 0;
  for (let i = s.length - 1; i >= 0 && s[i] === "0"; i--) t++;
  return t;
}
function countLeadingOnes(s) {
  let t = 0;
  for (let i = 0; i < s.length && s[i] === "1"; i++) t++;
  return t;
}
function randInt(a, b) { return Math.floor(a + Math.random() * (b - a + 1)); }
function escapeHTML(s) {
  return String(s).replace(/[&<>"]/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[ch]));
}
function parseStrictInt(raw) {
  if (raw === "" || raw == null) return { ok: false, error: "Поле не должно быть пустым" };
  const v = Number(String(raw).trim());
  if (!Number.isInteger(v)) return { ok: false, error: "Нужно целое число" };
  return { ok: true, value: v };
}
function zeroWord(K) {
  const a = Math.abs(K), l2 = a % 100, l1 = a % 10;
  if (l2 >= 11 && l2 <= 14) return "нулей";
  if (l1 === 1) return "ноль";
  if (l1 >= 2 && l1 <= 4) return "нуля";
  return "нулей";
}
function headStartLabel(hs) {

    ? "в ближайшей справа пустой ячейке"
    : "в ближайшей слева пустой ячейке";
}

/** По taskType возвращает pattern (категорию задачи). */
function getTaskPattern(task) {
  const tt = (task.taskType || "").toLowerCase();
  if (tt.startsWith("right_tail_zero")) return "right-tail-zeros";
  if (tt.startsWith("left_prefix_ones_flip")) return "left-prefix-ones";
  if (tt.startsWith("left_prefix_ones_to_zeros")) return "left-prefix-then-zero";
  if (tt === "bitwise_inversion_decimal_result") return "binary-inversion";
  if (tt === "binary_decrement_decimal_result") return "binary-decrement";
  if (tt === "clear_lowest_one_decimal_result") return "clear-lowest-one";
  if (tt === "clear_first_left_one_decimal_result") return "clear-left-one";

function buildRightTailGuide(task) {
  const it = task.initialTape || {}, q = task.question || {};

  });

  });
  steps.push({
    question: "Что происходит с правым хвостом нулей в q1?",
    options: [
      _opt("Все нули хвоста остаются нулями", false, "Команда q1 на 0 явно меняет 0 на 1."),

    options: [

      _opt("Она становится λ", false, "В таблице нет команды, превращающей 1 в λ."),

  });
  steps.push({
    question: "Какая формула связывает Z (исходных нулей), t (длина хвоста нулей) и K (нулей после работы)?",
    options: [
      _opt("K = Z + t + 1", false, "При работе нулей убавляется t штук, прибавляется 1, а не наоборот."),
      _opt("K = Z − t + 1", true),

  });
  if (isInitial && isMax && K != null && N != null) {
    steps.push({

      options: [
        _opt("Сделать всю строку из нулей", false, "Это особый случай (тогда после работы K = 0, а у нас K > 0)."),
        _opt(`Оставить ровно одну единицу, остальные ${N - 1} символов — нули`, true),
        _opt("Расставить нули равномерно", false, "Расположение единицы важно: она должна быть ровно одна.")

        _opt("t = 1", false)

        _opt("Хвост ровно из 1 нуля", false)
      ],
      explain: "При t = 0 строка заканчивается единицей; машина превращает её в ноль, K = c0 + 1 = " + (c0 != null ? (c0 + 1) : "c0 + 1") + "."
    });
  }
  steps.push({
    question: "Симуляция показывает результат на одной строке. Достаточно ли этого как ответ на задачу про максимум/минимум?",
    options: [
      _opt("Да, симулятор подтвердил — задача решена", false, "Это лишь один из возможных входов. Экстремум нужно обосновать аналитически."),
      _opt("Нет, нужно ещё обосновать: пример даёт ответ И больше/меньше нельзя", true),
      _opt("Достаточно, если входов хотя бы 3", false)
    ],
    explain: "Симулятор — это верификатор гипотезы. Аналитический разбор пары формул («верхняя и нижняя оценка») — это решение."
  });
  return steps;
}

function buildBinaryTransformGuide(task) {
  const it = task.initialTape || {};
  const dec = it.decimal;
  const bin = (dec != null) ? decToBin(dec) : "";
  const n = bin.length;
  const pat = getTaskPattern(task);

  const steps = [];
  steps.push({
    question: `С чего начинается решение задачи про число ${dec}?`,
    options: [
      _opt("Сразу прогнать симулятор", false, "Сначала нужно понять, какая запись окажется на ленте."),
      _opt(`Перевести ${dec} в двоичную запись без ведущих нулей`, true),
      _opt("Поделить на 10", false)
    ],
    explain: `${dec} в двоичной = ${bin} (длина ${n}).`
  });
  if (pat === "binary-inversion") {
    steps.push({
      question: `Что сделает программа с двоичной записью ${bin}?`,
      options: [
        _opt("Поменяет каждый бит на противоположный", true),
        _opt("Уберёт ведущие нули", false),
        _opt("Поменяет местами начало и конец", false)
      ],
      explain: "Программа «побитовая инверсия» проходит справа налево и каждый бит инвертирует."
    });
    const inv = bin.split("").map(b => b === "0" ? "1" : "0").join("");
    const finalDec = parseInt(inv, 2);
    steps.push({
      question: `Какая будет двоичная запись после работы?`,
      options: [
        _opt(inv, true),
        _opt(bin, false, "Это исходная, а не инвертированная."),
        _opt(inv.split("").reverse().join(""), false, "Инверсия — это смена битов, а не разворот.")
      ],
      explain: `Каждый бит инвертирован: ${bin} → ${inv}.`
    });
    steps.push({
      question: `Чему равно десятичное значение результата?`,
      options: [
        _opt(String(finalDec), true),
        _opt(String(dec), false),
        _opt(String(Math.pow(2, n) - dec), false, "Формула: 2ⁿ − 1 − N, а не 2ⁿ − N.")
      ],
      explain: `${inv}₂ = ${finalDec}₁₀. Проверка: 2^${n} − 1 − ${dec} = ${Math.pow(2,n)-1-dec}.`
    });
  } else if (pat === "binary-decrement") {
    steps.push({
      question: `Что делает программа «двоичный декремент» с записью ${bin}?`,
      options: [
        _opt(`Эквивалентна ${dec} − 1`, true),
        _opt(`Эквивалентна ${dec} + 1`, false),
        _opt("Инвертирует все биты", false)
      ],
      explain: "Хвостовые нули превращаются в единицы, первая единица справа — в ноль. Это и есть вычитание 1."
    });
    steps.push({
      question: `Чему равен ответ для ${dec}?`,
      options: [
        _opt(String(dec - 1), true),
        _opt(String(dec + 1), false),
        _opt(String(dec * 2), false)
      ],
      explain: `${dec} − 1 = ${dec - 1}.`
    });
  } else if (pat === "clear-lowest-one") {
    let k = 0; for (let i = bin.length - 1; i >= 0; i--) { if (bin[i] === "1") { k = bin.length - 1 - i; break; } }
    const sub = Math.pow(2, k);
    steps.push({
      question: `В записи ${bin} какая позиция (от 0, считая справа) у младшей единицы?`,
      options: [
        _opt(String(k), true),
        _opt("0 всегда", false, "Так бывает, только если число нечётное."),
        _opt(String(bin.length - 1), false, "Это старший бит, а не младший.")
      ],
      explain: `Самая правая единица в ${bin} стоит на позиции ${k} (с нуля).`
    });
    steps.push({
      question: `Что вычитается из числа?`,
      options: [
        _opt(`2^${k} = ${sub}`, true),
        _opt("1 всегда", false),
        _opt(`2^${bin.length - 1} = ${Math.pow(2, bin.length - 1)}`, false)
      ],
      explain: `Обнуление младшей единицы соответствует вычитанию её разряда: ${dec} − ${sub} = ${dec - sub}.`
    });
  } else if (pat === "clear-left-one") {
    const sub = Math.pow(2, n - 1);
    steps.push({
      question: `Какой бит у ${bin} обнулит программа?`,
      options: [
        _opt("Самый старший (самый левый)", true),
        _opt("Самый младший (самый правый)", false, "Это другая программа — «обнулить младшую единицу»."),
        _opt("Все единицы сразу", false)
      ],
      explain: `Машина стартует слева, делает шаг вправо в строку и сразу заменяет первый увиденный символ-единицу на ноль. Без ведущих нулей это всегда старший бит.`
    });
    steps.push({
      question: `Что вычитается из числа?`,
      options: [
        _opt(`2^(n−1) = 2^${n - 1} = ${sub}`, true),
        _opt("1", false),
        _opt(String(dec / 2), false, "Это не общая формула, проверь.")
      ],
      explain: `${dec} − ${sub} = ${dec - sub}.`
    });
  } else if (pat === "first-zero-to-one") {
    let k = 0; while (k < bin.length && bin[k] === "1") k++;
    const add = k < bin.length ? Math.pow(2, bin.length - 1 - k) : 0;
    steps.push({
      question: `В записи ${bin} какова позиция первого нуля слева?`,
      options: [
        _opt(String(k), true),
        _opt("0 всегда", false),
        _opt("Этого нуля нет", k >= bin.length, "Если число вида 11…1, действительно нуля нет; иначе он есть.")
      ],
      explain: `Считая с 0 от старшего бита: первый ноль в ${bin} стоит на позиции ${k}.`
    });
    steps.push({
      question: `На сколько изменится число после замены этого нуля на единицу?`,
      options: [
        _opt(`+ 2^${bin.length - 1 - k} = +${add}`, true),
        _opt("+ 1 всегда", false),
        _opt("Уменьшится", false, "Замена 0 → 1 не может уменьшить число.")
      ],
      explain: `Ответ: ${dec} + ${add} = ${dec + add}.`
    });
  } else if (pat === "left-prefix-then-zero") {
    let k = 0; while (k < bin.length && bin[k] === "1") k++;
    steps.push({
      question: `Какова длина начального блока единиц в ${bin}?`,
      options: [
        _opt(String(k), true),
        _opt("0", false),
        _opt(String(bin.length), false)
      ],
      explain: `Префикс единиц имеет длину ${k}.`
    });
    steps.push({
      question: `Что произойдёт с этими ${k} единицами и со следующим нулём?`,
      options: [
        _opt(`${k} единиц станут нулями, следующий ноль станет единицей`, true),
        _opt("Только следующий ноль изменится", false),
        _opt("Только единицы изменятся", false)
      ],
      explain: "Программа сначала проходит все 1 префикса (переводя в 0), затем встречает 0 — превращает в 1 и останавливается."
    });
  }
  // финальный «проверь симулятором»
  steps.push({
    question: "Когда уже есть гипотеза ответа, что делать дальше?",
    options: [
      _opt("Прогнать программу через универсальный симулятор и сверить ленту", true),
      _opt("Сразу записать в ответ", false, "Симулятор — короткая проверка; не пропускай её."),
      _opt("Поделить на 7", false)
    ],
    explain: "Симулятор подтверждает закономерность. Если ленты совпадают — гипотеза верна."
  });
  return steps;
}

function buildUniversalTraceGuide(task) {
  // Универсальный гайд для произвольной задачи: 4–5 шагов про чтение таблицы и трассировку
  const startSide = (task.initialTape && task.initialTape.headStart) || "nearest_blank_right";
  return [
    {
      question: "С чего начать чтение задачи на машину Тьюринга?",
      options: [
        _opt("Сразу нажать «до конца»", false, "Без понимания таблицы это лотерея."),
        _opt("Прочитать алфавит, состояния и таблицу программы", true),
        _opt("Угадать ответ по форме условия", false)
      ],
      explain: "Алфавит говорит, какие символы возможны на ленте; таблица — что машина делает в каждой паре (состояние, символ)."
    },
    {
      question: "Где стартует головка?",
      options: [
        _opt(startSide === "nearest_blank_right" ? "В пустой клетке λ справа от строки" : "В пустой клетке λ слева от строки", true),
        _opt(startSide === "nearest_blank_right" ? "На последнем символе строки" : "На первом символе строки", false, "Это «внутри» строки. На самом деле головка пока на λ снаружи."),
        _opt("В середине строки", false)
      ],
      explain: "Стартовая позиция — «ближайшая пустая " + (startSide === "nearest_blank_right" ? "справа" : "слева") + "». Первый шаг введёт головку внутрь строки."
    },
    {
      question: "Как выбрать команду для текущего шага?",
      options: [
        _opt("По столбцу «состояние»", false, "Только состояние не определяет команду."),
        _opt("По строке «состояние» и столбцу «символ под головкой»", true),
        _opt("По первой строке таблицы", false)
      ],
      explain: "Команда лежит на пересечении строки текущего состояния и столбца текущего символа."
    },
    {
      question: "Что такое «один шаг»?",
      options: [
        _opt("Только запись символа", false),
        _opt("Запись → сдвиг головки → переход в новое состояние", true),
        _opt("Только сдвиг головки", false)
      ],
      explain: "Команда — это всегда тройка: запись, сдвиг, новое состояние."
    },
    {
      question: "Что значит, если клетка пары (состояние, символ) в таблице пуста или прочерк?",
      options: [
        _opt("Машина ждёт ввода пользователя", false),
        _opt("Машина останавливается (нет команды)", true),
        _opt("Машина начинает заново", false)
      ],
      explain: "Отсутствие команды — это сигнал «halt». В наших таблицах это рисуется прочерком «—»."
    }
  ];
}

function buildGenericGuide(task) {
  return buildUniversalTraceGuide(task);
}

function buildLibraryTaskGuide(task) {
  const pat = getTaskPattern(task);
  if (pat === "right-tail-zeros") return buildRightTailGuide(task);
  if (pat === "left-prefix-ones" || pat === "left-prefix-then-zero") {
    if (pat === "left-prefix-ones") return buildLeftPrefixGuide(task);
    return buildBinaryTransformGuide(task);
  }
  if (pat === "binary-inversion" || pat === "binary-decrement" ||
      pat === "clear-lowest-one" || pat === "clear-left-one" ||
      pat === "first-zero-to-one") return buildBinaryTransformGuide(task);
  return buildGenericGuide(task);
}

/* ============================================================
   ДИАГНОСТИКА ОШИБОК ОТВЕТА
   diagnoseTuringAnswer(task, userAnswer, expected) → { message, foundationSkillId, repairQuestion, suggestedAction }
   ============================================================ */
function diagnoseTuringAnswer(task, userAnswer, expected) {
  const userNum = Number(userAnswer);
  const exp = Number(expected);
  const pat = getTaskPattern(task);
  const it = task.initialTape || {}, q = task.question || {};

  function repair(skillId, fallback) {
    const skill = FOUNDATION_BY_ID[skillId];
    if (!skill) return fallback || null;
    return { skillId, rule: skill.rule, drill: skill.drill };
  }

  // 0. Невалидный ввод
  if (!Number.isFinite(userNum)) {
    return {
      message: "Ответ должен быть целым числом.",
      foundationSkillId: "ans-target-type",
      repairQuestion: repair("ans-target-type"),
      suggestedAction: "Перечитай раздел «Что нужно найти?» — там указан формат ответа."
    };
  }

  // 1. Бинарная задача и ответ совпал с исходным числом — забыл выполнить программу
  if ((pat === "binary-inversion" || pat === "binary-decrement" ||
       pat === "clear-lowest-one" || pat === "clear-left-one" ||
       pat === "first-zero-to-one" || pat === "left-prefix-then-zero") &&
      it.decimal != null && userNum === it.decimal && exp !== it.decimal) {
    return {
      message: "Ты вернул исходное число — программа точно что-то меняет. Прогони её в симуляторе хотя бы на короткой строке, чтобы увидеть, какой бит изменился.",
      foundationSkillId: "pattern-binary-pipeline",
      repairQuestion: repair("pattern-binary-pipeline"),
      suggestedAction: "Открой «Веди меня по шагам» — там пошагово разбирается перевод десятичное → двоичное → работа МТ → десятичное."
    };
  }

  // 2. Ввели двоичную запись вместо десятичного значения
  // Сработает, когда userNum состоит только из 0 и 1, и его прочтение как двоичного даёт ожидаемое.
  if (q.target === "final_decimal_number" && Number.isInteger(userNum) && userNum >= 0) {
    const userStr = String(userNum);
    if (/^[01]+$/.test(userStr) && userStr.length >= 2) {
      try {
        const asBin = parseInt(userStr, 2);
        if (asBin === exp) {
          return {
            message: `Похоже, ты ввёл двоичную запись (${userStr}₂) вместо её десятичного значения (${exp}). Задача спрашивает именно десятичный ответ.`,
            foundationSkillId: "pattern-binary-pipeline",
            repairQuestion: repair("pattern-binary-pipeline"),
            suggestedAction: "Шаг 3 пайплайна — это перевод двоичной записи обратно в десятичную систему."
          };
        }
      } catch (_) {}
    }
  }

  // 3. Зеркальные программы: L↔R путаница
  // Для clear-lowest-one (правый край) и clear-left-one (левый край) ошибочный ответ часто
  // равен тому, что дала бы зеркальная программа.
  if (it.decimal != null) {
    const bin = decToBin(it.decimal);
    const n = bin.length;
    // Реальная программа сняла бы один бит. Какой бит должна была снять зеркальная программа?
    let mirrorExpected = null;
    if (pat === "clear-lowest-one") {
      // Зеркальная: clear-left-one — снимет старший бит (2^(n-1)).
      mirrorExpected = it.decimal - Math.pow(2, n - 1);
    } else if (pat === "clear-left-one") {
      // Зеркальная: clear-lowest-one — снимет младший бит.
      let k = 0; for (let i = bin.length - 1; i >= 0; i--) { if (bin[i] === "1") { k = bin.length - 1 - i; break; } }
      mirrorExpected = it.decimal - Math.pow(2, k);
    } else if (pat === "first-zero-to-one") {
      // Аналог: первый нуль *справа* → единица (зеркально). Маловероятный случай, но проверим.
      // Здесь зеркальная программа = добавление 2^k_lowest_zero, где k_lowest_zero — позиция самого правого нуля.
      let k = -1; for (let i = bin.length - 1; i >= 0; i--) { if (bin[i] === "0") { k = bin.length - 1 - i; break; } }
      if (k >= 0) mirrorExpected = it.decimal + Math.pow(2, k);
    }
    if (mirrorExpected !== null && userNum === mirrorExpected && userNum !== exp) {
      return {
        message: "Похоже, ты спутал направление обхода: ответ совпадает с тем, что дала бы зеркальная программа (другой край ленты). Перечитай первую команду: она задаёт, с какого края машина входит в строку.",
        foundationSkillId: pat === "clear-lowest-one" || pat === "first-zero-to-one" ? "head-nearest-blank-right" : "head-nearest-blank-left",
        repairQuestion: repair(pat === "clear-lowest-one" || pat === "first-zero-to-one" ? "head-nearest-blank-right" : "head-nearest-blank-left"),
        suggestedAction: "Открой вкладку «Универсальный симулятор», подсветка покажет с какого края головка реально входит в строку."
      };
    }
  }

  // 4. Конфузия λ с 0 (ведущий ноль не учтён или, наоборот, добавлен лишний бит)
  // Эвристика: для бинарной инверсии — если ученик инвертировал, считая на бит длиннее или короче.
  if (pat === "binary-inversion" && it.decimal != null) {
    const n = decToBin(it.decimal).length;
    for (let delta = -2; delta <= 2; delta++) {
      if (delta === 0) continue;
      const altN = n + delta;
      if (altN < 1 || altN > 32) continue;
      const altExpected = Math.pow(2, altN) - 1 - it.decimal;
      if (altExpected >= 0 && userNum === altExpected) {
        return {
          message: `Похоже, ты учёл длину двоичной записи неверно (взял ${altN} бит вместо ${n}). λ — это пустая клетка, она НЕ считается как 0. Длина двоичной записи без ведущих нулей — это длина непустого блока «1…0…», но не дополнительные λ слева или справа.`,
          foundationSkillId: "tape-leading-zeros",
          repairQuestion: repair("tape-leading-zeros"),
          suggestedAction: "Переведи число в двоичную ещё раз и пересчитай длину n; формула: 2^n − 1 − N."
        };
      }
    }
  }

  // 5. Бинарно-десятичная ошибка перевода (общая, для всех бинарных задач)
  // Если userNum совпадает с десятичным значением «двоичного представления исходного числа»,
  // прочитанного наоборот, или ученик ввёл «exp - 1», «exp + 1» — это уже ловится в off-by-one.
  // Ловим: ученик вернул битовое представление exp как десятичное — это «забыл шаг 3 пайплайна».
  // (Уже частично закрыто веткой 2.) Добавим симметричную: вернул бинарное представление исходного.
  if (it.decimal != null && q.target === "final_decimal_number") {
    const expBin = decToBin(exp);
    const decBin = decToBin(it.decimal);
    if (String(userNum) === expBin || String(userNum) === decBin) {
      // Уже покрыто веткой 2 для expBin; здесь пусть и для decBin тоже
      // (но не дублируем сообщение, ветка 2 уже сработала бы для expBin)
    }
  }

  // 6. Off-by-one
  if (Math.abs(userNum - exp) === 1) {
    let skill = "ans-target-type";
    let msg = "Ответ отличается ровно на 1. Это типичная ошибка ±1 — проверь, входит ли крайний символ в хвост/префикс и правильно ли учтена единственная «переключённая» единица.";
    if (pat === "right-tail-zeros") { skill = "pattern-right-tail-zeros"; msg = "Ответ на 1 не совпадает. В формуле K = Z − t + 1 легко забыть «+1» от единицы, ставшей нулём, или, наоборот, учесть её дважды."; }
    if (pat === "left-prefix-ones") { skill = "pattern-left-prefix-ones"; msg = "Ответ на 1 не совпадает. Проверь: первый ноль после префикса становится единицей (минус один ноль), а все единицы префикса — нулями (плюс c1 нулей)."; }
    if (pat === "binary-decrement") { skill = "pattern-binary-decrement"; msg = "Ответ на 1 не совпадает. Эта программа = вычитание 1; ответ должен быть N − 1."; }
    return { message: msg, foundationSkillId: skill, repairQuestion: repair(skill), suggestedAction: "Прогони задачу в режиме «Веди меня по шагам» — он переведёт формулу в конкретные числа." };
  }

  // 7. Перевернутый min/max
  if (pat === "right-tail-zeros" && q.mode === "max" && q.target === "final_count" && it.count0 != null) {
    if (userNum === 1) {
      return {
        message: "Похоже, ты посчитал минимум (K = 1) вместо максимума. В задаче спрашивают наибольшее число нулей после работы.",
        foundationSkillId: "ans-target-type",
        repairQuestion: repair("ans-target-type"),
        suggestedAction: "Перечитай первую строку условия — найди слова «максимум» или «минимум»."
      };
    }
  }
  if (pat === "right-tail-zeros" && q.mode === "min" && q.target === "final_count" && it.count0 != null) {
    if (userNum === it.count0 + 1) {
      return {
        message: "Похоже, ты посчитал максимум (c0 + 1) вместо минимума. Для минимума хвост нулей нужно сделать максимально длинным.",
        foundationSkillId: "ans-target-type",
        repairQuestion: repair("ans-target-type"),
        suggestedAction: "Перечитай: спрашивают минимум или максимум?"
      };
    }
  }

  // 8. Ведущий ноль / удвоение или половина (бинарная масштабная ошибка)
  if (it.decimal != null && q.target === "final_decimal_number") {
    if (userNum === exp * 2 || (exp % 2 === 0 && userNum === exp / 2)) {
      return {
        message: "Похоже, ты ошибся в длине двоичной записи на один бит (потерял или добавил ведущий ноль). В двоичной записи без ведущих нулей первый символ — единица.",
        foundationSkillId: "tape-leading-zeros",
        repairQuestion: repair("tape-leading-zeros"),
        suggestedAction: "Переведи число в двоичную ещё раз и сравни длину: должна быть ⌊log₂N⌋ + 1."
      };
    }
  }

  // 9. Далеко, но не слишком далеко
  if (Math.abs(userNum - exp) > 1 && Math.abs(userNum - exp) <= 10) {
    return {
      message: "Ответ далеко от ожидаемого. Попробуй сначала на короткой строке (например, 1011 или 11000): прогони пошагово, выпиши ленту до и после, и только потом возвращайся к большому случаю.",
      foundationSkillId: "trace-step-by-step",
      repairQuestion: repair("trace-step-by-step"),
      suggestedAction: "Используй симулятор на короткой строке."
    };
  }

  return {
    message: "Не сходится. Не торопись с ответом — открой «Веди меня по шагам», там разбор по шагам с проверкой.",
    foundationSkillId: "trace-before-after",
    repairQuestion: repair("trace-before-after"),
    suggestedAction: "Открой раздел «Что нужно найти?» и пройди гайд."
  };
}

/* ============================================================
   ПРОГРЕСС / РЕЖИМЫ / LOCALSTORAGE
   ============================================================ */
const PROGRESS_KEYS = {
  progress: "turingTrainer.progress",
  mistakes: "turingTrainer.mistakes",
  foundation: "turingTrainer.foundationProgress",
  settings: "turingTrainer.settings",
  streak: "turingTrainer.streak"
};
const ProgressStore = (function () {
  function safeGet(k, fb) {
    try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : fb; } catch (e) { return fb; }
  }
  function safeSet(k, v) {
    try { localStorage.setItem(k, JSON.stringify(v)); return true; } catch (e) { return false; }
  }
  function today() { return new Date().toISOString().slice(0, 10); }

  function getProgress() {
    return safeGet(PROGRESS_KEYS.progress, { solved: {}, attempted: {}, solvedNoGuide: {}, usedGuide: {} });
  }
  function getMistakes() { return safeGet(PROGRESS_KEYS.mistakes, []); }
  function getFoundation() { return safeGet(PROGRESS_KEYS.foundation, { correct: {}, wrong: {} }); }
  function getSettings() { return safeGet(PROGRESS_KEYS.settings, { mode: "study" }); } // study | practice | control
  function getStreak() {
    const s = safeGet(PROGRESS_KEYS.streak, { lastDay: null, days: 0, todaySolved: 0, dailyGoal: 3 });
    if (s.lastDay !== today()) s.todaySolved = 0;
    return s;
  }

  return {
    today,
    getProgress, getMistakes, getFoundation, getSettings, getStreak,

    markAttempt(taskId) {
      const p = getProgress(); p.attempted[taskId] = (p.attempted[taskId] || 0) + 1; safeSet(PROGRESS_KEYS.progress, p);
    },
    markSolved(taskId, opts) {
      const p = getProgress();
      p.solved[taskId] = (p.solved[taskId] || 0) + 1;
      if (opts && opts.withoutGuide) p.solvedNoGuide[taskId] = (p.solvedNoGuide[taskId] || 0) + 1;
      if (opts && opts.usedGuide) p.usedGuide[taskId] = (p.usedGuide[taskId] || 0) + 1;
      safeSet(PROGRESS_KEYS.progress, p);
      // streak
      const s = getStreak();
      const t = today();
      if (s.lastDay !== t) {
        // если вчера не решал, обнуляем серию
        const y = new Date(); y.setDate(y.getDate() - 1);
        const yy = y.toISOString().slice(0, 10);
        s.days = (s.lastDay === yy) ? (s.days + 1) : 1;
        s.lastDay = t; s.todaySolved = 0;
      }
      s.todaySolved += 1;
      safeSet(PROGRESS_KEYS.streak, s);
    },
    markMistake(taskId, tag) {
      const m = getMistakes();
      m.push({ taskId, tag, when: new Date().toISOString() });
      // не больше 200 записей
      while (m.length > 200) m.shift();
      safeSet(PROGRESS_KEYS.mistakes, m);
    },
    markFoundation(skillId, correct) {
      const f = getFoundation();
      const bucket = correct ? f.correct : f.wrong;
      bucket[skillId] = (bucket[skillId] || 0) + 1;
      safeSet(PROGRESS_KEYS.foundation, f);
    },
    setSetting(key, value) {
      const s = getSettings(); s[key] = value; safeSet(PROGRESS_KEYS.settings, s);
    },
    setDailyGoal(n) {
      const s = getStreak(); s.dailyGoal = n; safeSet(PROGRESS_KEYS.streak, s);
    },
    weakFoundationSkills(limit) {
      const f = getFoundation();
      const ids = new Set(Object.keys(f.wrong));
      const result = [];
      for (const id of ids) {
        const wrong = f.wrong[id] || 0, correct = f.correct[id] || 0;
        if (wrong > correct) result.push({ id, wrong, correct });
      }
      result.sort((a, b) => (b.wrong - b.correct) - (a.wrong - a.correct));
      return result.slice(0, limit || 3);
    },
    reset() {
      for (const k of Object.values(PROGRESS_KEYS)) {
        try { localStorage.removeItem(k); } catch (e) {}
      }
    }
  };
})();

/* ============================================================
   Рендер таблицы программы из объекта
   ============================================================ */
/**
 * Рендер таблицы программы.
 * Если переданы activeState/activeSymbol — соответствующие строка и столбец подсвечиваются,
 * а ячейка на их пересечении получает класс cell-active.
 * Каждая ячейка получает data-state/data-symbol, чтобы внешний код мог навесить клики.
 */
function renderProgramTable(program, alphabet, states, blankSymbol = LAMBDA, opts = {}) {
  const activeState = opts.activeState || null;
  const activeSymbol = opts.activeSymbol == null ? null : opts.activeSymbol;
  const headerCells = alphabet.map(sym => {
    const label = sym === blankSymbol ? `<span class="lambda">${escapeHTML(sym)}</span>` : escapeHTML(sym);
    const cls = (sym === activeSymbol) ? "col-active" : "";
    return `<th class="${cls}" data-col-symbol="${escapeHTML(sym)}">${label}</th>`;
  }).join("");

  const bodyRows = states.map(st => {
    const row = program[st] || {};
    const rowActive = (st === activeState);
    const cells = alphabet.map(sym => {
      const cmd = row[sym];
      const colActive = (sym === activeSymbol);
      const cellActive = rowActive && colActive;
      const symAttr = `data-state="${escapeHTML(st)}" data-symbol="${escapeHTML(sym)}"`;
      if (!cmd) {
        return `<td class="empty cmd-cell${colActive ? " col-active" : ""}${cellActive ? " cell-active" : ""}" ${symAttr}>—</td>`;
      }
      const writeStr = cmd.write === blankSymbol ? "λ" : cmd.write;
      const classes = "cmd-cell" + (colActive ? " col-active" : "") + (cellActive ? " cell-active" : "");
      return `<td class="${classes}" ${symAttr}>${escapeHTML(writeStr)}, ${escapeHTML(cmd.move)}, ${escapeHTML(cmd.next)}</td>`;
    }).join("");
    return `<tr class="${rowActive ? "row-active" : ""}"><th class="state-cell" data-state="${escapeHTML(st)}">${escapeHTML(st)}</th>${cells}</tr>`;
  }).join("");

  return `<div class="program-table-wrap">
    <table class="program">
      <thead><tr><th>состояние</th>${headerCells}</tr></thead>
      <tbody>${bodyRows}</tbody>
    </table>
  </div>`;
}

/** Объяснение одной команды человеческим языком. Возвращает HTML карточки. */
function explainProgramCellHTML(program, state, symbol, blankSymbol = LAMBDA) {
  const row = program[state] || {};
  const cmd = row[symbol];
  const symLabel = symbol === blankSymbol ? "λ (пустая клетка)" : symbol;

      </div>
    `;
  }
  const writeStr = cmd.write === blankSymbol ? "λ" : cmd.write;
  const moveWord = { L: "L = сдвинуть головку влево", R: "R = сдвинуть головку вправо", S: "S = головка остаётся на месте" }[cmd.move] || cmd.move;
  return `

      <div class="row"><span class="key">Символ под головкой:</span> <code>${escapeHTML(symLabel)}</code></div>
      <div class="row"><span class="key">Записать в клетку:</span> <code>${escapeHTML(writeStr)}</code>${cmd.write === symbol ? ' <span class="muted small">(тот же символ — клетка не меняется)</span>' : ''}</div>
      <div class="row"><span class="key">Сдвиг головки:</span> <code>${escapeHTML(cmd.move)}</code> — ${escapeHTML(moveWord.slice(moveWord.indexOf("=") + 1).trim())}</div>
      <div class="row"><span class="key">Новое состояние:</span> <code>${escapeHTML(cmd.next)}</code>${cmd.next === state ? ' <span class="muted small">(остаёмся в том же состоянии)</span>' : ''}</div>

}

/** Навешивает обработчики клика на ячейки таблицы программы.
 *  hostEl — DOM-узел, содержащий .program таблицу.
 *  explainHostEl — куда отрисовывать карточку объяснения.
 */
function wireProgramTableClicks(hostEl, program, blankSymbol, explainHostEl) {
  if (!hostEl || !explainHostEl) return;
  // Снимем «explained»-маркер с предыдущих ячеек
  hostEl.querySelectorAll(".cmd-cell.explained").forEach(c => c.classList.remove("explained"));
  hostEl.querySelectorAll(".cmd-cell").forEach(td => {
    td.addEventListener("click", () => {
      const state = td.getAttribute("data-state");
      const symbol = td.getAttribute("data-symbol");
      hostEl.querySelectorAll(".cmd-cell.explained").forEach(c => c.classList.remove("explained"));
      td.classList.add("explained");
      explainHostEl.innerHTML = explainProgramCellHTML(program, state, symbol, blankSymbol);
    });
  });
  // Клики по строке состояния — тоже объясняем (первая клетка строки)
  hostEl.querySelectorAll(".state-cell").forEach(th => {
    th.addEventListener("click", () => {

      explainHostEl.innerHTML = `

          <p>Это одна из «фаз» работы машины. В этой строке показано, что машина делает, когда видит каждый из символов алфавита, находясь в состоянии <code>${escapeHTML(state)}</code>.</p>

        </div>

}

/* ============================================================
   Формульные решения для задач без явного входа
   (для тех 5 задач, где вход — это множество строк с заданным
    составом, и ответ — экстремум по этому множеству).
   ============================================================ */
function formulaSolveTask(task) {
  const t = task.taskType;
  if (t === "right_tail_zero_flip_find_max_initial_zeros") {
    const N = task.initialTape.length;
    const K = task.question.givenFinalCount;
    if (K === 0) return N;
    return N - 1;
  }
  if (t === "right_tail_zero_flip_find_max_final_zeros") {
    const c0 = task.initialTape.count0, c1 = task.initialTape.count1;
    if (c1 === 0) return c0; // вся строка из нулей — машина их съест, останется 0; ответ для max final 0 это 0
    return c0 + 1;
  }
  if (t === "right_tail_zero_flip_find_min_final_zeros") {
    const c0 = task.initialTape.count0, c1 = task.initialTape.count1;
    if (c1 === 0) return 0;       // вся из нулей → все стали единицами
    return 1;                     // хвост t = c0, K = c0 − c0 + 1 = 1
  }
  if (t === "left_prefix_ones_flip_find_max_final_zeros") {
    const c0 = task.initialTape.count0, c1 = task.initialTape.count1;
    if (c0 === 0) return c1;      // все единицы → все стали нулями
    return c0 + c1 - 1;
  }
  if (t === "left_prefix_ones_flip_find_min_final_zeros") {
    const c0 = task.initialTape.count0, c1 = task.initialTape.count1;
    if (c0 === 0) return c1;
    return c0 - 1;
  }
  return null;
}

/* Для бинарных задач прямой вычислитель через симуляцию. */
function binarySolveTask(task) {
  if (task.initialTape.form !== "binary_number") return null;
  const dec = task.initialTape.decimal;
  const bin = decToBin(dec);
  const r = simulateOnce(bin, task.initialTape.headStart, task.program, task.startState, task.blankSymbol);
  if (!r.ok) return null;
  const finalBin = r.finalTape;
  if (!/^[01]+$/.test(finalBin)) return null;
  return binToDec(finalBin);
}

/** Получить ответ к задаче (универсально). */
function computeTaskAnswer(task) {
  if (task.question.target === "final_decimal_number") return binarySolveTask(task);
  if (task.question.target === "initial_count" || task.question.target === "final_count") {
    return formulaSolveTask(task);
  }
  return null;
}

/* ============================================================
   Текстовые описания задач (структурные, не цитата официального
   условия) — собираем из полей initialTape/question
   ============================================================ */
function describeTask(task) {
  const it = task.initialTape;
  const q = task.question;
  const hs = headStartLabel(it.headStart);

  if (it.form === "binary_string") {
    const parts = [];
    parts.push(`На ленте записана последовательность из <code>N = ${it.length}</code> символов, среди которых только нули и единицы.`);
    if (it.count0 != null && it.count1 != null) {
      parts.push(`Из них <code>${it.count0}</code> ${zeroWord(it.count0)} и <code>${it.count1}</code> единиц в произвольном порядке.`);
    }
    parts.push(`Ячейки слева и справа от последовательности заполнены пустыми символами <code class="lambda">λ</code>. Головка стартует ${hs}.`);
    if (q.target === "initial_count" && q.givenFinalCount != null) {
      parts.push(`После выполнения программы на ленте осталось ровно <code>${q.givenFinalCount}</code> ${zeroWord(q.givenFinalCount)}.`);
      parts.push(`<b>Определите ${q.mode === "max" ? "максимально" : "минимально"} возможное число нулей в исходной последовательности.</b>`);
    } else if (q.target === "final_count") {
      parts.push(`<b>Определите ${q.mode === "max" ? "максимально" : "минимально"} возможное число нулей после выполнения программы.</b>`);
    }
    return parts.join(" ");
  }
  if (it.form === "binary_number") {
    const parts = [];
    parts.push(`На ленте записано число <code>${it.decimal}</code> в двоичной системе счисления, без ведущих нулей.`);
    parts.push(`Ячейки слева и справа от записи заполнены пустыми символами <code class="lambda">λ</code>. Головка стартует ${hs}.`);
    parts.push(`<b>Определите десятичное значение числа, которое окажется на ленте после выполнения программы.</b>`);
    return parts.join(" ");
  }
  return "Условие задачи временно недоступно.";
}

function exampleInputForTask(task) {
  // Короткие демонстрационные входы для запуска симуляции в задаче из библиотеки
  const t = task.taskType;
  if (t.startsWith("right_tail_zero_flip")) return ["1100100", "1011", "10110", "0000"];
  if (t.startsWith("left_prefix_ones_flip") || t === "left_prefix_ones_to_zeros_then_zero_to_one_decimal_result")
    return ["1100100", "11110", "010101", "1111"];
  if (t === "bitwise_inversion_decimal_result") return ["1011", "10101", "1100", "10000"];
  if (t === "binary_decrement_decimal_result") return ["10000", "1011", "1100", "11"];
  if (t === "clear_lowest_one_decimal_result") return ["10010110", "1100", "100", "111"];
  if (t === "clear_first_left_one_decimal_result") return ["1100011", "1010", "111", "1001"];
  if (t === "left_first_zero_to_one_decimal_result") return ["1111001", "10101", "1110", "111"];
  return ["1011", "1100", "1001"];
}

  { N: 333,  K: 120, mode: "max", answer: 332 },
  { N: 520,  K: 125, mode: "min", answer: 124 },
  { N: 1300, K: 343, mode: "max", answer: 1299 }
];
let currentRTTask = null;
let rtSimState = null;
let guideStep = 0;
let tailDrill = null;
let formulaDrill = null;

let maxDrill = null;

function rtProgramTableHTML() {
  return renderProgramTable(PROG_right_invert_first1, [LAMBDA, "1", "0"], ["q0", "q1"]);
}

function rtSolveTask(N, K, mode) {
  if (!Number.isInteger(N) || N <= 0) return { ok: false, error: "N должно быть целым положительным числом" };
  if (!Number.isInteger(K)) return { ok: false, error: "K должно быть целым числом" };
  if (K < 0 || K > N) return { ok: false, error: "K должно лежать в диапазоне от 0 до " + N };
  if (mode !== "min" && mode !== "max") return { ok: false, error: 'Режим должен быть "min" или "max"' };
  if (K === 0) return { ok: true, answer: N };
  if (mode === "min") return { ok: true, answer: K - 1 };
  return { ok: true, answer: N - 1 };
}

function rtSimulate(input) {
  if (typeof input !== "string" || !/^[01]+$/.test(input)) return { ok: false, error: "Строка должна состоять только из 0 и 1, минимум 1 символ" };
  return simulateOnce(input, "nearest_blank_right", PROG_right_invert_first1);
}

function modeLabel(m) { return m === "max" ? "максимальное" : "минимальное"; }

function rtSetTask(N, K, mode) {
  const r = rtSolveTask(N, K, mode);
  if (!r.ok) return r;
  currentRTTask = { N, K, mode, answer: r.answer, attempts: 0, hintLevel: 0, revealed: false };
  rtRenderTask();
  document.getElementById("user-answer").value = "";
  rtHideFeedback();
  rtHideSolution();
  document.getElementById("current-task-card").scrollIntoView({ behavior: "smooth", block: "start" });
  return { ok: true };
}

function rtRenderTask() {
  const box = document.getElementById("task-box");
  if (!currentRTTask) {
    box.innerHTML = '<p class="task-empty">Задача ещё не выбрана. Сгенерируйте новую, загрузите готовую или задайте параметры вручную.</p>';
    return;
  }
  const { N, K, mode } = currentRTTask;
  box.innerHTML = `
    <p>На ленте записана последовательность из <code>N = ${N}</code> символов (только нули и единицы).
    Ячейки слева и справа от последовательности заполнены пустыми символами <code class="lambda">λ</code>.
    Головка стартует в ближайшей справа пустой ячейке.</p>
    <p>Программа работы исполнителя:</p>
    <div class="task-program">${rtProgramTableHTML()}</div>
    <p>После выполнения программы на ленте осталось ровно <code>K = ${K}</code> ${zeroWord(K)}.</p>
    <p><b>Определите ${modeLabel(mode)} возможное число нулей в исходной последовательности.</b></p>
  `;
}
function rtHideFeedback() { const fb = document.getElementById("feedback"); fb.className = "feedback"; fb.textContent = ""; }
function rtShowFeedback(kind, html) { const fb = document.getElementById("feedback"); fb.className = "feedback show " + kind; fb.innerHTML = html; }
function rtHideSolution() { const s = document.getElementById("solution"); s.hidden = true; s.innerHTML = ""; }

function rtTieredHints(task) {
  if (task.K === 0) return [
    "Сначала проверь особый случай: после работы нулей не осталось.",
    "Такое происходит, когда машина шла влево по нулям и встретила пустую ячейку слева, то есть исходная строка была вся из нулей.",
    `Значит, исходных нулей было ровно N = ${task.N}.`
  ];
  if (task.mode === "min") return [
    "Для минимума нужно сделать хвост нулей справа как можно короче.",
    "Самый короткий хвост нулей — t = 0: строка заканчивается единицей.",
    `Тогда Z = K − 1 = ${task.K} − 1.`
  ];
  return [
    "Для максимума нужно сделать исходную строку почти полностью нулевой.",
    "Оставь в исходной строке всего одну единицу, остальные символы сделай нулями.",
    `Тогда Z = N − 1 = ${task.N} − 1.`
  ];
}

function rtHandleCheck() {
  if (!currentRTTask) { rtShowFeedback("err", "Сначала выберите задачу."); return; }
  const raw = document.getElementById("user-answer").value.trim();
  if (raw === "") { rtShowFeedback("err", "Введите число."); return; }
  const v = Number(raw);
  if (!Number.isInteger(v)) { rtShowFeedback("err", "Ответ должен быть целым числом."); return; }
  if (v === currentRTTask.answer) {
    rtShowFeedback("ok", `Верно. Ответ: <b>${currentRTTask.answer}</b>. Главное — правый хвост строки.`);
    return;
  }
  currentRTTask.attempts++;
  const hints = rtTieredHints(currentRTTask);
  const idx = Math.min(currentRTTask.attempts - 1, hints.length - 1);
  currentRTTask.hintLevel = Math.max(currentRTTask.hintLevel, idx + 1);
  if (currentRTTask.attempts >= 3)
    rtShowFeedback("err", `Не получилось с третьей попытки. Ответ: <b>${currentRTTask.answer}</b>.<br><span class="small">${hints[idx]}</span>`);
  else
    rtShowFeedback("hint", `Пока не сходится. Подсказка ${idx + 1}: ${hints[idx]}<br><span class="small">Попробуйте ещё раз.</span>`);
}
function rtHandleHint() {
  if (!currentRTTask) { rtShowFeedback("err", "Сначала выберите задачу."); return; }
  const hints = rtTieredHints(currentRTTask);
  const idx = Math.min(currentRTTask.hintLevel, hints.length - 1);
  currentRTTask.hintLevel = Math.min(currentRTTask.hintLevel + 1, hints.length);
  rtShowFeedback("hint", `Подсказка ${idx + 1}: ${hints[idx]}`);
}
function rtHandleReveal() {
  if (!currentRTTask) { rtShowFeedback("err", "Сначала выберите задачу."); return; }
  currentRTTask.revealed = true;
  rtShowFeedback("err", `Ответ: <b>${currentRTTask.answer}</b>. Откройте «Показать решение», чтобы понять, откуда он берётся.`);
}
function rtBuildExampleStr(N, K, mode) {
  const SHORT = 30;
  if (K === 0) return N <= SHORT ? "0".repeat(N) : `0 × ${N}  (строка из ${N} нулей подряд)`;
  if (mode === "min") {
    const zeros = K - 1, ones = N - K + 1;
    if (N <= SHORT) return "0".repeat(zeros) + "1".repeat(ones);
    const parts = []; if (zeros > 0) parts.push(`0 × ${zeros}`); parts.push(`1 × ${ones}`);
    return parts.join(", затем ") + `  (всего ${N} символов, ${zeros} нулей)`;
  }
  const left = K - 1, right = N - K;
  if (N <= SHORT) return "0".repeat(left) + "1" + "0".repeat(right);
  const parts = []; if (left > 0) parts.push(`0 × ${left}`); parts.push("1"); if (right > 0) parts.push(`0 × ${right}`);
  return parts.join(", затем ") + `  (всего ${N} символов, ${N - 1} нулей)`;
}
function rtBuildSolutionHTML(task) {
  const { N, K, mode } = task, ans = task.answer;
  const example = rtBuildExampleStr(N, K, mode);
  const parts = [];
  parts.push(`<h3>1. Смотрим на правый край строки</h3>
    <p>Головка стартует справа от строки, в <code>q0</code> делает шаг влево и попадает на последний символ.
    В <code>q1</code>: каждый <code>0</code> справа становится <code>1</code>, а первая <code>1</code> становится <code>0</code> и машина останавливается.</p>`);
  parts.push(`<h3>2. Хвост нулей</h3>
    <p>Пусть <code>t</code> — нули в самом конце. Если справа был <code>1 0<sup>t</sup></code>, он станет <code>0 1<sup>t</sup></code>.</p>`);
  parts.push(`<h3>3. Формула</h3>
    <p><span class="formula">K = Z − t + 1</span>, откуда <span class="formula">Z = K + t − 1</span>.</p>`);
  parts.push(`<h3>4. Особый случай</h3>
    <p>Если строка из одних нулей, машина заменит все нули на единицы. <code>K = 0</code> и исходных нулей было ровно <code>N</code>.</p>`);
  parts.push(`<h3>5. Решаем эту задачу</h3>
    <p>Дано: <code>N = ${N}</code>, <code>K = ${K}</code>. Найти ${modeLabel(mode)} число нулей в исходной строке.</p>`);
  if (K === 0) parts.push(`<p>Особый случай: ответ <span class="formula">Z = N = ${ans}</span>.</p>`);
  else if (mode === "min") parts.push(`<p>Берём <code>t = 0</code>. <span class="formula">Z<sub>min</sub> = K − 1 = ${ans}</span></p>`);
  else parts.push(`<p>Оставляем одну единицу. <span class="formula">Z<sub>max</sub> = N − 1 = ${ans}</span></p>`);
  parts.push(`<h3>Пример исходной строки</h3><p><code class="mono">${escapeHTML(example)}</code></p>`);
  return parts.join("\n");
}

/* Хвост-дрилл */
function rtMakeTailString() {
  const k = Math.random(), len = randInt(4, 9);
  if (k < 0.18) return "0".repeat(len);
  if (k < 0.38) return Array.from({ length: len - 1 }, () => Math.random() < 0.45 ? "0" : "1").join("") + "1";
  const t = randInt(1, Math.min(5, len - 1));
  let prefix = Array.from({ length: len - t }, () => Math.random() < 0.45 ? "0" : "1").join("");
  if (!prefix.includes("1")) prefix = "1" + prefix.slice(1);
  return prefix + "0".repeat(t);
}
function rtHighlightTail(s) {
  const t = countTrailingZeros(s);
  if (t === 0) return escapeHTML(s);
  return `${escapeHTML(s.slice(0, -t))}<span class="trail-mark">${escapeHTML(s.slice(-t))}</span>`;
}
function rtNewTailDrill() {
  const s = rtMakeTailString();
  tailDrill = { s, t: countTrailingZeros(s) };
  document.getElementById("tail-string").innerHTML = escapeHTML(s);
  document.getElementById("tail-answer").value = "";
  const fb = document.getElementById("tail-feedback"); fb.className = "feedback"; fb.innerHTML = "";
}
function rtCheckTailDrill() {
  if (!tailDrill) rtNewTailDrill();
  const raw = document.getElementById("tail-answer").value.trim();
  const fb = document.getElementById("tail-feedback");
  if (raw === "" || !Number.isInteger(Number(raw))) { fb.className = "feedback show err"; fb.textContent = "Введите целое число."; return; }
  const v = Number(raw);
  const special = tailDrill.t === tailDrill.s.length ? " Это ещё и особый случай: вся строка состоит из нулей." : "";
  if (v === tailDrill.t) {
    fb.className = "feedback show ok";
    fb.innerHTML = `Верно: <code>t = ${tailDrill.t}</code>.${special}<br>Хвост: <span class="mono">${rtHighlightTail(tailDrill.s)}</span>`;
  } else {
    fb.className = "feedback show hint";
    fb.innerHTML = `Пока нет. Считай нули с правого края до первой единицы. Хвост: <span class="mono">${rtHighlightTail(tailDrill.s)}</span>`;
  }
}

/* Гид (6 шагов) */
function rtMakeFormulaDrill() {
  const samples = ["101000", "1000", "110100", "10110", "1111", "01000"];
  const s = samples[randInt(0, samples.length - 1)];
  const sim = rtSimulate(s);
  return { s, Z: countChar(s, "0"), t: countTrailingZeros(s), K: sim.ok ? countChar(sim.finalTape, "0") : 0, final: sim.ok ? sim.finalTape : "" };
}

function rtInitSim(input) {
  if (typeof input !== "string" || !/^[01]+$/.test(input)) return { ok: false, error: "Строка должна состоять только из 0 и 1, минимум 1 символ" };
  if (input.length > 200) return { ok: false, error: "Для симулятора используйте строку до 200 символов" };
  rtSimState = createTMSimulation(input, "nearest_blank_right", "q0");
  return { ok: true };
}
function rtRenderSim() {
  const tapeEl = document.getElementById("tape");
  const infoEl = document.getElementById("tape-info");
  tapeEl.innerHTML = ""; infoEl.innerHTML = "";
  if (!rtSimState) { tapeEl.innerHTML = '<div style="padding: 14px; color: var(--text-dim);">Симуляция не запущена.</div>'; return; }
  const W = 21;
  let dMin = Math.min(rtSimState.minPos, rtSimState.head);
  let dMax = Math.max(rtSimState.maxPos, rtSimState.head);
  const dw = dMax - dMin + 1;
  let viewMin, viewMax;
  if (dw <= W + 4) { viewMin = dMin - 2; viewMax = dMax + 2; }
  else { const half = Math.floor(W / 2); viewMin = rtSimState.head - half; viewMax = rtSimState.head + half; }
  for (let i = viewMin; i <= viewMax; i++) {
    const v = rtSimState.tape.get(i) ?? LAMBDA;
    const cell = document.createElement("div");
    cell.className = "cell" + (v === LAMBDA ? " lambda-cell" : "") + (i === rtSimState.head ? " head" : "");
    cell.textContent = v;
    const pos = document.createElement("span"); pos.className = "pos"; pos.textContent = i;
    cell.appendChild(pos); tapeEl.appendChild(cell);
  }
  const cmdText = rtSimState.lastCommand
    ? `${rtSimState.lastCommand.fromState}, ${rtSimState.lastCommand.fromSymbol} → ${rtSimState.lastCommand.write}, ${rtSimState.lastCommand.move}, ${rtSimState.lastCommand.next}`
    : "—";
  const status = rtSimState.finished ? "остановлена" : "работает";
  let finalInfo = "";
  if (rtSimState.finished) {
    const f = readFinalTape(rtSimState);
    finalInfo = `<span class="kv"><b>Итоговая строка:</b> <code class="mono">${f || LAMBDA}</code></span><span class="kv"><b>Нулей:</b> ${countChar(f, "0")}</span>`;
  }
  infoEl.innerHTML = `<span class="kv"><b>Шаг:</b> ${rtSimState.step}</span>
    <span class="kv"><b>Состояние:</b> <code>${rtSimState.state}</code></span>
    <span class="kv"><b>Позиция головки:</b> ${rtSimState.head}</span>
    <span class="kv"><b>Под головкой:</b> <code class="mono">${rtSimState.tape.get(rtSimState.head) ?? LAMBDA}</code></span>
    <span class="kv"><b>Последняя команда:</b> <span class="tape-cmd">${cmdText}</span></span>
    <span class="kv"><b>Статус:</b> ${status}</span>${finalInfo}`;
}

  const k = Math.random(), len = randInt(4, 9);
  if (k < 0.18) return "1".repeat(len);
  if (k < 0.38) return "0" + Array.from({ length: len - 1 }, () => Math.random() < 0.45 ? "0" : "1").join("");
  const ones = randInt(1, Math.min(5, len - 1));
  let suffix = Array.from({ length: len - ones }, () => Math.random() < 0.45 ? "0" : "1").join("");
  if (!suffix.includes("0")) suffix = "0" + suffix.slice(1);
  return "1".repeat(ones) + suffix;

function binProgramOptions() {

    if (seen.has(t.taskType)) return;
    seen.add(t.taskType);
    items.push({ label: MODULE_TITLES[t.moduleSuggested] || t.taskType, taskType: t.taskType, program: t.program, headStart: t.initialTape.headStart, alphabet: t.alphabet, states: t.states });

function binRunPipeline() {
  const sel = document.getElementById("bin-program-select");
  const items = sel._items || binProgramOptions();
  const idx = Number(sel.value);
  const item = items[idx];
  const decRaw = document.getElementById("bin-input-dec").value.trim();
  const out = document.getElementById("bin-pipeline-out");
  out.innerHTML = "";

  if (!p.ok || p.value < 0) { out.innerHTML = `<div class="feedback show err">Введите неотрицательное целое число.</div>`; return; }

  if (!r.ok) { out.innerHTML = `<div class="feedback show err">Симулятор: ${escapeHTML(r.error)}</div>`; return; }
  const finalBin = r.finalTape;
  const finalDec = /^[01]+$/.test(finalBin) ? binToDec(finalBin) : "—";
  out.innerHTML = `
    <div class="soft-box">
      <h4>Шаг 1. Десятичное → двоичное</h4>
      <p><code>${p.value}</code><sub>10</sub> = <code class="mono">${escapeHTML(bin)}</code><sub>2</sub></p>
