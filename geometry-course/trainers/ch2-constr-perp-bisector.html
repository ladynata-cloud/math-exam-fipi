<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Серединный перпендикуляр — циркуль и линейка</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#e8e4db;font-family:system-ui,-apple-system,'Segoe UI',Arial,sans-serif;color:#1f2937;padding:18px}
.app{max-width:980px;margin:auto;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 12px 36px #0002}
.head{background:#1a1a2e;color:#fff;padding:16px 20px;display:flex;gap:12px;align-items:center;justify-content:space-between}
.title{font-size:21px;font-weight:900}
.sub{font-size:13px;opacity:.72;margin-top:2px}
.badge{background:#ffffff22;border:1px solid #ffffff33;border-radius:999px;padding:7px 12px;font-size:13px;font-weight:800;white-space:nowrap}
.back{color:#cbd5e1;text-decoration:none;font-weight:800;font-size:13px}
.back:hover{color:#fff}
.success{display:none;background:#dcfce7;color:#14532d;font-weight:800;padding:10px 20px;font-size:15px;border-bottom:1px solid #bbf7d0}
.main{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:0}
.work{background:#faf8f2;padding:14px;border-right:1px solid #e5e2d9}
canvas{width:100%;height:auto;display:block;border:1px solid #d6d3ca;border-radius:14px;background:#fffdf7;touch-action:none;cursor:crosshair}
.side{padding:14px;display:flex;flex-direction:column;gap:10px}
.card{border:1.5px solid #e5e7eb;border-radius:12px;padding:12px;background:#f9fafb}
.card h2{margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:#64748b}
.task{font-size:16px;line-height:1.5}
.task b{color:#1a1a2e}
.steps{font-size:13px;color:#64748b;font-weight:800;margin-top:8px}
.msg{border-radius:12px;padding:12px;font-size:15px;font-weight:750;line-height:1.42}
.info{background:#eff6ff;color:#1d4ed8}
.ok{background:#f0fdf4;color:#15803d}
.err{background:#fef2f2;color:#b91c1c}
.why{display:none;background:#fffbeb;border:1.5px solid #fcd34d;border-radius:12px;padding:12px;font-size:14px;line-height:1.5;color:#374151}
.why b{color:#b45309}
.law{display:none;background:#ecfdf5;border:1.5px solid #bbf7d0;border-radius:12px;padding:14px;font-size:14.5px;line-height:1.55;color:#14532d}
.law b{color:#166534}
.law .nb{margin-top:8px;color:#334155}
.law .bridge{margin-top:10px;color:#475569}
.law .bridge a{color:#b45309;font-weight:800;text-decoration:none}
.bar{display:flex;gap:8px;flex-wrap:wrap;padding:12px 14px;background:#f9fafb;border-top:1px solid #e5e7eb;align-items:center}
button.tool{border:1.5px solid #d1d5db;border-radius:9px;background:#fff;color:#374151;padding:9px 14px;font:800 14px system-ui;cursor:pointer}
button.tool:hover{background:#f3f4f6}
button.tool.active{border-color:#2d70b3;background:#eaf2fb;color:#1d4ed8}
.spacer{flex:1}
.next{display:none;background:#16a34a;color:#fff;border-color:#16a34a;margin-top:4px}
.next:hover{background:#15803d}
@media(max-width:820px){
  body{padding:8px}.main{grid-template-columns:1fr}
  .work{border-right:0;border-bottom:1px solid #e5e2d9}
  .head{flex-direction:column;align-items:flex-start}.side{padding:12px}
  .bar{position:sticky;bottom:0}
}
</style>
</head>
<body>
<div class="app">
  <div class="head">
    <div>
      <div class="title">📐 Серединный перпендикуляр</div>
      <div class="sub">Глава II · построения · циркуль и линейка</div>
    </div>
    <div style="display:flex;gap:12px;align-items:center">
      <div class="badge" id="badge">Циркуль и линейка</div>
      <a class="back" href="../index.html">← к списку</a>
    </div>
  </div>
  <div class="success" id="successBar"></div>

  <div class="main" id="mainArea">
    <div class="work">
      <canvas id="cv" width="640" height="460"></canvas>
    </div>
    <aside class="side">
      <div class="card" id="taskCard">
        <h2 id="taskTtl">Задача</h2>
        <div class="task" id="taskText"></div>
        <div class="steps" id="stepText"></div>
      </div>
      <div id="msg" class="msg info"></div>
      <div id="why" class="why"></div>
      <button class="tool next" id="proofBtn" onclick="proofNext()">Дальше →</button>
      <div id="law" class="law"></div>
    </aside>
  </div>

  <div class="bar" id="bar">
    <button class="tool" id="btnCompass" onclick="selectTool('compass')">⊙ Циркуль</button>
    <button class="tool" id="btnLine" onclick="selectTool('line')">／ Линейка</button>
    <span class="spacer"></span>
    <button class="tool" onclick="showHint()">💡 Подсказка</button>
    <button class="tool" onclick="undo()">↶ Отмена</button>
    <button class="tool" onclick="reset()">↺ Сброс</button>
  </div>
</div>

<script>
/* ───────── ПРОГРЕСС / ЖУРНАЛ ───────── */
const SK='mathExamCourseProgress.v1', TID='ch2-constr-perp-bisector';
function lS(){try{const d=JSON.parse(localStorage.getItem(SK)||'{}');return d[TID]||{runs:0,events:[]}}catch{return{runs:0,events:[]}}}
function sS(s){try{const d=JSON.parse(localStorage.getItem(SK)||'{}');d[TID]=s;localStorage.setItem(SK,JSON.stringify(d))}catch{}}
function logE(ev,extra){try{const s=lS();s.events=(s.events||[]);s.events.push({t:Date.now(),e:ev,step,...(extra||{})});if(s.events.length>300)s.events=s.events.slice(-300);sS(s)}catch{}}

/* ───────── ХОЛСТ ───────── */
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const W=640,H=460,PI=Math.PI;
const dpr=Math.min(window.devicePixelRatio||1,2);
cv.width=W*dpr;cv.height=H*dpr;cv.style.aspectRatio=W+'/'+H;ctx.scale(dpr,dpr);
const PULSE=()=>1+0.16*Math.sin(Date.now()/240);

/* ───────── ПАЛИТРА / ПРИМИТИВЫ ───────── */
const COL={DARK:'#1a1a2e',GREY:'#94a3b8',ARC:'#0d9488',LINE:'#2d70b3',G:'#16a34a',PUL:'#7c3aed',A:'#d97706',B:'#db2777'};
function sub(p,q){return{x:p.x-q.x,y:p.y-q.y}}
function nrm(v){const m=Math.hypot(v.x,v.y)||1;return{x:v.x/m,y:v.y/m}}
function hexA(h,a){const n=parseInt(h.slice(1),16);return 'rgba('+(n>>16&255)+','+(n>>8&255)+','+(n&255)+','+a+')';}
function bg(){
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#fffdf7';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#e7e1d2';
  for(let x=20;x<W;x+=25)for(let y=20;y<H;y+=25){ctx.beginPath();ctx.arc(x,y,1.15,0,7);ctx.fill()}
}
function lab(x,y,txt,col,size){
  ctx.font='900 '+(size||16)+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.lineWidth=4;ctx.strokeStyle='rgba(255,253,247,.95)';ctx.strokeText(txt,x,y);
  ctx.fillStyle=col;ctx.fillText(txt,x,y);ctx.textBaseline='alphabetic';
}
function dotF(x,y,r,fill,stroke){ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fillStyle=fill;ctx.fill();if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke()}}
function dotHollow(x,y,r,stroke){ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fillStyle='#fffdf7';ctx.fill();ctx.strokeStyle=stroke;ctx.lineWidth=2.4;ctx.stroke();}
function seg(p,q,col,w,dash){ctx.save();ctx.setLineDash(dash||[]);ctx.strokeStyle=col;ctx.lineWidth=w||2.8;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.stroke();ctx.restore();}
function arcDraw(cx,cy,r,faceAng,col,w,alpha){
  ctx.save();ctx.globalAlpha=alpha==null?0.75:alpha;ctx.strokeStyle=col;ctx.lineWidth=w||1.8;ctx.lineCap='round';
  const half=118*PI/180;
  ctx.beginPath();ctx.arc(cx,cy,r,faceAng-half,faceAng+half);ctx.stroke();ctx.restore();
}
function ring(x,y,r,col){ctx.save();ctx.strokeStyle=col;ctx.lineWidth=2.6;ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.stroke();ctx.restore();}
function rightMark(V,P,Q,col){
  const u=nrm(sub(P,V)),v=nrm(sub(Q,V)),s=14;
  const p1={x:V.x+u.x*s,y:V.y+u.y*s},p3={x:V.x+v.x*s,y:V.y+v.y*s},p2={x:p1.x+v.x*s,y:p1.y+v.y*s};
  ctx.beginPath();ctx.moveTo(V.x,V.y);ctx.lineTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.lineTo(p3.x,p3.y);ctx.closePath();
  ctx.fillStyle=hexA(col,0.18);ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=2.4;ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.lineTo(p3.x,p3.y);ctx.stroke();
}
function tickMark(p,q,n,col){
  const mx=(p.x+q.x)/2,my=(p.y+q.y)/2; let dx=q.x-p.x,dy=q.y-p.y;const L=Math.hypot(dx,dy)||1;dx/=L;dy/=L;
  const nx=-dy,ny=dx;
  for(let i=0;i<n;i++){const off=(i-(n-1)/2)*5,cx=mx+dx*off,cy=my+dy*off;
    ctx.beginPath();ctx.moveTo(cx-nx*5,cy-ny*5);ctx.lineTo(cx+nx*5,cy+ny*5);ctx.strokeStyle=col||COL.DARK;ctx.lineWidth=2;ctx.stroke();}
}

/* ───────── ГЕОМЕТРИЯ (чистая) ───────── */
const EPS=1e-7;
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function interLL(a,b,c,d){
  const den=(a.x-b.x)*(c.y-d.y)-(a.y-b.y)*(c.x-d.x);
  if(Math.abs(den)<EPS) return null;
  const t=((a.x-c.x)*(c.y-d.y)-(a.y-c.y)*(c.x-d.x))/den;
  return {x:a.x+t*(b.x-a.x), y:a.y+t*(b.y-a.y)};
}
function interLC(a,b,O,r){
  const dx=b.x-a.x,dy=b.y-a.y,fx=a.x-O.x,fy=a.y-O.y;
  const A=dx*dx+dy*dy,B=2*(fx*dx+fy*dy),Cc=fx*fx+fy*fy-r*r;
  let dsc=B*B-4*A*Cc; if(dsc<-EPS) return []; dsc=Math.max(dsc,0);
  const s=Math.sqrt(dsc),out=[];
  [(-B-s)/(2*A),(-B+s)/(2*A)].forEach((t,i)=>{ if(i===0||s>EPS) out.push({x:a.x+t*dx,y:a.y+t*dy}); });
  return out;
}
function interCC(O1,r1,O2,r2){
  const d=dist(O1,O2);
  if(d<EPS || d>r1+r2+EPS || d<Math.abs(r1-r2)-EPS) return [];
  const aa=(r1*r1-r2*r2+d*d)/(2*d);
  let h2=r1*r1-aa*aa; if(h2<0) h2=0; const h=Math.sqrt(h2);
  const xm=O1.x+aa*(O2.x-O1.x)/d, ym=O1.y+aa*(O2.y-O1.y)/d;
  const rx=-(O2.y-O1.y)*(h/d), ry=(O2.x-O1.x)*(h/d);
  return h<EPS ? [{x:xm,y:ym}] : [{x:xm+rx,y:ym+ry},{x:xm-rx,y:ym-ry}];
}

/* ───────── МОДЕЛЬ ───────── */
let P=[], L=[], C=[];           // точки; прямые {a,b,name,kind}; дуги {center,r,faceAng,name}
let pid=0;
const A0={x:180,y:250}, B0={x:460,y:250};
const halfAB=dist(A0,B0)/2, RMAX=215;
function ptByName(n){return P.find(p=>p.name===n);}
function arcByName(n){return C.find(c=>c.name===n);}
function addPtXY(x,y,kind,name){P.push({id:'p'+(pid++),x,y,kind,name});return ptByName(name);}
function addArc(centerName,r,name){
  const c=ptByName(centerName), other=ptByName(centerName==='A'?'B':'A');
  const faceAng=Math.atan2(other.y-c.y, other.x-c.x);
  C.push({center:centerName,r,faceAng,name});
}
function addLine(n1,n2,name,kind){L.push({a:n1,b:n2,name,kind:kind||'line'});}

/* ───────── СОСТОЯНИЕ ───────── */
let step=0, phase='build', proofStep=0, opening=null, tool='compass';
let comp=null, armed=null, lastReject=null, mistakes=0, hints=0;
let undoStack=[], initSnap=null;

function takeSnap(){ return JSON.stringify({P,L,C,opening,step,phase,proofStep,pid}); }
function loadSnap(s){ const o=JSON.parse(s);
  P.length=0;o.P.forEach(p=>P.push(p)); L.length=0;o.L.forEach(l=>L.push(l)); C.length=0;o.C.forEach(c=>C.push(c));
  opening=o.opening; step=o.step; phase=o.phase; proofStep=o.proofStep; pid=o.pid; armed=null; comp=null; lastReject=null;
}
function pushUndo(){ undoStack.push(takeSnap()); }

/* ───────── ПРИВЯЗКА / КООРДИНАТЫ ───────── */
function worldPos(e){ const r=cv.getBoundingClientRect(); const k=Math.max(1,W/r.width); return {x:(e.clientX-r.left)*k, y:(e.clientY-r.top)*k}; }
function pick(w){ const r=cv.getBoundingClientRect(); const k=Math.max(1,W/r.width); const R=28*k; let best=null,bd=R;
  for(const p of P){ const dd=Math.hypot(p.x-w.x,p.y-w.y); if(dd<bd){bd=dd;best=p;} } return best; }

/* ───────── ДЕЙСТВИЯ (общие для мыши и харнесса) ───────── */
function reject(t){ lastReject=t; mistakes++; setMsg(t,'err'); logE('step_reject',{reason:t}); }
function tryArc(centerPt, rGiven, isDrag){
  if(phase!=='build') return;
  let r;
  if(isDrag){ r=rGiven; }                                  // потянули — задаём/меняем раствор
  else { if(opening==null){ reject('Сначала раскрой циркуль: нажми на точку и потяни.'); return; } r=opening; } // тап — тем же раствором
  if(step===0){
    if(!centerPt || centerPt.name!=='A'){ reject('Поставь ножку циркуля в точку A.'); return; }
    if(r<=halfAB+2){ reject('Раствор меньше половины AB — дуги не пересекутся. Раскрой циркуль шире.'); return; }
    const rr=Math.min(r,RMAX);
    pushUndo(); opening=rr; addArc('A',rr,'arcA'); step=1; tool='compass'; lastReject=null;
    setMsg('Дуга из A готова, раствор зафиксирован. Теперь тем же раствором — просто коснись B.','ok');
    logE('draw_arc',{c:'A',r:Math.round(rr)}); updateUI();
  } else if(step===1){
    if(!centerPt || centerPt.name!=='B'){ reject('Вторую дугу проводим из точки B — поставь ножку в B.'); return; }
    const r1=arcByName('arcA').r;
    if(Math.abs(r-r1)>3){ reject('Дуги должны быть одного раствора — не меняй раскрытие циркуля (просто коснись B).'); return; }
    pushUndo(); opening=r1; addArc('B',r1,'arcB');
    const a=arcByName('arcA'), b=arcByName('arcB');
    const hits=interCC(ptByName('A'),a.r, ptByName('B'),b.r);
    hits.sort((u,v)=>u.y-v.y);
    addPtXY(hits[0].x,hits[0].y,'inter','P'); addPtXY(hits[1].x,hits[1].y,'inter','Q');
    step=2; tool='line'; lastReject=null;
    setMsg('Дуги пересеклись в точках P и Q. Возьми линейку и проведи прямую через P и Q.','ok');
    logE('draw_arc',{c:'B'}); updateUI();
  } else { reject('Сейчас нужна линейка: прямая через P и Q.'); }
}
function tryLine(n1,n2){
  if(phase!=='build') return;
  if(step!==2){ reject('Сначала циркулем построй две дуги.'); return; }
  const s=new Set([n1,n2]);
  if(s.has('A')&&s.has('B')){ reject('Это сам отрезок AB. Нужна прямая через точки пересечения дуг — P и Q.'); return; }
  if(!(s.has('P')&&s.has('Q'))){ reject('Соедини обе точки пересечения дуг — P и Q.'); return; }
  pushUndo(); addLine('P','Q','result','line');
  const Pp=ptByName('P'),Qp=ptByName('Q'),Aa=ptByName('A'),Bb=ptByName('B');
  const m=interLL(Pp,Qp,Aa,Bb); addPtXY(m.x,m.y,'built','M');
  phase='proof'; proofStep=0; tool=null; lastReject=null;
  setMsg('Прямая построена. Разберёмся, почему это серединный перпендикуляр.','info');
  logE('draw_line',{a:'P',b:'Q'}); updateUI();
}
function perpBisectorOK(){
  const Pp=ptByName('P'),Qp=ptByName('Q'),Aa=ptByName('A'),Bb=ptByName('B'),M=ptByName('M');
  if(!Pp||!Qp||!M) return false;
  const d1=sub(Qp,Pp), d2=sub(Bb,Aa);
  const cosv=(d1.x*d2.x+d1.y*d2.y)/(Math.hypot(d1.x,d1.y)*Math.hypot(d2.x,d2.y));
  const perp=Math.abs(cosv)<0.02;
  const mid={x:(Aa.x+Bb.x)/2,y:(Aa.y+Bb.y)/2};
  const onMid=Math.hypot(M.x-mid.x,M.y-mid.y)<2;
  return perp && onMid;
}
function proofNext(){
  if(phase==='proof' && proofStep===0){ proofStep=1; updateUI(); logE('proof',{s:1}); }
  else if(phase==='proof' && proofStep===1){ finishNow(); }
}
function finishNow(){
  phase='done'; const s=lS(); s.runs=(s.runs||0)+1; s.passed=true; sS(s);
  logE('finish',{mistakes,hints}); updateUI();
}
function undo(){
  if(phase!=='build') return;
  const s=undoStack.pop(); loadSnap(s||initSnap); setMsg('Шаг отменён.','info'); updateUI();
}
function reset(){
  undoStack=[]; loadSnap(initSnap); mistakes=0; hints=0; setMsg('Холст очищен. Дано: отрезок AB.','info'); updateUI();
}
function showHint(){
  if(phase!=='build') return; hints++; logE('hint');
  const h=['Поставь ножку циркуля в A, нажми и тяни — раскрой шире половины AB, отпусти.',
           'Не меняя раствора, просто коснись точки B — вторая дуга встанет сама.',
           'Возьми линейку и соедини две точки пересечения дуг — P (сверху) и Q (снизу).'][step];
  setMsg('💡 '+h,'info');
}

/* ───────── УКАЗАТЕЛЬ ───────── */
cv.addEventListener('pointerdown',e=>{
  if(phase!=='build') return;
  const w=worldPos(e), p=pick(w);
  if(tool==='compass'){
    if(!p){ reject('Ставь ножку циркуля в точку, не на глаз.'); return; }
    comp={center:p,r:0,active:true}; try{cv.setPointerCapture(e.pointerId)}catch{}
  } else if(tool==='line'){
    if(!p){ reject('Веди прямую через построенные точки, не на глаз.'); return; }
    if(!armed){ armed=p; setMsg('Точка '+(p.name||'')+' выбрана. Теперь вторая.','info'); }
    else { if(p.id!==armed.id) tryLine(armed.name,p.name); armed=null; }
  }
});
cv.addEventListener('pointermove',e=>{ if(comp&&comp.active){ const w=worldPos(e); comp.r=Math.hypot(w.x-comp.center.x,w.y-comp.center.y); } });
cv.addEventListener('pointerup',e=>{
  if(comp&&comp.active){ const c=comp.center, isDrag=comp.r>8, r=comp.r; comp=null; try{cv.releasePointerCapture(e.pointerId)}catch{} tryArc(c,r,isDrag); }
});

/* ───────── ОТРИСОВКА ───────── */
function lineExt(p,q,ext){ const d=nrm(sub(q,p)); return [{x:p.x-d.x*ext,y:p.y-d.y*ext},{x:q.x+d.x*ext,y:q.y+d.y*ext}]; }
function draw(){
  bg();
  const Aa=ptByName('A'),Bb=ptByName('B'),Pp=ptByName('P'),Qp=ptByName('Q'),M=ptByName('M');
  const arcAlpha = phase==='build'?0.8:0.35;
  // дано: отрезок AB
  seg(Aa,Bb,COL.DARK,3);
  // дуги
  C.forEach(c=>{ arcDraw(ptByName(c.center).x,ptByName(c.center).y,c.r,c.faceAng,COL.ARC,1.9,arcAlpha); });
  // живой предпросмотр дуги (тянем циркуль)
  if(comp&&comp.active && step===0){ const rr=Math.min(comp.r,RMAX); arcDraw(comp.center.x,comp.center.y,rr,0,COL.ARC,1.6,0.5); seg(comp.center,{x:comp.center.x+rr,y:comp.center.y},COL.ARC,1.2,[4,4]); }
  // результат-прямая
  const done = phase==='done', proofDone = phase==='proof'&&proofStep===1;
  if(Pp&&Qp && (phase==='proof'||phase==='done')){
    const ext=lineExt(Pp,Qp,46); const col=(proofDone||done)?COL.G:COL.LINE;
    seg(ext[0],ext[1],col,(proofDone||done)?3.4:2.8);
  }
  // доказательство: равные радиусы
  if(phase==='proof'&&proofStep===0&&Pp&&Qp){
    [[Pp,Aa],[Pp,Bb],[Qp,Aa],[Qp,Bb]].forEach(s=>{ seg(s[0],s[1],COL.ARC,1.8); tickMark(s[0],s[1],1,COL.ARC); });
  }
  // доказательство шаг 2 / готово: прямой угол и равные половины
  if(((phase==='proof'&&proofStep===1)||done)&&M&&Pp){
    rightMark(M,Aa,Pp,COL.G);
    tickMark(Aa,M,2,COL.G); tickMark(M,Bb,2,COL.G);
  }
  // точки пересечения
  if(Pp){ const pul=(step===2&&phase==='build'); dotHollow(Pp.x,Pp.y,pul?5*PULSE():4.6,COL.ARC); if(pul) ring(Pp.x,Pp.y,11*PULSE(),COL.PUL); lab(Pp.x+14,Pp.y-6,'P',COL.ARC,15); }
  if(Qp){ const pul=(step===2&&phase==='build'); dotHollow(Qp.x,Qp.y,pul?5*PULSE():4.6,COL.ARC); if(pul) ring(Qp.x,Qp.y,11*PULSE(),COL.PUL); lab(Qp.x+14,Qp.y+10,'Q',COL.ARC,15); }
  // M
  if(M){ dotF(M.x,M.y,4.6,(proofDone||done)?COL.G:COL.LINE); lab(M.x,M.y+18,'M',(proofDone||done)?COL.G:COL.LINE,15); }
  // концы AB
  dotF(Aa.x,Aa.y,4.8,COL.A); lab(Aa.x-15,Aa.y+16,'A',COL.A,16);
  dotF(Bb.x,Bb.y,4.8,COL.B); lab(Bb.x+15,Bb.y+16,'B',COL.B,16);
  // выбранная точка линейки
  if(armed){ ring(armed.x,armed.y,12,COL.PUL); }
  // пульс цели в build
  if(phase==='build'){
    if(step===0) ring(Aa.x,Aa.y,13*PULSE(),COL.PUL);
    else if(step===1) ring(Bb.x,Bb.y,13*PULSE(),COL.PUL);
  }
}

/* ───────── UI ───────── */
function setMsg(t,cls){const el=document.getElementById('msg');el.textContent=t;el.className='msg '+cls;}
const STEP_INSTR=[
  'Раскрой циркуль <b>шире половины</b> AB и проведи дугу из точки <b>A</b> (нажми на A и тяни).',
  'Тем же раствором проведи дугу из точки <b>B</b> — просто коснись B.',
  'Возьми <b>линейку</b> и проведи прямую через две точки пересечения дуг — <b>P</b> и <b>Q</b>.'
];
function selectTool(t){
  if(phase!=='build') return;
  tool=t;
  updateTool();
}
function updateTool(){
  document.getElementById('btnCompass').classList.toggle('active',tool==='compass');
  document.getElementById('btnLine').classList.toggle('active',tool==='line');
}
function updateUI(){
  updateTool();
  const why=document.getElementById('why'), law=document.getElementById('law'), pb=document.getElementById('proofBtn'),
        sc=document.getElementById('taskCard'), succ=document.getElementById('successBar');
  if(phase==='build'){
    sc.style.display=''; why.style.display='none'; law.style.display='none'; pb.style.display='none'; succ.style.display='none';
    document.getElementById('taskTtl').textContent='Задача';
    document.getElementById('taskText').innerHTML='Разделить отрезок <b>AB</b> пополам и провести к нему перпендикуляр через середину — <b>только циркулем и линейкой</b> (без делений, без транспортира).';
    document.getElementById('stepText').innerHTML='Шаг '+(step+1)+' из 3 · '+STEP_INSTR[step];
  } else if(phase==='proof'){
    sc.style.display='none'; why.style.display='block'; pb.style.display='inline-block'; law.style.display='none'; succ.style.display='none';
    if(proofStep===0){ why.innerHTML='<b>Почему это серединный перпендикуляр?</b><br>PA = PB и QA = QB — это радиусы дуг <b>одного раствора</b> (циркуль мы не меняли). Значит точки P и Q одинаково удалены от A и от B.'; pb.textContent='Дальше →'; }
    else { why.innerHTML='Треугольники <b>APQ и BPQ равны</b> по трём сторонам (PA = PB, QA = QB, сторона PQ — общая). Поэтому прямая PQ — <b>ось симметрии</b> отрезка AB: она перпендикулярна AB и делит его пополам, <b>AM = MB</b>. Точка M — середина.'; pb.textContent='Завершить →'; }
  } else { // done
    sc.style.display='none'; why.style.display='none'; pb.style.display='none'; law.style.display='block'; succ.style.display='block';
    succ.textContent='Готово — серединный перпендикуляр построен.';
    law.innerHTML='<b>Закон.</b> Чтобы построить серединный перпендикуляр (и найти середину отрезка): провести <b>две дуги одинакового раствора</b> из концов отрезка и соединить <b>точки их пересечения</b>. Полученная прямая перпендикулярна отрезку и делит его пополам.'+
      '<div class="nb">Решение единственно: серединный перпендикуляр у отрезка один.</div>'+
      '<div class="bridge">Тем же приёмом равных дуг строится <a href="ch2-constr-angle-bisector.html">биссектриса угла</a> — следующий шаг.</div>';
  }
}

/* ───────── СТАРТ ───────── */
addPtXY(A0.x,A0.y,'given','A'); addPtXY(B0.x,B0.y,'given','B'); addLine('A','B','seg','segment');
initSnap=takeSnap();
setMsg('Дано: отрезок AB. Возьми циркуль и начни с дуги из A.','info');
updateUI();
(function loop(){draw();requestAnimationFrame(loop)})();
</script>
