<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Линейка МЦКО — ежедневные задания по математике, 6 класс | MathExam</title>
<meta name="description" content="Ежедневная тренировка по заданиям линейки МЦКО для 6 класса: дневная цель, прогресс ученика и отправка отчёта учителю.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;500;600;700;800&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FCFCFA; --grid:#E6EDF8;
    --ink:#232A3D; --ink-soft:#63708A; --ink-faint:#97A1B5; --line:#E7EAF1;
    --violet:#6C4DF0; --violet-d:#4B2FD6; --violet-soft:#EDE9FE;
    --coral:#F2463A; --coral-soft:#FDE4E1;
    --green:#12A87A; --green-soft:#DBF4EC;
    --amber:#EE8A12; --amber-soft:#FCEBD0;
    --sky:#1C9BDD; --sky-soft:#DBF0FB;
    --card:#FFFFFF;
    --shadow-sm:0 1px 2px rgba(35,42,61,.06),0 2px 6px rgba(35,42,61,.05);
    --shadow-md:0 6px 16px rgba(35,42,61,.08),0 14px 34px rgba(35,42,61,.07);
    --r:18px;
    --fb:'Nunito',system-ui,-apple-system,sans-serif;
    --fd:'Baloo 2','Nunito',system-ui,sans-serif;
    --fm:'Roboto Mono',ui-monospace,Menlo,monospace;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{ font-family:var(--fb); color:var(--ink); background-color:var(--paper);
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:27px 27px; -webkit-font-smoothing:antialiased; line-height:1.5; min-height:100vh; }
  .wrap{ max-width:860px; margin:0 auto; padding:22px 16px 100px; }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; }
  a{ color:inherit; text-decoration:none; }

  .hero{ display:flex; align-items:center; gap:15px; margin-bottom:18px; }
  .hero-badge{ width:58px; height:58px; border-radius:16px; flex:none; display:grid; place-items:center;
    font-family:var(--fd); font-weight:800; font-size:24px; color:#fff;
    background:linear-gradient(135deg,#7d5bff,#4b2fd6); box-shadow:0 8px 22px rgba(76,47,214,.34); transform:rotate(-4deg); }
  .hero h1{ font-family:var(--fd); font-weight:800; font-size:clamp(22px,5vw,30px); margin:0; letter-spacing:-.01em; }
  .hero p{ margin:2px 0 0; color:var(--ink-soft); font-weight:600; font-size:14px; }

  .hud{ display:grid; grid-template-columns:auto 1fr; gap:15px 16px; align-items:center;
    background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:15px 17px; box-shadow:var(--shadow-sm); margin-bottom:20px; }
  .ring{ position:relative; width:76px; height:76px; flex:none; border-radius:50%; }
  .ring .disc{ position:absolute; inset:8px; border-radius:50%; background:var(--card); display:grid; place-items:center; box-shadow:inset 0 0 0 1px var(--line); }
  .ring .lvn{ font-family:var(--fd); font-weight:800; font-size:25px; line-height:1; color:var(--violet-d); }
  .ring .lvc{ font-size:8.5px; font-weight:800; letter-spacing:.13em; color:var(--ink-faint); text-transform:uppercase; }
  .hud-stats{ display:flex; gap:9px; }
  .stat{ background:#FAFAFE; border:1px solid var(--line); border-radius:13px; padding:8px 12px; flex:1; }
  .stat .k{ font-size:10.5px; font-weight:800; letter-spacing:.03em; color:var(--ink-faint); text-transform:uppercase; }
  .stat .v{ font-family:var(--fd); font-weight:800; font-size:20px; line-height:1.15; display:flex; align-items:center; gap:5px; }
  .xp{ grid-column:1/-1; margin-top:-2px; }
  .xp-track{ height:9px; border-radius:99px; background:#EDEEF5; overflow:hidden; }
  .xp-fill{ height:100%; border-radius:99px; background:linear-gradient(90deg,#7d5bff,#a78bff); transition:width .55s cubic-bezier(.3,1,.4,1); }
  .xp-lbl{ font-size:11.5px; font-weight:700; color:var(--ink-faint); margin-top:5px; }

  .cta-variant{ width:100%; display:flex; align-items:center; gap:14px; text-align:left; cursor:pointer;
    background:linear-gradient(135deg,#7d5bff,#4b2fd6); color:#fff; border:none; border-radius:var(--r);
    padding:16px 18px; margin-bottom:22px; box-shadow:0 10px 26px rgba(76,47,214,.32); transition:transform .12s, box-shadow .12s; }
  .cta-variant:hover{ transform:translateY(-2px); box-shadow:0 14px 32px rgba(76,47,214,.4); }
  .cta-variant:active{ transform:translateY(0); }
  .cta-ic{ font-size:26px; flex:none; width:52px; height:52px; border-radius:14px; background:rgba(255,255,255,.16); display:grid; place-items:center; }
  .cta-txt{ display:flex; flex-direction:column; gap:2px; flex:1; min-width:0; }
  .cta-txt b{ font-family:var(--fd); font-weight:800; font-size:19px; letter-spacing:-.01em; }
  .cta-txt span{ font-size:12.5px; font-weight:600; opacity:.92; }
  .cta-arrow{ font-size:24px; font-weight:800; opacity:.85; }

  .var-head{ display:flex; align-items:center; gap:14px; margin-bottom:16px; }
  .var-progress{ flex:1; display:flex; align-items:center; gap:10px; }
  .var-ptrack{ flex:1; height:10px; border-radius:99px; background:#EDEEF5; overflow:hidden; }
  .var-pfill{ height:100%; border-radius:99px; background:linear-gradient(90deg,#7d5bff,#a78bff); transition:width .4s ease; }
  .var-pnum{ font-family:var(--fd); font-weight:800; font-size:13px; color:var(--ink-soft); white-space:nowrap; }
  .var-card{ background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:18px; box-shadow:var(--shadow-sm); }
  .var-tag{ font-family:var(--fd); font-weight:800; font-size:13px; color:var(--violet-d); background:var(--violet-soft); display:inline-block; padding:5px 12px; border-radius:99px; margin-bottom:12px; }
  .var-foot{ text-align:center; margin-top:18px; color:var(--ink-faint); font-size:12px; font-weight:600; }

  .vr-hero{ text-align:center; background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:22px; box-shadow:var(--shadow-sm); margin-bottom:16px; }
  .vr-score{ display:flex; align-items:baseline; justify-content:center; gap:6px; }
  .vr-big{ font-family:var(--fd); font-weight:800; font-size:56px; line-height:1; color:var(--violet-d); }
  .vr-tot{ font-family:var(--fd); font-weight:800; font-size:26px; color:var(--ink-faint); }
  .vr-grade{ font-family:var(--fd); font-weight:800; font-size:18px; margin-top:6px; color:var(--ink); }
  .vr-bar{ height:12px; border-radius:99px; background:#EDEEF5; overflow:hidden; margin:14px auto 8px; max-width:360px; }
  .vr-barfill{ height:100%; border-radius:99px; background:linear-gradient(90deg,#18c08a,#12a87a); transition:width .6s ease; }
  .vr-xp{ font-family:var(--fd); font-weight:800; font-size:13px; color:#B7660A; }
  .vr-list{ display:flex; flex-direction:column; gap:9px; }
  .vr-row{ display:flex; align-items:flex-start; gap:12px; background:var(--card); border:1px solid var(--line); border-left-width:4px; border-radius:12px; padding:12px 14px; }
  .vr-row.ok{ border-left-color:var(--green); }
  .vr-row.no{ border-left-color:var(--coral); }
  .vr-ic{ width:26px; height:26px; flex:none; border-radius:50%; display:grid; place-items:center; font-weight:800; color:#fff; font-size:15px; margin-top:1px; }
  .vr-row.ok .vr-ic{ background:var(--green); }
  .vr-row.no .vr-ic{ background:var(--coral); }
  .vr-main{ flex:1; min-width:0; }
  .vr-lab{ font-family:var(--fd); font-weight:800; font-size:14px; color:var(--ink); }
  .vr-ans{ font-size:13px; font-weight:600; color:var(--ink-soft); margin-top:3px; }
  .vr-ans b{ color:var(--ink); } .vr-ans b.math{ color:var(--violet-d); }
  .vr-sol{ margin-top:10px; }
  .vr-toggle{ flex:none; align-self:center; font-family:var(--fd); font-weight:700; font-size:12px; color:var(--violet-d); background:var(--violet-soft); border:none; border-radius:9px; padding:6px 11px; cursor:pointer; }
  .vr-toggle:hover{ filter:brightness(.97); }

  .sec-title{ font-family:var(--fd); font-weight:700; font-size:16px; color:var(--ink-soft); margin:0 0 12px 2px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:13px; }
  .card{ position:relative; background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:16px 16px 14px; text-align:left;
    box-shadow:var(--shadow-sm); transition:transform .18s, box-shadow .18s, border-color .18s; overflow:hidden; width:100%; }
  .card:hover{ transform:translateY(-3px); box-shadow:var(--shadow-md); border-color:transparent; }
  .card:focus-visible{ outline:3px solid var(--violet); outline-offset:2px; }
  .card.soon{ opacity:.7; cursor:default; }
  .card.soon:hover{ transform:none; box-shadow:var(--shadow-sm); }
  .ribbon{ position:absolute; top:13px; right:-32px; transform:rotate(38deg); background:var(--ink-faint); color:#fff; font-size:10px; font-weight:800; letter-spacing:.12em; padding:3px 36px; text-transform:uppercase; }
  .card .tag{ display:inline-block; font-size:11px; font-weight:800; letter-spacing:.03em; text-transform:uppercase; padding:3px 9px; border-radius:99px; margin-bottom:11px; }
  .card .row{ display:flex; align-items:center; gap:12px; }
  .card .ic{ width:48px; height:48px; border-radius:14px; flex:none; display:grid; place-items:center; font-family:var(--fd); font-weight:700; font-size:20px; color:#fff; }
  .card h3{ font-family:var(--fd); font-weight:700; font-size:18px; margin:0; letter-spacing:-.01em; }
  .card .desc{ color:var(--ink-soft); font-size:12.5px; font-weight:600; margin:9px 0 12px; min-height:34px; }
  .mtrack{ height:7px; border-radius:99px; background:#EEEFF5; overflow:hidden; }
  .mfill{ height:100%; border-radius:99px; transition:width .5s; }
  .mrow{ display:flex; justify-content:space-between; align-items:center; margin-top:7px; font-size:11.5px; font-weight:800; color:var(--ink-faint); }
  .star{ color:var(--amber); }

  .tv-head{ display:flex; align-items:center; gap:12px; margin-bottom:16px; }
  .back{ display:inline-flex; align-items:center; gap:7px; height:42px; padding:0 14px; border-radius:12px; flex:none; background:var(--card); border:1px solid var(--line); box-shadow:var(--shadow-sm); font-weight:800; font-size:13px; color:var(--ink-soft); transition:.15s; }
  .back:hover{ background:#F6F7FB; color:var(--ink); transform:translateX(-2px); }
  .tv-title{ flex:1; min-width:0; }
  .tv-title .tag{ font-size:10.5px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-faint); }
  .tv-title h2{ font-family:var(--fd); font-weight:800; font-size:clamp(19px,4.5vw,24px); margin:0; line-height:1.15; }
  .tv-mini{ display:flex; gap:8px; flex:none; }
  .chip{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:6px 11px; box-shadow:var(--shadow-sm); text-align:center; }
  .chip .k{ font-size:9px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-faint); }
  .chip .v{ font-family:var(--fd); font-weight:800; font-size:17px; line-height:1.1; display:flex; align-items:center; justify-content:center; gap:3px; }

  .segtabs{ display:flex; gap:6px; background:#F1F1F8; border:1px solid var(--line); padding:5px; border-radius:14px; margin-bottom:16px; }
  .segtab{ flex:1; text-align:center; padding:10px 8px; border-radius:10px; font-family:var(--fd); font-weight:700; font-size:14px; color:var(--ink-soft); transition:.15s; }
  .segtab.on{ background:var(--card); color:var(--violet-d); box-shadow:var(--shadow-sm); }
  .segtab:not(.on):hover{ color:var(--ink); }

  .ctrls{ display:flex; flex-wrap:wrap; gap:16px; align-items:center; margin-bottom:16px; }
  .ctrl-group{ display:flex; align-items:center; gap:9px; }
  .ctrl-lbl{ font-size:11.5px; font-weight:800; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.04em; }
  .pills{ display:flex; gap:5px; background:#F1F1F8; border:1px solid var(--line); border-radius:12px; padding:4px; }
  .pill{ padding:7px 13px; border-radius:9px; font-weight:800; font-size:13px; color:var(--ink-soft); transition:.15s; }
  .pill.on{ background:var(--card); color:var(--violet-d); box-shadow:var(--shadow-sm); }
  .pill:not(.on):hover{ color:var(--ink); }

  .prob{ position:relative; background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:26px 26px 24px 40px; box-shadow:var(--shadow-md); margin-bottom:16px;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px); background-size:27px 27px; background-position:-1px -1px; overflow:hidden; }
  .prob::before{ content:""; position:absolute; left:22px; top:0; bottom:0; width:2px; background:#F2A8A0; opacity:.7; }
  .qnum{ position:absolute; top:16px; right:18px; font-family:var(--fd); font-weight:800; font-size:12px; color:var(--ink-faint); background:#F5F6FA; border-radius:9px; padding:3px 10px; }
  .qcap{ font-size:12.5px; font-weight:800; letter-spacing:.03em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:7px; }
  .expr-big{ font-family:var(--fm); font-weight:700; font-size:clamp(25px,6.5vw,33px); color:var(--violet-d); letter-spacing:.01em; line-height:1.25; }
  .math{ font-family:var(--fm); font-weight:700; }

  /* fractions */
  .frac{ display:inline-flex; flex-direction:column; vertical-align:middle; text-align:center; margin:0 .12em; line-height:1.02; }
  .frac .fn{ border-bottom:2px solid currentColor; padding:0 .32em; }
  .frac .fd{ padding:0 .32em; }
  .mixed{ display:inline-flex; align-items:center; gap:.14em; }
  .fsign{ margin-right:.05em; }
  .expr-big .frac{ font-size:.72em; }
  .stage-active .sp .frac, .step .frac, .stage-done .frac, .th .frac{ font-size:.9em; }

  .stage-done{ display:flex; align-items:center; gap:10px; background:var(--green-soft); border:1px solid #BEE9D8; border-radius:12px; padding:11px 14px; margin-bottom:10px; font-weight:600; font-size:14.5px; color:#0b6b4c; }
  .stage-done .tick{ width:22px; height:22px; border-radius:50%; background:var(--green); color:#fff; display:grid; place-items:center; font-weight:800; font-size:13px; flex:none; }
  .stage-active{ background:var(--violet-soft); border:1px solid #DDD5FB; border-radius:15px; padding:15px 17px; margin-bottom:14px; }
  .stage-active .sh{ font-family:var(--fd); font-weight:800; font-size:12px; color:var(--violet-d); text-transform:uppercase; letter-spacing:.05em; margin-bottom:7px; }
  .stage-active .sp{ font-size:16px; font-weight:600; color:var(--ink); }
  .stage-active .sp .math{ color:var(--violet-d); font-size:18px; }

  .ans-zone{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin:14px 0; }
  .ans-lbl{ font-weight:800; font-size:15px; color:var(--ink-soft); }
  .inp{ font-family:var(--fm); font-weight:700; font-size:22px; color:var(--ink); background:var(--card); border:2.5px solid var(--line); border-radius:13px; padding:12px 16px; width:180px; transition:.15s; text-align:center; }
  .inp:focus{ outline:none; border-color:var(--violet); box-shadow:0 0 0 4px var(--violet-soft); }
  .inp::placeholder{ color:var(--ink-faint); font-weight:500; }
  .hint-note{ font-size:12px; font-weight:600; color:var(--ink-faint); width:100%; }
  .frac-inp{ display:inline-flex; flex-direction:column; align-items:center; gap:5px; }
  .frac-inp .bar{ width:118px; height:3px; background:var(--ink); border-radius:2px; }
  .frac-inp .inp{ width:118px; font-size:19px; padding:9px 8px; }

  .mc{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:18px 0 6px; }
  .mc-opt{ padding:20px 14px; border-radius:14px; background:var(--card); border:2px solid var(--line); font-family:var(--fd); font-weight:700; font-size:16px; color:var(--ink); box-shadow:var(--shadow-sm); transition:.15s; }
  .mc-opt:hover:not(:disabled){ border-color:var(--violet); background:#FAFAFF; }
  .mc-opt.correct{ border-color:var(--green); background:var(--green-soft); color:#0b6b4c; }
  .mc-opt.wrong{ border-color:var(--coral); background:var(--coral-soft); color:#b3271c; }
  .mc-opt:disabled{ cursor:default; }

  .btns{ display:flex; gap:10px; flex-wrap:wrap; margin-top:4px; }
  .btn{ font-family:var(--fd); font-weight:700; font-size:15px; border-radius:13px; padding:12px 22px; transition:transform .12s, box-shadow .15s, background .15s; letter-spacing:.01em; }
  .btn:active{ transform:translateY(1px); }
  .btn:focus-visible{ outline:3px solid var(--violet); outline-offset:2px; }
  .btn-primary{ background:linear-gradient(135deg,#7d5bff,#5a37e0); color:#fff; box-shadow:0 6px 16px rgba(90,55,224,.32); }
  .btn-primary:hover{ box-shadow:0 8px 22px rgba(90,55,224,.42); }
  .btn-go{ background:linear-gradient(135deg,#18c08a,#0e9a6e); color:#fff; box-shadow:0 6px 16px rgba(14,154,110,.3); }
  .btn-go:hover{ box-shadow:0 8px 22px rgba(14,154,110,.4); }
  .btn-ghost{ background:var(--card); color:var(--ink-soft); border:1.5px solid var(--line); box-shadow:var(--shadow-sm); }
  .btn-ghost:hover{ background:#F6F7FB; color:var(--ink); }

  .fb{ border-radius:14px; padding:14px 16px; font-weight:700; font-size:15px; display:flex; align-items:flex-start; gap:11px; margin-top:12px; }
  .fb .ic{ flex:none; width:26px; height:26px; border-radius:50%; display:grid; place-items:center; font-weight:800; font-size:16px; color:#fff; margin-top:-1px; }
  .fb.ok{ background:var(--green-soft); color:#0b6b4c; }
  .fb.ok .ic{ background:var(--green); }
  .fb.no{ background:var(--coral-soft); color:#b3271c; }
  .fb.no .ic{ background:var(--coral); }
  .fb .sub{ font-weight:600; font-size:13.5px; opacity:.92; margin-top:3px; }
  .fb .sub .frac, .fb .frac{ font-size:.92em; }

  .sol{ background:#F8FAFC; border:1px solid var(--line); border-radius:15px; padding:16px 18px; margin-top:14px; }
  .sol h4{ font-family:var(--fd); font-weight:800; margin:0 0 10px; font-size:13px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.05em; }
  .step{ display:flex; gap:11px; padding:8px 0; border-bottom:1px dashed var(--line); font-size:14.5px; font-weight:600; color:#374056; line-height:1.6; }
  .step:last-child{ border-bottom:none; }
  .step .n{ flex:none; width:24px; height:24px; border-radius:8px; background:var(--violet-soft); color:var(--violet-d); font-weight:800; font-size:13px; display:grid; place-items:center; }
  .step .math{ color:var(--violet-d); font-size:15px; }

  /* THEORY */
  .th p{ font-size:15px; font-weight:500; color:#37405a; line-height:1.65; margin:0 0 12px; }
  .th h3{ font-family:var(--fd); font-weight:800; font-size:17px; margin:22px 0 10px; color:var(--ink); }
  .th h3:first-child{ margin-top:0; }
  .th .lead{ font-family:var(--fd); font-weight:700; font-size:13px; color:var(--violet-d); text-transform:uppercase; letter-spacing:.05em; margin:18px 0 8px; }
  .th b{ color:var(--ink); }
  .signgrid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:8px 0 4px; }
  .signrule{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px; text-align:center; font-family:var(--fm); font-weight:700; font-size:18px; box-shadow:var(--shadow-sm); }
  .plus{ color:var(--green); } .minus{ color:var(--coral); }
  .callout{ background:linear-gradient(135deg,#FFF6E8,#FFE9CC); border:1px solid #F5D19A; border-radius:14px; padding:14px 16px; font-weight:700; color:#8a5a10; margin:16px 0; font-size:15px; display:flex; gap:11px; align-items:flex-start; }
  .callout .ci{ font-size:20px; line-height:1; }
  .callout.blue{ background:linear-gradient(135deg,#E9F5FD,#D5ECFA); border-color:#A9D6F1; color:#0e5f86; }
  .callout.rose{ background:linear-gradient(135deg,#FDEBF2,#FAD7E5); border-color:#F0A9C6; color:#9c2f5e; }
  .wex{ background:#F8FAFC; border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin:12px 0; }
  .wex .ttl{ font-family:var(--fd); font-weight:800; font-size:13px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.05em; margin-bottom:10px; }
  .wex .exline{ display:flex; gap:11px; padding:7px 0; font-size:15px; font-weight:600; color:#37405a; align-items:baseline; }

/* ================= ХЕЛПЕРЫ ================= */

function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ [a,b]=[b,a%b]; } return a||1; }
function reduce(n,d){ if(d<0){ n=-n; d=-d; } const k=gcd(n,d)||1; return [n/k,d/k]; }
const fAdd=(A,B)=>reduce(A[0]*B[1]+B[0]*A[1],A[1]*B[1]);
const fSub=(A,B)=>reduce(A[0]*B[1]-B[0]*A[1],A[1]*B[1]);

function fmt(x){ let neg=x<0; x=Math.abs(x); let s=(Math.round(x*1000)/1000).toString().replace('.',','); return (neg?'−':'')+s; }
function frac(n,d){ if(d===1) return '<span>'+N(n)+'</span>'; const s=n<0?'<span class="fsign">−</span>':''; return s+'<span class="frac"><span class="fn">'+Math.abs(n)+'</span><span class="fd">'+d+'</span></span>'; }
function mixed(w,n,d){ return '<span class="mixed"><span>'+w+'</span><span class="frac"><span class="fn">'+n+'</span><span class="fd">'+d+'</span></span></span>'; }
function impToMixed(res){ let n=res[0],d=res[1]; const s=n<0?'−':''; const a=Math.abs(n); if(d===1) return s+a; const w=Math.floor(a/d),r=a%d; if(r===0) return s+w; if(w===0) return s+frac(r,d); return s+mixed(w,r,d); }

/* ================= ДВИЖОК ОТВЕТОВ ================= */
function renderAnsInputs(spec, prefix, placeholder){

      +'<input class="inp" id="'+prefix+'N" inputmode="numeric" placeholder="числ." autocomplete="off">'
      +'<div class="bar"></div>'
      +'<input class="inp" id="'+prefix+'D" inputmode="numeric" placeholder="знам." autocomplete="off"></div>';
  }

  if(spec.t==='frac') return spec.strict ? 'Впиши несократимую дробь: числитель и знаменатель.' : 'Впиши числитель и знаменатель. Целое — оставь знаменатель пустым. Дробь можно не сокращать.';

function readAns(spec, prefix){
  if(spec.t==='frac'){
    let rn=(el(prefix+'N').value||'').replace(/−/g,'-').replace(/\s/g,'');
    let rd=(el(prefix+'D').value||'').replace(/−/g,'-').replace(/\s/g,'');
    if(rn==='') return {empty:true};
    if(rd==='') rd='1';
    if(!/^-?\d+$/.test(rn)||!/^-?\d+$/.test(rd)) return {empty:true};
    let un=parseInt(rn,10), ud=parseInt(rd,10);

    if(ud<0){ ud=-ud; un=-un; }
    let ok = un*spec.d === spec.n*ud;

  let raw=(el(prefix).value||'').replace(/−/g,'-').replace(',','.').replace(/\s/g,'');

  (spec.t==='frac'?[prefix+'N',prefix+'D']:[prefix]).forEach(id=>{ const e=el(id); if(e) e.addEventListener('keydown',ev=>{ if(ev.key==='Enter'){ ev.preventDefault(); if(!isDone()) onCheck(); else onNext(); } }); });

    +'<div class="th-actions"><button class="btn btn-primary" onclick="gotoTab(\'warmup\')">Начать разминку →</button>'

  },
  warmup(){

      const s1=pick(['−','+']), s2=pick(['−','+']); const res=(s1===s2)?'+':'−';
      return { type:'mc', prompt:'Какой знак будет у результата умножения?', expr:'( '+s1+' )  ·  ( '+s2+' )',

/* ================= ЗАДАНИЕ 2 ================= */
function fracProblem(diff){
  const dens = diff==='easy'?[2,3,4,5] : diff==='medium'?[2,3,4,5,6,7,8] : [2,3,4,5,6,7,8,9,10,12,14,16];
  const mk=()=>{ const d=pick(dens); return reduce(R(1,d*2-1), d); };
  let A,B,C,inter,res,op,g=0;
  do{
    A=mk(); B=mk(); op=pick(['+','−']); C=mk();
    if(op==='−' && A[0]/A[1] < B[0]/B[1]){ const t=A; A=B; B=t; }
    inter = op==='+'? fAdd(A,B) : fSub(A,B);
    res = fMul(inter,C); g++;
  } while((inter[0]===0 || res[1] > (diff==='hard'?72:30)) && g<800);
  const doWord = op==='+'?'сложи':'вычти';
  const tail = (res[1]!==1 && Math.abs(res[0])>res[1]) ? ' = <span class="math">'+impToMixed(res)+'</span>' : '';
  return {
    cap:'Вычислите',
    display:'( '+frac(A[0],A[1])+' '+op+' '+frac(B[0],B[1])+' ) · '+frac(C[0],C[1]),
    answer:{t:'frac',n:res[0],d:res[1]},
    stages:[
      { label:'Шаг 1 · скобка', prompt:'Приведи к общему знаменателю и '+doWord+': <span class="math">'+frac(A[0],A[1])+' '+op+' '+frac(B[0],B[1])+'</span>',
        answer:{t:'frac',n:inter[0],d:inter[1]}, placeholder:'дробь',
        hint:'Общий знаменатель для '+A[1]+' и '+B[1]+', приведи дроби и '+doWord+' числители.',
        doneText:'Скобка: <span class="math">'+frac(A[0],A[1])+' '+op+' '+frac(B[0],B[1])+' = '+frac(inter[0],inter[1])+'</span>' },
      { label:'Шаг 2 · умножение', prompt:'Умножь на дробь и сократи: <span class="math">'+frac(inter[0],inter[1])+' · '+frac(C[0],C[1])+'</span>',
        answer:{t:'frac',n:res[0],d:res[1]}, placeholder:'дробь',
        hint:'Числитель × числитель, знаменатель × знаменатель, потом сократи.',
        doneText:'Ответ: <span class="math">'+frac(res[0],res[1])+'</span>' }
    ],
    steps:[
      'Приводим дроби в скобке к общему знаменателю и '+(op==='+'?'складываем':'вычитаем')+': <span class="math">'+frac(A[0],A[1])+' '+op+' '+frac(B[0],B[1])+' = '+frac(inter[0],inter[1])+'</span>.',
      'Умножаем на дробь (числитель × числитель, знаменатель × знаменатель): <span class="math">'+frac(inter[0],inter[1])+' · '+frac(C[0],C[1])+' = '+frac(res[0],res[1])+'</span>'+tail+'.',
      (res[1]===1?'Дробь сократилась до целого числа: <span class="math">'+res[0]+'</span>.':'Обязательно сократи дробь, если это возможно.')
    ],
    hint:'Сначала общий знаменатель в скобке и действие, затем умножь на дробь и сократи.'
  };
}
function decProblem(diff){
  const sets={ easy:['A','E'], medium:['A','B','C','E'], hard:['A','B','C','E','F','G'] };
  const t=pick(sets[diff]||sets.medium);
  let display, s1e, mid, s2e, final, divFirst=false;
  if(t==='A'){ const ci=pick([11,12,13,14,16,21,23]), qi=R(12,45); const c=ci/10,q=qi/10,b=(qi*ci)/100,at=qi+R(6,45),a=at/10; final=(at-qi)/10; mid=q; divFirst=true;
    display=fmt(a)+' − '+fmt(b)+' : '+fmt(c); s1e=fmt(b)+' : '+fmt(c); s2e=fmt(a)+' − '+fmt(mid);
  } else if(t==='B'){ const ci=pick([12,14,16,24,23,13]), qi=R(12,42); const c=ci/10,q=qi/10,b=(qi*ci)/100,at=R(10,88),a=at/10; final=(qi-at)/10; mid=q; divFirst=true;
    display='−'+fmt(a)+' + '+fmt(b)+' : '+fmt(c); s1e=fmt(b)+' : '+fmt(c); s2e='−'+fmt(a)+' + '+fmt(mid);
  } else if(t==='C'){ const bi=pick([11,12,13,14,16,22,24]), qi=R(15,45), ci=R(10,40); const b=bi/10,q=qi/10,a=(qi*bi)/100,c=ci/10; final=(qi-ci)/10; mid=q; divFirst=true;
    display=fmt(a)+' : '+fmt(b)+' − '+fmt(c); s1e=fmt(a)+' : '+fmt(b); s2e=fmt(mid)+' − '+fmt(c);
  } else if(t==='E'){ const a10=R(15,58),a=a10/10,b100=R(11,a10*10-1),b=b100/100; const diff2=Math.round((a-b)*100)/100; final=Math.round(diff2*10*100)/100; mid=diff2;
    display='('+fmt(a)+' − '+fmt(b)+') : 0,1'; s1e=fmt(a)+' − '+fmt(b); s2e=fmt(mid)+' : 0,1';
  } else if(t==='F'){ const map={'0.4':[[-4.5,-1.8],[-5.5,-2.2],[-3.5,-1.4],[-6.5,-2.6]],'0.6':[[-4.5,-2.7],[-3.5,-2.1],[-5.5,-3.3],[-2.5,-1.5]],'0.8':[[-4.75,-3.8],[-5.5,-4.4],[-3.75,-3.0],[-2.5,-2.0]]};
    const ck=pick(['0.4','0.6','0.8']); const pr=pick(map[ck]); final=pr[0]; const diff2=pr[1]; const c=parseFloat(ck); mid=diff2;
    const minB=Math.round(-diff2*10)+1, b10=R(minB,minB+30),b=b10/10,a=Math.round((b+diff2)*10)/10;
    display='('+fmt(a)+' − '+fmt(b)+') : '+fmt(c); s1e=fmt(a)+' − '+fmt(b); s2e=fmt(mid)+' : '+fmt(c);
  } else { const b10=R(20,90),b=b10/10,a100=R(11,b10*10-1),a=a100/100; const diff2=Math.round((b-a)*100)/100; final=Math.round(diff2*0.1*1000)/1000; mid=diff2;
    display='(−'+fmt(a)+' + '+fmt(b)+') · 0,1'; s1e='−'+fmt(a)+' + '+fmt(b); s2e=fmt(mid)+' · 0,1';
  }
  final=Math.round(final*1000)/1000; mid=Math.round(mid*1000)/1000;
  return {
    cap:'Вычислите', display, answer:{t:'num',v:final},
    stages:[
      { label:'Шаг 1 · '+(divFirst?'деление':'скобка'), prompt:'Выполни первое действие: <span class="math">'+s1e+'</span>',
        answer:{t:'num',v:mid}, placeholder:'результат',
        hint:divFirst?'Сначала деление — умножение и деление раньше сложения и вычитания.':'Сначала считаем то, что в скобках.',
        doneText:'Первое действие: <span class="math">'+s1e+' = '+fmt(mid)+'</span>' },
      { label:'Шаг 2 · '+(divFirst?'сложение и вычитание':'умножение и деление'), prompt:'Теперь: <span class="math">'+s2e+'</span>',
        answer:{t:'num',v:final}, placeholder:'ответ',
        hint:'Подставь результат первого действия и посчитай. Следи за знаком и запятой.',
        doneText:'Ответ: <span class="math">'+fmt(final)+'</span>' }
    ],
    steps:[
      'Определяем порядок: сначала '+(divFirst?'деление':'скобка')+', потом '+(divFirst?'сложение или вычитание':'умножение или деление')+'.',
      'Первое действие: <span class="math">'+s1e+' = '+fmt(mid)+'</span>.',
      'Второе действие: <span class="math">'+s2e+' = '+fmt(final)+'</span>.'
    ],
    hint:'Сначала умножение/деление (или скобку), потом сложение/вычитание. Аккуратно со знаком и запятой.'
  };
}
function warmFrac(){
  const kind=pick(['reduce','lcd','add']);
  if(kind==='reduce'){
    let q=pick([2,3,4,5,6,7,8,9]); let p=R(1,q-1); const rb=reduce(p,q); p=rb[0]; q=rb[1];
    const k=pick([2,3,4]); const nn=p*k, dd=q*k;
    return { type:'input', prompt:'Сократи дробь до несократимой:', expr:frac(nn,dd),
      ans:{t:'frac',n:p,d:q,strict:true}, explain:'Дели числитель и знаменатель на их общий делитель ('+k+').' };
  } else if(kind==='lcd'){
    let a=pick([2,3,4,5,6,8]), b=pick([3,4,5,6,8,9,12]); if(a===b) b=b+1;
    const l=a*b/gcd(a,b);
    return { type:'input', prompt:'Найди наименьший общий знаменатель для знаменателей '+a+' и '+b+':', expr:a+'  и  '+b,
      ans:{t:'int',v:l}, explain:'Наименьшее число, которое делится и на '+a+', и на '+b+', равно '+l+'.' };
  } else {
    const d=pick([3,4,5,6,8,10,12]); let n1=R(1,d-1), n2=R(1,d-1); const op=pick(['+','−']);
    if(op==='−' && n1<n2){ const t=n1; n1=n2; n2=t; }
    const res = op==='+'? reduce(n1+n2,d) : reduce(n1-n2,d);
    return { type:'input', prompt:'Вычисли (знаменатели одинаковые):', expr:frac(n1,d)+' '+op+' '+frac(n2,d),
      ans:{t:'frac',n:res[0],d:res[1]}, explain:'Знаменатель общий — просто '+(op==='+'?'сложи':'вычти')+' числители.' };
  }
}
function warmDec(){
  const kind=pick(['order','md','as']);
  if(kind==='order'){
    const inner=pick(['·',':']), outer=pick(['+','−']);
    const A=(R(21,89)/10), B=(R(11,49)/10), Cc=(R(11,49)/10);
    return { type:'mc', prompt:'Какое действие выполняем первым?', expr:fmt(A)+' '+outer+' '+fmt(B)+' '+inner+' '+fmt(Cc),
      options:[{t:(inner==='·'?'Умножение ':'Деление ')+fmt(B)+' '+inner+' '+fmt(Cc), v:'md'},{t:(outer==='+'?'Сложение ':'Вычитание ')+fmt(A)+' '+outer+' '+fmt(B), v:'as'}],
      answer:'md', explain:'Умножение и деление выполняются раньше сложения и вычитания.' };
  } else if(kind==='md'){
    const type=pick(['mul10','div01','muldec']);
    if(type==='mul10'){ const x=R(11,199)/10; return { type:'input', prompt:'Вычисли:', expr:fmt(x)+' · 10', ans:{t:'num',v:Math.round(x*10*100)/100}, explain:'Умножение на 10 — запятая вправо на один разряд.' }; }
    if(type==='div01'){ const x=R(11,99)/10; return { type:'input', prompt:'Вычисли:', expr:fmt(x)+' : 0,1', ans:{t:'num',v:Math.round(x*10*100)/100}, explain:'Делить на 0,1 — то же, что умножить на 10.' }; }
    const a=R(2,9)/10,b=R(2,9)/10; return { type:'input', prompt:'Вычисли:', expr:fmt(a)+' · '+fmt(b), ans:{t:'num',v:Math.round(a*b*100)/100}, explain:'Перемножь как целые, затем поставь запятую.' };
  } else {
    const a=R(11,89)/10, b=R(11,49)/10; const op=pick(['+','−']); const v=op==='+'?a+b:a-b;
    return { type:'input', prompt:'Вычисли:', expr:fmt(a)+' '+op+' '+fmt(b), ans:{t:'num',v:Math.round(v*100)/100}, explain:'Складывай/вычитай по разрядам, запятая под запятой.' };
  }
}

      doneText:'Модуль: <span class="math">|'+N(inner)+'| = '+absv+'</span>' }

    stages.push({ label:'Шаг 3 · коэффициент', prompt:'Умножь на коэффициент: <span class="math">'+N(kk)+' · '+absv+'</span>',

      doneText:'Ответ: <span class="math">'+N(kk)+' · '+absv+' = '+N(final)+'</span>' });
  } else if(kk===-1){
    stages.push({ label:'Шаг 3 · знак', prompt:'Перед модулем стоит минус — поставь знак: <span class="math">−'+absv+'</span>',
      answer:{t:'int',v:final}, placeholder:'ответ', hint:'Минус перед модулем меняет знак результата.',

  }

    'Подставляем '+v+' = '+N(val)+': <span class="math">'+subStr+' = '+N(inner)+'</span>.',
    'Раскрываем модуль: <span class="math">|'+N(inner)+'| = '+absv+'</span>.',
    (Math.abs(kk)!==1 ? 'Умножаем на коэффициент: <span class="math">'+N(kk)+' · '+absv+' = '+N(final)+'</span>.'

function workProblem(diff){
  const scen=pick(WORKS);
  let a,b,L,r1,r2,comb,time,okFound=false;
  for(let t=0;t<500;t++){
    const pool = diff==='easy'?[2,3,4,6,8,12] : diff==='medium'?[2,3,4,5,6,8,10,12,15,20] : [2,3,4,5,6,8,9,10,12,14,15,16,18,20,24];
    a=pick(pool); b=pick(pool); if(a===b) continue;
    const g=gcd(a,b); L=a*b/g; r1=L/a; r2=L/b; comb=r1+r2; time=L/comb;
    if(Math.abs(Math.round(time*100)-time*100)>1e-9) continue;
    if(time<1 || time>20 || L>240) continue;

  const ctx={a,b,L,r1,r2,comb,time,scen};

        doneText:'Вместе за '+sh+': <span class="math">'+r1+' + '+r2+' = '+comb+'</span> частей' },

      'Время совместной работы: <span class="math">'+L+' : '+comb+' = '+fmt(time)+'</span> '+sh+'.'

function pfx(ds){ const d=pick(ds); const n=R(1,d-1); if(gcd(n,d)!==1) return null; return [n,d]; }
function genMix(diff){
  let ds,kLo,kHi,wLo,wHi,lim;
  if(diff==='easy'){ ds=[2,3,4,5]; kLo=2; kHi=3; wLo=1; wHi=2; lim=70; }
  else if(diff==='medium'){ ds=[2,3,4,5,6,7,8]; kLo=2; kHi=5; wLo=1; wHi=3; lim=90; }
  else { ds=[2,3,4,5,6,7,8,9,10,12]; kLo=2; kHi=8; wLo=1; wHi=4; lim=150; }
  let a,b,w1,F1,F2,bracket,M1,div,K,yMixed,g,h,w2,Y,prod,op,res,done=false;
  for(let t=0;t<900;t++){
    b=pick(ds); a=R(1,b-1); if(gcd(a,b)!==1) continue; w1=R(wLo,wHi);
    F1=pfx(ds); F2=pfx(ds); if(!F1||!F2) continue;
    bracket=fSub(F1,F2); if(bracket[0]<=0) continue;
    M1=[w1*b+a,b]; div=fDiv(M1,bracket);
    K=R(kLo,kHi);
    yMixed=(diff!=='easy') && (Math.random()<0.5);
    h=pick(ds); g=R(1,h-1); if(gcd(g,h)!==1) continue; w2=yMixed?R(1,3):0;
    Y=[w2*h+g,h]; prod=fMul([K,1],Y);
    op=pick(diff==='easy'?['+']:['+','+','−']);
    res=op==='+'?fAdd(div,prod):fSub(div,prod);
    if(res[0]<=0) continue;
    if(res[1]>lim || div[1]>lim || res[0]>420) continue;
    done=true; break;
  }
  if(!done){ b=5;a=2;w1=1;F1=[3,4];F2=[2,5];bracket=fSub(F1,F2);M1=[7,5];div=fDiv(M1,bracket);K=3;yMixed=false;g=1;h=2;w2=0;Y=[1,2];prod=fMul([K,1],Y);op='+';res=fAdd(div,prod); }
  const Ydisp = yMixed? mixed(w2,g,h) : frac(g,h);
  const m1Disp = mixed(w1,a,b);
  const brDisp = '( '+frac(F1[0],F1[1])+' − '+frac(F2[0],F2[1])+' )';
  const Kterm = N(K)+' · '+Ydisp;
  const display = m1Disp+' : '+brDisp+' '+op+' '+Kterm;
  const resMix = (res[1]!==1 && Math.abs(res[0])>res[1]) ? ' = <span class="math">'+impToMixed(res)+'</span>' : '';
  return {
    cap:'Вычислите', display, answer:{t:'frac',n:res[0],d:res[1]},
    stages:[
      { label:'Шаг 1 · скобка', prompt:'Вычисли скобку: <span class="math">'+frac(F1[0],F1[1])+' − '+frac(F2[0],F2[1])+'</span>',
        answer:{t:'frac',n:bracket[0],d:bracket[1]}, placeholder:'дробь', hint:'Приведи к общему знаменателю и вычти числители.',
        doneText:'Скобка: <span class="math">'+frac(F1[0],F1[1])+' − '+frac(F2[0],F2[1])+' = '+frac(bracket[0],bracket[1])+'</span>' },
      { label:'Шаг 2 · деление', prompt:'Раздели: <span class="math">'+m1Disp+' : '+frac(bracket[0],bracket[1])+'</span>',
        answer:{t:'frac',n:div[0],d:div[1]}, placeholder:'дробь', hint:'Смешанное число переведи в неправильную дробь, деление — умножение на перевёрнутую дробь.',
        doneText:'Деление: <span class="math">'+m1Disp+' : '+frac(bracket[0],bracket[1])+' = '+frac(div[0],div[1])+'</span>' },
      { label:'Шаг 3 · итог', prompt:(op==='+'?'Прибавь':'Вычти')+' произведение: <span class="math">'+frac(div[0],div[1])+' '+op+' '+Kterm+'</span>',
        answer:{t:'frac',n:res[0],d:res[1]}, placeholder:'дробь', hint:'Сначала '+N(K)+' · '+Ydisp+' = <span class="math">'+frac(prod[0],prod[1])+'</span>, затем '+(op==='+'?'прибавь':'вычти')+' к результату деления.',
        doneText:'Ответ: <span class="math">'+frac(res[0],res[1])+'</span>'+resMix }
    ],
    steps:[
      'Скобка: <span class="math">'+frac(F1[0],F1[1])+' − '+frac(F2[0],F2[1])+' = '+frac(bracket[0],bracket[1])+'</span>.',
      'Деление (смешанное → неправильная, умножаем на перевёрнутую): <span class="math">'+m1Disp+' : '+frac(bracket[0],bracket[1])+' = '+frac(div[0],div[1])+'</span>.',
      'Умножение: <span class="math">'+N(K)+' · '+Ydisp+' = '+frac(prod[0],prod[1])+'</span>.',
      'Итог: <span class="math">'+frac(div[0],div[1])+' '+op+' '+frac(prod[0],prod[1])+' = '+frac(res[0],res[1])+'</span>'+resMix+'.'
    ],
    hint:'Порядок: сначала скобка, затем деление, потом умножение, в конце сложение или вычитание. Дроби сокращай.'
  };
}

function numScene(ctx,stg,done){

  const tTile = stage>=2 ? t : '?';

    +'<div class="nn-tile tens'+(stage>=2?' on'+nm:'')+'">'+tTile+'</div>'
    +'<div class="nn-tile units'+((stage>=3||done)?' on'+nm:'')+'">'+uTile+'</div>'
    +'</div><div class="nn-labels"><span>десятки</span><span>единицы</span></div>';
  let mid='';
  if(stage>=1) mid='<div class="nn-diff">Разность цифр: <b>'+d+'</b> — число меняется на 9 × '+d+' = '+V+'</div>';
  let swap='';
  if(stage>=3||done){
    const sign=diff>0?'+':'−';
    swap='<div class="nn-swap"><div class="nn-num">'+num+'</div>'
      +'<div class="nn-arrow'+nm+'">⇄</div>'
      +'<div class="nn-num alt">'+swapped+'</div>'
      +'<div class="nn-badge '+(diff>0?'up':'down')+'">'+sign+V+'</div></div>';
  }

}
function numPuzzle(lvl){
  let t,u,family,K=0,S=0,num,swapped,diff,V,d,done=false;
  for(let it=0; it<1500; it++){
    if(lvl==='easy') family=pick(['sum','mulSmall']);
    else family=pick(['sum','sum','mulSmall','mulBig']);
    if(family==='mulSmall'){ K=pick(lvl==='easy'?[2]:lvl==='medium'?[2,3]:[2,3,4]); t=R(1,4); u=K*t; if(u>9||u<1||u===t) continue; }
    else if(family==='mulBig'){ K=pick(lvl==='medium'?[2,3]:[2,3,4]); u=R(1,4); t=K*u; if(t>9||t===u) continue; }
    else { do{ t=R(1,8); u=R(1,9); }while(t===u); S=t+u; }
    if(u<1||t<1) continue;
    num=10*t+u; swapped=10*u+t; diff=swapped-num; V=Math.abs(diff); d=Math.abs(u-t);
    let sol=[]; for(let tt=1;tt<=9;tt++) for(let uu=0;uu<=9;uu++){
      const rel = family==='mulSmall'?(uu===K*tt) : family==='mulBig'?(tt===K*uu) : (tt+uu===S);
      if(rel && 9*(uu-tt)===diff) sol.push(tt*10+uu);
    }
    if(sol.length!==1 || sol[0]!==num) continue;
    if(lvl==='easy' && diff<0) continue;
    done=true; break;
  }
  if(!done){ t=3;u=6;family='mulSmall';K=2;num=36;swapped=63;diff=27;V=27;d=3; }
  const ctx={t,u,num,swapped,diff,V,d,family,K,S};
  let clue1;
  if(family==='mulSmall') clue1='цифра в разряде десятков в '+K+' раза меньше цифры в разряде единиц';
  else if(family==='mulBig') clue1='цифра в разряде десятков в '+K+' раза больше цифры в разряде единиц';
  else clue1='сумма цифр числа равна '+S;
  const swapClue = diff>0 ? ('Если поменять эти цифры местами, число увеличится на '+V+'.') : ('Если поменять эти цифры местами, число уменьшится на '+V+'.');
  const display = 'В задуманном двузначном числе '+clue1+'. '+swapClue+' Найдите задуманное число.';
  let s2hint;
  if(family==='mulSmall') s2hint='Единицы = '+K+' × десятки, а «единицы − десятки» = '+d+'. Значит десятки × '+(K-1)+' = '+d+', десятки = '+d+' : '+(K-1)+'.';
  else if(family==='mulBig') s2hint='Десятки = '+K+' × единицы, а «десятки − единицы» = '+d+'. Значит единицы = '+d+' : '+(K-1)+', десятки = '+K+' × единицы.';
  else s2hint = diff>0 ? ('Десятки + единицы = '+S+', а «единицы − десятки» = '+d+'. Меньшая цифра (десятки) = ('+S+' − '+d+') : 2.')
                       : ('Десятки + единицы = '+S+', а «десятки − единицы» = '+d+'. Большая цифра (десятки) = ('+S+' + '+d+') : 2.');
  return {
    cap:'Двузначное число', textMode:'prose', display, answer:{t:'int',v:num},
    scene:(stg,dn)=>numScene(ctx,stg,dn),
    stages:[
      { label:'Шаг 1 · разность цифр', prompt:'Перестановка цифр меняет число на 9 × (разность цифр). Найди разность цифр: <span class="math">'+V+' : 9</span>',
        answer:{t:'int',v:d}, placeholder:'разность', hint:'Раздели, на сколько изменилось число, на 9.',
        doneText:'Разность цифр: <span class="math">'+V+' : 9 = '+d+'</span>' },
      { label:'Шаг 2 · цифра десятков', prompt:'Пользуясь связью цифр и разностью '+d+', найди цифру <b>десятков</b>.',
        answer:{t:'int',v:t}, placeholder:'десятки', hint:s2hint,
        doneText:'Цифра десятков: <span class="math">'+t+'</span>' },
      { label:'Шаг 3 · число', prompt:'Найди цифру единиц и запиши число: <span class="math">10 · '+t+' + (единицы)</span>',
        answer:{t:'int',v:num}, placeholder:'число', hint:'Единицы '+(diff>0?'больше десятков на ':'меньше десятков на ')+d+'. Число = 10 × десятки + единицы.',
        doneText:'Задуманное число: <span class="math">'+num+'</span>' }
    ],
    steps:[
      'Перестановка меняет число на 9 × (разность цифр): разность цифр = <span class="math">'+V+' : 9 = '+d+'</span>.',
      'Из связи цифр и разности находим цифру десятков: <span class="math">'+t+'</span>'+(family==='sum'?', единиц: <span class="math">'+u+'</span>':', тогда единиц: <span class="math">'+u+'</span>')+'.',
      'Задуманное число: <span class="math">10 · '+t+' + '+u+' = '+num+'</span>. Проверка: '+swapped+' '+(diff>0?'−':'−')+' '+num+' = '+(diff>0?'+':'')+'<span class="math">'+(swapped-num)+'</span>.'
    ],
    hint:'Перестановка цифр меняет число на 9 × (разность цифр) — найди разность. Затем составь два уравнения (связь цифр и разность) и найди цифры. Число = 10 × десятки + единицы.'
  };
}
function numWarm(){

      +'<div class="mtrack"><div class="mfill" style="width:'+pct+'%;background:var('+c.tint+')"></div></div>'
      +'<div class="mrow"><span>'+(master?'<span class="star">★</span> Освоено':'Верно с 1 раза: '+done+' / '+MASTER_GOAL)+'</span><span>'+(master?'★★★':'открыть →')+'</span></div>'
      +'</button>';
  }).join('');
  const hud = '<div class="hud">'
    +'<div class="ring" style="background:conic-gradient(var(--violet) '+deg+'deg, #EBE7FB '+deg+'deg)">'
    +'<div class="disc"><div class="lvn">'+lvl+'</div><div class="lvc">уровень</div></div></div>'
    +'<div class="hud-stats">'
    +'<div class="stat"><div class="k">Серия</div><div class="v">🔥 '+S.streak+'</div></div>'
    +'<div class="stat"><div class="k">Точность</div><div class="v">🎯 '+acc+'</div></div>'
    +'<div class="stat"><div class="k">Решено</div><div class="v">✅ '+S.solved+'</div></div></div>'
    +'<div class="xp"><div class="xp-track"><div class="xp-fill" style="width:'+within+'%"></div></div>'
    +'<div class="xp-lbl">'+within+' / 100 XP до уровня '+(lvl+1)+'</div></div></div>';
  el('app').innerHTML =
    '<div class="hero"><div class="hero-badge">МЦ</div>'
    +'<div><h1>Линейка тренажёров МЦКО</h1><p>Математика · 6 класс · подготовка к диагностике</p></div></div>'
    +renderTeacherPanel('hub')
    +'<button class="cta-variant" onclick="startVariant()"><span class="cta-ic">📝</span>'
    +'<span class="cta-txt"><b>Решить вариант</b><span>9 заданий подряд, как на диагностике — с итоговой оценкой</span></span>'
    +'<span class="cta-arrow">→</span></button>'
    +'<p class="sec-title">Выбери задание</p>'
    +'<div class="grid">'+cards+'</div>'
    +'<p class="sec-title" style="margin-top:26px">Твой прогресс</p>'
    + hud
    +'<div class="foot">Каждое задание — отдельный тренажёр: теория, разминка и практика. Кнопка «Решить вариант» соберёт все девять заданий в одну диагностику. 🚀</div>';
}

/* ================= ЭКРАН ЗАДАНИЯ ================= */
function currentMod(){ return catById(S.taskId).mod; }
function renderTask(){
  const c = catById(S.taskId);
  const tabs = [['learn','Учить'],['warmup','Разминка'],['practice','Тренировка']]
    .map(t=>'<button class="segtab '+(S.tab===t[0]?'on':'')+'" onclick="gotoTab(\''+t[0]+'\')">'+t[1]+'</button>').join('');
  el('app').innerHTML =
    '<div class="tv-head"><button class="back" onclick="goHub()">← Все задания</button>'
    +'<div class="tv-title"><div class="tag">'+c.tag+'</div><h2>'+c.title+'</h2></div>'
    +'<div class="tv-mini">'
    +'<div class="chip"><div class="k">серия</div><div class="v">🔥 <span id="mini-streak">'+S.streak+'</span></div></div>'
    +'<div class="chip"><div class="k">освоено</div><div class="v">⭐ <span id="mini-mast">'+(S.mastery[S.taskId]||0)+'</span></div></div></div></div>'
    +'<div class="segtabs">'+tabs+'</div>'
    +renderTeacherPanel('task')
    +'<div id="tabbody"></div>';
  if(S.tab==='learn') renderLearn();
  else if(S.tab==='warmup') renderWarm();
  else renderPractice();
}
function renderLearn(){ el('tabbody').innerHTML = currentMod().theory(); }

/* ---------- РАЗМИНКА ---------- */
function renderWarm(){
  const w = S.warm; let body;
  if(w.type==='mc'){
    const opts = w.options.map(o=>'<button class="mc-opt" data-v="'+o.v+'" onclick="warmPick(\''+o.v+'\')">'+o.t+'</button>').join('');
    body = '<div class="mc">'+opts+'</div>';
  } else {
    body = '<div class="ans-zone"><span class="ans-lbl">Ответ:</span>'+renderAnsInputs(w.ans,'winp')
      +'<span class="hint-note">'+ansHint(w.ans)+'</span></div>'
      +'<div class="btns"><button class="btn btn-primary" id="wcheck" onclick="warmCheck()">Проверить</button></div>';
  }
  el('tabbody').innerHTML =
    '<div class="prob"><div class="qnum">разминка</div><div class="qcap">'+w.prompt+'</div><div class="expr-big">'+w.expr+'</div></div>'
    + body + '<div id="wfb"></div>'
    +'<div class="btns" style="margin-top:12px"><button class="btn btn-go hidden" id="wnext" onclick="nextWarm()">Следующий →</button></div>';
  if(w.type!=='mc'){ focusAns(w.ans,'winp'); bindEnter(w.ans,'winp',warmCheck,nextWarm,()=>S.warmDone); }
}
function warmFinishOK(){
  S.warmDone=true; const gain = S.warmAttempts===0 ? 3 : 1; S.xp+=gain; S.warmCount++;
  el('wfb').className='fb ok pop'; el('wfb').innerHTML='<div class="ic">✓</div><div>Верно!<div class="sub">'+S.warm.explain+'</div></div>';
  el('wnext').classList.remove('hidden');
  toast('<span>Разминка</span><span class="xp-badge">+'+gain+' XP</span>'); if(!REDUCE){ confetti(20); pick([fxStars,fxFlowers,function(){emojiBurst(['✨','⭐','🎉'],10);}])(); }
}
function warmPick(v){
  if(S.warmDone) return; const w=S.warm, btns=[...document.querySelectorAll('.mc-opt')];
  if(v===w.answer){ btns.forEach(b=>{ b.disabled=true; if(b.dataset.v===w.answer) b.classList.add('correct'); }); warmFinishOK(); }
  else { S.warmAttempts++; const bad=btns.find(b=>b.dataset.v===v); if(bad){ bad.classList.add('wrong'); bad.classList.add('shake'); setTimeout(()=>bad.classList.remove('shake'),400); }
    el('wfb').className='fb no'; el('wfb').innerHTML='<div class="ic">✕</div><div>Не то — подумай ещё раз.</div>'; }
}
function warmCheck(){
  if(S.warmDone) return; const w=S.warm, r=readAns(w.ans,'winp');
  if(r.empty){ el('wfb').className='fb no'; el('wfb').innerHTML='<div class="ic">?</div><div>Введи ответ.</div>'; shakeAns(w.ans,'winp'); return; }
  if(r.ok){ disableAns(w.ans,'winp'); el('wcheck').classList.add('hidden'); warmFinishOK(); }
  else { S.warmAttempts++; el('wfb').className='fb no'; el('wfb').innerHTML='<div class="ic">✕</div><div>Не то — попробуй ещё раз.</div>'; shakeAns(w.ans,'winp'); }
}
function nextWarm(){ S.warm=currentMod().warmup(S.sub); S.warmDone=false; S.warmAttempts=0; renderWarm(); }

/* ---------- ТРЕНИРОВКА ---------- */
function newPractice(){ S.cur=currentMod().practice(S.diff,S.sub); S.stageIdx=0; S.stageVals=[]; S.attempts=0; S.revealed=false; S.done=false; S.fb=null; }
function renderPractice(){
  const mod=currentMod();
  let subGroup='';
  if(mod.meta.subs){
    const sp=mod.meta.subs.map(s=>'<button class="pill '+(S.sub===s.key?'on':'')+'" onclick="setSub(\''+s.key+'\')">'+s.label+'</button>').join('');
    subGroup='<div class="ctrl-group"><span class="ctrl-lbl">Тип</span><div class="pills">'+sp+'</div></div>';
  }
  const diffPills = [['easy','Лёгкий'],['medium','Средний'],['hard','Сложный']]
    .map(d=>'<button class="pill '+(S.diff===d[0]?'on':'')+'" onclick="setDiff(\''+d[0]+'\')">'+d[1]+'</button>').join('');
  const modePills = [['guided','Пошагово'],['direct','Сразу']]
    .map(m=>'<button class="pill '+(S.mode===m[0]?'on':'')+'" onclick="setMode(\''+m[0]+'\')">'+m[1]+'</button>').join('');
  el('tabbody').innerHTML =
    '<div class="ctrls">'+subGroup
    +'<div class="ctrl-group"><span class="ctrl-lbl">Сложность</span><div class="pills">'+diffPills+'</div></div>'
    +'<div class="ctrl-group"><span class="ctrl-lbl">Режим</span><div class="pills">'+modePills+'</div></div>'
    +'</div><div id="pbody"></div>';
  renderPracticeBody();
}
function renderPracticeBody(){
  const p=S.cur;
  const bodyCls = (p.textMode==='prose') ? 'prob-prose' : 'expr-big';
  let probHTML = '<div class="qnum">задача</div><div class="qcap">'+(p.cap||'Вычислите')+'</div><div class="'+bodyCls+'">'+p.display+'</div>';
  if(p.chain && S.mode==='guided'){ let latest=-1; for(let j=0;j<p.chain.length;j++){ if(S.stageIdx>j) latest=j; } if(latest>=0) probHTML += '<div class="eqstep"><div class="eqarrow">⇩ равносильно</div><div class="expr-big">'+p.chain[latest]+'</div></div>'; }
  if(typeof p.scene==='function'){ probHTML += p.scene(S.mode==='guided'?S.stageIdx:(S.done?99:0), S.done); }
  let inner = '<div class="prob">'+probHTML+'</div>';
  if(S.mode==='guided'){
    for(let i=0;i<S.stageIdx;i++) inner += '<div class="stage-done"><span class="tick">✓</span><div>'+p.stages[i].doneText+'</div></div>';
    if(!S.done){
      const st=p.stages[S.stageIdx];
      inner += '<div class="stage-active"><div class="sh">'+st.label+' · шаг '+(S.stageIdx+1)+' из '+p.stages.length+'</div>'
        +'<div class="sp">'+st.prompt+'</div>'
        +'<div class="ans-zone"><span class="ans-lbl">Ответ:</span>'+renderAnsInputs(st.answer,'pinp',st.placeholder)
        +'<span class="hint-note">'+ansHint(st.answer)+'</span></div></div>';
    }
  } else {
    if(!S.done){
      inner += '<div class="ans-zone"><span class="ans-lbl">Ответ:</span>'+renderAnsInputs(p.answer,'pinp')
        +'<span class="hint-note">'+ansHint(p.answer)+'</span></div>';
    } else {
      inner += '<div class="stage-done"><span class="tick">✓</span><div>Ответ: <span class="math">'+specDisplay(p.answer)+'</span></div></div>';
    }
  }
  inner += '<div class="btns">';
  if(!S.done){
    inner += '<button class="btn btn-primary" onclick="checkPractice()">Проверить</button>';
    if(!S.revealed) inner += '<button class="btn btn-ghost" onclick="revealSolution()">Показать решение</button>';
    inner += '<button class="btn btn-ghost" onclick="skipPractice()">Пропустить</button>';
  } else {
    inner += '<button class="btn btn-go" onclick="nextPractice()">Следующая задача →</button>';
    if(!S.revealed) inner += '<button class="btn btn-ghost" onclick="revealSolution()">Показать решение</button>';
  }
  inner += '</div><div id="pfb"></div><div id="psol"></div>';
  el('pbody').innerHTML = inner;
  if(S.fb){ const f=el('pfb'); f.className='fb '+S.fb.cls+(S.fb.pop?' pop':''); f.innerHTML=S.fb.html; }
  if(S.revealed) renderSolutionInto();
  const activeSpec = (S.mode==='guided' && !S.done)? p.stages[S.stageIdx].answer : (!S.done? p.answer : null);
  if(activeSpec){ focusAns(activeSpec,'pinp'); bindEnter(activeSpec,'pinp',checkPractice,nextPractice,()=>S.done); }
}
function renderSolutionInto(){
  const p=S.cur;
  el('psol').innerHTML = '<div class="sol"><h4>Полное решение</h4>'
    + p.steps.map((s,i)=>'<div class="step"><span class="n">'+(i+1)+'</span><div>'+s+'</div></div>').join('') + '</div>';
}
function checkPractice(){
  if(S.done) return; const p=S.cur;
  if(S.mode==='direct'){
    const r=readAns(p.answer,'pinp');
    if(r.empty){ setFb('no','<div class="ic">?</div><div>Введи ответ, чтобы проверить.</div>'); shakeAns(p.answer,'pinp'); return; }
    if(r.ok) finishProblem(); else wrongPractice(p.hint);
  } else {
    const st=p.stages[S.stageIdx], r=readAns(st.answer,'pinp');
    if(r.empty){ setFb('no','<div class="ic">?</div><div>Введи ответ для этого шага.</div>'); shakeAns(st.answer,'pinp'); return; }
    if(r.ok){ S.stageVals.push(st.doneText); S.stageIdx++;
      if(S.stageIdx>=p.stages.length) finishProblem();
      else { S.fb=null; toast('Шаг зачтён ✓'); renderPracticeBody(); }
    } else wrongPractice(st.hint);
  }
}
function wrongPractice(hintText){
  S.attempts++; S.streak=0; updateMini();
  const msg=pick(['Почти! Проверь вычисления.','Не совсем — попробуй ещё раз.','Ещё разок, ты близко.','Пересчитай внимательно.']);
  setFb('no','<div class="ic">✕</div><div>'+msg+'<div class="sub">Подсказка: '+hintText+'</div></div>'); shakeAns(currentSpec(),'pinp');
}
function currentSpec(){ const p=S.cur; return (S.mode==='guided')? p.stages[S.stageIdx].answer : p.answer; }
function finishProblem(){
  S.done=true;
  const firstTry = S.attempts===0 && !S.revealed;
  const gain = S.revealed?2:(S.attempts===0?10:4);
  S.xp+=gain; S.solved++; S.pCount++; if(firstTry) S.pFirst++;
  if(firstTry){ S.streak++; if(S.streak>S.best) S.best=S.streak; S.mastery[S.taskId]=(S.mastery[S.taskId]||0)+1; }
  const praise=pick(['Верно!','Отлично!','Супер!','Так держать!','Точно в цель!','Красиво!','Молодец!','Правильно!']);
  const sub = firstTry ? 'С первого раза — серия растёт!' : (S.revealed?'Ты разобрался с решением.':'Получилось — отлично!');
  S.fb={ cls:'ok', pop:true, html:'<div class="ic">✓</div><div>'+praise+'<div class="sub">'+sub+'</div></div>' };
  dailyRecordPractice({ task:(catById(S.taskId)||{}).title||'Тренировка', correct:true, firstTry:firstTry, mistakes:S.attempts, attempts:S.attempts+1, revealed:S.revealed, mode:S.mode, diff:S.diff });
  renderPracticeBody(); updateMini(); celebrate(gain, firstTry);
}
function revealSolution(){ S.revealed=true; renderPracticeBody(); }
function nextPractice(){ newPractice(); renderPracticeBody(); }
function skipPractice(){ newPractice(); renderPracticeBody(); }
function setFb(cls,html){ S.fb={cls,html}; const f=el('pfb'); if(f){ f.className='fb '+cls; f.innerHTML=html; } }

/* ================= ОБЩЕЕ ================= */
function shake(id){ const e=el(id); if(e){ e.classList.remove('shake'); void e.offsetWidth; e.classList.add('shake'); } }
function updateMini(){ const s=el('mini-streak'), m=el('mini-mast'); if(s) s.textContent=S.streak; if(m) m.textContent=S.mastery[S.taskId]||0; }
function toast(html, level){ const t=el('toast'); t.innerHTML=html; t.className=level?'level show':'show'; clearTimeout(t._t); t._t=setTimeout(()=>{ t.className=level?'level':''; },1700); }
function celebrate(gain, firstTry){
  const before=Math.floor((S.xp-gain)/100)+1, after=Math.floor(S.xp/100)+1;
  const lvl = after>before, mile = firstTry && S.streak>0 && S.streak%5===0;
  if(lvl) toast('🎉 Новый уровень '+after+'!', true);
  else if(mile) toast('🔥 Серия '+S.streak+'! Отличная работа!');
  else toast('<span>Верно!</span><span class="xp-badge">+'+gain+' XP</span>');
  if(REDUCE) return;
  confetti(lvl?64:mile?52:40);                 // заметный дождь при каждом верном ответе
  if(lvl){ fxFireworks(); fxTrophy(); }
  else if(mile){ fxFireworks(); pick([fxWreath,fxTrophy,fxMedal])(); }
  else { pick([fxFireworks,fxFlowers,fxStars,fxGesture,fxBalloons,fxMedal,fxTrophy,fxWreath])(); }
}
const REDUCE = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
function confetti(count){
  const root=el('confetti-root'), colors=['#7d5bff','#18c08a','#EE8A12','#F2463A','#1C9BDD','#a78bff','#ffd23f','#ff6fae'];
  for(let i=0;i<count;i++){
    const c=document.createElement('div'); c.className='confetto'; const size=8+Math.random()*10;
    c.style.left=(Math.random()*100)+'vw'; c.style.top='-8vh'; c.style.width=size+'px'; c.style.height=(size*1.4)+'px';
    c.style.background=colors[i%colors.length]; c.style.borderRadius=Math.random()<.4?'50%':'2px'; c.style.opacity='0.95';
    const dur=1.7+Math.random()*1.3, delay=Math.random()*0.5;
    c.style.animation='fall '+dur+'s cubic-bezier(.25,.5,.5,1) '+delay+'s forwards';
    root.appendChild(c); setTimeout(()=>c.remove(),(dur+delay)*1000+200);
  }
}
const FX_COLORS=['#7d5bff','#18c08a','#EE8A12','#F2463A','#1C9BDD','#a78bff','#ffd23f','#ff6fae'];
function W(){ return window.innerWidth||800; } function H(){ return window.innerHeight||600; }
function fxBurst(cx, cy, n, palette, spread){
  const root=el('confetti-root');
  for(let i=0;i<n;i++){
    const a=(Math.PI*2*i/n)+Math.random()*0.35, dist=(spread*0.5)+Math.random()*spread, sz=6+Math.random()*11;
    const p=document.createElement('div');
    p.style.cssText='position:fixed;left:'+cx+'px;top:'+cy+'px;width:'+sz+'px;height:'+sz+'px;border-radius:'+(Math.random()<.5?'50%':'2px')+';background:'+palette[i%palette.length]+';z-index:64;pointer-events:none;box-shadow:0 0 6px '+palette[i%palette.length]+';';
    p.style.setProperty('--dx',(Math.cos(a)*dist).toFixed(1)+'px'); p.style.setProperty('--dy',(Math.sin(a)*dist).toFixed(1)+'px');
    p.style.animation='fxburst '+(0.9+Math.random()*0.6)+'s cubic-bezier(.15,.7,.4,1) forwards';
    root.appendChild(p); setTimeout(()=>p.remove(),1600);
  }
}
function emojiBurst(set,n,cy){
  const root=el('confetti-root'), cx=W()/2, y=cy||H()*0.42;
  for(let i=0;i<n;i++){ const a=Math.PI*2*i/n+Math.random()*0.4, dist=80+Math.random()*120;
    const e=document.createElement('div'); e.textContent=pick(set);
    e.style.cssText='position:fixed;left:'+cx+'px;top:'+y+'px;font-size:'+(20+Math.random()*16)+'px;z-index:65;pointer-events:none;';
    e.style.setProperty('--dx',(Math.cos(a)*dist).toFixed(1)+'px'); e.style.setProperty('--dy',(Math.sin(a)*dist).toFixed(1)+'px');
    e.style.animation='fxburst '+(0.9+Math.random()*0.5)+'s ease-out forwards'; root.appendChild(e); setTimeout(()=>e.remove(),1500); }
}
function fxFireworks(){ const n=3+Math.floor(Math.random()*2);
  for(let b=0;b<n;b++){ (function(bb){ setTimeout(function(){ const cx=W()*(0.18+Math.random()*0.64), cy=H()*(0.16+Math.random()*0.42);
    fxFlash(cx,cy,'rgba(255,240,190,.7)'); fxBurst(cx, cy, 26, FX_COLORS, 150); }, bb*260); })(b); } }
function fxStars(){ fxBurst(W()/2,H()*0.42,22,['#ffd23f','#ffe08a','#fff2c2','#ffbf47','#ffcf5a'],140); emojiBurst(['⭐','✨','🌟'],12); }
function fxFlowers(){ const root=el('confetti-root'), set=['🌸','🌼','🌺','🌷','🏵️','🌻'];
  for(let i=0;i<12;i++){ const e=document.createElement('div'); e.textContent=pick(set);
    e.style.cssText='position:fixed;left:'+(Math.random()*W())+'px;top:'+(H()*0.25+Math.random()*H()*0.6)+'px;font-size:'+(24+Math.random()*18)+'px;z-index:65;pointer-events:none;transform-origin:center bottom;';
    e.style.animation='fxbloom '+(1.4+Math.random()*0.5)+'s ease-out '+(Math.random()*0.5)+'s both'; root.appendChild(e); setTimeout(()=>e.remove(),2400); } }
function fxRise(set,n){ const root=el('confetti-root');
  for(let i=0;i<n;i++){ const e=document.createElement('div'); e.textContent=pick(set);
    e.style.cssText='position:fixed;left:'+(5+Math.random()*90)+'vw;bottom:-8vh;font-size:'+(26+Math.random()*16)+'px;z-index:65;pointer-events:none;';
    e.style.animation='fxrise '+(1.8+Math.random()*1.0)+'s ease-in '+(Math.random()*0.4)+'s forwards'; root.appendChild(e); setTimeout(()=>e.remove(),3200); } }
function fxFlash(cx,cy,color){ const root=el('confetti-root'); const f=document.createElement('div');
  f.style.cssText='position:fixed;left:'+cx+'px;top:'+cy+'px;width:300px;height:300px;margin:-150px 0 0 -150px;border-radius:50%;z-index:65;pointer-events:none;background:radial-gradient(circle,'+(color||'rgba(255,220,120,.9)')+' 0%,rgba(255,255,255,0) 68%);animation:fxflash .95s ease-out forwards;';
  root.appendChild(f); setTimeout(()=>f.remove(),1050); }
function fxCenter(html, opts){ opts=opts||{}; const root=el('confetti-root'); const cx=W()/2, cy=H()*0.42;
  fxFlash(cx,cy,opts.flash);
  const wrap=document.createElement('div'); wrap.style.cssText='position:fixed;left:50%;top:42%;transform:translate(-50%,-50%);z-index:66;pointer-events:none;text-align:center;';
  const inner=document.createElement('div'); inner.innerHTML=html;
  inner.style.cssText='font-size:'+(opts.size||96)+'px;line-height:1;filter:drop-shadow(0 12px 24px rgba(0,0,0,.22));animation:'+(opts.anim||'fxdrop')+' '+(opts.dur||2.0)+'s cubic-bezier(.2,.9,.3,1) both;';
  wrap.appendChild(inner); root.appendChild(wrap); setTimeout(()=>wrap.remove(), (opts.dur||2.0)*1000+300); }
function fxTrophy(){ fxCenter('🏆',{size:104,anim:'fxdrop',dur:2.0,flash:'rgba(255,215,110,.95)'}); emojiBurst(['✨','⭐','🎉'],14); }
function fxMedal(){ fxCenter('🥇',{size:98,anim:'fxdrop',dur:1.9,flash:'rgba(255,215,110,.9)'}); emojiBurst(['✨','⭐'],12); }
function fxWreath(){ fxCenter('<span style="display:inline-flex;align-items:center;gap:1px"><span style="display:inline-block;transform:scaleX(-1)">🌿</span><span>🏅</span><span>🌿</span></span>',{size:88,anim:'fxpop',dur:2.0,flash:'rgba(180,240,150,.9)'}); fxBurst(W()/2,H()*0.42,16,['#ffd23f','#c9f36b','#9be15d'],110); }
function fxGesture(){ fxCenter(pick(['👏','🙌','👍','💪','🤩','💯','🎉']),{size:98,anim:'fxpop',dur:1.7,flash:'rgba(180,160,255,.85)'}); emojiBurst(['✨','🎉'],10); }
function fxBalloons(){ fxRise(['🎈','🎈','🎈','🎉'],10); }
function fxRandom(firstTry){
  const pool=['fireworks','fireworks','flowers','flowers','stars','stars','gesture','balloons','confetti','confetti','medal','trophy','wreath'];
  const k=pick(pool);
  if(k==='fireworks') fxFireworks();
  else if(k==='flowers') fxFlowers();
  else if(k==='stars') fxStars();
  else if(k==='gesture') fxGesture();
  else if(k==='balloons') fxBalloons();
  else if(k==='medal') fxMedal();
  else if(k==='trophy') fxTrophy();
  else if(k==='wreath') fxWreath();
  else confetti(firstTry?26:16);
}
function fxGrand(reason){ fxFireworks();
  if(reason==='level'){ fxTrophy(); confetti(30); }
  else { pick([fxWreath,fxTrophy,fxMedal])(); confetti(24); } }
function fxLight(){ pick([function(){confetti(14);}, fxStars, fxFlowers, function(){emojiBurst(['✨','⭐','🎉'],8);}])(); }

/* ================= РЕЖИМ «ВАРИАНТ» ================= */
function buildVariant(){
  const D='medium', items=[];
  const add=(id,sub,label)=>{ const mod=catById(id).mod; items.push({ id, sub, label, title:catById(id).title, prob:mod.practice(D,sub) }); };
  add(1,null,'Задание 1');
  add(2,'frac','Задание 2.1');
  add(2,'dec','Задание 2.2');
  add(3,null,'Задание 3');
  add(4,null,'Задание 4');
  add(5,pick(['motion','work']),'Задание 5');
  add(6,null,'Задание 6');
  add(7,null,'Задание 7');
  add(8,null,'Задание 8');
  add(9,null,'Задание 9');
  return items;
}
function startVariant(){
  S.screen='variant';
  S.variant={ items:buildVariant(), idx:0, recorded:[], correct:0, xpGain:0, done:false };
  renderVariant(); window.scrollTo(0,0);
}
function renderVariant(){
  const V=S.variant;
  if(V.done){ renderVariantResults(); return; }
  const it=V.items[V.idx], p=it.prob, total=V.items.length, num=V.idx+1;
  const bodyCls=(p.textMode==='prose')?'prob-prose':'expr-big';
  const sceneHTML=(typeof p.scene==='function')? p.scene(0,false) : '';
  const progress=Math.round(V.idx/total*100);
  el('app').innerHTML =
    '<div class="var-head"><button class="back" onclick="exitVariant()">← Выйти</button>'
    +'<div class="var-progress"><div class="var-ptrack"><div class="var-pfill" style="width:'+progress+'%"></div></div>'
    +'<div class="var-pnum">'+num+' / '+total+'</div></div></div>'
    +'<div class="var-card"><div class="var-tag">'+it.label+' · '+it.title+'</div>'
    +'<div class="prob"><div class="qcap">'+(p.cap||'Вычислите')+'</div><div class="'+bodyCls+'">'+p.display+'</div>'+sceneHTML+'</div>'
    +'<div class="ans-zone"><span class="ans-lbl">Ответ:</span>'+renderAnsInputs(p.answer,'vinp')+'<span class="hint-note">'+ansHint(p.answer)+'</span></div>'
    +'<div id="vfb"></div>'
    +'<div class="btns"><button class="btn btn-primary" onclick="variantAnswer()">'+(num<total?'Ответить и далее →':'Ответить и завершить')+'</button>'
    +'<button class="btn btn-ghost" onclick="variantSkip()">Пропустить</button></div></div>'
    +'<div class="var-foot">Отвечай на каждое задание — в конце будет результат и разбор. Пошаговых подсказок здесь нет, как на диагностике.</div>';
  focusAns(p.answer,'vinp'); bindEnter(p.answer,'vinp',variantAnswer,variantAnswer,()=>false);
}
function readUserAnswer(spec,prefix){
  if(spec.t==='frac'){ const n=(el(prefix+'N').value||'').trim(), d=(el(prefix+'D').value||'').trim(); if(n==='') return '—'; return d===''?n:(n+'/'+d); }
  const v=(el(prefix).value||'').trim(); return v===''?'—':v.replace(/-/g,'−');
}
function recordVariant(correct, userAns){
  const V=S.variant, it=V.items[V.idx], p=it.prob;
  V.recorded.push({ label:it.label, title:it.title, correct, userAns, correctAns:specDisplay(p.answer), steps:p.steps });
  if(correct){ V.correct++; V.xpGain+=8; }
  V.idx++;
  if(V.idx>=V.items.length) finishVariant(); else { renderVariant(); window.scrollTo(0,0); }
}
function variantAnswer(){
  const V=S.variant, it=V.items[V.idx], p=it.prob, r=readAns(p.answer,'vinp');
  if(r.empty){ el('vfb').className='fb no'; el('vfb').innerHTML='<div class="ic">?</div><div>Впиши ответ или нажми «Пропустить».</div>'; shakeAns(p.answer,'vinp'); return; }
  recordVariant(!!r.ok, readUserAnswer(p.answer,'vinp'));
}
function variantSkip(){ recordVariant(false,'—'); }
function finishVariant(){
  const V=S.variant; V.done=true;
  const tot=V.items.length, corr=V.correct;
  S.xp+=V.xpGain; S.solved+=corr; S.pCount+=tot; S.pFirst+=corr;
  let trail=0; for(let i=V.recorded.length-1;i>=0;i--){ if(V.recorded[i].correct) trail++; else break; }
  S.streak=trail; if(S.streak>S.best) S.best=S.streak;
  dailyRecordVariant(V);
  renderVariantResults(); window.scrollTo(0,0);
  if(!REDUCE){ const pct=corr/tot; if(pct>=0.8){ fxFireworks(); pick([fxTrophy,fxWreath,fxMedal])(); confetti(52); } else if(pct>=0.5){ confetti(30); fxStars(); } else { confetti(16); } }
}
function renderVariantResults(){
  const V=S.variant, tot=V.items.length, corr=V.correct, pct=Math.round(corr/tot*100);
  const grade = pct>=90?'Отлично!':pct>=70?'Хороший результат':pct>=50?'Неплохо — есть куда расти':'Стоит потренироваться ещё';
  const rows=V.recorded.map((r,i)=>
    '<div class="vr-row '+(r.correct?'ok':'no')+'"><div class="vr-ic">'+(r.correct?'✓':'✕')+'</div>'
    +'<div class="vr-main"><div class="vr-lab">'+r.label+' · '+r.title+'</div>'
    +'<div class="vr-ans">Твой ответ: <b>'+r.userAns+'</b>'+(r.correct?'':' · Верно: <b class="math">'+r.correctAns+'</b>')+'</div>'
    +'<div class="vr-sol" id="vsol'+i+'" style="display:none"><div class="sol"><h4>Решение</h4>'
    + r.steps.map((s,j)=>'<div class="step"><span class="n">'+(j+1)+'</span><div>'+s+'</div></div>').join('')
    +'</div></div></div>'
    +'<button class="vr-toggle" onclick="toggleVarSol('+i+')">Разбор</button></div>'
  ).join('');
  el('app').innerHTML =
    '<div class="var-head"><button class="back" onclick="goHub()">← На главную</button></div>'
    +'<div class="vr-hero"><div class="vr-score"><span class="vr-big">'+corr+'</span><span class="vr-tot">/ '+tot+'</span></div>'
    +'<div class="vr-grade">'+grade+'</div>'
    +'<div class="vr-bar"><div class="vr-barfill" style="width:'+pct+'%"></div></div>'
    +'<div class="vr-xp">+'+V.xpGain+' XP за вариант</div></div>'
    +'<div class="vr-list">'+rows+'</div>'
    +'<div class="btns" style="justify-content:center;margin:18px 0"><button class="btn btn-primary" onclick="startVariant()">Пройти заново</button>'
    +'<button class="btn btn-ghost" onclick="goHub()">На главную</button></div>';
}
function toggleVarSol(i){ const e=el('vsol'+i); if(e) e.style.display = (e.style.display==='none')?'block':'none'; }
function exitVariant(){ S.variant=null; goHub(); }

/* ================= НАВИГАЦИЯ ================= */
function openTask(id){
  const c=catById(id); if(!c.ready){ toast('Этот тренажёр скоро появится 🙂'); return; }
  S.taskId=id; S.tab='practice';
  S.sub = c.mod.meta.subs ? c.mod.meta.subs[0].key : null;
  newPractice();
  S.warm=currentMod().warmup(S.sub); S.warmDone=false; S.warmAttempts=0;
  renderTask(); window.scrollTo(0,0);
}
function goHub(){ S.screen='hub'; renderHub(); window.scrollTo(0,0); }
function gotoTab(name){
  S.tab=name;
  if(name==='practice' && !S.cur) newPractice();
  if(name==='warmup'){ S.warm=currentMod().warmup(S.sub); S.warmDone=false; S.warmAttempts=0; }
  renderTask(); window.scrollTo(0,0);
}
function setDiff(d){ if(S.diff===d) return; S.diff=d; newPractice(); renderPractice(); }
function setMode(m){ if(S.mode===m) return; S.mode=m; newPractice(); renderPractice(); }
function setSub(k){ if(S.sub===k) return; S.sub=k; newPractice(); renderPractice(); }

window.openTask=openTask; window.goHub=goHub; window.gotoTab=gotoTab;
window.setDiff=setDiff; window.setMode=setMode; window.setSub=setSub;
window.startVariant=startVariant; window.variantAnswer=variantAnswer; window.variantSkip=variantSkip; window.exitVariant=exitVariant; window.toggleVarSol=toggleVarSol;
window.checkPractice=checkPractice; window.revealSolution=revealSolution; window.nextPractice=nextPractice; window.skipPractice=skipPractice;
window.warmPick=warmPick; window.warmCheck=warmCheck; window.nextWarm=nextWarm;

/* ================= СТАРТ ================= */
renderHub();
</script>
