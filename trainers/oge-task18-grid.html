<script>
'use strict';
/* ================= ОГЭ №18 · Фигуры на клетчатой бумаге =================
   Каркас серии: SUBS (реестр подтипов) + ARCHIVE (готовые задачи с эталонами)
   + build() + режимы Разбор/Тренировка/Зачёт/Справочник + селфтест ?selftest=1.
   Хранилище: mathExamCourseProgress.v1, TID='oge18-kletki'.               */

const TID='oge18-kletki';
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=a=>a[Math.floor(Math.random()*a.length)];
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
function parseAns(s){
  s=String(s==null?'':s).trim().replace(/\s+/g,'');
  if(!s)return NaN;
  s=s.replace(',','.');
  const m=s.match(/^(-?\d+(?:\.\d+)?)\/(\d+(?:\.\d+)?)$/);
  if(m){const d=parseFloat(m[2]);return d?parseFloat(m[1])/d:NaN;}
  return /^-?\d+(?:\.\d+)?$/.test(s)?parseFloat(s):NaN;
}
const near=(a,b,e)=>Math.abs(a-b)<=(e==null?1e-6:e);
const fmt=n=>{const r=Math.round(n*1000)/1000;return String(r).replace('.',',');};
const frac=(u,d)=>'<span class="frac"><span class="up">'+u+'</span><span class="dn">'+d+'</span></span>';
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* ---------- SVG-слой клетчатой бумаги ----------
   Координаты — в клетках, y вверх. Каждый построитель копит chk-ассерты:
   геоаудит рождается вместе с фигурой, а не прикручен потом.            */
const INK='#1a1a2e', GRID='#d9d2bd', AUX='#d97706', BLUE='#2d70b3', OKC='#16a34a';
function CF(W,H){
  const G=30,P=19, o={W,H,parts:[],chk:[]};
  const X=x=>+(P+x*G).toFixed(2), Y=y=>+(P+(H-y)*G).toFixed(2);
  o.X=X; o.Y=Y;
  let lines='';
  for(let x=0;x<=W;x++)lines+='<line x1="'+X(x)+'" y1="'+Y(0)+'" x2="'+X(x)+'" y2="'+Y(H)+'" stroke="'+GRID+'" stroke-width="1"/>';
  for(let y=0;y<=H;y++)lines+='<line x1="'+X(0)+'" y1="'+Y(y)+'" x2="'+X(W)+'" y2="'+Y(y)+'" stroke="'+GRID+'" stroke-width="1"/>';
  o.parts.push(lines);
  o.seg=(x1,y1,x2,y2,st)=>{st=st||{};o.parts.push('<line x1="'+X(x1)+'" y1="'+Y(y1)+'" x2="'+X(x2)+'" y2="'+Y(y2)+'" stroke="'+(st.c||INK)+'" stroke-width="'+(st.w||2.6)+'"'+(st.d?' stroke-dasharray="'+st.d+'"':'')+' stroke-linecap="round"/>');};
  o.poly=(pts,st)=>{st=st||{};o.parts.push('<polygon points="'+pts.map(p=>X(p[0])+','+Y(p[1])).join(' ')+'" fill="'+(st.f||'rgba(45,112,179,.10)')+'" stroke="'+(st.c||INK)+'" stroke-width="'+(st.w||2.6)+'" stroke-linejoin="round"/>');};
  o.circle=(cx,cy,r,st)=>{st=st||{};o.parts.push('<circle cx="'+X(cx)+'" cy="'+Y(cy)+'" r="'+(r*G).toFixed(2)+'" fill="'+(st.f||'rgba(45,112,179,.08)')+'" stroke="'+(st.c||INK)+'" stroke-width="'+(st.w||2.4)+'"/>');};
  o.dot=(x,y,st)=>{st=st||{};o.parts.push('<circle cx="'+X(x)+'" cy="'+Y(y)+'" r="'+(st.r||4)+'" fill="'+(st.c||INK)+'"/>');};
  o.lab=(x,y,t,dx,dy,st)=>{st=st||{};const px=X(x)+(dx==null?8:dx),py=Y(y)+(dy==null?-8:dy);
    o.parts.push('<text x="'+px+'" y="'+py+'" font-size="15" font-weight="900" fill="'+(st.c||INK)+'" stroke="rgba(255,253,247,.95)" stroke-width="4" paint-order="stroke" font-style="italic" font-family="Georgia,serif">'+esc(t)+'</text>');};
  o.rightSq=(x,y,ux,uy,vx,vy)=>{const s=.38, p1=[x+ux*s,y+uy*s], p2=[x+ux*s+vx*s,y+uy*s+vy*s], p3=[x+vx*s,y+vy*s];
    o.parts.push('<polyline points="'+[p1,p2,p3].map(p=>X(p[0])+','+Y(p[1])).join(' ')+'" fill="none" stroke="'+OKC+'" stroke-width="2.2"/>');
    o.chk.push({t:'perp',v:ux*vx+uy*vy});};
  // дуга угла полилинией (без SVG-arc)
  o.arc=(cx,cy,r,a1,a2,st)=>{st=st||{};let pts=[];for(let i=0;i<=24;i++){const a=a1+(a2-a1)*i/24;pts.push(X(cx+r*Math.cos(a))+','+Y(cy+r*Math.sin(a)));}
    o.parts.push('<polyline points="'+pts.join(' ')+'" fill="none" stroke="'+(st.c||AUX)+'" stroke-width="3" stroke-linecap="round"/>');};
  o.svg=()=>{const w=P*2+W*G,h=P*2+H*G;
    return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+w+' '+h+'" width="'+Math.min(560,w)+'" role="img"><rect x="0" y="0" width="'+w+'" height="'+h+'" fill="#fffdf7" rx="10"/>'+o.parts.join('')+'</svg>';};
  // базовые ассерты честности клеток
  o.node=(x,y,name)=>{o.chk.push({t:'node',v:(Number.isInteger(x)&&Number.isInteger(y))?0:1,n:name});o.chk.push({t:'frame',v:(x>=0&&x<=W&&y>=0&&y<=H)?0:1,n:name});};
  o.eqSides=pts=>{const L=[];for(let i=0;i<pts.length;i++){const a=pts[i],b=pts[(i+1)%pts.length];L.push(Math.hypot(b[0]-a[0],b[1]-a[1]));}
    const mx=Math.max(...L),mn=Math.min(...L);o.chk.push({t:'eqSides',v:(mx-mn)/mx});};
  o.parallel=(a,b,c,d,want)=>{const cr=(b[0]-a[0])*(d[1]-c[1])-(b[1]-a[1])*(d[0]-c[0]);o.chk.push({t:'par',v:want?Math.abs(cr):(Math.abs(cr)<1e-9?1:0)});};
  return o;
}
/* ---------- Справочник формул (REF) ---------- */
const REF={
  pyth:{h:'Теорема Пифагора на клетках',f:'c² = a² + b²',t:'Расстояние между узлами: считаем катеты по клеткам (вправо и вверх), гипотенуза — по теореме Пифагора. Держать в голове тройки: 3-4-5, 6-8-10, 5-12-13.'},
  midtri:{h:'Средняя линия треугольника',f:'m = '+frac('a','2'),t:'Отрезок, соединяющий середины двух сторон, параллелен третьей стороне и равен её половине.'},
  midtrap:{h:'Средняя линия трапеции',f:'m = '+frac('a + b','2'),t:'Отрезок, соединяющий середины боковых сторон, равен полусумме оснований.'},
  stri:{h:'Площадь треугольника',f:'S = '+frac('a · h','2'),t:'Половина произведения основания на высоту. На клетках основание берём по линии сетки — тогда высота тоже считается по клеткам.'},
  spar:{h:'Площадь параллелограмма',f:'S = a · h',t:'Основание умножить на высоту. Осторожно: наклонная боковая сторона — НЕ высота.'},
  srhomb:{h:'Площадь ромба',f:'S = '+frac('d₁ · d₂','2'),t:'Половина произведения диагоналей. На клетках диагонали ромба обычно идут по линиям сетки — просто считаем клетки.'},
  strap:{h:'Площадь трапеции',f:'S = '+frac('a + b','2')+' · h',t:'Полусумма оснований, умноженная на высоту.'},
  tan:{h:'Тангенс острого угла',f:'tg α = '+frac('противолежащий катет','прилежащий катет'),t:'Достраиваем прямоугольный треугольник по клеткам: тангенс — отношение вертикального катета к горизонтальному.'},
  sim:{h:'Подобие и теорема Фалеса',f:frac('AB','CD')+' = '+frac('h₁','h₂'),t:'Прямая, параллельная стороне треугольника, отсекает подобный треугольник: все длины умножаются на один коэффициент.'},
  circ:{h:'Площади кругов',f:frac('S₁','S₂')+' = '+'('+frac('R₁','R₂')+')²',t:'S = πR², поэтому отношение площадей равно КВАДРАТУ отношения радиусов. Радиус по диагонали клеток находим через Пифагора: R² = a² + b².'},
  cells:{h:'Площадь фигуры по клеткам',f:'S = целые клетки + половинки',t:'Режем фигуру линиями сетки на прямоугольники и половинки прямоугольников — или дополняем до прямоугольника и вычитаем лишнее.'}
};

/* ---------- Реестр подтипов ---------- */
const TOPICS={len:'Длины',mid:'Средние линии',area:'Площади',rel:'Отношения'};
const SUBS={};

/* ===== ДЛИНЫ ===== */
SUBS.dist={topic:'len',name:'Расстояние между точками',ref:'pyth',
  refWhy:'Две точки в узлах сетки — это гипотенуза прямоугольного треугольника с катетами по клеткам. Пифагор превращает счёт клеток в длину.',
  law:'Расстояние между узлами = √(Δx² + Δy²). Ищи пифагоровы тройки: 3-4-5, 6-8-10, 5-12-13.',
  text:()=>'На клетчатой бумаге с размером клетки 1×1 изображены две точки. Найдите расстояние между ними.',
  calc:p=>Math.hypot(p[0],p[1]),
  proto:[4,3,0],
  gen(){const t=pick([[3,4],[4,3],[6,8],[8,6],[5,12],[12,5],[9,12],[12,9]]);return [t[0],t[1],rnd(0,1)];},
  fig(p,aux){const [dx,dy,o]=p,W=dx+2,H=dy+2,f=CF(W,H);
    const A=[1,o?dy+1:1],B=[1+dx,o?1:dy+1];
    if(aux){f.seg(A[0],A[1],B[0],A[1],{c:AUX,w:2,d:'6 5'});f.seg(B[0],A[1],B[0],B[1],{c:AUX,w:2,d:'6 5'});
      f.rightSq(B[0],A[1],(A[0]-B[0])/Math.abs(A[0]-B[0]),0,0,(B[1]-A[1])/Math.abs(B[1]-A[1]));
      f.seg(A[0],A[1],B[0],B[1],{c:BLUE,w:2.6});}
    f.dot(A[0],A[1]);f.dot(B[0],B[1]);
    f.lab(A[0],A[1],'A',-16,o?-8:16);f.lab(B[0],B[1],'B',8,o?16:-8);
    f.node(A[0],A[1],'A');f.node(B[0],B[1],'B');
    f.chk.push({t:'ans',v:Math.hypot(B[0]-A[0],B[1]-A[1])});
    return f;},
  sol(p){const[dx,dy]=p,c=Math.hypot(dx,dy);return[
    'Достроим прямоугольный треугольник: от A до B идём по клеткам '+dx+' вправо и '+dy+(p[2]?' вниз':' вверх')+'. Катеты: '+dx+' и '+dy+'.',
    'По теореме Пифагора: AB² = '+dx+'² + '+dy+'² = '+(dx*dx)+' + '+(dy*dy)+' = '+(dx*dx+dy*dy)+'.',
    'AB = √'+(dx*dx+dy*dy)+' = '+fmt(c)+'. Это пифагорова тройка '+Math.min(dx,dy)+'-'+Math.max(dx,dy)+'-'+fmt(c)+'.'];},
  diag(p){const[dx,dy]=p;return[
    {v:dx+dy,m:'Вы сложили катеты — так считают путь по клеткам, а не расстояние по прямой. Нужна теорема Пифагора: √(Δx² + Δy²).'},
    {v:Math.max(dx,dy),m:'Это только больший катет. Расстояние между точками — гипотенуза, она длиннее любого катета.'},
    {v:dx*dx+dy*dy,m:'Это квадрат расстояния. Вы нашли AB², остался последний шаг — извлечь корень.'}];}
};

SUBS.midBC={topic:'len',name:'Расстояние до середины отрезка',ref:'pyth',
  refWhy:'Середина BC находится по клеткам (полусумма координат), а расстояние от A до неё — снова Пифагор по катетам-клеткам.',
  law:'Сначала отметь середину отрезка по клеткам, затем считай расстояние по Пифагору.',
  text:()=>'На клетчатой бумаге с размером клетки 1×1 отмечены три точки: A, B и C. Найдите расстояние от точки A до середины отрезка BC.',
  calc(p){const[bx,by,cx,cy,ax,ay]=p;return Math.hypot(ax-(bx+cx)/2,ay-(by+cy)/2);},
  proto:[1,8,1,0,7,4],
  gen(){
    for(let i=0;i<200;i++){
      const mx=rnd(2,5),my=rnd(2,5),u=rnd(0,2),v=u===0?rnd(1,3):rnd(0,3);
      const B=[mx+u,my+v],C=[mx-u,my-v];
      const t=pick([[3,4],[4,3],[6,8],[5,12],[4,0],[0,4],[5,0],[6,0],[0,5]]);
      const A=[mx+t[0],my+(Math.random()<.5?t[1]:-t[1])];
      const xs=[B[0],C[0],A[0]],ys=[B[1],C[1],A[1]];
      const minx=Math.min(...xs),maxx=Math.max(...xs),miny=Math.min(...ys),maxy=Math.max(...ys);
      if(maxx-minx>12||maxy-miny>9)continue;
      const p=[B[0]-minx,B[1]-miny,C[0]-minx,C[1]-miny,A[0]-minx,A[1]-miny];
      if(Math.hypot(B[0]-C[0],B[1]-C[1])<2)continue;
      if(Math.hypot(p[4]-(p[0]+p[2])/2,p[5]-(p[1]+p[3])/2)<2)continue;
      return p;}
    return this.proto.slice();},
  fig(p,aux){const[bx,by,cx,cy,ax,ay]=p;
    const W=Math.max(bx,cx,ax)+1,H=Math.max(by,cy,ay)+1,f=CF(Math.max(W,4),Math.max(H,4));
    const mx=(bx+cx)/2,my=(by+cy)/2;
    if(aux){f.seg(bx,by,cx,cy,{c:'#78716c',w:1.8,d:'5 5'});f.dot(mx,my,{c:AUX,r:4});f.lab(mx,my,'M',8,18,{c:AUX});
      f.seg(ax,ay,mx,my,{c:BLUE,w:2.6});}
    f.dot(bx,by);f.dot(cx,cy);f.dot(ax,ay);
    f.lab(bx,by,'B',-6,-10);f.lab(cx,cy,'C',-6,20);f.lab(ax,ay,'A',10,-8);
    f.node(bx,by,'B');f.node(cx,cy,'C');f.node(ax,ay,'A');
    f.chk.push({t:'ans',v:Math.hypot(ax-mx,ay-my)});
    return f;},
  sol(p){const[bx,by,cx,cy,ax,ay]=p,mx=(bx+cx)/2,my=(by+cy)/2;
    const dx=Math.abs(ax-mx),dy=Math.abs(ay-my),c=Math.hypot(dx,dy);
    return[
    'Отметим середину M отрезка BC: она посередине между B и C по клеткам.',
    'От A до M: '+fmt(dx)+' по горизонтали и '+fmt(dy)+' по вертикали.',
    dy===0||dx===0?'Точки A и M на одной линии сетки: расстояние просто считаем по клеткам — AM = '+fmt(c)+'.':'По Пифагору: AM = √('+fmt(dx)+'² + '+fmt(dy)+'²) = √'+fmt(dx*dx+dy*dy)+' = '+fmt(c)+'.'];},
  diag(p){const[bx,by,cx,cy,ax,ay]=p;
    return[{v:Math.hypot(ax-bx,ay-by),m:'Это расстояние до точки B, а спрашивают — до СЕРЕДИНЫ отрезка BC. Сначала отметьте середину.'},
      {v:Math.hypot(ax-cx,ay-cy),m:'Это расстояние до точки C, а спрашивают — до СЕРЕДИНЫ отрезка BC.'},
      {v:Math.hypot(bx-cx,by-cy)/2,m:'Это половина отрезка BC. А нужен путь от точки A до середины BC.'}];}
};

function rhombFig(p,aux,mode){const[hp,hq]=p,W=2*hp+2,H=2*hq+2,f=CF(W,H);
  const c=[hp+1,hq+1],V=[[c[0]-hp,c[1]],[c[0],c[1]+hq],[c[0]+hp,c[1]],[c[0],c[1]-hq]];
  f.poly(V);
  if(aux){f.seg(V[0][0],V[0][1],V[2][0],V[2][1],{c:BLUE,w:2.6,d:'7 5'});f.seg(V[1][0],V[1][1],V[3][0],V[3][1],{c:AUX,w:2,d:'5 5'});}
  V.forEach((v,i)=>f.node(v[0],v[1],'V'+i));
  f.eqSides(V);
  f.chk.push({t:'ans',v:mode==='diag'?2*Math.max(hp,hq):2*hp*hq});
  return f;}

SUBS.segAB={topic:'rel',name:'Отрезок по данным чертежа (подобие)',ref:'sim',

SUBS.circRatio={topic:'rel',name:'Отношение площадей кругов',ref:'circ',
  refWhy:'Радиусы считываются по клеткам (иногда через Пифагора — по диагонали клеток), а отношение площадей — это КВАДРАТ отношения радиусов: π сокращается.',
  law:'Отношение площадей кругов равно квадрату отношения радиусов: S₁/S₂ = (R₁/R₂)².',
  text:()=>'На клетчатой бумаге изображены два круга. Во сколько раз площадь большего круга больше площади меньшего?',
  calc:p=>p[1]/p[0],
  proto:[1,9],
  gen(){const pairs=[[1,4],[1,9],[1,16],[4,9],[1,2],[2,4],[1,5],[2,5],[4,5],[2,9],[1,8],[5,9],[1,10],[5,16],[4,16]];

    f.dot(c1[0],c1[1],{r:3});f.dot(c2[0],c2[1],{r:3});

  sol(p){const[rsq,Rsq]=p,r=Math.sqrt(rsq),R=Math.sqrt(Rsq);
    const rt=Number.isInteger(r)?'r = '+fmt(r)+' (считаем клетки по радиусу)':'r² = '+rsq+' (радиус идёт по диагонали клеток: r² считаем по Пифагору)';
    const Rt=Number.isInteger(R)?'R = '+fmt(R)+' (считаем клетки)':'R² = '+Rsq+' (по Пифагору через клетки)';
    return[

    'Отношение площадей — квадрат отношения радиусов: '+frac('S₁','S₂')+' = '+frac('πR²','πr²')+' = '+frac('R²','r²')+'.',

  diag(p){const[rsq,Rsq]=p,r=Math.sqrt(rsq),R=Math.sqrt(Rsq);const out=[];

    return out;}
};

/* ---------- Сборка задачи ---------- */
function build(k,p,meta){
  const S=SUBS[k];
  const ans=S.calc(p);
  const f=S.fig(p,false),fa=S.fig(p,true);
  const diag=(S.diag(p)||[]).filter(d=>isFinite(d.v)&&!near(d.v,ans));
  const o={sub:k,p,ans,text:S.text(p),fig:f.svg(),figAux:fa.svg(),chk:f.chk.concat(fa.chk),sol:S.sol(p),diag,ref:S.ref,refWhy:S.refWhy};
  if(meta)for(const key of Object.keys(meta))if(meta[key]!==undefined)o[key]=meta[key];
  return o;
}
function archTask(rec){return build(rec.sub,rec.p,{id:rec.id,exp:rec.exp});}
function genTask(k){return build(k,SUBS[k].gen(),{});}

/* ---------- Хранилище и журнал ---------- */
const STORE_KEY='mathExamCourseProgress.v1';
function loadAll(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||{};}catch(e){return {};}}
function saveAll(a){try{localStorage.setItem(STORE_KEY,JSON.stringify(a));}catch(e){}}
let DB=loadAll();
if(!DB[TID])DB[TID]={runs:0,best:0,events:[],razbor:{},seenArch:{}};
const ST=DB[TID];
if(!ST.razbor)ST.razbor={};
if(!ST.seenArch)ST.seenArch={};
function logE(e){ST.events.push(Object.assign({t:Date.now()},e));if(ST.events.length>300)ST.events=ST.events.slice(-300);saveAll(DB);}
function weakStats(){
  const w={};
  for(const e of ST.events){
    if(e.e==='opt_wrong'||e.e==='quiz_wrong'||e.e==='hint'){const k=e.sub;if(k)w[k]=(w[k]||0)+1;}
  }
  return w;
}

/* ---------- Общий UI ---------- */
const $=id=>document.getElementById(id);
const main=$('main');
let MODE='razbor';
const TABS={razbor:$('tabRazbor'),train:$('tabTrain'),quiz:$('tabQuiz'),ref:$('tabRef')};
function setMode(m,arg){
  MODE=m;
  for(const k of Object.keys(TABS))TABS[k].classList.toggle('on',k===m);
  $('modeBadge').textContent={razbor:'Разбор',train:'Тренировка',quiz:'Зачёт',ref:'Справочник'}[m];
  if(m==='razbor')renderRazbor(arg);
  if(m==='train')renderTrain(arg);
  if(m==='quiz')renderQuizStart();
  if(m==='ref')renderRef(arg);
  updHdr();
}
TABS.razbor.onclick=()=>setMode('razbor');
TABS.train.onclick=()=>setMode('train');
TABS.quiz.onclick=()=>setMode('quiz');
TABS.ref.onclick=()=>setMode('ref');
function updHdr(){
  const done=Object.keys(ST.razbor).length;
  $('hdrStat').textContent='Разобрано типов: '+done+' из '+SUBKEYS.length+(ST.best?' · зачёт: '+ST.best+'/10':'');
}
function solHtml(task){
  return task.sol.map(s=>'<div class="step">'+s+'</div>').join('')+
    '<div class="figwrap">'+task.figAux+'</div>';
}
function refJump(task){
  return '<button class="link" data-act="ref" data-ref="'+task.ref+'">Почему формула «'+REF[task.ref].h+'»? →</button>';
}

/* ---------- РАЗБОР ---------- */
let RZ=null;
function renderRazbor(openKey){
  if(openKey){renderRazborCard(openKey);return;}
  const w=weakStats();
  let html='<p class="small">Каждый тип — короткий разбор одной задачи по шагам: чертёж строится честно под числа задачи. В конце — правило и кнопка «Тренировать».</p>';
  for(const t of Object.keys(TOPICS)){
    html+='<div class="topic-h">'+TOPICS[t]+'</div><div class="grid2">';
    for(const k of SUBKEYS.filter(k=>SUBS[k].topic===t)){
      const cnt=ARCHIVE.filter(r=>r.sub===k).length;
      html+='<div class="tcard" data-k="'+k+'"><h4>'+SUBS[k].name+(w[k]>=2?'<span class="weak">⚠ ошибок: '+w[k]+'</span>':'')+'</h4>'+
        '<span class="cnt">'+(cnt?cnt+' готовых задач + генератор':'генератор')+'</span> '+
        (ST.razbor[k]?'<span class="done">✓ разобрано</span>':'')+'</div>';
    }
    html+='</div>';
  }
  main.innerHTML=html;
  main.querySelectorAll('.tcard').forEach(c=>c.onclick=()=>renderRazborCard(c.dataset.k));
}
function renderRazborCard(k){
  const S=SUBS[k];
  const rec=ARCHIVE.find(r=>r.sub===k);
  const task=rec?archTask(rec):build(k,Array.isArray(S.proto)?S.proto.slice():S.proto,{});
  RZ={k,task,step:0};
  logE({e:'task_start',kind:'razbor',sub:k});
  drawRazbor();
}
function drawRazbor(){
  const {k,task,step}=RZ,S=SUBS[k];
  let html='<button class="link" data-act="back">← Все типы</button>'+
    '<div class="card"><h3>'+S.name+'</h3>'+
    '<div class="task">'+task.text+'</div>'+
    '<div class="figwrap">'+(step>=task.sol.length?task.figAux:task.fig)+'</div>';
  for(let i=0;i<step&&i<task.sol.length;i++)html+='<div class="step">'+task.sol[i]+'</div>';
  if(step<task.sol.length){
    html+='<div class="row" style="margin-top:10px"><button class="act" data-act="next">'+(step===0?'Начать разбор':'Дальше')+' →</button></div>';
  }else{
    html+='<div class="msg ok on">Ответ: <b>'+fmt(task.ans)+'</b>.</div>'+
      '<div class="law"><b>Правило.</b> '+S.law+'</div>'+
      (S.note?'<div class="method"><b>Методическая пометка.</b> '+S.note+'</div>':'')+
      '<div class="why"><b>Почему эта формула работает здесь.</b> '+task.refWhy+' '+refJump(task)+'</div>'+
      '<div class="row" style="margin-top:12px"><button class="act" data-act="train">Тренировать этот тип →</button></div>';
  }
  html+='</div>';
  main.innerHTML=html;
  main.querySelector('[data-act="back"]').onclick=()=>renderRazbor();
  const nx=main.querySelector('[data-act="next"]');
  if(nx)nx.onclick=()=>{RZ.step++;if(RZ.step>=task.sol.length){ST.razbor[k]=true;logE({e:'solved',via:'razbor',sub:k});updHdr();}drawRazbor();};
  const tr=main.querySelector('[data-act="train"]');
  if(tr)tr.onclick=()=>setMode('train',{sub:k});
  const rj=main.querySelector('[data-act="ref"]');
  if(rj)rj.onclick=()=>setMode('ref',{blk:task.ref,from:'razbor',sub:k});
}

/* ---------- ТРЕНИРОВКА ---------- */
let TR={topic:'all',sub:'all',task:null,hintUsed:false,exhausted:false};
function poolArch(){
  return ARCHIVE.filter(r=>{
    if(TR.sub!=='all')return r.sub===TR.sub;
    if(TR.topic!=='all')return SUBS[r.sub].topic===TR.topic;
    return true;});
}
function nextTrainTask(){
  const pool=poolArch().filter(r=>!ST.seenArch[r.id]);
  TR.hintUsed=false;
  if(pool.length){const rec=pick(pool);ST.seenArch[rec.id]=true;saveAll(DB);TR.task=archTask(rec);TR.exhausted=false;}
  else{
    const keys=TR.sub!=='all'?[TR.sub]:SUBKEYS.filter(k=>TR.topic==='all'||SUBS[k].topic===TR.topic);
    const wasPool=poolArch().length>0;
    TR.task=genTask(pick(keys));
    TR.exhausted=wasPool&&!TR.exhaustedShown;
    if(TR.exhausted)TR.exhaustedShown=true;
  }
  logE({e:'task_start',kind:'train',sub:TR.task.sub,id:TR.task.id});
}
function renderTrain(arg){
  if(arg&&arg.sub){TR.sub=arg.sub;TR.topic='all';TR.exhaustedShown=false;}
  if(!TR.task)nextTrainTask();
  drawTrain();
}
function chipRow(){
  let h='<div class="chips"><span class="chip'+(TR.topic==='all'&&TR.sub==='all'?' on':'')+'" data-t="all">Все темы</span>';
  for(const t of Object.keys(TOPICS))h+='<span class="chip'+(TR.topic===t&&TR.sub==='all'?' on':'')+'" data-t="'+t+'">'+TOPICS[t]+'</span>';
  h+='</div><div class="chips">';
  const keys=TR.topic==='all'?SUBKEYS:SUBKEYS.filter(k=>SUBS[k].topic===TR.topic);
  for(const k of keys)h+='<span class="chip'+(TR.sub===k?' on':'')+'" data-s="'+k+'">'+SUBS[k].name+'</span>';
  h+='</div>';
  return h;
}
function drawTrain(state){
  const t=TR.task;
  let html=chipRow();
  if(TR.exhausted)html+='<div class="msg info on">Готовые задачи по этому фильтру закончились — дальше работает генератор.</div>';
  html+='<div class="card">'+
    '<h3>'+SUBS[t.sub].name+(t.id?'':' · генератор')+'</h3>'+
    '<div class="task">'+t.text+'</div>'+
    '<div class="figwrap">'+t.fig+'</div>'+
    '<div class="row"><input class="ans" id="ansIn" inputmode="decimal" placeholder="ответ" autocomplete="off">'+
    '<button class="act" id="chkBtn">Проверить</button>'+
    '<button class="sec" id="hintBtn">Подсказка</button>'+
    '<button class="sec" id="giveBtn">Сдаюсь — решение</button>'+
    '<button class="sec" id="nextBtn">Другая задача →</button></div>'+
    '<div class="msg" id="fb"></div>'+
    '<div id="solBox"></div>'+
    '<div class="note">Ответ — число; десятичная дробь через запятую (1,5), можно обыкновенной (3/2). '+refJump(t)+'</div>'+
    '</div>';
  main.innerHTML=html;
  main.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
    if(c.dataset.t){TR.topic=c.dataset.t;TR.sub='all';}
    else{TR.sub=c.dataset.s;}
    TR.exhaustedShown=false;TR.exhausted=false;nextTrainTask();drawTrain();
  });
  const fb=$('fb'),inp=$('ansIn');
  $('chkBtn').onclick=()=>{
    const v=parseAns(inp.value);
    fb.className='msg on';
    if(isNaN(v)){fb.classList.add('warn');fb.innerHTML='Не понимаю запись. Введите число: целое, с запятой (1,5) или дробью (3/2).';return;}
    if(near(v,t.ans,1e-6)){
      fb.classList.add('ok');fb.innerHTML='Верно! Ответ '+fmt(t.ans)+'.';
      logE({e:'quiz_ok',sub:t.sub,id:t.id});
    }else{
      const d=t.diag.find(d=>near(v,d.v,1e-6));
      fb.classList.add('err');
      fb.innerHTML=d?d.m:'Неверно. Проверьте, какие клетки вы считали, — и загляните в подсказку.';
      logE({e:'opt_wrong',sub:t.sub,id:t.id,pick:v});
    }
  };
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')$('chkBtn').click();});
  $('hintBtn').onclick=()=>{
    if(!TR.hintUsed){TR.hintUsed=true;logE({e:'hint',sub:t.sub});}
    fb.className='msg info on';fb.innerHTML=t.sol[0];
  };
  $('giveBtn').onclick=()=>{
    $('solBox').innerHTML=solHtml(t)+'<div class="msg ok on">Ответ: <b>'+fmt(t.ans)+'</b></div>';
    logE({e:'give_up',sub:t.sub,id:t.id});
  };
  $('nextBtn').onclick=()=>{nextTrainTask();drawTrain();};
  const rj=main.querySelector('[data-act="ref"]');
  if(rj)rj.onclick=()=>setMode('ref',{blk:t.ref,from:'train'});
  inp.focus();
}

/* ---------- ЗАЧЁТ ---------- */
const QUIZ_QUOTA=[['len',3],['mid',2],['area',3],['rel',2]];
let QZ=null;
function renderQuizStart(){
  const w=weakStats();
  const weakest=Object.entries(w).filter(([k,v])=>v>=2).sort((a,b)=>b[1]-a[1]).slice(0,3);
  let html='<div class="card"><h3>Зачёт: 10 задач</h3>'+
    '<p class="small">Состав фиксированный: <b>Длины — 3</b>, <b>Средние линии — 2</b>, <b>Площади — 3</b>, <b>Отношения — 2</b>. Задачи берутся из банка и генератора, подсказок нет. Результат сохраняется.</p>';
  if(weakest.length){
    html+='<div class="why"><b>Ваши слабые места по журналу:</b> '+weakest.map(([k])=>SUBS[k].name).join(', ')+'. Можно сначала подтянуть:</div><div class="row" style="margin-top:8px">'+
      weakest.map(([k])=>'<button class="sec" data-w="'+k+'">'+SUBS[k].name+' →</button>').join('')+'</div>';
  }
  html+='<div class="row" style="margin-top:12px"><button class="act" id="qStart">Начать зачёт</button></div>';
  if(ST.best)html+='<div class="note">Лучший результат: '+ST.best+'/10 · попыток: '+(ST.runs||0)+'</div>';
  html+='</div>';
  main.innerHTML=html;
  main.querySelectorAll('[data-w]').forEach(b=>b.onclick=()=>setMode('train',{sub:b.dataset.w}));
  $('qStart').onclick=startQuiz;
}
function startQuiz(){
  const tasks=[];
  for(const [topic,q] of QUIZ_QUOTA){
    const keys=shuffle(SUBKEYS.filter(k=>SUBS[k].topic===topic));
    for(let i=0;i<q;i++){
      const k=keys[i%keys.length];
      const recs=ARCHIVE.filter(r=>r.sub===k);
      tasks.push(recs.length&&Math.random()<.6?archTask(pick(recs)):genTask(k));
    }
  }
  QZ={tasks:shuffle(tasks),i:0,res:[]};
  logE({e:'start',kind:'quiz'});
  drawQuiz();
}
function drawQuiz(){
  const t=QZ.tasks[QZ.i];
  let html='<div class="pbar"><div style="width:'+(QZ.i/QZ.tasks.length*100)+'%"></div></div>'+
    '<div class="note">Задача '+(QZ.i+1)+' из '+QZ.tasks.length+' · '+TOPICS[SUBS[t.sub].topic]+'</div>'+
    '<div class="card"><div class="task">'+t.text+'</div>'+
    '<div class="figwrap">'+t.fig+'</div>'+
    '<div class="row"><input class="ans" id="qIn" inputmode="decimal" placeholder="ответ" autocomplete="off">'+
    '<button class="act" id="qOk">Ответить</button></div>'+
    '<div class="msg" id="qFb"></div></div>';
  main.innerHTML=html;
  const inp=$('qIn'),fb=$('qFb');
  let answered=false;
  $('qOk').onclick=()=>{
    if(answered)return;
    const v=parseAns(inp.value);
    if(isNaN(v)){fb.className='msg warn on';fb.innerHTML='Введите число (можно с запятой или дробью 3/2).';return;}
    answered=true;
    const ok=near(v,t.ans,1e-6);
    QZ.res.push({ok,sub:t.sub});
    logE({e:ok?'quiz_ok':'quiz_wrong',sub:t.sub,id:t.id});
    fb.className='msg on '+(ok?'ok':'err');
    fb.innerHTML=(ok?'Верно!':'Неверно. Правильный ответ: <b>'+fmt(t.ans)+'</b>.')+' <button class="act" id="qNext" style="margin-left:10px">'+(QZ.i+1<QZ.tasks.length?'Дальше →':'Итог')+'</button>';
    $('qNext').onclick=()=>{QZ.i++;if(QZ.i<QZ.tasks.length)drawQuiz();else finishQuiz();};
  };
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')$('qOk').click();});
  inp.focus();
}
function finishQuiz(){
  const score=QZ.res.filter(r=>r.ok).length;
  ST.runs=(ST.runs||0)+1;
  if(score>ST.best)ST.best=score;
  ST.passed=true;
  logE({e:'finish',score});
  updHdr();
  const wrongs=QZ.res.filter(r=>!r.ok).map(r=>r.sub);
  const uniq=[...new Set(wrongs)];
  let html='<div class="card fin"><div class="score">'+score+' / '+QZ.tasks.length+'</div>'+
    '<div class="dots">'+QZ.res.map(r=>'<span class="dot '+(r.ok?'g':'r')+'"></span>').join('')+'</div>'+
    '<div class="law"><b>'+(score===10?'Идеально!':score>=7?'Хороший результат.':'Есть над чем поработать.')+'</b> Задание 18 — это счёт клеток + пять формул: Пифагор, средние линии, площади, тангенс, квадрат отношения радиусов.</div>';
  if(uniq.length)html+='<div class="why" style="text-align:left"><b>Разобрать ошибки:</b></div><div class="row" style="justify-content:center;margin-top:8px">'+
    uniq.map(k=>'<button class="sec" data-w="'+k+'">'+SUBS[k].name+' →</button>').join('')+'</div>';
  html+='<div class="row" style="justify-content:center;margin-top:14px"><button class="act" id="qAgain">Пройти ещё раз</button></div></div>';
  main.innerHTML=html;
  main.querySelectorAll('[data-w]').forEach(b=>b.onclick=()=>setMode('razbor',b.dataset.w));
  $('qAgain').onclick=startQuiz;
}

 {id:'mid',   x:3.55, y:8.23, w:44.86,h:18.58,refs:['midtri','midtrap'],name:'Средняя линия'},
 {id:'circ',  x:3.55, y:77.93,w:31.93,h:18.08,refs:['circ'],name:'Окружность и круг'},
 {id:'spar',  x:54.84,y:9.73, w:18.70,h:13.97,refs:['spar'],name:'Параллелограмм'},
 {id:'stri',  x:75.39,y:9.73, w:24.02,h:13.97,refs:['stri'],name:'Треугольник'},
 {id:'strap', x:54.84,y:24.44,w:18.70,h:16.08,refs:['strap'],name:'Трапеция'},
 {id:'srhomb',x:75.39,y:24.44,w:24.02,h:13.59,refs:['srhomb'],name:'Ромб'},
 {id:'tan',   x:54.84,y:43.39,w:25.72,h:23.32,refs:['tan'],name:'Прямоугольный треугольник'},

];
const OFFMAP=['sim','cells'];
function zoneOfRef(ref){return ZONES.find(z=>z.refs.indexOf(ref)>=0)||null;}
function zoneStats(z){
  const subs=SUBKEYS.filter(k=>z.refs.indexOf(SUBS[k].ref)>=0);
  const n=ARCHIVE.filter(r=>subs.indexOf(r.sub)>=0).length;
  const done=subs.every(k=>ST.razbor[k]);
  return {subs,n,done};
}
/* ---------- СПРАВОЧНИК ---------- */

    '<div class="mapwrap"><img src="'+SHEET_B64+'" alt="Справочные материалы ОГЭ, страницы 5 и 6">';

    '<b>расширенная (обобщённая) теорема Фалеса</b> — тип «'+SUBKEYS.filter(k=>SUBS[k].ref==='sim').map(k=>SUBS[k].name).join('», «')+'»: параллельная прямая отсекает пропорциональные отрезки. В явном виде её нет у Атанасяна (выводится через подобие), но она есть у Мерзляка. '+
    'Плюс счёт клеток с разрезанием — «'+SUBKEYS.filter(k=>SUBS[k].ref==='cells').map(k=>SUBS[k].name).join('», «')+'». Их формульные карточки — ниже, вместе с остальными.</div></div>';
  html+='<p class="small">Из каждой формулы можно прыгнуть в разбор или тренировку типа, где она работает.</p>';
  for(const id of Object.keys(REF)){

      '<div class="fm">'+b.f+'</div><div class="small">'+b.t+'</div>';
    if(arg&&arg.blk===id&&arg.sub){html+='<div class="why"><b>Зачем здесь:</b> '+SUBS[arg.sub].refWhy+'</div>';if(SUBS[arg.sub].note)html+='<div class="method"><b>Методическая пометка.</b> '+SUBS[arg.sub].note+'</div>';}
    if(users.length)html+='<div class="row" style="margin-top:8px">'+users.map(k=>

  main.querySelectorAll('[data-tr]').forEach(x=>x.onclick=()=>setMode('train',{sub:x.dataset.tr}));
  if(arg&&arg.blk){const el=document.getElementById('ref-'+arg.blk);if(el&&el.scrollIntoView)el.scrollIntoView({behavior:'smooth',block:'center'});}

/* ---------- СЕЛФТЕСТ (?selftest=1) ---------- */
function runSelftest(){
  const out=[];let fails=0;
  const say=s=>out.push(s);
  const bad=s=>{out.push('✗ '+s);fails++;};
  // 1. Архив: уникальность номеров, calc===exp
  const seen=new Set();
  for(const r of ARCHIVE){
    if(seen.has(r.id))bad('дубль id '+r.id);
    seen.add(r.id);
    const got=SUBS[r.sub].calc(r.p);
    if(!near(got,r.exp,1e-9))bad('архив '+r.id+': calc='+got+' ≠ exp='+r.exp);
    if(!isFinite(r.exp))bad('архив '+r.id+': неконечный эталон');
  }
  say('✓ архив: '+ARCHIVE.length+' задач, номера уникальны, эталоны сходятся');
  // 2. Геоаудит архива: chk каждой фигуры
  let chkN=0;
  for(const r of ARCHIVE){
    const t=archTask(r);
    for(const c of t.chk){
      chkN++;
      if(c.t==='ans'){if(!near(c.v,t.ans,1e-9))bad(r.id+': фигура даёт '+c.v+', ответ '+t.ans);}
      else if(c.v>1e-9)bad(r.id+': chk '+c.t+(c.n?'('+c.n+')':'')+' = '+c.v);
    }
    if(t.fig.indexOf('<svg')!==0)bad(r.id+': svg не собрался');
  }
  say('✓ геоаудит архива: '+chkN+' ассертов');
  // 3. Генераторы: 150 прогонов на подтип
  for(const k of SUBKEYS){
    for(let i=0;i<150;i++){
      const t=genTask(k);
      if(!isFinite(t.ans)){bad('gen '+k+': неконечный ответ');break;}
      for(const c of t.chk){
        if(c.t==='ans'){if(!near(c.v,t.ans,1e-9)){bad('gen '+k+': фигура '+c.v+' ≠ ответ '+t.ans);i=999;}}
        else if(c.v>1e-9){bad('gen '+k+': chk '+c.t+' = '+c.v);i=999;}
      }
      for(const d of t.diag)if(near(d.v,t.ans))bad('gen '+k+': ловушка совпала с ответом');
    }
  }
  say('✓ генераторы: '+SUBKEYS.length+' подтипов × 150');
  // 4. Реестр: обязательные поля
  for(const k of SUBKEYS){
    const S=SUBS[k];
    for(const f of ['topic','name','law','ref','refWhy','calc','gen','text','fig','sol','diag'])
      if(!S[f])bad(k+': нет поля '+f);
    if(!REF[S.ref])bad(k+': ссылка на несуществующий блок справочника '+S.ref);
    if(!TOPICS[S.topic])bad(k+': неизвестная тема '+S.topic);
  }
  if(!SUBS.segAB.note||!/Фалес/i.test(SUBS.segAB.note)||!/Мерзляк/i.test(SUBS.segAB.note)||!/Атанасян/i.test(SUBS.segAB.note))bad('segAB: потеряна методическая пометка о расширенной теореме Фалеса (Атанасян/Мерзляк)');
  say('✓ реестр SUBS: поля и ссылки; методическая пометка о теореме Фалеса на месте');
  // 4б. Карта листа: зоны ссылаются на реальные блоки, каждый ref либо на карте, либо в OFFMAP
  const zids=new Set();
  for(const z of ZONES){
    if(zids.has(z.id))bad('дубль зоны '+z.id);
    zids.add(z.id);
    for(const rf of z.refs)if(!REF[rf])bad('зона '+z.id+' ссылается на несуществующий блок '+rf);
    if(!(z.x>=0&&z.y>=0&&z.x+z.w<=100&&z.y+z.h<=100))bad('зона '+z.id+' вылезает за изображение');
  }
  for(let i=0;i<ZONES.length;i++)for(let j=i+1;j<ZONES.length;j++){
    const a=ZONES[i],b2=ZONES[j];
    if(a.x<b2.x+b2.w&&b2.x<a.x+a.w&&a.y<b2.y+b2.h&&b2.y<a.y+a.h)bad('зоны пересекаются: '+a.id+'/'+b2.id);
  }
  const mapped=new Set();ZONES.forEach(z=>z.refs.forEach(r=>mapped.add(r)));
  for(const k of SUBKEYS){
    const rf=SUBS[k].ref;
    if(!mapped.has(rf)&&OFFMAP.indexOf(rf)<0)bad('подтип '+k+': формула '+rf+' не привязана ни к карте, ни к плашке «нет на листе»');
  }
  if(!SHEET_B64||SHEET_B64.length<10000)bad('изображение листа не встроено');
  say('✓ карта листа: '+ZONES.length+' зон, покрытие формул полное');
  // 5. Квоты зачёта
  const qsum=QUIZ_QUOTA.reduce((s,q)=>s+q[1],0);
  if(qsum!==10)bad('сумма квот зачёта '+qsum+' ≠ 10');
  for(const [t] of QUIZ_QUOTA)if(!SUBKEYS.some(k=>SUBS[k].topic===t))bad('квота на пустую тему '+t);
  say('✓ квоты зачёта: '+QUIZ_QUOTA.map(q=>TOPICS[q[0]]+' '+q[1]).join(', '));
  // 6. Парсер ответов
  const P=[['1,5',1.5],['3/2',1.5],['12',12],['0,25',0.25],['1/4',0.25]];
  for(const [s,v] of P)if(!near(parseAns(s),v))bad('парсер: '+s);
  if(!isNaN(parseAns('abc'))||!isNaN(parseAns('')))bad('парсер пропускает мусор');
  say('✓ парсер ответов');
  say(fails?('ПРОВАЛОВ: '+fails):'ВСЕ ПРОВЕРКИ ПРОЙДЕНЫ');
  const div=document.createElement('div');
  div.className='selftest';
  div.textContent='СЕЛФТЕСТ oge18-kletki\n'+out.join('\n');
  main.parentNode.insertBefore(div,main);
  return fails;
}

/* ---------- Запуск ---------- */
setMode('razbor');
if(typeof location!=='undefined'&&/[?&]selftest=1/.test(location.search)){
  try{window.__selftestFails=runSelftest();}catch(e){const d=document.createElement('div');d.className='selftest';d.textContent='СЕЛФТЕСТ УПАЛ: '+e.message;main.parentNode.insertBefore(d,main);window.__selftestFails=1;}
}
