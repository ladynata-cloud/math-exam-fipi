<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Тренажёр + цифровая доска | MathExam</title>
  <meta name="description" content="Тренажёр сайта рядом с локальной цифровой доской учителя для онлайн-урока.">
  <link rel="canonical" href="https://mathexam.space/trainers/trainer-board.html">
  <link rel="stylesheet" href="/assets/site.css">
  <style>
    :root{--bg:#f6f7fb;--panel:#fff;--ink:#172033;--muted:#647086;--line:#dfe5ef;--blue:#2563eb;--blue2:#eef4ff;--red:#be123c;--shadow:0 10px 24px rgba(23,32,51,.08)}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;overflow:hidden}.lesson{height:calc(100vh - 58px);padding:12px;display:grid;grid-template-columns:minmax(360px,.92fr) minmax(480px,1.08fr);gap:12px}.lesson.hide-trainer{grid-template-columns:1fr}.hide-trainer .trainer{display:none}.trainer,.board{min-width:0;min-height:0;background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}.head,.board-head,.toolbar{padding:12px;border-bottom:1px solid var(--line);background:#fff}.url-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:end}label{display:block;color:var(--muted);font-size:13px;font-weight:800;margin-bottom:4px}.url-row input,.toolbar select{min-height:40px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);font:inherit;padding:8px 10px}.btn,.tool,.quick{min-height:40px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);font:inherit;font-weight:800;padding:8px 11px;cursor:pointer;white-space:nowrap}.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}.btn.warn{color:var(--red);border-color:#f3cbd4;background:#fff7f9}.btn:hover,.quick:hover,.tool[aria-pressed=true]{background:var(--blue2);border-color:var(--blue);color:var(--blue)}.btn.primary:hover{background:#1d4ed8;color:#fff}.btn:disabled{opacity:.45;cursor:not-allowed}.quick-row,.sheet,.tools,.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.quick-row{margin-top:10px}.frame{width:100%;flex:1;min-height:0;border:0;background:#fff}.board-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.title h1{font-size:22px;margin:0 0 4px}.title p{margin:0;color:var(--muted);font-weight:700}.sheet-count{min-width:92px;text-align:center;color:var(--muted);font-weight:800}.toolbar{display:grid;grid-template-columns:1fr auto;gap:10px;background:#f8fafc}.tools>span{height:32px;border-left:1px solid var(--line)}input[type=color]{width:44px;height:40px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:4px}input[type=range]{width:112px}.size{min-width:42px;color:var(--muted);font-weight:800}.canvas-wrap{position:relative;flex:1;min-height:0;padding:12px;background:#eef2f7}canvas{display:block;width:100%;height:100%;min-height:360px;border:1px solid var(--line);border-radius:8px;background:#fff;touch-action:none;cursor:crosshair}.editor{position:absolute;z-index:4;min-width:170px;min-height:42px;border:2px solid var(--blue);border-radius:8px;padding:8px 10px;background:#fff;color:var(--ink);box-shadow:0 12px 28px rgba(23,32,51,.18);font:20px Inter,system-ui,sans-serif;resize:both}.hidden{display:none}@media(max-width:1050px){body{overflow:auto}.lesson{height:auto;min-height:calc(100vh - 58px);grid-template-columns:1fr;grid-template-rows:minmax(340px,42vh) minmax(560px,1fr)}.toolbar{grid-template-columns:1fr}.actions{justify-content:flex-start}}@media(max-width:700px){.lesson{padding:8px}.url-row{grid-template-columns:1fr}.board-head{display:block}.sheet{margin-top:10px}canvas{min-height:460px}}
  </style>
</head>
<body>
  <header class="site-header"><div class="container"><a class="logo" href="/"><span class="logo-mark">∑</span><span>MathExam</span></a><nav class="site-nav" aria-label="Основные разделы"><a href="/">Главная</a><a href="/trainers/" aria-current="page">Каталог</a><a href="/oge/">ОГЭ</a><a href="/geometry-course/">Геометрия 7</a><a href="/pedagogam/">Педагогам</a></nav></div></header>
  <main class="lesson" id="lesson">
    <section class="trainer" aria-label="Тренажёр">
      <div class="head"><label for="trainerUrl">Ссылка на тренажёр</label><div class="url-row"><input id="trainerUrl" type="text" value="negative-numbers-line.html" autocomplete="off"><button class="btn primary" id="openTrainer" type="button">Открыть</button><button class="btn" id="toggleTrainer" type="button">Скрыть тренажёр</button></div><div class="quick-row" aria-label="Быстрые тренажёры"><button class="quick" type="button" data-url="negative-numbers-line.html">Числовая прямая</button><button class="quick" type="button" data-url="who-is-stronger.html">Кто сильнее по модулю?</button></div></div>
      <iframe class="frame" id="trainerFrame" title="Открытый тренажёр" src="negative-numbers-line.html"></iframe>
    </section>
    <section class="board" aria-label="Цифровая доска">
      <div class="board-head"><div class="title"><h1>Тренажёр + цифровая доска</h1><p>Локальная доска учителя для объяснений во время демонстрации экрана.</p></div><div class="sheet"><button class="btn" id="prevSheet" type="button">Назад</button><span class="sheet-count" id="sheetCount">Лист 1 из 1</span><button class="btn" id="nextSheet" type="button">Вперёд</button><button class="btn" id="addSheet" type="button">Новый лист</button><button class="btn warn" id="deleteSheet" type="button">Удалить</button><button class="btn" id="toggleTrainerBoard" type="button">Скрыть тренажёр</button></div></div>
      <div class="toolbar" aria-label="Инструменты доски"><div class="tools"><button class="tool" data-tool="pen" aria-pressed="true" type="button">Ручка</button><button class="tool" data-tool="marker" aria-pressed="false" type="button">Маркер</button><button class="tool" data-tool="eraser" aria-pressed="false" type="button">Ластик</button><button class="tool" data-tool="line" aria-pressed="false" type="button">Линия</button><button class="tool" data-tool="rect" aria-pressed="false" type="button">Рамка</button><button class="tool" data-tool="text" aria-pressed="false" type="button">Текст</button><span></span><input id="color" type="color" value="#172033" aria-label="Цвет"><input id="size" type="range" min="2" max="34" value="5" aria-label="Толщина"><b class="size" id="sizeText">5 px</b><span></span><select id="bg" aria-label="Фон"><option value="grid">Клетка</option><option value="lined">Линия</option><option value="blank">Чистый</option></select></div><div class="actions"><button class="btn" id="undo" type="button">Undo</button><button class="btn" id="redo" type="button">Redo</button><button class="btn warn" id="clear" type="button">Очистить лист</button><button class="btn" id="export" type="button">PNG</button></div></div>
      <div class="canvas-wrap" id="wrap"><canvas id="canvas"></canvas><textarea id="editor" class="editor hidden" aria-label="Текст на доске"></textarea></div>
    </section>
  </main>
  <script>
    const KEY='mathexam.trainerBoard.v1';
    const $=id=>document.getElementById(id);
    const lesson=$('lesson'),canvas=$('canvas'),ctx=canvas.getContext('2d'),wrap=$('wrap'),editor=$('editor');
    const trainerUrl=$('trainerUrl'),frame=$('trainerFrame'),color=$('color'),size=$('size'),sizeText=$('sizeText'),bg=$('bg'),sheetCount=$('sheetCount');
    let dpr=1,view={w:1,h:1},tool='pen',drawing=false,current=null,textPoint=null,timer=null;
    const blank=()=>({bg:'grid',strokes:[],redo:[]});
    const defaults=()=>({current:0,trainerUrl:'negative-numbers-line.html',trainerHidden:false,pages:[blank()]});
    let state=load();
    function load(){try{const raw=localStorage.getItem(KEY);if(!raw)return defaults();const s=JSON.parse(raw);if(!s.pages?.length)return defaults();s.current=Math.min(Math.max(s.current||0,0),s.pages.length-1);s.pages.forEach(p=>{p.bg=p.bg||'grid';p.strokes=Array.isArray(p.strokes)?p.strokes:[];p.redo=Array.isArray(p.redo)?p.redo:[]});s.trainerUrl=s.trainerUrl||'negative-numbers-line.html';return s}catch(e){return defaults()}}
    function save(){clearTimeout(timer);timer=setTimeout(()=>localStorage.setItem(KEY,JSON.stringify(state)),120)}
    function page(){return state.pages[state.current]}
    function norm(v){let u=String(v||'').trim();if(!u)return'negative-numbers-line.html';if(/^https?:\/\//i.test(u))return u;if(/^mathexam\.space\//i.test(u))return'https://'+u;if(u.startsWith('/'))return u;if(u.startsWith('trainers/'))return'/'+u;return u}
    function openTrainer(u){const next=norm(u||trainerUrl.value);trainerUrl.value=next;frame.src=next;state.trainerUrl=next;save()}
    function toggleTrainer(hidden){state.trainerHidden=hidden;lesson.classList.toggle('hide-trainer',hidden);$('toggleTrainer').textContent=hidden?'Показать тренажёр':'Скрыть тренажёр';$('toggleTrainerBoard').textContent=hidden?'Показать тренажёр':'Скрыть тренажёр';requestAnimationFrame(resize);save()}
    function setTool(t){finishText();tool=t;document.querySelectorAll('[data-tool]').forEach(b=>b.setAttribute('aria-pressed',b.dataset.tool===t?'true':'false'));canvas.style.cursor=t==='text'?'text':t==='eraser'?'cell':'crosshair'}
    function point(e){const r=canvas.getBoundingClientRect();return{x:Math.min(Math.max(e.clientX-r.left,0),r.width),y:Math.min(Math.max(e.clientY-r.top,0),r.height)}}
    function resize(){const r=canvas.getBoundingClientRect();if(r.width<2||r.height<2)return;dpr=Math.max(1,devicePixelRatio||1);view={w:r.width,h:r.height};canvas.width=Math.round(r.width*dpr);canvas.height=Math.round(r.height*dpr);render()}
    function tx(){ctx.setTransform(dpr,0,0,dpr,0,0)}
    function background(kind){tx();ctx.clearRect(0,0,view.w,view.h);ctx.fillStyle='#fffdf8';ctx.fillRect(0,0,view.w,view.h);ctx.lineWidth=1;if(kind==='blank')return;if(kind==='grid'){for(let x=0;x<=view.w;x+=28){ctx.strokeStyle=x%140===0?'#d5ddeb':'#e8edf5';ctx.beginPath();ctx.moveTo(x+.5,0);ctx.lineTo(x+.5,view.h);ctx.stroke()}for(let y=0;y<=view.h;y+=28){ctx.strokeStyle=y%140===0?'#d5ddeb':'#e8edf5';ctx.beginPath();ctx.moveTo(0,y+.5);ctx.lineTo(view.w,y+.5);ctx.stroke()}}else{ctx.strokeStyle='#dce5f2';for(let y=42;y<=view.h;y+=34){ctx.beginPath();ctx.moveTo(0,y+.5);ctx.lineTo(view.w,y+.5);ctx.stroke()}}ctx.strokeStyle='rgba(190,18,60,.35)';ctx.beginPath();ctx.moveTo(56.5,0);ctx.lineTo(56.5,view.h);ctx.stroke()}
    function draw(s){if(!s)return;ctx.save();tx();ctx.lineCap='round';ctx.lineJoin='round';ctx.lineWidth=Math.max(1,s.size||4);ctx.strokeStyle=s.color||'#172033';ctx.fillStyle=s.color||'#172033';ctx.globalAlpha=s.tool==='marker'?.32:1;if(s.tool==='eraser')ctx.globalCompositeOperation='destination-out';if(s.kind==='path'){const pts=s.points||[];if(pts.length===1){ctx.beginPath();ctx.arc(pts[0].x,pts[0].y,ctx.lineWidth/2,0,Math.PI*2);ctx.fill()}else if(pts.length>1){ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);ctx.stroke()}}if(s.kind==='line'&&s.start&&s.end){ctx.beginPath();ctx.moveTo(s.start.x,s.start.y);ctx.lineTo(s.end.x,s.end.y);ctx.stroke()}if(s.kind==='rect'&&s.start&&s.end){const x=Math.min(s.start.x,s.end.x),y=Math.min(s.start.y,s.end.y),w=Math.abs(s.start.x-s.end.x),h=Math.abs(s.start.y-s.end.y);ctx.strokeRect(x,y,w,h)}if(s.kind==='text'){ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;const fs=Math.max(16,(s.size||5)*3+12);ctx.font=`700 ${fs}px Inter, system-ui, sans-serif`;ctx.textBaseline='top';String(s.text||'').split(/\n/).forEach((line,i)=>ctx.fillText(line,s.x,s.y+i*fs*1.25))}ctx.restore()}
    function render(){background(page().bg);page().strokes.forEach(draw);draw(current);buttons()}
    function addStroke(s){if(!s)return;page().strokes.push(s);page().redo=[];render();save()}
    function down(e){finishText();e.preventDefault();const p=point(e);if(tool==='text'){openText(p);return}drawing=true;canvas.setPointerCapture(e.pointerId);current=(tool==='pen'||tool==='marker'||tool==='eraser')?{kind:'path',tool,color:color.value,size:+size.value,points:[p]}:{kind:tool==='rect'?'rect':'line',tool,color:color.value,size:+size.value,start:p,end:p};render()}
    function move(e){if(!drawing||!current)return;e.preventDefault();const p=point(e);if(current.kind==='path'){const pts=current.points,last=pts[pts.length-1];if(!last||Math.hypot(p.x-last.x,p.y-last.y)>1.8)pts.push(p)}else current.end=p;render()}
    function up(e){if(!drawing||!current)return;e.preventDefault();drawing=false;try{canvas.releasePointerCapture(e.pointerId)}catch(_e){}const done=current;current=null;addStroke(done)}
    function openText(p){const wr=wrap.getBoundingClientRect(),cr=canvas.getBoundingClientRect();textPoint=p;editor.value='';editor.style.left=`${cr.left-wr.left+p.x}px`;editor.style.top=`${cr.top-wr.top+p.y}px`;editor.style.color=color.value;editor.style.fontSize=`${Math.max(16,+size.value*3+12)}px`;editor.classList.remove('hidden');editor.focus()}
    function finishText(){if(editor.classList.contains('hidden'))return;const text=editor.value.trim();if(text&&textPoint)addStroke({kind:'text',tool:'text',x:textPoint.x,y:textPoint.y,text,color:color.value,size:+size.value});editor.classList.add('hidden');textPoint=null}
    function undo(){finishText();const x=page().strokes.pop();if(x){page().redo.push(x);render();save()}}
    function redo(){finishText();const x=page().redo.pop();if(x){page().strokes.push(x);render();save()}}
    function clearPage(){finishText();if(!page().strokes.length||confirm('Очистить текущий лист?')){page().strokes=[];page().redo=[];render();save()}}
    function exportPng(){finishText();render();const a=document.createElement('a');a.download=`mathexam-board-sheet-${state.current+1}.png`;a.href=canvas.toDataURL('image/png');a.click()}
    function sync(){bg.value=page().bg;sheetCount.textContent=`Лист ${state.current+1} из ${state.pages.length}`;render();save()}
    function addSheet(){finishText();state.pages.splice(state.current+1,0,blank());state.current++;sync()}
    function delSheet(){finishText();if(state.pages.length===1){state.pages[0]=blank();sync();return}if(confirm('Удалить текущий лист?')){state.pages.splice(state.current,1);state.current=Math.min(state.current,state.pages.length-1);sync()}}
    function switchSheet(d){finishText();const n=state.current+d;if(n<0||n>=state.pages.length)return;state.current=n;sync()}
    function buttons(){sheetCount.textContent=`Лист ${state.current+1} из ${state.pages.length}`;$('prevSheet').disabled=state.current===0;$('nextSheet').disabled=state.current===state.pages.length-1;$('undo').disabled=page().strokes.length===0;$('redo').disabled=page().redo.length===0}
    $('openTrainer').onclick=()=>openTrainer();$('toggleTrainer').onclick=() => toggleTrainer(!state.trainerHidden);$('toggleTrainerBoard').onclick=()=>toggleTrainer(!state.trainerHidden);trainerUrl.onkeydown=e=>{if(e.key==='Enter')openTrainer()};document.querySelectorAll('[data-url]').forEach(b=>b.onclick=()=>openTrainer(b.dataset.url));document.querySelectorAll('[data-tool]').forEach(b=>b.onclick=()=>setTool(b.dataset.tool));size.oninput=()=>{sizeText.textContent=`${size.value} px`;finishText()};color.onchange=finishText;bg.onchange=()=>{page().bg=bg.value;render();save()};$('undo').onclick=undo;$('redo').onclick=redo;$('clear').onclick=clearPage;$('export').onclick=exportPng;$('prevSheet').onclick=()=>switchSheet(-1);$('nextSheet').onclick=()=>switchSheet(1);$('addSheet').onclick=addSheet;$('deleteSheet').onclick=delSheet;canvas.onpointerdown=down;canvas.onpointermove=move;canvas.onpointerup=up;canvas.onpointercancel=up;editor.onblur=finishText;editor.onkeydown=e=>{if(e.key==='Escape'){editor.value='';finishText()}if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))finishText()};addEventListener('resize',()=>requestAnimationFrame(resize));addEventListener('beforeunload',()=>localStorage.setItem(KEY,JSON.stringify(state)));
    trainerUrl.value=state.trainerUrl;frame.src=state.trainerUrl;toggleTrainer(!!state.trainerHidden);setTool(tool);sync();requestAnimationFrame(resize);
  </script>
</body>
</html>
