<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренажёр №16 ОГЭ — Окружность</title>
<style>
/* =========================================================================
   ТРЕНАЖЁР №16 ОГЭ — окружность, углы, длины, площади
   Standalone HTML. Никаких внешних библиотек.
   ========================================================================= */

:root {
  --bg: #FAF7F0;
  --paper: #FFFFFF;
  --ink: #1A1A1A;
  --ink-soft: #4A4A4A;
  --muted: #7A7568;
  --rule: #E4DCC8;
  --rule-soft: #F0E9D8;
  --accent: #2C5566;
  --accent-dark: #1F3F4D;
  --accent-soft: #E8F0F3;
  --burgundy: #8B2E2E;
  --burgundy-soft: #F5E8E8;
  --gold: #B8893D;
  --green: #2D6A4F;
  --green-soft: #E0F0E8;
  --red: #B83A3A;
  --red-soft: #F8E2E2;
  --yellow-soft: #FBF3D9;

  --serif: "Charter", "Iowan Old Style", "Cambria", Georgia, "Times New Roman", serif;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, "Helvetica Neue", Helvetica, Arial, sans-serif;
  --mono: "JetBrains Mono", "SF Mono", "Menlo", "Consolas", "Courier New", monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  min-height: 100vh;
  padding-bottom: 60px;
}

/* paper-like background grain */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(circle at 12% 18%, rgba(0,0,0,.014) 0 1px, transparent 1px),
    radial-gradient(circle at 80% 64%, rgba(0,0,0,.012) 0 1px, transparent 1px);
  background-size: 7px 7px, 11px 11px;
  z-index: 0;
}

.wrap { position: relative; z-index: 1; max-width: 1140px; margin: 0 auto; padding: 28px 26px 40px; }

/* ----- header ----- */
header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 22px;
  flex-wrap: wrap;
}
.title-block { line-height: 1; }
.eyebrow {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
h1 {
  font-family: var(--serif);
  font-weight: 600;
  font-size: 38px;
  margin: 0;
  letter-spacing: -.01em;
  color: var(--ink);
}
h1 .num { color: var(--burgundy); font-style: italic; }
h1 .sep { color: var(--rule); margin: 0 10px; font-weight: 300; }
h1 .sub { font-size: 22px; color: var(--ink-soft); font-style: italic; font-weight: 400; }

.stats {
  display: grid;
  grid-template-columns: repeat(4, auto);
  gap: 20px;
  font-family: var(--serif);
}
.stat {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  min-width: 56px;
}
.stat-num {
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -.02em;
  color: var(--ink);
  line-height: 1;
}
.stat-num.green { color: var(--green); }
.stat-num.red { color: var(--red); }
.stat-num.accent { color: var(--accent); }
.stat-lbl {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 4px;
}

/* ----- mode tabs ----- */
.modes {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 4px;
  margin-bottom: 22px;
  padding: 4px;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 6px;
}
.mode-btn {
  font-family: var(--sans);
  font-size: 13px;
  padding: 8px 14px;
  border: none;
  background: transparent;
  color: var(--ink-soft);
  cursor: pointer;
  border-radius: 4px;
  transition: background .12s, color .12s;
  white-space: nowrap;
}
.mode-btn:hover { background: var(--rule-soft); color: var(--ink); }
.mode-btn.active {
  background: var(--accent);
  color: #fff;
  font-weight: 500;
}
.mode-btn.teacher { margin-left: auto; }
.mode-btn.teacher.active { background: var(--burgundy); }


/* ----- student quick start ----- */
.more-modes { position: relative; display: flex; align-items: stretch; }
.more-modes > summary {
  list-style: none;
  font-family: var(--sans);
  font-size: 13px;
  padding: 8px 14px;
  color: var(--ink-soft);
  cursor: pointer;
  border-radius: 4px;
  user-select: none;
}
.more-modes > summary::-webkit-details-marker { display: none; }
.more-modes > summary::after { content: " ▾"; color: var(--muted); }
.more-modes[open] > summary, .more-modes > summary:hover { background: var(--rule-soft); color: var(--ink); }
.more-menu {
  position: absolute;
  z-index: 25;
  left: 0;
  top: 38px;
  min-width: 230px;
  padding: 8px;
  display: grid;
  gap: 4px;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 6px;
  box-shadow: 0 14px 30px -20px rgba(0,0,0,.35);
}
.more-menu .mode-btn { width: 100%; text-align: left; }
.learner-note {
  margin: -10px 0 18px;
  padding: 10px 14px;
  background: #FDFCF7;
  border: 1px dashed var(--rule);
  border-radius: 6px;
  font-family: var(--serif);
  font-size: 14px;
  color: var(--ink-soft);
}
@media (max-width: 760px) {
  .more-modes { width: 100%; }
  .more-menu { position: static; width: 100%; box-shadow: none; margin-top: 4px; }
  .mode-btn.teacher { margin-left: 0; }
}


/* ----- main task panel ----- */
.task-panel {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 8px;
  padding: 24px 28px 26px;
  box-shadow: 0 1px 0 rgba(0,0,0,.02), 0 12px 28px -22px rgba(0,0,0,.18);
}

.task-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px dashed var(--rule);
}
.task-num {
  font-family: var(--serif);
  font-size: 13px;
  font-style: italic;
  color: var(--muted);
}
.tag {
  font-size: 11px;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 99px;
  font-weight: 500;
  border: 1px solid transparent;
}
.tag-angle { background: var(--accent-soft); color: var(--accent-dark); border-color: #C9D9E0; }
.tag-length { background: var(--yellow-soft); color: #7A5C1F; border-color: #E8DDB0; }
.tag-area { background: var(--green-soft); color: #1F4D3B; border-color: #BFD7C9; }
.tag-archive { background: var(--burgundy-soft); color: var(--burgundy); border-color: #DCBABA; }
.tag-generated { background: #F4EFE6; color: var(--muted); border-color: var(--rule); }
.task-source {
  font-family: var(--serif);
  font-size: 12px;
  font-style: italic;
  color: var(--muted);
  margin-left: auto;
}

.task-body {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 28px;
  align-items: start;
}
@media (max-width: 760px) {
  .task-body { grid-template-columns: 1fr; }
}

.diagram {
  background: #FCFBF6;
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.diagram svg { display: block; width: 100%; height: auto; max-width: 320px; }

.task-content { display: flex; flex-direction: column; gap: 14px; }
.task-text {
  font-family: var(--serif);
  font-size: 17px;
  line-height: 1.55;
  color: var(--ink);
}
.task-text b { font-weight: 600; }

/* ----- answer area ----- */
.answer-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 6px;
}
.answer-label {
  font-family: var(--serif);
  font-size: 14px;
  font-style: italic;
  color: var(--muted);
}
input.answer {
  font-family: var(--mono);
  font-size: 18px;
  padding: 9px 13px;
  width: 130px;
  border: 1.5px solid var(--rule);
  border-radius: 5px;
  background: var(--paper);
  color: var(--ink);
  outline: none;
  transition: border-color .12s;
}
input.answer:focus { border-color: var(--accent); }
input.answer.correct { border-color: var(--green); background: var(--green-soft); }
input.answer.wrong { border-color: var(--red); background: var(--red-soft); }

.btn {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  padding: 9px 16px;
  border-radius: 5px;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all .12s;
  letter-spacing: .01em;
}
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
.btn-ghost { background: transparent; color: var(--accent); border-color: var(--accent); }
.btn-ghost:hover { background: var(--accent-soft); }
.btn-soft { background: var(--rule-soft); color: var(--ink); border-color: var(--rule); }
.btn-soft:hover { background: var(--rule); }
.btn-burg { background: var(--burgundy); color: #fff; border-color: var(--burgundy); }
.btn-burg:hover { filter: brightness(.92); }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* ----- feedback bubble ----- */
.feedback {
  font-family: var(--serif);
  font-size: 15px;
  padding: 10px 14px;
  border-radius: 5px;
  border-left: 3px solid;
  display: none;
}
.feedback.show { display: block; }
.feedback.ok { background: var(--green-soft); border-color: var(--green); color: #1F4D3B; }
.feedback.err { background: var(--red-soft); border-color: var(--red); color: #6E2222; }
.feedback small { font-family: var(--sans); font-size: 12px; color: var(--muted); font-style: normal; display: block; margin-top: 4px; }

/* ----- collapsible hint / solution ----- */
details.hint, details.solution {
  border: 1px solid var(--rule);
  border-radius: 5px;
  background: #FDFCF7;
}
details.hint summary, details.solution summary {
  list-style: none;
  cursor: pointer;
  padding: 9px 14px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--accent);
  user-select: none;
  display: flex;
  align-items: center;
  gap: 8px;
}
details.hint summary::-webkit-details-marker, details.solution summary::-webkit-details-marker { display: none; }
details.hint summary::before, details.solution summary::before {
  content: "›";
  font-family: var(--serif);
  font-size: 16px;
  color: var(--muted);
  transition: transform .15s;
  display: inline-block;
}
details[open].hint summary::before, details[open].solution summary::before { transform: rotate(90deg); }
details.hint .body, details.solution .body {
  padding: 4px 14px 14px;
  font-family: var(--serif);
  font-size: 15px;
  color: var(--ink-soft);
  border-top: 1px dashed var(--rule);
}
details.solution .step {
  margin: 8px 0;
  padding-left: 26px;
  position: relative;
}
details.solution .step::before {
  content: counter(step) ".";
  counter-increment: step;
  position: absolute;
  left: 0;
  top: 0;
  font-family: var(--serif);
  font-style: italic;
  color: var(--burgundy);
  font-weight: 600;
}
details.solution .body { counter-reset: step; }
details.solution .pitfalls {
  margin-top: 14px;
  padding-top: 10px;
  border-top: 1px dashed var(--rule);
  font-size: 13px;
  color: var(--muted);
  font-style: italic;
}
details.solution .pitfalls strong { font-style: normal; color: var(--burgundy); font-weight: 600; }

/* ----- diagnostic progress ----- */
.diag-progress {
  display: flex;
  gap: 4px;
  margin-bottom: 14px;
}
.diag-dot {
  width: 24px;
  height: 6px;
  border-radius: 2px;
  background: var(--rule);
}
.diag-dot.current { background: var(--accent); }
.diag-dot.ok { background: var(--green); }
.diag-dot.err { background: var(--red); }

.diag-results {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 8px;
  padding: 28px;
}
.diag-results h2 { font-family: var(--serif); font-size: 26px; margin-top: 0; }
.diag-score { font-family: var(--serif); font-size: 64px; font-weight: 600; color: var(--accent); }
.diag-results table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 13px; }
.diag-results td, .diag-results th { text-align: left; padding: 7px 10px; border-bottom: 1px solid var(--rule); }
.diag-results th { font-family: var(--sans); font-weight: 600; color: var(--muted); text-transform: uppercase; font-size: 11px; letter-spacing: .1em; }

/* ----- teacher panel ----- */
.teacher-panel {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 8px;
  padding: 24px 28px;
}
.teacher-panel h2 {
  font-family: var(--serif);
  font-size: 24px;
  margin: 0 0 6px;
  letter-spacing: -.01em;
}
.teacher-panel .lead {
  color: var(--muted);
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  margin-bottom: 22px;
}
.teacher-section {
  border-top: 1px solid var(--rule);
  padding: 18px 0;
}
.teacher-section h3 {
  font-family: var(--sans);
  font-size: 12px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  margin: 0 0 12px;
  font-weight: 600;
}
.cov-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.cov-table th, .cov-table td {
  padding: 7px 10px;
  text-align: left;
  border-bottom: 1px solid var(--rule);
}
.cov-table th {
  font-family: var(--sans);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--muted);
}
.cov-table tr:hover { background: var(--rule-soft); }
.pill { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; }
.pill.ok { background: var(--green-soft); color: var(--green); }
.pill.warn { background: var(--yellow-soft); color: #7A5C1F; }

.gen-test-btn {
  margin-top: 8px;
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 8px;
  border: 1px solid var(--rule);
  background: var(--paper);
  border-radius: 3px;
  cursor: pointer;
}
.gen-test-btn:hover { background: var(--rule-soft); }
.gen-sample {
  font-family: var(--serif);
  font-size: 13px;
  font-style: italic;
  color: var(--ink-soft);
  margin-top: 4px;
}
.gen-sample .ans {
  font-family: var(--mono);
  font-style: normal;
  color: var(--accent);
}

.json-area {
  width: 100%;
  min-height: 220px;
  font-family: var(--mono);
  font-size: 12px;
  padding: 12px;
  border: 1px solid var(--rule);
  border-radius: 5px;
  background: #FDFCF7;
  resize: vertical;
  color: var(--ink);
}
.json-controls {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.toast {
  position: fixed;
  bottom: 26px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink);
  color: #fff;
  padding: 11px 22px;
  border-radius: 6px;
  font-size: 13px;
  opacity: 0;
  transition: opacity .2s, transform .2s;
  pointer-events: none;
  z-index: 100;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.foot {
  margin-top: 28px;
  font-family: var(--serif);
  font-style: italic;
  font-size: 12px;
  color: var(--muted);
  text-align: center;
}

/* SVG label text class */
.lbl { font-family: var(--serif); font-style: italic; font-size: 14px; fill: var(--ink); }
.lbl-sm { font-family: var(--serif); font-style: italic; font-size: 12px; fill: var(--ink-soft); }
.angle-lbl { font-family: var(--serif); font-size: 11px; fill: var(--burgundy); font-style: italic; }
.dim-lbl { font-family: var(--serif); font-size: 12px; fill: var(--accent-dark); font-style: italic; }
.target-lbl { font-family: var(--serif); font-size: 13px; fill: var(--burgundy); font-weight: 700; }
.svg-note { font-family: var(--sans); font-size: 11px; fill: var(--ink-soft); }
.svg-legend-bg { fill: #fff; fill-opacity: .88; stroke: #E4DCC8; stroke-width: 1; }

@media print {
  body::before { display: none; }
  .modes, .stats, .answer-row .btn, .foot, .feedback { display: none !important; }
  .task-panel { border: none; box-shadow: none; }
  details.hint, details.solution { page-break-inside: avoid; }
}
</style>
</head>

<div class="wrap">

<header>
  <div class="title-block">
    <div class="eyebrow">ОГЭ — Математика — Геометрия</div>
    <h1>Задача <span class="num">№16</span><span class="sep">·</span><span class="sub">окружность</span></h1>
  </div>
  <div class="stats" id="statsBar">
    <div class="stat"><span class="stat-num" id="stSolved">0</span><span class="stat-lbl">Решено</span></div>
    <div class="stat"><span class="stat-num green" id="stCorrect">0</span><span class="stat-lbl">Верно</span></div>
    <div class="stat"><span class="stat-num red" id="stWrong">0</span><span class="stat-lbl">Ошибок</span></div>
    <div class="stat"><span class="stat-num accent" id="stAcc">—</span><span class="stat-lbl">Точность</span></div>
  </div>
</header>

<nav class="modes" id="modeNav" aria-label="Режимы тренажёра">
  <button class="mode-btn active" data-mode="archive_new">Начать тренировку</button>
  <button class="mode-btn" data-mode="mistakes">Тренировать ошибки</button>
  <button class="mode-btn" data-mode="diagnostic">Диагностика · 10</button>
  <details class="more-modes">
    <summary>Ещё режимы</summary>
    <div class="more-menu">
      <button class="mode-btn" data-mode="archive_exact">Архив: точные</button>
      <button class="mode-btn" data-mode="archive_similar">Похожие к архиву</button>
      <button class="mode-btn" data-mode="all">Все типы</button>
      <button class="mode-btn" data-mode="angle">Только углы</button>
      <button class="mode-btn" data-mode="length">Только длины</button>
      <button class="mode-btn" data-mode="area">Только площади</button>
    </div>
  </details>
  <button class="mode-btn teacher" data-mode="teacher">Учитель</button>
</nav>

<div class="learner-note">
  Сначала три главные кнопки. «Ещё режимы» — для точной настройки. «Учитель» — методическая проверка и экспорт.
</div>

<main id="mainArea"></main>

<div class="foot">Тренажёр готовится в браузере — данные не покидают устройство. <span id="lsNote"></span></div>

</div>

<div class="toast" id="toast"></div>

<script>
"use strict";

/* =========================================================================
   1. УТИЛИТЫ
   ========================================================================= */

const $  = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
const choice = arr => arr[Math.floor(Math.random() * arr.length)];
const uid = () => Math.random().toString(36).slice(2, 9);
const esc = s => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

// Comparing answers with tolerance for decimals
function answersMatch(user, correct) {
  if (user === null || user === '' || user === undefined) return false;
  // 1) трим, юникод-минусы → дефис, запятая → точка
  let u = String(user).trim().replace(/[−–—]/g, '-').replace(/,/g, '.');
  // 2) убираем хвостовой ° и пробелы (в условии может быть «Ответ дайте в градусах»)
  u = u.replace(/[°\s]+$/, '').replace(/^[+\s]+/, '');
  if (u === '') return false;
  // 3) внутренние пробелы — это ошибка ввода (12 5 не должно становиться 125)
  if (/\s/.test(u)) return false;
  // 4) дробь вида a/b — поддержим на будущее (например для cos = 24/25)
  let un;
  if (/^-?\d+(\.\d+)?\/-?\d+(\.\d+)?$/.test(u)) {
    const [a, b] = u.split('/').map(Number);
    if (!isFinite(a) || !isFinite(b) || b === 0) return false;
    un = a / b;
  } else if (/^-?(\d+(\.\d+)?|\.\d+)$/.test(u)) {
    un = Number(u);
  } else {
    return false;
  }
  if (!isFinite(un)) return false;
  const cn = Number(correct);
  // Жёсткое сравнение: для целых ответов погрешность мизерная,
  // для нецелых (0.96, 56.5) тонкий допуск 1e-3, чтобы покрыть
  // плавучесть Number('56.5001') − 56.5 ≈ 1.0000000003e-4, но НЕ принимать 56.6 за 56.5.
  const tol = Number.isInteger(cn) ? 1e-9 : 1e-3;
  return Math.abs(un - cn) <= tol;
}

// Pythagorean triples (primitive + common multiples), from PDF справочник
const PYTH_TRIPLES = [
  [3,4,5], [6,8,10], [9,12,15], [12,16,20], [15,20,25], [18,24,30], [21,28,35],
  [5,12,13], [10,24,26], [15,36,39],
  [8,15,17], [16,30,34],
  [7,24,25], [14,48,50],
  [9,40,41], [11,60,61], [12,35,37], [13,84,85],
  [20,21,29], [16,63,65], [33,56,65], [48,55,73],
  [27,36,45], [28,45,53], [35,84,91], [36,77,85], [39,80,89], [65,72,97]
];

function findTripleWith(a, b) {
  // returns the missing leg/hypotenuse for a Pythagorean triple containing a and b
  for (const t of PYTH_TRIPLES) {
    if (t.includes(a) && t.includes(b)) {
      return t.find(x => x !== a && x !== b) ?? t.filter(x => x === a).length > 1 ? a : null;
    }
  }
  return null;
}

function tripleByLegHyp(leg, hyp) {
  for (const t of PYTH_TRIPLES) {
    if (t[2] === hyp && (t[0] === leg || t[1] === leg)) {
      return t[0] === leg ? t[1] : t[0];
    }
  }
  return null;
}

function tripleByTwoLegs(a, b) {
  for (const t of PYTH_TRIPLES) {
    if (((t[0] === a && t[1] === b) || (t[0] === b && t[1] === a))) return t[2];
  }
  return null;
}

const VB = 'viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg"';
const CIRC_STROKE = 'stroke="#2C5566" stroke-width="1.8" fill="none"';
const LINE_STROKE = 'stroke="#8B2E2E" stroke-width="1.6" fill="none"';
const DASH_STROKE = 'stroke="#7A7568" stroke-width="1.2" stroke-dasharray="4 4" fill="none"';
const DOT = (x,y) => `<circle cx="${x}" cy="${y}" r="3" fill="#1A1A1A"/>`;

function svgPoint(x, y, label, dx=0, dy=0) {
  return `${DOT(x,y)}<text x="${x+dx}" y="${y+dy}" class="lbl">${label}</text>`;
}

function svgArcLabel(cx, cy, angle, text) {
  // place a small angle label near vertex
  return `<text x="${cx}" y="${cy}" class="angle-lbl">${text}</text>`;
}

function svgLegend(items, x=12, y=10) {
  const clean = (items || []).filter(Boolean).map(String);
  if (!clean.length) return '';
  const h = 16 + clean.length * 17;
  const lines = clean.map((txt, i) =>
    `<text x="${x+8}" y="${y+19+i*17}" class="svg-note">${esc(txt)}</text>`
  ).join('');
  return `<g><rect x="${x}" y="${y}" width="160" height="${h}" rx="6" class="svg-legend-bg"/>${lines}</g>`;
}


function svgPt(cx, cy, r, deg) {
  const rad = deg * Math.PI / 180;
  return { x: +(cx + r * Math.cos(rad)).toFixed(1), y: +(cy + r * Math.sin(rad)).toFixed(1) };
}
function svgXY(x, y) {
  return `${+Number(x).toFixed(1)} ${+Number(y).toFixed(1)}`;
}
function svgCircleAuditAttr(key, cx, cy, r, labels) {
  // Не влияет на рисунок: это подсказка для быстрой проверки визуальной геометрии.
  return `data-audit-key="${key}" data-audit-circle="${cx},${cy},${r}" data-audit-oncircle="${labels}"`;
}

      const angles = [60, 72, 90, 120, 135, 144, 150];
      const a = choice(angles);

      return {
        text: `На окружности с центром O отмечены точки A и B так, что угол AOB равен ${a}°. Длина меньшей дуги AB равна ${Lact}. Найдите длину большей дуги.`,

          `Длина дуги пропорциональна градусной мере: L_max = L_min · (360° − ${a}°) / ${a}° = ${Lact} · ${360-a} / ${a} = ${ans}.`

   5. СОСТОЯНИЕ И ЛОГИКА

const state = {
  mode: 'archive_new',
  current: null,        // {id, exact, type, subtype, text, answer, hint, solution, ...}
  checked: false,
  attempts: 0,
  showHint: false,
  showSolution: false,
  stats: SAFE_LS.get('oge16_stats', { solved: 0, correct: 0, wrong: 0, byType: {} }),
  archiveSeen: SAFE_LS.get('oge16_archiveSeen', []),
  diag: null            // {tasks: [...], idx: 0, results: []}
};

function saveStats() { SAFE_LS.set('oge16_stats', state.stats); SAFE_LS.set('oge16_archiveSeen', state.archiveSeen); }

function refreshStats() {
  $('#stSolved').textContent = state.stats.solved;
  $('#stCorrect').textContent = state.stats.correct;
  $('#stWrong').textContent = state.stats.wrong;
  const a = state.stats.solved ? Math.round(100 * state.stats.correct / state.stats.solved) : null;
  $('#stAcc').textContent = a == null ? '—' : (a + '%');
}

/* ----- генерация задачи ----- */

function genFromKey(key) {
  const g = GENERATORS[key];
  if (!g) return null;
  const raw = g.generate();
  return {
    id: 'gen_' + key + '_' + uid(),
    exact: false,
    source: null,
    type: g.type,
    subtype: key,
    subtypeLabel: g.label,
    ...raw
  };
}

function pickTask() {
  switch (state.mode) {
    case 'archive_new': {
      const seen = new Set(state.archiveSeen);
      const fresh = ARCHIVE.filter(t => !seen.has(t.id));
      if (fresh.length === 0) {
        // все увидены — выбираем случайно из всего архива
        return { ...choice(ARCHIVE) };
      }
      return { ...choice(fresh) };
    }
    case 'archive_exact': {
      return { ...choice(ARCHIVE) };
    }
    case 'mistakes': {
      const rows = Object.entries(state.stats.byType || {})
        .filter(([k, v]) => GENERATORS[k] && v.tried > v.right)
        .map(([k, v]) => ({ key: k, misses: v.tried - v.right, rate: (v.tried - v.right) / Math.max(1, v.tried) }));
      if (!rows.length) {
        toast('Ошибок пока нет — включаю все типы');
        return genFromKey(choice(Object.keys(GENERATORS)));
      }
      rows.sort((a, b) => (b.rate - a.rate) || (b.misses - a.misses));
      const top = rows.slice(0, Math.min(5, rows.length)).map(r => r.key);
      return genFromKey(choice(top));
    }
    case 'archive_similar': {
      // выбираем тот тип, прототип которого есть в архиве
      const keys = Object.keys(GENERATORS).filter(k => GENERATORS[k].archetypeOf);
      const key = choice(keys);
      return genFromKey(key);
    }
    case 'all': {
      const keys = Object.keys(GENERATORS);
      return genFromKey(choice(keys));
    }
    case 'angle':
    case 'length':
    case 'area': {
      const keys = Object.keys(GENERATORS).filter(k => GENERATORS[k].type === state.mode);
      return genFromKey(choice(keys));
    }
    case 'diagnostic': {
      // ничего — задача берётся из state.diag.tasks
      return state.diag.tasks[state.diag.idx];
    }
  }
  return null;
}

function startDiagnostic() {
  // 10 задач: 4 углы (включая 1 из архива), 4 длины, 2 площади
  const angleKeys = Object.keys(GENERATORS).filter(k => GENERATORS[k].type === 'angle');
  const lengthKeys = Object.keys(GENERATORS).filter(k => GENERATORS[k].type === 'length');
  const areaKeys = Object.keys(GENERATORS).filter(k => GENERATORS[k].type === 'area');
  const tasks = [];
  // 1 архивная
  tasks.push({ ...choice(ARCHIVE) });
  // 3 угол (генерированные)
  const angleSample = [...angleKeys].sort(() => Math.random() - 0.5).slice(0, 3);
  angleSample.forEach(k => tasks.push(genFromKey(k)));
  // 4 длины
  const lenSample = [...lengthKeys].sort(() => Math.random() - 0.5).slice(0, 4);
  lenSample.forEach(k => tasks.push(genFromKey(k)));
  // 2 площади
  const areaSample = [...areaKeys].sort(() => Math.random() - 0.5).slice(0, 2);
  areaSample.forEach(k => tasks.push(genFromKey(k)));
  // перемешать порядок
  tasks.sort(() => Math.random() - 0.5);
  state.diag = { tasks, idx: 0, results: [] };
}

/* ----- рендер задачи ----- */

function renderTask() {
  if (state.mode === 'teacher') return renderTeacher();
  if (state.mode === 'diagnostic' && !state.diag) startDiagnostic();
  if (state.mode === 'diagnostic' && state.diag.idx >= state.diag.tasks.length) return renderDiagResults();

  if (!state.current) state.current = pickTask();
  const t = state.current;
  state.checked = false;
  state.attempts = 0;
  state.showHint = false;
  state.showSolution = false;

  const svgFn = SVG[t.svgKey];
  const svg = svgFn ? svgFn(t.svgParams || {}) : '<svg viewBox="0 0 400 200"><text x="200" y="100" text-anchor="middle" font-family="serif" font-style="italic" fill="#888">схема</text></svg>';

  const tagType = t.type === 'angle' ? 'tag-angle' : t.type === 'length' ? 'tag-length' : 'tag-area';
  const typeName = t.type === 'angle' ? 'УГОЛ' : t.type === 'length' ? 'ДЛИНА' : 'ПЛОЩАДЬ';

  const sourceBadge = t.exact
    ? `<span class="tag tag-archive">АРХИВ</span>${t.needsReview ? '<span class="tag tag-generated">СВЕРИТЬ</span>' : ''}<span class="task-source">${esc(t.source)}</span>`
    : `<span class="tag tag-generated">ГЕНЕРАТОР</span><span class="task-source">${esc(t.subtypeLabel || '')}</span>`;

  let progressHtml = '';
  if (state.mode === 'diagnostic') {
    progressHtml = `<div class="diag-progress">${state.diag.tasks.map((_, i) => {
      const r = state.diag.results[i];
      const cls = r === true ? 'ok' : r === false ? 'err' : i === state.diag.idx ? 'current' : '';
      return `<div class="diag-dot ${cls}"></div>`;
    }).join('')}</div>`;
  }

  const html = `
    ${progressHtml}
    <div class="task-panel">
      <div class="task-meta">
        <span class="task-num">№16</span>
        <span class="tag ${tagType}">${typeName}</span>
        ${sourceBadge}
      </div>
      <div class="task-body">
        <div class="diagram">${svg}</div>
        <div class="task-content">
          <div class="task-text">${esc(t.text)}</div>
          <div class="answer-row">
            <span class="answer-label">Ответ:</span>
            <input class="answer" id="ansInput" type="text" inputmode="decimal" autocomplete="off" placeholder="число">
            <button class="btn btn-primary" id="btnCheck">Проверить</button>
            <button class="btn btn-ghost" id="btnHint">Подсказка</button>
            <button class="btn btn-soft" id="btnSolution" disabled>Решение после ответа</button>
            <button class="btn btn-soft" id="btnNext">Следующая →</button>
          </div>
          <div class="feedback" id="fb"></div>
          <details class="hint" id="hintBox"><summary>Подсказка</summary><div class="body">${esc(t.hint)}</div></details>
          <details class="solution" id="solBox"><summary>Пошаговое решение</summary><div class="body">
            ${t.solution.map(s => `<div class="step">${esc(s)}</div>`).join('')}
            ${t.pitfalls && t.pitfalls.length ? `<div class="pitfalls"><strong>Типичные ошибки:</strong> ${t.pitfalls.map(esc).join(' · ')}</div>` : ''}
          </div></details>
        </div>
      </div>
    </div>
  `;

  $('#mainArea').innerHTML = html;

  $('#ansInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkAnswer(); });
  $('#ansInput').addEventListener('input', () => {
    if (!state.checked) {
      $('#ansInput').classList.remove('wrong');
      const fb = $('#fb');
      if (fb) fb.className = 'feedback';
    }
  });
  $('#btnCheck').addEventListener('click', checkAnswer);
  $('#btnHint').addEventListener('click', () => { $('#hintBox').open = true; });
  $('#btnSolution').addEventListener('click', () => { if (state.checked) $('#solBox').open = true; });
  $('#solBox').addEventListener('toggle', () => {
    const box = $('#solBox');
    if (box.open && !state.checked) {
      box.open = false;
      const fb = $('#fb');
      fb.className = 'feedback show err';
      fb.innerHTML = 'Сначала сделайте попытку. Решение откроется после верного ответа или после двух ошибок.';
    }
  });
  $('#btnNext').addEventListener('click', nextTask);
  $('#ansInput').focus();
}

function finalizeResult(ok) {
  if (state.checked) return;
  const t = state.current;
  state.checked = true;

  state.stats.solved += 1;
  if (ok) state.stats.correct += 1; else state.stats.wrong += 1;
  state.stats.byType[t.subtype] = state.stats.byType[t.subtype] || { tried: 0, right: 0 };
  state.stats.byType[t.subtype].tried += 1;
  if (ok) state.stats.byType[t.subtype].right += 1;

  if (t.exact && !state.archiveSeen.includes(t.id)) {
    state.archiveSeen.push(t.id);
  }
  saveStats();
  refreshStats();

  if (state.mode === 'diagnostic') {
    state.diag.results[state.diag.idx] = ok;
  }
}

function checkAnswer() {
  if (state.checked) return;
  const t = state.current;
  const inp = $('#ansInput');
  const val = inp.value;
  const ok = answersMatch(val, t.answer);
  const fb = $('#fb');

  if (ok) {
    inp.classList.remove('wrong');
    inp.classList.add('correct');
    fb.className = 'feedback show ok';
    fb.innerHTML = `Верно! <small>Ответ: ${t.answer}</small>`;
    finalizeResult(true);
    $('#btnCheck').disabled = true;
    $('#btnSolution').disabled = false;
    $('#btnSolution').textContent = 'Решение';
    return;
  }

  state.attempts += 1;
  inp.classList.remove('correct');
  inp.classList.add('wrong');

  // В диагностике засчитываем результат именно первой попытки — без второго шанса.
  if (state.mode === 'diagnostic') {
    fb.className = 'feedback show err';
    fb.innerHTML = `В диагностике вторая попытка не даётся. Правильный ответ: <b>${t.answer}</b>. <small>Разбор появится по кнопке «Решение». Дальше — следующая задача.</small>`;
    finalizeResult(false);
    $('#btnCheck').disabled = true;
    $('#btnSolution').disabled = false;
    $('#btnSolution').textContent = 'Решение';
    $('#solBox').open = true;
    return;
  }

  if (state.attempts < 2) {
    fb.className = 'feedback show err';
    fb.innerHTML = 'Пока не сошлось. Ответ не раскрываю — попробуйте ещё раз. <small>Подсказка уже открыта: проверьте, какой угол/отрезок к чему относится.</small>';
    $('#hintBox').open = true;
    $('#btnCheck').textContent = 'Проверить ещё раз';
    setTimeout(() => { try { inp.focus(); inp.select(); } catch(e) {} }, 30);
    return;
  }

  fb.className = 'feedback show err';
  fb.innerHTML = `Не получилось со второй попытки. Правильный ответ: <b>${t.answer}</b>. <small>Откройте решение и разберите ошибку; этот тип можно потренировать в режиме «Тренировать ошибки».</small>`;
  finalizeResult(false);
  $('#btnCheck').disabled = true;
  $('#btnSolution').disabled = false;
  $('#btnSolution').textContent = 'Решение';
  $('#solBox').open = true;
}

function nextTask() {
  if (state.mode === 'diagnostic') {
    if (!state.checked) finalizeResult(false); // пропуск в диагностике считается ошибкой
    state.diag.idx += 1;
    state.current = null;
    if (state.diag.idx >= state.diag.tasks.length) {
      return renderDiagResults();
    }
  } else {
    state.current = null;
  }
  renderTask();
}

function renderDiagResults() {
  const tasks = state.diag.tasks;
  const results = state.diag.results;
  const correct = results.filter(r => r === true).length;
  const pct = Math.round(100 * correct / tasks.length);

  // по типам
  const byType = {};
  tasks.forEach((t, i) => {
    byType[t.type] = byType[t.type] || { tried: 0, right: 0 };
    byType[t.type].tried += 1;
    if (results[i] === true) byType[t.type].right += 1;
  });
  const typeLabel = { angle: 'Углы', length: 'Длины', area: 'Площади' };

  const html = `
    <div class="diag-results">
      <h2>Диагностика завершена</h2>
      <div class="diag-score">${correct}/${tasks.length}</div>
      <div style="font-family: var(--serif); font-size: 17px; color: var(--ink-soft); margin-top: 6px;">
        Точность: <b>${pct}%</b>
      </div>
      <table>
        <thead><tr><th>Раздел</th><th>Решено</th><th>Точность</th></tr></thead>
        <tbody>
          ${Object.keys(byType).map(k => `
            <tr>
              <td>${typeLabel[k] || k}</td>
              <td>${byType[k].right} / ${byType[k].tried}</td>
              <td>${Math.round(100 * byType[k].right / byType[k].tried)}%</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      <div style="margin-top: 22px;">
        <button class="btn btn-primary" id="diagAgain">Пройти снова</button>
        <button class="btn btn-ghost" id="diagBack">К свободной тренировке</button>
      </div>
    </div>
  `;
  $('#mainArea').innerHTML = html;
  $('#diagAgain').addEventListener('click', () => { state.diag = null; state.current = null; renderTask(); });
  $('#diagBack').addEventListener('click', () => { state.diag = null; state.current = null; selectMode('all'); });
}

/* =========================================================================
   6. РЕЖИМ УЧИТЕЛЯ
   ========================================================================= */

function renderTeacher() {
  // Покрытие по типам, источники архива, тест генераторов, импорт/экспорт
  const gens = Object.keys(GENERATORS);
  const typeRows = gens.map(k => {
    const g = GENERATORS[k];
    const archetype = g.archetypeOf || '';
    const stats = state.stats.byType[k];
    const trained = stats ? `${stats.right}/${stats.tried}` : '—';
    return `
      <tr data-gen="${k}">
        <td><code style="font-family: var(--mono); font-size: 12px;">${k}</code></td>
        <td>${esc(g.label)}</td>
        <td><span class="pill ok">${g.type === 'angle' ? 'угол' : g.type === 'length' ? 'длина' : 'площадь'}</span></td>
        <td>${esc(g.pdfRef || '')}</td>
        <td>${archetype ? `<span class="pill warn">${archetype}</span>` : '—'}</td>
        <td style="font-family: var(--mono); font-size: 12px;">${trained}</td>
        <td><button class="gen-test-btn" data-key="${k}">генерация ↻</button></td>
      </tr>
      <tr class="gen-sample-row" data-sample-for="${k}"><td colspan="7" style="background:#FDFCF7; padding: 0;"></td></tr>
    `;
  }).join('');

  const archRows = ARCHIVE.map(t => `
    <tr>
      <td><span class="pill warn">${esc(t.id)}</span></td>
      <td>${esc(t.source)}</td>
      <td>${esc(t.subtypeLabel)}</td>
      <td style="font-family: var(--mono);">${t.answer}</td>
      <td>${t.needsReview ? '<span class="pill warn">сверить с Archive(4)</span>' : '<span class="pill ok">проверено</span>'}${t.verificationStatus ? `<div class="gen-sample" style="margin-top:3px;">${esc(t.verificationStatus)}</div>` : ''}</td>
    </tr>
  `).join('');

  const html = `
    <div class="teacher-panel">
      <h2>Режим учителя</h2>
      <div class="lead">Покрытие типов, источники архива, тест генераторов, импорт/экспорт JSON. Архивные тексты помечены как exact, но статус сверки оставлен осторожным: «verified_by_prompt» до ручной проверки Archive(4).</div>

      <div class="teacher-section">
        <h3>Архивные задачи (exact)</h3>
        <table class="cov-table">
          <thead><tr><th>ID</th><th>Источник</th><th>Тип</th><th>Ответ</th><th>Статус</th></tr></thead>
          <tbody>${archRows}</tbody>
        </table>
      </div>

      <div class="teacher-section">
        <h3>Покрытие генераторами (${gens.length} типов)</h3>
        <table class="cov-table">
          <thead><tr><th>ключ</th><th>описание</th><th>раздел</th><th>правило</th><th>прототип архива</th><th>трен. ученика</th><th></th></tr></thead>
          <tbody>${typeRows}</tbody>
        </table>
      </div>

      <div class="teacher-section">
        <h3>Экспорт / импорт JSON</h3>
        <textarea class="json-area" id="jsonArea" placeholder="JSON-индекс архива + генераторов появится здесь"></textarea>
        <div class="json-controls">
          <button class="btn btn-soft" id="jsonExport">Экспортировать архив</button>
          <button class="btn btn-soft" id="jsonExportStats">Экспортировать статистику</button>
          <button class="btn btn-ghost" id="jsonClearStats">Сбросить статистику</button>
          <button class="btn btn-ghost" id="jsonClearSeen">Забыть просмотренное</button>
        </div>
      </div>

      <div class="teacher-section">
        <h3>Информация</h3>
        <div style="font-family: var(--serif); font-size: 14px; color: var(--ink-soft);">
          Всего архивных задач: <b>${ARCHIVE.length}</b> ·
          Всего генераторов: <b>${gens.length}</b> ·
          Углы: <b>${gens.filter(k => GENERATORS[k].type === 'angle').length}</b> ·
          Длины: <b>${gens.filter(k => GENERATORS[k].type === 'length').length}</b> ·
          Площади: <b>${gens.filter(k => GENERATORS[k].type === 'area').length}</b> ·
          localStorage: <b>${SAFE_LS.available ? 'доступен' : 'не доступен'}</b>.
        </div>
      </div>
    </div>
  `;
  $('#mainArea').innerHTML = html;

  // тест генератора по клику
  $$('.gen-test-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.key;
      const t = genFromKey(key);
      const row = $(`tr.gen-sample-row[data-sample-for="${key}"] td`);
      row.innerHTML = `<div class="gen-sample" style="padding: 8px 14px;">${esc(t.text)} <span class="ans">→ ${t.answer}</span></div>`;
    });
  });

  // экспорт
  $('#jsonExport').addEventListener('click', () => {
    const data = {
      archive: ARCHIVE.map(t => ({
        id: t.id, source: t.source, type: t.type, subtype: t.subtype,
        text: t.text, answer: t.answer, exact: t.exact, needsReview: t.needsReview, verificationStatus: t.verificationStatus || null
      })),
      generators: Object.keys(GENERATORS).map(k => ({
        key: k, label: GENERATORS[k].label, type: GENERATORS[k].type,
        archetypeOf: GENERATORS[k].archetypeOf || null
      }))
    };
    $('#jsonArea').value = JSON.stringify(data, null, 2);
    toast('Экспортировано');
  });

  $('#jsonExportStats').addEventListener('click', () => {
    $('#jsonArea').value = JSON.stringify({ stats: state.stats, seen: state.archiveSeen }, null, 2);
    toast('Статистика экспортирована');
  });

  $('#jsonClearStats').addEventListener('click', () => {
    if (!confirm('Сбросить всю статистику?')) return;
    state.stats = { solved: 0, correct: 0, wrong: 0, byType: {} };
    saveStats(); refreshStats(); renderTeacher();
    toast('Статистика очищена');
  });

  $('#jsonClearSeen').addEventListener('click', () => {
    state.archiveSeen = [];
    saveStats();
    toast('Список просмотренных задач очищен');
  });
}

/* =========================================================================
   7. ТОСТЫ И ПРОЧЕЕ
   ========================================================================= */

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1700);
}

/* ----- переключение режима ----- */

function selectMode(mode) {
  // Защита от случайного выхода из активной диагностики
  if (state.mode === 'diagnostic' && mode !== 'diagnostic' && state.diag && state.diag.idx > 0 && state.diag.idx < state.diag.tasks.length) {
    const ok = confirm(`Прервать диагностику? Сейчас ${state.diag.idx}/${state.diag.tasks.length}. Результат не сохранится.`);
    if (!ok) return;
  }
  state.mode = mode;
  state.current = null;
  if (mode === 'diagnostic') state.diag = null;
  $$('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  renderTask();
}

$('#modeNav').addEventListener('click', e => {
  const btn = e.target.closest('.mode-btn');
  if (!btn) return;
  const more = btn.closest('.more-modes');
  selectMode(btn.dataset.mode);
  if (more) more.open = false;
});

/* ----- старт ----- */

if (!SAFE_LS.available) $('#lsNote').textContent = '(статистика не сохраняется между сессиями)';
refreshStats();
renderTask();
</script>

</body>
</html>
