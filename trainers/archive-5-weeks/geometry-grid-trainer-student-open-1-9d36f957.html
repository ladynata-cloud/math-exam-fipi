<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex">
<title>Геометрия на клетчатой бумаге · ученическая версия</title>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="env,react">
/* eslint-disable react/no-unknown-property */
// Геометрия на клетчатой бумаге. Модуль 18
// Интерактивный тренажёр для детей. 13 тем · 4 режима · 3 уровня сложности.
// Один файл, без внешних библиотек кроме React.

const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* =========================================================================
   1. HELPERS · RNG · ФОРМАТИРОВАНИЕ
   ========================================================================= */

// Псевдослучайный генератор с seed для воспроизводимости задач.
function mulberry32(seed) {
  let s = seed >>> 0;
  return function () {
    s = (s + 0x6d2b79f5) >>> 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function hashSeed(...parts) {
  let h = 2166136261 >>> 0;
  for (const p of parts) {
    const s = String(p);
    for (let i = 0; i < s.length; i++) {
      h ^= s.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
  }
  return h >>> 0;
}
function makeRng(seed) {
  return mulberry32(seed);
}
function pick(rng, arr) {
  return arr[Math.floor(rng() * arr.length)];
}
function rndInt(rng, lo, hi) {
  return lo + Math.floor(rng() * (hi - lo + 1));
}
function uid() {
  return Math.random().toString(36).slice(2, 9);
}

// Русский формат: «1,5», «4,25», без лишних нулей.
function fmt(n) {
  if (Number.isInteger(n)) return String(n);
  return (Math.round(n * 1000) / 1000).toString().replace(".", ",");
}
function fmtPlain(n) {
  // Для сравнения, без локали.
  return Number.isInteger(n) ? String(n) : (Math.round(n * 1000) / 1000).toString();
}
function parseAnswer(raw) {
  if (raw == null) return null;
  const cleaned = String(raw).trim().replace(/\s+/g, "").replace(",", ".");
  if (cleaned === "" || cleaned === "-" || cleaned === ".") return null;
  const v = Number(cleaned);
  return Number.isFinite(v) ? v : null;
}
function eqAns(user, correct, tol = 0.015) {
  if (user == null) return false;
  return Math.abs(user - correct) <= tol;
}
function checkAnswer(rawInput, task) {
  const v = parseAnswer(rawInput);
  if (v == null) return { ok: false, parsed: null, reason: "empty" };
  return { ok: eqAns(v, task.answer), parsed: v };
}


// Делаем математические записи узнаваемыми для ученика: без мелких юникод-индексов
// и без «шифра», который плохо читается на телефонах.
function prettyText(value) {
  if (value == null) return "";
  return String(value)
    .replace(/d₁/g, "d1")
    .replace(/d₂/g, "d2")
    .replace(/S₁/g, "S1")
    .replace(/S₂/g, "S2")
    .replace(/r₁/g, "r1")
    .replace(/r₂/g, "r2")
    .replace(/Δx/g, "горизонтальный шаг")
    .replace(/Δy/g, "вертикальный шаг")
    .replace(/²/g, "^2")
    .replace(/·/g, " × ")
    .replace(/π/g, "пи")
    .replace(/√/g, "√")
    .replace(/\s+×\s+/g, " × ");
}

/* =========================================================================
   2. ПАЛИТРА · ТИПОГРАФИКА · СТИЛИ
   ========================================================================= */

const COL = {
  paper: "#FBF6E9",      // тёплая «бумага»
  paperEdge: "#F3EBD2",
  ink: "#1B2A3D",        // основной чернильно-синий
  inkSoft: "#48566B",
  inkMute: "#8A8472",
  grid: "#D8CDAC",       // линии клетчатой бумаги
  gridMajor: "#C4B788",
  accent: "#C84B31",     // терракотовый акцент (основные подсветки)
  accent2: "#1F6A6D",    // глубокий бирюзовый (вторая подсветка)
  gold: "#C99738",       // золото (выделение решения)
  ok: "#3F7A3C",         // зелёный «верно»
  okSoft: "#E1EED8",
  err: "#A5341F",        // тёмно-красный «ошибка»
  errSoft: "#F5DDD3",
  card: "#FFFCF3",
  cardEdge: "#EADFC2",
  shadow: "rgba(27, 42, 61, 0.10)",
};

const STYLE_SHEET = `
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');

body {
  margin: 0;
  font-family: 'Manrope', system-ui, -apple-system, sans-serif;

}

.ggt-formula-words { font-size: 13px; color: ${COL.inkSoft}; margin-top: 6px; }

@media (max-width: 700px) { .ggt-goal-grid { grid-template-columns: 1fr; } }
.ggt-goal-btn, .ggt-method-choice { border: 1.5px solid ${COL.cardEdge}; background: ${COL.paper}; border-radius: 12px; padding: 12px 14px; text-align: left; cursor: pointer; font-family: inherit; color: ${COL.ink}; transition: all .15s; }
.ggt-goal-btn:hover, .ggt-method-choice:hover { border-color: ${COL.ink}; transform: translateY(-1px); }

details > summary { cursor: pointer; padding: 8px 0; color: ${COL.inkSoft}; font-size: 13px; }
details > summary:hover { color: ${COL.ink}; }
details[open] > summary { color: ${COL.ink}; font-weight: 600; }

/* =========================================================================
   3. SVG: GridFigure + конструкторы элементов
   ========================================================================= */

// Все рисунки заданы декларативно: { cols, rows, cell, pad, elements: [...] }.
// Координаты элементов — в клетках. SVG отрисовывает их с фиксированным cell.
//
// Каждый элемент имеет: { id, type, ...типо-специфичные поля }.
// hintLevel определяет, какие элементы подсвечивать.

function GridFigure({ data, hintLevel = 0, showSolution = false }) {
  if (!data) return null;
  const cell = data.cell ?? 30;
  const pad = data.pad ?? 18;
  const W = data.cols * cell + pad * 2;
  const H = data.rows * cell + pad * 2;
  const toX = (c) => pad + c * cell;
  const toY = (r) => pad + r * cell;

  // Какие id подсвечены?
  const highlightSet = new Set();
  if (hintLevel >= 1 && data.highlight1) data.highlight1.forEach((id) => highlightSet.add(id));
  if (hintLevel >= 2 && data.highlight2) data.highlight2.forEach((id) => highlightSet.add(id));
  if (hintLevel >= 3 && data.highlight3) data.highlight3.forEach((id) => highlightSet.add(id));
  if (showSolution && data.highlightSolution)
    data.highlightSolution.forEach((id) => highlightSet.add(id));

  // Сетка
  const gridLines = [];
  for (let i = 0; i <= data.cols; i++) {
    gridLines.push(
      <line
        key={`v${i}`}
        x1={toX(i)}
        y1={toY(0)}
        x2={toX(i)}
        y2={toY(data.rows)}
        stroke={COL.grid}
        strokeWidth={i % 5 === 0 ? 0.8 : 0.5}
      />
    );
  }
  for (let j = 0; j <= data.rows; j++) {
    gridLines.push(
      <line
        key={`h${j}`}
        x1={toX(0)}
        y1={toY(j)}
        x2={toX(data.cols)}
        y2={toY(j)}
        stroke={COL.grid}
        strokeWidth={j % 5 === 0 ? 0.8 : 0.5}
      />
    );
  }

  // Рендер элементов
  const renderEl = (el, idx) => {
    const hi = highlightSet.has(el.id);
    const baseStroke = el.stroke || COL.ink;
    const stroke = hi ? el.highlightStroke || COL.accent : baseStroke;
    const sw = hi ? (el.highlightWidth || 3.2) : (el.strokeWidth || 2);
    const fill = el.fill || "none";
    const highlightFill = el.highlightFill || "rgba(200, 75, 49, 0.12)";
    const usedFill = hi && el.highlightFill ? highlightFill : fill;
    const dash = el.dash ? el.dash : undefined;
    // Если элемент спрятан до подсказки (opacity: 0), при подсветке он должен стать видимым.
    // Иначе вспомогательные линии/высоты/проекции технически подсвечиваются, но остаются невидимыми.
    const op = hi ? (el.highlightOpacity ?? 1) : (el.opacity ?? 1);

    switch (el.type) {
      case "polygon": {
        const pts = el.points.map(([c, r]) => `${toX(c)},${toY(r)}`).join(" ");
        return (
          <polygon
            key={idx}
            points={pts}
            fill={usedFill}
            stroke={stroke}
            strokeWidth={sw}
            strokeDasharray={dash}
            strokeLinejoin="round"
            opacity={op}
          />
        );
      }
      case "line": {
        return (
          <line
            key={idx}
            x1={toX(el.from[0])}
            y1={toY(el.from[1])}
            x2={toX(el.to[0])}
            y2={toY(el.to[1])}
            stroke={stroke}
            strokeWidth={sw}
            strokeDasharray={dash}
            strokeLinecap="round"
            opacity={op}
          />
        );
      }
      case "point": {
        const r = el.r || 4;
        return (
          <g key={idx} opacity={op}>
            <circle
              cx={toX(el.at[0])}
              cy={toY(el.at[1])}
              r={r}
              fill={hi ? COL.accent : (el.fill || COL.ink)}
            />
            {el.label && (
              <text
                x={toX(el.at[0]) + (el.labelDx ?? 8)}
                y={toY(el.at[1]) + (el.labelDy ?? -7)}
                fontFamily="Fraunces, Georgia, serif"
                fontSize={15}
                fontStyle="italic"
                fontWeight={600}
                fill={hi ? COL.accent : COL.ink}
              >
                {el.label}
              </text>
            )}
          </g>
        );
      }
      case "circle": {
        return (
          <g key={idx} opacity={op}>
            <circle
              cx={toX(el.center[0])}
              cy={toY(el.center[1])}
              r={el.radius * cell}
              fill={usedFill}
              stroke={stroke}
              strokeWidth={sw}
              strokeDasharray={dash}
            />
            {el.showCenter && (
              <circle cx={toX(el.center[0])} cy={toY(el.center[1])} r={2.4} fill={stroke} />
            )}
          </g>
        );
      }
      case "label": {
        // Измерительные подписи не должны раскрывать числа в проверочном режиме.
        // По умолчанию показываем их только когда соответствующий id попал в highlightSet.
        const labelOpacity = hi || el.always ? 1 : (el.opacity ?? 0);
        return (
          <text
            key={idx}
            x={toX(el.at[0])}
            y={toY(el.at[1])}
            fontFamily="JetBrains Mono, monospace"
            fontSize={el.size || 13}
            fontWeight={el.weight || 700}
            fill={hi ? COL.accent : (el.color || COL.inkSoft)}
            textAnchor={el.anchor || "middle"}
            dominantBaseline="middle"
            opacity={labelOpacity}
          >
            {prettyText(el.text)}
          </text>
        );
      }
      case "rightAngle": {
        // L-индикатор прямого угла.
        const [c, r] = el.at;
        const s = el.size || 0.36;
        const [dx, dy] = el.dir || [1, -1];
        return (
          <polyline
            key={idx}
            points={[
              [c + dx * s, r],
              [c + dx * s, r + dy * s],
              [c, r + dy * s],
            ]
              .map(([cc, rr]) => `${toX(cc)},${toY(rr)}`)
              .join(" ")}
            fill="none"
            stroke={hi ? (el.highlightStroke || COL.accent2) : COL.inkSoft}
            strokeWidth={hi ? (el.highlightWidth || 1.6) : 1.3}
            opacity={op}
          />
        );
      }
      case "bracket": {
        // Дуга под отрезком для группировки клеток.
        const x1 = toX(el.from[0]);
        const x2 = toX(el.to[0]);
        const y = toY(el.from[1]);
        const drop = el.drop || 6;
        return (
          <g key={idx} opacity={op}>
            <path
              d={`M ${x1} ${y + 1} L ${x1} ${y + drop} L ${x2} ${y + drop} L ${x2} ${y + 1}`}
              fill="none"
              stroke={COL.accent2}
              strokeWidth={1.2}
            />
            {el.label && (
              <text
                x={(x1 + x2) / 2}
                y={y + drop + 12}
                fontFamily="JetBrains Mono, monospace"
                fontSize={11}
                fill={COL.accent2}
                textAnchor="middle"
              >
                {el.label}
              </text>
            )}
          </g>
        );
      }
      default:
        return null;
    }
  };

  // Сортируем: заливки → линии → точки/подписи. Используем порядок из data.elements,
  // но точки и подписи рендерим в конце, чтобы они были поверх.
  const polys = data.elements.filter((e) => e.type === "polygon" || e.type === "circle");
  const lines = data.elements.filter((e) => e.type === "line" || e.type === "rightAngle" || e.type === "bracket");
  const points = data.elements.filter((e) => e.type === "point" || e.type === "label");

  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{ background: COL.paper, borderRadius: 8 }}>
      <rect x={0} y={0} width={W} height={H} fill={COL.paper} />
      <g>{gridLines}</g>
      <g>{polys.map(renderEl)}</g>
      <g>{lines.map(renderEl)}</g>
      <g>{points.map(renderEl)}</g>
    </svg>
  );
}

// Конструкторы элементов — короткие имена.
const E = {
  poly: (id, points, opts = {}) => ({ id, type: "polygon", points, ...opts }),
  line: (id, from, to, opts = {}) => ({ id, type: "line", from, to, ...opts }),
  dashLine: (id, from, to, opts = {}) => ({ id, type: "line", from, to, dash: "5 4", stroke: COL.inkSoft, strokeWidth: 1.5, ...opts }),
  pt: (id, at, label, opts = {}) => ({ id, type: "point", at, label, ...opts }),
  circ: (id, center, radius, opts = {}) => ({ id, type: "circle", center, radius, ...opts }),
  lab: (id, at, text, opts = {}) => ({ id, type: "label", at, text, ...opts }),

  bracket: (id, from, to, label, opts = {}) => ({ id, type: "bracket", from, to, label, ...opts }),

function genTriangleMidline(diff, rng) {
  const pools = {
    easy: [4, 6, 8],
    medium: [6, 8, 10, 5, 7],
    hard: [7, 9, 11, 10, 12],
  };
  const AC = pick(rng, pools[diff]);
  const apexH = rndInt(rng, 3, diff === "easy" ? 4 : diff === "medium" ? 6 : 7);
  const apexShift = diff === "easy" ? 0 : rndInt(rng, -1, AC - 1) - Math.floor(AC / 2);
  const cols = AC + 4;
  const rows = apexH + 3;
  const A = [2, rows - 1];
  const C = [2 + AC, rows - 1];
  const B = [2 + Math.floor(AC / 2) + apexShift, rows - 1 - apexH];
  const M = [(A[0] + B[0]) / 2, (A[1] + B[1]) / 2]; // середина AB
  const N = [(C[0] + B[0]) / 2, (C[1] + B[1]) / 2]; // середина BC
  const answer = AC / 2;

  return {
    id: uid(),
    topicId: 2,
    topicTitle: TOPICS[1].title,
    difficulty: diff,

        E.pt("pC", C, "C", { labelDx: 8, labelDy: 16 }),
        E.pt("pM", M, "M", { r: 3, labelDx: -16, labelDy: 4 }),
        E.pt("pN", N, "N", { r: 3, labelDx: 6, labelDy: 4 }),
        E.lab("ac_lab", [(A[0] + C[0]) / 2, A[1] + 0.55], `AC = ${AC}`, { color: COL.accent }),
      ],
      highlight1: ["ac_h", "ac_lab"],

      highlightSolution: ["ac_h", "mid_h", "ac_lab"],
    },

function genLargerLeg(diff, rng) {
  const ranges = {
    easy: [3, 6],
    medium: [4, 9],
    hard: [5, 12],
  };
  const [lo, hi] = ranges[diff];
  let a = rndInt(rng, lo, hi);
  let b = rndInt(rng, lo, hi);
  while (a === b) b = rndInt(rng, lo, hi);
  const answer = Math.max(a, b);
  const small = Math.min(a, b);

// ── Тема 8: Площадь параллелограмма ─────────────────────────────────────
function genParallelogramArea(diff, rng) {

  const cols = base + slant + 3;
  const rows = h + 3;
  const A = [1, rows - 1];
  const B = [1 + base, rows - 1];
  const C = [1 + base + slant, rows - 1 - h];
  const D = [1 + slant, rows - 1 - h];
  const answer = base * h;
  return {
    id: uid(),
    topicId: 8,

        E.ra("ra", [1 + slant, rows - 1], [1, -1], { opacity: 0 }),

        E.pt("pB", B, "B", { labelDx: 6, labelDy: 16 }),
        E.pt("pC", C, "C", { labelDx: 6, labelDy: -8 }),
        E.pt("pD", D, "D", { labelDx: -14, labelDy: -8 }),

    },

      `Основание ${base}, высота ${h}. S = ${base}·${h} = …`,

      `Проверка смысла: параллелограмм можно «разрезать и собрать» в прямоугольник ${base}×${h} — та же площадь.`,

    commonMistakes: [

      { value: base + h, hint: "Похоже, ты сложил основание и высоту. Нужно перемножить: S = a·h." },
      { value: Math.round(base * Math.sqrt(h * h + slant * slant)), hint: "Похоже, ты взял наклонную сторону вместо высоты. Высота — это перпендикуляр к основанию." },
      { value: 2 * (base + h), hint: "Это что-то похожее на периметр. Нужна площадь S = a·h." },

}

// ── Тема 9: Длина отрезка через подобие ─────────────────────────────────
function genSegmentLength(diff, rng) {
  // Большой треугольник высотой H и основанием L.
  // Внутри отрезок параллельно основанию на высоте (H − h) от основания (т.е. высота маленького треугольника h).
  // Длина отрезка x = L * h / H.
  const setupsEasy = [
    { L: 6, H: 6, h: 2 }, // x = 2
    { L: 8, H: 4, h: 2 }, // x = 4
    { L: 6, H: 3, h: 2 }, // x = 4
    { L: 9, H: 3, h: 2 }, // x = 6
    { L: 6, H: 4, h: 2 }, // x = 3
  ];
  const setupsMedium = [
    { L: 6, H: 4, h: 3 }, // x = 4.5
    { L: 8, H: 4, h: 3 }, // x = 6
    { L: 6, H: 4, h: 1 }, // x = 1.5
    { L: 10, H: 4, h: 3 }, // x = 7.5
    { L: 8, H: 6, h: 3 }, // x = 4
  ];
  const setupsHard = [
    { L: 8, H: 6, h: 3 }, // x = 4
    { L: 10, H: 4, h: 3 }, // x = 7.5
    { L: 6, H: 8, h: 3 }, // x = 2.25 → отфильтруем; см. ниже
    { L: 12, H: 8, h: 5 }, // x = 7.5
    { L: 9, H: 6, h: 4 }, // x = 6
    { L: 10, H: 6, h: 5 }, // x = 25/3 → отфильтруем
  ];
  let pool;
  if (diff === "easy") pool = setupsEasy;
  else if (diff === "medium") pool = setupsMedium;
  else pool = setupsHard;
  // Отфильтруем «грязные» ответы по уровню.
  const tol = diff === "easy" ? 1e-9 : diff === "medium" ? 0.001 : 0.001;
  const cleanCheck = (s) => {
    const x = (s.L * s.h) / s.H;
    if (diff === "easy") return Number.isInteger(x);
    if (diff === "medium") return Math.abs(x * 2 - Math.round(x * 2)) < tol; // кратно 0.5
    return Math.abs(x * 4 - Math.round(x * 4)) < tol; // кратно 0.25
  };
  pool = pool.filter(cleanCheck);
  const cfg = pick(rng, pool);
  const { L, H, h } = cfg;
  const x = (L * h) / H;

  const cols = L + 4;
  const rows = H + 3;
  const xApex = 1 + Math.floor(L / 2);
  const A = [1, rows - 1];
  const C = [1 + L, rows - 1];
  const B = [xApex, rows - 1 - H];
  // Внутренний отрезок параллельно основанию: на высоте y_inner = (rows-1) - (H - h) = rows-1 - H + h
  // Точки P и Q на сторонах AB и CB соответственно.
  // Параметризуем: P = A + t*(B-A), где (rows-1 - P_y) = h означает t = h/H
  const t = h / H;
  const P = [A[0] + t * (B[0] - A[0]), A[1] + t * (B[1] - A[1])];
  const Q = [C[0] + t * (B[0] - C[0]), C[1] + t * (B[1] - C[1])];

  return {
    id: uid(),
    topicId: 9,
    topicTitle: TOPICS[8].title,
    difficulty: diff,
    statement: "В треугольнике ABC проведён отрезок PQ, параллельный основанию AC. Найдите длину PQ.",
    svgData: {
      cols, rows, cell: 30, pad: 18,
      elements: [
        E.poly("big_tri", [A, B, C], { stroke: COL.ink, strokeWidth: 2.2, fill: "rgba(31, 106, 109, 0.06)", highlightFill: "rgba(31, 106, 109, 0.16)" }),
        E.poly("small_tri", [P, B, Q], { stroke: COL.ink, strokeWidth: 1.8, fill: "rgba(200, 75, 49, 0.08)", highlightFill: "rgba(200, 75, 49, 0.22)" }),
        E.line("base_AC", A, C, { stroke: COL.accent2, strokeWidth: 2.4, opacity: 0, highlightStroke: COL.accent2, highlightWidth: 3 }),
        E.line("seg_PQ", P, Q, { stroke: COL.accent, strokeWidth: 2.8 }),
        E.dashLine("big_h", B, [B[0], rows - 1], { opacity: 0, highlightStroke: COL.accent2, dash: "4 3", strokeWidth: 1.8 }),
        E.dashLine("small_h", B, [B[0], P[1]], { opacity: 0, highlightStroke: COL.accent, dash: "4 3", strokeWidth: 1.8 }),
        E.pt("pA", A, "A", { labelDx: -14, labelDy: 16 }),
        E.pt("pB", B, "B", { labelDx: -4, labelDy: -10 }),
        E.pt("pC", C, "C", { labelDx: 6, labelDy: 16 }),
        E.pt("pP", P, "P", { r: 3, labelDx: -16, labelDy: 4 }),
        E.pt("pQ", Q, "Q", { r: 3, labelDx: 6, labelDy: 4 }),
        E.lab("lab_L", [(A[0] + C[0]) / 2, A[1] + 0.55], `L = ${L}`, { color: COL.accent2 }),
        E.lab("lab_H", [B[0] + 0.45, (B[1] + (rows - 1)) / 2], `H = ${H}`, { color: COL.accent2, anchor: "start" }),
        E.lab("lab_h", [B[0] + 0.45, (B[1] + P[1]) / 2], `h = ${h}`, { color: COL.accent, anchor: "start" }),
        E.lab("lab_x", [(P[0] + Q[0]) / 2, P[1] - 0.4], `PQ = ?`, { color: COL.accent }),
      ],
      highlight1: ["base_AC", "seg_PQ", "lab_L"],
      highlight2: ["big_tri", "small_tri", "big_h", "small_h", "lab_L", "lab_H", "lab_h"],
      highlight3: ["big_tri", "small_tri", "big_h", "small_h", "lab_L", "lab_H", "lab_h", "lab_x"],
      highlightSolution: ["big_tri", "small_tri", "lab_L", "lab_H", "lab_h", "lab_x"],
    },
    answer: x,
    answerDisplay: fmt(x),
    hints: [
      "Найди два похожих треугольника: маленький PBQ и большой ABC. У них одна и та же форма.",
      "В подобных треугольниках сходственные стороны пропорциональны: PQ/L = h/H. Откуда PQ = L·h/H.",
      `Большой: основание ${L}, высота ${H}. Маленький: высота ${h}. PQ = ${L}·${h}/${H} = ${L * h}/${H} = …`,
    ],
    solutionSteps: [
      `Отрезок PQ параллелен AC, поэтому треугольники PBQ и ABC подобны.`,
      `Сходственные стороны пропорциональны: PQ/L = h/H. Можно записать пропорцию таблицей:`,
      `маленький: PQ ↔ h | большой: L ↔ H.`,
      `PQ = L·h/H = ${L}·${h}/${H} = ${L * h}/${H} = ${fmt(x)}.`,
      `Проверка смысла: чем меньше h по сравнению с H, тем короче PQ. Здесь h/H = ${fmt(h / H)}.`,
    ],
    commonMistakes: [
      { value: (L * H) / h, hint: "Похоже, ты перевернул пропорцию. Должно быть PQ/L = h/H, а не h/H = L/PQ." },
      { value: L, hint: "Это полное основание AC, а не PQ. PQ короче в h/H раз." },
      { value: H - h, hint: "Похоже, ты взял разность высот вместо PQ. Используй пропорцию PQ/L = h/H." },
      { value: h, hint: "Это высота маленького треугольника, а не его основание. PQ = L·h/H." },
      { value: L - h, hint: "Это не связано с подобием. Нужно PQ = L·h/H." },
    ],
    skillCard: "Видеть подобные треугольники и строить пропорцию.",
    methodCard: "Маленький и большой треугольник. Сходственные стороны пропорциональны.",
    checkIdea: `PQ должно быть короче L = ${L}, ведь маленький треугольник — внутри большого.`,
  };
}

// ── Тема 10: Сравнение отрезков ─────────────────────────────────────────
function genSegmentRatio(diff, rng) {
  // Точки A, M, B на одной наклонной прямой. M делит AB в отношении m:n по проекциям.
  const pools = {
    easy: [[1, 3], [2, 4], [3, 6], [1, 4], [2, 6]],   // целые отношения
    medium: [[2, 5], [3, 9], [4, 8], [2, 8], [3, 12]],  // целые
    hard: [[2, 5], [4, 10], [2, 3], [3, 5], [4, 6]],   // могут давать 1.5, 2.5 и т.п.
  };
  const [m, n] = pick(rng, pools[diff]);
  // Рисуем без масштабирования: число клеток на проекции должно совпадать с тем,
  // что ребёнок реально видит и считает по сетке.
  const ky = 1;
  const totalDx = m + n;
  const totalDy = ky * (m + n);
  const cols = totalDx + 3;
  const rows = totalDy + 3;
  const A = [1, rows - 1];
  const M = [1 + m, rows - 1 - m * ky];
  const B = [1 + totalDx, rows - 1 - totalDy];

  const forms = [
    { label: "AM длиннее BM", longer: "AM", shorter: "BM", val: m / n },
    { label: "BM длиннее AM", longer: "BM", shorter: "AM", val: n / m },
    { label: "AM короче BM", longer: "BM", shorter: "AM", val: n / m },
    { label: "BM короче AM", longer: "AM", shorter: "BM", val: m / n },
  ];
  // Фильтруем формы, где ответ < 1 (длиннее/короче в долях — не подходит).
  const valid = forms.filter((f) => f.val > 1);
  const chosen = pick(rng, valid);
  const answer = chosen.val;
  const isLonger = chosen.label.includes("длиннее");
  const which = chosen.label.split(" ")[0]; // AM или BM
  const statement = isLonger
    ? `Точка M лежит на отрезке AB. Во сколько раз отрезок ${which} длиннее отрезка ${chosen.shorter}?`
    : `Точка M лежит на отрезке AB. Во сколько раз отрезок ${which} короче отрезка ${chosen.longer}?`;

  return {
    id: uid(),
    topicId: 10,
    topicTitle: TOPICS[9].title,
    difficulty: diff,
    statement,
    svgData: {
      cols, rows, cell: 30, pad: 18,
      elements: [
        E.line("ab", A, B, { stroke: COL.ink, strokeWidth: 2.4 }),
        // Проекции по горизонтали:
        E.dashLine("proj_am", [A[0], rows - 0.5], [M[0], rows - 0.5], { stroke: COL.accent, strokeWidth: 1.8, opacity: 0, highlightStroke: COL.accent, highlightWidth: 2.4 }),
        E.dashLine("proj_mb", [M[0], rows - 0.5], [B[0], rows - 0.5], { stroke: COL.accent2, strokeWidth: 1.8, opacity: 0, highlightStroke: COL.accent2, highlightWidth: 2.4 }),
        E.dashLine("drop_a", A, [A[0], rows - 0.5], { stroke: COL.inkSoft, strokeWidth: 1, dash: "2 3", opacity: 0 }),
        E.dashLine("drop_m", M, [M[0], rows - 0.5], { stroke: COL.inkSoft, strokeWidth: 1, dash: "2 3", opacity: 0 }),
        E.dashLine("drop_b", B, [B[0], rows - 0.5], { stroke: COL.inkSoft, strokeWidth: 1, dash: "2 3", opacity: 0 }),
        E.pt("pA", A, "A", { labelDx: -14, labelDy: 16 }),
        E.pt("pM", M, "M", { labelDx: 8, labelDy: -2 }),
        E.pt("pB", B, "B", { labelDx: 6, labelDy: -10 }),
        E.lab("lab_am", [(A[0] + M[0]) / 2, rows - 0.05], `${m}`, { color: COL.accent }),
        E.lab("lab_mb", [(M[0] + B[0]) / 2, rows - 0.05], `${n}`, { color: COL.accent2 }),
      ],
      highlight1: ["pA", "pM", "pB"],
      highlight2: ["proj_am", "proj_mb", "drop_a", "drop_m", "drop_b", "lab_am", "lab_mb"],
      highlight3: ["proj_am", "proj_mb", "lab_am", "lab_mb"],
      highlightSolution: ["proj_am", "proj_mb", "lab_am", "lab_mb"],
    },
    answer,
    answerDisplay: fmt(answer),
    hints: [
      "Точки A, M, B лежат на одной прямой. Поэтому отрезки AM и BM пропорциональны своим горизонтальным проекциям.",
      `Сравни проекции AM и BM по клеткам. ${isLonger ? "Если спрашивают «длиннее», делим больший на меньший." : "Если спрашивают «короче», тоже делим больший на меньший — получаем, во сколько раз короче."}`,
      `Проекция ${chosen.longer} = ${chosen.longer === "AM" ? m : n}, проекция ${chosen.shorter} = ${chosen.shorter === "AM" ? m : n}. Ответ: ${Math.max(m, n)}/${Math.min(m, n)} = …`,
    ],
    solutionSteps: [
      `Точки A, M, B лежат на одной прямой, значит AM:BM = (проекция AM):(проекция BM).`,
      `Считаем по клеткам: проекция AM = ${m}, проекция BM = ${n}.`,
      `${isLonger ? `${which} длиннее в ${chosen.longer === "AM" ? m : n}/${chosen.shorter === "AM" ? m : n} раз` : `${which} короче в ${chosen.longer === "AM" ? m : n}/${chosen.shorter === "AM" ? m : n} раз`} = ${fmt(answer)}.`,
    ],
    commonMistakes: [
      { value: 1 / answer, hint: `Похоже, ты перевернул отношение. Если спрашивают «во сколько раз ${which} ${isLonger ? "длиннее" : "короче"}», деление должно дать число больше 1.` },
      { value: m + n, hint: "Похоже, ты сложил проекции. Нужно их разделить друг на друга." },
      { value: Math.abs(m - n), hint: "Похоже, ты взял разность вместо отношения. Нужно делить, а не вычитать." },
    ],
    skillCard: "Сравнивать наклонные отрезки через их проекции.",
    methodCard: "Проекции отрезков на одной прямой.",
    checkIdea: `${isLonger ? "Длиннее" : "Короче"} — значит ответ всегда больше 1.`,
  };
}

// ── Тема 11: Площади кругов, целые отношения ────────────────────────────
function genCirclesRatioInt(diff, rng) {
  // Радиусы целые, ответ — квадрат отношения.
  const pools = {
    easy: [[1, 2], [1, 3], [2, 3]],

    hard: [[2, 5], [3, 5], [3, 4], [2, 6], [1, 4]],

  const [rsmall, rbig] = pick(rng, pools[diff]);
  const answer = (rbig * rbig) / (rsmall * rsmall);
  const cols = Math.max(8, 2 * rbig + 2 * rsmall + 4);
  const rows = Math.max(6, 2 * rbig + 2);
  const cyMid = Math.floor(rows / 2);

  const cx2 = cx1 + rbig + rsmall + 2;

      highlight3: ["r_big", "r_small", "lab_R", "lab_r", "c_big", "c_small"],
      highlightSolution: ["r_big", "r_small", "lab_R", "lab_r", "c_big", "c_small"],
    },
    answer,

      "Найди радиусы обоих кругов по клеткам.",
      "Площади кругов сравнивают через квадраты радиусов: S₁/S₂ = r₁²/r₂². Сами радиусы возводить в квадрат, а π сокращается.",
      `R = ${rbig}, r = ${rsmall}. Отношение площадей = R²/r² = ${rbig}²/${rsmall}² = ${rbig * rbig}/${rsmall * rsmall} = …`,
    ],
    solutionSteps: [
      `Радиусы кругов: R = ${rbig}, r = ${rsmall}.`,
      `Площадь круга S = πr². При сравнении π сокращается, остаются квадраты радиусов.`,
      `S_большой / S_маленький = R²/r² = ${rbig * rbig}/${rsmall * rsmall} = ${fmt(answer)}.`,
      `Проверка смысла: большой круг с радиусом в ${rbig / rsmall} раза больше имеет площадь в ${fmt(answer)} раз больше — это нормально, площадь растёт как квадрат.`,
    ],
    commonMistakes: [
      { value: rbig / rsmall, hint: "Похоже, ты сравнил радиусы, а не площади. Площадь зависит от r², поэтому отношение площадей = R²/r²." },
      { value: rbig - rsmall, hint: "Похоже, ты вычел радиусы. Нужно отношение квадратов: R²/r²." },
      { value: rbig + rsmall, hint: "Похоже, ты сложил радиусы. Нужно отношение квадратов: R²/r²." },
      { value: rbig * rsmall, hint: "Похоже, ты перемножил радиусы. Нужно отношение квадратов: R²/r²." },
    ],

    methodCard: "S₁/S₂ = r₁²/r₂².",

  };
}

// ── Тема 12: Площади кругов, диагональные радиусы ───────────────────────
function genCirclesRatioExtra(diff, rng) {
  // Радиус — диагональ клеточного прямоугольника: r² = dx² + dy².
  // Требование: и dx ≥ 1, и dy ≥ 1 (иначе это уже тема 11 с осевым радиусом).
  // Допустимые «красивые» отношения площадей: кратные 0.25 в диапазоне (1, 8].
  const dxMax = diff === "easy" ? 2 : diff === "medium" ? 3 : 4;
  const dyMax = diff === "easy" ? 3 : diff === "medium" ? 4 : 5;
  const sqPool = [];
  for (let dx = 1; dx <= dxMax; dx++) {
    for (let dy = 1; dy <= dyMax; dy++) {
      sqPool.push({ dx, dy, sq: dx * dx + dy * dy });
    }
  }
  const allCases = [];
  for (let i = 0; i < sqPool.length; i++) {
    for (let j = 0; j < sqPool.length; j++) {
      if (i === j) continue;
      const a = sqPool[i], b = sqPool[j];
      if (a.sq <= b.sq) continue;
      const ratio = a.sq / b.sq;
      if (ratio <= 1.0001 || ratio > 8.001) continue;
      if (Math.abs(ratio * 4 - Math.round(ratio * 4)) > 1e-6) continue;
      // На лёгком уровне — только целые отношения. На среднем и сложном допускаем 0.25-кратные.
      if (diff === "easy" && Math.abs(ratio - Math.round(ratio)) > 1e-6) continue;
      allCases.push({ big: a, small: b, ratio });
    }
  }
  // Гарантированный fallback (на случай если фильтрация дала пустой пул).
  const cases = allCases.length > 0
    ? allCases
    : [{ big: { dx: 2, dy: 4, sq: 20 }, small: { dx: 1, dy: 2, sq: 5 }, ratio: 4 }];
  const cfg = pick(rng, cases);
  const big = cfg.big;
  const small = cfg.small;
  const bigSq = big.sq;
  const smallSq = small.sq;
  const answer = bigSq / smallSq;

  const rBig = Math.sqrt(bigSq);
  const rSmall = Math.sqrt(smallSq);

  const cols = Math.max(10, 2 * Math.ceil(rBig) + 2 * Math.ceil(rSmall) + 4);
  const rows = Math.max(8, 2 * Math.ceil(rBig) + 2);
  const cyMid = Math.floor(rows / 2);
  const cx1 = Math.ceil(rBig) + 1;
  const cx2 = cx1 + Math.ceil(rBig) + Math.ceil(rSmall) + 2;

  // Радиусы рисуем как диагонали прямоугольников.
  const bigEnd = [cx1 + big.dx, cyMid - big.dy];
  const smallEnd = [cx2 + small.dx, cyMid - small.dy];

  return {
    id: uid(),
    topicId: 12,
    topicTitle: TOPICS[11].title,
    difficulty: diff,
    statement: `На клетчатой бумаге изображены два круга. Радиус каждого — отрезок от центра до отмеченной точки. Во сколько раз площадь большего круга больше площади меньшего?`,
    svgData: {
      cols, rows, cell: 30, pad: 18,
      elements: [
        E.circ("c_big", [cx1, cyMid], rBig, { stroke: COL.ink, strokeWidth: 2, fill: "rgba(200, 75, 49, 0.05)", showCenter: true, highlightFill: "rgba(200, 75, 49, 0.18)" }),
        E.circ("c_small", [cx2, cyMid], rSmall, { stroke: COL.ink, strokeWidth: 2, fill: "rgba(31, 106, 109, 0.05)", showCenter: true, highlightFill: "rgba(31, 106, 109, 0.18)" }),
        E.line("r_big", [cx1, cyMid], bigEnd, { stroke: COL.accent, strokeWidth: 2.4, opacity: 0, highlightStroke: COL.accent, highlightWidth: 2.8 }),
        E.line("r_small", [cx2, cyMid], smallEnd, { stroke: COL.accent2, strokeWidth: 2.4, opacity: 0, highlightStroke: COL.accent2, highlightWidth: 2.8 }),
        // Прямоугольный треугольник-помощник для большего радиуса
        E.dashLine("aux_big_h", [cx1, cyMid], [cx1 + big.dx, cyMid], { opacity: 0, highlightStroke: COL.accent, dash: "4 3" }),
        E.dashLine("aux_big_v", [cx1 + big.dx, cyMid], bigEnd, { opacity: 0, highlightStroke: COL.accent, dash: "4 3" }),
        E.dashLine("aux_small_h", [cx2, cyMid], [cx2 + small.dx, cyMid], { opacity: 0, highlightStroke: COL.accent2, dash: "4 3" }),
        E.dashLine("aux_small_v", [cx2 + small.dx, cyMid], smallEnd, { opacity: 0, highlightStroke: COL.accent2, dash: "4 3" }),
        E.pt("p_big", bigEnd, ""),
        E.pt("p_small", smallEnd, ""),
        E.lab("lab_R2", [cx1 - 0.6, cyMid + 1], `R² = ${big.dx}²+${big.dy}² = ${bigSq}`, { color: COL.accent, anchor: "start", size: 12 }),
        E.lab("lab_r2", [cx2 - 0.6, cyMid + 1], `r² = ${small.dx}²+${small.dy}² = ${smallSq}`, { color: COL.accent2, anchor: "start", size: 12 }),
      ],
      highlight1: ["r_big", "r_small"],
      highlight2: ["r_big", "r_small", "aux_big_h", "aux_big_v", "aux_small_h", "aux_small_v"],
      highlight3: ["aux_big_h", "aux_big_v", "aux_small_h", "aux_small_v", "lab_R2", "lab_r2"],
      highlightSolution: ["aux_big_h", "aux_big_v", "aux_small_h", "aux_small_v", "lab_R2", "lab_r2"],
    },
    answer,
    answerDisplay: fmt(answer),
    hints: [
      "Радиус — отрезок от центра до точки. Если он идёт «по диагонали», построй маленький прямоугольный треугольник-помощник.",
      "Для отношения площадей сам корень считать НЕ обязательно — достаточно сравнить r². По Пифагору: r² = dx² + dy².",
      `R² = ${big.dx}² + ${big.dy}² = ${bigSq}. r² = ${small.dx}² + ${small.dy}² = ${smallSq}. Отношение = ${bigSq}/${smallSq} = …`,
    ],
    solutionSteps: [
      `Радиус идёт по диагонали клеточного прямоугольника. По Пифагору r² = dx² + dy².`,
      `Для большего: R² = ${big.dx}² + ${big.dy}² = ${bigSq}.`,
      `Для меньшего: r² = ${small.dx}² + ${small.dy}² = ${smallSq}.`,
      `Отношение площадей: S_большой/S_маленький = R²/r² = ${bigSq}/${smallSq} = ${fmt(answer)}.`,
      `Проверка смысла: корень считать не пришлось — π и квадратные корни сокращаются.`,
    ],
    commonMistakes: [
      { value: Math.sqrt(answer), hint: "Похоже, ты сравнил радиусы, а не площади. Нужно R²/r², а не R/r." },
      { value: bigSq - smallSq, hint: "Похоже, ты вычел квадраты вместо того, чтобы поделить. Нужно отношение R²/r²." },
      { value: bigSq, hint: "Похоже, ты записал только R². Нужно отношение R²/r²." },
      { value: smallSq, hint: "Похоже, ты записал только r². Нужно отношение R²/r²." },
    ],
    skillCard: "Находить r² для диагональных радиусов и сравнивать площади через квадраты.",
    methodCard: "Квадраты радиусов через Пифагора. Корни считать не обязательно.",
    checkIdea: "π и корни сокращаются — остаются только квадраты радиусов.",
  };
}

// ── Тема 13: Расстояние между точками ───────────────────────────────────
function genDistance(diff, rng) {
  // Пифагоровы тройки и их «повороты».
  const triplesEasy = [[3, 4, 5]];
  const triplesMed = [[3, 4, 5], [6, 8, 10]];
  const triplesHard = [[3, 4, 5], [6, 8, 10], [5, 12, 13], [8, 15, 17], [9, 12, 15]];
  const triples = diff === "easy" ? triplesEasy : diff === "medium" ? triplesMed : triplesHard;
  const [a, b, c] = pick(rng, triples);
  // Решаем, какой шаг по горизонтали (dx), какой по вертикали (dy).
  const swap = rng() < 0.5;
  const dx = swap ? b : a;
  const dy = swap ? a : b;
  const cols = dx + 4;
  const rows = dy + 3;
  // Не разворачиваем — точки в "верх-право" направлении.
  const A = [1, rows - 1];
  const B = [1 + dx, rows - 1 - dy];
  const C = [1 + dx, rows - 1]; // вспомогательная точка прямого угла
  const answer = c;
  return {
    id: uid(),
    topicId: 13,
    topicTitle: TOPICS[12].title,
    difficulty: diff,
    statement: "На клетчатой бумаге отмечены две точки A и B. Найдите расстояние между ними.",
    svgData: {
      cols, rows, cell: 30, pad: 18,
      elements: [
        E.line("ab", A, B, { stroke: COL.ink, strokeWidth: 2.4 }),
        E.dashLine("dx", A, C, { stroke: COL.accent, strokeWidth: 1.8, opacity: 0, highlightStroke: COL.accent, highlightWidth: 2.4 }),
        E.dashLine("dy", C, B, { stroke: COL.accent2, strokeWidth: 1.8, opacity: 0, highlightStroke: COL.accent2, highlightWidth: 2.4 }),
        E.ra("ra", C, [-1, -1], { opacity: 0 }),
        E.pt("pA", A, "A", { labelDx: -14, labelDy: 16 }),
        E.pt("pB", B, "B", { labelDx: 6, labelDy: -10 }),
        E.pt("pC", C, "", { r: 2.5, opacity: 0 }),
        E.lab("lab_dx", [(A[0] + C[0]) / 2, A[1] + 0.55], `dx = ${dx}`, { color: COL.accent }),
        E.lab("lab_dy", [C[0] + 0.55, (C[1] + B[1]) / 2], `dy = ${dy}`, { color: COL.accent2, anchor: "start" }),
        E.lab("lab_d", [(A[0] + B[0]) / 2 + 0.4, (A[1] + B[1]) / 2 - 0.4], `d = ?`, { color: COL.ink, anchor: "start" }),
      ],
      highlight1: ["pA", "pB"],
      highlight2: ["dx", "dy", "ra", "pC", "lab_dx", "lab_dy"],
      highlight3: ["dx", "dy", "ra", "lab_dx", "lab_dy"],
      highlightSolution: ["dx", "dy", "ra", "lab_dx", "lab_dy"],
    },
    answer,
    answerDisplay: fmt(answer),
    hints: [
      "Соедини точки и достроить прямоугольный треугольник: один катет — горизонтальный, другой — вертикальный.",
      "Расстояние между точками — гипотенуза этого треугольника. Применяй Пифагора: d² = dx² + dy².",
      `dx = ${dx}, dy = ${dy}. d² = ${dx}² + ${dy}² = ${dx * dx} + ${dy * dy} = ${dx * dx + dy * dy}. d = √${dx * dx + dy * dy} = …`,
    ],
    solutionSteps: [
      `Строим прямоугольный треугольник: горизонтальный катет dx = ${dx}, вертикальный dy = ${dy}.`,
      `По Пифагору: d² = dx² + dy² = ${dx}² + ${dy}² = ${dx * dx} + ${dy * dy} = ${dx * dx + dy * dy}.`,
      `d = √${dx * dx + dy * dy} = ${answer}. Это пифагорова тройка.`,
    ],
    commonMistakes: [
      { value: dx, hint: "Это только горизонтальный шаг dx. Расстояние = √(dx² + dy²) — нужна гипотенуза, а не катет." },
      { value: dy, hint: "Это только вертикальный шаг dy. Расстояние = √(dx² + dy²) — нужна гипотенуза, а не катет." },
      { value: dx + dy, hint: "Похоже, ты сложил dx и dy. По Пифагору сначала возводим в квадрат, потом складываем, потом извлекаем корень: √(dx² + dy²)." },
      { value: dx * dx + dy * dy, hint: "Это d² — квадрат расстояния. Не забудь извлечь корень." },
      { value: Math.abs(dx - dy), hint: "Это разность катетов. Расстояние = √(dx² + dy²)." },
    ],
    skillCard: "Строить прямоугольный треугольник-помощник и применять Пифагора.",
    methodCard: "Пифагор: d = √(dx² + dy²).",
    checkIdea: "Гипотенуза всегда длиннее каждого катета и короче их суммы.",
  };
}

const GENERATORS = {

  5: genLargerDiagonal,

function groupLabel(n) {
  if (!Number.isFinite(n) || n < 6) return null;
  const groups = [];
  let rest = Math.round(n);
  const step = rest >= 9 ? 3 : 2;
  while (rest > step) {
    groups.push(step);
    rest -= step;
  }
  if (rest > 0) groups.push(rest);
  return groups.join(" + ") + " = " + Math.round(n);
}

function enhanceTask(task) {
  const method = methodForTopic(task.topicId);
  task.method = method;
  task.methodCard = method.title;
  task.methodIdea = method.idea;
  task.formulaDisplay = method.formula;
  task.formulaWords = method.formulaWords;

  // Визуальный лайфхак: на длинных горизонтальных отрезках показываем счёт группами.
  // Скобки появляются только в поздней подсказке/решении, чтобы не раскрывать числа сразу.
  const data = task.svgData;
  if (data && Array.isArray(data.elements)) {
    const candidateIds = new Set(["base", "base_a", "base_b", "ac_h", "legA", "legB", "d1h", "d2h", "proj_am", "proj_mb", "dx"]);
    const added = [];
    for (const el of data.elements) {
      if (el.type !== "line" || !el.from || !el.to) continue;
      if (!candidateIds.has(el.id)) continue;
      const [x1, y1] = el.from;
      const [x2, y2] = el.to;
      if (Math.abs(y1 - y2) > 1e-6) continue;
      const len = Math.abs(x2 - x1);
      const label = groupLabel(len);
      if (!label) continue;
      const from = x1 <= x2 ? el.from : el.to;
      const to = x1 <= x2 ? el.to : el.from;
      const id = `count_${el.id}`;
      if (data.elements.some((e) => e.id === id)) continue;
      added.push(E.bracket(id, from, to, label, { opacity: 0, drop: 8, highlightOpacity: 1 }));
      data.highlight3 = [...(data.highlight3 || []), id];
      data.highlightSolution = [...(data.highlightSolution || []), id];
    }
    if (added.length) {
      data.elements.push(...added);
      task.countingTip = "Лайфхак по клеткам: длинный отрезок не считай по одной клетке. Разбей его на группы: например, 3 + 3 + 3 + 1 = 10.";
    }
  }
  return task;
}

function generateTask(topicId, difficulty, seed) {
  const actualSeed = seed ?? Math.floor(Math.random() * 1e9);
  const rng = makeRng(actualSeed);
  const task = GENERATORS[topicId](difficulty, rng);
  task.id = `t${topicId}-${difficulty}-${actualSeed}`;
  task.seed = actualSeed;
  return enhanceTask(task);
}
function generateMixedTask(difficulty, seed) {
  const actualSeed = seed ?? Math.floor(Math.random() * 1e9);
  const rng = makeRng(actualSeed);
  const topicId = 1 + Math.floor(rng() * 13);
  const task = GENERATORS[topicId](difficulty, rng);
  task.id = `mixed-${topicId}-${difficulty}-${actualSeed}`;
  task.seed = actualSeed;
  return enhanceTask(task);
}

/* =========================================================================
   6. ДИАГНОСТИКА ОШИБОК
   ========================================================================= */

function diagnoseMistake(userValue, task) {
  if (userValue == null) {
    return { kind: "empty", message: "Введи число в поле ответа." };
  }
  // 1. Проверяем по списку commonMistakes (точное совпадение с допуском).
  for (const m of task.commonMistakes || []) {
    if (Math.abs(userValue - m.value) < 0.015) {
      return { kind: "matched", message: m.hint };
    }
  }
  // 2. Если ответ ровно вдвое больше/меньше — отдельный диагноз для площадей.
  if (Math.abs(userValue * 2 - task.answer) < 0.015) {
    return {
      kind: "guess",
      message: "Похоже, ответ в 2 раза меньше нужного. Проверь, не делил ли ты лишний раз на 2.",
    };
  }
  if (Math.abs(userValue / 2 - task.answer) < 0.015 && task.answer !== 0) {
    return {
      kind: "guess",
      message: "Похоже, ответ в 2 раза больше нужного. Проверь, не забыл ли разделить на 2.",
    };
  }
  // 3. Ответ — обратное число (для сравнения отрезков).
  if (task.answer > 1 && Math.abs(1 / userValue - task.answer) < 0.015) {
    return {
      kind: "guess",
      message: "Похоже, ты перевернул отношение. Когда спрашивают «во сколько раз длиннее/короче», ответ должен быть больше 1.",
    };
  }
  // 4. Ошибка в одну-две клетки.
  if (Math.abs(userValue - task.answer) < 2.05 && Math.abs(userValue - task.answer) > 0.02) {
    return {
      kind: "count",
      message: "Похоже, ты ошибся на 1–2 клетки при подсчёте. Попробуй посчитать ещё раз, разбивая длинный отрезок на группы по 2–3 клетки.",
    };
  }
  return {
    kind: "generic",
    message: "Ответ неверный. Не спеши: сначала назови, что ищем, потом отметь нужные элементы на рисунке и пересчитай клетки.",
  };
}

function loadJSON(key, fallback) {
  if (typeof window === "undefined") return fallback;
  try {

    if (!raw) return fallback;
    return JSON.parse(raw);
  } catch (e) {
