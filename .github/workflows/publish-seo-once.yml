name: Publish SEO once

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - name: Apply SEO changes
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const zlib = require('zlib');
          const canonicalPages = [["index.html","https://mathexam.space/"],["trainers/index.html","https://mathexam.space/trainers/"],["oge/index.html","https://mathexam.space/oge/"],["geometry-course/index.html","https://mathexam.space/geometry-course/"],["pedagogam/index.html","https://mathexam.space/pedagogam/"],["articles/index.html","https://mathexam.space/articles/"],["articles/pedagogicheskiy-webcoding/index.html","https://mathexam.space/articles/pedagogicheskiy-webcoding/"],["pedagogam/kak-skachat-i-adaptirovat-trenazher/index.html","https://mathexam.space/pedagogam/kak-skachat-i-adaptirovat-trenazher/"],["trainers/oge-1-5-trainers/index.html","https://mathexam.space/trainers/oge-1-5-trainers/"]];
          const sitemapEntries = JSON.parse(zlib.gunzipSync(Buffer.from('', 'base64')).toString('utf8'));
          for (const [file, url] of canonicalPages) {
            let html = fs.readFileSync(file, 'utf8');
            const tag = '<link rel="canonical" href="' + url + '">';
            if (/<link\s+[^>]*rel=["']canonical["'][^>]*>/i.test(html)) {
              html = html.replace(/<link\s+[^>]*rel=["']canonical["'][^>]*>/i, tag);
            } else {
              html = html.replace(/(<meta\s+name=["']description["'][^>]*>\r?\n)/i, '$1' + tag + '\n');
            }
            fs.writeFileSync(file, html, 'utf8');
          }
          fs.writeFileSync('robots.txt', 'User-agent: *\nAllow: /\n\nSitemap: https://mathexam.space/sitemap.xml\n', 'utf8');
          const lines = ['<?xml version="1.0" encoding="UTF-8"?>', '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">'];
          for (const entry of sitemapEntries) {
            lines.push('  <url>');
            lines.push('    <loc>' + entry.loc + '</loc>');
            lines.push('    <lastmod>' + entry.lastmod + '</lastmod>');
            lines.push('    <changefreq>' + entry.changefreq + '</changefreq>');
            lines.push('    <priority>' + entry.priority + '</priority>');
            lines.push('  </url>');
          }
          lines.push('</urlset>', '');
          fs.writeFileSync('sitemap.xml', lines.join('\n'), 'utf8');
          NODE

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch .github/workflows/publish-seo-once.yml
          git add robots.txt sitemap.xml index.html trainers/index.html oge/index.html geometry-course/index.html pedagogam/index.html articles/index.html articles/pedagogicheskiy-webcoding/index.html pedagogam/kak-skachat-i-adaptirovat-trenazher/index.html trainers/oge-1-5-trainers/index.html
          git commit -m "seo: add robots and sitemap"
          git push origin HEAD:main
