}

/* =========================================================================
   8. SELF-TESTS
   ========================================================================= */

function runSelfTests() {
  if (typeof console === "undefined") return;
  let passed = 0;
  let failed = 0;
  const errs = [];
  const check = (label, cond) => {
    if (cond) passed++;
    else {
      failed++;
      errs.push(label);
    }
  };

  // Каждая тема выдаёт задачу со всеми обязательными полями для всех уровней
  for (const t of TOPICS) {
    for (const d of ["easy", "medium", "hard"]) {
      try {
        const task = GENERATORS[t.id](d, makeRng(12345 + t.id * 11 + d.length));
        check(`T${t.id}/${d}: statement`, typeof task.statement === "string" && task.statement.length > 5);
        check(`T${t.id}/${d}: answer numeric`, typeof task.answer === "number" && Number.isFinite(task.answer));
        check(`T${t.id}/${d}: answerDisplay`, typeof task.answerDisplay === "string");
        check(`T${t.id}/${d}: 3 hints`, Array.isArray(task.hints) && task.hints.length === 3);
        check(`T${t.id}/${d}: solution`, Array.isArray(task.solutionSteps) && task.solutionSteps.length >= 2);
        check(`T${t.id}/${d}: svgData`, task.svgData && Array.isArray(task.svgData.elements) && task.svgData.elements.length > 0);
        check(`T${t.id}/${d}: cards`, !!task.skillCard && !!task.methodCard);
        check(`T${t.id}/${d}: mistakes`, Array.isArray(task.commonMistakes));
      } catch (e) {
        failed++;
        errs.push(`T${t.id}/${d}: THROWN ${e.message}`);
      }
    }
  }

  // Сверка формул на одном sample-е
  const t1 = GENERATORS[1]("easy", makeRng(1)); // S = d1*d2/2 → integer
  check("T1 answer integer", Number.isInteger(t1.answer));
  const t13 = GENERATORS[13]("easy", makeRng(2));
  check("T13 hypotenuse from triple", [5, 10, 13, 15, 17].includes(t13.answer));
  const t11 = GENERATORS[11]("easy", makeRng(3));
  check("T11 ratio is square of integer ratio", Number.isFinite(t11.answer) && t11.answer > 1);
  const s1 = generateTask(12, "medium", 98765);
  const s2 = generateTask(12, "medium", 98765);
  check("seeded generation is deterministic", JSON.stringify({ id: s1.id, answer: s1.answer, svgData: s1.svgData }) === JSON.stringify({ id: s2.id, answer: s2.answer, svgData: s2.svgData }));
  const t12DiagLines = s1.svgData.elements.filter((e) => e.id && (e.id.includes("aux_big") || e.id.includes("aux_small")));
  check("T12 has diagonal helper legs", t12DiagLines.length >= 4);

  // Проверка checkAnswer
  check("checkAnswer 1,5 == 1.5", eqAns(parseAnswer("1,5"), 1.5));
  check("checkAnswer space tolerated", eqAns(parseAnswer(" 2 "), 2));
  check("checkAnswer wrong rejected", !eqAns(parseAnswer("3"), 5));

  if (failed === 0) {
    console.log(`Geometry grid trainer ready · self-tests passed (${passed})`);
  } else {
    console.warn(`Geometry grid trainer · ${failed} self-tests failed`, errs);
  }
}

/* =========================================================================
   9. UI: МЕЛКИЕ КОМПОНЕНТЫ
   ========================================================================= */

function Pill({ active, accent, children, onClick }) {
  return (
    <span
      className={`ggt-pill ${active ? "active" : ""} ${accent ? "accent" : ""}`}
      onClick={onClick}
    >
      {children}
    </span>
  );
}

function Card({ children, tight, style }) {
  return (
    <div className={`ggt-card ${tight ? "ggt-card-tight" : ""}`} style={style}>
      {children}
    </div>
  );
}

function ProgressBar({ value, max }) {
  const pct = max === 0 ? 0 : Math.min(100, Math.round((value / max) * 100));
  return (
    <div className="ggt-progress-bar">
      <div className="ggt-progress-fill" style={{ width: `${pct}%` }} />
    </div>
  );
}

function PrettyText({ children }) {
  return <>{prettyText(children)}</>;
}

function FormulaBlock({ formula, words, compact }) {
  return (
    <div>
      <div className="ggt-formula-display" style={compact ? { fontSize: 14, padding: "7px 9px" } : undefined}>
        {prettyText(formula)}
      </div>
      {words && <div className="ggt-formula-words">{prettyText(words)}</div>}
    </div>
  );
}

function MethodCard({ method, compact }) {
  if (!method) return null;
  return (
    <div className={`ggt-method-card ${compact ? "compact" : ""}`}>
      <div className="ggt-method-title">{method.title}</div>
      <div className="ggt-method-idea">{method.idea}</div>
      <div className="ggt-method-look"><b>На рисунке:</b> {method.lookFor}</div>
      <FormulaBlock formula={method.formula} words={method.formulaWords} compact={compact} />
    </div>
  );
}

function RepairBox({ task, diagnosis }) {
  if (!diagnosis?.message) return null;
  let text = "Сделай маленький ремонт: открой следующую подсказку, заново отметь нужные отрезки на рисунке и только потом пересчитай.";
  const msg = diagnosis.message;
  if (msg.includes("забыл разделить") || msg.includes("2 раза больше")) {
    text = "Ремонт: сначала посчитай произведение нужных величин, а потом проверь, нужна ли половина. Для треугольника, трапеции и ромба деление на 2 часто обязательно.";
  } else if (msg.includes("дважды") || msg.includes("лишний раз")) {
    text = "Ремонт: найди место, где уже взял половину. Деление на 2 должно появиться только один раз.";
  } else if (msg.includes("радиусы") || msg.includes("квадрат")) {
    text = "Ремонт: для кругов не сравнивай сами радиусы. Запиши R^2 и r^2, потом раздели больший квадрат на меньший.";
  } else if (msg.includes("отношение") || msg.includes("перевернул")) {
    text = "Ремонт: сначала подпиши, какой отрезок больше. Затем дели больший на меньший — ответ на вопрос «во сколько раз» должен быть больше 1.";
  } else if (msg.includes("клет") || msg.includes("подсч")) {
    text = "Ремонт: пересчитай длинный отрезок группами по 2 или по 3 клетки. Не считай точки-узлы — считай промежутки между ними.";
  } else if (msg.includes("высот") || msg.includes("наклон")) {
    text = "Ремонт: высота всегда идёт под прямым углом к основанию. Наклонная сторона почти никогда не заменяет высоту.";
  }
  return <div className="ggt-repair"><b>Как исправить:</b> {text}</div>;
}

function FormulaPicker({ task, choice, onGoalChoose, onChoose, disabled }) {
  const correctOption = useMemo(() => methodForTopic(task.topicId), [task.topicId]);
  const correctGoal = correctOption.goal;
  const goalKey = choice?.goalKey;
  const goalOk = choice?.goalOk;

  const optionsForCard = useMemo(() => {
    if (!goalKey || !goalOk) return [];
    const seedRng = makeRng(hashSeed("method", task.id, goalKey));
    const sameGoal = FORMULA_OPTIONS.filter((o) => o.goal === goalKey && o.key !== correctOption.key);
    const shuffled = [...sameGoal].sort(() => seedRng() - 0.5).slice(0, 3);
    const all = [correctOption, ...shuffled];
    return all.sort(() => seedRng() - 0.5);
  }, [task.id, correctOption, goalKey, goalOk]);

  return (
    <Card>
      <h4>Смешанный режим · сначала распознаём задачу</h4>
      <div style={{ fontSize: 14, color: COL.inkSoft, lineHeight: 1.5 }}>
        Не начинай с формулы. Сначала реши: здесь ищут <b>длину</b>, <b>площадь</b> или <b>отношение «во сколько раз»</b>?
      </div>

      <div className="ggt-goal-grid">
        {GOAL_OPTIONS.map((g) => {
          const chosen = goalKey === g.key;
          const wrong = chosen && goalOk === false;
          return (
            <button
              key={g.key}
              className={`ggt-goal-btn ${chosen && goalOk ? "chosen" : ""} ${wrong ? "wrong" : ""}`}
              onClick={() => !disabled && onGoalChoose(g.key, g.key === correctGoal)}
              disabled={disabled}
            >
              <span className="big">{g.big}</span>
              <span className="small">{g.hint}</span>
            </button>
          );
        })}
      </div>

      {goalKey && goalOk === false && (
        <div className="ggt-feedback err" style={{ marginTop: 10 }}>
          <h4>Не туда смотрим</h4>
          <div className="body">Попробуй ещё раз: в условии просят длину, площадь фигуры или сравнение «во сколько раз»?</div>
        </div>
      )}

      {goalOk && (
        <div style={{ marginTop: 14 }}>
          <h4>Теперь выбери приём</h4>
          <div className="ggt-formula-grid">
            {optionsForCard.map((opt) => (
              <button
                key={opt.key}
                className={`ggt-method-choice ${choice?.key === opt.key ? "chosen" : ""}`}
                onClick={() => !disabled && onChoose(opt.key, opt.key === correctOption.key)}
                disabled={disabled}
              >
                <span className="label">{opt.label}</span>
                <span className="small">{opt.idea}</span>
                <span className="formula">{prettyText(opt.formula)}</span>
              </button>
            ))}
          </div>
        </div>
      )}
    </Card>
  );
}

/* =========================================================================
   10. UI: ОСНОВНОЕ ПРИЛОЖЕНИЕ
   ========================================================================= */

const MODES = [
  { key: "learn", label: "Учусь", desc: "Пошаговая поддержка, подсказки всегда видны." },
  { key: "practice", label: "Тренируюсь", desc: "Случайные задачи с подсказками по кнопке." },
  { key: "test", label: "Проверяю себя", desc: "10 задач подряд без подсказок." },
  { key: "mixed", label: "Смешанный", desc: "Задачи разных типов вперемешку — учимся распознавать тип." },
];
const DIFFS = [
  { key: "easy", label: "Лёгкий" },
  { key: "medium", label: "Средний" },
  { key: "hard", label: "Сложный" },
];

function App() {
  // Self-tests при первом рендере
  useEffect(() => {
    runSelfTests();
  }, []);

  // Состояние режимов / выбора
  const [mode, setMode] = useState("learn");
  const [topicId, setTopicId] = useState(1);
  const [diff, setDiff] = useState("easy");

  // Прогресс и журнал ошибок (с localStorage)
  const [progress, setProgress] = useState(() => loadJSON(STORAGE_KEY, {}));
  const [errorLog, setErrorLog] = useState(() => loadJSON(ERR_STORAGE_KEY, []));
  useEffect(() => saveJSON(STORAGE_KEY, progress), [progress]);
  useEffect(() => saveJSON(ERR_STORAGE_KEY, errorLog), [errorLog]);

  // Текущая задача и её состояние
  const [task, setTask] = useState(() => generateTask(1, "easy"));
  const [userAns, setUserAns] = useState("");
  const [feedback, setFeedback] = useState(null);
  const [hintsShown, setHintsShown] = useState(mode === "learn" ? 1 : 0);
  const [solutionShown, setSolutionShown] = useState(false);
  const [formulaChoice, setFormulaChoice] = useState(null); // для смешанного режима

  // Тест-сессия
  const [test, setTest] = useState(null); // {questions, idx, answers}

  // Счётчик текущей сессии (сбрасывается при перезагрузке страницы)
  const [session, setSession] = useState({ attempts: 0, correct: 0 });

  // Перегенерация задачи при изменении темы/сложности/режима
  useEffect(() => {
    if (mode === "test") return; // тест управляет задачами сам
    const t = mode === "mixed" ? generateMixedTask(diff) : generateTask(topicId, diff);
    setTask(t);
    setUserAns("");
    setFeedback(null);
    setHintsShown(mode === "learn" ? 1 : 0);
    setSolutionShown(false);
    setFormulaChoice(null);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [topicId, diff, mode]);

  const newTask = useCallback(() => {
    if (mode === "test") return;
    const t = mode === "mixed" ? generateMixedTask(diff) : generateTask(topicId, diff);
    setTask(t);
    setUserAns("");
    setFeedback(null);
    setHintsShown(mode === "learn" ? 1 : 0);
    setSolutionShown(false);
    setFormulaChoice(null);
  }, [mode, diff, topicId]);

  // Проверка ответа
  const checkCurrent = useCallback(() => {
    const { ok, parsed } = checkAnswer(userAns, task);
    if (parsed == null) {
      setFeedback({ ok: false, parsed: null, diag: diagnoseMistake(null, task) });
      return;
    }
    const diag = ok ? null : diagnoseMistake(parsed, task);
    setFeedback({ ok, parsed, diag });
    // Счётчик сессии (учитываем только первое нажатие "Проверить" на задаче)
    if (!feedback) {
      setSession((s) => ({ attempts: s.attempts + 1, correct: s.correct + (ok ? 1 : 0) }));
    } else if (!feedback.ok && ok) {
      // Дозасчитываем верный ответ после ошибки, но без учёта попытки
      setSession((s) => ({ ...s, correct: s.correct + 1 }));
    }
    // Учёт прогресса (вне теста): одну задачу считаем одной попыткой.
    // Если ребёнок исправил неверный ответ на верный — добавляем solved, но не увеличиваем attempts повторно.
    if (mode !== "test") {
      const firstAttempt = !feedback;
      const improvedToCorrect = feedback && !feedback.ok && ok;
      if (firstAttempt || improvedToCorrect) {
        setProgress((p) => {
          const cur = p[task.topicId] || { solved: 0, attempts: 0 };
          return {
            ...p,
            [task.topicId]: {
              solved: cur.solved + (ok ? 1 : 0),
              attempts: cur.attempts + (firstAttempt ? 1 : 0),
            },
          };
        });
      }
      if (!ok) {
        setErrorLog((log) => [
          {
            ts: Date.now(),
            topicId: task.topicId,
            topicTitle: task.topicTitle,
            statement: task.statement,
            userAnswer: parsed,
            correctAnswer: task.answer,
            diagnosis: diag?.message || "",
          },
          ...log,
        ].slice(0, 60));
      }
    }
  }, [userAns, task, mode, feedback]);

  /* === Тест-сессия === */
  const startTest = (kind /* 'topic' | 'mixed' */) => {
    const questions = [];
    for (let i = 0; i < 10; i++) {
      questions.push(
        kind === "mixed" ? generateMixedTask(diff) : generateTask(topicId, diff)
      );
    }
    setTest({ kind, questions, idx: 0, answers: [], userAns: "", finished: false });
    setUserAns("");
    setFeedback(null);
  };
  const submitTestAnswer = () => {
    if (!test) return;
    const t = test.questions[test.idx];
    const { ok, parsed } = checkAnswer(userAns, t);
    const diag = ok ? null : diagnoseMistake(parsed, t);
    const newAnswers = [...test.answers, { parsed, ok, diag, task: t }];
    if (test.idx + 1 >= test.questions.length) {
      // Завершение теста
      setTest({ ...test, answers: newAnswers, finished: true });
      // Учитываем все 10 задач в счётчике сессии
      const testCorrect = newAnswers.filter((a) => a.ok).length;
      setSession((s) => ({ attempts: s.attempts + newAnswers.length, correct: s.correct + testCorrect }));
      // Запишем ошибки в журнал
      newAnswers.forEach((a) => {
        if (!a.ok) {
          setErrorLog((log) => [
            {
              ts: Date.now(),
              topicId: a.task.topicId,
              topicTitle: a.task.topicTitle,
              statement: a.task.statement,
              userAnswer: a.parsed,
              correctAnswer: a.task.answer,
              diagnosis: a.diag?.message || "",
            },
            ...log,
          ].slice(0, 60));
        }
        setProgress((p) => {
          const cur = p[a.task.topicId] || { solved: 0, attempts: 0 };
          return {
            ...p,
            [a.task.topicId]: {
              solved: cur.solved + (a.ok ? 1 : 0),
              attempts: cur.attempts + 1,
            },
          };
        });
      });
    } else {
      setTest({ ...test, idx: test.idx + 1, answers: newAnswers });
      setUserAns("");
    }
  };
  const exitTest = () => {
    setTest(null);
    setUserAns("");
    setFeedback(null);
    newTask();
  };

  /* === Копирование отчёта === */
  const buildReport = () => {
    const totalAttempts = Object.values(progress).reduce((s, x) => s + x.attempts, 0);
    const totalSolved = Object.values(progress).reduce((s, x) => s + x.solved, 0);
    // Топ-проблемных тем
    const byTopic = TOPICS.map((t) => {
      const p = progress[t.id] || { solved: 0, attempts: 0 };
      const ratio = p.attempts > 0 ? p.solved / p.attempts : 1;
      return { ...t, ...p, ratio };
    })
      .filter((x) => x.attempts > 0)
      .sort((a, b) => a.ratio - b.ratio);

    const lines = [];
    lines.push("Отчёт по тренажёру «Геометрия на клетчатой бумаге».");
    lines.push("");
    lines.push(`Решено задач: ${totalAttempts}.`);
    lines.push(`Верно: ${totalSolved}.`);
    if (totalAttempts > 0) {
      lines.push(`Процент правильных: ${Math.round((totalSolved / totalAttempts) * 100)}%.`);
    }
    if (byTopic.length > 0 && byTopic[0].ratio < 1) {
      lines.push("");
      lines.push("Темы, которые стоит повторить:");
      byTopic
        .filter((x) => x.ratio < 0.7 || (x.attempts >= 2 && x.solved < x.attempts))
        .slice(0, 4)
        .forEach((x) => {
          lines.push(`— ${x.title}: ${x.solved} из ${x.attempts}.`);
        });
    }
    // Часто встречающиеся диагнозы (последние 15 ошибок)
    const recentDiag = errorLog.slice(0, 15).map((e) => e.diagnosis).filter(Boolean);
    if (recentDiag.length > 0) {
      lines.push("");
      lines.push("Типичные ошибки:");
      const uniq = [...new Set(recentDiag)].slice(0, 4);
      uniq.forEach((d) => lines.push(`— ${d}`));
    }
    return lines.join("\n");
  };

  const copyReport = async () => {
    const text = buildReport();
    try {
      await navigator.clipboard.writeText(text);
      alert("Отчёт скопирован.");
    } catch (e) {
      const win = window.open("", "_blank");
      if (win) {
        win.document.write("<pre style='font-family:ui-monospace,monospace;padding:20px'>" + text.replace(/</g, "&lt;") + "</pre>");
      } else {
        alert(text);
      }
    }
  };

  /* === Render === */
  return (
    <>
      <style>{STYLE_SHEET}</style>
      <div className="ggt-app">
        <div className="ggt-title-row">
          <h1 className="ggt-h1">Геометрия на клетчатой бумаге</h1>
          <span className="ggt-sub">сначала поймём рисунок, потом посчитаем</span>
        </div>
        <div className="ggt-tag">модуль 18 · интерактивный тренажёр</div>

        {/* Селекторы режима / сложности */}
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 18 }}>
          {MODES.map((m) => (
            <Pill key={m.key} active={mode === m.key} accent onClick={() => { setMode(m.key); setTest(null); }}>
              {m.label}
            </Pill>
          ))}
          <div style={{ flex: 1 }} />
          {DIFFS.map((d) => (
            <Pill key={d.key} active={diff === d.key} onClick={() => setDiff(d.key)}>
              {d.label}
            </Pill>
          ))}
        </div>

        <div className="ggt-layout">
          {/* === Боковая панель === */}
          <div className="ggt-side">
            <Card tight>
              <h4>Тема</h4>
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                {TOPICS.map((t) => (
                  <button
                    key={t.id}
                    onClick={() => { setTopicId(t.id); if (mode === "mixed") setMode("practice"); }}
                    style={{
                      background: topicId === t.id && mode !== "mixed" ? COL.ink : "transparent",
                      color: topicId === t.id && mode !== "mixed" ? COL.paper : COL.ink,
                      border: "none",
                      textAlign: "left",
                      padding: "8px 10px",
                      borderRadius: 6,
                      cursor: "pointer",
                      fontSize: 13.5,
                      fontFamily: "inherit",
                      opacity: mode === "mixed" ? 0.5 : 1,
                    }}
                  >
                    <span style={{ fontFamily: "JetBrains Mono, monospace", color: topicId === t.id && mode !== "mixed" ? COL.gold : COL.inkMute, marginRight: 6 }}>{t.id}.</span>
                    {t.title}
                  </button>
                ))}
              </div>
            </Card>

            <Card tight>
              <h4>Прогресс</h4>
              {session.attempts > 0 && (
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 10, padding: "6px 8px", background: COL.paperEdge, borderRadius: 6 }}>
                  <span style={{ color: COL.inkSoft }}>В этой сессии:</span>
                  <span className="ggt-num"><span style={{ color: COL.ok }}>{session.correct}</span> / {session.attempts}</span>
                </div>
              )}
              {Object.keys(progress).length === 0 && session.attempts === 0 && (
                <div style={{ fontSize: 13, color: COL.inkSoft }}>Пока нет решённых задач.</div>
              )}
              {TOPICS.map((t) => {
                const p = progress[t.id];
                if (!p) return null;
                return (
                  <div key={t.id} style={{ marginBottom: 8 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 3 }}>
                      <span style={{ color: COL.inkSoft }}>{t.title}</span>
                      <span className="ggt-num" style={{ fontSize: 12 }}>{p.solved}/{p.attempts}</span>
                    </div>
                    <ProgressBar value={p.solved} max={p.attempts} />
                  </div>
                );
              })}
              {Object.keys(progress).length > 0 && (
                <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}>
                  <button className="ggt-btn ghost" style={{ fontSize: 12, padding: "6px 10px" }} onClick={copyReport}>
                    Скопировать отчёт
                  </button>
                  <button
                    className="ggt-btn ghost"
                    style={{ fontSize: 12, padding: "6px 10px" }}
                    onClick={() => {
                      if (confirm("Сбросить весь прогресс и журнал ошибок?")) {
                        setProgress({});
                        setErrorLog([]);
                        setSession({ attempts: 0, correct: 0 });
                      }
                    }}
                  >
                    Сбросить прогресс
                  </button>
                </div>
              )}
            </Card>

            {errorLog.length > 0 && (
              <Card tight>
                <h4>Журнал ошибок</h4>
                <div style={{ maxHeight: 220, overflowY: "auto", marginRight: -8, paddingRight: 8 }}>
                  {errorLog.slice(0, 8).map((e, i) => (
                    <div key={i} className="ggt-error-row">
                      <div>
                        <div style={{ fontWeight: 600 }}>{e.topicTitle}</div>
                        <div style={{ color: COL.inkSoft, fontSize: 12 }}>Ответил: <span className="ggt-num">{fmt(e.userAnswer)}</span> · верно: <span className="ggt-num">{fmt(e.correctAnswer)}</span></div>
                        {e.diagnosis && <div className="diag" style={{ fontSize: 12 }}>{e.diagnosis}</div>}
                      </div>
                    </div>
                  ))}
                </div>
                <button className="ggt-btn ghost" style={{ marginTop: 6, fontSize: 12, padding: "6px 10px" }} onClick={() => { setErrorLog([]); }}>
                  Очистить журнал
                </button>
              </Card>
            )}
          </div>

          {/* === Основная панель === */}
          <div className="ggt-main">
            {mode === "test" && test == null && (
              <Card>
                <h3>Режим «Проверяю себя»</h3>
                <p style={{ color: COL.inkSoft, fontSize: 14, lineHeight: 1.55 }}>
                  Серия из 10 задач подряд. Подсказок не будет до самого конца. После завершения покажем разбор каждой задачи и темы, которые стоит повторить.
                </p>
                <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
                  <button className="ggt-btn" onClick={() => startTest("topic")}>
                    Начать тест по теме «{TOPICS[topicId - 1].title}»
                  </button>
                  <button className="ggt-btn secondary" onClick={() => startTest("mixed")}>
                    Тест смешанный
                  </button>
                </div>
              </Card>
            )}

            {mode === "test" && test != null && !test.finished && (
              <TestRunner
                test={test}
                userAns={userAns}
                setUserAns={setUserAns}
                onSubmit={submitTestAnswer}
                onExit={exitTest}
              />
            )}

            {mode === "test" && test != null && test.finished && (
              <TestResults test={test} onExit={exitTest} />
            )}

            {mode !== "test" && (
              <TaskView
                mode={mode}
                task={task}
                userAns={userAns}
                setUserAns={setUserAns}
                feedback={feedback}
                setFeedback={setFeedback}
                hintsShown={hintsShown}
                setHintsShown={setHintsShown}
                solutionShown={solutionShown}
                setSolutionShown={setSolutionShown}
                onCheck={checkCurrent}
                onNew={newTask}
                formulaChoice={formulaChoice}
                setFormulaChoice={setFormulaChoice}
              />
            )}
          </div>
        </div>
      </div>
    </>
  );
}

/* =========================================================================
   11. ОСНОВНОЙ ВИД ЗАДАЧИ
   ========================================================================= */

function TaskView({
  mode, task, userAns, setUserAns, feedback, setFeedback,
  hintsShown, setHintsShown, solutionShown, setSolutionShown,
  onCheck, onNew, formulaChoice, setFormulaChoice,
}) {
  const isMixed = mode === "mixed";
  const showHintsByDefault = mode === "learn";
  const method = methodForTopic(task.topicId);
  const [methodOpen, setMethodOpen] = useState(mode === "learn");

  useEffect(() => {
    setMethodOpen(mode === "learn");
  }, [task.id, mode]);

  // Подсветка SVG: до проверки — по hintsShown; после показа решения — все.
  const hintLevel = showHintsByDefault ? Math.max(1, hintsShown) : hintsShown;
  const methodVisible = mode === "learn" || methodOpen || solutionShown || feedback?.ok;

  const handleGoalChoose = useCallback(
    (goalKey, goalOk) => {
      setFormulaChoice({ goalKey, goalOk, key: null, isCorrect: false });
      if (feedback && !feedback.ok) setFeedback(null);
    },
    [feedback, setFeedback, setFormulaChoice]
  );

  const handleFormulaChoose = useCallback(
    (key, isCorrect) => {
      setFormulaChoice((prev) => ({ ...(prev || {}), key, isCorrect }));
      if (feedback && !feedback.ok) setFeedback(null);
    },
    [feedback, setFeedback, setFormulaChoice]
  );

  return (
    <>
      <Card tight>
        <div className="ggt-skill-grid">
          <div>
            <h4>Что я тренирую</h4>
            <div style={{ fontSize: 15, lineHeight: 1.55 }}><PrettyText>{task.skillCard}</PrettyText></div>
            <div className="ggt-toolbar-note">Главная привычка: сначала понять рисунок, потом считать.</div>
          </div>
          <div>
            <h4>Какой приём здесь нужен?</h4>
            {isMixed && !solutionShown && !feedback?.ok ? (
              <div className="ggt-method-hidden">В смешанном режиме сначала выбери это сам ниже.</div>
            ) : methodVisible ? (
              <MethodCard method={method} compact />
            ) : (
              <div className="ggt-method-hidden">
                <div>Попробуй сначала сам назвать приём. Это важнее, чем быстро подставить числа.</div>
                <button className="ggt-btn ghost" style={{ marginTop: 10 }} onClick={() => setMethodOpen(true)}>
                  Показать приём
                </button>
              </div>
            )}
          </div>
        </div>
      </Card>

      <Card>
        <div className="ggt-meta-strip">
          <span className="ggt-tag-chip warm">Тема {task.topicId}. {task.topicTitle}</span>
          <span className="ggt-tag-chip cool">Уровень: {DIFFS.find((d) => d.key === task.difficulty).label}</span>
          <span className="ggt-tag-chip"><span className="ggt-num">{task.svgData.cols}×{task.svgData.rows}</span> клеток</span>
        </div>
        <div className="ggt-statement"><PrettyText>{task.statement}</PrettyText></div>
        <div className="ggt-figure-wrap">
          <GridFigure data={task.svgData} hintLevel={hintLevel} showSolution={solutionShown} />
        </div>
        {task.countingTip && (hintsShown >= 2 || solutionShown || feedback?.ok) && (
          <div className="ggt-count-tip" style={{ marginTop: 10 }}>
            <b>Счёт клеток:</b> {task.countingTip}
          </div>
        )}
      </Card>

      {isMixed && (
        <FormulaPicker
          task={task}
          choice={formulaChoice}
          onGoalChoose={handleGoalChoose}
          onChoose={handleFormulaChoose}
          disabled={!!feedback?.ok || solutionShown}
        />
      )}
      {isMixed && formulaChoice?.key && !formulaChoice.isCorrect && (
        <div className="ggt-feedback err">
          <h4>Не тот приём</h4>
          <div className="body">
            Этот приём похож, но не подходит к рисунку. Спроси себя: какие элементы нужны — основания, высота, радиусы, проекции или похожие треугольники?
          </div>
        </div>
      )}
      {isMixed && formulaChoice?.isCorrect && !feedback && (
        <div className="ggt-feedback ok">
          <h4>Приём подходит</h4>
          <div className="body">Теперь спокойно посчитай нужные клетки и введи ответ.</div>
        </div>
      )}

      <Card>
        <h4>Шаг {isMixed ? 3 : 1}. Введи ответ</h4>
        <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap", marginTop: 8 }}>
          <input
            className={`ggt-input ${feedback ? (feedback.ok ? "ok" : "err") : ""}`}
            type="text"
            placeholder="?"
            value={userAns}
            onChange={(e) => setUserAns(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") onCheck(); }}
            disabled={!!feedback?.ok || solutionShown}
          />
          {!feedback?.ok && !solutionShown && (
            <button
              className="ggt-btn"
              onClick={onCheck}
              disabled={isMixed && !formulaChoice?.isCorrect}
            >
              Проверить
            </button>
          )}
          <button className="ggt-btn warm" onClick={onNew}>Новая задача</button>
          {!showHintsByDefault && !solutionShown && hintsShown < 3 && (
            <button className="ggt-btn secondary" onClick={() => setHintsShown((h) => Math.min(3, h + 1))}>
              {hintsShown === 0 ? "Подсказка" : `Подсказка ${hintsShown + 1}`}
            </button>
          )}
          {!solutionShown && (
            <button className="ggt-btn ghost" onClick={() => { setSolutionShown(true); setHintsShown(3); setMethodOpen(true); }}>
              Показать решение
            </button>
          )}
        </div>
        {isMixed && !formulaChoice?.isCorrect && (
          <div className="ggt-toolbar-note">В смешанном режиме ответ откроется после выбора подходящего приёма.</div>
        )}
      </Card>

      {feedback && (
        <div className={`ggt-feedback ${feedback.ok ? "ok" : "err"}`}>
          <h4>{feedback.ok ? "Верно!" : "Пока неверно"}</h4>
          <div className="body">
            {feedback.ok
              ? <>Ответ: <span className="ggt-num">{task.answerDisplay}</span>. <PrettyText>{task.checkIdea}</PrettyText></>
              : <PrettyText>{feedback.diag?.message}</PrettyText>}
          </div>
          {!feedback.ok && <RepairBox task={task} diagnosis={feedback.diag} />}
        </div>
      )}

      {(showHintsByDefault || hintsShown > 0) && !solutionShown && !feedback?.ok && (
        <Card tight>
          <h4>Подсказки</h4>
          {task.hints.slice(0, showHintsByDefault ? Math.max(1, hintsShown) : hintsShown).map((h, i) => (
            <div key={i} className="ggt-hint" style={{ marginBottom: 8 }}>
              <span className="num">{i + 1}.</span> <PrettyText>{h}</PrettyText>
            </div>
          ))}
          {task.countingTip && hintsShown >= 2 && (
            <div className="ggt-count-tip" style={{ marginBottom: 8 }}>
              <b>Чтобы не сбиться:</b> {task.countingTip}
            </div>
          )}
          {showHintsByDefault && hintsShown < 3 && (
            <button className="ggt-btn ghost" onClick={() => setHintsShown((h) => Math.min(3, h + 1))}>
              Открыть следующую подсказку
            </button>
          )}
        </Card>
      )}

      {(solutionShown || feedback?.ok) && (
        <Card>
          <h4>Разбор</h4>
          <MethodCard method={method} compact />
          <div style={{ marginTop: 10 }}>
            {task.solutionSteps.map((s, i) => (
              <div key={i} className="ggt-step">
                <span className="ggt-num" style={{ color: COL.accent2, marginRight: 8 }}>{i + 1}.</span>
                <PrettyText>{s}</PrettyText>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 10, fontSize: 13, color: COL.inkSoft, fontStyle: "italic" }}>
            Проверка смысла: <PrettyText>{task.checkIdea}</PrettyText>
          </div>
        </Card>
      )}
    </>
  );
}

/* =========================================================================
   12. ТЕСТ-СЕССИЯ
   ========================================================================= */

function TestRunner({ test, userAns, setUserAns, onSubmit, onExit }) {
  const t = test.questions[test.idx];
  return (
    <>
      <Card tight>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ fontSize: 14, color: COL.inkSoft }}>
            Задача <span className="ggt-num" style={{ color: COL.ink }}>{test.idx + 1}</span> из <span className="ggt-num">{test.questions.length}</span>
          </div>
          <button className="ggt-btn ghost" onClick={onExit}>Выйти</button>
        </div>
        <div style={{ marginTop: 8 }}>
          <ProgressBar value={test.idx} max={test.questions.length} />
        </div>
      </Card>

      <Card>
        <div className="ggt-meta-strip">
          <span className="ggt-tag-chip warm">Тема {t.topicId}. {t.topicTitle}</span>
        </div>
        <div className="ggt-statement"><PrettyText>{t.statement}</PrettyText></div>
        <div className="ggt-figure-wrap">
          <GridFigure data={t.svgData} hintLevel={0} />
        </div>
        <div style={{ display: "flex", gap: 10, alignItems: "center", marginTop: 12, flexWrap: "wrap" }}>
          <input
            className="ggt-input"
            type="text"
            placeholder="?"
            value={userAns}
            onChange={(e) => setUserAns(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") onSubmit(); }}
            autoFocus
          />
          <button className="ggt-btn" onClick={onSubmit}>
            {test.idx + 1 === test.questions.length ? "Завершить" : "Дальше →"}
          </button>
        </div>
      </Card>
    </>
  );
}

function TestResults({ test, onExit }) {
  const total = test.answers.length;
  const correct = test.answers.filter((a) => a.ok).length;
  const ratio = total === 0 ? 0 : correct / total;
  const verdict =
    ratio >= 0.9 ? "Отлично!" : ratio >= 0.7 ? "Хороший результат" : ratio >= 0.5 ? "Есть над чем поработать" : "Стоит повторить тему";
  const mistakesByTopic = {};
  test.answers.forEach((a) => {
    if (!a.ok) {
      const k = a.task.topicTitle;
      mistakesByTopic[k] = (mistakesByTopic[k] || 0) + 1;
    }
  });
  const sortedMistakes = Object.entries(mistakesByTopic).sort((a, b) => b[1] - a[1]);

  return (
    <>
      <Card>
        <h3>{verdict}</h3>
        <div style={{ fontSize: 17, marginTop: 4 }}>
          Верно решено: <span className="ggt-num" style={{ color: COL.ok, fontSize: 22, fontWeight: 700 }}>{correct}</span> <span style={{ color: COL.inkSoft }}>из {total}</span>
        </div>
        <div style={{ marginTop: 10 }}>
          <ProgressBar value={correct} max={total} />
        </div>
        {sortedMistakes.length > 0 && (
          <div style={{ marginTop: 14 }}>
            <h4>Темы с ошибками</h4>
            {sortedMistakes.map(([title, count]) => (
              <div key={title} style={{ fontSize: 14, marginBottom: 4 }}>
                <span style={{ color: COL.err }}>● </span>{title} — <span className="ggt-num">{count}</span> ошибки
              </div>
            ))}
          </div>
        )}
        <button className="ggt-btn warm" style={{ marginTop: 14 }} onClick={onExit}>К тренировке</button>
      </Card>

      <Card>
        <h3>Разбор каждой задачи</h3>
        {test.answers.map((a, i) => (
          <details key={i} style={{ borderBottom: `1px solid ${COL.cardEdge}`, paddingBottom: 4 }}>
            <summary>
              <span style={{ color: a.ok ? COL.ok : COL.err, marginRight: 8 }}>{a.ok ? "✓" : "✗"}</span>
              <span style={{ fontWeight: 600 }}>{i + 1}. {a.task.topicTitle}</span>
              <span style={{ marginLeft: 10, color: COL.inkSoft, fontSize: 13 }}>
                {a.ok ? `Ответ: ${a.task.answerDisplay}` : `Ты: ${fmt(a.parsed)} · верно: ${a.task.answerDisplay}`}
              </span>
            </summary>
            <div style={{ padding: "8px 4px 12px" }}>
              {!a.ok && a.diag?.message && (
                <div className="ggt-feedback err" style={{ marginBottom: 8 }}>
                  <div className="body"><PrettyText>{a.diag.message}</PrettyText></div>
                </div>
              )}
              <div className="ggt-figure-wrap" style={{ marginBottom: 8 }}>
                <GridFigure data={a.task.svgData} showSolution={true} />
              </div>
              {a.task.solutionSteps.map((s, k) => (
                <div key={k} className="ggt-step">
                  <span className="ggt-num" style={{ color: COL.accent2, marginRight: 8 }}>{k + 1}.</span>
                  {s}
                </div>
              ))}
            </div>
          </details>
        ))}
      </Card>
    </>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
