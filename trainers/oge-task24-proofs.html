<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ОГЭ · Задание 24 — задачи на доказательство</title>
<style>
:root{--bg:#e8e4db;--paper:#fffdf7;--ink:#1a1a2e;--blue:#2d70b3;--ok:#16a34a;--err:#dc2626;
--warn:#c2410c;--amber:#d97706;--pull:#7c3aed;--pink:#db2777;--teal:#0d9488;--line:#e7e1d2;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:var(--bg);color:var(--ink);line-height:1.5;padding:14px}
.app{max-width:1000px;margin:0 auto;background:var(--paper);border-radius:18px;
box-shadow:0 10px 34px rgba(26,26,46,.14);overflow:hidden}
.head{background:var(--ink);color:#f5f3ee;padding:16px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.head h1{font-size:18px;margin:0;font-weight:800;letter-spacing:.2px}
.head .sub{font-size:12.5px;opacity:.72;margin-top:2px}
.head .badge{margin-left:auto;background:rgba(255,255,255,.12);border-radius:999px;
padding:5px 13px;font-size:12.5px;font-weight:700}
.tabs{display:flex;gap:4px;padding:10px 14px 0;flex-wrap:wrap;background:var(--paper)}
.tab{border:none;background:#efeadf;color:#5b5647;font-weight:700;font-size:13.5px;
padding:9px 15px;border-radius:11px 11px 0 0;cursor:pointer}
.tab.on{background:var(--ink);color:#fff}
.wrap{padding:16px 20px 22px}
.success{display:none;background:#e8f6ec;border:1.5px solid var(--ok);color:#14682f;
border-radius:12px;padding:11px 14px;margin-bottom:14px;font-weight:700;font-size:14px}
.success.show{display:block}

/* --- меню разделов --- */
.menu{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.menu{grid-template-columns:1fr}}
.mcard{border:1.5px solid var(--line);border-radius:14px;padding:14px 15px;cursor:pointer;
background:#fffefb;transition:.12s;position:relative}
.mcard:hover{border-color:var(--blue);transform:translateY(-1px)}
.mcard h3{margin:0 0 4px;font-size:15px}
.mcard .cnt{font-size:12.5px;color:#7a7565}
.mcard .chips{margin-top:9px;display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:11.5px;background:#f0ece2;border-radius:999px;padding:3px 9px;color:#5b5647}
.chip.done{background:#dcf0e2;color:#14682f}
.lead{font-size:13.5px;color:#4a4636;margin:2px 0 16px}
.lead b{color:var(--ink)}

/* --- рабочая область задачи --- */
.taskhead{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.taskhead .tt{font-size:16px;font-weight:800}
.taskhead .code{font-size:11.5px;color:#8a8474;background:#f2eee4;border-radius:999px;padding:2px 9px}
.taskhead .pos{margin-left:auto;font-size:12.5px;color:#8a8474}
.grid{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(0,1fr);gap:18px;margin-top:12px}
@media(max-width:820px){.grid{grid-template-columns:1fr}}
.figbox{background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:8px}
.figbox svg{display:block;width:100%;height:auto}
.cap{min-height:20px;text-align:center;font-size:13px;color:#4a4636;margin:6px 6px 2px;font-weight:600}
.cap.done{color:var(--ok)}
.givens{background:#fffbeb;border:1.5px solid #fcd34d;border-radius:12px;padding:11px 13px;font-size:13.5px;margin-bottom:12px}
.givens .g1{margin-bottom:5px}.givens b{color:#7a4d09}
.aim{background:var(--ink);color:#fff;border-radius:11px;padding:9px 13px;font-size:14px;font-weight:700;margin-bottom:12px}
.aim.win{background:#14682f}
.chain{margin:0 0 12px;padding:0}
.citem{position:relative;padding:9px 12px 9px 40px;margin-bottom:7px;
border-radius:11px;background:#f4faf5;border:1.5px solid #cfe9d6;font-size:13.5px}
.citem .cnum{position:absolute;left:10px;top:9px;width:22px;height:22px;
border-radius:50%;background:var(--ok);color:#fff;font-size:12.5px;font-weight:800;
display:flex;align-items:center;justify-content:center}
.citem .why{display:block;margin-top:5px;font-size:12.5px;color:#4a6b52;line-height:1.5}
.pdiv{font-size:11.5px;font-weight:800;color:#5b5647;text-transform:uppercase;letter-spacing:.4px;
margin:10px 0 6px;padding-left:2px;border-left:3px solid var(--ok);padding-left:8px}
.phasehdr{background:#eef4fb;border:1.5px solid #cddff0;color:#215a8c;border-radius:10px;
padding:7px 12px;font-size:13px;font-weight:800;margin:2px 0 8px}
.phasedone{background:#e8f6ec;border:1.5px solid var(--ok);color:#14682f;border-radius:10px;
padding:6px 12px;font-size:12.5px;font-weight:700;margin-bottom:8px}
.qed{background:#14682f;color:#fff;border-radius:11px;padding:10px 13px;font-weight:700;font-size:14px;margin-bottom:12px;display:none}
.qed.show{display:block}
.pooltitle{font-size:12.5px;color:#8a8474;font-weight:700;margin:2px 0 8px;text-transform:uppercase;letter-spacing:.4px}
.poolhint{text-transform:none;letter-spacing:0;font-weight:600;color:#b08a3a;font-size:12px}
.hinthelp{font-size:12px;color:#7a7565;background:#f6f2e8;border-radius:9px;padding:7px 11px;margin:2px 0 8px;line-height:1.5}
.hinthelp b{color:#5b5647}
.pool{display:flex;flex-direction:column;gap:8px}
.justbox{background:#f4f0fb;border:1.6px solid #d3c2ee;border-radius:13px;padding:12px 13px;margin-bottom:10px}
.justclaim{font-size:14px;font-weight:700;color:#1a1a2e;display:flex;align-items:center;margin-bottom:8px}
.jnum{width:22px;height:22px;border-radius:50%;background:var(--ok);color:#fff;font-size:12.5px;font-weight:800;
display:inline-flex;align-items:center;justify-content:center;margin-right:8px;flex:none}
.justq{font-size:13px;color:#6b28c9;font-weight:700;margin-bottom:8px}
.justpool{display:flex;flex-direction:column;gap:7px}
.jchip{text-align:left;border:1.6px solid #cbb8ea;background:#fffefb;border-radius:10px;padding:9px 12px;
font-size:13.5px;cursor:pointer;transition:.1s;line-height:1.45}
.jchip:hover{border-color:var(--pull)}
.jchip.dead{background:#fbecec;border-color:#f0b6b6;color:#9a4a4a;cursor:default}
.jchip .jx{color:#b53838;font-weight:700;font-size:12px}
/* Справочник — карта листа */
.sheetwrap{position:relative;max-width:760px;margin:6px auto 12px;border:1.5px solid #d9d3c6;border-radius:12px;overflow:hidden;background:#fff}
.sheetimg{display:block;width:100%}
.szone{position:absolute;border:2.2px solid transparent;background:transparent;border-radius:7px;cursor:pointer;padding:0;transition:.12s}
.szone:hover{border-color:#2d70b3;background:rgba(45,112,179,.14)}
.szone.sel{border-color:#16a34a;background:rgba(22,163,74,.16)}
.szone.flash{animation:zflash 1.5s ease}
@keyframes zflash{0%,100%{background:transparent;border-color:transparent}30%,70%{background:rgba(217,119,6,.30);border-color:#d97706}}
.spin{position:absolute;top:-9px;right:-9px;min-width:19px;height:19px;border-radius:50%;background:#2d70b3;color:#fff;
font-size:11.5px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.zonedetail{background:#eef4fb;border:1.5px solid #cddff0;border-radius:11px;padding:11px 13px;font-size:13.5px;color:#25303a;margin-bottom:14px}
.zd-name{font-size:15px;margin-bottom:4px}
.zd-note{color:#4a5560;font-size:13px;margin-bottom:8px;line-height:1.5}
.zd-lab{color:#8a8474;font-weight:700;font-size:12.5px}
.tchip{display:inline-block;background:#fffefb;border:1.5px solid #cddff0;border-radius:8px;padding:4px 9px;margin:3px 4px 0 0;font-size:12.5px;cursor:pointer;transition:.1s}
.tchip:hover{border-color:#2d70b3;background:#eaf2fb}
.tchip.mini{padding:3px 8px;font-size:12px}
.notonsheet{background:#fdf3f0;border:1.6px solid #f0c9bd;border-radius:13px;padding:13px 15px}
.notonsheet h4{margin:0 0 4px;color:#b23a1a;font-size:15px}
.nos-sub{margin:0 0 10px;font-size:13px;color:#7a5548;line-height:1.5}
.nosrow{display:flex;flex-wrap:wrap;align-items:baseline;gap:6px;padding:7px 0;border-top:1px solid #f2d6cc}
.nosrow:first-of-type{border-top:none}
.nosg{flex:1 1 240px;font-size:13.5px;font-weight:600;color:#25303a}
.noschips{display:flex;flex-wrap:wrap}
.sheetplate{border-radius:10px;padding:8px 12px;font-size:13px;margin-bottom:10px;line-height:1.5}
.sheetplate.has{background:#eef7f0;border:1.5px solid #bfe3c8;color:#256b39}
.sheetplate.none{background:#f6f2e8;border:1.5px solid #e2d6bd;color:#7a6f54}
.sp-ic{margin-right:2px}
.sp-go{border:1.4px solid #2d70b3;background:#fff;color:#215a8c;border-radius:8px;padding:3px 9px;font-size:12px;cursor:pointer;margin-left:4px;font-weight:700}
.sp-go:hover{background:#eaf2fb}
.card{text-align:left;border:1.6px solid #d9d3c6;background:#fffefb;border-radius:11px;
padding:10px 12px;font-size:13.5px;cursor:pointer;transition:.1s;line-height:1.45}
.card:hover{border-color:var(--blue)}
.card.dead{background:#fbecec;border-color:#f0b6b6;color:#9a4a4a;cursor:pointer;position:relative}
.card.dead .dmsg{display:block;margin-top:6px;font-size:12px;color:#a33;line-height:1.45}
.card.early{border-color:#e0a0a0;background:#fdf4f4}
.card.hintglow{border-color:var(--amber);box-shadow:0 0 0 3px rgba(217,119,6,.18)}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.shake{animation:shake .34s}
.diag{display:none;background:#fbecec;border:1.5px solid #f0b6b6;color:#9a3b3b;border-radius:11px;
padding:9px 12px;font-size:13px;margin-bottom:10px}
.diag.show{display:block}
.bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.btn{border:none;border-radius:11px;padding:9px 15px;font-weight:700;font-size:13.5px;cursor:pointer}
.btn.ghost{background:#efeadf;color:#5b5647}
.btn.amber{background:#fef3e2;color:#9a5a09;border:1.5px solid #f2c98a}
.btn.pull{background:#f1e9fc;color:#6b28c9;border:1.5px solid #cbb0f0}
.btn.dark{background:var(--ink);color:#fff}
.btn.blue{background:var(--blue);color:#fff}
.btn:disabled{opacity:.45;cursor:default}
.law{background:#fffbeb;border:1.5px solid #fcd34d;border-radius:13px;padding:13px 15px;margin-top:6px;display:none}
.law.show{display:block}.law h4{margin:0 0 6px;color:#7a4d09;font-size:13px;text-transform:uppercase;letter-spacing:.4px}
.law p{margin:0;font-size:14px}
.blank{margin-top:8px;border:1.5px solid #cddff0;border-radius:12px;background:#f7fafd;overflow:hidden}
.blank summary{cursor:pointer;padding:10px 13px;font-weight:700;font-size:13.5px;color:#215a8c;list-style:none}
.blank summary::-webkit-details-marker{display:none}
.blank summary::before{content:'▸ ';color:#2d70b3}
.blank[open] summary::before{content:'▾ '}
.blanktext{padding:2px 15px 13px;font-size:13.5px;line-height:1.75;color:#25303a;font-family:Georgia,"Times New Roman",serif}

/* --- пульс подсветки --- */
@keyframes pul{0%,100%{opacity:.55}50%{opacity:1}}
.lit{animation:pul 1.1s ease-in-out infinite}

/* --- арсенал --- */
.arsgrp{margin-bottom:6px}
.arsgrp h3{font-size:13.5px;margin:16px 0 8px;color:#5b5647;border-bottom:1.5px solid var(--line);padding-bottom:5px}
.arscard{border:1.5px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:9px;background:#fffefb}
.arscard .an{font-weight:700;font-size:13.8px;display:flex;align-items:flex-start;gap:8px}
.arscard .tag{font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px;white-space:nowrap;margin-left:auto}
.tag.no{background:#fdeaea;color:#b53838}
.tag.yes{background:#e5f3ea;color:#1a7a3d}
.tag.part{background:#fef1e0;color:#9a5a09}
.arscard .anote{font-size:12.8px;color:#5b5647;margin-top:5px}
.arscard .chips{margin-top:8px}
.chip.jump{cursor:pointer;background:#e8f0f8;color:#215a8c}
.chip.jump:hover{background:#d5e6f4}
.arsnote{font-size:12.5px;color:#6b6555;background:#f6f2e8;border-radius:10px;padding:10px 12px;margin-bottom:8px}
.arsnote b{color:var(--ink)}

/* --- итоги зачёта --- */
.fin{text-align:center;padding:8px 0}
.fin .score{font-size:40px;font-weight:800;margin:6px 0}
.dots{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.dot{width:15px;height:15px;border-radius:50%}
.dot.g{background:var(--ok)}.dot.y{background:var(--amber)}.dot.r{background:var(--err)}
.route{text-align:left;background:#f6f2e8;border-radius:12px;padding:12px 14px;margin:14px 0;font-size:13.5px}
.route h4{margin:0 0 6px;font-size:13px}
.qbar{height:7px;background:#eee7d9;border-radius:6px;overflow:hidden;margin:10px 0}
.qbar>i{display:block;height:100%;background:var(--blue);width:0;transition:.25s}
.hidden{display:none!important}
.back{color:#c9c4b8;text-decoration:none;font-size:12.5px}
.back:hover{color:#fff}
</style>
</head>
<body>
<div class="app">
  <div class="head">
    <div>
      <h1>ОГЭ · Задание 24 — задачи на доказательство</h1>
      <div class="sub">20 типов · конструктор доказательства · собери цепочку и обходи ловушки</div>
    </div>
    <span class="badge" id="badge">Разбор</span>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="wrap">
    <div class="success" id="succ"></div>
    <div id="view"></div>
  </div>
</div>

 [2, 3, 4], "x": [0]}, {"name": "Итоговое подобие", "s": [5, 6], "x": [1]}], "law": "Основания двух высот и вершина тупого угла образуют треугольник, подобный исходному: угол при вершине — вертикальный, а стороны пропорциональны из пары подобных прямоугольных треугольников."}, {"id": "t15", "theme": "Подобие", "fig": "f15", "code": "подобие · касательная", "title": "Внутренняя касательная двух окружностей", "given": "Окружности с центрами <b>P</b> и <b>Q</b> не пересекаются и лежат вне друг друга. Внутренняя общая касательная касается их в точках <b>M</b> и <b>N</b> и делит отрезок центров: <b>PT : TQ = a : b</b>.", "prove": "Диаметры окружностей относятся как <b>a : b</b>.", "steps": [{"k": "s", "t": "PM ⊥ MN и QN ⊥ MN — радиус в точку касания перпендикулярен касательной.", "lit": {"seg": [["P", "M"], ["Q", "N"]], "ang": [["M", "P", "N"], ["N", "Q", "M"]]}, "why": "Свойство касательной: радиус, проведённый в точку касания, ей перпендикулярен.", "jc": "tang", "claim": "PM ⊥ MN и QN ⊥ MN"}, {"k": "s", "t": "Прямоугольные △PMT и △QNT: ∠PMT = ∠QNT = 90° и ∠PTM = ∠QTN (вертикальные) → △PMT ∼ △QNT.", "lit": {"poly": [["P", "M", "T"], ["Q", "N", "T"]], "ang": [["T", "P", "M"], ["T", "Q", "N"]]}, "why": "Касательная внутренняя, поэтому она пересекает PQ между окружностями — при T возникают вертикальные углы.", "jc": "aa", "claim": "△PMT ∼ △QNT"}, {"k": "s", "t": "Из подобия: PM / QN = PT / TQ = a : b.", "lit": {"seg": [["P", "M"], ["Q", "N"], ["P", "T"], ["T", "Q"]]}, "why": "Отношение радиусов равно отношению, в котором касательная делит линию центров."}, {"k": "s", "t": "Диаметры: 2·PM : 2·QN = PM : QN = a : b.", "lit": {"poly": [["P", "M", "T"], ["Q", "N", "T"]]}, "why": "Диаметр вдвое больше радиуса, множитель 2 сокращается — отношение диаметров такое же."}], "traps": [{"k": "x", "t": "PM ∥ QN, поэтому подобных треугольников нет.", "msg": "Это про ВНЕШнюю касательную. Внутренняя касательная пересекает отрезок PQ, и радиусы смотрят в разные стороны — треугольники подобны."}, {"k": "x", "t": "PM / QN = PT / TQ сразу, без прямых углов.", "msg": "Пропорция сторон следует из подобия треугольников, а оно опирается на прямые углы PM⊥MN, QN⊥MN. Их нельзя пропускать."}], "law": "Радиусы в точки касания перпендикулярны касательной, поэтому внутренняя касательная делит линию центров в отношении радиусов (а значит, и диаметров)."}, {"id": "t2", "theme": "Параллелограмм", "fig": "f2", "code": "равенство · параллелограмм", "title": "Прямая через точку пересечения диагоналей", "given": "В параллелограмме <b>ABCD</b> через точку <b>O</b> пересечения диагоналей проведена прямая, пересекающая <b>BC</b> в точке <b>K</b> и <b>AD</b> в точке <b>M</b>.", "prove": "Отрезки <b>BK</b> и <b>DM</b> равны.", "steps": [{"k": "s", "t": "BO = DO — диагонали параллелограмма точкой пересечения делятся пополам.", "lit": {"seg": [["B", "O"], ["D", "O"]], "pt": ["O"]}, "why": "Свойство параллелограмма: точка O — середина каждой диагонали.", "jc": "diagpar", "claim": "BO = DO"}, {"k": "s", "t": "∠KBO = ∠MDO — накрест лежащие при BC ∥ AD и секущей BD.", "lit": {"ang": [["B", "K", "O"], ["D", "M", "O"]], "seg": [["B", "C"], ["A", "D"]]}, "why": "BC ∥ AD как противоположные стороны параллелограмма; BD — секущая.", "jc": "alt", "claim": "∠KBO = ∠MDO"}, {"k": "s", "t": "∠BOK = ∠DOM — вертикальные углы.", "lit": {"ang": [["O", "B", "K"], ["O", "D", "M"]]}, "why": "Прямая KM и диагональ BD пересекаются в O, образуя вертикальные углы.", "jc": "vert", "claim": "∠BOK = ∠DOM"}, {"k": "s", "t": "△BOK = △DOM по стороне и двум прилежащим углам.", "lit": {"poly": [["B", "O", "K"], ["D", "O", "M"]]}, "why": "BO = DO и два прилежащих угла равны — второй признак равенства треугольников.", "jc": "asa", "claim": "△BOK = △DOM"}, {"k": "s", "t": "BK = DM — соответствующие стороны равных треугольников.", "lit": {"seg": [["B", "K"], ["D", "M"]]}, "why": "В равных треугольниках против равных элементов лежат равные стороны."}], "traps": [{"k": "x", "t": "BK = DM по симметрии параллелограмма.", "msg": "«По симметрии» — не доказательство. Нужно указать равные треугольники и признак."}, {"k": "x", "t": "△BOK = △DOM по двум сторонам (BO = DO, OK = OM).", "msg": "Равенство OK = OM само ещё не доказано — вышел бы круг. Используем сторону BO=DO и два прилежащих угла."}, {"k": "x", "t": "∠OBK = ∠ODM — как противоположные углы параллелограмма.", "msg": "Это накрест лежащие углы при секущей BD, а не углы параллелограмма. Причина другая."}], "phases": [{"name": "Собираем равные элементы", "s": [0, 1, 2], "x": [2]}, {"name": "Равные треугольники → вывод", "s": [3, 4], "x": [0, 1]}], "law": "Точка пересечения диагоналей делит любую проходящую через неё хорду параллелограмма пополам — это равенство равных треугольников по стороне и двум углам."}, {"id": "t3", "theme": "Параллелограмм", "fig": "f3", "code": "биссектриса · параллелограмм", "title": "Биссектрисы двух углов сходятся на стороне", "given": "Биссектрисы углов <b>C</b> и <b>D</b> параллелограмма <b>ABCD</b> пересекаются в точке <b>L</b>, лежащей на стороне <b>AB</b>.", "prove": "<b>L</b> — середина <b>AB</b>.", "steps": [{"k": "s", "t": "DL — биссектриса ∠ADC, значит ∠ADL = ∠LDC.", "lit": {"ang": [["D", "A", "L"], ["D", "L", "C"]], "seg": [["D", "L"]]}, "why": "По определению биссектрисы угол ADC делится пополам."}, {"k": "s", "t": "AB ∥ DC, секущая DL, значит ∠LDC = ∠DLA (накрест лежащие).", "lit": {"ang": [["D", "L", "C"], ["L", "D", "A"]], "seg": [["A", "B"], ["D", "C"]]}, "why": "L на прямой AB, а AB ∥ DC; DL — секущая.", "jc": "alt", "claim": "∠LDC = ∠DLA"}, {"k": "s", "t": "∠ADL = ∠DLA → △ADL равнобедренный → AL = AD.", "lit": {"poly": [["A", "D", "L"]], "tick": [["A", "L"], ["A", "D"]]}, "why": "Два угла треугольника ADL равны, значит против них — равные стороны AL и AD.", "jc": "isoc", "claim": "AL = AD"}, {"k": "s", "t": "Аналогично из биссектрисы ∠C: BL = BC.", "lit": {"poly": [["B", "C", "L"]], "tick": [["B", "L"], ["B", "C"]]}, "why": "Те же рассуждения для биссектрисы CL и стороны BL: треугольник BCL равнобедренный."}, {"k": "s", "t": "AD = BC (противоположные стороны параллелограмма), значит AL = BL — L середина AB.", "lit": {"seg": [["A", "L"], ["B", "L"]]}, "why": "AL = AD = BC = BL, поэтому L делит AB пополам."}], "traps": [{"k": "x", "t": "L — середина AB, так как биссектрисы симметричны.", "msg": "Это и есть то, что требуется доказать. Нельзя брать вывод за посылку."}, {"k": "x", "t": "∠ADL = ∠DLA — вертикальные углы.", "msg": "Они не вертикальные, а накрест лежащие при AB ∥ DC и секущей DL."}], "phases": [{"name": "Треугольник ADL равнобедренный", "s": [0, 1, 2], "x": [1]}, {"name": "Вторая сторона и вывод", "s": [3, 4], "x": [0]}], "law": "Биссектриса угла параллелограмма отсекает равнобедренный треугольник (угол = накрест лежащему). Отсюда AL = AD, BL = BC, а равные боковые стороны дают середину."}, {"id": "t4", "theme": "Параллелограмм", "fig": "f4", "code": "биссектриса · параллелограмм", "title": "Середина стороны, вдвое большей соседней", "given": "Сторона <b>AB</b> параллелограмма <b>ABCD</b> вдвое больше стороны <b>BC</b>. Точка <b>L</b> — середина <b>AB</b>.", "prove": "<b>CL</b> — биссектриса угла <b>BCD</b>.", "steps": [{"k": "s", "t": "L — середина AB, поэтому BL = AB/2 = BC.", "lit": {"seg": [["B", "L"], ["B", "C"]], "tick": [["B", "L"], ["B", "C"]]}, "why": "Дано AB = 2·BC, а BL = половина AB — значит BL = BC."}, {"k": "s", "t": "△BCL равнобедренный (BL = BC) → ∠BCL = ∠BLC.", "lit": {"poly": [["B", "C", "L"]], "ang": [["C", "B", "L"], ["L", "B", "C"]]}, "why": "В равнобедренном треугольнике углы при основании равны.", "jc": "isoc_ang", "claim": "∠BCL = ∠BLC"}, {"k": "s", "t": "AB ∥ CD, секущая CL, значит ∠BLC = ∠LCD (накрест лежащие).", "lit": {"ang": [["L", "B", "C"], ["C", "L", "D"]], "seg": [["A", "B"], ["C", "D"]]}, "why": "L на прямой AB, AB ∥ CD; CL — секущая.", "jc": "alt", "claim": "∠BLC = ∠LCD"}, {"k": "s", "t": "∠BCL = ∠BLC = ∠LCD → CL делит ∠BCD пополам.", "lit": {"ang": [["C", "B", "L"], ["C", "L", "D"]]}, "why": "Цепочка равенств замыкается: угол BCL равен углу LCD, то есть CL — биссектриса."}], "traps": [{"k": "x", "t": "△BCL равнобедренный, потому что BC = CL.", "msg": "Равенство BC = CL не дано и не доказано. Равны BL и BC (BL — половина AB = BC)."}, {"k": "x", "t": "CL — биссектриса, потому что L середина.", "msg": "Середина сама по себе биссектрисы не даёт. Нужен равнобедренный треугольник и накрест лежащие углы."}], "law": "Если сторона вдвое больше соседней, её середина «включает» равнобедренный треугольник, и отрезок к вершине оказывается биссектрисой (угол при основании = накрест лежащему)."}, {"id": "t5", "theme": "Параллелограмм", "fig": "f5", "code": "биссектрисы · трапеция", "title": "Точка, равноудалённая от трёх прямых", "given": "Биссектрисы углов <b>A</b> и <b>B</b> трапеции <b>ABCD</b> пересекаются в точке <b>K</b>, лежащей на стороне <b>CD</b>.", "prove": "Точка <b>K</b> равноудалена от прямых <b>AB</b>, <b>BC</b> и <b>AD</b>.", "steps": [{"k": "s", "t": "K лежит на биссектрисе угла A → K равноудалена от сторон AB и AD.", "lit": {"seg": [["A", "K"], ["K", "Had"], ["K", "Hab"]], "ang": [["A", "B", "K"]]}, "why": "Свойство биссектрисы угла: каждая её точка равноудалена от сторон угла (здесь от AB и AD).", "jc": "bisec", "claim": "K равноудалена от AB и AD"}, {"k": "s", "t": "K лежит на биссектрисе угла B → K равноудалена от сторон AB и BC.", "lit": {"seg": [["B", "K"], ["K", "Hbc"], ["K", "Hab"]], "ang": [["B", "A", "K"]]}, "why": "Та же теорема о биссектрисе для угла B: расстояния до AB и BC равны."}, {"k": "s", "t": "Значит, расстояния до AD, AB и BC равны между собой — K равноудалена от AB, BC и AD.", "lit": {"seg": [["K", "Had"], ["K", "Hab"], ["K", "Hbc"]], "tick": [["K", "Had"], ["K", "Hab"], ["K", "Hbc"]]}, "why": "Оба расстояния равны расстоянию до AB, а через него — и друг другу."}], "traps": [{"k": "x", "t": "K равноудалена и от прямой CD.", "msg": "Из данных это не следует: K на биссектрисах углов A и B, а не C и D. Про CD ничего не доказано."}, {"k": "x", "t": "K — середина CD, отсюда равные расстояния.", "msg": "Положение K на CD и равные расстояния — из свойства биссектрисы, а не из «середины». Середина здесь ни при чём."}], "law": "Точка на биссектрисе угла равноудалена от его сторон. Пересечение двух биссектрис равноудалено сразу от трёх прямых — общей стороны и двух других."}, {"id": "t7", "theme": "Площади", "fig": "f7", "code": "площади · параллелограмм", "title": "Точка внутри параллелограмма", "given": "Внутри параллелограмма <b>ABCD</b> выбрана точка <b>E</b>.", "prove": "Сумма площадей треугольников <b>BEC</b> и <b>AED</b> равна половине площади параллелограмма.", "steps": [{"k": "s", "t": "BC ∥ AD; пусть h — расстояние между ними (высота параллелограмма), BC = AD = a.", "lit": {"seg": [["B", "C"], ["A", "D"]], "poly": [["A", "B", "C", "D"]]}, "why": "Стороны BC и AD параллельны и равны — это основания обоих треугольников."}, {"k": "s", "t": "Пусть h₁ — расстояние от E до BC, h₂ — от E до AD. Точка E между прямыми, поэтому h₁ + h₂ = h.", "lit": {"pt": ["E"], "seg": [["B", "C"], ["A", "D"]]}, "why": "Высоты треугольников из общей точки E в сумме дают всю ширину полосы между BC и AD."}, {"k": "s", "t": "S(BEC) = ½·a·h₁, S(AED) = ½·a·h₂.", "lit": {"poly": [["B", "E", "C"], ["A", "E", "D"]]}, "why": "Площадь треугольника — половина произведения основания на высоту (эта формула есть на листе).", "jc": "area", "claim": "S(BEC) = ½·a·h₁"}, {"k": "s", "t": "Сумма = ½·a·(h₁+h₂) = ½·a·h = ½ S(параллелограмма).", "lit": {"poly": [["B", "E", "C"], ["A", "E", "D"]]}, "why": "a·h — площадь параллелограмма; половина от неё и есть искомая сумма. Ответ не зависит от положения E."}], "traps": [{"k": "x", "t": "h₁ + h₂ = 2h.", "msg": "Высоты складываются в одну ширину полосы между BC и AD, то есть h₁ + h₂ = h, а не 2h."}, {"k": "x", "t": "S(BEC) = ½·BE·EC.", "msg": "Это была бы формула через две стороны и угол. Здесь удобнее основание BC = a и высота h₁ от E."}], "law": "Для точки внутри параллелограмма высоты двух «противоположных» треугольников складываются в высоту фигуры, поэтому сумма их площадей — ровно половина площади параллелограмма при любом положении точки."}, {"id": "t6", "theme": "Площади", "fig": "f6", "code": "площади · трапеция", "title": "Точка на средней линии трапеции", "given": "На средней линии трапеции <b>ABCD</b> (основания <b>AD</b> и <b>BC</b>) выбрана точка <b>E</b>.", "prove": "Сумма площадей треугольников <b>BEC</b> и <b>AED</b> равна половине площади трапеции.", "steps": [{"k": "s", "t": "Средняя линия равноудалена от оснований: расстояние до BC и до AD равно h/2, где h — высота трапеции.", "lit": {"seg": [["m1", "m2"]]}, "why": "Средняя линия проходит посередине между основаниями — этот факт надо помнить, на листе его нет."}, {"k": "s", "t": "E — на средней линии, поэтому высота △BEC (из E к BC) и высота △AED (из E к AD) обе равны h/2.", "lit": {"pt": ["E"], "seg": [["B", "C"], ["A", "D"]]}, "why": "Расстояние от любой точки средней линии до каждого основания одно и то же — h/2."}, {"k": "s", "t": "S(BEC) = ½·BC·(h/2), S(AED) = ½·AD·(h/2).", "lit": {"poly": [["B", "E", "C"], ["A", "E", "D"]]}, "why": "Основания — BC и AD, высоты — по h/2.", "jc": "area", "claim": "S(BEC) = ½·BC·(h/2)"}, {"k": "s", "t": "Сумма = (BC + AD)·h/4 = ½·[(BC+AD)/2·h] = ½ S(трапеции).", "lit": {"poly": [["B", "E", "C"], ["A", "E", "D"]]}, "why": "½(BC+AD)·h — площадь трапеции; её половина и получается. От выбора точки E ответ не зависит."}], "traps": [{"k": "x", "t": "Высота от E до основания равна h.", "msg": "E на средней линии, а она посередине: расстояние до каждого основания h/2, а не h."}, {"k": "x", "t": "S(BEC) = ½·BC·h.", "msg": "Взята полная высота трапеции. Высота треугольника из точки средней линии — только h/2."}], "law": "Любая точка средней линии отстоит от обоих оснований на h/2, поэтому сумма площадей двух треугольников на основаниях равна половине площади трапеции."}, {"id": "t8", "theme": "Площади", "fig": "f8", "code": "площади · трапеция", "title": "Середина боковой стороны трапеции", "given": "Точка <b>E</b> — середина боковой стороны <b>AB</b> трапеции <b>ABCD</b> (основания <b>AD</b> и <b>BC</b>).", "prove": "Площадь треугольника <b>ECD</b> равна половине площади трапеции.", "steps": [{"k": "s", "t": "Отрезки EC и ED разбивают трапецию на три треугольника: AED, ECD и EBC.", "lit": {"seg": [["E", "C"], ["E", "D"]], "poly": [["A", "E", "D"], ["E", "C", "D"], ["E", "B", "C"]]}, "why": "S(трапеции) = S(AED) + S(ECD) + S(EBC). Найдём две «угловые» площади."}, {"k": "s", "t": "E — середина AB, поэтому расстояние от E до AD равно h/2 (A на AD, B на расстоянии h).", "lit": {"pt": ["E"], "seg": [["A", "D"]]}, "why": "Середина отрезка AB отстоит от прямой AD на среднее между 0 (в A) и h (в B), то есть на h/2."}, {"k": "s", "t": "Так же расстояние от E до BC равно h/2. Значит S(AED)=½·AD·(h/2), S(EBC)=½·BC·(h/2).", "lit": {"poly": [["A", "E", "D"], ["E", "B", "C"]], "seg": [["B", "C"]]}, "why": "Симметрично: E отстоит от BC тоже на h/2.", "jc": "area", "claim": "S(AED) = ½·AD·(h/2)"}, {"k": "s", "t": "S(AED)+S(EBC) = (AD+BC)·h/4 = ½ S(трапеции).", "lit": {"poly": [["A", "E", "D"], ["E", "B", "C"]]}, "why": "Сумма угловых треугольников — ровно половина площади трапеции."}, {"k": "s", "t": "S(ECD) = S(трапеции) − ½ S(трапеции) = ½ S(трапеции).", "lit": {"poly": [["E", "C", "D"]]}, "why": "Оставшийся средний треугольник забирает вторую половину площади."}], "traps": [{"k": "x", "t": "S(ECD) = ½·CD·h.", "msg": "CD — боковая сторона, а не основание с высотой h. Идём через разбиение на три треугольника."}, {"k": "x", "t": "Расстояние от E до AD равно h.", "msg": "E — середина бока: до AD расстояние h/2 (среднее между 0 и h), а не h."}], "law": "Середина боковой стороны отстоит от обоих оснований на h/2. Два угловых треугольника забирают половину площади, значит на средний треугольник ECD приходится ровно вторая половина."}, {"id": "t9", "theme": "Площади", "fig": "f9", "code": "площади · трапеция", "title": "Треугольники при диагоналях трапеции", "given": "В трапеции <b>ABCD</b> (основания <b>AD</b> и <b>BC</b>) диагонали пересекаются в точке <b>O</b>.", "prove": "Площади треугольников <b>AOB</b> и <b>COD</b> равны.", "steps": [{"k": "s", "t": "△ABD и △ACD имеют общее основание AD; вершины B и C лежат на прямой BC ∥ AD, поэтому высоты равны.", "lit": {"seg": [["A", "D"], ["B", "C"]], "poly": [["A", "B", "D"], ["A", "C", "D"]]}, "why": "Расстояние от B и от C до прямой AD одно и то же — это высота трапеции."}, {"k": "s", "t": "Значит S(ABD) = S(ACD) (равные основание и высота).", "lit": {"poly": [["A", "B", "D"], ["A", "C", "D"]]}, "why": "Площади треугольников с равными основанием и высотой равны.", "jc": "sameB", "claim": "S(ABD) = S(ACD)"}, {"k": "s", "t": "S(ABD) = S(AOB) + S(AOD); S(ACD) = S(COD) + S(AOD) — общий треугольник AOD.", "lit": {"poly": [["A", "O", "B"], ["C", "O", "D"], ["A", "O", "D"]], "pt": ["O"]}, "why": "Каждый из больших треугольников распадается на нужный и общий AOD."}, {"k": "s", "t": "Вычитаем общий S(AOD): S(AOB) = S(COD).", "lit": {"poly": [["A", "O", "B"], ["C", "O", "D"]]}, "why": "Из равных площадей отнимаем одну и ту же — получаем равенство искомых."}], "traps": [{"k": "x", "t": "△AOB = △COD — равные треугольники.", "msg": "Они равновелики (равны по площади), но не равны: у трапеции AD ≠ BC, поэтому эти треугольники разного размера."}, {"k": "x", "t": "S(AOB) = S(COD), потому что AO = OC.", "msg": "В трапеции O не делит диагонали пополам (это верно лишь для параллелограмма). Причина — общий треугольник AOD."}], "law": "Треугольники ABD и ACD равновелики (общее основание AD, равные высоты). Убрав общую часть AOD, получаем равные площади «боковых» треугольников AOB и COD."}, {"id": "t12", "theme": "Окружность", "fig": "f12", "code": "вписанные углы · высоты", "title": "Две высоты остроугольного треугольника", "given": "В остроугольном треугольнике <b>ABC</b> проведены высоты <b>AA₁</b> и <b>BB₁</b>.", "prove": "Углы <b>AA₁B₁</b> и <b>ABB₁</b> равны.", "steps": [{"k": "s", "t": "AA₁ ⊥ BC и BB₁ ⊥ AC, поэтому ∠AA₁B = 90° и ∠AB₁B = 90°.", "lit": {"ang": [["A1", "A", "B"], ["B1", "B", "A"]]}, "why": "Основания высот дают прямые углы у отрезка AB."}, {"k": "s", "t": "Точки A₁ и B₁ видят отрезок AB под прямым углом → лежат на окружности с диаметром AB.", "lit": {"pt": ["A1", "B1"], "seg": [["A", "B"]], "showcirc": 1}, "why": "Геометрическое место точек, из которых отрезок виден под 90°, — окружность с этим отрезком-диаметром. Значит A, B, A₁, B₁ на одной окружности.", "jc": "diamlocus", "claim": "A₁ и B₁ лежат на окружности с диаметром AB"}, {"k": "s", "t": "∠AA₁B₁ и ∠ABB₁ — вписанные, опираются на одну дугу AB₁ → равны.", "lit": {"ang": [["A1", "A", "B1"], ["B", "A", "B1"]]}, "why": "Вписанные углы, опирающиеся на одну и ту же дугу, равны.", "jc": "insc", "claim": "∠AA₁B₁ = ∠ABB₁"}], "traps": [{"k": "x", "t": "∠AA₁B₁ = ∠ABB₁, потому что треугольники AA₁B₁ и ABB₁ равны.", "msg": "Равенство этих треугольников не обосновано. Работает окружность с диаметром AB и вписанные углы."}, {"k": "x", "t": "Прямые углы ∠AA₁B и ∠AB₁B сразу дают равенство искомых углов.", "msg": "Сами по себе прямые углы равенства не дают. Нужен переход к окружности и вписанным углам."}], "law": "Основания двух высот и две вершины лежат на окружности с диаметром AB (прямой угол «видит» диаметр). Дальше работают вписанные углы на общую дугу."}, {"id": "t11", "theme": "Окружность", "fig": "f11", "code": "вписанные углы · четырёхугольник", "title": "Равные углы в выпуклом четырёхугольнике", "given": "В выпуклом четырёхугольнике <b>ABCD</b> углы <b>CDB</b> и <b>CAB</b> равны.", "prove": "Углы <b>BCA</b> и <b>BDA</b> тоже равны.", "steps": [{"k": "s", "t": "∠CAB = ∠CDB (дано): отрезок BC виден из точек A и D под равными углами, и A, D — по одну сторону от BC.", "lit": {"ang": [["A", "C", "B"], ["D", "C", "B"]], "seg": [["B", "C"]]}, "why": "Это условие «одинакового угла зрения» на отрезок BC из двух точек."}, {"k": "s", "t": "Значит, точки A, B, C, D лежат на одной окружности.", "lit": {"poly": [["A", "B", "C", "D"]], "showcirc": 1}, "why": "Если отрезок виден из двух точек (по одну сторону) под равными углами, эти точки лежат на одной окружности — обратная теорема о вписанном угле.", "jc": "insc_conv", "claim": "A, B, C, D лежат на одной окружности"}, {"k": "s", "t": "∠BCA и ∠BDA — вписанные, опираются на одну дугу AB → равны.", "lit": {"ang": [["C", "B", "A"], ["D", "B", "A"]]}, "why": "Теперь A, B, C, D на окружности; углы BCA и BDA опираются на дугу AB, значит равны.", "jc": "insc", "claim": "∠BCA = ∠BDA"}], "traps": [{"k": "x", "t": "Докажем равенство напрямую через равные треугольники.", "msg": "Подходящих равных треугольников здесь нет. Ключ — что четыре точки оказываются на одной окружности."}, {"k": "x", "t": "∠BCA = ∠BDA — вертикальные углы.", "msg": "Они не вертикальные. Равенство — из того, что углы вписанные и опираются на одну дугу."}], "law": "Равные углы, под которыми виден один отрезок из двух точек по одну сторону, означают, что все точки на одной окружности. А там уже работают вписанные углы на общую дугу."}, {"id": "t14", "theme": "Окружность", "fig": "f14", "code": "радиусы · окружности", "title": "Линия центров и общая хорда", "given": "Окружности с центрами <b>I</b> и <b>J</b> пересекаются в точках <b>A</b> и <b>B</b>; центры лежат по одну сторону от прямой <b>AB</b>.", "prove": "Прямые <b>AB</b> и <b>IJ</b> перпендикулярны.", "steps": [{"k": "s", "t": "IA = IB — радиусы окружности с центром I.", "lit": {"seg": [["I", "A"], ["I", "B"]], "tick": [["I", "A"], ["I", "B"]]}, "why": "A и B лежат на окружности с центром I, поэтому IA и IB — её радиусы."}, {"k": "s", "t": "JA = JB — радиусы окружности с центром J.", "lit": {"seg": [["J", "A"], ["J", "B"]], "tick": [["J", "A"], ["J", "B"]]}, "why": "A и B лежат и на окружности с центром J."}, {"k": "s", "t": "I и J равноудалены от A и B → оба лежат на серединном перпендикуляре к AB.", "lit": {"pt": ["I", "J"], "seg": [["A", "B"]]}, "why": "Точка, равноудалённая от концов отрезка, лежит на его серединном перпендикуляре.", "jc": "perpbis", "claim": "I и J лежат на серединном перпендикуляре к AB"}, {"k": "s", "t": "Через две точки проходит единственная прямая → IJ — серединный перпендикуляр к AB → IJ ⊥ AB.", "lit": {"seg": [["I", "J"], ["A", "B"]], "ang": [["X", "A", "I"]]}, "why": "Раз обе точки I и J на серединном перпендикуляре, то прямая IJ и есть он — значит перпендикулярна AB."}], "traps": [{"k": "x", "t": "IJ ⊥ AB, потому что I и J — центры окружностей.", "msg": "«Центры» сами по себе перпендикулярности не дают. Нужен серединный перпендикуляр к общей хорде."}, {"k": "x", "t": "AB = IJ.", "msg": "Никакого равенства длин здесь нет — речь только о перпендикулярности."}], "law": "Оба центра равноудалены от концов общей хорды, поэтому линия центров — это серединный перпендикуляр к хорде, а он ей перпендикулярен."}, {"id": "t16", "theme": "Правильные многоугольники", "fig": "f16", "code": "многоугольники · равные треугольники", "title": "Равносторонний треугольник в шестиугольнике", "given": "<b>ABCDEF</b> — правильный шестиугольник.", "prove": "Треугольник <b>ACE</b> — равносторонний.", "steps": [{"k": "s", "t": "У правильного шестиугольника все стороны равны, а все углы равны 120°: AB=BC=CD=DE=EF=FA и ∠B=∠D=∠F=120°.", "lit": {"poly": [["A", "B", "C", "D", "E", "F"]]}, "why": "Определение правильного многоугольника: равны все стороны и все углы. Угол правильного шестиугольника равен 180°·(6−2)/6 = 120°."}, {"k": "s", "t": "Треугольники ABC, CDE, EFA равны по двум сторонам и углу между ними (AB=CD=EF, BC=DE=FA, ∠B=∠D=∠F).", "lit": {"poly": [["A", "B", "C"], ["C", "D", "E"], ["E", "F", "A"]]}, "why": "Это три «угловых» треугольника, отсекаемых от шестиугольника. Первый признак равенства через равные стороны и угол 120° между ними.", "jc": "sas_eq", "claim": "△ABC = △CDE = △EFA"}, {"k": "s", "t": "Значит AC = CE = EA — соответственные стороны равных треугольников.", "lit": {"seg": [["A", "C"], ["C", "E"], ["E", "A"]]}, "why": "В равных треугольниках против равных углов лежат равные стороны."}, {"k": "s", "t": "Три стороны треугольника ACE равны → он равносторонний.", "lit": {"poly": [["A", "C", "E"]]}, "why": "Треугольник с тремя равными сторонами равносторонний по определению."}], "traps": [{"k": "x", "t": "△ACE равносторонний, потому что шестиугольник правильный.", "msg": "Правильность нужно использовать через равные треугольники ABC, CDE, EFA, а не ссылаться на неё голословно."}, {"k": "x", "t": "AC = CE = EA как диагонали правильного шестиугольника.", "msg": "Не все диагонали шестиугольника равны — есть короткие и длинные. Равенство именно этих трёх следует из равных треугольников."}], "law": "Вершины правильного шестиугольника «через одну» образуют равносторонний треугольник: три угловых треугольника равны по двум сторонам и углу 120°, значит равны и отсекаемые диагонали."}, {"id": "t17", "theme": "Правильные многоугольники", "fig": "f17", "code": "многоугольники · сторона и радиус", "title": "Большая диагональ вдвое больше стороны", "given": "<b>ABCDEF</b> — правильный шестиугольник с центром <b>O</b>.", "prove": "<b>AD</b> = 2·<b>AB</b>.", "steps": [{"k": "s", "t": "O — центр правильного шестиугольника; OA = OB = радиусы описанной окружности, а большая диагональ AD проходит через O.", "lit": {"pt": ["O"], "seg": [["O", "A"], ["O", "B"]]}, "why": "Правильный многоугольник вписан в окружность с центром в его центре; противоположные вершины соединяет диаметр."}, {"k": "s", "t": "Центральный угол ∠AOB = 360°/6 = 60°.", "lit": {"ang": [["O", "A", "B"]]}, "why": "Стороны правильного n-угольника видны из центра под углом 360°/n; для шестиугольника это 60°.", "jc": "central", "claim": "∠AOB = 60°"}, {"k": "s", "t": "Треугольник AOB: OA = OB и ∠AOB = 60° → равносторонний → AB = OA.", "lit": {"poly": [["A", "O", "B"]]}, "why": "Равнобедренный треугольник с углом 60° при вершине оказывается равносторонним, поэтому сторона шестиугольника равна радиусу."}, {"k": "s", "t": "AD = AO + OD; O — середина диагонали AD, поэтому OD = OA. Значит AD = 2·OA.", "lit": {"seg": [["A", "O"], ["O", "D"]]}, "why": "Большая диагональ состоит из двух радиусов, сходящихся в центре."}, {"k": "s", "t": "Итак, AD = 2·OA = 2·AB.", "lit": {"seg": [["A", "D"], ["A", "B"]]}, "why": "OA = AB (доказано выше), поэтому диагональ вдвое больше стороны."}], "traps": [{"k": "x", "t": "AD = 2·AB, потому что вершина D противоположна A.", "msg": "Противоположность вершин сама по себе длину не задаёт. Нужно, что сторона равна радиусу и что AD — это два радиуса."}, {"k": "x", "t": "AB = OA, потому что AB — это радиус.", "msg": "AB — сторона, а не радиус. Их равенство — следствие того, что треугольник AOB равносторонний (угол 60° при равных радиусах)."}], "phases": [{"name": "Сторона равна радиусу", "s": [0, 1, 2], "x": [1]}, {"name": "Диагональ — два радиуса", "s": [3, 4], "x": [0]}], "law": "В правильном шестиугольнике сторона равна радиусу описанной окружности (центральный треугольник равносторонний), поэтому большая диагональ равна двум радиусам — вдвое больше стороны."}, {"id": "t18", "theme": "Правильные многоугольники", "fig": "f18", "code": "многоугольники · прямоугольник", "title": "Прямоугольник на диагоналях шестиугольника", "given": "<b>ABCDEF</b> — правильный шестиугольник с центром <b>O</b>.", "prove": "Четырёхугольник <b>BCEF</b> — прямоугольник.", "steps": [{"k": "s", "t": "Шестиугольник вписан в окружность с центром O. Диагонали BE и CF — большие, каждая проходит через центр O, то есть является диаметром. Поэтому O — середина и BE, и CF.", "lit": {"seg": [["B", "E"], ["C", "F"]], "pt": ["O"]}, "why": "Большие диагонали правильного шестиугольника проходят через центр и являются диаметрами описанной окружности."}, {"k": "s", "t": "BE и CF — диаметры одной окружности → они равны: BE = CF.", "lit": {"seg": [["B", "E"], ["C", "F"]]}, "why": "Все диаметры одной окружности равны (по 2 радиуса)."}, {"k": "s", "t": "В четырёхугольнике BCEF диагонали BE и CF равны и точкой O делятся пополам.", "lit": {"poly": [["B", "C", "E", "F"]]}, "why": "BE и CF — именно диагонали четырёхугольника BCEF (соединяют противоположные вершины)."}, {"k": "s", "t": "Четырёхугольник, диагонали которого равны и делятся точкой пересечения пополам, — прямоугольник.", "lit": {"poly": [["B", "C", "E", "F"]]}, "why": "Признак прямоугольника: равные диагонали, делящиеся точкой пересечения пополам.", "jc": "rectdiag", "claim": "BCEF — прямоугольник"}], "traps": [{"k": "x", "t": "BCEF — прямоугольник, потому что у шестиугольника прямые углы.", "msg": "Углы правильного шестиугольника равны 120°, а не 90°. Прямые углы возникают в BCEF как следствие равных диагоналей, делящихся пополам."}, {"k": "x", "t": "Диагонали BCEF делятся пополам, значит BCEF — прямоугольник.", "msg": "Только деления пополам мало — так получается параллелограмм. Для прямоугольника нужно ещё равенство диагоналей."}], "law": "Две пары противоположных вершин правильного шестиугольника дают диагонали-диаметры: они равны и делятся центром пополам, поэтому четырёхугольник на них — прямоугольник."}, {"id": "t19", "theme": "Правильные многоугольники", "fig": "f19", "code": "многоугольники · угол на диаметре", "title": "Прямоугольный треугольник в шестиугольнике", "given": "<b>ABCDEF</b> — правильный шестиугольник с центром <b>O</b>.", "prove": "Треугольник <b>ABD</b> прямоугольный (∠<b>ABD</b> = 90°).", "steps": [{"k": "s", "t": "Шестиугольник вписан в окружность с центром O. Диагональ AD — большая, проходит через центр O, поэтому AD — диаметр этой окружности.", "lit": {"seg": [["A", "D"]], "pt": ["O"]}, "why": "Большая диагональ соединяет противоположные вершины и проходит через центр — это диаметр."}, {"k": "s", "t": "Вершина B лежит на той же окружности.", "lit": {"pt": ["B"]}, "why": "Все вершины правильного многоугольника лежат на описанной окружности."}, {"k": "s", "t": "Вписанный угол ∠ABD опирается на диаметр AD → ∠ABD = 90°.", "lit": {"ang": [["B", "A", "D"]]}, "why": "Вписанный угол, опирающийся на диаметр, — /* ================= SVG рендер ================= */
function P(fig,n){return fig.pts[n];}
function ptsStr(fig,names){return names.map(n=>{const p=P(fig,n);return p[0]+','+p[1];}).join(' ');}
function arcPath(V,A,B,r){
  const a1=Math.atan2(A[1]-V[1],A[0]-V[0]), a2=Math.atan2(B[1]-V[1],B[0]-V[0]);
  let d=a2-a1; while(d<=-Math.PI)d+=2*Math.PI; while(d>Math.PI)d-=2*Math.PI;
  const sw=d>0?1:0;
  const sx=V[0]+r*Math.cos(a1), sy=V[1]+r*Math.sin(a1);
  const ex=V[0]+r*Math.cos(a2), ey=V[1]+r*Math.sin(a2);
  return `M ${sx.toFixed(1)} ${sy.toFixed(1)} A ${r} ${r} 0 0 ${sw} ${ex.toFixed(1)} ${ey.toFixed(1)}`;
}
function rightMark(V,A,B,s){
  const u1=unit(V,A), u2=unit(V,B);
  const p1=[V[0]+s*u1[0],V[1]+s*u1[1]];
  const p2=[V[0]+s*(u1[0]+u2[0]),V[1]+s*(u1[1]+u2[1])];
  const p3=[V[0]+s*u2[0],V[1]+s*u2[1]];
  return `${p1[0].toFixed(1)},${p1[1].toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)} ${p3[0].toFixed(1)},${p3[1].toFixed(1)}`;
}
function unit(A,B){const dx=B[0]-A[0],dy=B[1]-A[1],L=Math.hypot(dx,dy)||1;return [dx/L,dy/L];}
function tickMarks(A,B,n,col){
  const mx=(A[0]+B[0])/2, my=(A[1]+B[1])/2;
  const u=unit(A,B), perp=[-u[1],u[0]]; let s='';
  const gap=5, len=6;
  for(let i=0;i<n;i++){
    const off=(i-(n-1)/2)*gap;
    const cx=mx+u[0]*off, cy=my+u[1]*off;
    s+=`<line x1="${(cx-perp[0]*len).toFixed(1)}" y1="${(cy-perp[1]*len).toFixed(1)}" x2="${(cx+perp[0]*len).toFixed(1)}" y2="${(cy+perp[1]*len).toFixed(1)}" stroke="${col}" stroke-width="2"/>`;
  }
  return s;
}
function renderFig(figName, lit, revealCirc){
  const fig=FIGS[figName]; const vb=fig.vb; let s='';
  s+=`<svg viewBox="0 0 ${vb[0]} ${vb[1]}" xmlns="http://www.w3.org/2000/svg">`;
  // окружности (постоянные)
  (fig.circ||[]).forEach(c=>{s+=`<circle cx="${c.c[0]}" cy="${c.c[1]}" r="${c.r}" fill="rgba(45,112,179,.04)" stroke="#8a8474" stroke-width="1.6"/>`;});
  // скрытая окружность-«озарение»
  if(revealCirc)(fig.circ_hidden||[]).forEach(c=>{s+=`<circle cx="${c.c[0]}" cy="${c.c[1]}" r="${c.r}" fill="none" stroke="${'#2d70b3'}" stroke-width="1.6" stroke-dasharray="6 5" class="lit"/>`;});
  // основные многоугольники
  (fig.poly||[]).forEach(pl=>{s+=`<polygon points="${ptsStr(fig,pl)}" fill="rgba(45,112,179,.055)" stroke="#1a1a2e" stroke-width="2"/>`;});
  // продолжения (пунктир)
  (fig.ext||[]).forEach(e=>{const A=P(fig,e[0]),B=P(fig,e[1]);s+=`<line x1="${A[0]}" y1="${A[1]}" x2="${B[0]}" y2="${B[1]}" stroke="#8a8474" stroke-width="1.6" stroke-dasharray="6 5"/>`;});
  // тонкие отрезки-расстояния (перпендикуляры)
  (fig.thin||[]).forEach(e=>{const A=P(fig,e[0]),B=P(fig,e[1]);s+=`<line x1="${A[0]}" y1="${A[1]}" x2="${B[0]}" y2="${B[1]}" stroke="#1a1a2e" stroke-width="1.4"/>`;});
  // базовые отрезки
  (fig.seg||[]).forEach(e=>{const A=P(fig,e[0]),B=P(fig,e[1]);
    const mid=(fig.segstyle&&fig.segstyle[e[0]+e[1]]==='mid');
    s+=`<line x1="${A[0]}" y1="${A[1]}" x2="${B[0]}" y2="${B[1]}" stroke="${mid?'#0d9488':'#1a1a2e'}" stroke-width="${mid?1.8:1.8}" ${mid?'stroke-dasharray="7 5"':''}/>`;});
  // метки равенства сторон (tick)
  (fig.tick||[]).forEach(tk=>{const A=P(fig,tk[0][0]),B=P(fig,tk[0][1]);s+=tickMarks(A,B,tk[1],'#1a1a2e');});
  // прямые углы
  (fig.right||[]).forEach(r=>{s+=`<polyline points="${rightMark(P(fig,r[0]),P(fig,r[1]),P(fig,r[2]),12)}" fill="none" stroke="#1a1a2e" stroke-width="1.6"/>`;});

  // ---- ПОДСВЕТКА текущего шага ----
  if(lit){
    (lit.showcirc?(fig.circ_hidden||[]):[]).forEach(()=>{}); // окружность уже показана через revealCirc
    (lit.seg||[]).forEach(e=>{const A=P(fig,e[0]),B=P(fig,e[1]);
      s+=`<line x1="${A[0]}" y1="${A[1]}" x2="${B[0]}" y2="${B[1]}" stroke="#2d70b3" stroke-width="4.4" stroke-linecap="round" class="lit"/>`;});
    (lit.tick||[]).forEach(e=>{const A=P(fig,e[0]),B=P(fig,e[1]);s+=tickMarks(A,B,1,'#2d70b3');});
    (lit.poly||[]).forEach(pl=>{s+=`<polygon points="${ptsStr(fig,pl)}" fill="rgba(45,112,179,.14)" stroke="#2d70b3" stroke-width="3" class="lit"/>`;});
    (lit.ang||[]).forEach((a,i)=>{const V=P(fig,a[0]),A=P(fig,a[1]),B=P(fig,a[2]);
      const r=20+i*7;
      s+=`<path d="${arcPath(V,A,B,r)}" fill="none" stroke="#d97706" stroke-width="3.4" stroke-linecap="round" class="lit"/>`;});
    (lit.pt||[]).forEach(n=>{const p=P(fig,n);s+=`<circle cx="${p[0]}" cy="${p[1]}" r="9" fill="none" stroke="#7c3aed" stroke-width="2.6" class="lit"/>`;});
  }
  // точки + подписи (верхним слоем)
  const drawPt=(n)=>{const p=P(fig,n);s+=`<circle cx="${p[0]}" cy="${p[1]}" r="3.8" fill="#1a1a2e"/>`;
    const off=(fig.lab&&fig.lab[n])||[8,-6];
    s+=`<text x="${(p[0]+off[0]).toFixed(1)}" y="${(p[1]+off[1]).toFixed(1)}" font-size="15" font-weight="800" fill="#1a1a2e" stroke="rgba(250,248,242,.92)" stroke-width="3.2" paint-order="stroke">${lbl(n)}</text>`;};
  // вершины многоугольников
  const shown=new Set();
  (fig.poly||[]).forEach(pl=>pl.forEach(n=>{if(!shown.has(n)){shown.add(n);}}));
  // центры и спец-точки
  (fig.circ||[]).forEach(()=>{});
  Object.keys(fig.pts).forEach(n=>{ if(n.length>2)return; // служебные (Hab,Had,Hbc,m1,m2,X) не подписываем
    if(!fig.lab||!(n in fig.lab)) return; shown.add(n);});
  shown.forEach(drawPt);
  s+='</svg>';
  return s;
}
function lbl(n){ // A1 -> A₁
  return n.replace(/([A-Z])1/,'$1₁');
}

let ST=null; // {mode, queue, qi, placed, dead:Set, err, hints, revealed, pool, solvedNow, results:[]}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function loadTask(){
  const t=byId[ST.queue[ST.qi]];
  ST.placed=0; ST.dead=new Set(); ST.early=new Set(); ST.err=0; ST.hints=0; ST.revealed=false; ST.solvedNow=false; ST.gaveUp=false; ST.phase=0; ST.awaitJust=null; ST.justPool=null; ST.justDead=new Set();
  const items=[];
  t.steps.forEach((_,i)=>items.push({type:'s',i}));
  t.traps.forEach((_,i)=>items.push({type:'x',i}));
  ST.pool=shuffle(items);
  rec({e:'task_start',task:t.id,mode:ST.mode});
  renderTask();
}
function curTask(){return byId[ST.queue[ST.qi]];}
function activeLit(){const t=curTask();return ST.placed>0?t.steps[ST.placed-1].lit:null;}
function phasesOf(t){ if(t.phases)return t.phases; return [{name:'',s:t.steps.map((_,i)=>i),x:t.traps.map((_,i)=>i)}]; }
function phaseOfStep(t,i){ const ph=phasesOf(t); for(let k=0;k<ph.length;k++) if(ph[k].s.indexOf(i)>=0) return k; return 0; }
function advancePhaseIfDone(){ // если все шаги текущей фазы поставлены и есть следующая — перейти
  const t=curTask(), phs=phasesOf(t);
  if(ST.placed>=t.steps.length) return false;
  const cur=phs[ST.phase];
  if(cur.s.every(si=>si<ST.placed) && ST.phase<phs.length-1){ ST.phase++; return true; }
  return false;
}

function pickCard(item){
  const t=curTask();
  if(ST.solvedNow)return;
  if(ST.awaitJust!=null)return; // идёт выбор обоснования
  if(item.type==='s'){
    if(item.i===ST.placed){
      const st=t.steps[item.i];
      if(ST.mode==='justify' && st.jc){ enterJust(item.i); renderTask(); return; } // сначала обоснование
      if(st.lit&&st.lit.showcirc)ST.revealed=true;
      ST.early.delete(item.i);
      ST.placed++;
      rec({e:'step',task:t.id,step:item.i});
      if(ST.placed===t.steps.length){ onSolved(); renderTask(); return; }
      if(advancePhaseIfDone()){ renderTask({phaseDone:true}); return; }
      renderTask();
    } else {
      const isNew=!ST.early.has(item.i);
      ST.early.add(item.i);
      if(isNew)ST.err++;
      rec({e:'early',task:t.id,step:item.i});
      renderTask({shakeKey:'s'+item.i, diag:'Этот шаг верный, но не сейчас — сначала предыдущий. Он помечен: выбери его щелчком, когда дойдёт очередь.'});
    }
  } else {
    const isNew=!ST.dead.has(item.i);
    ST.dead.add(item.i);
    if(isNew)ST.err++;
    rec({e:'distractor',task:t.id,pick:item.i});
    renderTask({shakeKey:'x'+item.i});
  }
}
function enterJust(i){
  const st=curTask().steps[i], bank=JUSTBANK[st.jc];
  ST.awaitJust=i;
  ST.justPool=shuffle([{ok:true,txt:bank.ok}].concat(bank.no.map(w=>({ok:false,txt:w}))));
  ST.justDead=new Set();
}
function pickJust(idx){
  if(ST.awaitJust==null||ST.solvedNow)return;
  const opt=ST.justPool[idx];
  if(opt.ok){ resolveJust(); }
  else { if(!ST.justDead.has(idx))ST.err++; ST.justDead.add(idx); rec({e:'just_wrong',task:curTask().id,step:ST.awaitJust,pick:idx}); renderTask({shakeJust:idx}); }
}
function resolveJust(){
  const t=curTask(), i=ST.awaitJust;
  ST.awaitJust=null; ST.justPool=null; ST.justDead=new Set();
  const st=t.steps[i];
  if(st.lit&&st.lit.showcirc)ST.revealed=true;
  ST.early.delete(i);
  ST.placed++;
  rec({e:'step',task:t.id,step:i});
  if(ST.placed===t.steps.length){ onSolved(); renderTask(); return; }
  if(advancePhaseIfDone()){ renderTask({phaseDone:true}); return; }
  renderTask();
}
function onSolved(){
  ST.solvedNow=true;
  markSolved(curTask().id);
  let grade='g';
  if(ST.gaveUp||ST.err>=2)grade='r';
  else if(ST.err>=1||ST.hints>=1)grade='y';
  ST.results.push({id:curTask().id,grade:grade});
  rec({e:'solved',task:curTask().id,mistakes:ST.err,hints:ST.hints,via:ST.gaveUp?'surrender':'self'});
}
function useHint(){
  if(ST.solvedNow)return;
  ST.hints++;
  if(ST.mode==='justify'&&ST.awaitJust!=null){ rec({e:'hint_just',task:curTask().id}); renderTask({hintJust:true}); return; }
  rec({e:'hint_glow',task:curTask().id,step:ST.placed});
  renderTask({hint:true});
}
function hintPlace(){
  if(ST.solvedNow)return;
  const t=curTask();
  if(ST.mode==='justify'&&ST.awaitJust!=null){ ST.hints++; resolveJust(); return; } // авто-обоснование
  const willFinish=(ST.placed===t.steps.length-1);
  const st=t.steps[ST.placed];
  ST.hints++;
  if(willFinish)ST.gaveUp=true;
  if(ST.mode==='justify'&&st.jc){ enterJust(ST.placed); renderTask(); return; } // сначала обоснование
  if(st.lit&&st.lit.showcirc)ST.revealed=true;
  ST.placed++;
  rec({e:'hint_place',task:t.id,step:ST.placed-1,last:willFinish});
  if(ST.placed===t.steps.length)onSolved();
  else advancePhaseIfDone();
  renderTask();
}
function surrender(){
  const t=curTask();
  ST.gaveUp=true; ST.awaitJust=null; ST.justPool=null;
  // достроить всё доказательство
  while(ST.placed<t.steps.length){const st=t.steps[ST.placed];if(st.lit&&st.lit.showcirc)ST.revealed=true;ST.placed++;}
  ST.phase=phasesOf(t).length-1;
  onSolved(); // gaveUp → красная оценка
  renderTask();
}
function nextTask(){
  ST.qi++;
  if(ST.qi>=ST.queue.length){ if(ST.mode==='exam') finishExam(); else backToMenu(); }
  else loadTask();
}

const view=()=>document.getElementById('view');
const badge=()=>document.getElementById('badge');

function renderTabs(){
  const tabs=[['study','Разбор'],['train','Тренировка'],['recall','По памяти'],['justify','Обоснуй'],['exam','Зачёт'],['sheet','Справочник'],['arsenal','Арсенал']];
  const el=document.getElementById('tabs');el.innerHTML='';
  tabs.forEach(([k,name])=>{const b=document.createElement('button');b.className='tab'+((ST&&ST.mode===k)||(!ST&&k==='study')?' on':'');
    b.textContent=name;b.onclick=()=>switchMode(k);el.appendChild(b);});
}
function switchMode(k){
  document.getElementById('succ').className='success';
  if(k==='sheet'){ST={mode:'sheet'};badge().textContent='Справочник';renderTabs();renderSheet();return;}
  if(k==='arsenal'){ST={mode:'arsenal'};badge().textContent='Арсенал';renderTabs();renderArsenal();return;}
  ST={mode:k,results:[]};
  badge().textContent={study:'Разбор',train:'Тренировка',recall:'По памяти',justify:'Обоснуй',exam:'Зачёт'}[k];
  renderTabs();
  if(k==='study')menuStudy();
  else if(k==='train')menuTrain();
  else if(k==='recall')menuRecall();
  else if(k==='justify')menuJustify();
  else menuExam();
}
function backToMenu(){
  if(ST.mode==='study')menuStudy();
  else if(ST.mode==='train')menuTrain();
  else if(ST.mode==='recall')menuRecall();
  else if(ST.mode==='justify')menuJustify();
  else menuExam();
}

/* --- меню Зачёт --- */
function menuExam(){
  ST.results=[];
  let h='<p class="lead">Зачёт: по одной задаче из каждой темы (квота по темам, а не случайно), режим экзамена — <b>без подсказок</b>. Каждый неверный клик — промах. В конце — счёт, «светофор» и маршрут повторения слабых мест.</p>';
  // топ слабых мест по журналу
  const weak=weakTop();
  if(weak.length){h+=`<div class="arsnote"><b>Твои слабые места</b> (по прошлым прогонам): ${weak.map(w=>byId[w].title).join(' · ')}. В зачёте они попадутся в первую очередь.</div>`;}
  h+=`<div class="menu"><div class="mcard" onclick="startExam()"><h3>Начать зачёт · 4 задачи</h3><div class="cnt">по одной из каждой темы</div></div></div>`;
  view().innerHTML=h;
}
function weakTop(){
  const ev=(STORE[TID].events||[]).filter(e=>e.e==='solved');
  const score={};
  ev.forEach(e=>{score[e.task]=(score[e.task]||0)+(e.mistakes||0)+(e.hints||0)+(e.via==='surrender'?3:0);});
  return Object.keys(score).filter(k=>score[k]>0).sort((a,b)=>score[b]-score[a]).slice(0,3);
}
function startExam(){
  const weak=new Set(weakTop());
  const q=THEMES.map(th=>{
    const w=th.tasks.filter(id=>weak.has(id));
    const pickFrom=w.length?w:th.tasks;
    return pickFrom[Math.floor(Math.random()*pickFrom.length)];
  });
  ST={mode:'exam',queue:q,qi:0,results:[]};
  STORE[TID].runs=(STORE[TID].runs||0)+1;saveStore(STORE);
  rec({e:'start',mode:'exam'});
  loadTask();
}
function finishExam(){
  const total=ST.results.length;
  const good=ST.results.filter(r=>r.grade==='g').length;
  const score=ST.results.reduce((a,r)=>a+(r.grade==='g'?1:r.grade==='y'?0.5:0),0);
  const pct=Math.round(score/total*100);
  STORE[TID].best=Math.max(STORE[TID].best||0,pct);
  STORE[TID].passed=true; saveStore(STORE);
  rec({e:'finish',score:pct});
  const succ=document.getElementById('succ');succ.className='success show';
  succ.textContent=`Зачёт пройден. Результат: ${pct}% (${good} из ${total} без промахов).`;
  const weakIds=ST.results.filter(r=>r.grade!=='g').map(r=>r.id);
  let h='<div class="fin"><div style="font-size:14px;color:#8a8474">Итог зачёта</div>';
  h+=`<div class="score">${pct}%</div><div class="dots">${ST.results.map(r=>`<span class="dot ${r.grade}"></span>`).join('')}</div>`;
  h+=`<div style="font-size:12.5px;color:#8a8474">🟢 без промахов · 🟠 с подсказкой/1 промахом · 🔴 больше промахов${STORE[TID].best?` · рекорд ${STORE[TID].best}%`:''}</div>`;
  if(weakIds.length){h+=`<div class="route"><h4>Что повторить</h4>${weakIds.map(id=>`• ${byId[id].title} <span class="chip jump" onclick="switchMode('study');setTimeout(()=>startStudy('${id}'),0)">разобрать →</span>`).join('<br>')}</div>`;}
  else{h+='<div class="route"><h4>Чисто!</h4>Все доказательства собраны без единого промаха. Можно идти на настоящий экзамен.</div>';}
  h+=`<div class="bar" style="justify-content:center"><button class="btn dark" onclick="switchMode('exam')">Пройти ещё раз</button></div></div>`;
  view().innerHTML=h;
}

/* --- экран задачи --- */
function renderTask(opts){
  opts=opts||{};
  const t=curTask();
  const lit=activeLit();
  const phs=phasesOf(t);
  const showWhy=(ST.mode!=='exam'||ST.solvedNow);
  const h=[];
  // заголовок
  h.push(`<div class="taskhead"><span class="tt">${t.title}</span><span class="code">${t.code}</span>`);
  if(ST.queue.length>1)h.push(`<span class="pos">${ST.qi+1} / ${ST.queue.length}</span>`);
  h.push('</div>');
  h.push('<div class="grid">');
  // левая колонка — чертёж
  h.push('<div><div class="figbox">'+renderFig(t.fig,lit,ST.revealed)+'</div>');
  const capText = ST.solvedNow?'▮ Что и требовалось доказать':(ST.placed>0?stripTags(t.steps[ST.placed-1].t):'Собери доказательство по шагам →');
  h.push(`<div class="cap${ST.solvedNow?' done':''}">${capText}</div></div>`);
  // правая колонка
  h.push('<div>');
  h.push(`<div class="givens"><div class="g1"><b>Дано.</b> ${t.given}</div><div><b>Доказать.</b> ${t.prove}</div></div>`);
  if(ST.mode!=='exam'){
    const tz=SHEET.zones.filter(z=>z.tasks.indexOf(t.id)>=0);
    if(tz.length)h.push(`<div class="sheetplate has"><span class="sp-ic">📋</span> С листа справочных материалов: ${tz.map(z=>'<b>'+z.formula+'</b>').join(', ')} <button class="sp-go" onclick="openSheetZone('${tz[0].id}')">показать на листе →</button></div>`);
    else h.push('<div class="sheetplate none"><span class="sp-ic">📋</span> На листе для этой задачи ничего нет — все теоремы держим в голове.</div>');
  }
  h.push(`<div class="aim${ST.solvedNow?' win':''}">${ST.solvedNow?'Доказано ✓':'Доказываем: '+stripTags(t.prove)}</div>`);
  // цепочка собранного (с разделителями фаз)
  if(ST.placed>0){h.push('<div class="chain">');
    let shp=-1;
    for(let i=0;i<ST.placed;i++){
      if(phs.length>1){const pk=phaseOfStep(t,i); if(pk!==shp){shp=pk; if(phs[pk].name)h.push(`<div class="pdiv">${phs[pk].name}</div>`);}}
      h.push(`<div class="citem"><span class="cnum">${i+1}</span><div class="ctext">${t.steps[i].t}${showWhy?`<span class="why">${t.steps[i].why}</span>`:''}</div></div>`);
    }
    h.push('</div>');}
  // диагностика (при промахе)
  if(opts.diag)h.push(`<div class="diag show">${opts.diag}</div>`);
  // qed
  if(ST.solvedNow)h.push('<div class="qed show">▮ Доказательство собрано полностью.</div>');
  // подшаг обоснования (режим «Обоснуй»)
  if(!ST.solvedNow && ST.mode==='justify' && ST.awaitJust!=null){
    const st=t.steps[ST.awaitJust];
    h.push('<div class="justbox">');
    h.push(`<div class="justclaim"><span class="jnum">${ST.awaitJust+1}</span>${st.claim||claimOf(st.t)}</div>`);
    h.push('<div class="justq">Почему это верно? Выбери обоснование:</div><div class="justpool">');
    ST.justPool.forEach((o,idx)=>{
      const dead=ST.justDead.has(idx);
      const shakeCls=(opts.shakeJust===idx)?' shake':'';
      const glow=(opts.hintJust&&o.ok)?' hintglow':'';
      h.push(`<button class="jchip${dead?' dead':''}${shakeCls}${glow}" ${dead?'':`onclick="pickJust(${idx})"`}>${o.txt}${dead?' <span class="jx">✗ не то</span>':''}</button>`);
    });
    h.push('</div></div>');
  }
  // пул карточек (только текущая фаза)
  else if(!ST.solvedNow){
    const cur=phs[ST.phase];
    if(opts.phaseDone)h.push('<div class="phasedone">✓ Фаза пройдена — продолжаем</div>');
    if(phs.length>1)h.push(`<div class="phasehdr">Фаза ${ST.phase+1} из ${phs.length}${cur.name?' · '+cur.name:''}</div>`);
    h.push('<div class="pooltitle">Карточки — выбирай по порядку <span class="poolhint">среди них есть лишние — их не бери</span></div><div class="pool">');
    ST.pool.forEach(item=>{
      const inPhase=(item.type==='s')?cur.s.indexOf(item.i)>=0:cur.x.indexOf(item.i)>=0;
      if(!inPhase)return;
      if(item.type==='s'){
        if(item.i<ST.placed)return; // уже поставлен
        const st=t.steps[item.i];
        const shakeCls=(opts.shakeKey==='s'+item.i)?' shake':'';
        const glow=(opts.hint&&item.i===ST.placed)?' hintglow':'';
        const earlyCls=(ST.early.has(item.i)&&item.i>ST.placed)?' early':'';
        const label=(ST.mode==='recall'||ST.mode==='justify')?(st.claim||claimOf(st.t)):st.t;
        h.push(`<button class="card${earlyCls}${shakeCls}${glow}" onclick="pickCard({type:'s',i:${item.i}})">${label}</button>`);
      } else {
        const tr=t.traps[item.i];
        const dead=ST.dead.has(item.i);
        const shakeCls=(opts.shakeKey==='x'+item.i)?' shake':'';
        h.push(`<button class="card${dead?' dead':''}${shakeCls}" onclick="pickCard({type:'x',i:${item.i}})">${tr.t}${dead?`<span class="dmsg">✗ ${tr.msg}</span>`:''}</button>`);
      }
    });
    h.push('</div>');
  }
  // закон + управление
  if(ST.solvedNow){
    h.push(`<div class="law show"><h4>Приём этого типа</h4><p>${t.law}</p></div>`);
    h.push(`<details class="blank"><summary>📝 Как это записать на бланке ОГЭ</summary><div class="blanktext">${genBlank(t)}</div></details>`);
  }
  if(!ST.solvedNow && ST.mode!=='exam')h.push('<div class="hinthelp">🪜 <b>Подсказать</b> — подсветит нужную карточку · ⬇ <b>Поставить шаг</b> — поставит её за тебя</div>');
  h.push('<div class="bar">');
  if(!ST.solvedNow){
    if(ST.mode!=='exam'){h.push('<button class="btn amber" onclick="useHint()">🪜 Подсказать</button>');
      h.push('<button class="btn pull" onclick="hintPlace()">⬇ Поставить шаг</button>');
      h.push('<button class="btn ghost" onclick="surrender()">Сдаюсь — доказательство</button>');}
    h.push('<button class="btn ghost" onclick="restartTask()">↺ Сначала</button>');
  }else{
    if(ST.mode==='exam'){h.push('<button class="btn dark" onclick="nextTask()">'+(ST.qi+1<ST.queue.length?'Следующая →':'Итоги зачёта →')+'</button>');}
    else{
      if(ST.qi+1<ST.queue.length)h.push('<button class="btn dark" onclick="nextTask()">Следующая →</button>');
      h.push('<button class="btn blue" onclick="trainThis()">Тренировать этот тип →</button>');
      h.push('<button class="btn ghost" onclick="backToMenu()">← К списку</button>');
    }
  }
  h.push('</div></div></div>');
  view().innerHTML=h.join('');
}
function restartTask(){loadTask();}
function trainThis(){const id=curTask().id;ST={mode:'train',queue:shuffle([id,id]).slice(0,1),qi:0,results:[]};
  badge().textContent='Тренировка';renderTabs();loadTask();}

/* --- Арсенал --- */
function renderArsenal(){
  document.getElementById('succ').className='success';
  const groups={};
  ARSENAL.forEach(a=>{(groups[a.g]=groups[a.g]||[]).push(a);});
  let h='<p class="lead">Доказательства опираются на <b>теоремы</b>, а лист справочных материалов ОГЭ — это <b>формулы</b>. Поэтому большинства нужных фактов на листе <b>нет</b> — их надо помнить. Ниже — арсенал приёмов задания 24 с пометкой «есть/нет на листе» и задачами, где приём работает.</p>';
  h+='<div class="arsnote">🟩 <b>есть на листе</b> — можно подсмотреть на экзамене · 🟥 <b>нет на листе</b> — держим в голове · 🟧 <b>частично</b> — формула есть, а нюанс надо помнить.</div>';
  Object.keys(groups).forEach(g=>{
    h+=`<div class="arsgrp"><h3>${g}</h3>`;
    groups[g].forEach(a=>{
      const tag=a.sheet==='есть'?'<span class="tag yes">на листе</span>':a.sheet==='частично'?'<span class="tag part">частично</span>':'<span class="tag no">не на листе</span>';
      h+=`<div class="arscard"><div class="an">${a.name}${tag}</div><div class="anote">${a.note}</div>
      <div class="chips">${a.tasks.map(id=>`<span class="chip jump" onclick="switchMode('study');setTimeout(()=>startStudy('${id}'),0)">${byId[id].title}</span>`).join('')}</div></div>`;
    });
    h+='</div>';
  });
  view().innerHTML=h;
}

/* --- Справочник: карта листа --- */
let flashZone=null;
function jumpChip(id){return `<span class="tchip" onclick="switchMode('study');setTimeout(()=>startStudy('${id}'),0)">${byId[id].code.split(' · ')[0]} — ${byId[id].title}</span>`;}
function zoneDetailHtml(zid){
  const z=SHEET.zones.find(x=>x.id===zid); if(!z)return 'Выбери зону с формулой на листе.';
  return `<div class="zd-name">${z.name}: <b>${z.formula}</b></div><div class="zd-note">${z.note}</div>
    <div class="zd-tasks"><span class="zd-lab">Работает в задачах:</span> ${z.tasks.map(jumpChip).join('')}</div>`;
}
function selZone(zid){
  document.getElementById('zonedetail').innerHTML=zoneDetailHtml(zid);
  var zs=document.querySelectorAll('.szone'); for(var i=0;i<zs.length;i++)zs[i].classList.remove('sel');
  var el=document.querySelector('.szone[data-z="'+zid+'"]'); if(el)el.classList.add('sel');
}
function renderSheet(){
  document.getElementById('succ').className='success';
  const h=[];
  h.push('<p class="lead">Официальный лист справочных материалов ОГЭ (геометрия). Нажми зону с формулой — увидишь, в каких задачах №24 она работает. <b>Важно:</b> задание 24 почти целиком опирается на теоремы, которых на листе <b>нет</b> — их держим в голове (список ниже).</p>');
  h.push('<div class="sheetwrap"><img class="sheetimg" src="'+SHEETIMG+'" alt="лист справочных материалов ОГЭ">');
  SHEET.zones.forEach(z=>{
    const b=z.box, st=`left:${(b[0]*100).toFixed(2)}%;top:${(b[1]*100).toFixed(2)}%;width:${((b[2]-b[0])*100).toFixed(2)}%;height:${((b[3]-b[1])*100).toFixed(2)}%`;
    const fl=(flashZone===z.id)?' flash':'';
    h.push(`<button class="szone${fl}" data-z="${z.id}" style="${st}" onclick="selZone('${z.id}')" title="${z.name}"><span class="spin">${z.tasks.length}</span></button>`);
  });
  h.push('</div>');
  h.push('<div id="zonedetail" class="zonedetail">'+(flashZone?zoneDetailHtml(flashZone):'Выбери зону с формулой на листе — покажу привязку к задачам.')+'</div>');
  h.push('<div class="notonsheet"><h4>⚠️ Чего на листе нет — держим в голове</h4><p class="nos-sub">На эти теоремы опирается большинство доказательств №24, а на листе их не найти. Нажми задачу, чтобы открыть её разбор.</p>');
  SHEET.notOnSheet.forEach(n=>{
    h.push(`<div class="nosrow"><div class="nosg">${n.g}</div><div class="noschips">${n.tasks.map(id=>`<span class="tchip mini" onclick="switchMode('study');setTimeout(()=>startStudy('${id}'),0)">${byId[id].code.split(' · ')[0]}</span>`).join('')}</div></div>`);
  });
  h.push('</div>');
  view().innerHTML=h.join('');
  flashZone=null;
}
function openSheetZone(zid){ flashZone=zid; ST={mode:'sheet'}; badge().textContent='Справочник'; renderTabs(); renderSheet(); }

/* --- утилиты --- */
function stripTags(s){return s.replace(/<[^>]+>/g,'');}
function claimOf(txt){const i=txt.indexOf(' — ');return i>0?txt.slice(0,i):txt;}
function justOf(txt){const i=txt.indexOf(' — ');return i>0?txt.slice(i+3):'';}
function genBlank(t){
  let s='<b>Доказательство.</b><br>';
  t.steps.forEach((st,i)=>{s+=(i+1)+') '+stripTags(st.t)+'<br>';});
  s+='Что и требовалось доказать. ▮';
  return s;
}

/* --- старт --- */
renderTabs();
switchMode('study');
</script>
