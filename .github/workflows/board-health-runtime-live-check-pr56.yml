name: Board Health Runtime Live Check PR56

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/board-health-runtime-live-check-pr56.yml'
  workflow_dispatch:

jobs:
  live-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install smoke dependencies
        run: npm install --no-save socket.io-client@4.7.5
      - name: Poll public health and run live smoke
        env:
          BOARD_URL: https://mathexam-board-ladynata.amvera.io
          MERGE_TIME: '2026-07-08T23:08:30Z'
        run: |
          node <<'NODE'
          const { io } = require('socket.io-client');

          const base = process.env.BOARD_URL;
          const mergeTime = Date.parse(process.env.MERGE_TIME);
          const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

          async function readText(path, options = {}) {
            const response = await fetch(`${base}${path}`, options);
            const text = await response.text();
            return { response, text };
          }

          function parseJson(text, label) {
            try {
              return JSON.parse(text);
            } catch (error) {
              throw new Error(`${label} did not return JSON: ${text}`);
            }
          }

          function hasRuntimeHealthFields(health) {
            return health?.ok === true
              && typeof health.rooms === 'number'
              && typeof health.serverStartedAt === 'string'
              && typeof health.roomTtlMs === 'number'
              && typeof health.roomCleanupIntervalMs === 'number'
              && health.features?.roomTtlCleanup === true;
          }

          let health = null;
          for (let attempt = 1; attempt <= 60; attempt += 1) {
            const { response, text } = await readText('/health', { cache: 'no-store' });
            console.log(`health attempt ${attempt}: ${response.status} ${text}`);
            if (response.status === 200) {
              health = parseJson(text, 'health');
              if (hasRuntimeHealthFields(health)) break;
            }
            await sleep(15000);
          }

          if (!hasRuntimeHealthFields(health)) {
            throw new Error('Runtime health fields did not appear on the public server in time.');
          }

          const startedAtMs = Date.parse(health.serverStartedAt);
          if (!Number.isFinite(startedAtMs)) {
            throw new Error(`serverStartedAt is not a valid ISO timestamp: ${health.serverStartedAt}`);
          }
          console.log('runtime health:', JSON.stringify(health));
          console.log(`serverStartedAtAfterMerge=${startedAtMs >= mergeTime}`);

          async function checkCors(origin) {
            const { response, text } = await readText('/api/rooms', {
              method: 'OPTIONS',
              headers: {
                Origin: origin,
                'Access-Control-Request-Method': 'POST',
                'Access-Control-Request-Headers': 'content-type'
              }
            });
            const allowOrigin = response.headers.get('access-control-allow-origin');
            console.log(`cors ${origin}: status=${response.status} allow-origin=${allowOrigin} body=${text}`);
            if (![200, 204].includes(response.status) || allowOrigin !== origin) {
              throw new Error(`CORS failed for ${origin}: status=${response.status}, allow-origin=${allowOrigin}`);
            }
          }

          await checkCors('https://mathexam.space');
          await checkCors('http://localhost:5173');

          const createResult = await readText('/api/rooms', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: '{}'
          });
          console.log(`create room: ${createResult.response.status} ${createResult.text}`);
          if (createResult.response.status !== 201) {
            throw new Error(`POST /api/rooms failed with status ${createResult.response.status}`);
          }
          const created = parseJson(createResult.text, 'create room');
          for (const key of ['roomId', 'teacherToken', 'studentToken', 'state']) {
            if (!created[key]) throw new Error(`POST /api/rooms response missing ${key}`);
          }

          function waitFor(socket, event, predicate = () => true, timeoutMs = 5000) {
            return new Promise((resolve, reject) => {
              const timer = setTimeout(() => {
                socket.off(event, onEvent);
                reject(new Error(`Timed out waiting for ${event}`));
              }, timeoutMs);
              function onEvent(payload) {
                if (!predicate(payload)) return;
                clearTimeout(timer);
                socket.off(event, onEvent);
                resolve(payload);
              }
              socket.on(event, onEvent);
            });
          }

          function participant(state, role) {
            return state?.participants?.find(item => item.role === role);
          }

          function waitParticipants(socket, role, onlineCount, connected, timeoutMs = 5000) {
            return waitFor(socket, 'participants:state', state => {
              const item = participant(state, role);
              return item && item.onlineCount === onlineCount && item.connected === connected;
            }, timeoutMs);
          }

          function connectSocket(label) {
            const socket = io(base, {
              transports: ['websocket'],
              reconnection: false,
              timeout: 5000,
              forceNew: true
            });
            socket.on('connect_error', error => console.log(`${label} connect_error: ${error.message}`));
            return socket;
          }

          const teacher = connectSocket('teacher');
          const student = connectSocket('student');

          await Promise.all([
            waitFor(teacher, 'connect', () => true, 8000),
            waitFor(student, 'connect', () => true, 8000)
          ]);

          const teacherJoin = waitFor(teacher, 'room:state', payload => payload?.role === 'teacher');
          const teacherOnline = waitParticipants(teacher, 'teacher', 1, true);
          teacher.emit('room:join', {
            roomId: created.roomId,
            token: created.teacherToken,
            role: 'teacher'
          });
          await teacherJoin;
          await teacherOnline;

          const studentJoin = waitFor(student, 'room:state', payload => payload?.role === 'student' && payload?.state?.roomId === created.roomId);
          const studentOnline = waitParticipants(teacher, 'student', 1, true);
          student.emit('room:join', {
            roomId: created.roomId,
            token: created.studentToken,
            role: 'student'
          });
          await studentJoin;
          await studentOnline;

          const duplicateGuard = waitParticipants(teacher, 'student', 1, true);
          student.emit('room:join', {
            roomId: created.roomId,
            token: created.studentToken,
            role: 'student'
          });
          await duplicateGuard;

          const strokeStartSeen = waitFor(student, 'board:stroke-start', payload => payload?.strokeId === 'smoke-stroke');
          const strokeEndSeen = waitFor(student, 'board:stroke-end', payload => payload?.strokeId === 'smoke-stroke');
          teacher.emit('board:stroke-start', {
            roomId: created.roomId,
            token: created.teacherToken,
            strokeId: 'smoke-stroke',
            point: { x: 10, y: 20 }
          });
          teacher.emit('board:stroke-end', {
            roomId: created.roomId,
            token: created.teacherToken,
            strokeId: 'smoke-stroke'
          });
          await strokeStartSeen;
          await strokeEndSeen;

          let teacherSawStudentStroke = false;
          teacher.once('board:stroke-start', () => { teacherSawStudentStroke = true; });
          const studentRejected = waitFor(student, 'room:error', payload => typeof payload?.message === 'string', 4000);
          student.emit('board:stroke-start', {
            roomId: created.roomId,
            token: created.studentToken,
            strokeId: 'student-should-not-draw'
          });
          await studentRejected;
          await sleep(750);
          if (teacherSawStudentStroke) {
            throw new Error('Student board event was forwarded to teacher.');
          }

          const studentOffline = waitParticipants(teacher, 'student', 0, false, 8000);
          student.disconnect();
          await studentOffline;
          teacher.disconnect();

          console.log(JSON.stringify({
            healthRuntime: 'passed',
            health,
            postRooms: 'passed',
            cors: 'passed',
            socketSmoke: 'passed',
            duplicateJoin: 'passed',
            studentReadonly: 'passed',
            disconnectOffline: 'passed'
          }, null, 2));
          NODE
