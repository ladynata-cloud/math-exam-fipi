<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кто сильнее по модулю?</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#eef2f5;--card:#fff;--hdr:#2c3e4e;
  --blue:#2c7da0;--blue-h:#1f5e7a;--blue-lt:#e0f2fe;
  --ok:#16a34a;--ok-bg:#dcfce7;--ok-dk:#14532d;
  --err:#dc2626;--err-bg:#fee2e2;--err-dk:#7f1d1d;
  --amber:#d97706;--amb-bg:#fef3c7;--amb-dk:#78350f;
  --muted:#94a3b8;--border:#d1dae4;--text:#1a2c3e;--text-lt:#64748b;
  --neg:#dc2626;--pos:#1d6fa4;--zer:#16a34a;
}
html{scroll-behavior:smooth}
body{background:var(--bg);font-family:'Segoe UI',Roboto,sans-serif;color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* ШАПКА */
.hdr{background:var(--hdr);color:#fff;padding:13px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hdr-title{display:flex;flex-direction:column}
.hdr h1{font-size:1.25rem;font-weight:600;letter-spacing:-.3px}
.hdr p{font-size:.76rem;opacity:.58;margin-top:2px}
.back-lnk{color:rgba(255,255,255,.55);font-size:.82rem;text-decoration:none;font-weight:500;white-space:nowrap;transition:color .18s}
.back-lnk:hover{color:#fff}

/* СТАТУС-ПОЛОСА */
.stat-bar{background:var(--hdr);border-top:1px solid rgba(255,255,255,.1);padding:7px 24px;display:flex;gap:18px;flex-wrap:wrap;font-size:.8rem;color:rgba(255,255,255,.75)}
.stat-item{display:flex;align-items:center;gap:5px}
.stat-val{font-weight:700;color:#fff}
.stat-streak{color:#fbbf24}

/* КОНТЕНТ */
main{flex:1;display:flex;flex-direction:column;align-items:center;padding:22px 14px 48px}
.screen{width:100%;max-width:580px;display:flex;flex-direction:column;gap:14px}
.hidden{display:none!important}

/* КАРТОЧКИ */
.card{background:var(--card);border-radius:18px;padding:22px 20px;box-shadow:0 4px 16px rgba(0,0,0,.07)}
.card-sm{background:var(--card);border-radius:14px;padding:16px 18px;box-shadow:0 2px 8px rgba(0,0,0,.05)}

/* ВЫРАЖЕНИЕ */
.expr-card{text-align:center;padding:22px 16px;background:#f4f9fe;border:1px solid #d4e2ec}
.expr-big{font-family:'Courier New',monospace;font-size:3rem;font-weight:800;letter-spacing:4px;line-height:1}
@media(max-width:400px){.expr-big{font-size:2.2rem}}
.neg{color:var(--neg)}
.pos{color:var(--pos)}
.zer{color:var(--zer)}
.op-plus{color:#64748b}

/* НАРАСТАЮЩАЯ ИСТОРИЯ ШАГОВ */
.steps-done{display:flex;flex-direction:column;gap:6px}
.step-chip{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--ok-bg);border:1px solid #b6e7c9;border-radius:10px;
  padding:7px 12px;font-size:.88rem;font-weight:600;color:var(--ok-dk);
  animation:fadeIn .3s ease;
}
.step-chip .chip-num{
  width:20px;height:20px;border-radius:50%;
  background:var(--ok);color:#fff;
  font-size:.7rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

/* АКТИВНЫЙ ШАГ */
.step-card{border:2px solid var(--border);border-radius:16px;padding:18px}
.step-num-badge{
  display:inline-flex;align-items:center;gap:8px;
  font-size:.72rem;font-weight:800;text-transform:uppercase;
  letter-spacing:1px;color:var(--blue);margin-bottom:10px;
}
.step-num-badge .snb{
  width:22px;height:22px;border-radius:50%;
  background:var(--blue);color:#fff;font-size:.78rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;
}
.step-q{font-size:.97rem;font-weight:500;color:var(--text);margin-bottom:12px;line-height:1.5}

/* КНОПКИ ВЫБОРА */
.btn-group{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:4px}
.choice-btn{
  padding:11px 20px;border:2.5px solid var(--border);border-radius:40px;
  font-size:.95rem;font-weight:700;cursor:pointer;
  background:#fff;color:var(--text);transition:all .17s;font-family:inherit;
  flex:1;min-width:90px;text-align:center;
}
.choice-btn:hover:not(:disabled){border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.choice-btn.ok{border-color:var(--ok);background:var(--ok-bg);color:var(--ok-dk);pointer-events:none}
.choice-btn.err{border-color:var(--err);background:var(--err-bg);color:var(--err-dk);pointer-events:none;animation:shake .38s}
.choice-btn.dim{opacity:.28;pointer-events:none}
.choice-btn:disabled{pointer-events:none}

/* КНОПКИ МОДУЛЕЙ (крупнее) */
.mod-btn{
  padding:13px 16px;border:2.5px solid var(--border);border-radius:14px;
  font-size:1.1rem;font-weight:800;cursor:pointer;font-family:'Courier New',monospace;
  background:#fff;color:var(--text);transition:all .17s;text-align:center;
  flex:1;min-width:80px;
}
.mod-btn:hover:not(:disabled){border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.mod-btn.ok{border-color:var(--ok);background:var(--ok-bg);color:var(--ok-dk);pointer-events:none}
.mod-btn.err{border-color:var(--err);background:var(--err-bg);color:var(--err-dk);pointer-events:none;animation:shake .38s}
.mod-btn.dim{opacity:.28;pointer-events:none}

/* ВВОД ОТВЕТА */
.ans-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:4px}
.ans-lbl{font-size:1rem;font-weight:700;font-family:'Courier New',monospace}
.ans-inp{
  font-size:1.4rem;width:110px;text-align:center;
  border:2.5px solid var(--border);border-radius:40px;
  padding:8px;font-weight:800;font-family:'Courier New',monospace;
  outline:none;transition:border-color .2s;
  appearance:textfield;-moz-appearance:textfield;
}
.ans-inp::-webkit-inner-spin-button,.ans-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.ans-inp:focus{border-color:var(--blue)}
.ans-inp.inp-ok{border-color:var(--ok);background:var(--ok-bg)}
.ans-inp.inp-err{border-color:var(--err);background:var(--err-bg)}
.go-btn{background:var(--blue);border:none;color:#fff;padding:11px 22px;border-radius:40px;font-size:.93rem;font-weight:700;cursor:pointer;transition:.15s;font-family:inherit}
.go-btn:hover{background:var(--blue-h)}

/* ОБРАТНАЯ СВЯЗЬ */
.fb{border-radius:12px;padding:11px 14px;font-size:.88rem;line-height:1.65;margin-top:10px;display:none;animation:fadeIn .3s ease}
.fb.vis{display:block}
.fb-ok{background:var(--ok-bg);border-left:4px solid var(--ok);color:var(--ok-dk)}
.fb-err{background:var(--err-bg);border-left:4px solid var(--err);color:var(--err-dk)}
.fb-hint{background:var(--amb-bg);border-left:4px solid var(--amber);color:var(--amb-dk)}

/* КАРТОЧКА ГОТОВО */
.done-card{
  background:linear-gradient(140deg,#1e3a4e,#2c5c72);
  border-radius:18px;padding:24px 20px;color:#fff;text-align:center;
}
.done-result{font-size:3.5rem;font-weight:900;font-family:'Courier New',monospace;margin:8px 0}
.done-result.neg{color:#fca5a5}.done-result.pos{color:#7dd3fc}.done-result.zer{color:#86efac}
.done-chain{background:rgba(255,255,255,.1);border-radius:10px;padding:11px 14px;font-size:.86rem;line-height:1.85;text-align:left;margin:12px 0;font-family:'Courier New',monospace}
.next-btn{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);color:#fff;padding:10px 24px;border-radius:40px;font-size:.93rem;font-weight:700;cursor:pointer;font-family:inherit;transition:.18s}
.next-btn:hover{background:rgba(255,255,255,.3)}

/* МЕНЮ */
.menu-ico{font-size:2.4rem;text-align:center;margin-bottom:8px}
.menu-ttl{font-size:1.45rem;font-weight:700;text-align:center;margin-bottom:8px}
.menu-sub{font-size:.92rem;color:var(--text-lt);line-height:1.6;text-align:center;margin-bottom:18px}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.menu-btn{border:2px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:all .18s;text-align:center;background:#fff}
.menu-btn:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 5px 14px rgba(44,125,160,.14)}
.mb-ico{font-size:1.5rem;margin-bottom:6px}
.mb-name{font-size:.97rem;font-weight:700;color:var(--text);margin-bottom:4px}
.mb-desc{font-size:.76rem;color:var(--text-lt);line-height:1.4}

/* ПРОГРЕСС ТРЕНИРОВКИ */
.prog-hdr{display:flex;justify-content:space-between;align-items:center;font-size:.82rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
.prog-bar-w{height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:16px}
.prog-bar-f{height:100%;background:var(--blue);border-radius:4px;transition:width .4s}

/* ИТОГИ */
.res-big{font-size:3.5rem;font-weight:900;font-family:'Courier New',monospace;text-align:center}
.res-big.ex{color:var(--ok)}.res-big.go{color:var(--blue)}.res-big.fa{color:var(--amber)}.res-big.po{color:var(--err)}
.res-lbl{font-size:.97rem;font-weight:600;color:var(--text-lt);text-align:center;margin-top:4px;margin-bottom:16px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat-box{background:#f7fafc;border-radius:12px;padding:12px;text-align:center}
.stat-box-n{font-size:1.8rem;font-weight:800;color:var(--text);line-height:1}
.stat-box-l{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-top:3px}
.history-row{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.h-dot{width:18px;height:18px;border-radius:50%}
.h-dot.ok{background:var(--ok)}.h-dot.ng{background:var(--err)}.h-dot.na{background:var(--border)}
.btn-row{display:flex;gap:9px;flex-wrap:wrap;justify-content:center}
.btn-p{background:var(--blue);border:none;color:#fff;padding:11px 22px;border-radius:40px;font-size:.93rem;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.btn-p:hover{background:var(--blue-h);transform:translateY(-1px)}
.btn-g{background:transparent;border:2px solid var(--border);color:var(--text-lt);padding:11px 22px;border-radius:40px;font-size:.93rem;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.btn-g:hover{border-color:var(--text-lt);color:var(--text)}
.btn-warn{background:#fee2e2;border:none;color:var(--err-dk);padding:9px 18px;border-radius:40px;font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.btn-warn:hover{background:var(--err);color:#fff}

/* ПОДСКАЗКА */
.hint-panel{background:var(--amb-bg);border:1px solid #fde68a;border-radius:12px;padding:13px 15px;font-size:.87rem;line-height:1.7;color:var(--amb-dk);margin-top:8px;display:none;animation:fadeIn .3s ease}
.hint-panel.vis{display:block}

@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-title">
    <h1>⚔ Кто сильнее по модулю?</h1>
    <p>Сложение чисел с разными и одинаковыми знаками</p>
  </div>
  <a href="../index.html" class="back-lnk">← Назад</a>
</header>
<div id="statBar" class="stat-bar hidden"></div>

<main>
  <div id="app" class="screen"></div>
</main>

<script>
/* ══════════════════════ КОНСТАНТЫ ═══════════════════════════ */
const STORAGE_KEY='mathExamCourseProgress.v1';
const TOPIC_ID='signedAdditionTrainer';

const LEARN=[
  {a:-4, b:-7},   // оба отрицательных → -11
  {a:8,  b:-3},   // разные, + побеждает → +5
  {a:-9, b:5},    // разные, − побеждает → -4
  {a:6,  b:-10},  // разные, − побеждает → -4
  {a:-2, b:-6},   // оба отрицательных → -8
  {a:7,  b:-7},   // равные модули → 0
];

/* ══════════════════════ СТАТИСТИКА ══════════════════════════ */
function loadStats(){
  try{
    const d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    return d[TOPIC_ID]||{solved:0,correct:0,streak:0,bestStreak:0,history:[]};
  }catch{return{solved:0,correct:0,streak:0,bestStreak:0,history:[]};}
}
function saveStats(s){
  try{
    const d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    d[TOPIC_ID]=s; localStorage.setItem(STORAGE_KEY,JSON.stringify(d));
  }catch{}
}
function recordResult(ok){
  const s=loadStats(); s.solved++;
  if(ok){s.correct++;s.streak++;if(s.streak>s.bestStreak)s.bestStreak=s.streak;}
  else{s.streak=0;}
  s.history=[ok?1:0,...(s.history||[])].slice(0,10);
  saveStats(s);
}
function resetStats(){
  const d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
  d[TOPIC_ID]={solved:0,correct:0,streak:0,bestStreak:0,history:[]};
  localStorage.setItem(STORAGE_KEY,JSON.stringify(d));
}

/* ══════════════════════ ГЕНЕРАТОР ЗАДАЧ ═════════════════════ */
function randRange(lo,hi){return lo+Math.floor(Math.random()*(hi-lo+1));}
function randNonZero(lo,hi){let v;do{v=randRange(lo,hi);}while(v===0);return v;}
const sfl=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};

function genPracticeTasks(){
  const tasks=[];
  // Гарантированные типы
  // 1. Оба отрицательных
  do{var a=-randRange(3,10),b=-randRange(3,10);}while(Math.abs(a+b)>14);
  tasks.push({a,b});
  // 2. Разные знаки, ответ положительный
  // 2. Разные знаки, ответ положительный (positive bigger)
  const posBig=randRange(5,11), posSm=randRange(2,posBig-2);
  tasks.push(Math.random()<.5?{a:posBig,b:-posSm}:{a:-posSm,b:posBig});
  // 3. Разные знаки, ответ отрицательный
  const negBig=randRange(5,11), negSm=randRange(2,negBig-2);
  tasks.push(Math.random()<.5?{a:-negBig,b:negSm}:{a:negSm,b:-negBig});
  // 4. Противоположные числа → 0
  const eq=randRange(3,10);
  tasks.push(Math.random()<.5?{a:eq,b:-eq}:{a:-eq,b:eq});
  // Дополнительные 6 случайных
  let att=0;
  while(tasks.length<10&&att<200){
    att++;
    const na=randNonZero(-12,12), nb=randNonZero(-12,12);
    if(Math.abs(na)<3||Math.abs(nb)<3) continue;
    if(Math.abs(na+nb)>13) continue;
    if(tasks.some(t=>t.a===na&&t.b===nb)) continue;
    tasks.push({a:na,b:nb});
  }
  return sfl(tasks).slice(0,10);
}

/* ══════════════════════ ВЫЧИСЛЕНИЯ ══════════════════════════ */
function analyzeTask(task){
  const{a,b}=task;
  const absA=Math.abs(a), absB=Math.abs(b);
  const sameSign=(a<0&&b<0)||(a>0&&b>0);
  const equalMods=absA===absB;
  const result=a+b;
  const bigMod=Math.max(absA,absB), smallMod=Math.min(absA,absB);
  const biggerNum=absA>=absB?a:b; // the number with bigger |n|
  let correctSign;
  if(equalMods&&!sameSign) correctSign='zero';
  else if(sameSign) correctSign=a<0?'minus':'plus';
  else correctSign=biggerNum<0?'minus':'plus';
  const correctModOp=sameSign?'add':'subtract';
  return{sameSign,equalMods,result,bigMod,smallMod,correctSign,correctModOp,biggerNum};
}

/* ══════════════════════ ОТОБРАЖЕНИЕ ЧИСЕЛ ════════════════════ */
function numDisp(n,pos){
  // pos='first': -5 → "−5", 5 → "5"
  // pos='second': -5 → "(−5)", 5 → "5"
  if(pos==='second'&&n<0) return `(−${Math.abs(n)})`;
  if(n<0) return `−${Math.abs(n)}`;
  return `${n}`;
}
function numHTML(n,pos){
  const cls=n<0?'neg':n===0?'zer':'pos';
  return `<span class="${cls}">${numDisp(n,pos)}</span>`;
}
function buildExprHTML(a,b){
  return`${numHTML(a,'first')}<span class="op-plus"> + </span>${numHTML(b,'second')}`;
}

/* ══════════════════════ СОСТОЯНИЕ ════════════════════════════ */
const S={
  mode:null, step:0, taskIdx:0, tasks:[],
  taskFullOk:true, // was current task error-free?
  sessionOk:0, sessionTotal:0,
  stepDone:{}, // {0:true, 1:true, 2:true}
  hintVisible:false,
  stepErrors:{}, // {0:count, ...}
};

function curTask(){return S.tasks[S.taskIdx];}

/* ══════════════════════ РЕНДЕР ОСНОВНОГО UI ═════════════════ */
function render(){
  const app=document.getElementById('app');
  if(S.mode===null){app.innerHTML=buildMenu();return;}
  if(S.mode==='results'){app.innerHTML=buildResults();updateStatBar();return;}
  app.innerHTML=buildTask();
  updateStatBar();
  document.getElementById('ansInp')?.addEventListener('keydown',e=>{
    if(e.key==='Enter') checkAnswer();
  });
}

/* ── МЕНЮ ── */
function buildMenu(){
  const s=loadStats();
  const pct=s.solved>0?Math.round(s.correct/s.solved*100):0;
  const histPips=Array.from({length:10},(_,i)=>{
    const v=s.history[i];
    return`<div class="h-dot ${v===undefined?'na':v===1?'ok':'ng'}"></div>`;
  }).join('');
  return`
  <div class="card">
    <div class="menu-ico">⚔</div>
    <p class="menu-ttl">Кто сильнее по модулю?</p>
    <p class="menu-sub">Тренируемся решать сложение чисел с разными знаками по шагам:<br>знаки → знак ответа → действие с модулями → ответ.</p>
    <div class="menu-grid">
      <div class="menu-btn" onclick="startMode('learn')">
        <div class="mb-ico">📘</div>
        <div class="mb-name">Обучение</div>
        <div class="mb-desc">6 примеров · от простого к сложному · подробные подсказки</div>
      </div>
      <div class="menu-btn" onclick="startMode('practice')">
        <div class="mb-ico">⚡</div>
        <div class="mb-name">Тренировка</div>
        <div class="mb-desc">10 случайных · все типы задач · статистика</div>
      </div>
    </div>
    ${s.solved>0?`
    <div class="card-sm" style="background:#f7fafc;margin-top:2px">
      <div style="font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px">Моя статистика</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:.88rem;margin-bottom:8px">
        <span>Решено: <strong>${s.solved}</strong></span>
        <span>Верно: <strong>${s.correct}</strong></span>
        <span>Точность: <strong>${pct}%</strong></span>
        <span>Серия: <strong style="color:${s.streak>0?'#d97706':'inherit'}">${s.streak>2?'🔥':''}${s.streak}</strong></span>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">${histPips}</div>
      <button class="btn-warn" onclick="if(confirm('Сбросить статистику?')){resetStats();render()}">Сбросить статистику</button>
    </div>`:''}
  </div>`;
}

/* ── ПОЛОСА СТАТУСА ── */
function updateStatBar(){
  const bar=document.getElementById('statBar');
  if(S.mode===null||S.mode==='results'){bar.classList.add('hidden');return;}
  bar.classList.remove('hidden');
  const s=loadStats();
  bar.innerHTML=`
    <div class="stat-item">Задание <span class="stat-val">${S.taskIdx+1}/${S.tasks.length}</span></div>
    <div class="stat-item">Верно <span class="stat-val">${S.sessionOk}/${S.sessionTotal}</span></div>
    ${s.streak>1?`<div class="stat-item">Серия <span class="stat-val stat-streak">${s.streak>2?'🔥':''}${s.streak}</span></div>`:''}`;
}

/* ── ЗАДАЧА ── */
function buildTask(){
  const task=curTask();
  const an=analyzeTask(task);
  const isLastTask=S.taskIdx===S.tasks.length-1;
  let html='';

  /* Прогресс (тренировка) */
  if(S.mode==='practice'){
    const pct=(S.taskIdx/S.tasks.length)*100;
    html+=`
    <div class="prog-hdr"><span>${S.mode==='practice'?'Тренировка':'Обучение'}</span><span>${S.taskIdx+1} / ${S.tasks.length}</span></div>
    <div class="prog-bar-w"><div class="prog-bar-f" style="width:${pct}%"></div></div>`;
  }

  /* Выражение */
  html+=`<div class="card expr-card"><div class="expr-big">${buildExprHTML(task.a,task.b)}</div></div>`;

  /* Завершённые шаги */
  html+=`<div class="steps-done" id="stepsDone">${buildDoneChips(an)}</div>`;

  /* Активный шаг */
  if(S.step<4) html+=buildActiveStep(task,an);
  else         html+=buildDoneCard(task,an);

  return html;
}

function buildDoneChips(an){
  let out='';
  if(S.stepDone[0]) out+=`<div class="step-chip"><div class="chip-num">1</div>Знаки: ${an.sameSign?'<strong>одинаковые</strong> → складываем модули':'<strong>разные</strong> → вычитаем модули'}</div>`;
  if(S.stepDone[1]) out+=`<div class="step-chip"><div class="chip-num">2</div>Знак ответа: <strong>${an.correctSign==='zero'?'ноль (модули равны)':an.correctSign==='minus'?'минус «−»':'плюс «+»'}</strong></div>`;
  if(S.stepDone[2]) out+=`<div class="step-chip"><div class="chip-num">3</div>Считаем: <strong>${an.sameSign?an.bigMod+' + '+an.smallMod+' = '+(an.bigMod+an.smallMod):an.bigMod+' − '+an.smallMod+' = '+(an.bigMod-an.smallMod)}</strong></div>`;
  return out;
}

function buildActiveStep(task,an){
  if(S.step===0) return buildStep0(task,an);
  if(S.step===1) return buildStep1(task,an);
  if(S.step===2) return buildStep2(task,an);
  if(S.step===3) return buildStep3(task,an);
  return '';
}

/* Шаг 0: одинаковые / разные */
function buildStep0(task,an){
  const fb=S.fb0||'';
  return`
  <div class="step-card">
    <div class="step-num-badge"><div class="snb">1</div>Шаг 1 из 4</div>
    <div class="step-q">Знаки слагаемых — одинаковые или разные?</div>
    <div class="btn-group" id="btns0">
      <button class="choice-btn" onclick="pickSign0('same')">одинаковые</button>
      <button class="choice-btn" onclick="pickSign0('diff')">разные</button>
    </div>
    <div class="fb ${fb?'fb-err vis':''}" id="fb0">${fb}</div>
    ${buildHintPanel(0, task, an)}
    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-g" style="padding:8px 14px;font-size:.8rem" onclick="toggleHint()">💡 Подсказка</button>
      <button class="btn-g" style="padding:8px 14px;font-size:.8rem" onclick="showSolution()">👁 Показать решение</button>
    </div>
  </div>`;
}

/* Шаг 1: знак ответа */
function buildStep1(task,an){
  const fb=S.fb1||'';
  const showZero=(!an.sameSign); // show "ноль" option only for different signs
  return`
  <div class="step-card">
    <div class="step-num-badge"><div class="snb">2</div>Шаг 2 из 4</div>
    <div class="step-q">Какой знак будет у ответа?</div>
    ${an.sameSign?'':buildStrengthHint(task,an)}
    <div class="btn-group" id="btns1">
      <button class="choice-btn" style="color:var(--pos);border-color:var(--pos)" onclick="pickSign1('plus')">+ плюс</button>
      <button class="choice-btn" style="color:var(--neg);border-color:var(--neg)" onclick="pickSign1('minus')">− минус</button>
      ${showZero?`<button class="choice-btn" style="color:var(--zer);border-color:var(--zer)" onclick="pickSign1('zero')">0 ноль</button>`:''}
    </div>
    <div class="fb ${fb?'fb-err vis':''}" id="fb1">${fb}</div>
    ${buildHintPanel(1, task, an)}
    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-g" style="padding:8px 14px;font-size:.8rem" onclick="toggleHint()">💡 Подсказка</button>
    </div>
  </div>`;
}

function buildStrengthHint(task,an){
  const {a,b}=task;
  const bigNum=Math.abs(a)>=Math.abs(b)?a:b;
  const bigMod=Math.max(Math.abs(a),Math.abs(b));
  const smMod=Math.min(Math.abs(a),Math.abs(b));
  return`<div class="fb-hint" style="border-radius:10px;padding:10px 13px;background:var(--blue-lt);border-left:3px solid var(--blue);margin-bottom:10px;font-size:.85rem;color:#0c4a6e">
    <strong>Сравниваем модули:</strong> |${numDisp(a,'first')}| = ${Math.abs(a)}, |${numDisp(b,'second')}| = ${Math.abs(b)}.<br>
    ${bigMod===smMod?'Модули равны → ответ ноль.':
      `<strong>${numDisp(bigNum,'first')}</strong> сильнее (${bigMod} > ${smMod}) → знак ответа берём у него.`}
  </div>`;
}

/* Шаг 2: действие с модулями */
function buildStep2(task,an){
  const{bigMod,smallMod}=an;
  const opts=[
    {id:'add',    label:`${Math.abs(task.a)} + ${Math.abs(task.b)}`, result:Math.abs(task.a)+Math.abs(task.b)},
    {id:'sub_big',label:`${bigMod} − ${smallMod}`, result:bigMod-smallMod},
    {id:'sub_sml',label:`${smallMod} − ${bigMod}`, result:smallMod-bigMod},
  ];
  const shuffled=sfl(opts);
  const fb=S.fb2||'';
  return`
  <div class="step-card">
    <div class="step-num-badge"><div class="snb">3</div>Шаг 3 из 4</div>
    <div class="step-q">Что делаем с модулями? Выбери верное действие:</div>
    <div class="btn-group" id="btns2">
      ${shuffled.map(o=>`<button class="mod-btn" data-id="${o.id}" onclick="pickModOp('${o.id}')">${o.label}</button>`).join('')}
    </div>
    <div class="fb ${fb?'fb-err vis':''}" id="fb2">${fb}</div>
    ${buildHintPanel(2, task, an)}
    <div style="margin-top:10px">
      <button class="btn-g" style="padding:8px 14px;font-size:.8rem" onclick="toggleHint()">💡 Подсказка</button>
    </div>
  </div>`;
}

/* Шаг 3: ввод ответа */
function buildStep3(task,an){
  const fb=S.fb3||'';
  return`
  <div class="step-card">
    <div class="step-num-badge"><div class="snb">4</div>Шаг 4 из 4</div>
    <div class="step-q">Введи итоговый ответ:</div>
    <div class="ans-row">
      <span class="ans-lbl">${buildExprHTML(task.a,task.b).replace(/<[^>]+>/g,'').replace('−','-')} =</span>
      <input type="number" class="ans-inp" id="ansInp" placeholder="?">
      <button class="go-btn" onclick="checkAnswer()">Проверить</button>
    </div>
    <div class="fb ${fb?'fb-err vis':''}" id="fb3">${fb}</div>
  </div>`;
}

/* Готово */
function buildDoneCard(task,an){
  const r=an.result;
  const rCls=r<0?'neg':r>0?'pos':'zer';
  const rDisp=r<0?`−${Math.abs(r)}`:r===0?'0':`${r}`;
  const chainA=`${numDisp(task.a,'first')} + ${numDisp(task.b,'second')}`;
  const chainB=an.sameSign?`${an.bigMod} + ${an.smallMod} = ${an.bigMod+an.smallMod}`:`${an.bigMod} − ${an.smallMod} = ${an.bigMod-an.smallMod}`;
  const isLast=S.taskIdx>=S.tasks.length-1;
  return`
  <div class="done-card">
    <div style="font-size:.85rem;opacity:.75">Ответ:</div>
    <div class="done-result ${rCls}">${rDisp}</div>
    <div class="done-chain">
      ${chainA}<br>
      знаки ${an.sameSign?'одинаковые':'разные'} → ${an.sameSign?'складываем':'вычитаем'} модули<br>
      ${chainB}<br>
      знак «${an.correctSign==='zero'?'ноль':an.correctSign==='minus'?'−':'+'} » → <strong>${rDisp}</strong>
    </div>
    <button class="next-btn" onclick="${isLast?'finishSession()':'nextTask()'}">${isLast?'Завершить →':'Следующий →'}</button>
  </div>`;
}

/* ══════════════════════ ПОДСКАЗКИ ═══════════════════════════ */
function buildHintPanel(step,task,an){
  const hints={
    0:`Посмотри на знаки слагаемых:<br>${numHTML(task.a,'first')} — ${task.a<0?'отрицательное':'положительное'}, ${numHTML(task.b,'second')} — ${task.b<0?'отрицательное':'положительное'}.<br>${an.sameSign?'Оба одного знака → <strong>одинаковые</strong>.':'Разные знаки → <strong>разные</strong>.'}`,
    1:an.sameSign?
      `Оба числа ${task.a<0?'отрицательные → знак ответа <strong>минус</strong>.':'положительные → знак ответа <strong>плюс</strong>.'}`:
      an.equalMods?`Модули равны (${an.bigMod} = ${an.bigMod}) → сумма = <strong>ноль</strong>.`:
      `Сильнее число <strong>${numDisp(an.biggerNum,'first')}</strong> (|${numDisp(an.biggerNum,'first')}| = ${an.bigMod} > ${an.smallMod}).<br>Знак ответа берём у него: <strong>${an.biggerNum<0?'минус':'плюс'}</strong>.`,
    2:an.sameSign?
      `Знаки одинаковые → <strong>складываем</strong> модули: ${an.bigMod} + ${an.smallMod}.`:
      `Знаки разные → <strong>вычитаем</strong> меньший модуль из большего: ${an.bigMod} − ${an.smallMod}.`,
  };
  return`<div class="hint-panel ${S.hintVisible?'vis':''}" id="hintPanel">${hints[step]||''}</div>`;
}

function toggleHint(){S.hintVisible=!S.hintVisible;render();}
function showSolution(){
  const task=curTask(),an=analyzeTask(task);
  S.step=4;S.stepDone={0:true,1:true,2:true};
  if(!S.taskFullOk) recordResult(false);
  render();
}

/* ══════════════════════ ОБРАБОТЧИКИ ШАГОВ ════════════════════ */
function pickSign0(val){
  const task=curTask(),an=analyzeTask(task);
  const correct=an.sameSign?'same':'diff';
  const btns=document.querySelectorAll('#btns0 .choice-btn');
  if(val===correct){
    btns.forEach(b=>{if(b.textContent.includes(val==='same'?'одинаковые':'разные'))b.classList.add('ok');else b.classList.add('dim');});
    S.stepDone[0]=true;S.fb0=null;S.hintVisible=false;S.step=1;
    setTimeout(render,400);
  }else{
    btns.forEach(b=>{if(b.textContent.includes(val==='same'?'одинаковые':'разные'))b.classList.add('err');});
    btns.forEach(b=>b.disabled=true);
    const msg=val==='same'?
      'Проверь знаки: одно число положительное, другое отрицательное. Знаки <strong>разные</strong>.':
      'Оба числа отрицательные. Знаки <strong>одинаковые</strong>.';
    S.fb0=msg;S.taskFullOk=false;
    document.getElementById('fb0').innerHTML=msg;
    document.getElementById('fb0').className='fb fb-err vis';
    setTimeout(()=>{btns.forEach(b=>{b.disabled=false;b.classList.remove('err','ok','dim');});
    document.getElementById('fb0').className='fb fb-err';},1200);
    if(S.mode==='learn')S.hintVisible=true;
    render();
  }
}

function pickSign1(val){
  const task=curTask(),an=analyzeTask(task);
  const btns=document.querySelectorAll('#btns1 .choice-btn');
  if(val===an.correctSign){
    btns.forEach(b=>{
      if((val==='plus'&&b.textContent.includes('плюс'))||(val==='minus'&&b.textContent.includes('минус'))||(val==='zero'&&b.textContent.includes('ноль')))
        b.classList.add('ok');else b.classList.add('dim');
    });
    S.stepDone[1]=true;S.fb1=null;S.hintVisible=false;
    // Если равные модули → пропускаем шаг 2
    S.step=an.equalMods?3:2;
    if(an.equalMods) S.stepDone[2]=true;
    setTimeout(render,400);
  }else{
    btns.forEach(b=>{
      if((val==='plus'&&b.textContent.includes('плюс'))||(val==='minus'&&b.textContent.includes('минус'))||(val==='zero'&&b.textContent.includes('ноль')))
        b.classList.add('err');
    });
    btns.forEach(b=>b.disabled=true);
    let msg='';
    if(an.equalMods&&!an.sameSign) msg='Модули равны, числа противоположные — ответ <strong>0</strong>.';
    else if(an.sameSign) msg=`Оба слагаемых ${task.a<0?'отрицательные':'положительные'} — ответ тоже <strong>${task.a<0?'отрицательный':'положительный'}</strong>.`;
    else msg=`Знак берём у числа с <strong>бо́льшим модулем</strong>. Здесь сильнее <strong>${numDisp(an.biggerNum,'first')}</strong> (|${an.bigMod}| > |${an.smallMod}|).`;
    S.fb1=msg;S.taskFullOk=false;
    document.getElementById('fb1').innerHTML=msg;
    document.getElementById('fb1').className='fb fb-err vis';
    setTimeout(()=>{btns.forEach(b=>{b.disabled=false;b.classList.remove('err','ok','dim');});
    document.getElementById('fb1').className='fb fb-err';},1400);
    render();
  }
}

function pickModOp(val){
  const task=curTask(),an=analyzeTask(task);
  const correctId=an.sameSign?'add':'sub_big';
  const btns=document.querySelectorAll('#btns2 .mod-btn');
  if(val===correctId){
    btns.forEach(b=>{if(b.dataset.id===val)b.classList.add('ok');else b.classList.add('dim');});
    S.stepDone[2]=true;S.fb2=null;S.hintVisible=false;S.step=3;
    setTimeout(render,400);
  }else{
    btns.forEach(b=>{if(b.dataset.id===val)b.classList.add('err');});
    btns.forEach(b=>b.disabled=true);
    let msg='';
    if(val==='add'&&!an.sameSign) msg='При <strong>разных</strong> знаках модули <strong>вычитаем</strong>, а не складываем.';
    else if(val!=='add'&&an.sameSign) msg='При <strong>одинаковых</strong> знаках модули <strong>складываем</strong>.';
    else msg=`Вычитаем из большего: ${an.bigMod} − ${an.smallMod}. Маленький из большого, не наоборот.`;
    S.fb2=msg;S.taskFullOk=false;
    document.getElementById('fb2').innerHTML=msg;
    document.getElementById('fb2').className='fb fb-err vis';
    setTimeout(()=>{btns.forEach(b=>{b.disabled=false;b.classList.remove('err','ok','dim');});
    document.getElementById('fb2').className='fb fb-err';},1400);
    render();
  }
}

function checkAnswer(){
  const inp=document.getElementById('ansInp');
  if(!inp)return;
  const raw=inp.value.trim().replace('−','-').replace('–','-');
  if(!raw){inp.style.borderColor='#dc2626';setTimeout(()=>inp.style.borderColor='',600);return;}
  const ua=parseInt(raw);
  if(isNaN(ua)){inp.style.borderColor='#dc2626';setTimeout(()=>inp.style.borderColor='',600);return;}
  const task=curTask(),an=analyzeTask(task);
  if(ua===an.result){
    recordResult(S.taskFullOk);
    if(S.taskFullOk) S.sessionOk++;
    S.sessionTotal++;
    S.step=4;S.fb3=null;
    render();
  }else{
    S.taskFullOk=false;
    let msg='';
    if(Math.abs(ua)===Math.abs(an.result))
      msg='Число по модулю верное, но <strong>знак неверный</strong>. Вернись к шагу 2 и проверь знак ответа.';
    else
      msg=`Неверно. Проверь вычисление: ${an.sameSign?an.bigMod+' + '+an.smallMod+' = '+(an.bigMod+an.smallMod):an.bigMod+' − '+an.smallMod+' = '+(an.bigMod-an.smallMod)}, знак «${an.correctSign==='minus'?'−':'+'}».`;
    S.fb3=msg;
    document.getElementById('fb3').innerHTML=msg;
    document.getElementById('fb3').className='fb fb-err vis';
    inp.classList.add('inp-err');
    if(inp.animate)inp.animate([{transform:'translateX(0)'},{transform:'translateX(-5px)'},{transform:'translateX(5px)'},{transform:'translateX(-3px)'},{transform:'translateX(0)'}],{duration:380});
    setTimeout(()=>{inp.classList.remove('inp-err');document.getElementById('fb3').className='fb fb-err';},1000);
  }
}

/* ══════════════════════ НАВИГАЦИЯ ════════════════════════════ */
function startMode(m){
  S.mode=m;
  S.tasks=m==='learn'?[...LEARN]:genPracticeTasks();
  S.taskIdx=0;S.sessionOk=0;S.sessionTotal=0;
  resetTaskState();render();
}

function resetTaskState(){
  S.step=0;S.stepDone={};S.taskFullOk=true;
  S.fb0=S.fb1=S.fb2=S.fb3=null;S.hintVisible=false;
}

function nextTask(){
  S.taskIdx++;resetTaskState();render();
}

function finishSession(){
  S.mode='results';render();
}

/* ══════════════════════ ЭКРАН РЕЗУЛЬТАТОВ ════════════════════ */
function buildResults(){
  const s=loadStats();
  const sess_pct=S.sessionTotal>0?Math.round(S.sessionOk/S.sessionTotal*100):0;
  const tot_pct=s.solved>0?Math.round(s.correct/s.solved*100):0;
  const sc=sess_pct>=90?'ex':sess_pct>=70?'go':sess_pct>=50?'fa':'po';
  const slbl=sess_pct>=90?'Отлично! Все шаги выполнены верно!':
             sess_pct>=70?'Хороший результат!':
             sess_pct>=50?'Половина верно. Продолжай!':'Нужно ещё потренироваться.';
  const histPips=(s.history||[]).map(v=>`<div class="h-dot ${v===1?'ok':'ng'}"></div>`).join('');
  return`
  <div class="card">
    <div style="font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;text-align:center">Результат сессии</div>
    <div class="res-big ${sc}">${S.sessionOk}/${S.sessionTotal}</div>
    <div class="res-lbl">${slbl}</div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-box-n">${s.solved}</div><div class="stat-box-l">Всего решено</div></div>
      <div class="stat-box"><div class="stat-box-n" style="color:${tot_pct>=70?'var(--ok)':'var(--amber)'}">${tot_pct}%</div><div class="stat-box-l">Точность</div></div>
      <div class="stat-box"><div class="stat-box-n" style="color:${s.streak>2?'#d97706':'inherit'}">${s.streak>2?'🔥':''}${s.streak}</div><div class="stat-box-l">Серия</div></div>
    </div>
    <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px;text-align:center">История (последние ${(s.history||[]).length})</div>
    <div class="history-row">${histPips}</div>
    <div class="btn-row">
      <button class="btn-p" onclick="startMode(S.mode==='learn'?'learn':'practice')">Ещё раз</button>
      <button class="btn-g" onclick="S.mode=null;render()">В меню</button>
    </div>
  </div>`;
}

/* ══════════════════════ ИНИЦИАЛИЗАЦИЯ ════════════════════════ */
render();
</script>
</body>
</html>
