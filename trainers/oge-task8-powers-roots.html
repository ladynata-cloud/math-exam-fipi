<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Задание 8 ОГЭ — степени и корни</title>
<style>
:root{
  --paper:#fefdf6; --cell:#dbe7f0; --marg:#e88a8a;
  --ink:#22324d; --pen:#1a3b8b; --green:#1e7a2e; --red:#c62828;
  --chip:#eef4fb; --chipbd:#b9cfe8; --gold:#b8860b;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0; color:var(--ink);
  font:16px/1.55 "Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
  background:var(--paper);
  background-image:
    linear-gradient(var(--cell) 1px, transparent 1px),
    linear-gradient(90deg, var(--cell) 1px, transparent 1px);
  background-size:24px 24px;
}
.hand{font-family:"Segoe Print","Comic Sans MS","Comic Neue",cursive}
header{
  position:sticky; top:0; z-index:30;
  background:rgba(254,253,246,.96); backdrop-filter:blur(3px);
  border-bottom:2px solid var(--marg);
  padding:10px 14px 0;
}
.htitle{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.htitle h1{margin:0;font-size:22px;color:var(--pen)}
.htitle .sub{color:#5b6b85;font-size:14px}
nav.tabs{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
nav.tabs button{
  border:2px solid var(--chipbd); border-bottom:none; background:var(--chip);
  padding:8px 14px; border-radius:10px 10px 0 0; cursor:pointer;
  font:inherit; font-weight:600; color:var(--pen);
}
nav.tabs button.on{background:#fff;border-color:var(--marg);color:var(--ink);box-shadow:0 2px 0 #fff}
main{max-width:1060px;margin:0 auto;padding:18px 14px 90px;position:relative}
main::before{content:"";position:fixed;top:0;bottom:0;left:calc(50% - 553px);width:2px;background:var(--marg);opacity:.55;pointer-events:none}
@media(max-width:1140px){main::before{left:10px}}
section.view{display:none}
section.view.on{display:block}
.card{
  background:#fff;border:1.5px solid var(--chipbd);border-radius:12px;
  padding:16px 18px;margin:14px 0;box-shadow:2px 3px 0 rgba(120,150,190,.15);
}
.card h2{margin:0 0 8px;color:var(--pen);font-size:20px}
.card h3{margin:14px 0 6px;color:var(--pen);font-size:17px}
.num{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:28px;border-radius:50%;
  background:var(--pen);color:#fff;font-weight:700;margin-right:8px;font-size:15px;padding:0 6px}
.pill{display:inline-block;border:1.5px solid var(--chipbd);background:var(--chip);border-radius:999px;
  padding:3px 12px;margin:3px 4px 3px 0;font-size:14px;cursor:pointer;color:var(--pen);user-select:none}
.pill:hover{border-color:var(--pen)}
.pill.on{background:var(--pen);color:#fff;border-color:var(--pen)}
.pill.ghost{cursor:default}
.pill.ghost:hover{border-color:var(--chipbd)}
button.act{
  font:inherit;font-weight:600;border-radius:10px;padding:8px 16px;cursor:pointer;
  border:2px solid var(--pen);background:var(--pen);color:#fff;
}
button.act.sec{background:#fff;color:var(--pen)}
button.act.show{border-color:var(--gold);background:#fff;color:var(--gold)}
button.act:disabled{opacity:.45;cursor:default}
input.ans{
  font:inherit;font-size:18px;width:110px;padding:6px 10px;border:2px solid var(--chipbd);
  border-radius:8px;text-align:center;background:#fffef8;
}
input.ans:focus{outline:none;border-color:var(--pen)}
input.ans.ok{border-color:var(--green);background:#f0faf0}
input.ans.no{border-color:var(--red);background:#fdf2f2}
.fb{font-weight:600;margin-left:8px}
.fb.ok{color:var(--green)} .fb.no{color:var(--red)} .fb.shown{color:var(--gold)}
/* ---------- математика ---------- */
.m{white-space:nowrap;font-size:19px;font-family:Georgia,"Times New Roman",serif;font-style:italic}
.m b, .m .up{font-style:normal}
.m sup{font-size:.68em;font-style:normal}
.fr{display:inline-flex;flex-direction:column;vertical-align:middle;text-align:center;margin:0 3px;line-height:1.15}
.fr>.fn{border-bottom:1.6px solid currentColor;padding:0 6px}
.fr>.fd{padding:0 6px}
.rt{display:inline-flex;align-items:stretch;vertical-align:middle;margin:0 2px;line-height:1}
.rt>.rsv{flex:none;width:.6em;align-self:stretch;display:block;overflow:visible}
.rt>.rsv path{fill:none;stroke:currentColor;stroke-width:1.5;stroke-linejoin:round;stroke-linecap:round;vector-effect:non-scaling-stroke}
.rt>.ru{border-top:1.5px solid currentColor;padding:2.5px 5px 0 3px;min-height:1em;margin-left:-1px}
.big{font-size:22px}
.expr{margin:8px 0 12px}
.ok-ink{color:var(--green);font-weight:600}
.red-ink{color:var(--red);font-weight:600}
.gold-ink{color:var(--gold);font-weight:600}
/* ---------- справочник ---------- */
.refwrap{background:#fff;border:2px solid var(--ink);border-radius:6px;padding:20px 22px;margin:14px 0;position:relative}
.refwrap::before{content:"СПРАВОЧНЫЕ МАТЕРИАЛЫ · то, что пригодится в задании 8";display:block;text-align:center;
  font-weight:700;letter-spacing:.06em;color:var(--ink);margin-bottom:4px;font-size:15px}
.refrow{display:flex;gap:14px;align-items:center;flex-wrap:wrap;padding:12px 6px;border-bottom:1px dashed var(--chipbd)}
.refrow:last-child{border-bottom:none}
.refrow .formula{flex:0 0 auto;min-width:210px}
.refrow .links{flex:1;min-width:230px}
.refrow .links .lbl{font-size:13px;color:#5b6b85;margin-right:6px}
.refhead{margin:16px 0 4px;font-weight:700;color:var(--pen);font-size:17px}
.refnote{font-size:13px;color:#5b6b85}
/* таблица квадратов */
table.sq{border-collapse:collapse;font-size:13.5px;margin-top:8px}
table.sq td,table.sq th{border:1px solid #9db4cc;padding:3px 6px;text-align:center;min-width:44px}
table.sq th{background:var(--chip);color:var(--pen)}
table.sq td{cursor:pointer;background:#fff}
table.sq td.hl{background:#ffe9a8;font-weight:700}
.sqtool{margin:10px 0}
/* ---------- учимся ---------- */
.tool{border:1.5px dashed var(--chipbd);border-radius:10px;padding:12px 14px;margin:10px 0;background:#fbfdff}
.tool .tl{font-size:13px;color:#5b6b85;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.ladder{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:19px}
.ladder .rung{border:1.5px solid var(--chipbd);border-radius:8px;padding:6px 10px;background:#fff}
.ladder .rung.now{border-color:var(--pen);box-shadow:0 0 0 2px #dfe9fb}
.crosslink{color:var(--pen);text-decoration:underline dotted;cursor:pointer}
.note{background:#fff8e6;border:1.5px solid #eedc9a;border-radius:10px;padding:10px 14px;margin:10px 0}
.seen-tbl{width:100%;border-collapse:collapse;margin:8px 0}
.seen-tbl td,.seen-tbl th{border:1px solid var(--chipbd);padding:7px 10px;text-align:left;vertical-align:top}
.seen-tbl th{background:var(--chip);color:var(--pen)}
.seen-tbl td:first-child{white-space:nowrap}
/* ---------- шаги ---------- */
.steps{margin-top:10px}
.step{border-left:4px solid var(--chipbd);padding:8px 12px;margin:8px 0;background:#fbfdff;border-radius:0 10px 10px 0}
.step.done{border-left-color:var(--green)}
.step.shown{border-left-color:var(--gold)}
.step .q{margin-bottom:6px}
.step .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.step .hint{margin-top:6px;color:#5b6b85;font-size:14.5px;display:none}
.step .hint.on{display:block}
.finline{display:inline-flex;flex-direction:column;vertical-align:middle;text-align:center}
.score{position:fixed;bottom:0;left:0;right:0;background:#fffdf2;border-top:2px solid var(--marg);
  padding:8px 14px;font-size:15px;display:flex;gap:18px;justify-content:center;flex-wrap:wrap;z-index:20}
.score b{color:var(--pen)}
/* ---------- марафон ---------- */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px;margin-top:12px}
.mtask{background:#fff;border:1.5px solid var(--chipbd);border-radius:12px;padding:12px 14px}
.mtask.ok{border-color:var(--green)} .mtask.shown{border-color:var(--gold)}
.mtask .mid{font-size:13px;color:#5b6b85;margin-bottom:4px;display:flex;justify-content:space-between;gap:6px}
.mtask .mrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px}
.mtask .msteps{margin-top:8px}
.filters{display:flex;flex-wrap:wrap;gap:2px;margin-top:6px}
.hintbox{font-size:13px;color:#5b6b85;margin-top:4px}
.quiz-choice{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.quiz-choice button{font:inherit;border:2px solid var(--chipbd);border-radius:10px;background:#fff;
  padding:8px 12px;cursor:pointer;color:var(--pen);font-weight:600}
.quiz-choice button.pick-ok{border-color:var(--green);color:var(--green)}
.quiz-choice button.pick-no{border-color:var(--red);color:var(--red)}
a.jump{color:var(--pen)}
.small{font-size:14px;color:#5b6b85}
@media(max-width:640px){
  .m{font-size:17px} .big{font-size:19px}
  .refrow .formula{min-width:100%}
}
</style>

<body>
<header>
  <div class="htitle">
    <h1 class="hand">Задание 8 ОГЭ · степени и корни</h1>
    <span class="sub">числа, вычисления и алгебраические выражения</span>
  </div>
  <nav class="tabs">
    <button data-v="ref" class="on">📋 Справочник</button>
    <button data-v="learn">📖 Учимся</button>
    <button data-v="step">🪜 Пошагово</button>
    <button data-v="mar">🏃 Марафон</button>
  </nav>
</header>
<main>
<section class="view on" id="view-ref"></section>
<section class="view" id="view-learn"></section>
<section class="view" id="view-step"></section>
<section class="view" id="view-mar"></section>
</main>
<div class="score" id="scorebar"></div>
<script>
"use strict";
/* ================= точная арифметика ================= */
function gcdB(a,b){a=a<0n?-a:a;b=b<0n?-b:b;while(b){const t=a%b;a=b;b=t}return a}
function Fr(n,d=1n){n=BigInt(n);d=BigInt(d);if(d<0n){n=-n;d=-d}const g=gcdB(n,d)||1n;return{n:n/g,d:d/g}}
const fadd=(a,b)=>Fr(a.n*b.d+b.n*a.d,a.d*b.d);
const fmul=(a,b)=>Fr(a.n*b.n,a.d*b.d);
const fdiv=(a,b)=>Fr(a.n*b.d,a.d*b.n);
const feq=(a,b)=>a.n===b.n&&a.d===b.d;
const fint=a=>a.d===1n;
function ipow(b,e){b=BigInt(b);e=BigInt(e);let r=1n;for(let i=0n;i<e;i++)r*=b;return r}
function fpow(f,e){e=Number(e);return e>=0?Fr(ipow(f.n,e),ipow(f.d,e)):Fr(ipow(f.d,-e),ipow(f.n,-e))}
function isqrtB(x){if(x<0n)return null;if(x<2n)return x;let r=BigInt(Math.floor(Math.sqrt(Number(x))));while(r*r>x)r--;while((r+1n)*(r+1n)<=x)r++;return r*r===x?r:null}
function fsqrt(f){const a=isqrtB(f.n),b=isqrtB(f.d);return(a===null||b===null)?null:Fr(a,b)}
function fmtFr(f){ // человеческая запись: целое, десятичная с запятой или a/b
  if(fint(f))return f.n.toString();
  let d=f.d,two=0,five=0;
  while(d%2n===0n){d/=2n;two++} while(d%5n===0n){d/=5n;five++}
  if(d===1n){const k=Math.max(two,five);const num=f.n*ipow(2n,k-two)*ipow(5n,k-five);
    let s=(num<0n?-num:num).toString().padStart(k+1,"0");
    s=s.slice(0,s.length-k)+","+s.slice(s.length-k);
    return (f.n<0n?"−":"")+s;}
  return f.n+"/"+f.d;
}
function parseAns(s){
  if(s==null)return null;
  s=String(s).trim().replace(/\s+/g,"").replace(",",".").replace("−","-");
  if(!s)return null;
  let m=s.match(/^(-?\d+)\/(\d+)$/); if(m)return Fr(m[1],m[2]);
  m=s.match(/^(-?)(\d+)\.(\d+)$/);
  if(m){const sign=m[1]==="-"?-1n:1n;const den=ipow(10n,m[3].length);
    return Fr(sign*(BigInt(m[2])*den+BigInt(m[3])),den);}
  m=s.match(/^-?\d+$/); if(m)return Fr(s);
  return null;
}
/* ================= отрисовка математики ================= */
const M=h=>`<span class="m">${h}</span>`;
const sup=e=>{const n=Number(e);if(!Number.isFinite(n))return `<sup>${e}</sup>`;return n===1?"":`<sup>${n<0?"−"+(-n):n}</sup>`};
const pw=(b,e)=>`${b}${sup(e)}`;
const fr=(a,b)=>`<span class="fr"><span class="fn">${a}</span><span class="fd">${b}</span></span>`;
const rt=x=>`<span class="rt"><svg class="rsv" viewBox="0 0 12 24" preserveAspectRatio="none" aria-hidden="true"><path d="M1 13 L4.6 22.6 L12 0"/></svg><span class="ru">${x}</span></span>`;
const par=x=>`<span class="up">(</span>${x}<span class="up">)</span>`;
const dot=" · ";
const numFr=f=>{ // этажная дробь для смешанного/обычного числа из Fr
  if(fint(f))return f.n.toString();
  const neg=f.n<0n, n=neg?-f.n:f.n;
  const w=n/f.d, r=n%f.d;
  const core=w>0n?`${w}${fr(r,f.d)}`:fr(r,f.d);
  return (neg?"−":"")+core;
};
function atVals(pairs){ // "при a = 2, b = 3" c этажными дробями
  return ` <span class="up" style="font-style:italic">при ${pairs.map(([k,v])=>`${k} = ${typeof v==="object"?numFr(v):v}`).join(", ")}</span>`;
}
/* ---- рендер каждого типа ---- */
const R={
 rootpow:p=>rt(pw(p.b,p.n)),
 rootmono:p=>rt(`${p.c}x${sup(p.p)}y${sup(p.q)}`)+atVals([["x",p.x],["y",p.y]]),
 rootfrac1:p=>fr(rt(pw(p.c1+"a",1).replace("a","a")+"") , "")&&fr(rt(`${p.c1}a${sup(p.p)}`)+dot+rt(`${p.c2}b${sup(p.q)}`), rt("ab"))+atVals([["a",p.a],["b",p.b]]),
 rootfrac2:p=>fr(rt(`${p.c1}a${sup(p.p)}`)+dot+rt(`${p.c2}b${sup(p.q)}`), rt(`a${sup(p.r)}b${sup(p.s)}`))+atVals([["a",p.a],["b",p.b]]),
 sq_over_d:p=>fr(par(`${p.k}${rt(p.m)}`)+"<sup>2</sup>", p.d),
 d_over_sq:p=>fr(p.d, par(`${p.k}${rt(p.m)}`)+"<sup>2</sup>"),
 rootmuldiv:p=>fr(rt(p.m)+dot+rt(p.n), rt(p.d)),
 rootprod3:p=>`${p.k1}${rt(p.m1)}${dot}${p.k2}${rt(p.m2)}${dot}${rt(p.m3)}`,
 rootprod2:p=>rt(`${p.m} · ${p.n}`)+dot+rt(p.k),
 diffsq_int:p=>par(rt(p.a)+" − "+p.b)+par(rt(p.a)+" + "+p.b),
 diffsq_root:p=>par(rt(p.a)+" − "+rt(p.b))+par(rt(p.a)+" + "+rt(p.b)),
 distrib:p=>par(rt(p.A)+(p.sign<0?" − ":" + ")+rt(p.B))+dot+rt(p.B),
 pow_mul_div:p=>fr(pw(p.b,p.p)+dot+pw(p.b,p.q), pw(p.b,p.r)),
 pow_pow_div:p=>fr(par(pw(p.b,p.p))+sup(p.q), pw(p.b,p.r)),
 pow_mul_pow:p=>pw(p.b,p.p)+dot+par(pw(p.b,p.q))+sup(p.r),
 pow_prodbase_div:p=>fr(pw(p.b1,p.p)+dot+pw(p.b2,p.q), pw(p.b1*p.b2,p.r)),
 prodbase_over:p=>fr(par(p.b1+" · "+p.b2)+sup(p.p), pw(p.b1,p.q)+dot+pw(p.b2,p.r)),
 sqsum:p=>p.sign>0
   ? par(rt(p.m)+" + "+p.k)+"<sup>2</sup> − "+(2*p.k)+rt(p.m)
   : par(rt(p.m)+" − "+p.k)+"<sup>2</sup> + "+(2*p.k)+rt(p.m),
 pow_over_num:p=>fr(pw(p.b,p.p), p.d),
 recip_pow:p=>fr(1,pw(p.b,p.p))+dot+fr(1,pw(p.b,p.q)),
 pow_var_div:p=>par(pw("a",p.pp))+sup(p.q)+" : "+pw("a",p.r)+atVals([["a",p.a]]),
 pow_ab:p=>fr(pw("a",p.pp)+dot+par(pw("b",p.q))+sup(p.r), par("a · b")+sup(p.s))+atVals([["a",p.a],["b",rt(p.a)]]),
 root_neg:p=>rt(p.negfirst? par("−a")+sup(p.pp)+dot+pw("a",p.q) : pw("a",p.pp)+dot+par("−a")+sup(p.q))+atVals([["a",p.a]]),
 root_frac_a:p=>rt(fr(`${p.c}a${sup(p.pp)}`, pw("a",p.q)))+atVals([["a",p.a]]),
 root_invc:p=>rt(fr(1,p.c)+" · "+`x${sup(p.pp)}y${sup(p.q)}`)+atVals([["x",p.x],["y",p.y]]),
 root_xy_frac:p=>rt(fr(`${p.c}x${sup(p.pp)}`, pw("y",p.q)))+atVals([["x",p.x],["y",p.y]]),
 fold_square:p=>{
   const A=Math.round(Math.sqrt(p.A)), B=Math.round(Math.sqrt(p.B));
   const t1=(A===1?"":A*A)+"a<sup>2</sup>", t3=(B===1?"":B*B)+"b<sup>2</sup>";
   const t2=(p.K<0?" − ":" + ")+Math.abs(p.K)+"ab";
   return rt(t1+t2+" + "+t3)+atVals([["a",Fr(p.an,p.ad)],["b",Fr(p.bn,p.bd)]]);
 },
 sci:p=>par(`${p.c} · ${pw(10,p.pp)}`)+sup(p.q)+dot+par(`${p.d} · ${pw(10,p.r)}`),
};
function renderTask(t){return M('<span class="big">'+R[t.type](t.p)+'</span>')}
/* rootfrac1 hack above is ugly — переопределим начисто */
R.rootfrac1=p=>fr(rt(`${p.c1}a${sup(p.p)}`)+dot+rt(`${p.c2}b${sup(p.q)}`), rt("ab"))+atVals([["a",p.a],["b",p.b]]);
</script>
<script>
"use strict";
/* ================= построители шагов =================
   Шаг: {q: html-вопрос, ins:[{lbl, val:Fr}], hint: html, show: html}
   Последний шаг — итоговый ответ задачи (одно поле).            */
const I=(val,lbl="")=>({lbl,val:(typeof val==="object"&&val.n!==undefined)?val:Fr(val)});
const S=(q,ins,hint,show)=>({q,ins,hint,show});
const isq=x=>{const r=isqrtB(BigInt(x));return r===null?null:Number(r)};

function buildSteps(t){
  const p=t.p, ty=t.type, st=[];
  const V=(x)=>fmtFr(typeof x==="object"?x:Fr(x));
  switch(ty){
  case "rootpow":{
    if(p.n%2===0){
      const h=p.n/2, v=fpow(Fr(p.b),h);
      st.push(S(`Корень — это «степень пополам»: ${M(rt(pw(p.b,p.n))+" = "+pw(p.b,"?"))}. Какой будет показатель?`,
        [I(h,"показатель")],
        `Проверь себя: ${M(par(pw(p.b,h))+"<sup>2</sup>")} = ${M(pw(p.b,p.n))} — показатели при возведении перемножаются.`,
        `${M(rt(pw(p.b,p.n))+" = "+pw(p.b,h))} — показатель ${p.n} делим пополам: ${h}.`));
      st.push(S(`Осталось вычислить: ${M(pw(p.b,h))} = ?`,[I(v,"ответ")],
        `${M(pw(p.b,h))} — это ${p.b}, умноженное само на себя ${h} раз${h>4?"":""}.`,
        `${M(pw(p.b,h)+" = "+V(v))}.`));
    }else{
      const r=isq(p.b), n2=2*p.n, v=fpow(Fr(r),p.n);
      st.push(S(`Показатель ${p.n} — нечётный, пополам не делится. Но основание — полный квадрат! ${p.b} = ?<sup>2</sup>`,
        [I(r,"основание")],
        `Найди в таблице квадратов (вкладка «Справочник»): какое число в квадрате даёт ${p.b}?`,
        `${p.b} = ${M(pw(r,2))}, значит ${M(pw(p.b,p.n)+" = "+par(pw(r,2))+sup(p.n)+" = "+pw(r,n2))}.`));
      st.push(S(`Теперь под корнем ${M(pw(r,n2))}. Показатели при «степени в степени» перемножаются: 2 · ${p.n} = ${n2}. Извлекаем корень — показатель пополам: ${M(rt(pw(r,n2))+" = "+pw(r,"?"))}`,
        [I(p.n,"показатель")],
        `${n2} : 2 = ?`,

<script>
"use strict";
/* ================= счёт ================= */
const score={solved:0,hints:0,shown:0};
function updScore(){
  document.getElementById("scorebar").innerHTML=
   `<span>решено задач: <b>${score.solved}</b></span>
    <span>подсказок: <b>${score.hints}</b></span>
    <span>показано шагов и ответов: <b>${score.shown}</b></span>`;
}
/* ================= вкладки ================= */
const views={};
document.querySelectorAll("nav.tabs button").forEach(b=>{
  b.onclick=()=>showView(b.dataset.v);
});
function showView(v){
  document.querySelectorAll("nav.tabs button").forEach(x=>x.classList.toggle("on",x.dataset.v===v));
  document.querySelectorAll("section.view").forEach(x=>x.classList.toggle("on",x.id==="view-"+v));
  window.scrollTo({top:0});
}
function gotoLearn(anchor){
  showView("learn");
  const el=document.getElementById(anchor);
  if(el){el.scrollIntoView({behavior:"smooth",block:"start"});
    el.style.boxShadow="0 0 0 3px #ffd76e";setTimeout(()=>el.style.boxShadow="",1600);}
}
function gotoMarathon(groupKey){
  showView("mar");
  marSetFilter(groupKey);
}
function gotoStep(famKey){
  showView("step");
  stepSetFam(famKey);
}
/* ================= движок шагов =================
   mountSteps(container, steps, {onSolved, taskLabel}) */
function mountSteps(box, steps, opts={}){
  box.innerHTML="";
  let idx=0, usedShow=false, usedHint=false;
  const wrap=document.createElement("div");wrap.className="steps";box.appendChild(wrap);
  function renderStep(){
    const s=steps[idx], last=idx===steps.length-1;
    const div=document.createElement("div");div.className="step";
    const inputs=s.ins.map((inp,i)=>`
      <label style="display:inline-flex;align-items:center;gap:5px">${inp.lbl?`<span class="small">${inp.lbl}:</span>`:""}
      <input class="ans" data-i="${i}" inputmode="text" autocomplete="off"></label>`).join(" ");
    div.innerHTML=`<div class="q">${s.q}</div>
      <div class="row">${inputs}
        <button class="act ck">Проверить</button>
        ${s.hint?`<button class="act sec hb">Подсказка</button>`:""}
        <button class="act show sb">${last?"Показать ответ":"Показать шаг"}</button>
        <span class="fb"></span></div>
      ${s.hint?`<div class="hint">${s.hint}</div>`:""}`;
    wrap.appendChild(div);
    const fb=div.querySelector(".fb");
    const ins=[...div.querySelectorAll("input.ans")];
    ins[0].focus({preventScroll:true});
    function finish(shown){
      div.classList.add(shown?"shown":"done");
      div.querySelectorAll("button").forEach(b=>b.disabled=true);
      ins.forEach(x=>x.disabled=true);
      idx++;
      if(idx<steps.length){renderStep();}
      else{
        const fin=document.createElement("div");
        fin.className="step "+(usedShow?"shown":"done");
        fin.innerHTML=usedShow
          ?`<span class="gold-ink">Задача разобрана с показом — в «решено» не идёт. Возьми похожую и добей сам!</span>`
          :`<span class="ok-ink">✓ Задача решена${usedHint?" (с подсказкой)":""} — молодец!</span>`;
        wrap.appendChild(fin);
        if(!usedShow){score.solved++;}
        updScore();
        if(opts.onSolved)opts.onSolved(!usedShow);
      }
    }
    div.querySelector(".ck").onclick=()=>{
      let allOk=true;
      ins.forEach((inp,i)=>{
        const v=parseAns(inp.value);
        const ok=v&&feq(v,s.ins[i].val);
        inp.classList.toggle("ok",!!ok);inp.classList.toggle("no",!ok);
        if(!ok)allOk=false;
      });
      if(allOk){fb.textContent="верно ✓";fb.className="fb ok";finish(false);}
      else{fb.textContent="не то, попробуй ещё";fb.className="fb no";}
    };
    const hb=div.querySelector(".hb");
    if(hb)hb.onclick=()=>{div.querySelector(".hint").classList.add("on");
      if(!usedHint){usedHint=true;score.hints++;updScore();}};
    div.querySelector(".sb").onclick=()=>{
      ins.forEach((inp,i)=>{inp.value=fmtFr(s.ins[i].val);inp.classList.add("ok");});
      fb.innerHTML=`— ${last?"ответ показан":"шаг показан"}`;fb.className="fb shown";
      if(s.show){const d2=document.createElement("div");d2.className="hint on";d2.innerHTML=s.show;div.appendChild(d2);}
      usedShow=true;score.shown++;updScore();
      finish(true);
    };
    ins.forEach(inp=>inp.addEventListener("keydown",e=>{if(e.key==="Enter")div.querySelector(".ck").click();}));
  }
  renderStep();
}
/* ================= группы типов ================= */
const GROUPS=[
 {k:"rootdeg", name:"Корень из степени", types:["rootpow"], nums:"№1–2", learn:"p3", fam:"F"},
 {k:"letters", name:"Корни с буквами", types:["rootmono","rootfrac1","rootfrac2","root_neg","root_frac_a","root_invc","root_xy_frac"], nums:"№3–5, 26–29", learn:"p3", fam:"F"},
 {k:"sqroot", name:"Квадрат бьёт корень", types:["sq_over_d","d_over_sq"], nums:"№6–7", learn:"p5", fam:"C"},
 {k:"prod", name:"Произведение корней", types:["rootmuldiv","rootprod3","rootprod2","distrib"], nums:"№8–10, 13–14", learn:"p4", fam:"C"},
 {k:"dsq", name:"Разность квадратов", types:["diffsq_int","diffsq_root"], nums:"№11–12", learn:"p5", fam:"D"},
 {k:"sqsum", name:"Квадрат суммы", types:["sqsum"], nums:"№20–21", learn:"p5", fam:"E"},
 {k:"fold", name:"Свернуть в квадрат", types:["fold_square"], nums:"№30–31", learn:"p5", fam:"G"},
 {k:"pow1", name:"Степени: одно основание", types:["pow_mul_div","pow_pow_div","pow_mul_pow","pow_over_num","recip_pow","pow_var_div"], nums:"№15–17, 22–24", learn:"p2", fam:"A"},
 {k:"pow2", name:"Степени: два основания", types:["pow_prodbase_div","prodbase_over","pow_ab"], nums:"№18–19, 25", learn:"p2", fam:"B"},
 {k:"sci", name:"Стандартный вид числа", types:["sci"], nums:"№32", learn:"p2", fam:"H"},
];
const typeGroup={};GROUPS.forEach(g=>g.types.forEach(t=>typeGroup[t]=g.k));
const grpByK=Object.fromEntries(GROUPS.map(g=>[g.k,g]));

/* ================= СПРАВОЧНИК ================= */
function chipsFor(gkeys){
  return gkeys.map(k=>{const g=grpByK[k];
    return `<span class="pill" onclick="gotoMarathon('${k}')" title="открыть эти задачи в марафоне">${g.nums} · ${g.name}</span>`;
  }).join("");
}
function refRow(formulaHtml, learnAnchor, gkeys, note=""){
  return `<div class="refrow">
    <div class="formula">${M('<span class="big">'+formulaHtml+'</span>')}${note?`<div class="refnote">${note}</div>`:""}</div>
    <div class="links">
      <span class="lbl">разобраться:</span><span class="pill" onclick="gotoLearn('${learnAnchor}')">📖 объяснение</span>
      <span class="lbl">где встречается:</span>${chipsFor(gkeys)}
    </div></div>`;
}
function buildRef(){
  const v=document.getElementById("view-ref");
  let sq="";
  {// таблица квадратов
    let head=`<tr><th></th>`;for(let u=0;u<10;u++)head+=`<th>${u}</th>`;head+="</tr>";
    let rows="";
    for(let d=1;d<=9;d++){
      rows+=`<tr><th>${d}</th>`;
      for(let u=0;u<10;u++){const n=d*10+u;rows+=`<td data-n="${n}" onclick="sqCell(${n})">${n*n}</td>`;}
      rows+="</tr>";
    }
    sq=`<table class="sq"><tr><th rowspan="2">Десятки</th><th colspan="10">Единицы</th></tr>${head}${rows}</table>`;
  }
  v.innerHTML=`
  <div class="card">
    <h2>Как устроен этот лист</h2>
    <p>Это — те строчки из официального справочного материала ОГЭ, которые кормят <b>задание 8</b>. Такой же лист будет лежать перед тобой на экзамене. Рядом с каждой формулой — кнопки: <span class="pill ghost">📖 объяснение</span> ведёт к понятному разбору, а кнопки с номерами открывают в марафоне именно те задачи, где формула работает.</p>
  </div>
  <div class="refwrap">
    <div class="refhead">Свойства арифметического квадратного корня</div>
    ${refRow(rt("ab")+" = "+rt("a")+" · "+rt("b"),"p4",["prod","letters","sqroot"],"при a ≥ 0, b ≥ 0")}
    ${refRow(rt(fr("a","b"))+" = "+fr(rt("a"),rt("b")),"p4",["prod","letters"],"при a ≥ 0, b > 0")}
    ${refRow(par(rt("a"))+"<sup>2</sup> = a","p5",["sqroot","dsq","sqsum"],"этой строчки нет на листе — но это само определение корня")}
    <div class="refhead">Свойства степени (a > 0, b > 0)</div>
    ${refRow("a<sup>−n</sup> = "+fr(1,"a<sup>n</sup>"),"p1",["pow1"])}

    <div class="refhead">Формулы сокращённого умножения</div>
    ${refRow(par("a + b")+"<sup>2</sup> = a<sup>2</sup> + 2ab + b<sup>2</sup>","p5",["sqsum","fold"])}
    ${refRow(par("a − b")+"<sup>2</sup> = a<sup>2</sup> − 2ab + b<sup>2</sup>","p5",["sqsum","fold"])}
    ${refRow("a<sup>2</sup> − b<sup>2</sup> = "+par("a − b")+par("a + b"),"p5",["dsq"])}
    <div class="refhead">Таблица квадратов двузначных чисел</div>
    <div class="sqtool">

      <div style="margin:6px 0"><input class="ans" id="sqFind" style="width:130px" placeholder="напр. 2116">
      <button class="act" onclick="sqSearch()">Найти корень</button> <span class="fb" id="sqFb"></span></div>
      ${sq}
      <div class="hintbox">Клик по клетке подсветит её: строка — десятки, столбец — единицы. Например, 46² = 2116, значит ${M(rt(2116)+" = 46")}.</div>
    </div>

    <h3>С чего начать</h3>
    <p>Если тема новая — иди во вкладку <span class="crosslink" onclick="showView('learn')">📖 Учимся</span>: там всё по пунктам и с тренажёрчиками. Если хочешь набить руку — <span class="crosslink" onclick="showView('step')">🪜 Пошагово</span> генерирует задачи бесконечно и проверяет каждый шаг. Готов к бою — <span class="crosslink" onclick="showView('mar')">🏃 Марафон</span>: все 160 задач из реальных подборок к ОГЭ 2026.</p>
  </div>`;
}
window.sqCell=function(n){
  document.querySelectorAll("table.sq td").forEach(td=>td.classList.toggle("hl",+td.dataset.n===n));
  const fb=document.getElementById("sqFb");
  fb.textContent=`${n}² = ${n*n}, значит √${n*n} = ${n}`;fb.className="fb ok";
};
window.sqSearch=function(){
  const fb=document.getElementById("sqFb");
  const x=parseAns(document.getElementById("sqFind").value);
  if(!x||!fint(x)){fb.textContent="введи целое число";fb.className="fb no";return;}
  const r=isqrtB(x.n<0n?-x.n:x.n);
  if(r!==null&&r>=10n&&r<=99n){sqCell(Number(r));}
  else if(r!==null){fb.textContent=`√${x.n} = ${r} (это вне таблицы, но точный квадрат)`;fb.className="fb ok";
    document.querySelectorAll("table.sq td.hl").forEach(td=>td.classList.remove("hl"));}
  else{fb.textContent=`${x.n} — не точный квадрат, в таблице его нет`;fb.className="fb no";
    document.querySelectorAll("table.sq td.hl").forEach(td=>td.classList.remove("hl"));}
};

/* --- лесенка --- */
let LB=2,LE=3;
window.ladderBase=function(b){LB=b;LE=3;ladderDraw();};
window.ladderMove=function(d){LE=Math.max(-3,Math.min(4,LE+d));ladderDraw();};
function ladderDraw(){
  const box=document.getElementById("ladder");let h="";
  for(let e=4;e>=-3;e--){
    const val=e>=0?fmtFr(fpow(Fr(LB),e)):fr(1,fmtFr(fpow(Fr(LB),-e)));
    h+=`<span class="rung ${e===LE?"now":""}">${M(pw(LB,e)+" = "+val)}</span>`;
  }
  box.innerHTML=h;
  const n=document.getElementById("ladderNote");
  n.innerHTML=LE>0?`Пока всё привычно: ${M(pw(LB,LE))} — это ${LE===1?"просто "+LB:LB+" перемножили "+LE+" раз(а)"}. Спускайся ниже нуля!`
    :LE===0?`Шаг вниз — деление на ${LB}. Из ${M(pw(LB,1)+" = "+LB)} получаем ${M(pw(LB,0)+" = 1")}. Любое число в нулевой степени — единица!`
    :`Продолжаем делить на ${LB} — и уходим в дроби: ${M(pw(LB,LE)+" = "+fr(1,pw(LB,-LE)))}. Отрицательная степень = перевёрнутая положительная.`;
}
/* --- разворачивалка правил --- */
const RULES=[
 {t:"aⁿ · aᵐ = aⁿ⁺ᵐ",show:()=>`${M("2<sup>3</sup> · 2<sup>2</sup>")} = ${M("(2 · 2 · 2) · (2 · 2)")} — всего двоек: 3 + 2 = 5 штук = ${M("2<sup>5</sup>")}. Множители просто выстраиваются в один ряд, поэтому показатели <b>складываются</b>.`},
 {t:"aⁿ / aᵐ = aⁿ⁻ᵐ",show:()=>`${M(fr("2<sup>5</sup>","2<sup>2</sup>"))} = ${M(fr("2 · 2 · 2 · 2 · 2","2 · 2"))} — две двойки снизу съедают две сверху, остаётся 5 − 2 = 3: ${M("2<sup>3</sup>")}. Показатели <b>вычитаются</b>.`},
 {t:"(aⁿ)ᵐ = aⁿᵐ",show:()=>`${M(par("2<sup>3</sup>")+"<sup>2</sup>")} = ${M("2<sup>3</sup> · 2<sup>3</sup>")} — тройка двоек, взятая 2 раза: 3 · 2 = 6 двоек = ${M("2<sup>6</sup>")}. Показатели <b>перемножаются</b>.`},
 {t:"(ab)ⁿ = aⁿbⁿ",show:()=>`${M(par("2 · 5")+"<sup>3</sup>")} = ${M("(2·5)(2·5)(2·5)")} = ${M("2·2·2 · 5·5·5")} = ${M("2<sup>3</sup> · 5<sup>3</sup>")}. Показатель <b>раздаётся каждому</b>. Проверка: 10³ = 1000 = 8 · 125 ✓`},
 {t:"a⁻ⁿ = 1/aⁿ",show:()=>`Смотри лесенку в пункте 1: каждый шаг показателя вниз — деление на a. Ниже ${M("a<sup>0</sup> = 1")} начинаются дроби: ${M("2<sup>−3</sup> = "+fr(1,"2<sup>3</sup>")+" = "+fr(1,8))}.`},
];
function ruleBtnsInit(){
  const b=document.getElementById("ruleBtns");

  ruleShow(0);
}
window.ruleShow=function(i){document.getElementById("ruleShow").innerHTML=`<div class="note">${RULES[i].show()}</div>`;};
/* --- корень из степени: проверялка --- */
window.halfGo=function(){
  const o=document.getElementById("halfOut");
  const x=parseAns(document.getElementById("halfIn").value);
  if(!x||!fint(x)||x.n<1n||x.n>12n){o.innerHTML="возьми целый показатель от 1 до 12";return;}
  const n=Number(x.n);
  if(n%2===0){o.innerHTML=`${M(rt("5<sup>"+n+"</sup>")+" = 5<sup>"+(n/2)+"</sup>")} — показатель пополам. Проверка: ${M(par("5<sup>"+(n/2)+"</sup>")+"<sup>2</sup> = 5<sup>"+n+"</sup>")} ✓`;}
  else{o.innerHTML=`${n} — нечётный, пополам не делится. С основанием 5 корень «красиво» не берётся: ${M(rt("5<sup>"+n+"</sup>")+" = 5<sup>"+((n-1)/2)+"</sup>"+rt(5))}. В ОГЭ при нечётном показателе основание всегда будет полным квадратом (4, 9, 16, 25) — тогда работает случай 2 ниже.`;}
};
/* --- объединялка корней --- */
window.uniGo=function(){
  const o=document.getElementById("unOut");
  const a=parseAns(document.getElementById("unA").value),b=parseAns(document.getElementById("unB").value);
  if(!a||!b||!fint(a)||!fint(b)||a.n<1n||b.n<1n||a.n>10000n||b.n>10000n){o.innerHTML="введи два натуральных числа";return;}
  const P=a.n*b.n,r=isqrtB(P);
  o.innerHTML=`${M(rt(String(a.n))+" · "+rt(String(b.n))+" = "+rt(a.n+" · "+b.n)+" = "+rt(String(P)))}${r!==null?M(" = "+r)+` — полный квадрат, корень взялся!`:` — не полный квадрат: так и останется ${M(rt(String(P)))}. Подбери пару, чтобы произведение стало квадратом (например ${a.n} и ${a.n}).`}`;
};
window.uniRnd=function(){
  const pairs=[[32,2],[27,3],[8,2],[18,2],[12,3],[50,2],[20,5],[48,3],[45,5],[24,6]];
  const p=pairs[Math.floor(Math.random()*pairs.length)];

};
/* --- ФСУ раскрывалка --- */
const FSU=[{m:5,k:9},{m:19,k:7},{m:3,k:8},{m:11,k:3},{m:13,k:3},{m:17,k:6}];
let fsuI=-1;
window.fsuNext=function(){
  fsuI=(fsuI+1)%FSU.length;
  const {m,k}=FSU[fsuI];const minus=fsuI%2===1;const s1=minus?"−":"+",s2=minus?"+":"−";
  document.getElementById("fsuShow").innerHTML=
   `<p>${M('<span class="big">'+par(rt(m)+" "+s1+" "+k)+"<sup>2</sup> "+s2+" "+(2*k)+rt(m)+'</span>')}</p>
    <p>Раскрываем квадрат: ${M(par(rt(m))+"<sup>2</sup> "+s1+" 2 · "+k+" · "+rt(m)+" + "+k+"<sup>2</sup>")} = ${M(m+" "+s1+" "+(2*k)+rt(m)+" + "+(k*k))}</p>
    <p>Теперь вместе с хвостом: ${M(m+" "+s1+" "+(2*k)+rt(m)+" + "+(k*k)+" "+s2+" "+(2*k)+rt(m))} — слагаемые <b>${s1}${2*k}${"√"+m}</b> и <b>${s2}${2*k}${"√"+m}</b> взаимно уничтожились.</p>
    <p class="ok-ink">Ответ: ${m} + ${k*k} = ${m+k*k}. Корень даже вычислять не пришлось.</p>`;
};
/* --- квиз «определи приём» --- */
const QUIZFAMS=[
 {k:"deg",n:"корень из степени / с буквами",g:["rootdeg","letters"]},
 {k:"prod",n:"корни — под один корень",g:["prod"]},
 {k:"dsq",n:"разность квадратов",g:["dsq"]},
 {k:"sq",n:"раскрыть или свернуть квадрат",g:["sqsum","fold","sqroot"]},
 {k:"pow",n:"правила степеней",g:["pow1","pow2","sci"]},
];
let quizTask=null;
window.quizNew=function(){
  quizTask=BANK[Math.floor(Math.random()*BANK.length)];
  const fam=QUIZFAMS.find(f=>f.g.includes(typeGroup[quizTask.type]));
  const box=document.getElementById("quizBox");
  box.innerHTML=`<div class="tl">задача №${quizTask.id} из банка</div>
   <div class="expr">${renderTask(quizTask)}</div>
   <p><b>Шаг 1.</b> Каким приёмом решается?</p>
   <div class="quiz-choice">${QUIZFAMS.map(f=>`<button data-k="${f.k}">${f.n}</button>`).join("")}</div>
   <div id="quizStage2"></div>`;
  box.querySelectorAll(".quiz-choice button").forEach(b=>{
    b.onclick=()=>{
      if(b.dataset.k===fam.k){
        b.classList.add("pick-ok");
        box.querySelectorAll(".quiz-choice button").forEach(x=>x.disabled=true);
        const s2=document.getElementById("quizStage2");
        s2.innerHTML=`<p class="ok-ink">верно ✓ — это «${fam.n}»</p><p><b>Шаг 2.</b> Теперь реши по шагам:</p><div class="qsteps"></div>`;
        mountSteps(s2.querySelector(".qsteps"),buildSteps(quizTask));
      }else{
        b.classList.add("pick-no");
        setTimeout(()=>b.classList.remove("pick-no"),900);
      }

};

<script>
"use strict";
/* ================= генераторы для «Пошагово» ================= */
const ri=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
const pick=a=>a[ri(0,a.length-1)];
const NONSQ=[2,3,5,6,7,10,11,13,14,15,17,19,21,22,23,26,29,31,33,37,41,43,47];
function maxE(b){return b<3?6:b<4?5:b<6?4:b<10?3:2;}
const GEN={
 pow_mul_div(){const b=pick([2,3,5,7,11]),e=ri(2,maxE(b)),p=-ri(2,9),r=ri(4,12);
   return{type:"pow_mul_div",p:{b,p,q:e+r-p,r}};},
 pow_pow_div(){const b=pick([2,3,5,7,11]),e=ri(2,maxE(b)),pp=ri(2,8),q=-ri(2,5);
   return{type:"pow_pow_div",p:{b,p:pp,q,r:pp*q-e}};},
 pow_mul_pow(){const b=pick([2,3,5,7,11]),e=ri(1,maxE(b)),q=ri(2,7),r=ri(2,4);
   return{type:"pow_mul_pow",p:{b,p:e-q*r,q,r}};},
 pow_over_num(){const b=pick([2,3,4,5]),e=ri(1,maxE(b)),q=ri(2,b===2?6:b===3?4:3);
   return{type:"pow_over_num",p:{b,p:q+e,d:Number(ipow(BigInt(b),q))}};},
 recip_pow(){const b=pick([2,3,5,7]),e=ri(1,maxE(b)),p=-ri(6,14);
   return{type:"recip_pow",p:{b,p,q:-p-e}};},
 pow_var_div(){const a=pick([3,4,5]),e=ri(2,maxE(a)),pp=ri(2,7),q=-ri(2,5);
   return{type:"pow_var_div",p:{pp,q,r:pp*q-e,a}};},
 pow_prodbase_div(){
   for(;;){const [b1,b2]=pick([[4,11],[2,11],[7,10],[3,10],[7,9],[2,7],[3,5],[5,6],[2,13]]);
     const r=ri(4,9),e1=ri(0,2),e2=ri(0,2);
     if(e1===0&&e2===0)continue;
     const val=Math.pow(b1,e1)*Math.pow(b2,e2);
     if(val>20000)continue;
     return{type:"pow_prodbase_div",p:{b1,p:r+e1,b2,q:r+e2,r}};}},
 prodbase_over(){
   for(;;){const [b1,b2]=pick([[3,4],[2,6],[2,10],[2,5],[3,6],[3,7],[2,7]]);
     const pp=ri(4,8),e1=ri(0,2),e2=ri(0,2);
     if(e1===0&&e2===0)continue;
     const val=Math.pow(b1,e1)*Math.pow(b2,e2);
     if(val>20000)continue;
     return{type:"prodbase_over",p:{b1,b2,p:pp,q:pp-e1,r:pp-e2}};}},
 pow_ab(){const a=pick([3,5,6]),r=pick([2,3]),q=ri(5,9),s=q*r,extra=ri(2,maxE(a));
   return{type:"pow_ab",p:{pp:s+extra,q,r,s,a}};},
 rootmuldiv(){const a=ri(2,9);let x=pick([2,3,5,6,7]),y=pick([2,3,5,7]);
   if(x===y)y=y===7?5:y+1;
   return{type:"rootmuldiv",p:{m:a*x,n:a*y,d:x*y}};},
 rootprod3(){const k1=ri(2,7),k2=ri(2,6),u=pick([2,3,5,6,7,10,11,13,15]),v=pick([2,3]);
   return u===v?GEN.rootprod3():{type:"rootprod3",p:{k1,m1:u,k2,m2:v,m3:u*v}};},
 rootprod2(){const s=pick([2,3,5,7,11]),t=pick([2,5]),a=ri(2,3);
   return{type:"rootprod2",p:{m:s,n:a*a*t,k:s*t}};},
 distrib(){const B=pick([2,3,5]),c=ri(2,5);
   return{type:"distrib",p:{A:B*c*c,B,sign:pick([-1,1])}};},
 sq_over_d(){const k=ri(2,4),m=pick([2,3,5,10]),sq=k*k*m;
   if(Math.random()<0.5){const mult=pick([2,4,5,10]);return{type:"sq_over_d",p:{k,m,d:sq*mult}};}
   const divs=[];for(let i=1;i<=sq;i++)if(sq%i===0&&sq/i>1&&sq/i<=12)divs.push(i);
   return{type:"sq_over_d",p:{k,m,d:pick(divs)}};},
 d_over_sq(){const k=ri(2,4),m=pick([2,3,5,10]),mult=ri(2,12);
   return{type:"d_over_sq",p:{k,m,d:k*k*m*mult}};},
 diffsq_int(){for(;;){const a=ri(5,90),b=ri(2,8);
   if(isqrtB(BigInt(a))!==null||a-b*b<1)continue;
   return{type:"diffsq_int",p:{a,b}};}},
 diffsq_root(){const a=pick(NONSQ.filter(x=>x>4)),b=pick(NONSQ.filter(x=>x<a));
   return{type:"diffsq_root",p:{a,b}};},
 sqsum(){return{type:"sqsum",p:{m:pick(NONSQ.filter(x=>x<31)),k:ri(2,9),sign:pick([-1,1])}};},
 rootpow(){
   if(Math.random()<0.5){const b=ri(2,9),n=pick(b<4?[4,6,8]:[4,6]);
     if(Math.pow(b,n/2)>100000)return GEN.rootpow();
     return{type:"rootpow",p:{b,n}};}
   const b=pick([4,9,16,25]),n=b>9?3:pick([3,5]);
   return{type:"rootpow",p:{b,n}};},
 rootmono(){for(;;){const c=pick([4,9,16,25,36,49]),pp=pick([2,4]),q=pick([2,4,6]),x=ri(2,7),y=ri(2,7);
   const v=Math.sqrt(c)*Math.pow(x,pp/2)*Math.pow(y,q/2);
   if(v>30000)continue;
   return{type:"rootmono",p:{c,p:pp,q,x,y}};}},
 root_frac_a(){const c=pick([4,9,16,25]),a=pick([2,3,5]),diff=a>3?pick([2,4]):pick([2,4,6]),q=ri(6,12);
   return{type:"root_frac_a",p:{c,pp:q+diff,q,a}};},
 root_xy_frac(){for(;;){const c=pick([4,9,16,25,36]),pp=pick([2,4]),q=pick([2,4]),x=ri(2,12),y=ri(2,5);
   const num=Math.sqrt(c)*Math.pow(x,pp/2),den=Math.pow(y,q/2);
   if(num%den!==0||num/den>500||num/den<2)continue;
   return{type:"root_xy_frac",p:{c,pp,q,x,y}};}},
 root_neg(){for(;;){const a=ri(2,5),pp=pick([2,4,6]),q=pick([2,4,6]);
   if(Math.pow(a,(pp+q)/2)>100000)continue;
   return{type:"root_neg",p:{pp,q,a,negfirst:pick([0,1])}};}},
 fold_square(){
   if(Math.random()<0.5){ // целые, со знаками и модулем
     const sa=pick([1,1,1,2,3,6]),sb=sa===1?pick([2,3,4,5]):1,sg=pick([-1,1]);
     const a=ri(2,9),b=pick([-1,1])*ri(2,9);
     return{type:"fold_square",p:{A:sa*sa,K:sg*2*sa*sb,B:sb*sb,an:a,ad:1,bn:b,bd:1}};}
   const den=pick([3,5,7,11,13]),R=ri(4,16),sb=pick([2,3,4,5,6]);
   const n2=ri(1,Math.max(1,Math.floor((R*den-1)/sb))),n1=R*den-sb*n2;
   return{type:"fold_square",p:{A:1,K:2*sb,B:sb*sb,an:n1,ad:den,bn:n2,bd:den}};},
 sci(){for(;;){const c=pick([2,3,6,8,9]),q=c>3?2:pick([2,3]),pp=pick([2,-2]),E=ri(1,3),d=ri(3,19);
   if(Math.pow(c,q)*d*Math.pow(10,E)>1000000)continue;
   return{type:"sci",p:{c,pp,q,d,r:E-pp*q}};}},
};
const FAMS=[
 {k:"A",name:"Степени: одно основание",gens:["pow_mul_div","pow_pow_div","pow_mul_pow","pow_over_num","recip_pow","pow_var_div"],learn:"p2"},
 {k:"B",name:"Степени: два основания",gens:["pow_prodbase_div","prodbase_over","pow_ab"],learn:"p2"},
 {k:"C",name:"Произведение корней",gens:["rootmuldiv","rootprod3","rootprod2","distrib","sq_over_d","d_over_sq"],learn:"p4"},
 {k:"D",name:"Разность квадратов",gens:["diffsq_int","diffsq_root"],learn:"p5"},
 {k:"E",name:"Квадрат суммы",gens:["sqsum"],learn:"p5"},
 {k:"F",name:"Корень из степени, буквы",gens:["rootpow","rootmono","root_frac_a","root_xy_frac","root_neg"],learn:"p3"},
 {k:"G",name:"Свернуть в квадрат",gens:["fold_square"],learn:"p5"},
 {k:"H",name:"Стандартный вид",gens:["sci"],learn:"p2"},
];
let curFam="A";
function buildStep(){
  const v=document.getElementById("view-step");
  v.innerHTML=`<div class="card">
    <h2>Пошаговый решатель</h2>
    <p>Выбери семейство — тренажёр будет выдавать такие задачи бесконечно и проверять каждый шаг. Застрял — жми «Подсказка» или «Показать шаг» (показанное честно не идёт в счёт решённых).</p>
    <div class="filters" id="famChips"></div>
    <div class="small" style="margin-top:6px">не помнишь приём? <span class="crosslink" id="famLearn"></span></div>
  </div>
  <div class="card">
    <div class="expr" id="stepExpr"></div>
    <div id="stepBox"></div>
    <div style="margin-top:10px"><button class="act" onclick="stepNew()">Новая задача</button></div>
  </div>`;
  const ch=document.getElementById("famChips");
  ch.innerHTML=FAMS.map(f=>`<span class="pill" data-k="${f.k}">${f.name}</span>`).join("");
  ch.querySelectorAll(".pill").forEach(p=>p.onclick=()=>stepSetFam(p.dataset.k));
  stepSetFam("A");
}
window.stepSetFam=function(k){
  curFam=k;
  document.querySelectorAll("#famChips .pill").forEach(p=>p.classList.toggle("on",p.dataset.k===k));
  const f=FAMS.find(f=>f.k===k);
  const L=document.getElementById("famLearn");
  L.textContent=`открой объяснение в «Учимся»`;
  L.onclick=()=>gotoLearn(f.learn);
  stepNew();
};
window.stepNew=function(){
  const f=FAMS.find(f=>f.k===curFam);
  const t=GEN[pick(f.gens)]();
  document.getElementById("stepExpr").innerHTML=`<span class="small">найди значение выражения:</span><br>${renderTask(t)}`;
  mountSteps(document.getElementById("stepBox"),buildSteps(t));
};
/* ================= МАРАФОН ================= */
let marFilter="all";
const marState={}; // id -> "ok"|"shown"
function buildMar(){
  const v=document.getElementById("view-mar");
  v.innerHTML=`<div class="card">
    <h2>Марафон · 160 задач формата ОГЭ 2026</h2>
    <p>Подборка Math4Skill по заданию 8, все 32 сюжета. Вводи ответ как в бланке: целое число или десятичная дробь через запятую (например <b>0,5</b>). У каждой задачи есть «Решить по шагам» — та же задача, разобранная на проверяемые шаги.</p>
    <div class="filters" id="marChips"></div>
    <div class="small" id="marCount" style="margin-top:6px"></div>
  </div>
  <div class="mgrid" id="marGrid"></div>`;
  const ch=document.getElementById("marChips");
  ch.innerHTML=`<span class="pill" data-k="all">все</span>`+GROUPS.map(g=>`<span class="pill" data-k="${g.k}">${g.nums} ${g.name}</span>`).join("");
  ch.querySelectorAll(".pill").forEach(p=>p.onclick=()=>marSetFilter(p.dataset.k));
  marSetFilter("all");
}
window.marSetFilter=function(k){
  marFilter=k;
  document.querySelectorAll("#marChips .pill").forEach(p=>p.classList.toggle("on",p.dataset.k===k));
  const list=BANK.filter(t=>k==="all"||typeGroup[t.type]===k);
  document.getElementById("marCount").textContent=`показано задач: ${list.length}`;
  const grid=document.getElementById("marGrid");
  grid.innerHTML="";
  list.forEach(t=>grid.appendChild(marCard(t)));
};
function marCard(t){
  const g=grpByK[typeGroup[t.type]];
  const ansFr=Fr(t.ans[0],t.ans[1]);
  const div=document.createElement("div");
  div.className="mtask"+(marState[t.id]==="ok"?" ok":marState[t.id]==="shown"?" shown":"");
  div.innerHTML=`<div class="mid"><span>№ ${t.id} · ${g.name}</span>
      <span class="crosslink" data-a="learn">теория</span></div>
    <div class="expr">${renderTask(t)}</div>
    <div class="mrow">
      <input class="ans" placeholder="ответ">
      <button class="act ck">Проверить</button>
      <button class="act show sa">Показать ответ</button>
      <span class="fb"></span></div>
    <div class="mrow"><button class="act sec bs">🪜 Решить по шагам</button></div>
    <div class="msteps"></div>`;
  const inp=div.querySelector("input"),fb=div.querySelector(".fb");
  const markDone=(shown)=>{
    if(marState[t.id])return;
    marState[t.id]=shown?"shown":"ok";
    div.classList.add(shown?"shown":"ok");
    if(!shown){score.solved++;updScore();}
  };
  div.querySelector('[data-a="learn"]').onclick=()=>gotoLearn(g.learn);
  div.querySelector(".ck").onclick=()=>{
    const v=parseAns(inp.value);
    if(v&&feq(v,ansFr)){inp.classList.remove("no");inp.classList.add("ok");
      fb.textContent="верно ✓";fb.className="fb ok";markDone(false);}
    else{inp.classList.remove("ok");inp.classList.add("no");
      fb.textContent="не то, попробуй ещё";fb.className="fb no";}
  };
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")div.querySelector(".ck").click();});
  div.querySelector(".sa").onclick=()=>{
    inp.value=fmtFr(ansFr);inp.classList.add("ok");inp.classList.remove("no");
    fb.textContent="— ответ показан";fb.className="fb shown";
    score.shown++;updScore();markDone(true);
  };
  div.querySelector(".bs").onclick=()=>{
    const box=div.querySelector(".msteps");
    if(box.childElementCount){box.innerHTML="";return;}
    mountSteps(box,buildSteps(t),{onSolved:(clean)=>{
      if(marState[t.id])return;
      // счёт уже обновил mountSteps; здесь только помечаем карточку
      marState[t.id]=clean?"ok":"shown";
      div.classList.add(clean?"ok":"shown");
    }});
  };
  return div;
}
/* ================= старт ================= */
buildRef();buildLearn();buildStep();buildMar();updScore();
</script>
