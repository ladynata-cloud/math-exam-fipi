<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Элементарные неравенства на числовой прямой</title>
<style>
:root{--bg:#f7f6f2;--card:#fff;--line:#e2ddd6;--text:#1a1714;--muted:#7a746c;--indigo:#3730a3;--soft:#eef2ff;--green:#166534;--green2:#16a34a;--red:#991b1b;--red2:#dc2626;--purple:#7c3aed;--blue:#1d4ed8;--shadow:0 2px 14px rgba(0,0,0,.08)}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);background-image:radial-gradient(circle at 1px 1px,#d6d1ca 1px,transparent 0);background-size:28px 28px;font-family:Helvetica Neue,Arial,sans-serif;color:var(--text);padding:22px 14px 44px;display:flex;flex-direction:column;align-items:center}.top{width:min(760px,100%);display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}.back{color:var(--indigo);font-weight:800;text-decoration:none}.title{font-family:Georgia,serif;font-size:1.35rem}.title span{color:var(--indigo);font-style:italic}.score{background:var(--soft);border:1px solid #818cf8;color:var(--indigo);border-radius:999px;padding:6px 13px;font-weight:800;font-size:.84rem;white-space:nowrap}.card{width:min(760px,100%);background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}.modes{display:flex;border-bottom:1px solid var(--line);overflow-x:auto}.mode{flex:1;min-width:82px;border:0;background:#fff;padding:15px 8px;cursor:pointer;font:700 1.1rem Georgia,serif;color:var(--muted);border-bottom:3px solid transparent}.mode:hover,.mode.active{background:var(--soft);color:var(--indigo);border-bottom-color:var(--indigo)}.task{padding:24px 28px 20px;border-left:4px solid var(--indigo);background:linear-gradient(90deg,var(--soft) 0%,transparent 65%)}.lab{font-size:.76rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:7px}.taskText{font-size:1.05rem;line-height:1.5}.taskText strong{font:800 1.28em Georgia,serif;color:var(--indigo)}.svgWrap{padding:18px 20px 8px;touch-action:none;cursor:grab}.svgWrap:active{cursor:grabbing}svg{display:block;width:100%;height:auto;overflow:visible}.fb{margin:0 20px 16px;min-height:58px;border-radius:10px;display:flex;align-items:center;gap:12px;padding:13px 16px;font-size:.96rem;border:1.5px solid var(--line);background:#f5f4f0;color:var(--muted)}.fb.ok{background:#f0fdf4;border-color:var(--green2);color:var(--green)}.fb.err{background:#fef2f2;border-color:var(--red2);color:var(--red)}.icon{font-size:1.25rem}.interval{display:block;font-family:Georgia,serif;font-weight:900;margin-top:3px}.controls{padding:16px 20px 22px;border-top:1px solid var(--line);display:flex;align-items:center;gap:14px;flex-wrap:wrap}.controls label{font:italic 1.05rem Georgia,serif;color:var(--purple)}input[type=range]{flex:1;min-width:120px;accent-color:var(--purple)}.aval{font:900 1.12rem Georgia,serif;color:var(--purple);min-width:34px;text-align:center}.rnd{border:1.5px solid var(--line);background:white;border-radius:9px;padding:9px 14px;font-weight:800;cursor:pointer}.rnd:hover{background:var(--soft);color:var(--indigo);border-color:#818cf8}.hint{width:min(760px,100%);text-align:center;color:var(--muted);font-size:.78rem;margin-top:14px}.bump{animation:bump .34s}.shake{animation:shake .3s}@keyframes bump{50%{transform:scale(1.45)}}@keyframes shake{25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head><body>
<div class="top"><a class="back" href="../index.html">← На главную</a><div class="title">Числовая прямая: <span>неравенства</span></div><div class="score">Верно: <span id="score">0</span></div></div>
<div class="card">
  <div class="modes"><button class="mode active" data-mode="gt">x &gt; a</button><button class="mode" data-mode="gte">x ≥ a</button><button class="mode" data-mode="lt">x &lt; a</button><button class="mode" data-mode="lte">x ≤ a</button></div>
  <div class="task"><div class="lab">Задание</div><div class="taskText" id="task"></div></div>
  <div class="svgWrap" id="wrap"><svg id="svg" viewBox="0 0 720 124" xmlns="http://www.w3.org/2000/svg"></svg></div>
  <div class="fb" id="fb"><span class="icon">💡</span><span>Перетащи синюю точку на числовую прямую</span></div>
  <div class="controls"><label>a =</label><input id="slider" type="range" min="-8" max="8" step="1" value="-2"><span class="aval" id="aval">−2</span><button class="rnd" id="rnd">🎲 Случайное a</button></div>
</div>
<div class="hint">Перетаскивай точку мышью или касанием · ← → для точной настройки · фиолетовая точка — граница a</div>
<script>
const SVG_W=720,AX=62,L=50,R=670,SCALE=(R-L)/20,EPS=.05,MODES={gt:{sym:'>',right:true,closed:false},gte:{sym:'≥',right:true,closed:true},lt:{sym:'<',right:false,closed:false},lte:{sym:'≤',right:false,closed:true}};
const S={mode:'gt',a:-2,x:4,interacted:false,score:0,scored:false,drag:false};
const $=id=>document.getElementById(id);function fmt(n){return n<0?'−'+Math.abs(n):''+n}function v2p(v){return L+(v+10)*SCALE}function p2v(p){return (p-L)/SCALE-10}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function ok(){let m=S.mode;return m==='gt'?S.x>S.a+EPS:m==='gte'?S.x>=S.a-EPS:m==='lt'?S.x<S.a-EPS:S.x<=S.a+EPS}function interval(){let a=fmt(S.a);return S.mode==='gt'?`(${a}; +∞)`:S.mode==='gte'?`[${a}; +∞)`:S.mode==='lt'?`(−∞; ${a})`:`(−∞; ${a}]`}function se(t,a){let e=document.createElementNS('http://www.w3.org/2000/svg',t);Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));return e}
function draw(){let svg=$('svg');svg.innerHTML='';let m=MODES[S.mode],a=v2p(S.a),x=v2p(S.x),good=ok();let solutionColor=S.interacted?'#16a34a':'#9ca3af',pointColor=!S.interacted?'#1d4ed8':good?'#16a34a':'#dc2626';let defs=se('defs',{});let flt=se('filter',{id:'sh',x:'-20%',y:'-20%',width:'140%',height:'140%'});flt.appendChild(se('feDropShadow',{dx:0,dy:2,stdDeviation:3,'flood-color':'#0003'}));defs.appendChild(flt);svg.appendChild(defs);svg.appendChild(se('rect',{x:L-10,y:AX-18,width:R-L+20,height:36,rx:4,fill:'#f0ede8',opacity:.55}));svg.appendChild(se('line',{x1:L,y1:AX,x2:R,y2:AX,stroke:'#4b5563','stroke-width':2,'stroke-linecap':'round'}));for(let i=-10;i<=10;i++){let px=v2p(i),major=i%5===0;svg.appendChild(se('line',{x1:px,y1:AX-(major?9:5),x2:px,y2:AX+(major?9:5),stroke:'#4b5563','stroke-width':major?1.8:1}));let t=se('text',{x:px,y:AX+28,'text-anchor':'middle','font-family':'Georgia,serif','font-size':major?13:11,fill:'#7a746c'});t.textContent=fmt(i);svg.appendChild(t)}svg.appendChild(se('line',{x1:m.right?a:L-10,y1:AX,x2:m.right?R+10:a,y2:AX,stroke:solutionColor,'stroke-width':7,'stroke-linecap':'round',opacity:.85}));svg.appendChild(se('circle',{cx:a,cy:AX,r:8,fill:m.closed?'#7c3aed':'#fff',stroke:'#7c3aed','stroke-width':3,filter:'url(#sh)'}));let al=se('text',{x:a,y:AX-16,'text-anchor':'middle','font-family':'Georgia,serif','font-size':14,'font-style':'italic',fill:'#7c3aed','font-weight':'bold'});al.textContent='a';svg.appendChild(al);if(S.interacted&&!good){svg.appendChild(se('circle',{cx:x,cy:AX,r:16,fill:'none',stroke:'#dc2626','stroke-width':3,opacity:.35}));}svg.appendChild(se('circle',{id:'pt',cx:x,cy:AX,r:10,fill:pointColor,stroke:'#fff','stroke-width':3,filter:'url(#sh)',style:'cursor:grab'}));let xl=se('text',{x:x,y:AX+24,'text-anchor':'middle','font-family':'Georgia,serif','font-size':14,'font-style':'italic',fill:pointColor,'font-weight':'bold'});xl.textContent='x';svg.appendChild(xl)}
function render(){let m=MODES[S.mode];$('task').innerHTML=`В синей точке — <strong>x</strong>. Подвинь её так, чтобы выполнялось неравенство: <strong>x ${m.sym} ${fmt(S.a)}</strong>`;$('aval').textContent=fmt(S.a);$('slider').value=S.a;draw();let fb=$('fb');if(!S.interacted){fb.className='fb';fb.innerHTML='<span class="icon">💡</span><span>Перетащи синюю точку на числовую прямую</span>'}else if(ok()){fb.className='fb ok';fb.innerHTML=`<span class="icon">✓</span><span>Верно! Решение:<span class="interval">${interval()}</span></span>`;if(!S.scored){S.scored=true;S.score++;$('score').textContent=S.score;$('score').classList.add('bump');setTimeout(()=>$('score').classList.remove('bump'),350)}}else{fb.className='fb err';fb.innerHTML='<span class="icon">✗</span><span>Точка x пока не в зелёной области. Перетащи её на закрашенный луч.</span>';S.scored=false}}
function reset(){let m=MODES[S.mode];S.interacted=false;S.scored=false;S.x=clamp(S.a+(m.right?-3:3),-9,9);render()}function randomA(){let v;do v=Math.floor(Math.random()*17)-8;while(v===S.a);S.a=v;reset()}function setMode(m){S.mode=m;document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));reset()}
function setByClientX(cx){let r=$('svg').getBoundingClientRect();let px=(cx-r.left)/r.width*SVG_W;S.x=Math.round(clamp(p2v(px),-10,10));S.interacted=true;render()}$('svg').addEventListener('pointerdown',e=>{S.drag=true;$('svg').setPointerCapture(e.pointerId);setByClientX(e.clientX)});$('svg').addEventListener('pointermove',e=>{if(S.drag)setByClientX(e.clientX)});$('svg').addEventListener('pointerup',e=>{S.drag=false});$('svg').addEventListener('pointercancel',e=>{S.drag=false});window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='ArrowRight'){S.x=clamp(S.x+(e.key==='ArrowRight'?1:-1),-10,10);S.interacted=true;render()}});$('slider').addEventListener('input',e=>{S.a=Number(e.target.value);reset()});$('rnd').onclick=randomA;document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));reset();
</script></body></html>
