<!DOCTYPE html>
<html lang="ru">
<head>

<title>ОГЭ №14. Прогрессии: формулы и здравый смысл</title>
<style>

  --paper:#fbfaf3; --grid:#e4edf6; --card:#ffffff;
  --ink:#26364a; --muted:#68727f; --line:#d9dee8;
  --pen:#2456a6; --penbg:#eaf1fb; --pen2:#7a4dbf; --pen2bg:#f2ecfb;

}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{

.wrap{max-width:880px;margin:0 auto;padding:14px 12px 80px}
header.top{padding:10px 4px 2px}

.card h2{font-size:18px;margin:0 0 8px;color:var(--pen)}

.tpoint .pn{display:inline-block;background:var(--pen);color:#fff;border-radius:8px;
  font-weight:700;font-size:14px;padding:2px 9px;margin-right:8px}
.tpoint h3{display:inline;font-size:17px;color:var(--pen)}

.formula{font-family:Georgia,"Times New Roman",serif;font-size:20px;background:#f7f9fd;

.human{background:var(--okbg);border:1px solid var(--okline);border-radius:10px;padding:8px 12px;margin:6px 0;font-size:15px}
/* лента шагов */

.tape .cell.hl{background:var(--penbg)}

.tape .cell.gp.hl{background:var(--pen2bg)}
.tape .arr{color:var(--pen);font-weight:700;font-size:14px;padding:0 1px;white-space:nowrap}
.tape .arr.gp{color:var(--pen2)}
.tape .dots{color:var(--muted);font-weight:700;padding:0 4px}
/* задания */
.task-text{font-size:16.5px}
.task-chip{display:inline-block;background:var(--penbg);color:var(--pen);border-radius:8px;
  font-size:12.5px;font-weight:700;padding:3px 9px;margin-bottom:8px}
.task-chip.gp{background:var(--pen2bg);color:var(--pen2)}
.svgbox{margin:10px 0;text-align:center}
.svgbox svg{max-width:100%;height:auto}
/* ввод ответа */
.ansrow{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin:12px 0 4px}
.ansfield input{font-size:19px;padding:9px 10px;border:1.8px solid var(--line);border-radius:10px;
  width:130px;text-align:center;color:var(--ink);background:#fff}
.ansfield input:focus{outline:2px solid var(--pen);border-color:var(--pen)}
.ansfield.wide input{width:min(420px,100%)}
.fracIn{display:inline-flex;flex-direction:column;align-items:center;gap:0}
.fracIn input{width:96px;font-size:18px;text-align:center;padding:6px 8px;border:1.8px solid var(--line);border-radius:9px;background:#fff}
.fracIn .bar{width:112px;height:0;border-bottom:2.4px solid var(--ink);margin:5px 0}
.unit{font-size:15px;color:var(--muted)}
.togglefrac{border:1.5px dashed var(--line);background:#fff;color:var(--muted);border-radius:9px;
  font-size:12.5px;padding:7px 10px;cursor:pointer}
/* кнопки */
button.btn{border:0;background:var(--btn);color:var(--btnText);border-radius:11px;
  font-size:15.5px;font-weight:600;padding:11px 18px;cursor:pointer;touch-action:manipulation}

button.mini{font-size:14px;padding:8px 13px;border-radius:10px}
button.choice{background:#fff;border:1.6px solid var(--line);color:var(--ink);border-radius:11px;
  font-size:15px;padding:10px 14px;cursor:pointer;margin:4px 6px 4px 0}
button.choice.sel-ok{border-color:var(--ok);background:var(--okbg);color:var(--ok);font-weight:700}

.btnrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
/* обратная связь */

.fb.ok{display:block;background:var(--okbg);border:1px solid var(--okline);color:var(--ok);font-weight:600}
.fb.try{display:block;background:var(--peekbg);border:1px solid var(--peekline);color:var(--warn)}
.fb.info{display:block;background:var(--penbg);border:1px solid #c6d7f0;color:var(--pen)}
/* шаги */
.step{border:1.6px solid var(--line);border-radius:12px;padding:12px 14px;margin:10px 0;background:#fff}
.step.active{border-color:var(--pen);box-shadow:0 0 0 3px var(--penbg)}
.step.done{border-color:var(--okline);background:var(--okbg)}
.step.peeked{border-color:var(--peekline);background:var(--peekbg)}
.step .yourmove{display:inline-block;background:var(--pen);color:#fff;border-radius:7px;font-size:11.5px;
  font-weight:700;padding:2px 8px;margin-bottom:6px}
.step .stq{font-size:15.5px;margin-bottom:8px}
.step .stgot{font-weight:700;font-size:16px}
.step .peeknote{color:var(--peek);font-size:13.5px;margin-top:6px}
/* сравнение двух способов */
.ways{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}
.way{border:1.4px solid var(--line);border-radius:12px;padding:12px}
.way h4{margin:0 0 6px;font-size:15px}
.way.wf h4{color:var(--pen)} .way.wt h4{color:var(--ok)}
@media(max-width:640px){.ways{grid-template-columns:1fr}}
.cmp-line{border-top:1px dashed var(--line);padding:7px 0}
.cmp-line:first-child{border-top:0}
.cmp-q{font-size:13.5px;color:var(--muted);line-height:1.4}
.cmp-a{font-size:16px;font-weight:700;margin-top:2px;color:var(--ink)}
/* двойная запись Гаусса */
.gauss{display:grid;gap:5px 4px;margin:12px 0;text-align:center;font-size:14px}
.gcell{border:1.5px solid var(--line);border-radius:8px;padding:6px 2px;min-height:32px;background:#fff}
.gcell.fwd{border-color:var(--pen);color:var(--pen)}
.gcell.rev{border-color:var(--pen2);color:var(--pen2)}
.gcell.sum{border-color:var(--okline);background:var(--okbg);color:var(--ok);font-weight:700;border-top-width:2.4px}
.gcell.gcol{box-shadow:0 0 0 2.5px var(--pen);font-weight:700}
/* цена метода */
.price{font-size:13.5px;color:var(--muted);margin-top:4px}
/* выбор случая */
.cases{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin:10px 0}
.casebtn{text-align:left;border:1.6px solid var(--line);border-radius:12px;background:#fff;
  padding:12px 13px;font-size:15px;cursor:pointer;color:var(--ink)}
.casebtn.sel{border-color:var(--pen);background:var(--penbg)}
.casebtn .cc{display:block;font-size:12px;color:var(--muted);margin-top:3px}
.grouplbl{font-weight:700;color:var(--pen);margin:12px 0 4px}
.grouplbl.gp{color:var(--pen2)}
/* марафон */
.mstats{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.stat{background:#fff;border:1.4px solid var(--line);border-radius:10px;padding:7px 12px;font-size:14px}
.stat b{color:var(--pen)}
.filters{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.fchip{border:1.4px solid var(--line);background:#fff;border-radius:999px;font-size:13px;
  padding:6px 12px;cursor:pointer;color:var(--ink)}
.fchip.on{background:var(--pen);border-color:var(--pen);color:#fff}
.selfcheck{font-size:12.5px;color:var(--muted);text-align:center;margin-top:22px}
.selfcheck b{color:var(--ok)}
details.spoil{border:1.4px dashed var(--line);border-radius:10px;padding:8px 12px;margin:8px 0;background:#fff}
details.spoil summary{cursor:pointer;color:var(--pen);font-weight:600;font-size:14.5px}
hr.thin{border:0;border-top:1px solid var(--line);margin:14px 0}
.footer-note{color:var(--muted);font-size:13px;margin-top:8px}
</style>

<body>
<div class="wrap">
<header class="top">
  <h1>ОГЭ №14. Прогрессии: формулы и здравый смысл</h1>
  <p class="subtitle">Каждую задачу можно решить двумя путями: таблицей шагов и формулой из справочника. Здесь тренируем оба.</p>
</header>
<nav class="tabs" id="tabs">
  <button class="tab active" data-page="ref">📖 Справочник</button>
  <button class="tab" data-page="learn">🌱 Учимся</button>
  <button class="tab" data-page="compare">⚖️ Сравнить</button>
  <button class="tab" data-page="steps">🪜 Пошагово</button>

</nav>
<main>
  <section class="page active" id="page-ref"></section>
  <section class="page" id="page-learn"></section>
  <section class="page" id="page-compare"></section>
  <section class="page" id="page-steps"></section>
  <section class="page" id="page-marathon"></section>
</main>
<div class="selfcheck" id="selfcheck">самопроверка генераторов…</div>
</div>

<script>
/* ===== ОГЭ №14: ядро (точная арифметика, форматирование, SVG) ===== */
"use strict";
const T14 = {};

/* ---------- Дроби на BigInt ---------- */
function _gcd(a,b){ a=a<0n?-a:a; b=b<0n?-b:b; while(b){ const t=a%b; a=b; b=t; } return a; }
function F(n, d){
  if(d===undefined) d=1n;
  n=BigInt(n); d=BigInt(d);
  if(d===0n) throw new Error("знаменатель 0");
  if(d<0n){ n=-n; d=-d; }
  const g=_gcd(n,d)||1n;
  return { n:n/g, d:d/g };
}
const Fr = {
  of:F,
  add:(a,b)=>F(a.n*b.d + b.n*a.d, a.d*b.d),
  sub:(a,b)=>F(a.n*b.d - b.n*a.d, a.d*b.d),
  mul:(a,b)=>F(a.n*b.n, a.d*b.d),
  div:(a,b)=>F(a.n*b.d, a.d*b.n),
  neg:(a)=>F(-a.n, a.d),
  abs:(a)=>F(a.n<0n?-a.n:a.n, a.d),
  eq:(a,b)=>a.n===b.n && a.d===b.d,
  cmp:(a,b)=>{ const l=a.n*b.d, r=b.n*a.d; return l<r?-1:(l>r?1:0); },
  isInt:(a)=>a.d===1n,
  int:(a)=>{ if(a.d!==1n) throw new Error("не целое"); return a.n; },
  pow:(a,k)=>{ let r=F(1n); for(let i=0;i<k;i++) r=Fr.mul(r,a); return r; }
};
T14.F=F; T14.Fr=Fr;

/* ---------- Случайные числа (детерминируемые по seed) ---------- */
function rng(seed){
  let a = seed>>>0;
  return function(){
    a|=0; a=a+0x6D2B79F5|0;
    let t=Math.imul(a^a>>>15,1|a);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}
const ri=(r,a,b)=>a+Math.floor(r()*(b-a+1));
const pick=(r,arr)=>arr[Math.floor(r()*arr.length)];
T14.rng=rng; T14.ri=ri; T14.pick=pick;

/* ---------- Форматирование чисел (запятая, разряды) ---------- */
function groupInt(s){
  const neg = s.startsWith("-");
  let x = neg? s.slice(1): s;
  if(x.length>4){
    let out="";
    while(x.length>3){ out="\u202F"+x.slice(-3)+out; x=x.slice(0,-3); }
    x=x+out;
  }
  return (neg?"\u2212":"")+x;
}
/* конечная десятичная запись или null */
function decParts(f){
  let d=f.d, a=0n, b=0n;
  while(d%2n===0n){ d/=2n; a++; }
  while(d%5n===0n){ d/=5n; b++; }
  if(d!==1n) return null;
  const k = a>b?a:b;
  const scale = 10n**k;
  let v = f.n*scale/f.d;
  const neg = v<0n; if(neg) v=-v;
  let s=v.toString();
  const kk=Number(k);
  while(s.length<=kk) s="0"+s;
  let ip=s.slice(0, s.length-kk), fp= kk? s.slice(s.length-kk):"";
  fp=fp.replace(/0+$/,"");
  return { neg, ip, fp };
}
function fmtN(f){
  if(typeof f==="number") f=F(f);
  if(typeof f==="bigint") f=F(f);
  const p=decParts(f);
  if(p){
    const sign=p.neg?"\u2212":"";
    return sign+groupInt(p.ip).replace("\u2212","")+(p.fp? ","+p.fp : "");
  }
  /* этажная дробь (в ответах не встречается, но пусть будет) */
  return fracHTML(f.n.toString(), f.d.toString());
}
function fracHTML(top,bot){
  return '<span class="frac"><span class="fn">'+top+'</span><span class="fd">'+bot+'</span></span>';
}
T14.fmtN=fmtN; T14.fracHTML=fracHTML; T14.decParts=decParts;

/* ---------- Разбор введённого ответа ---------- */
function parseDec(str){
  if(str==null) return null;
  let s=String(str).replace(/[\s\u00A0\u202F]/g,"").replace(/[,]/g,".").replace(/[\u2212\u2013\u2014]/g,"-");
  if(!s) return null;
  const m=s.match(/^(-?)(\d+)(?:\.(\d*))?$/) || s.match(/^(-?)()\.(\d+)$/);
  if(!m) return null;
  const sign=m[1]==="-"?-1n:1n;
  const ip=m[2]||"0", fp=(m[3]||"").replace(/0+$/,"") || "";
  const den=10n**BigInt(fp.length);
  const num=BigInt(ip+ (fp||"")) ;
  return F(sign*num, den);
}
/* дробный ввод: числитель/знаменатель */
function parseFracPair(topStr, botStr){
  const t=parseDec(topStr), b=parseDec(botStr);
  if(!t||!b) return null;
  if(b.n===0n) return null;
  try{ return Fr.div(t,b); }catch(e){ return null; }
}
T14.parseDec=parseDec; T14.parseFracPair=parseFracPair;

/* ---------- Мелкие текстовые помощники ---------- */
const nb = (s)=>'<b class="num">'+s+'</b>';
const N = (x)=>nb(fmtN(typeof x==="object"?x:F(x)));
function minWord(n){ n=Number(n); const t=n%100, u=n%10;
  if(t>=11&&t<=14) return "минут";
  if(u===1) return "минуту"; if(u>=2&&u<=4) return "минуты"; return "минут"; }
function minWordN(n){ n=Number(n); const t=n%100, u=n%10;
  if(t>=11&&t<=14) return "минут";
  if(u===1) return "минута"; if(u>=2&&u<=4) return "минуты"; return "минут"; }
function hourWord(n){ n=Number(n); const t=n%100,u=n%10;
  if(t>=11&&t<=14) return "часов";
  if(u===1) return "час"; if(u>=2&&u<=4) return "часа"; return "часов"; }
function dayWordN(n){ n=Number(n); const t=n%100,u=n%10;
  if(t>=11&&t<=14) return "дней";
  if(u===1) return "день"; if(u>=2&&u<=4) return "дня"; return "дней"; }
/* универсальное склонение: plur(n,["место","места","мест"]) */
function plur(n, forms){ n=Math.abs(Number(n)); const t=n%100, u=n%10;
  if(t>=11&&t<=14) return forms[2];
  if(u===1) return forms[0]; if(u>=2&&u<=4) return forms[1]; return forms[2]; }
const seatW=(n)=>plur(n,["место","места","мест"]);
const timesW=(n)=>plur(n,["раз","раза","раз"]);
T14.words={minWord,minWordN,hourWord,dayWordN,plur,seatW,timesW};
T14.nb=nb; T14.N=N;

/* ---------- Лента шагов (HTML) ---------- */
/* cells: [{idx, val, hl}], arrows: строка над переходами, gp: фиолетовый стиль */
function tapeHTML(cells, arrow, opt){
  opt=opt||{};
  const gp=opt.gp?" gp":"";
  let h='<div class="tape">';
  cells.forEach((c,i)=>{
    if(i>0) h+='<span class="arr'+gp+'">'+ (c.dots? "" : "→<br>"+(c.arr!==undefined?c.arr:arrow)) +'</span>';
    if(c.dots){ h+='<span class="dots">…</span>'; return; }
    h+='<span class="cell'+gp+(c.hl?" hl":"")+'">'+(c.idx!=null?('<span class="idx">'+c.idx+'</span>'):'')+c.val+'</span>';
  });
  h+='</div>';
  return h;
}
T14.tapeHTML=tapeHTML;

/* ---------- SVG для задач с рисунком ---------- */
const SVG_INK="#2456a6", SVG_FILL="#eaf1fb", SVG_DOT="#7a4dbf";
function svgTables(m){
  /* m сдвинутых квадратных столиков: сверху и снизу по m мест, по одному на торцах */
  const cs=46, pad=26, w=m*cs+pad*2, h=cs+pad*2;
  let s='<svg viewBox="0 0 '+w+' '+h+'" width="'+Math.min(w, 340)+'" role="img" aria-label="столики">';
  for(let i=0;i<m;i++){
    s+='<rect x="'+(pad+i*cs)+'" y="'+pad+'" width="'+cs+'" height="'+cs+'" fill="'+SVG_FILL+'" stroke="'+SVG_INK+'" stroke-width="2"/>';
  }
  const r=6;
  for(let i=0;i<m;i++){
    const cx=pad+i*cs+cs/2;
    s+='<circle cx="'+cx+'" cy="'+(pad-12)+'" r="'+r+'" fill="'+SVG_DOT+'"/>';
    s+='<circle cx="'+cx+'" cy="'+(pad+cs+12)+'" r="'+r+'" fill="'+SVG_DOT+'"/>';
  }
  s+='<circle cx="'+(pad-12)+'" cy="'+(pad+cs/2)+'" r="'+r+'" fill="'+SVG_DOT+'"/>';
  s+='<circle cx="'+(pad+m*cs+12)+'" cy="'+(pad+cs/2)+'" r="'+r+'" fill="'+SVG_DOT+'"/>';
  s+='</svg>';
  return s;
}
function svgLogs(rows){
  /* пирамида брёвен: внизу rows штук, вверху одно */
  const R=13, gap=3, step=2*R+gap;
  const w=rows*step+30, h=rows*step*0.9+30;
  let s='<svg viewBox="0 0 '+w+' '+h+'" width="'+Math.min(w,300)+'" role="img" aria-label="кладка брёвен">';
  for(let row=0; row<rows; row++){
    const count=rows-row;
    const y=h-18-row*(step*0.87);
    const x0=(w-count*step)/2+R;
    for(let i=0;i<count;i++){
      const x=x0+i*step;
      s+='<circle cx="'+x+'" cy="'+y+'" r="'+R+'" fill="'+SVG_FILL+'" stroke="'+SVG_INK+'" stroke-width="2"/>';
      s+='<circle cx="'+x+'" cy="'+y+'" r="'+(R-6)+'" fill="none" stroke="'+SVG_INK+'" stroke-width="1" opacity="0.5"/>';
    }

}
function svgSnake(k){
  /* спираль со звеньями 1,1,2,2,…,k,k; клетка u px */
  const u=17;
  let x=0,y=0, dir=0; /* 0:→ 1:↑ 2:← 3:↓ */
  const pts=[[0,0]];
  const lens=[];
  for(let L=1; L<=k; L++){ lens.push(L,L); }
  let minx=0,maxx=0,miny=0,maxy=0;
  for(const L of lens){
    if(dir===0) x+=L; else if(dir===1) y-=L; else if(dir===2) x-=L; else y+=L;
    pts.push([x,y]);
    minx=Math.min(minx,x); maxx=Math.max(maxx,x);
    miny=Math.min(miny,y); maxy=Math.max(maxy,y);
    dir=(dir+1)%4;
  }
  const pad=14;
  const w=(maxx-minx)*u+pad*2, h=(maxy-miny)*u+pad*2;
  const gx=(v)=>pad+(v-minx)*u, gy=(v)=>pad+(v-miny)*u;
  let s='<svg viewBox="0 0 '+w+' '+h+'" width="'+Math.min(w,300)+'" role="img" aria-label="змейка">';
  /* клетчатый фон */
  for(let i=0;i<= (maxx-minx); i++) s+='<line x1="'+(pad+i*u)+'" y1="'+pad+'" x2="'+(pad+i*u)+'" y2="'+(h-pad)+'" stroke="#e4edf6" stroke-width="1"/>';
  for(let j=0;j<= (maxy-miny); j++) s+='<line x1="'+pad+'" y1="'+(pad+j*u)+'" x2="'+(w-pad)+'" y2="'+(pad+j*u)+'" stroke="#e4edf6" stroke-width="1"/>';
  let path="M "+gx(pts[0][0])+" "+gy(pts[0][1]);
  for(let i=1;i<pts.length;i++) path+=" L "+gx(pts[i][0])+" "+gy(pts[i][1]);
  s+='<path d="'+path+'" fill="none" stroke="'+SVG_INK+'" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>';
  /* подпись последнего звена */
  const a=pts[pts.length-2], b=pts[pts.length-1];
  const mx=(gx(a[0])+gx(b[0]))/2, my=(gy(a[1])+gy(b[1]))/2;
  s+='<text x="'+(mx+10)+'" y="'+my+'" font-size="14" fill="'+SVG_DOT+'" font-weight="bold">'+k+'</text>';
  s+='</svg>';
  return s;
}

function mkDistract(list, ans){
  const out=[]; const seen=new Set([key(ans)]);
  for(const d of list){
    if(!d || !d.v) continue;
    if(!(d.v.n!==undefined && d.v.d!==undefined)) continue;
    if(!T.decParts(d.v)) continue;      // только целые/конечные десятичные
    if(d.v.n===0n && ans.n!==0n) continue;
    const k=key(d.v);
    if(seen.has(k)) continue;
    seen.add(k); out.push(d);
  }
  return out;
}

      { v:F(am), hint:"Это значение на "+m+"-м шаге, а спрашивают про "+p+"-й." }
    ].filter(x=>x&&x.v), ans);
    return { code:"AP-2PT", seed, chip, gp:false, text, svg:null, unit, ans, distract,

      facts, methods:["formula"] };
  },
  sim(t){

      while(Fr.cmp(h,f.h2)<0){ h=Fr.add(h,f.s); P=Fr.sub(P,F(1)); }
      return P;
    }
    const d=Fr.div(Fr.sub(f.am,f.ak), F(f.m-f.k));
    let v=f.ak;
    for(let i=f.k;i<f.p;i++) v=Fr.add(v,d);

    let vm=f.ak; for(let i=f.k;i<f.m;i++) vm=Fr.add(vm,d);

    while(true){ n++; s=Fr.add(s,a); if(Fr.cmp(s,f.X)>=0) return F(n); a=Fr.mul(a,F(2)); if(n>60) throw new Error("points: цикл"); }
  }
};

      { v:F(C0+Tv*p), hint:"Первые "+K+" "+W.minWord(K)+" уже оплачены стартовой суммой, второй раз их оплачивать не нужно." },

/* ===== ОГЭ №14: пошаговые решения и разбор двумя способами ===== */
"use strict";
(function(T){
const {F, Fr, fmtN, N, fracHTML, tapeHTML} = T;

const plusStr=(d)=> (Fr.cmp(d,F(0))>=0? "+"+fmtN(d) : "\u2212"+fmtN(Fr.abs(d)));
const mulStr=(q)=> "×"+fmtN(q);
const divStr=(q)=> "÷"+fmtN(q);

function st(q, a, hint, revealNote, extra){
  const s={ q, a, hint, reveal:(revealNote||"")+" Получается "+nb(fmtN(a))+".", };
  if(extra) Object.assign(s, extra);
  return s;
}
const nb=T.nb;

/* Лента для табличного метода: заполнено до idx, следующий знак вопроса */
function tapeProgress(vals, labels, opShort, upto, gp){
  const cells=[];
  for(let i=0;i<vals.length;i++){
    if(i<upto) cells.push({idx:labels[i], val:fmtN(vals[i]), hl:i===upto-1});
    else if(i===upto){ cells.push({idx:labels[i], val:"?", hl:true}); break; }
  }
  return tapeHTML(cells, opShort, {gp});
}

/* Двойная запись Гаусса. opt:
   sumRow  — рисовать ли нижнюю строку столбиков (по умолчанию да, заполненную);
   hlCol   — индекс столбика для подсветки (по умолчанию нет) */
function gaussVisual(vals, opt){
  opt=opt||{};
  const sumRow = opt.sumRow!==false;
  const hl = (opt.hlCol!=null) ? opt.hlCol : -1;
  const n=vals.length;
  const rev=[...vals].reverse();
  const pair=Fr.add(vals[0], vals[n-1]);
  let h='<div class="gauss" style="grid-template-columns:repeat('+n+',1fr)">';
  for(let i=0;i<n;i++) h+='<span class="gcell fwd'+(i===hl?' gcol':'')+'">'+fmtN(vals[i])+'</span>';
  for(let i=0;i<n;i++) h+='<span class="gcell rev'+(i===hl?' gcol':'')+'">'+fmtN(rev[i])+'</span>';
  if(sumRow) for(let i=0;i<n;i++) h+='<span class="gcell sum'+(i===hl?' gcol':'')+'">'+fmtN(pair)+'</span>';
  h+='</div>';
  return h;
}
/* Строка последовательного сложения: "21 + 17 + 13 + … = 56" */
function runSumStr(vals){
  return vals.map(v=>fmtN(v)).join(" + ");
}

/* ---------- Построители шагов ---------- */
function buildSteps(task, method){
  const f=task.facts, c=task.code;
  const steps=[];
  const gp=task.gp;

  if(c==="AP-VAL"){
    const d=f.d, a1=f.a1, n=f.n, trans=f.trans;
    if(method==="table"){
      const vals=[a1]; for(let i=1;i<=trans;i++) vals.push(Fr.add(vals[i-1],d));
      const labels=[]; for(let i=0;i<=trans;i++) labels.push(f.base===1? (i+1)+"-й "+f.noun : (i)+" мин");
      for(let i=1;i<=trans;i++){
        steps.push(st(
          "Заполни ленту: какое значение на шаге «"+labels[i]+"»?"+tapeProgress(vals,labels,plusStr(d),i,gp),
          vals[i],
          "К предыдущему значению "+nb(fmtN(vals[i-1]))+" прибавь "+nb(plusStr(d))+".",
          "К "+fmtN(vals[i-1])+" прибавляем "+plusStr(d)+"."
        ));
      }
    } else {
      steps.push(st("На сколько меняется значение за один переход? Укажи со знаком: если уменьшается, пиши со знаком минус.",
        d, "Смотри на слова «на … больше» или «на … меньше»: это и есть прибавка за один переход.",
        "Каждый шаг значение меняется на "+plusStr(d)+"."));
      steps.push(st(
        f.base===1
          ? "Сколько переходов от 1-го до "+n+"-го шага?"
          : "Сколько переходов от начального момента (0 минут) до отметки "+n+" минут?",
        F(trans),
        f.base===1
          ? "Первый шаг уже дан, шагать начинаем со второго: переходов на один меньше, чем номер."
          : "Отсчёт идёт от нуля, поэтому переходов ровно столько, сколько минут прошло.",
        f.base===1? "От 1-го до "+n+"-го шага переходов n \u2212 1." : "От 0 до "+n+" минут переходов ровно "+n+"."));
      steps.push(st("На сколько всего изменится значение за все переходы?",
        Fr.mul(d,F(trans)),
        "Одинаковая прибавка повторяется "+trans+" раз"+(trans%10>=2&&trans%10<=4&&(trans%100<12||trans%100>14)?"а":"")+": умножь "+fmtN(d)+" на "+trans+".",
        "Умножаем прибавку на число переходов: "+fmtN(d)+" · "+trans+"."));
      steps.push(st("Ответ: чему равно значение на нужном шаге?",
        task.ans,
        "К начальному значению "+nb(fmtN(a1))+" прибавь общее изменение.",
        "К "+fmtN(a1)+" прибавляем "+fmtN(Fr.mul(d,F(trans)))+"."));
    }
  }

  else if(c==="AP-SUM"){
    const a1=f.a1, d=f.d, n=f.n;
    const aN=Fr.add(a1,Fr.mul(d,F(n-1)));
    if(method==="table"){
      const vals=[a1]; for(let i=1;i<n;i++) vals.push(Fr.add(vals[i-1],d));
      const labels=vals.map((_,i)=>(i+1)+"-й");
      for(let i=1;i<n;i++){
        steps.push(st("Выпиши слагаемые: значение на "+(i+1)+"-м шаге?"+tapeProgress(vals,labels,plusStr(d),i,gp),
          vals[i], "К "+fmtN(vals[i-1])+" прибавь "+fmtN(d)+".", "Очередное слагаемое: "+fmtN(vals[i-1])+" + "+fmtN(d)+"."));
      }
      steps.push(st("Теперь сложи все "+n+" выписанных чисел по порядку.",
        task.ans, "Складывай слева направо: "+runSumStr(vals)+".",
        "Сумма всех слагаемых."));
    } else if(method==="gauss"){
      const vals=[a1]; for(let i=1;i<n;i++) vals.push(Fr.add(vals[i-1],d));
      const pair=Fr.add(a1,aN);
      const twoS=Fr.mul(pair,F(n));
      steps.push(st("Метод Гаусса: запишем сумму дважды — сверху по порядку, снизу наоборот. Сложи первый столбик (он выделен): "+fmtN(a1)+" + "+fmtN(aN)+"?"+
        gaussVisual(vals, {sumRow:false, hlCol:0}),
        pair, "Сложи выделенные числа: верхнее "+fmtN(a1)+" и нижнее "+fmtN(aN)+".",
        "Первый столбик даёт "+fmtN(a1)+" + "+fmtN(aN)+"."));
      steps.push(st("В каждом столбике верхнее и нижнее числа меняются на одинаковую величину в разные стороны, поэтому все столбики равны "+fmtN(pair)+" (нижняя строка). Сколько всего столбиков?"+
        gaussVisual(vals, {sumRow:true}),
        F(n), "Столбиков столько же, сколько было слагаемых.",
        "Столбиков ровно "+n+"."));
      steps.push(st("Обе строки вместе — это удвоенная сумма, 2S. Чему она равна: столбик × число столбиков?",
        twoS, "Умножь "+fmtN(pair)+" на "+n+".",
        "2S = "+fmtN(pair)+" · "+n+"."));
      steps.push(st("Мы посчитали сумму дважды, поэтому раздели на 2 — это ответ.",
        task.ans, "Раздели "+fmtN(twoS)+" на 2.",
        "Делим удвоенную сумму пополам."));
    } else {
      steps.push(st("Какая прибавка за один переход?", d,
        "Смотри на «на … больше, чем в предыдущий».", "Прибавка за переход."));
      steps.push(st("Сколько переходов от 1-го до последнего, "+n+"-го шага?", F(n-1),
        "Первый уже дан: переходов на один меньше, чем шагов.", "Переходов n \u2212 1."));
      steps.push(st("Чему равно значение на последнем, "+n+"-м шаге?", aN,
        "К "+fmtN(a1)+" прибавь "+fmtN(d)+" · "+(n-1)+".", "Последний член: "+fmtN(a1)+" + "+fmtN(d)+" · "+(n-1)+"."));
      steps.push(st("Сумма пары «первый + последний»?", Fr.add(a1,aN),
        "Просто сложи "+fmtN(a1)+" и "+fmtN(aN)+".", "Пара даёт "+fmtN(a1)+" + "+fmtN(aN)+"."));
      steps.push(st("Умножь эту пару на число шагов "+n+".", Fr.mul(Fr.add(a1,aN),F(n)),
        "Каждый из "+n+" шагов входит ровно в одну «половинку пары».", "Умножаем пару на n."));
      steps.push(st("Каждый шаг посчитан дважды, поэтому раздели на 2. Это и есть ответ.",
        task.ans, "Раздели "+fmtN(Fr.mul(Fr.add(a1,aN),F(n)))+" на 2.", "Делим на 2 и получаем сумму."));
    }
  }

  else if(c==="AP-2PT"){
    if(f.sub==="press"){
      const dh=Fr.sub(f.h2,f.h1);
      steps.push(st("На сколько метров изменилась высота?", dh,
        "Вычти меньшую высоту из большей.", "Разница высот."));
      steps.push(st("Сколько отрезков по "+fmtN(f.s)+" м помещается в этой разнице?", F(f.k),
        "Раздели "+fmtN(dh)+" на "+fmtN(f.s)+".", "Число отрезков подъёма."));
      steps.push(st("Ответ: чему равно давление на большей высоте? Каждый отрезок отнимает 1 мм рт. ст.",
        task.ans, "Из "+fmtN(f.P1)+" вычти "+f.k+".", "Давление уменьшилось на "+f.k+" мм."));
    } else {
      const span=f.m-f.k, delta=Fr.sub(f.am,f.ak);
      const d=Fr.div(delta,F(span));
      const kName= f.sub==="clock" ? "момента поломки" : (f.sub==="people"? "конца "+f.k+" года" : f.k+"-го дня");
      const mName= f.sub==="clock" ? "второго известного момента" : (f.sub==="people"? "конца "+f.m+" года" : f.m+"-го дня");
      const pName= f.sub==="clock" ? "нужного момента" : (f.sub==="people"? "конца "+f.p+" года" : f.p+"-го дня");
      steps.push(st("Сколько переходов между известными шагами, от "+kName+" до "+mName+"?", F(span),
        "Вычти номера (или годы, или часы): "+f.m+" \u2212 "+f.k+".", "Переходов между известными точками."));
      steps.push(st("На сколько изменилось значение за эти переходы?", delta,
        "Вычти: "+fmtN(f.am)+" \u2212 "+fmtN(f.ak)+".", "Общее изменение между точками."));
      steps.push(st("Какая прибавка за один переход?", d,
        "Раздели изменение "+fmtN(delta)+" на число переходов "+span+".", "Прибавка за один переход."));
      steps.push(st("Сколько переходов от "+kName+" до "+pName+"?", F(f.p-f.k),
        "Снова вычти номера: "+f.p+" \u2212 "+f.k+".", "Переходов до цели."));
      steps.push(st("На сколько изменится значение за них?", Fr.mul(d,F(f.p-f.k)),
        "Умножь прибавку "+fmtN(d)+" на "+(f.p-f.k)+".", "Изменение до цели."));
      steps.push(st("Ответ: чему равно значение в нужной точке?", task.ans,
        "К "+fmtN(f.ak)+" прибавь найденное изменение.", "Стартовое значение плюс изменение."));

  else if(c==="AP-SUM2DAY"){
    if(f.sub==="snail"){
      steps.push(st("Чему равен удвоенный путь, 2 · "+fmtN(f.S)+"?", Fr.mul(F(2),f.S),
        "Просто умножь путь на 2.", "Удвоенный путь равен сумме пары, взятой столько раз, сколько дней."));
      steps.push(st("Ответ: раздели удвоенный путь на сумму пары «первый + последний день». Сколько дней шла улитка?",
        task.ans, "Раздели "+fmtN(Fr.mul(F(2),f.S))+" на "+fmtN(f.Fs)+".", "Число дней."));
    } else {
      const twoS=Fr.mul(F(2),f.S), pairSum=Fr.div(twoS,F(f.Nd));
      const aN=Fr.sub(pairSum,f.a1), diff=Fr.sub(aN,f.a1);
      const d=Fr.div(diff,F(f.Nd-1));
      steps.push(st("Чему равна удвоенная вся работа, 2 · "+fmtN(f.S)+"?", twoS,
        "Умножь на 2.", "Удвоенная сумма."));
      steps.push(st("Раздели на число дней "+f.Nd+". Получится сумма «первый день + последний день».", pairSum,
        "Дели: "+fmtN(twoS)+" ÷ "+f.Nd+".", "Пара «первый + последний»."));
      steps.push(st("Чему равна норма последнего дня?", aN,
        "Из пары "+fmtN(pairSum)+" вычти первый день "+fmtN(f.a1)+".", "Последний день."));
      steps.push(st("На сколько последний день больше первого?", diff,
        "Вычти: "+fmtN(aN)+" \u2212 "+fmtN(f.a1)+".", "Общий рост за все переходы."));
      steps.push(st("Сколько переходов от 1-го до "+f.Nd+"-го дня?", F(f.Nd-1),
        "Переходов на один меньше, чем дней.", "Число переходов."));
      steps.push(st("Какая прибавка за один день?", d,
        "Раздели "+fmtN(diff)+" на "+(f.Nd-1)+".", "Дневная прибавка."));
      steps.push(st("Сколько переходов от 1-го до "+f.k+"-го дня?", F(f.k-1),
        "Снова на один меньше, чем номер дня.", "Переходов до нужного дня."));
      steps.push(st("На сколько вырастет норма за эти переходы?", Fr.mul(d,F(f.k-1)),
        "Умножь "+fmtN(d)+" на "+(f.k-1)+".", "Рост до нужного дня."));
      steps.push(st("Ответ: сколько сделано за "+f.k+"-й день?", task.ans,
        "К "+fmtN(f.a1)+" прибавь найденный рост.", "Норма нужного дня."));
    }
  }

  else if(c==="GP-VAL"){
    const q=f.q;
    // сюжетные слова: периодная единица и что именно меняется
    const info = f.sub==="filter" ? {down:true, per:"фильтр", perN:(i)=>i+" "+T.words.plur(i,["фильтр","фильтра","фильтров"]), val:"яркость", thru:true}
      : f.sub==="dough" ? {down:false, per:"мин", perN:(i)=>(i*f.P)+" мин", val:"объём"}
      : f.sub==="grow" ? {down:false, per:"мин", perN:(i)=>(i*f.P)+" мин", val:"масса"}
      : {down:true, per:"мин", perN:(i)=>(i*f.P)+" мин", val:"масса"};
    const down=info.down;
    if(f.sub==="back"){
      steps.push(st("Сколько делений произошло?", F(f.k),
        "Число прямо названо в условии.", "Число делений."));
      steps.push(st("Во сколько раз выросло число инфузорий за все деления?", Fr.pow(F(2),f.k),
        "Каждое деление удваивает: 2 умножается само на себя "+f.k+" раз"+(f.k>=5?"":"а")+".", "Общий множитель 2 в степени "+f.k+"."));
      steps.push(st("Ответ: сколько инфузорий было сначала?", task.ans,
        "Иди назад: раздели "+fmtN(f.m0)+" на "+fmtN(Fr.pow(F(2),f.k))+".", "Назад делим на общий множитель."));
    } else if(method==="table"){
      const vals=[f.m0]; for(let i=1;i<=f.k;i++) vals.push(down? Fr.div(vals[i-1],q): Fr.mul(vals[i-1],q));
      const labels=[]; for(let i=0;i<=f.k;i++) labels.push(info.perN(i));
      for(let i=1;i<=f.k;i++){
        const where = info.thru ? "после "+info.perN(i) : "через "+info.perN(i);
        steps.push(st("Заполни ленту: "+info.val+" "+where+"?"+
          tapeProgress(vals,labels, down? divStr(q):mulStr(q), i, true),
          vals[i],
          (down? "Раздели ":"Умножь ")+fmtN(vals[i-1])+" на "+fmtN(q)+".",
          "Ещё один "+(info.thru?"фильтр":"период")+": "+(down? "делим":"умножаем")+" на "+fmtN(q)+"."));
      }
    } else {
      const periodQ = info.thru
        ? "Сколько фильтров проходит свет?"
        : "Сколько полных периодов по "+f.P+" минут в "+f.T+" минутах?";
      const periodHint = info.thru ? "Число фильтров прямо названо в условии." : "Раздели "+f.T+" на "+f.P+".";
      steps.push(st(periodQ, F(f.k), periodHint, info.thru?"Число фильтров.":"Число периодов."));
      steps.push(st("Во сколько раз "+(down?"уменьшится":"вырастет")+" "+info.val+" за все "+(info.thru?"фильтры":"периоды")+"?", Fr.pow(q,f.k),
        "Множитель "+fmtN(q)+" повторяется "+f.k+" раз"+(f.k>=5?"":"а")+".", "Общий множитель: "+fmtN(q)+" в степени "+f.k+"."));
      const finalQ = info.thru ? "Ответ: "+info.val+" после всех фильтров?" : "Ответ: "+info.val+" через "+f.T+" минут?";
      steps.push(st(finalQ, task.ans,
        (down? "Раздели ":"Умножь ")+fmtN(f.m0)+" на "+fmtN(Fr.pow(q,f.k))+".",
        (down? "Делим":"Умножаем")+" начальное значение на общий множитель."));
    }
  }

  else if(c==="GP-COMPL"){
    const A = f.styleB===false ? "реагента" : "изотопа А";
    const B = f.styleB===false ? "осадка" : "изотопа Б";
    const Bverb = f.styleB===false ? "перешло в осадок" : "образовалось изотопа Б";
    const restNote = f.styleB===false ? "Остаток реагента." : "Остаток А.";
    const minusNote = f.styleB===false ? "Начальное количество минус остаток." : "Начальная масса минус остаток А.";
    if(method==="table"){
      const vals=[f.m0]; for(let i=1;i<=f.k;i++) vals.push(Fr.div(vals[i-1],F(2)));
      const labels=[]; for(let i=0;i<=f.k;i++) labels.push((i*f.P)+" мин");
      for(let i=1;i<=f.k;i++){
        steps.push(st("Сколько "+A+" останется через "+(i*f.P)+" минут?"+
          tapeProgress(vals,labels,divStr(F(2)),i,true),
          vals[i], "Раздели "+fmtN(vals[i-1])+" пополам.", "Половина предыдущего."));
      }
      steps.push(st("Ответ: сколько "+Bverb+"? Всё, что «ушло», перешло в другую часть.",
        task.ans, "Из начального "+fmtN(f.m0)+" вычти остаток "+fmtN(f.rest)+".", minusNote));
    } else {
      steps.push(st("Сколько полных периодов по "+f.P+" минут в "+f.T+" минутах?", F(f.k),
        "Раздели "+f.T+" на "+f.P+".", "Число периодов."));
      steps.push(st("Сколько "+A+" останется после всех делений пополам?", f.rest,
        "Раздели "+fmtN(f.m0)+" пополам "+f.k+" раз"+(f.k>=5?"":"а")+" подряд.", restNote));
      steps.push(st("Ответ: сколько "+Bverb+"?", task.ans,
        "Из "+fmtN(f.m0)+" вычти остаток "+fmtN(f.rest)+". Спрашивают про то, что перешло, а не про остаток!",
        minusNote));
    }
  }

  else if(c==="THRESH"){
    if(f.sub==="bounce"){
      const labels=f.seq.map((_,i)=>"после "+(i+1)+"-го");
      for(let i=1;i<f.seq.length;i++){
        steps.push(st("Высота после "+(i+1)+"-го отскока?"+
          tapeProgress(f.seq,labels,divStr(f.q),i,true),
          f.seq[i], "Раздели "+fmtN(f.seq[i-1])+" на "+fmtN(f.q)+".", "Делим предыдущую высоту."));
      }
      steps.push({ q:"Высота "+nb(fmtN(f.seq[f.seq.length-1]))+" см уже меньше порога "+nb(fmtN(f.L))+" см?",
        choice:{ options:[{t:"Да, впервые меньше",ok:true},{t:"Нет, ещё не меньше",ok:false}],
          why:"Сравниваем: "+fmtN(f.seq[f.seq.length-1])+" &lt; "+fmtN(f.L)+", а предыдущая высота "+fmtN(f.seq[f.seq.length-2])+" ещё не была меньше порога." } });
      steps.push(st("Ответ: после какого по счёту отскока высота впервые стала меньше "+fmtN(f.L)+" см?",
        task.ans, "Возьми номер первой высоты в ленте, которая меньше порога.",
        "Берём первый подходящий шаг, а не предыдущий."));
    } else {
      steps.push({ q:"Что нужно сравнивать с порогом "+nb(fmtN(f.X))+" очков?",
        choice:{ options:[{t:"Сумму всех начисленных очков",ok:true},{t:"Очки за последнюю минуту",ok:false}],
          why:"Игрок копит очки, поэтому с порогом сравнивается сумма: 2, потом 2 + 4, потом 2 + 4 + 8 и так далее." } });
      steps.push({ build:{ adds:f.adds, sums:f.sums, X:f.X },
        q:"Построй таблицу по минутам кнопкой «Добавить минуту», пока сумма впервые не станет не меньше "+nb(fmtN(f.X))+" очков." });
      steps.push(st("Ответ: через сколько минут сумма впервые стала не меньше "+fmtN(f.X)+" очков?",
        task.ans, "Смотри на последнюю строку таблицы: её номер и есть ответ.",
        "Берём первую минуту, когда условие уже выполнилось."));
    }
  }

  else if(c==="PIC"){
    if(f.sub==="tables"){
      steps.push(st("Сравни первые случаи: 4, 6, 8 мест. Сколько мест добавляет каждый новый столик?", F(2),
        "Вычти соседние: 6 \u2212 4.", "Одинаковая прибавка."));
      steps.push(st("Сколько переходов от 1 столика до "+f.n+" столиков?", F(f.n-1),
        "Первый столик уже есть: добавляем остальные.", "Переходов n \u2212 1."));
      steps.push(st("На сколько мест больше станет за все добавления?", F(2*(f.n-1)),
        "Умножь 2 на "+(f.n-1)+".", "Общая прибавка мест."));
      steps.push(st("Ответ: сколько человек сядет за стол из "+f.n+" столиков?", task.ans,
        "К 4 местам первого столика прибавь общую прибавку.", "Старт 4 плюс прибавка."));
    } else if(f.sub==="logs"){
      const rows=[]; for(let i=1;i<=f.base;i++) rows.push(F(i));
      steps.push(st("Сколько рядов в кладке?", F(f.base),
        "Ряды идут от 1 бревна наверху до "+f.base+" внизу: рядов столько, сколько брёвен в нижнем ряду.", "Число рядов."));
      steps.push(st("Значит нужно сложить 1 + 2 + … + "+f.base+". Метод Гаусса: запишем эту сумму дважды, наоборот. Сложи первый столбик (выделен): 1 + "+f.base+"?"+
        gaussVisual(rows, {sumRow:false, hlCol:0}),
        F(f.base+1), "Сложи выделенные числа: 1 и "+f.base+".", "Столбик равен 1 + "+f.base+"."));
      steps.push(st("Все столбики одинаковые (нижняя строка). Удвоенная сумма — это столбик × число столбиков?"+
        gaussVisual(rows, {sumRow:true}),
        F((f.base+1)*f.base), "Умножь "+(f.base+1)+" на "+f.base+".", "2S = "+(f.base+1)+" · "+f.base+"."));
      steps.push(st("Разделим на 2 — вот сколько всего брёвен.", task.ans,
        "Дели "+fmtN(F((f.base+1)*f.base))+" пополам.", "Сумма посчитана дважды, делим на 2."));
    } else {
      const lens=[]; for(let i=1;i<=f.K;i++) lens.push(F(i));
      steps.push(st("Разные длины идут 1, 2, …, "+f.K+". Сложим их методом Гаусса: запишем дважды, наоборот. Сложи первый столбик (выделен): 1 + "+f.K+"?"+
        gaussVisual(lens, {sumRow:false, hlCol:0}),
        F(f.K+1), "Сложи выделенные числа: 1 и "+f.K+".", "Столбик равен 1 + "+f.K+"."));
      steps.push(st("Все столбики одинаковые (нижняя строка). Удвоенная сумма разных длин — столбик × их количество?"+
        gaussVisual(lens, {sumRow:true}),
        F(f.K*(f.K+1)), "Умножь "+(f.K+1)+" на "+f.K+".", "2S = "+(f.K+1)+" · "+f.K+"."));
      steps.push(st("Раздели на 2: это сумма 1 + 2 + … + "+f.K+".", F(f.K*(f.K+1)/2),
        "Дели "+fmtN(F(f.K*(f.K+1)))+" пополам.", "Сумма разных длин."));
      steps.push(st("В змейке каждая длина встречается два раза. Удвой сумму — это ответ.", task.ans,
        "Умножь "+fmtN(F(f.K*(f.K+1)/2))+" на 2.", "Каждое звено идёт парой."));
    }
  }

  else if(c==="TAXI"){
    steps.push(st("Сколько стоит одна минута после стартовых?", F(f.p),
      "Раздели "+fmtN(f.S2)+" рублей на "+f.M+" минут.", "Цена минуты."));
    steps.push(st("Сколько минут поездки не покрыто стартовой суммой?", F(f.T-f.K),
      "Стартовая сумма уже оплатила первые "+f.K+" "+T.words.minWord(f.K)+": вычти их из "+f.T+".", "Минуты сверх старта."));
    steps.push(st("Сколько стоят эти минуты?", F((f.T-f.K)*f.p),
      "Умножь "+(f.T-f.K)+" минут на цену минуты.", "Оплата поминутной части."));
    steps.push(st("Ответ: полная стоимость поездки?", task.ans,
      "Прибавь стартовую сумму "+fmtN(f.C0)+".", "Старт плюс поминутная часть."));
  }

  return steps;
}

/* ---------- Разбор двумя способами ---------- */
function fx(s){ return '<span class="formula">'+s+'</span>'; }
function sub_(v){ return '<i>'+v+'</i>'; }
const AN='<i>a</i><sub><i>n</i></sub>', A1='<i>a</i><sub>1</sub>', BN='<i>b</i><sub><i>n</i></sub>', B1='<i>b</i><sub>1</sub>', SN='<i>S</i><sub><i>n</i></sub>';

function shortTape(vals, labels, arrow, gp, maxCells){
  maxCells=maxCells||5;
  const cells=[];
  if(vals.length<=maxCells){
    vals.forEach((v,i)=>cells.push({idx:labels[i], val:fmtN(v), hl:i===vals.length-1}));
  } else {
    for(let i=0;i<3;i++) cells.push({idx:labels[i], val:fmtN(vals[i])});
    cells.push({dots:true});
    cells.push({idx:labels[vals.length-1], val:fmtN(vals[vals.length-1]), hl:true});
  }
  return tapeHTML(cells, arrow, {gp});
}

function ways(task){
  const f=task.facts, c=task.code;
  let wf="", wt="";
  const ansS=nb(fmtN(task.ans))+(task.unit? " "+task.unit:"");

  if(c==="AP-VAL"){
    const trans=f.trans;
    const vals=[f.a1]; for(let i=1;i<=trans;i++) vals.push(Fr.add(vals[i-1],f.d));
    const labels=vals.map((_,i)=> f.base===1? (i+1)+"-й" : i+" мин");
    wt=shortTape(vals,labels,plusStr(f.d),false)+"<p>Каждый шаг одна и та же прибавка "+nb(plusStr(f.d))+". Доходим до нужного шага: "+ansS+".</p>";
    wf="<p>"+fx(AN+" = "+A1+" + <i>d</i>(<i>n</i> \u2212 1)")+"</p><p>Переходов: "+nb(String(trans))+
      ". Подставляем: "+nb(fmtN(f.a1))+" + "+nb(fmtN(f.d))+" · "+nb(String(trans))+" = "+ansS+".</p>"+
      (f.base===0? "<p class='small muted'>Здесь отсчёт от нулевой минуты, поэтому переходов ровно "+trans+".</p>":"");
  }
  else if(c==="AP-SUM"){
    const vals=[f.a1]; for(let i=1;i<f.n;i++) vals.push(Fr.add(vals[i-1],f.d));
    const aN=vals[vals.length-1];
    const pair=Fr.add(f.a1,aN), twoS=Fr.mul(pair,F(f.n));
    wt=gaussVisual(vals, {sumRow:true})+
      "<p>Метод Гаусса: записали сумму дважды, все столбики по "+nb(fmtN(pair))+". Удвоенная сумма "+nb(fmtN(pair))+" · "+nb(String(f.n))+" = "+nb(fmtN(twoS))+", делим на 2: "+ansS+".</p>";
    wf="<p>"+fx(SN+" = "+fracHTML("("+A1+" + "+AN+") · <i>n</i>","2"))+"</p><p>Последний член: "+nb(fmtN(aN))+
      ". Сумма: ("+nb(fmtN(f.a1))+" + "+nb(fmtN(aN))+") · "+nb(String(f.n))+" ÷ 2 = "+ansS+".</p>";
  }
  else if(c==="AP-2PT"){
    if(f.sub==="press"){
      wt="<p>Каждые "+nb(fmtN(f.s))+" м давление падает на 1 мм. Отрезков подъёма: "+nb(String(f.k))+". Значит давление ниже на "+nb(String(f.k))+" мм: "+ansS+".</p>";
      wf="<p>Та же лесенка формулой: "+fx("<i>P</i> = <i>P</i><sub>1</sub> \u2212 "+fracHTML("\u0394<i>h</i>", fmtN(f.s)))+" = "+nb(fmtN(f.P1))+" \u2212 "+nb(String(f.k))+" = "+ansS+".</p>";
    } else {
      const span=f.m-f.k, d=Fr.div(Fr.sub(f.am,f.ak),F(span));
      wt="<p>Между известными точками "+nb(String(span))+" переходов и изменение "+nb(fmtN(Fr.sub(f.am,f.ak)))+
        ". Значит за один переход "+nb(plusStr(d))+". Шагаем дальше до цели: "+ansS+".</p>";
      wf="<p>"+fx("<i>d</i> = "+fracHTML("<i>a</i><sub><i>m</i></sub> \u2212 <i>a</i><sub><i>k</i></sub>","<i>m</i> \u2212 <i>k</i>"))+
        " = "+nb(fmtN(d))+", затем "+fx(AN+" = "+A1+" + <i>d</i>(<i>n</i> \u2212 1)")+" от известной точки: "+nb(fmtN(f.ak))+" + "+nb(fmtN(d))+" · "+nb(String(f.p-f.k))+" = "+ansS+".</p>";
    }
  }
  else if(c==="AP-SUM2DAY"){
    if(f.sub==="snail"){
      wt="<p>Пары «первый + последний», «второй + предпоследний» и так далее одинаковые: по "+nb(fmtN(f.Fs))+" м. Пар: половина числа дней. Значит дней 2 · "+nb(fmtN(f.S))+" ÷ "+nb(fmtN(f.Fs))+" = "+ansS+".</p>";
      wf="<p>"+fx(SN+" = "+fracHTML("("+A1+" + "+AN+") · <i>n</i>","2"))+" ⇒ "+fx("<i>n</i> = "+fracHTML("2"+sub_("S"),fmtN(f.Fs)))+" = "+ansS+".</p>";
    } else {
      const pairSum=Fr.div(Fr.mul(F(2),f.S),F(f.Nd));
      wt="<p>Средняя пара «первый + последний» = 2 · сумма ÷ дни = "+nb(fmtN(pairSum))+". Отсюда последний день, дневная прибавка "+nb(fmtN(f.d))+" и шагаем к "+f.k+"-му дню: "+ansS+".</p>";
      wf="<p>Из "+fx(SN+" = "+fracHTML("("+A1+" + "+AN+") · <i>n</i>","2"))+" находим "+AN+" = "+nb(fmtN(Fr.sub(pairSum,f.a1)))+
        ", затем <i>d</i> = "+nb(fmtN(f.d))+" и "+fx("<i>a</i><sub>"+f.k+"</sub> = "+A1+" + <i>d</i> · "+(f.k-1))+" = "+ansS+".</p>";
    }
  }
  else if(c==="GP-VAL"){
    const up = (f.sub==="grow" || f.sub==="dough");
    const down=!up;
    const vals=[f.m0]; for(let i=1;i<=f.k;i++) vals.push(down? Fr.div(vals[i-1],f.q):Fr.mul(vals[i-1],f.q));
    const labels= f.sub==="back"? vals.map((_,i)=>i===0?"стало":("\u2212"+i+" дел."))
      : f.sub==="filter"? vals.map((_,i)=>i===0?"вход":(i+" ф."))
      : vals.map((_,i)=>(i*(f.P||1))+" мин");
    const unitWord = f.sub==="filter"? "фильтру" : "периоду";
    wt=shortTape(vals,labels,(down?divStr(f.q):mulStr(f.q)),true,7)+

/* Пункт 1: одинаковая прибавка -> лента шагов, дозаполнение */
function renderL1(seed){
  const el=document.getElementById("L1"); if(!el) return;
  const r=T.rng(seed||(1000+Math.floor(Math.random()*1e6)));

  const cells=[];
  for(let i=0;i<n;i++){
    if(i<n-1) cells.push({idx:(i+1)+"-й",val:fmtN(F(vals[i])), hl:i===n-2});
    else cells.push({idx:(i+1)+"-й",val:"?", hl:true});
  }
  el.innerHTML=`
    <div class="tpoint"><span class="pn">1</span><h3>Одинаковая прибавка — это арифметическая прогрессия</h3></div>

    ${T.tapeHTML(cells,"+"+d)}
    <p>Продолжи ленту в уме: какое число должно стоять на ${n}-м шаге?</p>
    <div class="ansrow"><span class="ansfield"><input id="l1in" inputmode="numeric" placeholder="?"></span>
      <button class="btn mini" id="l1ck">Проверить</button>
      <button class="ghost btn mini peekbtn" id="l1show">Показать шаг</button></div>
    <div class="fb" id="l1fb"></div>
    <div id="l1more"></div>
  `;
  const inp=el.querySelector("#l1in"), fb=el.querySelector("#l1fb");
  el.querySelector("#l1ck").onclick=()=>{
    const v=T.parseDec(inp.value);
    if(v===null){ fb.className="fb try"; fb.textContent="Впиши число."; return; }
    if(Fr.eq(v,F(ansVal))){ fb.className="fb ok"; fb.innerHTML="Верно. На ленте видно: к предыдущему "+nb(fmtN(F(vals[n-2])))+" прибавили "+nb("+"+d)+"."; addMore1(); }
    else if(Fr.eq(v,F(vals[n-2]+2*d))){ fb.className="fb try"; fb.textContent="Кажется, прибавил дважды. Между соседними шагами ровно одна прибавка."; }

  el.querySelector("#l1show").onclick=()=>{
    inp.value=fmtN(F(ansVal));
    fb.className="fb info"; fb.innerHTML="Ответ: "+nb(fmtN(F(ansVal)))+". К "+nb(fmtN(F(vals[n-2])))+" прибавили "+nb("+"+d)+".";

    more.querySelector("#l1again").onclick=()=>renderL1();
  }
}

/* Пункт 4: множитель -> геометрическая */
function renderL4(seed){
  const el=document.getElementById("L4"); if(!el) return;
  const r=T.rng(seed||(4000+Math.floor(Math.random()*1e6)));
  const down=r()<0.6;
  const q= down? 2 : T.pick(r,[2,3]);
  const k=T.ri(r,3,4);
  const base= down? T.ri(r,3,12) : T.ri(r,3,10);
  const start= down? base*Math.pow(q,k) : base;
  const vals=[start]; for(let i=1;i<=k;i++) vals.push(down? vals[i-1]/q : vals[i-1]*q);
  const ansVal=vals[k];
  learnState.l4={ans:ansVal, revealed:false, down, q};
  const cells=[];
  for(let i=0;i<=k;i++){
    if(i<k) cells.push({idx:(i*7)+" мин",val:fmtN(F(vals[i])), hl:i===k-1});
    else cells.push({idx:(i*7)+" мин",val:"?", hl:true});
  }
  el.innerHTML=`
    <div class="tpoint"><span class="pn">4</span><h3>Одинаковый множитель — это геометрическая прогрессия</h3></div>
    <p>Здесь между шагами не прибавляют, а ${down?"делят":"умножают"} на ${nb(String(q))}. Каждые 7 минут ${down?"масса уменьшается в "+q+" "+T.words.timesW(q):"масса растёт в "+q+" "+T.words.timesW(q)}:</p>
    ${T.tapeHTML(cells,(down?"÷":"×")+q,{gp:true})}
    <p>Какое число будет через ${k*7} минут?</p>
    <div class="ansrow"><span class="ansfield"><input id="l4in" inputmode="numeric" placeholder="?"></span>
      <button class="btn mini" id="l4ck">Проверить</button>
      <button class="ghost btn mini peekbtn" id="l4show">Показать шаг</button></div>
    <div class="fb" id="l4fb"></div>
    <div id="l4more"></div>
  `;
  const inp=el.querySelector("#l4in"), fb=el.querySelector("#l4fb");
  el.querySelector("#l4ck").onclick=()=>{
    const v=T.parseDec(inp.value);
    if(v===null){ fb.className="fb try"; fb.textContent="Впиши число."; return; }
    if(Fr.eq(v,F(ansVal))){ fb.className="fb ok"; fb.innerHTML="Верно. Каждый шаг "+(down?"делим":"умножаем")+" на "+nb(String(q))+", а не прибавляем. Это и есть геометрическая прогрессия."; addMore4(); }
    else if(Fr.eq(v,F(down? vals[k-1]-q : vals[k-1]+q))){ fb.className="fb try"; fb.textContent="Здесь не прибавляют и не вычитают число — каждый раз "+(down?"делят":"умножают")+" на "+q+"."; }
    else { fb.className="fb try"; fb.textContent="Пока не то. Возьми предыдущее число и "+(down?"раздели":"умножь")+" на "+q+"."; }
  };
  el.querySelector("#l4show").onclick=()=>{
    inp.value=fmtN(F(ansVal));
    fb.className="fb info"; fb.innerHTML="Ответ: "+nb(fmtN(F(ansVal)))+". Предыдущее "+nb(fmtN(F(vals[k-1])))+" "+(down?"делим":"умножаем")+" на "+nb(String(q))+".";
    addMore4();
  };
  function addMore4(){
    const more=el.querySelector("#l4more"); if(learnState.l4.revealed) return; learnState.l4.revealed=true;
    more.innerHTML=`<div class="btnrow"><button class="btn mini soft" id="l4again">Ещё пример этой темы</button></div>`;
    more.querySelector("#l4again").onclick=()=>renderL4();
  }
}

        checks++;
        if(!T.Fr.eq(sim, task.ans)){ fails.push(code+"#"+s+": sim="+T.fmtN(sim)+" ans="+T.fmtN(task.ans)); }
        /* ответ должен быть конечной десятичной дробью или целым */
        if(!T.decParts(task.ans)){ fails.push(code+"#"+s+": ответ не десятичный "+task.ans.n+"/"+task.ans.d); }
        /* дистракторы не равны ответу */
        for(const d of task.distract){ if(T.Fr.eq(d.v, task.ans)) fails.push(code+"#"+s+": дистрактор = ответ"); }
        if(fails.length>8) break;
      }catch(e){ fails.push(code+"#"+s+": "+e.message); }
    }
    if(fails.length>8) break;
  }
  if(fails.length===0){ out.innerHTML="✓ самопроверка: <b>"+checks+"</b> задач сгенерировано и решено сходящимся кодом, ошибок нет"; }
  else { out.innerHTML="⚠ найдены расхождения ("+fails.length+"): "+fails.slice(0,4).join(" | "); out.style.color="#9a5b12"; }
}
setTimeout(selfCheck, 30);
})(typeof T14!=="undefined"?T14:window.T14);

</script>
