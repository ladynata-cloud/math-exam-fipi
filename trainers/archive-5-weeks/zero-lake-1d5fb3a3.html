<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Озеро нуля — противоположные числа и их сумма</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#eef2f5;--card:#fff;--hdr:#2c3e4e;
  --blue:#2c7da0;--blue-h:#1f5e7a;--blue-lt:#e0f2fe;
  --ok:#16a34a;--ok-bg:#dcfce7;--ok-dk:#14532d;
  --err:#dc2626;--err-bg:#fee2e2;--err-dk:#7f1d1d;
  --amber:#d97706;--amb-bg:#fef3c7;--amb-dk:#78350f;
  --muted:#94a3b8;--border:#d1dae4;--text:#1a2c3e;--text-lt:#64748b;
  --lake:#16a34a; /* zero lake color */
}
html{scroll-behavior:smooth}
body{background:var(--bg);font-family:'Segoe UI',Roboto,sans-serif;color:var(--text);min-height:100vh;display:flex;flex-direction:column}

.hdr{background:var(--hdr);color:#fff;padding:15px 28px;display:flex;align-items:center;justify-content:space-between;gap:14px}
.hdr h1{font-size:1.4rem;font-weight:600;letter-spacing:-.3px}
.hdr p{font-size:.78rem;opacity:.62;margin-top:2px}
.back a{color:rgba(255,255,255,.5);font-size:.82rem;text-decoration:none;font-weight:500;transition:color .18s}
.back a:hover{color:#fff}
.mode-bar{background:#f0f3f7;border-bottom:1px solid var(--border);padding:11px 28px;display:flex;gap:12px}
.mbtn{background:transparent;border:none;font-size:.97rem;font-weight:600;padding:7px 20px;border-radius:40px;cursor:pointer;color:var(--text);transition:.18s;font-family:inherit}
.mbtn.active{background:var(--hdr);color:#fff}

#app{flex:1;display:flex;flex-direction:column;align-items:center;padding:24px 16px 48px}
.card{background:var(--card);border-radius:20px;padding:24px 22px;box-shadow:0 4px 20px rgba(0,0,0,.07);width:100%;max-width:640px}
.card+.card{margin-top:14px}

/* ЧИСЛОВАЯ ПРЯМАЯ */
.nl-card{background:#f4f9fe;border-radius:18px;padding:18px 14px 12px;border:1px solid #d4e2ec;margin-bottom:16px;overflow:hidden;min-height:136px}
.nl-card svg{display:block;width:100%}

/* ВЫРАЖЕНИЕ */
.expr-wrap{text-align:center;margin:10px 0 16px}
.expr-intro{font-size:.82rem;color:var(--text-lt);margin-bottom:4px}
.expr-main{font-family:'Courier New',monospace;font-size:2.5rem;font-weight:800;letter-spacing:2px;line-height:1;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px}
@media(max-width:480px){.expr-main{font-size:1.9rem}}
.en {color:#b91c1c}   /* negative number */
.ep {color:#1d6fa4}   /* positive number */
.ez {color:#16a34a}   /* zero */
.eo {color:#94a3b8}   /* operator */
.eq {color:#94a3b8}   /* question mark / equals */
.er {color:#16a34a}   /* result = 0 */

/* ВВОД */
.inp-row{display:flex;justify-content:center;align-items:center;gap:12px;margin-bottom:14px}
.m-inp{font-size:1.6rem;width:120px;text-align:center;border:2.5px solid var(--border);border-radius:50px;padding:9px 8px;font-weight:800;font-family:'Courier New',monospace;outline:none;transition:border-color .2s;appearance:textfield;-moz-appearance:textfield}
.m-inp::-webkit-inner-spin-button,.m-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.m-inp:focus{border-color:var(--blue)}
.m-inp.inp-ok{border-color:var(--ok);background:var(--ok-bg)}
.m-inp.inp-err{border-color:var(--err);background:var(--err-bg)}
.go-btn{background:var(--blue);border:none;color:#fff;padding:11px 24px;border-radius:40px;font-size:.95rem;font-weight:700;cursor:pointer;transition:.15s;font-family:inherit}
.go-btn:hover{background:var(--blue-h)}
.go-btn:disabled{background:var(--muted);cursor:default}

/* ВЫБОР ДА/НЕТ */
.yn-row{display:flex;gap:12px;justify-content:center;margin-bottom:14px}
.yn-btn{padding:13px 28px;border:2.5px solid var(--border);border-radius:40px;font-size:1rem;font-weight:700;cursor:pointer;background:#fff;color:var(--text);transition:all .17s;font-family:inherit}
.yn-btn:hover:not(:disabled){border-color:var(--blue);color:var(--blue)}
.yn-btn.ok{border-color:var(--ok);background:var(--ok-bg);color:var(--ok-dk);pointer-events:none}
.yn-btn.ng{border-color:var(--err);background:var(--err-bg);color:var(--err-dk);pointer-events:none;animation:shake .38s}
.yn-btn.dim{opacity:.3;pointer-events:none}
.yn-btn:disabled{pointer-events:none}

/* ОБРАТНАЯ СВЯЗЬ */
.fb{border-radius:14px;padding:12px 16px;font-size:.9rem;line-height:1.65;margin-bottom:13px;display:none;animation:fadeIn .3s ease}
.fb.vis{display:block}
.fb-ok  {background:var(--ok-bg);border-left:4px solid var(--ok);color:var(--ok-dk)}
.fb-err {background:var(--err-bg);border-left:4px solid var(--err);color:var(--err-dk)}
.fb-hint{background:var(--amb-bg);border-left:4px solid var(--amber);color:var(--amb-dk)}

/* ДЕМО-ОБЪЯСНЕНИЕ */
.demo-box{background:#f0f6fb;border-radius:14px;padding:13px 16px;margin-bottom:14px;border-left:3px solid var(--blue);font-size:.92rem;line-height:1.7;color:#1a3e54}
.demo-box strong{color:var(--text)}
.demo-tag{font-size:.67rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--blue);display:block;margin-bottom:5px}
.lake-box{background:#edfaf3;border-radius:14px;padding:13px 16px;margin-bottom:14px;border-left:3px solid var(--ok);font-size:.92rem;line-height:1.7;color:var(--ok-dk)}
.lake-tag{font-size:.67rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--ok);display:block;margin-bottom:5px}

/* ПРОГРЕСС */
.pdots{display:flex;gap:6px;justify-content:flex-end;margin-bottom:10px;flex-wrap:wrap}
.pdot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:.3s;flex-shrink:0}
.pdot.ok{background:var(--ok)}.pdot.ng{background:var(--err)}.pdot.ac{background:var(--blue);transform:scale(1.35)}.pdot.gd{background:#d4e2ec}

.prog-wrap{width:100%;max-width:640px;margin-bottom:14px}
.prog-top{display:flex;justify-content:space-between;font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
.prog-bar-w{height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-bar-f{height:100%;background:var(--blue);border-radius:4px;transition:width .4s}

/* КНОПКИ */
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:11px 22px;border:none;border-radius:40px;font-size:.93rem;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.btn-p{background:var(--blue);color:#fff}.btn-p:hover{background:var(--blue-h);transform:translateY(-1px)}
.btn-ok{background:var(--ok);color:#fff}.btn-ok:hover{background:#15803d}
.btn-g{background:transparent;border:2px solid var(--border);color:var(--text-lt)}.btn-g:hover{border-color:var(--text-lt);color:var(--text)}
.btn-h{background:var(--amb-bg);color:var(--amb-dk);border:2px solid var(--amber)}.btn-h:hover{background:var(--amber);color:#fff}

/* ПРАВИЛО */
.rule-card{background:linear-gradient(140deg,#1e3a4e,#2c5c72);border-radius:18px;padding:26px 22px;color:#fff;text-align:center;animation:fadeIn .4s}
.rule-ico{font-size:2.2rem;margin-bottom:10px}
.rule-ttl{font-size:1.25rem;font-weight:700;margin-bottom:12px}
.rule-def{background:rgba(255,255,255,.12);border-radius:12px;padding:14px 18px;font-size:.95rem;line-height:1.65;margin-bottom:14px}
.rule-ex-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.rule-ex{background:rgba(255,255,255,.1);border-radius:10px;padding:8px 14px;font-family:'Courier New',monospace;font-size:.95rem;font-weight:700}
.rule-ex.a{color:#7dd3fc}.rule-ex.b{color:#fca5a5}.rule-ex.c{color:#86efac}

/* РЕЗУЛЬТАТЫ */
.res-score{text-align:center;padding:4px 0 16px}
.res-big{font-size:3.8rem;font-weight:900;font-family:'Courier New',monospace}
.res-big.ex{color:var(--ok)}.res-big.go{color:var(--blue)}.res-big.fa{color:var(--amber)}.res-big.po{color:var(--err)}
.res-lbl{font-size:.97rem;font-weight:600;color:var(--text-lt);margin-top:4px}
.err-stat{display:flex;flex-direction:column;gap:8px;margin:10px 0}
.err-s-item{background:var(--err-bg);border-left:3px solid var(--err);border-radius:10px;padding:10px 14px;font-size:.87rem;color:var(--err-dk);display:flex;justify-content:space-between}
.err-cnt{font-weight:800}
.divider{height:1px;background:var(--border);margin:16px 0}

/* СТАРТ */
.start-ico{font-size:2.4rem;margin-bottom:10px;text-align:center}
.start-ttl{font-size:1.45rem;font-weight:700;margin-bottom:8px;text-align:center}
.start-sub{font-size:.93rem;color:var(--text-lt);line-height:1.65;margin-bottom:18px;text-align:center}
.key-idea{background:#edfaf3;border-radius:14px;padding:14px 16px;margin-bottom:18px;font-size:.93rem;line-height:1.7;color:#0a3a1e;border-left:4px solid var(--ok)}
.key-idea strong{color:var(--text)}
.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mc{border:2px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:all .18s;text-align:center;background:var(--card)}
.mc:hover{border-color:var(--ok);transform:translateY(-2px);box-shadow:0 5px 14px rgba(22,163,74,.14)}
.mc-ico{font-size:1.5rem;margin-bottom:6px}.mc-name{font-size:.97rem;font-weight:700;color:var(--text);margin-bottom:4px}.mc-desc{font-size:.76rem;color:var(--text-lt);line-height:1.4}

.mt12{margin-top:12px}.mt16{margin-top:16px}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
</style>
</head>
<body>

<header class="hdr">
  <div>
    <h1>🌊 Озеро нуля</h1>
    <p>Боковая миссия · Противоположные числа и их сумма</p>
  </div>
  <div class="back"><a href="skill-map.html">← Карта</a></div>
</header>

<div class="mode-bar">
  <button id="btnL" class="mbtn active" onclick="setMode('learn')">📘 Обучение</button>
  <button id="btnP" class="mbtn"        onclick="setMode('practice')">⚡ Тренировка</button>
</div>

<div id="app"></div>

<script>
/* ══════════════════════ SVG ЧИСЛОВОЙ ПРЯМОЙ ════════════════════
   ViewBox 0 0 620 148   Ось y=87   Ноль x=310   1ед=28px
═══════════════════════════════════════════════════════════════ */
const AY=87, ZX=310, U=28;
const px = v => ZX + v*U;
const CL='#b91c1c', CR='#1d6fa4', CZ='#16a34a';
const nc = v => v<0?CL:v>0?CR:CZ;

function nlSVG(n1, n2, showLake){
  /* n1: required; n2: second point or null; showLake: show glow+pair annotations */
  const bothOpposite = n2!==null && n1!==0 && n2!==-n1===false && Math.abs(n1)===Math.abs(n2) && n1+n2===0;
  // simplified: showLake means we trust caller that they're opposite
  let s=`<svg viewBox="0 0 620 148" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;overflow:visible">`;

  /* ── Озеро нуля (свечение) ── */
  if(showLake){
    s+=`<circle cx="${ZX}" cy="${AY}" r="40" fill="${CZ}" opacity=".13"/>`;
    s+=`<circle cx="${ZX}" cy="${AY}" r="26" fill="${CZ}" opacity=".13"/>`;
  } else {
    s+=`<circle cx="${ZX}" cy="${AY}" r="26" fill="${CZ}" opacity=".06"/>`;
  }
  const lakeY=AY+42;
  s+=`<text x="${ZX}" y="${lakeY}" text-anchor="middle" font-size="10" fill="${CZ}" opacity="${showLake?.85:.35}" font-family="Segoe UI,sans-serif" font-style="italic">озеро нуля</text>`;

  /* ── Сегменты и аннотация пары ── */
  if(showLake && n2!==null && n1!==0){
    const abs=Math.abs(n1);
    const xL=px(-abs), xR=px(abs);
    /* Подложка */
    s+=`<line x1="${xL}" y1="${AY}" x2="${ZX}" y2="${AY}" stroke="${CL}" stroke-width="9" stroke-linecap="round" opacity=".22"/>`;
    s+=`<line x1="${ZX}" y1="${AY}" x2="${xR}" y2="${AY}" stroke="${CR}" stroke-width="9" stroke-linecap="round" opacity=".22"/>`;
    /* Скобки */
    const BY=AY-26;
    const mL=(xL+ZX)/2, mR=(ZX+xR)/2;
    s+=`<line x1="${xL}" y1="${BY}" x2="${ZX}" y2="${BY}" stroke="${CL}" stroke-width="2"/>`;
    s+=`<line x1="${xL}" y1="${BY}" x2="${xL}" y2="${AY}" stroke="${CL}" stroke-width="1.5" stroke-dasharray="3,2" opacity=".55"/>`;
    s+=`<polygon points="${xL},${BY} ${xL+7},${BY-4} ${xL+7},${BY+4}" fill="${CL}"/>`;
    s+=`<polygon points="${ZX},${BY} ${ZX-7},${BY-4} ${ZX-7},${BY+4}" fill="${CL}"/>`;
    s+=`<text x="${mL}" y="${BY-8}" text-anchor="middle" font-size="11" font-weight="700" fill="${CL}" font-family="Segoe UI,sans-serif">${abs} ед.</text>`;
    s+=`<line x1="${ZX}" y1="${BY}" x2="${xR}" y2="${BY}" stroke="${CR}" stroke-width="2"/>`;
    s+=`<line x1="${xR}" y1="${BY}" x2="${xR}" y2="${AY}" stroke="${CR}" stroke-width="1.5" stroke-dasharray="3,2" opacity=".55"/>`;
    s+=`<polygon points="${ZX},${BY} ${ZX+7},${BY-4} ${ZX+7},${BY+4}" fill="${CR}"/>`;
    s+=`<polygon points="${xR},${BY} ${xR-7},${BY-4} ${xR-7},${BY+4}" fill="${CR}"/>`;
    s+=`<text x="${mR}" y="${BY-8}" text-anchor="middle" font-size="11" font-weight="700" fill="${CR}" font-family="Segoe UI,sans-serif">${abs} ед.</text>`;
    /* Метка = 0 */
    s+=`<text x="${ZX}" y="${AY-42}" text-anchor="middle" font-size="17" font-weight="900" fill="${CZ}" font-family="Courier New,monospace">= 0</text>`;
    /* Подпись */
    s+=`<text x="${ZX}" y="${AY+30}" text-anchor="middle" font-size="11" fill="#5f7f9c" font-family="Segoe UI,sans-serif">гасят друг друга</text>`;
  }
  if(showLake && n1===0 && n2===0){
    s+=`<text x="${ZX}" y="${AY-42}" text-anchor="middle" font-size="17" font-weight="900" fill="${CZ}" font-family="Courier New,monospace">= 0</text>`;
  }

  /* ── Ось ── */
  s+=`<line x1="22" y1="${AY}" x2="598" y2="${AY}" stroke="#c8d8e4" stroke-width="1.5"/>`;
  s+=`<polygon points="598,${AY} 590,${AY-4} 590,${AY+4}" fill="#c8d8e4"/>`;
  s+=`<polygon points="22,${AY} 30,${AY-4} 30,${AY+4}" fill="#c8d8e4"/>`;

  /* ── Деления ── */
  for(let i=-10;i<=10;i++){
    const x=px(i), isZ=i===0, isMaj=i%5===0;
    const th=isZ?11:isMaj?7:5;
    s+=`<line x1="${x}" y1="${AY-th}" x2="${x}" y2="${AY+th}" stroke="${isZ?'#1a2c3e':isMaj?'#5f7f9c':'#b0c8d8'}" stroke-width="${isZ?2.5:1}"/>`;
    if(isZ||isMaj||(Math.abs(i)===1)){
      s+=`<text x="${x}" y="${AY+20}" text-anchor="middle" font-size="${isZ?13:11}" font-weight="${isZ?700:400}" fill="${isZ?'#1a2c3e':'#7a9db5'}" font-family="Segoe UI,sans-serif">${i}</text>`;
    }
  }

  /* ── Ноль-кружок ── */
  s+=`<circle cx="${ZX}" cy="${AY}" r="${showLake?8:5}" fill="${CZ}" stroke="${showLake?'#fff':'none'}" stroke-width="2"/>`;

  /* ── Точки ── */
  function drawPoint(v, large){
    const x=px(v), c=nc(v), lbl=v<0?`−${Math.abs(v)}`:`${v}`;
    const lblY=(showLake&&n2!==null&&v!==0)?AY-46:AY-18;
    s+=`<circle cx="${x}" cy="${AY}" r="11" fill="${c}" stroke="#fff" stroke-width="2.5"/>`;
    s+=`<text x="${x}" y="${lblY}" text-anchor="middle" font-size="14" font-weight="800" fill="${c}" font-family="Courier New,monospace">${lbl}</text>`;
  }

  if(n1!==null) drawPoint(n1);
  if(n2!==null && !(n1===0&&n2===0)) drawPoint(n2);
  if(n1===0&&n2===0&&!showLake) drawPoint(0); // single zero for demo 3

  s+=`</svg>`;
  return s;
}

/* ══════════════════════ ВЫРАЖЕНИЕ ════════════════════════════ */
function nSpan(v){
  if(v===null||v==='?') return `<span class="eq">?</span>`;
  const lbl=v<0?`(−${Math.abs(v)})`:(v===0?'0':`${v}`);
  const cls=v<0?'en':v===0?'ez':'ep';
  return `<span class="${cls}">${lbl}</span>`;
}
function nSpanPlain(v){
  if(v<0) return `<span class="en">−${Math.abs(v)}</span>`;
  if(v===0) return `<span class="ez">0</span>`;
  return `<span class="ep">${v}</span>`;
}

function buildExpr(task, answered){
  const {type} = task;
  const res = answered ? `<span class="er">0</span>` : `<span class="eq">?</span>`;
  if(type==='show'){
    const a=task.a, b=-a;
    const bDisp=b<0?`(−${Math.abs(b)})`:`${b}`;
    return`<div class="expr-wrap">
      <div class="expr-main">${nSpanPlain(a)}<span class="eo"> + </span>${nSpan(b)}<span class="eo"> = </span>${answered?`<span class="er">0</span>`:`<span class="eo">0</span>`}</div>
    </div>`;
  }
  if(type==='A'){
    const a=task.a, b=task.b;
    return`<div class="expr-wrap">
      <div class="expr-intro">Найди сумму:</div>
      <div class="expr-main">${nSpanPlain(a)}<span class="eo"> + </span>${nSpan(b)}<span class="eo"> = </span>${res}</div>
    </div>`;
  }
  if(type==='B'){
    // a + ? = 0
    const ansDisp = answered ? nSpan(task.answer) : `<span class="eq">?</span>`;
    return`<div class="expr-wrap">
      <div class="expr-intro">Найди недостающее слагаемое:</div>
      <div class="expr-main">${nSpanPlain(task.a)}<span class="eo"> + </span>${ansDisp}<span class="eo"> = </span><span class="er">0</span></div>
    </div>`;
  }
  if(type==='C'){
    // ? + b = 0
    const ansDisp = answered ? nSpan(task.answer) : `<span class="eq">?</span>`;
    return`<div class="expr-wrap">
      <div class="expr-intro">Найди недостающее слагаемое:</div>
      <div class="expr-main">${ansDisp}<span class="eo"> + </span>${nSpan(task.b)}<span class="eo"> = </span><span class="er">0</span></div>
    </div>`;
  }
  if(type==='D'){
    return`<div class="expr-wrap">
      <div class="expr-intro">Являются ли эти числа противоположными?</div>
      <div class="expr-main">${nSpanPlain(task.n1)}<span class="eo"> и </span>${nSpan(task.n2)}</div>
    </div>`;
  }
  return '';
}

/* ══════════════════════ ДИАГНОСТИКА ══════════════════════════ */
function diagnose(task, ua){
  const {type} = task;

  if(type==='A'){
    const abs=Math.abs(task.a);
    if(ua===2*abs||ua===-(2*abs))
      return{code:'addedMod',msg:`Ты сложил модули (${abs}+${abs}=${2*abs}). Но противоположные числа не складываются, а гасят друг друга → сумма всегда 0.`};
    if(ua===task.a||ua===task.b)
      return{code:'onePart',msg:`Ты написал одно из слагаемых, а не их сумму. ${task.a} + ${task.b<0?'('+task.b+')':task.b} = <strong>0</strong>.`};
    return{code:'generic',msg:`Сумма противоположных чисел всегда равна нулю: ${task.a} + ${task.b<0?'('+task.b+')':task.b} = <strong>0</strong>.`};
  }

  if(type==='B'){
    const correct=task.answer, a=task.a, abs=Math.abs(a);
    if(ua===a)
      return{code:'sameNum',msg:`Ты написал то же число (${a}). Нужно число с <em>другой</em> стороны от нуля: ${correct<0?'−'+abs:'+'+abs}.`};
    if(Math.abs(ua)===abs)
      return{code:'wrongSign',msg:`Правильное расстояние (${abs}), но неверная сторона. Нужно ${correct<0?'−'+abs:'+'+abs}.`};
    if(ua===0)
      return{code:'zeroMiss',msg:`Если ${a} + 0 = ${a}, а не 0. Нужно число, которое полностью погасит ${a}. Это ${correct<0?'−'+abs:'+'+abs}.`};
    return{code:'generic',msg:`Нужно число на расстоянии ${abs} от нуля с ${correct>0?'правой':'левой'} стороны: это ${correct<0?'−'+abs:'+'+abs}.`};
  }

  if(type==='C'){
    const correct=task.answer, b=task.b, abs=Math.abs(b);
    if(ua===b)
      return{code:'sameNum',msg:`Ты написал то же число, что уже есть (${b}). Нужно противоположное: ${correct<0?'−'+abs:'+'+abs}.`};
    if(Math.abs(ua)===abs)
      return{code:'wrongSign',msg:`Правильное расстояние (${abs}), но неверная сторона. Нужно ${correct<0?'−'+abs:'+'+abs}.`};
    return{code:'generic',msg:`? + ${b<0?'('+b+')':b} = 0. Нужно число, противоположное ${b}: это ${correct<0?'−'+abs:'+'+abs}.`};
  }

  if(type==='D'){
    if(task.isOpp && ua===false)
      return{code:'missDist',msg:`Числа ${task.n1} и ${task.n2} — противоположные! Оба на расстоянии ${Math.abs(task.n1)} от нуля, просто с разных сторон.`};
    if(!task.isOpp && ua===true){
      const abs1=Math.abs(task.n1), abs2=Math.abs(task.n2);
      if(abs1!==abs2)
        return{code:'diffDist',msg:`Расстояния разные: |${task.n1}|=${abs1}, |${task.n2}|=${abs2}. У противоположных чисел расстояния от нуля должны быть одинаковыми.`};
      return{code:'sameSign',msg:`У противоположных чисел должны быть разные знаки и одинаковые расстояния от нуля.`};
    }
    return{code:'generic',msg:`Проверь: одинаково ли расстояние от нуля до ${task.n1} и от нуля до ${task.n2}?`};
  }

  return{code:'generic',msg:`Верный ответ: 0.`};
}

/* ══════════════════════ СОСТОЯНИЕ ════════════════════════════ */
const S={
  mode:'learn', screen:'start',
  lStep:0, lAnswered:false, lAttempts:0, lHint:false,
  _lErr:null, _lOkMsg:null, lDotStatus:[],
  pTasks:[], pIdx:0, pAnswered:false, _pFb:null, pAnswers:[],
};

/* Шаги обучения */
const LEARN=[
  /* demos */
  {step:1,type:'show',a:6},
  {step:2,type:'show',a:-4},
  {step:3,type:'show',a:0},
  /* practice */
  {step:4,type:'A',a:7,b:-7,answer:0},
  {step:5,type:'B',a:9,answer:-9},
  {step:6,type:'C',b:-5,answer:5},
  {step:7,type:'D',n1:3,n2:-3,isOpp:true,answer:true},
  {step:8,type:'D',n1:4,n2:-7,isOpp:false,answer:false},
];
const DEMO_TEXT=[
  {text:'Смотри: числа <strong>6</strong> и <strong>−6</strong> находятся на одинаковом расстоянии от нуля, по разные стороны.',
   lake:'Они противоположные — гасят друг друга. <em>6 + (−6) = 0.</em><br>Одно уводит вправо на 6, другое возвращает влево на 6 → оказываемся ровно в нуле.'},
  {text:'Первое число отрицательное: <strong>−4</strong>. Противоположное — <strong>+4</strong>.',
   lake:'<em>−4 + 4 = 0.</em><br>Ушли влево на 4, вернулись вправо на 4 → снова ноль.<br><strong>Запомни:</strong> противоположное к отрицательному числу всегда положительное!'},
  {text:'Особый случай: <strong>ноль</strong>. Он уже находится в центре — прямо в озере нуля.',
   lake:'<em>0 + 0 = 0.</em><br>Ноль симметричен сам себе. Его «противоположное» — тоже ноль.'},
];

/* ══════════════════════ РЕЖИМ ════════════════════════════════ */
function setMode(m){
  S.mode=m; S.screen='start';
  document.getElementById('btnL').classList.toggle('active',m==='learn');
  document.getElementById('btnP').classList.toggle('active',m==='practice');
  render();
}

/* ══════════════════════ РЕНДЕР ══════════════════════════════ */
function render(){
  const app=document.getElementById('app');
  if(S.screen==='start')       app.innerHTML=buildStart();
  else if(S.screen==='learn')  app.innerHTML=buildLearn();
  else if(S.screen==='practice') app.innerHTML=buildPractice();
  else if(S.screen==='results')  app.innerHTML=buildResults();
  app.querySelectorAll('.m-inp').forEach(el=>{
    el.addEventListener('keydown',e=>{if(e.key==='Enter')checkAnswer();});
  });
}

/* ── СТАРТ ── */
function buildStart(){
  return`<div class="card" style="margin-top:8px">
    <div class="start-ico">🌊</div>
    <p class="start-ttl">Озеро нуля</p>
    <p class="start-sub">Ноль — точка равновесия. Противоположные числа встречаются в нём и гасят друг друга.</p>
    <div class="key-idea">
      Почему 5 + (−5) = 0?<br>
      <strong>Не магия знаков.</strong><br>
      +5 уводит вправо на 5 шагов.<br>
      −5 возвращает влево на те же 5 шагов.<br>
      В итоге — ровно ноль.
    </div>
    <div class="mc-grid">
      <div class="mc" onclick="startLearn()">
        <div class="mc-ico">📘</div>
        <div class="mc-name">Обучение</div>
        <div class="mc-desc">3 демо + 5 вопросов + правило</div>
      </div>
      <div class="mc" onclick="startPractice()">
        <div class="mc-ico">⚡</div>
        <div class="mc-name">Тренировка</div>
        <div class="mc-desc">10 заданий всех типов · статистика</div>
      </div>
    </div>
  </div>`;
}

/* ── ОБУЧЕНИЕ ── */
function buildLearn(){
  const step=S.lStep;

  /* Демо шаги 1-3 */
  if(step>=1&&step<=3){
    const task=LEARN[step-1];
    const dt=DEMO_TEXT[step-1];
    const a=task.a;
    const n1=a, n2=a===0?0:-a;
    const svg=nlSVG(n1,n2,true);
    return`<div class="card" style="margin-top:8px">
      <div class="pdots">${learnDots()}</div>
      <div style="font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--blue);margin-bottom:10px">Демо ${step} из 3</div>
      <div class="nl-card">${svg}</div>
      ${buildExpr(task,true)}
      <div class="demo-box"><span class="demo-tag">Смотри</span>${dt.text}</div>
      <div class="lake-box"><span class="lake-tag">Озеро нуля</span>${dt.lake}</div>
      <div class="btn-row mt12">
        <button class="btn btn-ok" onclick="nextLearnStep()">Понятно, дальше →</button>
        <button class="btn btn-g" onclick="S.screen='start';render()">К выбору</button>
      </div>
    </div>`;
  }

  /* Практика шаги 4-8 */
  if(step>=4&&step<=8){
    const task=LEARN[step-1];
    const isD=task.type==='D';
    const isLast=step===8;
    const fbHtml=S._lErr?`<div class="fb fb-err vis">${S._lErr}</div>`:S._lOkMsg?`<div class="fb fb-ok vis">${S._lOkMsg}</div>`:'';
    const hintHtml=S.lHint?`<div class="fb fb-hint vis">💡 ${getHint(task)}</div>`:'';
    const nextBtn=S.lAnswered?`<button class="btn btn-ok" onclick="nextLearnStep()">${isLast?'К выводу →':'Следующий →'}</button>`:'';
    const hintBtn=!S.lAnswered?`<button class="btn btn-h" onclick="S.lHint=true;render()">💡 Подсказка</button>`:'';

    /* SVG для разных типов */
    let svg='';
    if(task.type==='A'){
      svg=nlSVG(task.a, task.b, S.lAnswered);
    } else if(task.type==='B'){
      svg=nlSVG(task.a, S.lAnswered?task.answer:null, S.lAnswered);
    } else if(task.type==='C'){
      svg=nlSVG(task.b, S.lAnswered?task.answer:null, S.lAnswered);
    } else if(task.type==='D'){
      svg=nlSVG(task.n1, task.n2, S.lAnswered&&task.isOpp);
    }

    const inputArea = isD
      ? `<div class="yn-row">
          <button class="yn-btn ${S.lAnswered?(task.isOpp?'ok':'dim'):''}" id="ynY" onclick="checkYN(true)" ${S.lAnswered?'disabled':''}>✓ Да, противоположные</button>
          <button class="yn-btn ${S.lAnswered?(!task.isOpp?'ok':'dim'):''}" id="ynN" onclick="checkYN(false)" ${S.lAnswered?'disabled':''}>✗ Нет, не противоположные</button>
        </div>`
      : `<div class="inp-row">
          <input type="number" class="m-inp ${S.lAnswered?'inp-ok':''}" id="ansInp"
            placeholder="?" ${S.lAnswered?'disabled':''} value="${S.lAnswered?task.answer:''}">
          <button class="go-btn" onclick="checkAnswer()" ${S.lAnswered?'disabled':''}>Проверить</button>
        </div>`;

    return`<div class="card" style="margin-top:8px">
      <div class="pdots">${learnDots()}</div>
      <div class="nl-card">${svg}</div>
      ${buildExpr(task,S.lAnswered)}
      ${hintHtml}${fbHtml}
      ${inputArea}
      <div class="btn-row mt12">
        ${hintBtn}${nextBtn}
        <button class="btn btn-g" onclick="S.screen='start';render()">К выбору</button>
      </div>
    </div>`;
  }

  /* Шаг 9: итог */
  if(step===9){
    return`<div class="card" style="margin-top:8px">
      <div class="rule-card">
        <div class="rule-ico">🌊</div>
        <div class="rule-ttl">Закон озера нуля</div>
        <div class="rule-def">
          Сумма противоположных чисел всегда равна <strong>нулю</strong>:<br>
          a + (−a) = 0<br>
          Одно число уводит вправо, другое возвращает на столько же влево.
        </div>
        <div class="rule-ex-row">
          <div class="rule-ex a">5 + (−5) = 0</div>
          <div class="rule-ex b">−7 + 7 = 0</div>
          <div class="rule-ex c">0 + 0 = 0</div>
        </div>
        <div style="font-size:.82rem;opacity:.75;font-style:italic;margin-bottom:16px">
          Разные знаки сами по себе не дают 0 —<br>модули тоже должны совпадать.
        </div>
        <div class="btn-row" style="justify-content:center">
          <button class="btn" style="background:rgba(255,255,255,.25);color:#fff;border:2px solid rgba(255,255,255,.4)" onclick="startPractice()">⚡ К тренировке</button>
          <button class="btn btn-g" style="border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.7)" onclick="S.screen='start';render()">К выбору</button>
        </div>
      </div>
    </div>`;
  }

  return buildStart();
}

/* ── ТРЕНИРОВКА ── */
function buildPractice(){
  if(!S.pTasks.length) return buildStart();
  const task=S.pTasks[S.pIdx];
  const ok=S.pAnswers.filter(a=>a.ok).length;
  const ng=S.pAnswers.filter(a=>!a.ok).length;
  const pct=(S.pIdx/S.pTasks.length)*100;
  const isLast=S.pIdx===S.pTasks.length-1;
  const fbHtml=S._pFb?`<div class="fb ${S._pFb.cls} vis">${S._pFb.msg}</div>`:'';
  const nextBtn=S.pAnswered?`<button class="btn btn-ok" onclick="nextPractice()">${isLast?'Посмотреть результаты →':'Следующий →'}</button>`:'';
  const dis=S.pAnswered?'disabled':'';

  let svg='';
  if(task.type==='A')      svg=nlSVG(task.a, task.b, S.pAnswered);
  else if(task.type==='B') svg=nlSVG(task.a, S.pAnswered?task.answer:null, S.pAnswered);
  else if(task.type==='C') svg=nlSVG(task.b, S.pAnswered?task.answer:null, S.pAnswered);
  else if(task.type==='D') svg=nlSVG(task.n1, task.n2, S.pAnswered&&task.isOpp);

  const inputArea = task.type==='D'
    ? `<div class="yn-row">
        <button class="yn-btn ${S.pAnswered?(task.isOpp?'ok':'dim'):''}" onclick="checkYN(true)" ${dis}>✓ Да, противоположные</button>
        <button class="yn-btn ${S.pAnswered?(!task.isOpp?'ok':'dim'):''}" onclick="checkYN(false)" ${dis}>✗ Нет, не противоположные</button>
      </div>`
    : `<div class="inp-row">
        <input type="number" class="m-inp" id="ansInp" placeholder="?" ${dis} value="${S.pAnswered?task.answer:''}">
        <button class="go-btn" onclick="checkAnswer()" ${dis}>Проверить</button>
      </div>`;

  return`
  <div class="prog-wrap">
    <div class="prog-top">
      <span>Тренировка</span>
      <div style="display:flex;gap:12px">
        <span style="color:var(--ok);font-weight:700">✓ ${ok}</span>
        <span style="color:var(--err);font-weight:700">✗ ${ng}</span>
        <span>${S.pIdx+1} / ${S.pTasks.length}</span>
      </div>
    </div>
    <div class="prog-bar-w"><div class="prog-bar-f" style="width:${pct}%"></div></div>
  </div>
  <div class="card">
    <div class="nl-card">${svg}</div>
    ${buildExpr(task, S.pAnswered)}
    ${fbHtml}
    ${inputArea}
    <div class="btn-row mt12">
      ${nextBtn}
      <button class="btn btn-g" onclick="S.screen='start';render()">К выбору</button>
    </div>
  </div>`;
}

/* ── РЕЗУЛЬТАТЫ ── */
function buildResults(){
  const total=S.pAnswers.length;
  const corr=S.pAnswers.filter(a=>a.ok).length;
  const pct=Math.round(corr/total*100);
  const sc=pct>=90?'ex':pct>=70?'go':pct>=50?'fa':'po';
  const slbl=pct>=90?'Отлично! Озеро нуля полностью понято.':
             pct>=70?'Хороший результат! Ещё немного практики.':
             pct>=50?'Половина верно. Попробуй ещё раз.':
                     'Рекомендую пройти обучение ещё раз.';
  const EC={
    addedMod:'Сложены модули вместо гашения',
    onePart:'Написано одно слагаемое вместо суммы',
    sameNum:'Написано то же число, а не противоположное',
    wrongSign:'Верное расстояние, неверная сторона',
    missDist:'Пропущены противоположные числа',
    diffDist:'Приняты непротивоположные числа за противоположные',
    zeroMiss:'Ошибка с нулём',
    generic:'Прочие ошибки',
  };
  const misses={};
  S.pAnswers.filter(a=>!a.ok).forEach(a=>{misses[a.errCode]=(misses[a.errCode]||0)+1;});
  const errHtml=Object.keys(misses).length===0
    ?`<p style="color:var(--ok);font-weight:600">✓ Все задания выполнены верно!</p>`
    :Object.entries(misses).map(([code,cnt])=>`
      <div class="err-s-item">${EC[code]||code}<span class="err-cnt">${cnt}×</span></div>`).join('');
  return`<div class="card" style="margin-top:8px">
    <div class="res-score">
      <div class="res-big ${sc}">${corr}/${total}</div>
      <div class="res-lbl">${slbl}</div>
    </div>
    <div class="divider"></div>
    <p style="font-size:.69rem;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:10px">Типы ошибок</p>
    <div class="err-stat">${errHtml}</div>
    <div class="divider"></div>
    <div class="btn-row mt12">
      <button class="btn btn-p" onclick="startPractice()">Ещё раз</button>
      <button class="btn btn-g" onclick="startLearn()">Обучение</button>
      <button class="btn btn-g" onclick="S.screen='start';render()">К выбору</button>
    </div>
  </div>`;
}

/* ══════════════════════ ВСПОМОГАТЕЛЬНЫЕ ══════════════════════ */
function learnDots(){
  return[1,2,3,4,5,6,7,8].map(i=>{
    let cls;
    if(i<=3) cls=S.lStep>i?'ok':S.lStep===i?'ac':'gd';
    else{const pi=i-3; cls=S.lStep-3>pi?(S.lDotStatus[pi-1]||'ok'):S.lStep-3===pi?'ac':'gd';}
    return`<div class="pdot ${cls}"></div>`;
  }).join('');
}

function getHint(task){
  if(task.type==='A') return `Противоположные числа при сложении всегда дают 0. Ответ: 0.`;
  if(task.type==='B') return `Нужно число на расстоянии ${Math.abs(task.a)} от нуля, с ${task.answer>0?'правой':'левой'} стороны.`;
  if(task.type==='C') return `Нужно число на расстоянии ${Math.abs(task.b)} от нуля, с ${task.answer>0?'правой':'левой'} стороны.`;
  if(task.type==='D') return task.isOpp?`Оба числа находятся на расстоянии ${Math.abs(task.n1)} от нуля.`:`Расстояния от нуля разные: ${Math.abs(task.n1)} и ${Math.abs(task.n2)}.`;
  return '';
}

function shake(){
  const el=document.getElementById('ansInp');
  if(el&&el.animate)el.animate([{transform:'translateX(0)'},{transform:'translateX(-5px)'},{transform:'translateX(5px)'},{transform:'translateX(-3px)'},{transform:'translateX(0)'}],{duration:380});
}

/* ══════════════════════ ОБРАБОТЧИКИ ══════════════════════════ */
function checkAnswer(){
  const inp=document.getElementById('ansInp');
  if(!inp)return;
  const raw=inp.value.trim().replace('−','-');
  if(!raw){inp.style.borderColor='#dc2626';setTimeout(()=>inp.style.borderColor='',600);return;}
  const ua=parseInt(raw);
  if(isNaN(ua)){inp.style.borderColor='#dc2626';setTimeout(()=>inp.style.borderColor='',600);return;}
  S.mode==='learn'?handleLearnNum(ua):handlePracticeNum(ua);
}

function checkYN(val){
  S.mode==='learn'?handleLearnYN(val):handlePracticeYN(val);
}

function handleLearnNum(ua){
  const task=LEARN[S.lStep-1];
  if(ua===task.answer){
    S.lAnswered=true;
    S._lOkMsg=`✅ Верно! ${getOkMsg(task)}`;
    S._lErr=null;S.lHint=false;
    S.lDotStatus[S.lStep-4]='ok';render();
  } else {
    S.lAttempts++;
    const d=diagnose(task,ua);
    S._lErr=d?d.msg:'Неверно.';
    S._lOkMsg=null;
    if(S.lAttempts>=2){S.lAnswered=true;S._lErr=`❌ ${S._lErr}`;S.lDotStatus[S.lStep-4]='ng';}
    render();shake();
  }
}

function handleLearnYN(val){
  const task=LEARN[S.lStep-1];
  if(val===task.answer){
    S.lAnswered=true;
    S._lOkMsg=`✅ Верно! ${getOkMsg(task)}`;
    S._lErr=null;S.lHint=false;
    S.lDotStatus[S.lStep-4]='ok';render();
  } else {
    S.lAttempts++;
    const d=diagnose(task,val);
    S._lErr=d?d.msg:'Неверно.';
    S._lOkMsg=null;
    if(S.lAttempts>=2){S.lAnswered=true;S._lErr=`❌ ${S._lErr}`;S.lDotStatus[S.lStep-4]='ng';}
    render();
  }
}

function handlePracticeNum(ua){
  const task=S.pTasks[S.pIdx];
  if(ua===task.answer){
    S.pAnswered=true;
    S._pFb={cls:'fb-ok',msg:`✅ Верно! ${getOkMsg(task)}`};
    S.pAnswers.push({task,ua,ok:true,errCode:null});render();
  } else {
    const d=diagnose(task,ua);
    S.pAnswered=true;
    S._pFb={cls:'fb-err',msg:`❌ ${d?d.msg:'Верный ответ: '+task.answer+'.'}`};
    S.pAnswers.push({task,ua,ok:false,errCode:d?d.code:'generic'});render();shake();
  }
}

function handlePracticeYN(val){
  const task=S.pTasks[S.pIdx];
  const ok=(val===task.isOpp);
  if(ok){
    S.pAnswered=true;
    S._pFb={cls:'fb-ok',msg:`✅ Верно! ${getOkMsg(task)}`};
    S.pAnswers.push({task,ua:val,ok:true,errCode:null});render();
  } else {
    const d=diagnose(task,val);
    S.pAnswered=true;
    S._pFb={cls:'fb-err',msg:`❌ ${d?d.msg:''}`};
    S.pAnswers.push({task,ua:val,ok:false,errCode:d?d.code:'generic'});render();
  }
}

function getOkMsg(task){
  if(task.type==='A') return`${task.a} + ${task.b<0?'('+task.b+')':task.b} = 0. Противоположные числа полностью гасят друг друга.`;
  if(task.type==='B') return`${task.a} + (${task.answer<0?task.answer:'+'+task.answer}) = 0.`;
  if(task.type==='C') return`(${task.answer<0?task.answer:'+'+task.answer}) + ${task.b<0?'('+task.b+')':task.b} = 0.`;
  if(task.type==='D') return task.isOpp?`Да, ${task.n1} и ${task.n2} — противоположные. |${task.n1}| = |${task.n2}| = ${Math.abs(task.n1)}, разные стороны.`:`Верно, они не противоположные: |${task.n1}| = ${Math.abs(task.n1)}, |${task.n2}| = ${Math.abs(task.n2)}.`;
  return '';
}

function nextLearnStep(){
  S.lStep++;S.lAttempts=0;S.lAnswered=false;
  S.lHint=false;S._lErr=null;S._lOkMsg=null;render();
}
function nextPractice(){
  if(S.pIdx>=S.pTasks.length-1){S.screen='results';render();return;}
  S.pIdx++;S.pAnswered=false;S._pFb=null;render();
}

/* ══════════════════════ ИНИЦИАЛИЗАЦИЯ ══════════════════════════ */
function startLearn(){
  S.screen='learn';S.lStep=1;S.lAttempts=0;S.lAnswered=false;
  S.lHint=false;S._lErr=null;S._lOkMsg=null;S.lDotStatus=new Array(5).fill(null);render();
}

function startPractice(){
  S.screen='practice';
  /* 10 задач: 3×A, 2×B, 2×C, 2×D, 1×E(zero) */
  const pool=[];
  /* A-tasks */
  const nsA=sfl([-9,-7,-5,-3,-1,1,3,5,7,9]).slice(0,4);
  nsA.forEach(n=>pool.push({type:'A',a:n,b:-n,answer:0}));
  /* B-tasks */
  const nsB=sfl([-8,-6,4,8]).slice(0,2);
  nsB.forEach(n=>pool.push({type:'B',a:n,answer:-n}));
  /* C-tasks */
  const nsC=sfl([-9,2,6,-4]).slice(0,2);
  nsC.forEach(n=>pool.push({type:'C',b:n,answer:-n}));
  /* D-tasks — 1 opposite, 1 not */
  const nd=sfl([2,3,4,5,6,7])[0];
  pool.push({type:'D',n1:nd,n2:-nd,isOpp:true});
  const ndx=sfl([2,3,4,5,6,7])[0];
  const diff=sfl([1,2,3]).filter(x=>x!==0)[0];
  pool.push({type:'D',n1:ndx,n2:-(ndx+diff),isOpp:false});
  /* Zero */
  pool.push({type:'A',a:0,b:0,answer:0});

  S.pTasks=sfl(pool).slice(0,10);
  S.pIdx=0;S.pAnswered=false;S._pFb=null;S.pAnswers=[];render();
}

function sfl(arr){const b=[...arr];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

render();
</script>
