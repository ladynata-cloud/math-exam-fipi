<!doctype html> <html lang=ru> <meta charset=utf-8> <meta name=viewport content='width=device-width,initial-scale=1'> <title>Десятичные дроби - уровень 1</title> <style> *{box-sizing:border-box}body,input,button{font-variant-numeric:tabular-nums;font-feature-settings:'tnum' 1,'lnum' 1}body{margin:0;min-height:100dvh;background:#f3f1ea;color:#1a2230;font-family:Georgia,serif;display:flex;justify-content:center;padding:24px 14px 44px}.wrap{width:min(590px,100%)}.ey{font:700 11px Consolas,monospace;letter-spacing:.16em;text-transform:uppercase;color:#1f6b54;margin:0 0 6px}h1{font-size:24px;line-height:1.25;margin:0}.sub{color:#54607a;font-size:14px;margin:8px 0 18px}.meta{display:flex;justify-content:space-between;color:#54607a;font:12px Consolas,monospace;margin:0 0 8px}.bar{height:4px;background:#dcd8cc;border-radius:9px;overflow:hidden;margin-bottom:14px}.bar i{display:block;height:100%;width:0;background:#1f6b54}.card{background:white;border:1px solid #dcd8cc;border-radius:14px;padding:23px 20px;box-shadow:0 16px 32px -25px #1a2230}.lab{font:700 11px Consolas,monospace;letter-spacing:.14em;text-transform:uppercase;color:#54607a;margin:0 0 12px}.task{font:700 40px Consolas,monospace;line-height:1.15;margin:0 0 18px;min-height:46px;letter-spacing:0}.hint{border:1px solid #dcd8cc;border-radius:10px;background:#fbfaf6;margin:0 0 16px;overflow:hidden}.hint summary{cursor:pointer;color:#1f6b54;font-weight:700;padding:10px 14px}.hint div{border-top:1px solid #dcd8cc;padding:12px 14px;font:14px/1.55 Georgia,serif}.hint ol{margin:8px 0 0;padding-left:22px}.row{display:flex;gap:10px}.ans{flex:1;min-width:0;border:1.5px solid #dcd8cc;border-radius:10px;background:#fcfbf7;font:22px Georgia,serif;padding:12px 14px;outline:none}.ans:focus{border-color:#1f6b54;box-shadow:0 0 0 3px #e3efe9}button{border:0;border-radius:10px;background:#1f6b54;color:white;padding:12px 16px;font:700 16px Georgia,serif;cursor:pointer}.ghost{background:#e3efe9;color:#1f6b54}.block{width:100%;margin-top:14px}.fb{display:none;margin-top:14px;border-radius:10px;padding:12px 14px;font-size:15px}.fb.show{display:block}.ok{background:#e3efe9;color:#1f6b54}.bad{background:#f7e6e4;color:#b23a3a}.warn{background:#f6eed9;color:#7a540f}.score{font:700 42px Consolas,monospace;margin:0 0 6px}.note{background:#e3efe9;color:#15463a;border-radius:10px;padding:13px 14px;margin:12px 0}.mist{padding:0;margin:0;list-style:none}.mist li{border-top:1px solid #dcd8cc;padding:9px 0;display:flex;justify-content:space-between;gap:12px}.mist b{font-weight:700}.mist span{font:13px Consolas,monospace;color:#b23a3a;white-space:nowrap}.again{background:#f6eed9;color:#6f4e0f;border-radius:9px;padding:10px 12px;margin-top:8px}.foot{text-align:center;color:#54607a;font:11px Consolas,monospace;margin-top:18px}@media(max-width:430px){.task{font-size:32px}.row{flex-direction:column}button{width:100%}} </style> <main class=wrap> <p class=ey>ОГЭ · Десятичные дроби</p> <h1>Десятичные дроби - Уровень 1</h1> <p class=sub>Реши 12 заданий. Ответ можно вводить с запятой или точкой. Если ответ отрицательный, поставь минус.</p> <section id=quiz> <div class=meta><span>Задание <b id=n>1</b> из <b id=tot>12</b></span><span id=live>Верно: 0</span></div><div class=bar><i id=bar></i></div> <div class=card><p class=lab id=lab>Задание 1</p><p class=task id=task>-</p><details class=hint><summary>Как решать</summary><div id=hint></div></details><div class=row><input class=ans id=ans autocomplete=off placeholder=Ответ><button id=check>Проверить</button></div><div class=fb id=fb></div><button class='block' id=next style='display:none'>Следующее задание</button></div> </section> <section id=res class=card style='display:none'><p class=lab>Результат уровня</p><p class=score><span id=rs>0</span> из <span id=rt>12</span></p><div class=note id=note></div><div id=errs></div><button class=block id=new>Пройти ещё раз - новые примеры</button><button class='block ghost' id=same>Повторить исходные задания</button></section> <p class=foot>mathexam.space</p> </main> <script> const base=[['7,6 + 4,8','12,4','add'],['9,2 + 6,5','15,7','add'],['12,4 + 3,28','15,68','addm'],['4,7 − 8,2','−3,5','sub'],['2,8 − 3,4','−0,6','sub'],['6,5 − 8,23','−1,73','subm'],['4,2 · 5,1','21,42','mul'],['0,25 · 4,8','1,2','mul'],['7,8 : 2,6','3','div'],['9,6 : 1,2','8','div'],['(7,8 − 1,4) : 3,2','2','br'],['(5,3 + 2,7) : 0,4','20','br']]; const hint={add:['Сложение десятичных дробей','Запиши числа в столбик: запятая под запятой.','Если справа от запятой разное число цифр, допиши нули справа.','Сложи как обычные числа. Запятую в ответе поставь под запятыми.'],addm:['Сложение с разным числом знаков','Сначала уравняй количество цифр после запятой: например 12,4 = 12,40.','Запиши запятую под запятой и сложи по разрядам.','Не убирай сотые, если они получились в ответе.'],sub:['Вычитание десятичных дробей','Сравни числа. Если из меньшего вычитаешь большее, ответ будет отрицательным.','Найди модуль ответа: вычти меньшее число из большего, запятая под запятой.','Поставь минус перед найденным числом.'],subm:['Вычитание с разным числом знаков','Сравни числа и определи знак ответа.','Уравняй знаки после запятой: например 6,5 = 6,50.','Вычти меньшее из большего по разрядам и поставь нужный знак.'],mul:['Умножение десятичных дробей','Умножь числа без запятых как целые.','Посчитай, сколько всего цифр справа от запятых в обоих множителях.','В ответе отдели справа столько же цифр запятой.'],div:['Деление десятичных дробей','В делителе нужно убрать запятую.','Сдвинь запятую вправо в обоих числах на одинаковое число знаков.','Дальше дели как целые числа.'],br:['Скобки и деление','Сначала полностью посчитай выражение в скобках.','Затем выполни деление: если в делителе есть запятая, сдвинь её в обоих числах.','Проверь знак и запиши ответ без лишних нулей.']}; const rec={add:'Повтори сложение десятичных дробей: запятая под запятой, нули справа.',addm:'Повтори сложение десятичных дробей с разным числом знаков после запятой.',sub:'Повтори вычитание десятичных дробей и отрицательные ответы.',subm:'Повтори вычитание с дописыванием нулей справа.',mul:'Повтори умножение десятичных дробей и подсчёт знаков после запятой.',div:'Повтори деление десятичных дробей.',br:'Повтори порядок действий: сначала скобки, потом деление.'}; let tasks=[],i=0,ok=0,tryNo=0,round=1,log=[]; function id(x){return document.getElementById(x)}function ri(a,b){return a+Math.floor(Math.random()*(b-a+1))}function ft(n){let m=n<0;n=Math.abs(n);let s=n%10?Math.floor(n/10)+','+n%10:String(n/10);return(m?'−':'')+s}function fh(n){let m=n<0;n=Math.abs(n);let a=Math.floor(n/100),b=n%100,s=b?b%10?a+','+String(b).padStart(2,'0'):a+','+b/10:String(a);return(m?'−':'')+s}function norm(s){s=String(s).trim();let out='';for(let c of s){if(c==='−'||c==='–'||c==='—')c='-';if(c===',')c='.';out+=c}if(out[0]==='-')out=out.slice(1)==='0'?'0':'-'+out.slice(1);while(out.includes('.')&&out.endsWith('0'))out=out.slice(0,-1);if(out.endsWith('.'))out=out.slice(0,-1);return out} function valid(s){s=s.trim();if(!s)return 'empty';if(s.includes(' ')||s.includes('/')||s.includes(String.fromCharCode(9)))return 'format';let t=norm(s),dot=0,dig=0;for(let p=0;p<t.length;p++){let c=t[p];if(c==='-'){if(p)return 'format';continue}if(c==='.'){dot++;if(dot>1)return 'format';continue}if(c<'0'||c>'9')return 'format';dig++}if(!dig||t[0]==='.'||t==='-.'||t.endsWith('.'))return 'format';return t} function mk(text,ans,type){return{text,ans,type,n: norm(ans)}}function original(){return base.map(x=>mk(x[0],x[1],x[2]))}function gen(kind){for(let k=0;k<400;k++){let A,B,S,q,D,N,X,Y;if(kind==='add'){A=ri(11,199);B=ri(11,99);if(A%10&&B%10&&(A+B)%10)return mk(ft(A)+' + '+ft(B),ft(A+B),'add')}if(kind==='addm'){A=ri(11,159);B=ri(101,999);S=A*10+B;if(A%10&&B%10&&S%10)return mk(ft(A)+' + '+fh(B),fh(S),'addm')}if(kind==='sub'){A=ri(11,89);B=ri(12,99);if(A<B&&A%10&&B%10&&(B-A)%10)return mk(ft(A)+' − '+ft(B),ft(A-B),'sub')}if(kind==='subm'){A=ri(11,89);B=ri(101,999);S=A*10-B;if(A%10&&B%10&&S<0&&S%10)return mk(ft(A)+' − '+fh(B),fh(S),'subm')}if(kind==='mul'){X=ri(11,99);Y=ri(11,99);if(X%10&&Y%10)return mk(ft(X)+' · '+ft(Y),fh(X*Y),'mul')}if(kind==='div'){q=ri(2,9);D=ri(11,49);N=q*D;if(D%10&&N%10)return mk(ft(N)+' : '+ft(D),String(q),'div')}if(kind==='br'){q=ri(2,12);D=ri(11,39);S=q*D;if(D%10){B=ri(11,79);A=S+B;if(A<199&&A%10&&B%10)return mk('('+ft(A)+' − '+ft(B)+') : '+ft(D),String(q),'br')}}}}function generated(){let plan=['add','add','addm','sub','sub','subm','mul','mul','div','div','br','br'],seen=new Set(base.map(x=>x[0]));return plan.map(p=>{let t;do{t=gen(p)}while(seen.has(t.text));seen.add(t.text);return t})} function show(){let t=tasks[i];tryNo=0;id('n').textContent=i+1;id('live').textContent='Верно: '+ok;id('bar').style.width=i/tasks.length*100+'%';id('lab').textContent='Задание '+(i+1)+(round>1?' · набор '+round:'');id('task').textContent=t.text;id('hint').innerHTML='<b>'+hint[t.type][0]+'</b><ol>'+hint[t.type].slice(1).map(x=>'<li>'+x+'</li>').join('')+'</ol>';id('ans').value='';id('ans').disabled=false;id('check').disabled=false;id('check').style.display='';id('next').style.display='none';msg();id('ans').focus()} function msg(cls='',txt=''){let f=id('fb');f.className='fb '+cls+(txt?' show':'');f.innerHTML=txt}function lock(){id('ans').disabled=true;id('check').disabled=true;id('check').style.display='none';id('next').textContent=i+1<tasks.length?'Следующее задание':'Показать результат';id('next').style.display=''}function check(){let t=tasks[i],v=valid(id('ans').value);if(v==='empty')return msg('warn','Поле пустое. Введи ответ.');if(v==='format')return msg('warn','Проверь формат: нужно число без пробелов и лишних символов, например 12,4 или −3,5.');if(v===t.n){ok++;id('live').textContent='Верно: '+ok;log.push({...t,good:1});lock();msg('ok','Верно!');return}tryNo++;if(tryNo<2){msg('bad','Пока неверно. Проверь вычисления и попробуй ещё раз. Попытка 1 из 2.');id('ans').select()}else{log.push({...t,good:0});lock();msg('bad','Неверно. Правильный ответ: '+t.ans+'.')}}function next(){if(i+1<tasks.length){i++;show()}else result()}function result(){id('bar').style.width='100%';id('quiz').style.display='none';id('res').style.display='';id('rs').textContent=ok;id('rt').textContent=tasks.length;let txt=ok>10?'Отлично! Можно переходить дальше.':ok>7?'Хорошая база. Разбери ошибки и повтори ещё раз.':ok>4?'Навык пока неустойчив. Повтори правила и пройди уровень заново.':'Лучше вернуться к теории и потренироваться с подсказками.';id('note').textContent=txt+' Верных ответов: '+Math.round(ok/tasks.length*100)+'%.';let bad=log.filter(x=>!x.good),html='';if(!bad.length)html='<div class=note>Без ошибок - все задания решены верно.</div>';else{html='<ul class=mist>'+bad.map(x=>'<li><b>'+x.text+'</b><span>ответ '+x.ans+'</span></li>').join('')+'</ul>';let seen=[...new Set(bad.map(x=>x.type))];html+='<div class=again>'+seen.map(x=>rec[x]).join('<br>')+'</div>'}id('errs').innerHTML=html} function start(newOnes){round=newOnes?round+1:1;tasks=newOnes?generated():original();i=0;ok=0;tryNo=0;log=[];id('tot').textContent=tasks.length;id('res').style.display='none';id('quiz').style.display='';show()}id('check').onclick=check;id('next').onclick=next;id('new').onclick=()=>start(true);id('same').onclick=()=>start(false);id('ans').onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();id('next').style.display==='none'?check():next()}};start(false); </script> </html>
