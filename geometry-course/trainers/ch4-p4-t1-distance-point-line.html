<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Расстояние от точки до прямой</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#e8e4db;font-family:system-ui,-apple-system,'Segoe UI',Arial,sans-serif;color:#1f2937;padding:18px}
.app{max-width:980px;margin:auto;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 12px 36px #0002}
.head{background:#1a1a2e;color:#fff;padding:16px 20px;display:flex;gap:12px;align-items:center;justify-content:space-between}
.title{font-size:21px;font-weight:900}
.sub{font-size:13px;opacity:.72;margin-top:2px}
.badge{background:#ffffff22;border:1px solid #ffffff33;border-radius:999px;padding:7px 12px;font-size:13px;font-weight:800;white-space:nowrap}
.back{color:#cbd5e1;text-decoration:none;font-weight:800;font-size:13px}
.back:hover{color:#fff}
.success{display:none;background:#dcfce7;color:#14532d;font-weight:800;padding:10px 20px;font-size:15px;border-bottom:1px solid #bbf7d0}
.main{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:0}
.work{background:#faf8f2;padding:14px;border-right:1px solid #e5e2d9}
canvas{width:100%;height:auto;display:block;border:1px solid #d6d3ca;border-radius:14px;background:#fffdf7;touch-action:none;cursor:grab}
.side{padding:14px;display:flex;flex-direction:column;gap:10px}
.card{border:1.5px solid #e5e7eb;border-radius:12px;padding:12px;background:#f9fafb}
.card h2{margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:#64748b}
.task{font-size:16px;line-height:1.5}
.task b{color:#1a1a2e}
.live{display:flex;flex-direction:column;gap:6px;font-size:15px}
.live .row{display:flex;justify-content:space-between;align-items:center}
.live .nm{font-weight:750}
.live .v{font-weight:900;font-variant-numeric:tabular-nums}
.live .pm{color:#2d70b3}.live .ph{color:#16a34a}
.live .cmp{margin-top:4px;font-weight:800;text-align:center;border-radius:9px;padding:7px;background:#eef2ff;color:#3730a3}
.live .cmp.eq{background:#dcfce7;color:#15803d}
.qhead{font-size:14px;font-weight:800;color:#334155;margin-bottom:8px}
.opt{display:block;width:100%;text-align:left;border:1.5px solid #d1d5db;border-radius:10px;background:#fff;color:#1f2937;padding:10px 12px;font:650 14px system-ui;cursor:pointer;margin-bottom:7px;line-height:1.35}
.opt:hover{background:#f3f4f6}
.opt.bad{border-color:#fecaca;background:#fef2f2;color:#b91c1c}
.opt.good{border-color:#bbf7d0;background:#f0fdf4;color:#15803d}
.msg{border-radius:12px;padding:12px;font-size:15px;font-weight:750;line-height:1.42}
.info{background:#eff6ff;color:#1d4ed8}.ok{background:#f0fdf4;color:#15803d}.err{background:#fef2f2;color:#b91c1c}
.why{display:none;background:#fffbeb;border:1.5px solid #fcd34d;border-radius:12px;padding:12px;font-size:14px;line-height:1.5;color:#374151}
.why b{color:#b45309}
.gloss{display:none;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:12px;padding:11px;font-size:13.5px;line-height:1.55;color:#475569}
.gloss b{color:#1a1a2e}
.law{display:none;background:#ecfdf5;border:1.5px solid #bbf7d0;border-radius:12px;padding:14px;font-size:14.5px;line-height:1.55;color:#14532d}
.law b{color:#166534}
.law .bridge{margin-top:10px;color:#475569}
.law .bridge a{color:#b45309;font-weight:800;text-decoration:none}
.bar{display:flex;gap:8px;flex-wrap:wrap;padding:12px 14px;background:#f9fafb;border-top:1px solid #e5e7eb;align-items:center}
button.tool{border:1.5px solid #d1d5db;border-radius:9px;background:#fff;color:#374151;padding:9px 14px;font:800 14px system-ui;cursor:pointer}
button.tool:hover{background:#f3f4f6}
.spacer{flex:1}
.next{display:none;background:#16a34a;color:#fff;border-color:#16a34a;margin-top:4px}
.next:hover{background:#15803d}
@media(max-width:820px){ body{padding:8px}.main{grid-template-columns:1fr}.work{border-right:0;border-bottom:1px solid #e5e2d9}.head{flex-direction:column;align-items:flex-start}.side{padding:12px}.bar{position:sticky;bottom:0} }
</style>
</head>
<body>
<div class="app">
  <div class="head">
    <div>
      <div class="title">📏 Расстояние от точки до прямой</div>
      <div class="sub">Глава IV · §4 · лаборатория</div>
    </div>
    <div style="display:flex;gap:12px;align-items:center">
      <div class="badge" id="badge">Лаборатория</div>
      <a class="back" href="../index.html">← к списку</a>
    </div>
  </div>
  <div class="success" id="successBar"></div>

  <div class="main">
    <div class="work"><canvas id="cv" width="640" height="460"></canvas></div>
    <aside class="side">
      <div class="card" id="taskCard">
        <h2>Лаборатория</h2>
        <div class="task" id="taskText"></div>
      </div>
      <div class="card live" id="liveCard">
        <div class="row"><span class="nm pm">Наклонная PM</span><span class="v pm" id="vPM">—</span></div>
        <div class="row"><span class="nm ph">Перпендикуляр PH</span><span class="v ph" id="vPH">—</span></div>
        <div class="cmp" id="cmp">тяни точку M</div>
      </div>
      <div class="card" id="qCard">
        <div class="qhead">Где путь от P до прямой самый короткий?</div>
        <div id="optWrap"></div>
      </div>
      <div id="msg" class="msg info"></div>
      <div id="why" class="why"></div>
      <div id="gloss" class="gloss"></div>
      <button class="tool next" id="proofBtn" onclick="proofNext()">Дальше →</button>
      <div id="law" class="law"></div>
    </aside>
  </div>

  <div class="bar">
    <span class="spacer"></span>
    <button class="tool" onclick="resetLab()">↺ Сбросить</button>
  </div>
</div>

<script>
/* ───────── ПРОГРЕСС / ЖУРНАЛ ───────── */
const SK='mathExamCourseProgress.v1', TID='ch4-p4-t1-distance-point-line';
function lS(){try{const d=JSON.parse(localStorage.getItem(SK)||'{}');return d[TID]||{runs:0,events:[]}}catch{return{runs:0,events:[]}}}
function sS(s){try{const d=JSON.parse(localStorage.getItem(SK)||'{}');d[TID]=s;localStorage.setItem(SK,JSON.stringify(d))}catch{}}
function logE(ev,extra){try{const s=lS();s.events=(s.events||[]);s.events.push({t:Date.now(),e:ev,phase,...(extra||{})});if(s.events.length>300)s.events=s.events.slice(-300);sS(s)}catch{}}

/* ───────── ХОЛСТ ───────── */
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const W=640,H=460,PI=Math.PI;
const dpr=Math.min(window.devicePixelRatio||1,2);
cv.width=W*dpr;cv.height=H*dpr;cv.style.aspectRatio=W+'/'+H;ctx.scale(dpr,dpr);
const PULSE=()=>1+0.16*Math.sin(Date.now()/240);

/* ───────── ПАЛИТРА / ПРИМИТИВЫ ───────── */
const COL={DARK:'#1a1a2e',GREY:'#94a3b8',BLUE:'#2d70b3',G:'#16a34a',PUL:'#7c3aed',WARN:'#c2410c'};
function sub(p,q){return{x:p.x-q.x,y:p.y-q.y}}
function nrm(v){const m=Math.hypot(v.x,v.y)||1;return{x:v.x/m,y:v.y/m}}
function hexA(h,a){const n=parseInt(h.slice(1),16);return 'rgba('+(n>>16&255)+','+(n>>8&255)+','+(n&255)+','+a+')';}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function bg(){ ctx.clearRect(0,0,W,H);ctx.fillStyle='#fffdf7';ctx.fillRect(0,0,W,H);ctx.fillStyle='#e7e1d2';
  for(let x=20;x<W;x+=25)for(let y=20;y<H;y+=25){ctx.beginPath();ctx.arc(x,y,1.15,0,7);ctx.fill()} }
function lab(x,y,txt,col,size){ ctx.font='900 '+(size||16)+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.lineWidth=4;ctx.strokeStyle='rgba(255,253,247,.95)';ctx.strokeText(txt,x,y); ctx.fillStyle=col;ctx.fillText(txt,x,y);ctx.textBaseline='alphabetic'; }
function labI(x,y,txt,col,size){ ctx.font='italic 700 '+(size||13)+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.lineWidth=3.5;ctx.strokeStyle='rgba(255,253,247,.92)';ctx.strokeText(txt,x,y); ctx.fillStyle=col;ctx.fillText(txt,x,y);ctx.textBaseline='alphabetic'; }
function dotF(x,y,r,fill,stroke){ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fillStyle=fill;ctx.fill();if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke()}}
function seg(p,q,col,w){ctx.strokeStyle=col;ctx.lineWidth=w||2.8;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.stroke();}
function segD(p,q,col,w,dash){ctx.save();ctx.setLineDash(dash||[6,5]);ctx.strokeStyle=col;ctx.lineWidth=w||2;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.stroke();ctx.restore();}
function ring(x,y,r,col){ctx.save();ctx.strokeStyle=col;ctx.lineWidth=2.6;ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.stroke();ctx.restore();}
function rightMark(V,P,Q,col){ const u=nrm(sub(P,V)),v=nrm(sub(Q,V)),s=13;
  const p1={x:V.x+u.x*s,y:V.y+u.y*s},p3={x:V.x+v.x*s,y:V.y+v.y*s},p2={x:p1.x+v.x*s,y:p1.y+v.y*s};
  ctx.beginPath();ctx.moveTo(V.x,V.y);ctx.lineTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.lineTo(p3.x,p3.y);ctx.closePath();
  ctx.fillStyle=hexA(col,0.16);ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=2.2;ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.lineTo(p3.x,p3.y);ctx.stroke(); }
function lenLabel(p,q,txt,col,off){ const m={x:(p.x+q.x)/2,y:(p.y+q.y)/2}; const n=nrm({x:-(q.y-p.y),y:q.x-p.x});
  lab(m.x+n.x*(off||16), m.y+n.y*(off||16), txt, col, 14.5); }

/* ───────── СЦЕНА ───────── */
const YA=320, XMIN=70, XMAX=600;
const Pp={x:282,y:118};                 // точка над прямой (фиксирована)
const Hp={x:Pp.x,y:YA};                 // основание перпендикуляра
const M_INIT={x:472,y:YA};
let M={x:M_INIT.x,y:YA};

/* ───────── СОСТОЯНИЕ ───────── */
let phase='explore', whyStep=0, answered=false, mistakes=0, dragging=false, reachedH=false;
const CORRECT=1;
const OPTS=[
  {t:'У ближайшего края прямой', d:'Посмотри на длину PM у края — число только растёт. Край не самый короткий.'},
  {t:'Когда идём перпендикулярно — точка M в основании H', d:''},
  {t:'Длина пути всегда одинаковая', d:'Потаскай M — длина наклонной PM меняется, значит есть и самая короткая.'},
  {t:'«По диагонали» получится короче', d:'Любой косой путь — это и есть наклонная PM, а она всегда длиннее перпендикуляра PH.'}
];

/* ───────── ДЛИНЫ ───────── */
function lenPM(){ return dist(Pp,M); }
function lenPH(){ return dist(Pp,Hp); }

/* ───────── УКАЗАТЕЛЬ (тащим M по прямой) ───────── */
function worldPos(e){ const r=cv.getBoundingClientRect(); const k=Math.max(1,W/r.width); return {x:(e.clientX-r.left)*k, y:(e.clientY-r.top)*k}; }
function nearM(w){ const r=cv.getBoundingClientRect(); const k=Math.max(1,W/r.width); return Math.hypot(w.x-M.x,w.y-M.y) < 30*k; }
cv.addEventListener('pointerdown',e=>{ const w=worldPos(e); if(nearM(w)){ dragging=true; try{cv.setPointerCapture(e.pointerId)}catch{} cv.style.cursor='grabbing'; } });
cv.addEventListener('pointermove',e=>{ if(!dragging) return; const w=worldPos(e); let x=Math.max(XMIN,Math.min(XMAX,w.x));
  if(Math.abs(x-Hp.x)<8){ x=Hp.x; if(!reachedH){reachedH=true; logE('reached_foot');} }
  M={x,y:YA}; updateLive(); });
cv.addEventListener('pointerup',e=>{ if(dragging){ dragging=false; try{cv.releasePointerCapture(e.pointerId)}catch{} cv.style.cursor='grab'; } });

/* ───────── ОТВЕТ НА ВОПРОС ───────── */
function answer(i){
  if(phase!=='explore') return;
  const btns=document.querySelectorAll('#optWrap .opt');
  if(i===CORRECT){ answered=true; btns.forEach((b,j)=>{ b.disabled=true; if(j===CORRECT)b.classList.add('good'); });
    setMsg('Верно! Самый короткий путь — перпендикуляр PH. Разберёмся, почему так.','ok'); logE('answer',{i,correct:true});
    phase='why'; whyStep=0; updateUI();
  } else { mistakes++; btns[i].classList.add('bad'); setMsg(OPTS[i].d,'err'); logE('answer',{i,correct:false}); }
}

/* ───────── ФАЗЫ ───────── */
function proofNext(){
  if(phase==='why'&&whyStep===0){ whyStep=1; updateUI(); logE('why',{s:1}); }
  else if(phase==='why'&&whyStep===1){ phase='done'; const s=lS(); s.runs=(s.runs||0)+1; s.passed=true; sS(s); logE('finish',{mistakes}); updateUI(); }
}
function resetLab(){ M={x:M_INIT.x,y:YA}; phase='explore'; whyStep=0; answered=false; mistakes=0; reachedH=false;
  buildOptions(); setMsg('Тяни точку M по прямой и следи за длинами PM и PH.','info'); updateLive(); updateUI(); }

/* ───────── ОТРИСОВКА ───────── */
function draw(){
  bg();
  const showProj = (phase!=='explore');
  // прямая a
  seg({x:0,y:YA},{x:W,y:YA},COL.DARK,3); lab(W-22,YA-14,'a',COL.DARK,16);
  // проекция HM на прямой
  if(showProj && Math.abs(M.x-Hp.x)>2){ seg(Hp,M,COL.WARN,5); labI((Hp.x+M.x)/2, YA+20, 'проекция', COL.WARN, 12.5); }
  // перпендикуляр PH
  seg(Pp,Hp,COL.G,3.2); rightMark(Hp,Pp,{x:Hp.x+26,y:Hp.y},COL.G);
  lenLabel(Pp,Hp, Math.round(lenPH())+'', COL.G, -18);
  if(phase==='explore') labI(Pp.x-46,(Pp.y+Hp.y)/2,'перпендикуляр',COL.G,12.5);
  // наклонная PM
  seg(Pp,M,COL.BLUE,3);
  lenLabel(Pp,M, Math.round(lenPM())+'', COL.BLUE, 16);
  if(phase==='explore') labI((Pp.x+M.x)/2+8,(Pp.y+M.y)/2-14,'наклонная',COL.BLUE,12.5);
  // подписи в фазе «почему»
  if(phase!=='explore'){ labI((Pp.x+M.x)/2+10,(Pp.y+M.y)/2-12,'гипотенуза',COL.BLUE,12.5); labI(Pp.x-30,(Pp.y+Hp.y)/2,'катет',COL.G,12.5); }
  // точки
  dotF(Hp.x,Hp.y,4.6,COL.G); lab(Hp.x-13,Hp.y+18,'H',COL.G,15);
  // M — ручка
  const atH=Math.abs(M.x-Hp.x)<2;
  if(phase==='explore'&&!atH){ ring(M.x,M.y,12*PULSE(),COL.PUL); }
  dotF(M.x,M.y,5.4, atH?COL.G:COL.PUL); lab(M.x+ (M.x>Hp.x?14:-14), M.y+18,'M', atH?COL.G:COL.PUL,15);
  // P
  dotF(Pp.x,Pp.y,5,COL.DARK); lab(Pp.x-14,Pp.y-10,'P',COL.DARK,16);
}

/* ───────── UI ───────── */
function setMsg(t,cls){const el=document.getElementById('msg');el.textContent=t;el.className='msg '+cls;}
function updateLive(){
  document.getElementById('vPM').textContent=Math.round(lenPM());
  document.getElementById('vPH').textContent=Math.round(lenPH());
  const cmp=document.getElementById('cmp'); const atH=Math.abs(M.x-Hp.x)<2;
  if(atH){ cmp.textContent='PM = PH — это кратчайший путь!'; cmp.className='cmp eq'; }
  else { cmp.textContent='PM > PH   (PM ≥ PH всегда)'; cmp.className='cmp'; }
}
function buildOptions(){
  const w=document.getElementById('optWrap'); w.innerHTML='';
  OPTS.forEach((o,i)=>{ const b=document.createElement('button'); b.className='opt'; b.textContent=o.t; b.onclick=()=>answer(i); w.appendChild(b); });
}
function updateUI(){
  const q=document.getElementById('qCard'), why=document.getElementById('why'), gloss=document.getElementById('gloss'),
        pb=document.getElementById('proofBtn'), law=document.getElementById('law'), succ=document.getElementById('successBar'),
        tt=document.getElementById('taskText');
  if(phase==='explore'){
    q.style.display=''; why.style.display='none'; gloss.style.display='none'; pb.style.display='none'; law.style.display='none'; succ.style.display='none';
    tt.innerHTML='«Расстояние от дома P до дороги a» — какое из расстояний? До прямой можно дойти многими путями. <b>Тяни точку M</b> по прямой и следи за длинами наклонной PM и перпендикуляра PH.';
  } else if(phase==='why'){
    q.style.display='none'; why.style.display='block'; gloss.style.display='block'; pb.style.display='inline-block'; law.style.display='none'; succ.style.display='none';
    gloss.innerHTML='<b>PH</b> — перпендикуляр · <b>PM</b> — наклонная · <b>HM</b> — проекция наклонной на прямую.';
    if(whyStep===0){ why.innerHTML='<b>Почему перпендикуляр короче?</b><br>PH и PM — стороны прямоугольного треугольника PHM (прямой угол при H). PM лежит против прямого угла — это <b>гипотенуза</b>, а PH — <b>катет</b>.'; pb.textContent='Дальше →'; }
    else { why.innerHTML='А гипотенуза всегда <b>длиннее катета</b> (мы это знаем про прямоугольные треугольники) ⟹ <b>PM &gt; PH</b>. Равны они лишь когда M совпадает с H и треугольника нет.'; pb.textContent='Завершить →'; }
  } else {
    q.style.display='none'; why.style.display='none'; gloss.style.display='block'; pb.style.display='none'; law.style.display='block'; succ.style.display='block';
    succ.textContent='Кратчайший путь — перпендикуляр.';
    gloss.innerHTML='<b>PH</b> — перпендикуляр · <b>PM</b> — наклонная · <b>HM</b> — проекция наклонной на прямую.';
    law.innerHTML='<b>Закон.</b> Перпендикуляр, опущенный из точки на прямую, <b>короче любой наклонной</b>, проведённой из той же точки. Длина этого перпендикуляра и есть <b>расстояние от точки до прямой</b>.'+
      '<div class="bridge">Дальше — <a href="ch4-p4-t2-distance-parallels.html">расстояние между параллельными прямыми</a>.</div>';
  }
}

/* ───────── СТАРТ ───────── */
buildOptions();
setMsg('Тяни точку M по прямой и следи за длинами PM и PH.','info');
updateLive(); updateUI();
(function loop(){draw();requestAnimationFrame(loop)})();
</script>
</body>
</html>
