function uniRenderDetail() {
  const detail = document.getElementById("uni-detail");
  const cardSim = document.getElementById("uni-card-sim");
  const task = uniGetTask();
  if (!task) { detail.hidden = true; if (cardSim) cardSim.hidden = true; return; }
  detail.hidden = false;
  if (cardSim) cardSim.hidden = false;

  document.getElementById("uni-title").textContent = `Программа: ${task.title}`;
  // Программная таблица будет перерисована из uniRenderSim (там подсветка по uniSim).
  // Но если симуляция ещё не загружена, нарисуем без подсветки.
  document.getElementById("uni-program-table").innerHTML =
    renderProgramTable(task.program, task.alphabet, task.states, task.blankSymbol);
  document.getElementById("uni-cmd-explain").innerHTML = "";
  wireProgramTableClicks(
    document.getElementById("uni-program-table"),
    task.program, task.blankSymbol,
    document.getElementById("uni-cmd-explain")
  );

  document.getElementById("uni-alpha").innerHTML =
    `Алфавит: <code class="mono">${task.alphabet.map(s => s === task.blankSymbol ? "λ" : s).join(", ")}</code>. ` +
    `Состояния: <code class="mono">${task.states.join(", ")}</code>. ` +
    `Начальное состояние: <code>${task.startState}</code>.`;

  document.getElementById("uni-head").textContent =
    `Головка стартует ${headStartLabel(task.initialTape.headStart)}.`;

  // Пример первой непустой команды
  let example = null;
  for (const st of task.states) {
    const row = task.program[st] || {};
    for (const sym of task.alphabet) {
      const cmd = row[sym];
      if (cmd) { example = { st, sym, cmd }; break; }
    }
    if (example) break;
  }
  const reader = document.getElementById("uni-cmd-reader");
  if (example) {
    const symLabel = example.sym === task.blankSymbol ? "λ" : example.sym;
    const writeLabel = example.cmd.write === task.blankSymbol ? "λ" : example.cmd.write;
    const moveWord = { L: "сдвинуться влево", R: "сдвинуться вправо", S: "остаться на месте" }[example.cmd.move] || example.cmd.move;
    reader.innerHTML = `
      <p>Возьмём клетку в строке <code>${escapeHTML(example.st)}</code>, столбец <code>${escapeHTML(symLabel)}</code>.</p>
      <p>В ней записано: <code>${escapeHTML(writeLabel)}, ${escapeHTML(example.cmd.move)}, ${escapeHTML(example.cmd.next)}</code>.</p>
      <p>Это значит: если машина находится в состоянии <code>${escapeHTML(example.st)}</code> и головка видит символ
        <code>${escapeHTML(symLabel)}</code>, то нужно записать в эту ячейку <code>${escapeHTML(writeLabel)}</code>,
        ${moveWord} и перейти в состояние <code>${escapeHTML(example.cmd.next)}</code>.</p>
    `;
  } else {
    reader.innerHTML = `<p class="muted">У этой программы нет ни одной заданной команды.</p>`;
  }

  // Сбросим snapshots и подставим демонстрационный вход
  uniSimSnapshots = [];
  const inp = document.getElementById("uni-sim-input");
  if (!uniSimInput) uniSimInput = exampleInputForTask(task)[0] || "1011";
  inp.value = uniSimInput;
  uniLoadSim();
}

function uniShowErr(m) {
  const el = document.getElementById("uni-sim-err");
  if (!m) { el.className = "feedback err"; el.textContent = ""; return; }
  el.textContent = m; el.classList.add("show");
}

function uniLoadSim() {
  uniShowErr("");
  const task = uniGetTask(); if (!task) return;
  const raw = document.getElementById("uni-sim-input").value.trim();
  if (!raw) { uniShowErr("Введите непустую строку."); return; }
  // Проверка по алфавиту (без λ)
  const allowed = new Set(task.alphabet.filter(s => s !== task.blankSymbol));
  for (const ch of raw) {
    if (!allowed.has(ch)) { uniShowErr(`Символ «${ch}» не входит в алфавит этой программы.`); return; }
  }
  uniSimInput = raw;
  uniSim = createTMSimulation(raw, task.initialTape.headStart, task.startState, task.blankSymbol);
  uniLastTrace = [{
    step: 0, state: uniSim.state, head: uniSim.head,
    symbol: (uniSim.tape.get(uniSim.head) ?? task.blankSymbol),
    note: "стартовая конфигурация"
  }];
  uniSimSnapshots = []; // новая загрузка — снимков нет
  uniRenderSim();
}

/** Снимок симуляции (для step back). Лента — массив [pos, sym]. */
function uniSnapshot() {
  if (!uniSim) return null;
  return {
    tapeArr: Array.from(uniSim.tape.entries()),
    head: uniSim.head,
    state: uniSim.state,
    step: uniSim.step,
    finished: uniSim.finished,
    traceLen: uniLastTrace.length
  };
}
function uniRestore(snap) {
  if (!uniSim || !snap) return;
  uniSim.tape = new Map(snap.tapeArr);
  uniSim.head = snap.head;
  uniSim.state = snap.state;
  uniSim.step = snap.step;
  uniSim.finished = snap.finished;
  uniLastTrace = uniLastTrace.slice(0, snap.traceLen);
}

function uniRenderSim() {
  const task = uniGetTask(); if (!task || !uniSim) {
    document.getElementById("uni-sim-view").innerHTML = "";
    document.getElementById("uni-trace").innerHTML = "";
    return;
  }
  // Лента в окне вокруг головы
  const positions = Array.from(uniSim.tape.keys());
  const minP = positions.length ? Math.min(...positions, uniSim.head) : uniSim.head;
  const maxP = positions.length ? Math.max(...positions, uniSim.head) : uniSim.head;
  const left = Math.min(minP, uniSim.head) - 1;
  const right = Math.max(maxP, uniSim.head) + 1;
  let cells = "";
  for (let i = left; i <= right; i++) {
    const sym = uniSim.tape.get(i) ?? task.blankSymbol;
    const shown = sym === task.blankSymbol ? "λ" : sym;
    const isHead = i === uniSim.head;
    cells += `<span class="tape-cell${isHead ? " head" : ""}${sym === task.blankSymbol ? " blank" : ""}">${escapeHTML(shown)}</span>`;
  }
  document.getElementById("uni-sim-view").innerHTML = `
    <div class="tape-wrap">${cells}</div>
    <p class="small">Состояние: <code>${escapeHTML(uniSim.state)}</code>.
       Шагов сделано: <code>${uniSim.step}</code>. ${uniSim.finished ? "<b>Остановка.</b>" : ""}
       ${uniSimSnapshots.length ? `<span class="muted">Снимков для возврата: ${uniSimSnapshots.length}</span>` : ""}</p>
  `;

  // Перерисуем таблицу программы с подсветкой текущей пары (state, symbol)
  const tableHost = document.getElementById("uni-program-table");
  if (tableHost) {
    const curSym = uniSim.tape.get(uniSim.head) ?? task.blankSymbol;
    tableHost.innerHTML = renderProgramTable(task.program, task.alphabet, task.states, task.blankSymbol, {
      activeState: uniSim.state,
      activeSymbol: curSym
    });
    wireProgramTableClicks(tableHost, task.program, task.blankSymbol, document.getElementById("uni-cmd-explain"));
  }

  // Кнопка «Шаг назад»
  const backBtn = document.getElementById("uni-sim-back");
  if (backBtn) backBtn.disabled = uniSimSnapshots.length === 0;

  // Журнал
  const rows = uniLastTrace.slice(-30).map(e => {
    const symLabel = e.symbol === task.blankSymbol ? "λ" : e.symbol;
    return `<div class="trace-row"><code>#${e.step}</code> состояние <code>${escapeHTML(e.state)}</code>,
       головка в позиции <code>${e.head}</code>, видит <code>${escapeHTML(symLabel)}</code>.
       ${escapeHTML(e.note || "")}</div>`;
  }).join("");
  document.getElementById("uni-trace").innerHTML = rows || "<p class='muted small'>Журнал пуст.</p>";
}

function uniDoStep() {
  uniShowErr("");
  const task = uniGetTask(); if (!task) return;
  if (!uniSim) { uniLoadSim(); return; }
  if (uniSim.finished) { uniShowErr("Машина уже остановилась."); return; }
  // Снимок ДО шага — для step back
  uniSimSnapshots.push(uniSnapshot());
  if (uniSimSnapshots.length > 200) uniSimSnapshots.shift();

  const before = { state: uniSim.state, head: uniSim.head, sym: uniSim.tape.get(uniSim.head) ?? task.blankSymbol };
  const r = stepTM(uniSim, task.program);
  if (!r.ok) {
    uniLastTrace.push({ step: uniSim.step, state: before.state, head: before.head, symbol: before.sym, note: "нет команды для пары (состояние, символ) → остановка" });
    uniRenderSim();
    return;
  }
  const cmd = r.command || uniSim.lastCommand;
  const writeLabel = cmd.write === task.blankSymbol ? "λ" : cmd.write;
  const moveWord = { L: "сдвиг влево", R: "сдвиг вправо", S: "без сдвига" }[cmd.move] || cmd.move;
  uniLastTrace.push({
    step: uniSim.step,
    state: before.state,
    head: before.head,
    symbol: before.sym,
    note: `записали «${writeLabel}», ${moveWord}, новое состояние ${cmd.next}`
  });
  uniRenderSim();
}

function uniStepBack() {
  uniShowErr("");
  if (!uniSim) return;
  const snap = uniSimSnapshots.pop();
  if (!snap) { uniShowErr("Нет шагов для возврата."); return; }
  uniRestore(snap);
  uniRenderSim();
}

function uniRunToEnd() {
  uniShowErr("");
  if (uniSimRunning) return; // защита от двойного клика
  const task = uniGetTask(); if (!task) return;
  if (!uniSim) uniLoadSim();
  if (!uniSim || uniSim.finished) return;

  const speedDelay = { slow: 350, normal: 80, fast: 0 }[uniSimSpeed] || 80;
  if (speedDelay === 0) {
    // Быстрый прогон — без анимации, как раньше
    let safety = MAX_STEPS;
    while (!uniSim.finished && safety-- > 0) {
      uniSimSnapshots.push(uniSnapshot());
      if (uniSimSnapshots.length > 200) uniSimSnapshots.shift();
      const before = { state: uniSim.state, head: uniSim.head, sym: uniSim.tape.get(uniSim.head) ?? task.blankSymbol };
      const r = stepTM(uniSim, task.program);
      if (!r.ok) {
        uniLastTrace.push({ step: uniSim.step, state: before.state, head: before.head, symbol: before.sym, note: "нет команды для пары (состояние, символ) → остановка" });
        break;
      }
      const cmd = r.command || uniSim.lastCommand;
      const writeLabel = cmd.write === task.blankSymbol ? "λ" : cmd.write;
      const moveWord = { L: "сдвиг влево", R: "сдвиг вправо", S: "без сдвига" }[cmd.move] || cmd.move;
      uniLastTrace.push({ step: uniSim.step, state: before.state, head: before.head, symbol: before.sym, note: `записали «${writeLabel}», ${moveWord}, новое состояние ${cmd.next}` });
    }
    if (safety <= 0 && !uniSim.finished) uniShowErr("Превышено максимальное число шагов.");
    uniRenderSim();
    return;
  }

  // Анимированный прогон с задержкой
  uniSimRunning = true;
  const stopBtn = document.getElementById("uni-sim-stop");
  const runBtn = document.getElementById("uni-sim-run");
  if (stopBtn) stopBtn.style.display = "";
  if (runBtn) runBtn.style.display = "none";

  let safety = MAX_STEPS;
  const tick = () => {
    if (!uniSimRunning || !uniSim || uniSim.finished || safety-- <= 0) {
      uniSimRunning = false;
      if (stopBtn) stopBtn.style.display = "none";
      if (runBtn) runBtn.style.display = "";
      if (safety <= 0 && uniSim && !uniSim.finished) uniShowErr("Превышено максимальное число шагов.");
      uniRenderSim();
      return;
    }
    uniSimSnapshots.push(uniSnapshot());
    if (uniSimSnapshots.length > 200) uniSimSnapshots.shift();
    const before = { state: uniSim.state, head: uniSim.head, sym: uniSim.tape.get(uniSim.head) ?? task.blankSymbol };
    const r = stepTM(uniSim, task.program);
    if (!r.ok) {
      uniLastTrace.push({ step: uniSim.step, state: before.state, head: before.head, symbol: before.sym, note: "нет команды для пары (состояние, символ) → остановка" });
      uniSimRunning = false;
      if (stopBtn) stopBtn.style.display = "none";
      if (runBtn) runBtn.style.display = "";
      uniRenderSim();
      return;
    }
    const cmd = r.command || uniSim.lastCommand;
    const writeLabel = cmd.write === task.blankSymbol ? "λ" : cmd.write;
    const moveWord = { L: "сдвиг влево", R: "сдвиг вправо", S: "без сдвига" }[cmd.move] || cmd.move;
    uniLastTrace.push({ step: uniSim.step, state: before.state, head: before.head, symbol: before.sym, note: `записали «${writeLabel}», ${moveWord}, новое состояние ${cmd.next}` });
    uniRenderSim();
    setTimeout(tick, speedDelay);
  };
  tick();
}

function uniStopRun() {
  uniSimRunning = false;
  const stopBtn = document.getElementById("uni-sim-stop");
  const runBtn = document.getElementById("uni-sim-run");
  if (stopBtn) stopBtn.style.display = "none";
  if (runBtn) runBtn.style.display = "";
  uniRenderSim();
}

function uniClearSim() {
  uniSim = null;
  uniLastTrace = [];
  uniSimSnapshots = [];
  uniSimRunning = false;
  uniRenderSim();
}

  renderTabUniversal();
  uniRenderProgramList();
  document.getElementById("uni-sim-reset").addEventListener("click", uniLoadSim);
  document.getElementById("uni-sim-step").addEventListener("click", uniDoStep);
  document.getElementById("uni-sim-back").addEventListener("click", uniStepBack);
  document.getElementById("uni-sim-predict").addEventListener("click", uniStartPredict);

      document.querySelectorAll("#panel-universal .speed-control button[data-speed]").forEach(x => x.classList.toggle("active", x === b));

/** Трёхуровневая подсказка для задачи библиотеки.
 *  Уровень 1 — что делает программа (стратегия).
 *  Уровень 2 — формула или ключевой шаблон.
 *  Уровень 3 — подставленные числа для конкретной задачи.
 */
function libTieredHints(task) {
  const tt = task.taskType;
  const it = task.initialTape;

  // --- правый хвост нулей ---
  if (tt === "right_tail_zero_flip_find_max_initial_zeros") {
    const N = it.length;
    return [
      "Программа меняет только правый хвост строки: хвостовые нули превращает в единицы, а первую единицу слева от них — в ноль.",
      `Связь: K = Z − t + 1, где Z — исходных нулей, t — длина правого хвоста нулей. Чтобы Z был максимален, оставь в исходной строке всего одну единицу, а остальные ${N - 1} символов — нули.`,
      `Тогда Z = N − 1 = ${N} − 1 = ${N - 1}. Особый случай — когда после работы нулей нет (K = 0): машина не встретила единиц, значит исходная строка была вся из нулей, Z = N.`
    ];
  }
  if (tt === "right_tail_zero_flip_find_max_final_zeros") {
    const c0 = it.count0, c1 = it.count1;
    return [
      "Программа делает один «переброс»: правый хвост нулей → единицы, ближайшая слева единица → ноль.",
      "Чтобы в конце было максимум нулей, хвост нулей должен быть как можно короче. Лучше всего t = 0 — строка заканчивается единицей, и она при работе станет нулём.",
      `При t = 0: K = c0 − 0 + 1 = ${c0} + 1 = ${c0 + 1}. ${c1 === 0 ? "Особый случай: если в строке нет единиц, K = c0 — программа сразу останавливается на пустой клетке." : ""}`
    ];
  }
  if (tt === "right_tail_zero_flip_find_min_final_zeros") {
    const c0 = it.count0, c1 = it.count1;
    return [
      "Программа касается только правого хвоста и одной единицы перед ним.",
      "Чтобы нулей в конце было как можно меньше, длинный хвост нулей выгоден: пусть все нули будут в самом правом хвосте.",
      `Тогда t = c0 = ${c0}, и K = Z − t + 1 = ${c0} − ${c0} + 1 = 1. ${c1 === 0 ? "Особый случай: если единиц нет, все нули превратятся в единицы, K = 0." : ""}`
    ];
  }

  // --- левый префикс единиц ---
  if (tt === "left_prefix_ones_flip_find_max_final_zeros") {
    const c0 = it.count0, c1 = it.count1;
    return [
      "Зеркально к правому случаю: программа идёт слева, превращает префиксные единицы в нули, а первый ноль после них — в единицу.",
      "Чтобы нулей в конце было максимум, префикс единиц делаем максимально длинным: сначала все c1 единиц, потом все c0 нулей.",
      `Тогда c1 = ${c1} единиц превратятся в нули, а первый из c0 нулей станет единицей: K = c1 + c0 − 1 = ${c1} + ${c0} − 1 = ${c1 + c0 - 1}.`
    ];
  }
  if (tt === "left_prefix_ones_flip_find_min_final_zeros") {
    const c0 = it.count0;
    return [
      "Программа делает «переброс» слева: префикс единиц → нули, первый ноль после них → единица.",
      "Чтобы нулей в конце было как можно меньше, префикс единиц нужен нулевой — пусть строка начинается с нуля.",
      `Тогда машина просто заменит этот первый ноль на единицу: нулей было c0 = ${c0}, стало c0 − 1 = ${c0 - 1}.`
    ];
  }

  // --- побитовая инверсия ---
  if (tt === "bitwise_inversion_decimal_result") {
    const dec = it.decimal, bin = decToBin(dec), n = bin.length;
    return [
      "Программа проходит всю двоичную запись справа налево и заменяет каждый бит на противоположный (0↔1).",
      `Алгоритм: переведи ${dec} в двоичную (получишь ${n}-битное число), инвертируй каждый бит, переведи обратно в десятичную.`,
      `Для n-битной записи без ведущих нулей результат равен 2ⁿ − 1 − ${dec} = ${Math.pow(2, n) - 1} − ${dec} = ${Math.pow(2, n) - 1 - dec}.`
    ];
  }

  // --- двоичный декремент ---
  if (tt === "binary_decrement_decimal_result") {
    const dec = it.decimal;
    return [
      "Программа реализует вычитание единицы в двоичной записи: хвостовые нули превращает в единицы, первую единицу справа — в ноль и останавливается.",
      `На исходном числе ${dec} это эквивалентно обычному ${dec} − 1.`,
      `Ответ: ${dec} − 1 = ${dec - 1}.`
    ];
  }

  // --- обнуление младшей единицы ---
  if (tt === "clear_lowest_one_decimal_result") {
    const dec = it.decimal, bin = decToBin(dec);
    let k = 0; for (let i = bin.length - 1; i >= 0; i--) { if (bin[i] === "1") { k = bin.length - 1 - i; break; } }
    const subtract = Math.pow(2, k);
    return [
      "Программа идёт справа налево по нулям, ничего не меняя, и первую встреченную единицу заменяет на ноль (остановка).",
      "Это снимает самую младшую единицу двоичной записи — то есть вычитает 2 в степени её позиции (нумерация с нуля от младшего бита).",
      `Для ${dec} = ${bin}₂ самый младший бит-единица стоит на позиции ${k}, значит вычитаем 2^${k} = ${subtract}. Ответ: ${dec} − ${subtract} = ${dec - subtract}.`
    ];
  }

  // --- обнуление старшей единицы (первой слева) ---
  if (tt === "clear_first_left_one_decimal_result") {
    const dec = it.decimal, bin = decToBin(dec), n = bin.length;
    const subtract = Math.pow(2, n - 1);
    return [
      "Программа стартует слева от строки, делает шаг вправо и сразу заменяет первый увиденный символ-единицу на ноль.",
      "Если в записи нет ведущих нулей, первый символ слева — старшая единица. Программа её обнуляет, что соответствует вычитанию 2^(n−1), где n — длина двоичной записи.",
      `Для ${dec} = ${bin}₂ длина n = ${n}, вычитаем 2^${n - 1} = ${subtract}. Ответ: ${dec} − ${subtract} = ${dec - subtract}.`
    ];
  }

  // --- левый префикс единиц → нули, затем первый ноль → единица (декретно: ex10) ---
  if (tt === "left_prefix_ones_to_zeros_then_zero_to_one_decimal_result") {
    const dec = it.decimal, bin = decToBin(dec);
    let k = 0; while (k < bin.length && bin[k] === "1") k++;
    return [
      "Программа идёт слева направо: каждую единицу префикса превращает в ноль, а первый встретившийся ноль — в единицу и останавливается.",
      `Для ${dec} = ${bin}₂ префикс единиц имеет длину k = ${k}. Эти k единиц становятся нулями, а нулевой бит на позиции k превращается в единицу.`,
      `Прогон через симулятор внутри карточки покажет именно эту последовательность изменений и подсветит каждый изменённый бит.`
    ];
  }

  // --- левый: первый ноль слева → единица (ex11) ---
  if (tt === "left_first_zero_to_one_decimal_result") {
    const dec = it.decimal, bin = decToBin(dec);
    let k = 0; while (k < bin.length && bin[k] === "1") k++;
    const add = k < bin.length ? Math.pow(2, bin.length - 1 - k) : 0;
    return [
      "Программа идёт слева направо по единицам, не меняя их, а первый встреченный ноль превращает в единицу и останавливается.",
      `Для ${dec} = ${bin}₂ первый ноль слева стоит на позиции ${k} (от старшего бита). Эта позиция соответствует разряду 2^${bin.length - 1 - k} = ${add}.`,
      `Ответ: ${dec} + ${add} = ${dec + add}.`
    ];
  }

  // Фолбэк: если тип задачи не покрыт, даём общие подсказки
  return [
    "Сначала прочитай таблицу программы: какие пары (состояние, символ) есть в таблице, а какие отсутствуют. Отсутствие команды — это остановка.",
    "Найди, где именно программа остановится и какие позиции в строке она изменит. Помогает прогнать программу на коротком примере в симуляторе ниже.",
    task.solutionIdea || "Идея решения раскрыта в кнопке «Показать ответ»."
  ];
}

function libCheckAnswer() {
  const task = libGetTask(); if (!task) return;
  const fb = document.getElementById("lib-answer-feedback");
  const raw = document.getElementById("lib-answer-input").value.trim();
  const p = parseStrictInt(raw);

  // Отметим попытку в прогрессе
  ProgressStore.markAttempt(task.id);

  if (!p.ok) {
    fb.className = "feedback err show";
    fb.textContent = "Введите целое число.";
    return;
  }
  if (p.value === task.answer) {
    fb.className = "feedback ok show";
    fb.textContent = `Верно. Ответ: ${task.answer}.`;
    // Прогресс: посчитаем, что задача решена; «без гайда» — если флаг usedGuide пуст для этой задачи
    const prog = ProgressStore.getProgress();
    const usedGuide = !!(prog.usedGuide && prog.usedGuide[task.id]);
    ProgressStore.markSolved(task.id, { withoutGuide: !usedGuide, usedGuide });
    libLastDiag = null; libRenderDiagnostic();
    renderModeBar();
    // После попытки открываем доступ к подсказке/ответу (для режимов practice и control)
    const hintBtn = document.getElementById("lib-answer-hint");
    const revealBtn = document.getElementById("lib-answer-reveal");
    if (currentMode() !== "study") {
      if (hintBtn) hintBtn.style.display = "";
      if (revealBtn) revealBtn.style.display = "";
    }
  } else {
    fb.className = "feedback err show";
    fb.textContent = `Не сходится. Смотрим, что пошло не так:`;
    libLastDiag = diagnoseTuringAnswer(task, p.value, task.answer);
    if (libLastDiag && libLastDiag.foundationSkillId) {
      ProgressStore.markMistake(task.id, libLastDiag.foundationSkillId);
    }
    libRenderDiagnostic();
    // После попытки открываем доступ к подсказке/ответу (для режимов practice и control)
    const hintBtn = document.getElementById("lib-answer-hint");
    const revealBtn = document.getElementById("lib-answer-reveal");
    if (currentMode() !== "study") {
      if (hintBtn) hintBtn.style.display = "";
      if (revealBtn) revealBtn.style.display = "";
    }
  }
}

function libShowHint() {
  const task = libGetTask(); if (!task) return;
  const hints = libTieredHints(task);
  const idx = Math.min(libHintLevel, hints.length - 1);
  libHintLevel = Math.min(libHintLevel + 1, hints.length);
  const fb = document.getElementById("lib-answer-feedback");

  fb.innerHTML = `<b>Подсказка ${idx + 1} из ${hints.length}:</b> ${escapeHTML(hints[idx])}${tailNote}`;

function libRunSim() {
  const task = libGetTask(); if (!task) return;
  libShowSimErr("");
  const raw = document.getElementById("lib-sim-input").value.trim();
  if (!raw) { libShowSimErr("Введите непустую строку."); return; }
  const allowed = new Set(task.alphabet.filter(s => s !== task.blankSymbol));
  for (const ch of raw) {
    if (!allowed.has(ch)) { libShowSimErr(`Символ «${ch}» не входит в алфавит этой программы.`); return; }
  }
  libSimInput = raw;
  const r = simulateOnce(raw, task.initialTape.headStart, task.program, task.startState, task.blankSymbol);
  const out = document.getElementById("lib-sim-out");
  if (!r.ok) {
    out.innerHTML = `<p class="err-text">Превышено максимальное число шагов.</p>`;
    return;
  }
  let extra = "";
  if (task.initialTape.form === "binary_number" && /^[01]+$/.test(r.finalTape)) {
    const inDec = /^[01]+$/.test(raw) ? binToDec(raw) : null;
    extra = `<p class="small">Если читать вход и выход как двоичные числа:
      ${inDec != null ? `<code>${raw}</code><sub>2</sub> = <code>${inDec}</code><sub>10</sub> → ` : ""}
      <code>${escapeHTML(r.finalTape)}</code><sub>2</sub> = <code>${binToDec(r.finalTape)}</code><sub>10</sub>.</p>`;
  } else if (task.initialTape.form === "binary_string") {
    const c0in = countChar(raw, "0"), c1in = countChar(raw, "1");
    const c0out = countChar(r.finalTape, "0"), c1out = countChar(r.finalTape, "1");
    extra = `<p class="small">До: нулей <code>${c0in}</code>, единиц <code>${c1in}</code>.
       После: нулей <code>${c0out}</code>, единиц <code>${c1out}</code>. Шагов: <code>${r.sim.step}</code>.</p>`;
  } else {
    extra = `<p class="small">Шагов: <code>${r.sim.step}</code>.</p>`;
  }
  out.innerHTML = `
    <p>Вход: <code class="mono">${escapeHTML(raw)}</code></p>
    <p>Лента после: <code class="mono">${escapeHTML(r.finalTape)}</code></p>
    ${extra}
  `;
}

    </details>
  `;
}

/* ============================================================
   АВТОТЕСТЫ
   Прогоняем computeTaskAnswer для каждой задачи из TASK_LIBRARY
   и сверяем с полем answer.
   ============================================================ */
function runAllAutoTests() {
  const results = TASK_LIBRARY.map(task => {
    let got = null, error = null;
    try { got = computeTaskAnswer(task); } catch (e) { error = e.message; }
    return {
      shortId: task.shortId,
      title: task.title,
      expected: task.answer,
      got,
      ok: got === task.answer && error == null,
      error
    };
  });
  return results;
}

function renderAutoTests() {
  const host = document.getElementById("autotest-host");
  if (!host) return;
  const results = runAllAutoTests();
  const passed = results.filter(r => r.ok).length;
  const allOk = passed === results.length;
  host.innerHTML = `
    <details class="admin-details"${allOk ? "" : " open"}>
      <summary>
        Автотесты: ${passed}/${results.length}
        ${allOk ? "<span class='badge ok'>OK</span>" : "<span class='badge err'>есть расхождения</span>"}
      </summary>
      <p class="muted small">
        Для каждой задачи из библиотеки запускается вычислитель и сравнивается с ожидаемым ответом.
        Для бинарных задач — прямой прогон программы на десятичном входе. Для задач на хвост/префикс —
        замкнутая формула, выведенная из поведения программы. Сходимость значит, что и программа,
        и ожидаемый ответ согласованы между собой.
      </p>
      <div class="scroll-x-wrap">
      <table class="autotest-table">
        <thead><tr><th>shortId</th><th>задача</th><th>ожидалось</th><th>получили</th><th>статус</th></tr></thead>
        <tbody>
          ${results.map(r => `
            <tr class="${r.ok ? "ok" : "err"}">
              <td><code>${escapeHTML(r.shortId)}</code></td>
              <td>${escapeHTML(r.title)}</td>
              <td><code>${r.expected}</code></td>
              <td><code>${r.got == null ? "—" : r.got}</code></td>
              <td>${r.ok ? "PASS" : (r.error ? "ERR: " + escapeHTML(r.error) : "FAIL")}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
      </div>
    </details>
  `;
}

      btn.classList.add(o.correct ? "correct" : "wrong");

        host.querySelector("#lib-guide-next").addEventListener("click", () => {
          if (libGuide.idx + 1 >= libGuide.steps.length) {

/* ============================================================
   ПРЕДСКАЖИ ШАГ — мини-режим в универсальном модуле
   ============================================================ */
let uniPredictPending = null; // { realCmd, options }
function uniBuildPredictOptions(task) {
  // три варианта: правильный + 2 шумовых
  if (!uniSim || uniSim.finished) return null;
  const sym = uniSim.tape.get(uniSim.head) ?? task.blankSymbol;
  const cmd = (task.program[uniSim.state] || {})[sym];
  if (!cmd) {
    // нет команды — спросим, остановится ли машина
    return {
      isMissing: true,
      state: uniSim.state, sym,
      realCmd: null,
      options: [
        { text: "Машина выполнит команду по умолчанию", correct: false, why: "По умолчанию команды нет — отсутствие команды это halt." },
        { text: "Машина остановится — для пары нет команды", correct: true },
        { text: "Машина начнёт с нуля", correct: false, why: "В МТ нет такой операции." }
      ]
    };
  }
  const fmt = c => `записать «${c.write === task.blankSymbol ? "λ" : c.write}», ${({L:"сдвиг влево",R:"сдвиг вправо",S:"без сдвига"}[c.move]||c.move)}, новое состояние ${c.next}`;
  // Шумовые: реально отличаются от правильной команды
  // 1) другой write (любой символ алфавита, не равный текущему)
  const otherWrites = task.alphabet.filter(s => s !== cmd.write);
  const altWrite = otherWrites[0] || cmd.write;
  // 2) другой move (точно отличающийся)
  const altMoves = { L: "R", R: "L", S: "L" };
  const altMove = altMoves[cmd.move] || (cmd.move === "L" ? "R" : "L");
  const noise1 = { write: altWrite, move: cmd.move, next: cmd.next };
  const noise2 = { write: cmd.write, move: altMove, next: cmd.next };
  const opts = [
    { text: fmt(cmd), correct: true },
    { text: fmt(noise1), correct: false, why: "Не тот символ записан — посмотри пересечение в таблице ещё раз." },
    { text: fmt(noise2), correct: false, why: "Не то направление сдвига — внимательно прочти второй элемент тройки." }
  ];
  // Уникализируем по тексту: если шумовой случайно совпал с правильным (бывает при крошечном алфавите), оставляем только уникальные
  const seen = new Set();
  const uniq = [];
  for (const o of opts) { if (!seen.has(o.text)) { seen.add(o.text); uniq.push(o); } }
  // Перемешаем
  for (let i = uniq.length - 1; i > 0; i--) { const j = (i * 7 + 3) % (i + 1); [uniq[i], uniq[j]] = [uniq[j], uniq[i]]; }
  return { isMissing: false, state: uniSim.state, sym, realCmd: cmd, options: uniq };
}
function uniRenderPredict() {
  const host = document.getElementById("uni-predict-host");
  if (!host) return;
  if (!uniPredictPending) { host.innerHTML = ""; return; }
  const p = uniPredictPending;
  host.innerHTML = `
    <div class="predict-block">
      <h5>🔮 Предскажи следующий шаг</h5>
      <p>Состояние: <code>${escapeHTML(p.state)}</code>, под головкой: <code>${escapeHTML(p.sym)}</code>. Какая команда сработает?</p>
      ${p.options.map((o, i) => `<button class="guided-option" data-pred-opt="${i}">${escapeHTML(o.text)}</button>`).join("")}
      <div class="guided-explain" data-pred-explain hidden></div>
    </div>
  `;
  host.querySelectorAll("[data-pred-opt]").forEach(btn => {
    btn.addEventListener("click", () => {
      const i = parseInt(btn.getAttribute("data-pred-opt"), 10);
      const o = p.options[i];
      host.querySelectorAll("[data-pred-opt]").forEach(b => b.disabled = true);
      btn.classList.add(o.correct ? "correct" : "wrong");
      const explain = host.querySelector("[data-pred-explain]");
      explain.hidden = false;
      if (o.correct) {
        explain.className = "guided-explain";
        explain.innerHTML = `<b>Верно.</b> <button class="btn small" id="uni-pred-do">Применить шаг</button>`;
        host.querySelector("#uni-pred-do").addEventListener("click", () => {
          uniPredictPending = null;
          if (typeof uniDoStep === "function") uniDoStep(); else if (typeof uniStep === "function") uniStep();
          uniRenderPredict();
        });
        ProgressStore.markFoundation("cmd-format", true);
      } else {
        explain.className = "guided-explain wrong-why";
        const why = o.why ? `<i>${escapeHTML(o.why)}</i><br>` : "";
        explain.innerHTML = `${why}<b>Подсказка:</b> найди в таблице строку «${escapeHTML(p.state)}» и столбец «${escapeHTML(p.sym)}» — там записана точная тройка.`;
        ProgressStore.markFoundation("cmd-format", false);
      }
    });
  });
}
function uniStartPredict() {
  const task = (typeof uniGetTask === "function") ? uniGetTask() : null;
  if (!task) return;
  if (typeof uniLoadSim === "function" && !uniSim) uniLoadSim();
  if (!uniSim || uniSim.finished) return;
  uniPredictPending = uniBuildPredictOptions(task);
  uniRenderPredict();
}

/* ============================================================
   Инициализация: создаём панели вкладок, подключаем хендлеры,
   запускаем автотесты.
   ============================================================ */
function buildPanels() {
  const main = document.getElementById("main");
  // Удалим всё старое содержимое #main
  main.innerHTML = "";
  TABS.forEach(tab => {
    const div = document.createElement("div");
    div.id = "panel-" + tab.id;
    div.className = "tab-panel" + (tab.id === currentTab ? " active" : "");
    main.appendChild(div);
  });
}

document.addEventListener("DOMContentLoaded", () => {
  renderTabBar();
  buildPanels();

  initTabFoundation();
  initTabRightTail();
  initTabLeftPrefix();
  initTabBinary();
  initTabUniversal();
  initTabLibrary();
  initTabMistakes();

  renderModeBar();
  wireModeSwitch();
  wireRouteBar();

  renderAdminBlock();
  renderAutoTests();
});

</script>
