<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Собери решение уравнения — Mathexam.space</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#eef2f5;color:#1a2c3e;font-family:Segoe UI,Roboto,Arial,sans-serif;min-height:100vh}.hdr{background:#2c3e4e;color:white;padding:13px 22px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.hdr h1{margin:0;font-size:1.2rem}.hdr p{margin:2px 0 0;font-size:.74rem;opacity:.6}.back{color:rgba(255,255,255,.6);font-weight:700;text-decoration:none}.back:hover{color:white}.sbar{display:none;background:#243447;color:rgba(255,255,255,.72);gap:18px;padding:6px 22px;font-size:.8rem}.sbar.on{display:flex}.sbar b{color:white}main{display:flex;justify-content:center;padding:22px 14px 52px}.scr{width:min(590px,100%);display:flex;flex-direction:column;gap:13px}.card{background:white;border-radius:18px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,.07)}.eq{background:#f4f9fe;border:1px solid #d4e2ec;text-align:center}.eqbig{font:800 clamp(2rem,9vw,2.8rem)/1.2 'Courier New',monospace;letter-spacing:2px;word-break:break-word}.neg{color:#dc2626}.pos{color:#1d6fa4}.op{color:#64748b}.builder{background:#1e3a4e;border-radius:16px;padding:16px 18px;color:white;display:grid;gap:9px}.row{display:flex;gap:10px;align-items:center}.num{width:23px;height:23px;border-radius:50%;display:grid;place-items:center;font-size:.72rem;font-weight:900;flex:0 0 auto}.done{background:#16a34a}.wait{background:rgba(255,255,255,.15);color:rgba(255,255,255,.55)}.btxt{font:800 1.08rem 'Courier New',monospace;color:white}.ghost{color:rgba(255,255,255,.38);font-size:.86rem;font-style:italic}.step{border:2px solid #d1dae4;border-radius:16px;padding:17px 18px}.badge{display:flex;gap:7px;align-items:center;text-transform:uppercase;letter-spacing:1px;color:#2c7da0;font-size:.7rem;font-weight:900;margin-bottom:9px}.badge i{font-style:normal;background:#2c7da0;color:white;border-radius:50%;width:21px;height:21px;display:grid;place-items:center}.q{margin:0 0 13px;font-size:.98rem;line-height:1.5}.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.opbtn,.exprbtn,.go,.plain,.danger{font-family:inherit;font-weight:800;cursor:pointer;border-radius:14px;transition:.16s}.opbtn,.exprbtn{border:2.5px solid #d1dae4;background:white;color:#1a2c3e}.opbtn{padding:13px 10px;font-size:.96rem}.exprbtn{padding:12px 14px;text-align:left;font:800 1rem 'Courier New',monospace}.opbtn:hover:not(:disabled),.exprbtn:hover:not(:disabled){border-color:#2c7da0;background:#e0f2fe;color:#1f5e7a}.ok{border-color:#16a34a!important;background:#dcfce7!important;color:#14532d!important}.bad{border-color:#dc2626!important;background:#fee2e2!important;color:#7f1d1d!important;animation:shake .35s}.dim{opacity:.25;pointer-events:none}.exprgrid{display:grid;gap:8px}.ans{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.ans label{font:800 1rem 'Courier New',monospace}.ans input{width:112px;text-align:center;border:2.5px solid #d1dae4;border-radius:999px;padding:8px;font:900 1.35rem 'Courier New',monospace;outline:none}.ans input:focus{border-color:#2c7da0}.go{background:#2c7da0;color:white;border:0;padding:11px 22px}.go:hover{background:#1f5e7a}.fb{display:none;margin-top:10px;padding:11px 14px;border-radius:12px;font-size:.88rem;line-height:1.6}.fb.on{display:block}.err{background:#fee2e2;border-left:4px solid #dc2626;color:#7f1d1d}.hint{background:#fef3c7;border-left:4px solid #d97706;color:#78350f}.tools{display:flex;gap:8px;flex-wrap:wrap}.plain{background:white;color:#64748b;border:2px solid #d1dae4;padding:9px 15px}.plain:hover{border-color:#64748b;color:#1a2c3e}.donecard{background:linear-gradient(140deg,#1e3a4e,#2c5c72);border-radius:18px;padding:24px 20px;color:white;text-align:center}.res{font:900 3rem 'Courier New',monospace;margin:8px 0}.chain{background:rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;text-align:left;line-height:1.9;font:800 .92rem 'Courier New',monospace}.next{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);color:white;border-radius:999px;padding:10px 24px;font-weight:800;margin-top:13px;cursor:pointer}.menuico{text-align:center;font-size:2.4rem}.ttl{text-align:center;font-size:1.45rem;font-weight:800;margin:8px 0}.sub{text-align:center;color:#64748b;line-height:1.55}.menugrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:18px}.mbtn{border:2px solid #d1dae4;background:white;border-radius:14px;padding:16px;text-align:center;cursor:pointer}.mbtn:hover{border-color:#2c7da0;box-shadow:0 6px 14px rgba(44,125,160,.14);transform:translateY(-2px)}.mi{font-size:1.5rem}.mn{font-weight:900;margin-top:5px}.md{font-size:.76rem;color:#64748b;margin-top:4px}.stats{background:#f7fafc;border-radius:14px;padding:13px;margin-top:14px}.dots{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}.dot{width:16px;height:16px;border-radius:50%;background:#d1dae4}.dot.y{background:#16a34a}.dot.n{background:#dc2626}.danger{background:#fee2e2;color:#7f1d1d;border:0;padding:8px 14px;margin-top:10px}.prog{height:7px;background:#d1dae4;border-radius:999px;overflow:hidden}.prog b{display:block;height:100%;background:#2c7da0;border-radius:999px}@media(max-width:420px){.grid,.menugrid{grid-template-columns:1fr}.eqbig{letter-spacing:1px}.exprbtn{font-size:.92rem}}@keyframes shake{20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
  </style>
</head>
<body>
<header class="hdr"><div><h1>🧩 Собери решение уравнения</h1><p>По шагам: действие → выражение → ответ</p></div><a class="back" href="../index.html">← Назад</a></header>
<div id="sbar" class="sbar"></div><main><div id="app" class="scr"></div></main>
<script>
const SK='mathExamCourseProgress.v1',TID='equationBuilderTrainer';
const LEARN=[{type:'add',a:5,b:9},{type:'sub',a:3,b:7},{type:'mul',a:4,b:36},{type:'div',a:5,b:-3},{type:'sub',a:6,b:-2},{type:'add',a:7,b:12},{type:'add',a:-4,b:9},{type:'sub',a:-3,b:10}];
const S={mode:null,step:0,idx:0,tasks:[],clean:true,ok:0,total:0,expr:null,hint:false,fb:null};
const $=id=>document.getElementById(id), rnd=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
function rnz(a,b){let v;do v=rnd(a,b);while(v===0);return v}function sh(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=rnd(0,i);[a[i],a[j]]=[a[j],a[i]]}return a}
function def(){return{solved:0,correct:0,streak:0,bestStreak:0,history:[]}}function load(){try{let d=JSON.parse(localStorage.getItem(SK)||'{}');return d[TID]||def()}catch{return def()}}function save(s){try{let d=JSON.parse(localStorage.getItem(SK)||'{}');d[TID]=s;localStorage.setItem(SK,JSON.stringify(d))}catch{}}
function rec(good){let s=load();s.solved++;if(good){s.correct++;s.streak++;s.bestStreak=Math.max(s.bestStreak,s.streak)}else s.streak=0;s.history=[good?1:0,...(s.history||[])].slice(0,10);save(s)}function reset(){let d=JSON.parse(localStorage.getItem(SK)||'{}');d[TID]=def();localStorage.setItem(SK,JSON.stringify(d));render()}
function f(n){return n<0?'−'+Math.abs(n):''+n}function fp(n){return n<0?'(−'+Math.abs(n)+')':''+n}function xval(t){return t.type==='add'?t.b-t.a:t.type==='sub'?t.b+t.a:t.type==='mul'?t.b/t.a:t.b*t.a}function eqs(t){return t.type==='add'?`x + ${fp(t.a)} = ${f(t.b)}`:t.type==='sub'?`x − ${fp(t.a)} = ${f(t.b)}`:t.type==='mul'?`x · ${t.a} = ${f(t.b)}`:`x : ${t.a} = ${f(t.b)}`}function eqh(t){return eqs(t).replaceAll('−','<span class="neg">−</span>').replace(/([0-9]+)/g,'<span class="pos">$1</span>').replaceAll('x','<span>x</span>').replaceAll(' + ','<span class="op"> + </span>').replaceAll(' − ','<span class="op"> − </span>').replaceAll(' · ','<span class="op"> · </span>').replaceAll(' : ','<span class="op"> : </span>').replaceAll(' = ','<span class="op"> = </span>')}
function cexpr(t){let b=f(t.b),a=fp(t.a);return t.type==='add'?`x = ${b} − ${a}`:t.type==='sub'?`x = ${b} + ${a}`:t.type==='mul'?`x = ${b} : ${a}`:`x = ${b} · ${a}`}function opts(t){let b=f(t.b),a=fp(t.a),bp=fp(t.b),c=cexpr(t),w=[];if(t.type==='add')w=[`x = ${b} + ${a}`,`x = ${a} − ${bp}`,`x = ${b} · ${a}`];if(t.type==='sub')w=[`x = ${b} − ${a}`,`x = ${a} + ${bp}`,`x = ${b} · ${a}`];if(t.type==='mul')w=[`x = ${b} · ${a}`,`x = ${a} : ${bp}`,`x = ${b} − ${a}`];if(t.type==='div')w=[`x = ${b} : ${a}`,`x = ${b} − ${a}`,`x = ${b} + ${a}`];return sh([c,...w.filter(z=>z!==c).slice(0,3)]).map(label=>({label,ok:label===c}))}
function gen(){function add(neg){let x=rnz(-8,8),a=neg?-rnd(2,7):rnd(3,9),b=x+a;if(Math.abs(b)>14)return add(neg);return{type:'add',a,b}}function sub(neg){let x=rnz(-8,8),a=neg?-rnd(2,7):rnd(3,9),b=x-a;if(Math.abs(b)>14)return sub(neg);return{type:'sub',a,b}}function mul(){let a=rnd(2,7),x=rnz(-7,7);return{type:'mul',a,b:a*x}}function div(){let a=rnd(2,6),b=rnz(-6,6);return{type:'div',a,b}}let arr=[add(false),sub(false),mul(),div(),add(true),sub(true),add(false),sub(false)];while(arr.length<10){let q=[add(false),sub(false),mul(),div()][rnd(0,3)];arr.push(q)}return sh(arr).slice(0,10)}
function cur(){return S.tasks[S.idx]}function inv(t){return{add:'sub',sub:'add',mul:'div',div:'mul'}[t.type]}function lname(o){return{add:'прибавить',sub:'вычесть',mul:'умножить',div:'разделить'}[o]}
function render(){let app=$('app');if(!S.mode){app.innerHTML=menu();bar(false);return}if(S.mode==='results'){app.innerHTML=results();bar(false);return}app.innerHTML=task();bar(true);$('ans')?.addEventListener('keydown',e=>{if(e.key==='Enter')checkAns()})}function bar(on){let b=$('sbar');if(!on){b.className='sbar';return}let s=load();b.className='sbar on';b.innerHTML=`<span>Задача <b>${S.idx+1}/${S.tasks.length}</b></span><span>Верно <b>${S.ok}/${S.total}</b></span>${s.streak>1?`<span>Серия <b style="color:#fbbf24">${s.streak}</b></span>`:''}`}
function menu(){let s=load(),p=s.solved?Math.round(100*s.correct/s.solved):0,d=Array.from({length:10},(_,i)=>`<span class="dot ${s.history[i]===1?'y':s.history[i]===0?'n':''}"></span>`).join('');return`<div class="card"><div class="menuico">🧩</div><div class="ttl">Собери решение уравнения</div><p class="sub">Учимся находить x по шагам:<br>определи действие → запиши выражение → вычисли ответ.</p><div class="menugrid"><button class="mbtn" onclick="start('learn')"><div class="mi">📘</div><div class="mn">Обучение</div><div class="md">8 задач · подсказки</div></button><button class="mbtn" onclick="start('practice')"><div class="mi">⚡</div><div class="mn">Тренировка</div><div class="md">10 задач · все типы</div></button></div>${s.solved?`<div class="stats"><b>Решено:</b> ${s.solved} · <b>Верно:</b> ${s.correct} · <b>Точность:</b> ${p}% · <b>Серия:</b> ${s.streak}<div class="dots">${d}</div><button class="danger" onclick="if(confirm('Сбросить статистику?'))reset()">Сбросить статистику</button></div>`:''}</div>`}
function task(){let t=cur(),pct=S.mode==='practice'?`<div style="display:flex;justify-content:space-between;color:#94a3b8;font-weight:800;font-size:.8rem"><span>Тренировка</span><span>${S.idx+1}/${S.tasks.length}</span></div><div class="prog"><b style="width:${S.idx/S.tasks.length*100}%"></b></div>`:'';return pct+`<div class="card eq"><div class="eqbig">${eqh(t)}</div></div>${builder(t)}${S.step===0?step0(t):S.step===1?step1(t):S.step===2?step2(t):done(t)}${S.step<3?`<div class="tools"><button class="plain" onclick="S.hint=!S.hint;render()">💡 Подсказка</button><button class="plain" onclick="showSol()">👁 Показать решение</button></div>`:''}`}
function builder(t){let x=xval(t),l2=S.expr,l3=S.step===3?`x = ${f(x)}`:null;return`<div class="builder"><div class="row"><span class="num done">1</span><span class="btxt">${eqs(t)}</span></div><div class="row"><span class="num ${l2?'done':'wait'}">2</span><span class="btxt">${l2||'<span class="ghost">запишем выражение для x...</span>'}</span></div><div class="row"><span class="num ${l3?'done':'wait'}">3</span><span class="btxt">${l3||'<span class="ghost">вычислим ответ...</span>'}</span></div></div>`}
function fb(){return`<div class="fb ${S.fb?'err on':''}" id="fb">${S.fb||''}</div>${S.hint?`<div class="fb hint on">${hintText()}</div>`:''}`}function hintText(){let t=cur();if(S.step===0)return`Нужно обратное действие. Если с x сделали «${t.type==='add'?'прибавили':t.type==='sub'?'вычли':t.type==='mul'?'умножили':'разделили'}», то надо ${lname(inv(t))}.`;if(S.step===1)return`Берём правую часть уравнения и выполняем с ней обратное действие с числом ${fp(t.a)}.`;return'Вычисли выражение из строки 2.'}
function step0(t){return`<div class="step"><div class="badge"><i>1</i>Шаг 1 из 3</div><p class="q">Какое действие будешь делать, чтобы найти x?</p><div class="grid" id="ops">${['add','sub','mul','div'].map(o=>`<button class="opbtn" onclick="pickOp('${o}')">${lname(o)}</button>`).join('')}</div>${fb()}</div>`}
function step1(t){return`<div class="step"><div class="badge"><i>2</i>Шаг 2 из 3</div><p class="q">Что на что? Выбери правильную строку:</p><div class="exprgrid" id="exprs">${opts(t).map(o=>`<button class="exprbtn" onclick="pickExpr(this,${o.ok})">${o.label}</button>`).join('')}</div>${fb()}</div>`}
function step2(t){return`<div class="step"><div class="badge"><i>3</i>Шаг 3 из 3</div><p class="q">Чему равен x? Вычисли и введи ответ:</p><div class="ans"><label>${S.expr} → x =</label><input id="ans" type="number" placeholder="?"><button class="go" onclick="checkAns()">Проверить</button></div>${fb()}</div>`}
function done(t){let x=xval(t),last=S.idx>=S.tasks.length-1;return`<div class="donecard"><div>Ответ:</div><div class="res">x = ${f(x)}</div><div class="chain">${eqs(t)}<br>${cexpr(t)}<br>x = ${f(x)}</div><button class="next" onclick="${last?'finish()':'next()'}">${last?'Завершить →':'Следующий →'}</button></div>`}
function pickOp(o){let t=cur(),buttons=[...document.querySelectorAll('#ops button')];if(o===inv(t)){buttons.forEach(b=>b.textContent===lname(o)?b.classList.add('ok'):b.classList.add('dim'));S.fb=null;S.hint=false;S.step=1;setTimeout(render,350)}else{buttons.forEach(b=>{if(b.textContent===lname(o))b.classList.add('bad')});S.clean=false;S.fb=wrongOp(t,o);S.hint=S.mode==='learn';setTimeout(render,650)}}function wrongOp(t,o){if(t.type==='add'&&o==='add')return'К x прибавили число. Чтобы найти x, нужно вычесть это число из правой части.';if(t.type==='sub'&&o==='sub')return'Из x вычли число. Чтобы найти x, нужно прибавить это число к правой части.';if(t.type==='mul'&&o==='mul')return'x умножили на число. Чтобы найти x, нужно разделить правую часть на это число.';if(t.type==='div'&&o==='div')return'x разделили на число. Чтобы найти x, нужно умножить правую часть на это число.';return'Чтобы найти x, нужно отменить действие, которое сделали с x.'}
function pickExpr(btn,isOk){if(isOk){[...document.querySelectorAll('#exprs button')].forEach(b=>b===btn?b.classList.add('ok'):b.classList.add('dim'));S.expr=btn.textContent.trim();S.fb=null;S.hint=false;S.step=2;setTimeout(render,350)}else{btn.classList.add('bad');S.clean=false;S.fb='Смотри на правую часть уравнения. Действие выполняем с правой частью, чтобы получить x.';setTimeout(render,700)}}
function checkAns(){let inp=$('ans'),raw=(inp.value||'').trim(),u=parseInt(raw),x=xval(cur());if(!raw||isNaN(u)){inp.classList.add('bad');setTimeout(()=>inp.classList.remove('bad'),500);return}if(u===x){rec(S.clean);if(S.clean)S.ok++;S.total++;S.step=3;render()}else{S.clean=false;S.fb=Math.abs(u)===Math.abs(x)?`Число по модулю верное, но знак неверный. Ответ ${x<0?'отрицательный':'положительный'}.`:`Неверно. Вычисли ещё раз: ${cexpr(cur()).replace('x = ','')} = ${f(x)}.`;render()}}
function showSol(){S.expr=cexpr(cur());S.clean=false;rec(false);S.total++;S.step=3;render()}function start(m){S.mode=m;S.tasks=m==='learn'?[...LEARN]:gen();S.idx=0;S.ok=0;S.total=0;resetT();render()}function resetT(){S.step=0;S.clean=true;S.expr=null;S.hint=false;S.fb=null}function next(){S.idx++;resetT();render()}function finish(){S.mode='results';render()}
function results(){let s=load(),pct=S.total?Math.round(100*S.ok/S.total):0,tot=s.solved?Math.round(100*s.correct/s.solved):0;return`<div class="card"><div class="ttl">Результат: ${S.ok}/${S.total}</div><p class="sub">${pct>=80?'Хорошо! Можно закрепить ещё раз.':'Нужно ещё потренироваться спокойно.'}</p><div class="stats">Всего решено: <b>${s.solved}</b> · точность: <b>${tot}%</b> · серия: <b>${s.streak}</b></div><div class="tools"><button class="go" onclick="start('practice')">Ещё тренировка</button><button class="plain" onclick="S.mode=null;render()">В меню</button></div></div>`}
render();
</script>
</body>
</html>
