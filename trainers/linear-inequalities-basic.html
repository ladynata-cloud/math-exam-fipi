<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Линейные неравенства: переносы и знак</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#e8e4db;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:#1f2937;padding:18px}.app{max-width:1080px;margin:auto;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 12px 36px #0002}.head{background:#1a1a2e;color:white;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}.title{font-size:20px;font-weight:900}.sub{font-size:12px;opacity:.72;margin-top:2px}.back{color:#cbd5e1;text-decoration:none;font-weight:800;font-size:12px}.back:hover{color:#fff}.main{display:grid;grid-template-columns:minmax(0,1fr) 340px}.boardWrap{background:#faf8f2;padding:14px;border-right:1px solid #e5e2d9}.board{width:100%;height:auto;border:1px solid #d6d3ca;border-radius:14px;background:#fffdf7;display:block}.panel{padding:14px;display:flex;flex-direction:column;gap:10px}.card{border:1.5px solid #e5e7eb;border-radius:12px;padding:12px;background:#f9fafb}.card h2{margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:#64748b}.task{font-size:22px;font-weight:900;font-family:Georgia,serif;text-align:center;color:#111827;line-height:1.35}.small{font-size:12px;color:#64748b;line-height:1.45}.msg{border-radius:12px;padding:12px;font-size:14px;font-weight:750;line-height:1.42}.info{background:#eff6ff;color:#1d4ed8}.ok{background:#f0fdf4;color:#15803d}.err{background:#fef2f2;color:#b91c1c}.warn{background:#fff7ed;color:#c2410c}.hintBox{display:none;background:#fff7ed;color:#9a3412;border:1.5px solid #fed7aa;border-radius:12px;padding:12px;font-size:13px;line-height:1.5}.hintBox.on{display:block}.bar{display:flex;gap:8px;flex-wrap:wrap;padding:12px 14px;background:#f9fafb;border-top:1px solid #e5e7eb}button{border:1.5px solid #d1d5db;border-radius:9px;background:#fff;color:#374151;padding:8px 13px;font:800 13px system-ui;cursor:pointer}button:hover{background:#f3f4f6}.primary{background:#1a1a2e;color:white;border-color:#1a1a2e}.good{background:#15803d;color:white;border-color:#15803d}.warnBtn{background:#fff7ed;color:#c2410c;border-color:#fdba74}.danger{background:#fee2e2;color:#991b1b;border-color:#fecaca}.choices{display:grid;gap:8px}.choice{display:block;width:100%;text-align:left;border-radius:12px;padding:10px 12px;background:#fff;font-weight:850;line-height:1.35}.choice.on{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}.choice.goodC{background:#dcfce7;border-color:#16a34a;color:#166534}.choice.badC{background:#fee2e2;border-color:#dc2626;color:#991b1b}.formula{font-family:Georgia,serif;font-weight:900;color:#111827}.step{display:flex;gap:10px;align-items:flex-start;margin:8px 0;padding:10px;border-radius:12px;background:#fff;border:1px solid #e5e7eb}.num{width:26px;height:26px;border-radius:50%;background:#e5e7eb;color:#475569;display:grid;place-items:center;font-weight:950;flex:0 0 auto}.step.done .num{background:#15803d;color:#fff}.step.now .num{background:#1d4ed8;color:#fff}.stepText{font-size:14px;line-height:1.45}.bigEq{font-family:Georgia,serif;font-size:26px;font-weight:950;text-anchor:middle;fill:#111827}.progress{height:7px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin-bottom:10px}.progress span{display:block;height:100%;background:#1a1a2e}.topline{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:8px}.statLine{font-size:12px;color:#64748b}.menu{padding:28px;max-width:740px;margin:auto}.menu h2{text-align:center;font-size:30px;margin:0 0 8px}.menu p{text-align:center;color:#64748b;line-height:1.55}.menuGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}.menuBtn{padding:20px;border-radius:16px;text-align:center;background:#fff;border:2px solid #e5e7eb}.menuBtn:hover{border-color:#1a1a2e;background:#f8fafc}.menuIcon{font-size:30px}.menuName{font-size:18px;font-weight:950;margin-top:5px}.menuDesc{font-size:12px;color:#64748b;margin-top:4px;line-height:1.35}.pill{display:inline-flex;border-radius:999px;background:#eef2ff;color:#3730a3;padding:4px 8px;font-size:12px;font-weight:900}@media(max-width:860px){body{padding:8px}.main{grid-template-columns:1fr}.boardWrap{border-right:0;border-bottom:1px solid #e5e2d9}.head{flex-direction:column;align-items:flex-start}.task{font-size:19px}.menuGrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app"><div class="head"><div><div class="title">↔️ Линейные неравенства</div><div class="sub">переносы · деление · смена знака · числовая прямая</div></div><a class="back" href="../index.html">← к списку тренажёров</a></div><div id="app"></div></div>
<script>
const KEY='mathExamCourseProgress.v1',TOPIC='linearInequalitiesBasic';
const TASKS=[
{e:'3 − 2x ≥ 8x − 1',mid:'−10x ≥ −4',ans:'x ≤ 0,4',b:0.4,lab:'0,4',dir:'left',closed:true,opts:['x ≥ 0,4','x ≤ 0,4','x ≥ −0,4','x ≤ −0,2'],mids:['−10x ≥ −4','10x ≥ −4','−10x ≥ 4','−6x ≥ −4'],hint:'Переносим 8x влево, 3 вправо: −2x − 8x ≥ −1 − 3.'},
{e:'4x − 4 ≥ 9x + 6',mid:'−5x ≥ 10',ans:'x ≤ −2',b:-2,lab:'−2',dir:'left',closed:true,opts:['x ≥ −2','x ≤ −2','x ≤ −0,4','x ≥ −0,4'],mids:['−5x ≥ 10','5x ≥ 10','−5x ≥ −10','−13x ≥ 2'],hint:'Получается −5x ≥ 10. Делим на −5, знак меняется.'},
{e:'6 − 7x ≤ 3x − 7',mid:'−10x ≤ −13',ans:'x ≥ 1,3',b:1.3,lab:'1,3',dir:'right',closed:true,opts:['x ≤ 1,3','x ≥ 1,3','x ≤ 0,1','x ≥ −1,3'],mids:['−10x ≤ −13','−4x ≤ −1','10x ≤ −13','−10x ≤ 13'],hint:'После переноса: −7x − 3x ≤ −7 − 6.'},
{e:'5x + 4 < x + 6',mid:'4x < 2',ans:'x < 0,5',b:0.5,lab:'0,5',dir:'left',closed:false,opts:['x < 0,5','x > 0,5','x < 2,5','x > 2,5'],mids:['4x < 2','6x < 10','4x < 10','−4x < 2'],hint:'5x − x < 6 − 4, значит 4x < 2.'},
{e:'5x − 3(5x − 8) < −7',mid:'−10x < −31',ans:'x > 3,1',b:3.1,lab:'3,1',dir:'right',closed:false,opts:['x < 3,1','x > 3,1','x < −3,1','x > −1,7'],mids:['−10x < −31','−10x < 31','20x < −31','−15x < −31'],hint:'Сначала раскрываем скобки: 5x − 15x + 24 < −7.'},
{e:'6x − 3(4x + 1) > 6',mid:'−6x > 9',ans:'x < −1,5',b:-1.5,lab:'−1,5',dir:'left',closed:false,opts:['x > −1,5','x < −1,5','x < −0,5','x > −0,5'],mids:['−6x > 9','−6x > −9','18x > 9','−6x > 3'],hint:'6x − 12x − 3 > 6, значит −6x > 9.'},
{e:'2x − 3(x − 7) ≤ 3',mid:'−x ≤ −18',ans:'x ≥ 18',b:18,lab:'18',dir:'right',closed:true,opts:['x ≤ 18','x ≥ 18','x ≥ −24','x ≤ −24'],mids:['−x ≤ −18','−x ≤ 18','5x ≤ −18','−x ≤ −24'],hint:'2x − 3x + 21 ≤ 3, значит −x ≤ −18.'},
{e:'8x − 3(x + 9) ≥ −9',mid:'5x ≥ 18',ans:'x ≥ 3,6',b:3.6,lab:'3,6',dir:'right',closed:true,opts:['x ≥ 3,6','x ≤ 3,6','x ≥ 7,2','x ≤ 7,2'],mids:['5x ≥ 18','5x ≥ −18','11x ≥ 18','5x ≥ 36'],hint:'8x − 3x − 27 ≥ −9, значит 5x ≥ 18.'},
{e:'2 + x ≤ 5x − 8',mid:'−4x ≤ −10',ans:'x ≥ 2,5',b:2.5,lab:'2,5',dir:'right',closed:true,opts:['x ≤ 2,5','x ≥ 2,5','x ≤ 1,5','x ≥ 1,5'],mids:['−4x ≤ −10','4x ≤ −10','−4x ≤ 10','−6x ≤ −10'],hint:'x − 5x ≤ −8 − 2, значит −4x ≤ −10.'},
{e:'x + 4 ≥ 4x − 5',mid:'−3x ≥ −9',ans:'x ≤ 3',b:3,lab:'3',dir:'left',closed:true,opts:['x ≥ 3','x ≤ 3','x ≥ −0,2','x ≤ −0,2'],mids:['−3x ≥ −9','3x ≥ −9','−3x ≥ 9','−5x ≥ −1'],hint:'x − 4x ≥ −5 − 4, значит −3x ≥ −9.'},
{e:'−2x + 5 ≤ −3x − 3',mid:'x ≤ −8',ans:'x ≤ −8',b:-8,lab:'−8',dir:'left',closed:true,opts:['x ≥ −8','x ≤ −8','x ≥ −0,4','x ≤ −0,4'],mids:['x ≤ −8','−5x ≤ −8','x ≤ 8','−x ≤ −8'],hint:'Прибавим 3x к обеим частям: x + 5 ≤ −3.'}
];
let screen='menu',mode='learn',tasks=[],idx=0,stage=1,midChoice=null,ansChoice=null,checked=false,hint=false,okCount=0,total=0;
const $=id=>document.getElementById(id);function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function loadStats(){try{let d=JSON.parse(localStorage.getItem(KEY)||'{}');return d[TOPIC]||{solved:0,correct:0,streak:0,bestStreak:0,history:[]}}catch{return{solved:0,correct:0,streak:0,bestStreak:0,history:[]}}}function saveStats(s){let d={};try{d=JSON.parse(localStorage.getItem(KEY)||'{}')}catch{}d[TOPIC]=s;localStorage.setItem(KEY,JSON.stringify(d))}function record(ok){let s=loadStats();s.solved++;if(ok){s.correct++;s.streak++;s.bestStreak=Math.max(s.bestStreak||0,s.streak)}else{s.streak=0}s.history=[ok?1:0,...(s.history||[])].slice(0,10);saveStats(s)}function resetStats(){if(confirm('Сбросить статистику?')){let d=JSON.parse(localStorage.getItem(KEY)||'{}');d[TOPIC]={solved:0,correct:0,streak:0,bestStreak:0,history:[]};localStorage.setItem(KEY,JSON.stringify(d));render()}}
function start(m){mode=m;screen='task';tasks=m==='learn'?TASKS.slice(0,8):shuffle(TASKS).slice(0,10);idx=0;stage=1;midChoice=null;ansChoice=null;checked=false;hint=false;okCount=0;total=0;render()}function cur(){return tasks[idx]}function fmt(n){return String(n).replace('-', '−').replace('.', ',')}
function render(){let root=$('app');if(screen==='menu'){root.innerHTML=menuHTML();return}root.innerHTML=taskHTML();drawBoard();renderStats();paintChoices()}
function menuHTML(){let s=loadStats(),pct=s.solved?Math.round(100*s.correct/s.solved):0;return `<div class="menu"><h2>Линейные неравенства</h2><p>Тренажёр учит переносить слагаемые, раскрывать скобки, делить на коэффициент и не забывать менять знак при делении на отрицательное число.</p><div class="menuGrid"><button class="menuBtn" onclick="start('learn')"><div class="menuIcon">📘</div><div class="menuName">Обучение</div><div class="menuDesc">8 задач по шагам</div></button><button class="menuBtn" onclick="start('practice')"><div class="menuIcon">⚡</div><div class="menuName">Тренировка</div><div class="menuDesc">10 случайных задач</div></button></div>${s.solved?`<div class="card" style="margin-top:18px;text-align:center"><b>Статистика:</b> решено ${s.solved}, верно ${s.correct}, точность ${pct}%, серия ${s.streak}<br><button class="danger" style="margin-top:10px" onclick="resetStats()">Сбросить статистику</button></div>`:''}</div>`}
function taskHTML(){let t=cur(),pct=Math.round(idx/tasks.length*100);return `<div class="main"><div class="boardWrap"><div class="topline"><span class="small"><b>${idx+1}</b> / ${tasks.length}</span><span class="small">${mode==='learn'?'Обучение':'Тренировка'}</span></div><div class="progress"><span style="width:${pct}%"></span></div><svg id="board" class="board" viewBox="0 0 720 520" xmlns="http://www.w3.org/2000/svg"></svg></div><aside class="panel"><div class="card"><h2>Задание</h2><div class="task">${t.e}</div><p class="small">Сначала выбери строку после переноса и упрощения. Потом выбери ответ.</p></div><div class="card"><h2>Шаг ${stage} из 2</h2>${stepsHTML(t)}</div><div id="msg" class="msg info">${stage===1?'Выберите, что получится после переноса и упрощения.':'Теперь выберите окончательный ответ.'}</div><div id="hintBox" class="hintBox ${hint?'on':''}">${hintText(t)}</div><div class="card"><h2>Статистика</h2><p class="statLine">Решено: <b id="solved">0</b> · верно: <b id="correct">0</b> · серия: <b id="streak">0</b></p><button class="danger" onclick="resetStats()">Сбросить статистику</button></div></aside></div><div class="bar"><button class="primary" onclick="checkAnswer()">Проверить</button><button class="warnBtn" onclick="toggleHint()">Подсказка</button><button onclick="showSolution()">Показать решение</button><button class="good" onclick="nextTask()">Следующее задание</button><button onclick="screen='menu';render()">В меню</button></div>`}
function stepsHTML(t){if(stage===1){let opts=shuffle(t.mids);return `<div class="choices">${opts.map(o=>`<button class="choice ${midChoice===o?'on':''}" onclick="midChoice='${o}';render()"><span class="formula">${o}</span></button>`).join('')}</div>`}return `<div class="choices">${t.opts.map(o=>`<button class="choice ${ansChoice===o?'on':''}" onclick="ansChoice='${o}';render()"><span class="formula">${o}</span></button>`).join('')}</div>`}
function hintText(t){if(stage===1)return t.hint;let flip=t.mid.trim().startsWith('−')?' Здесь при делении на отрицательное число знак неравенства меняется.':'';return 'Смотри на коэффициент перед x.'+flip+' Затем выбери направление луча на числовой прямой.'}
function renderStats(){let s=loadStats();$('solved').textContent=s.solved||0;$('correct').textContent=s.correct||0;$('streak').textContent=s.streak||0}
function make(tag,a){let e=document.createElementNS('http://www.w3.org/2000/svg',tag);for(let k in a)e.setAttribute(k,a[k]);return e}function drawBoard(){let t=cur(),svg=$('board');svg.innerHTML='';svg.appendChild(make('rect',{x:0,y:0,width:720,height:520,fill:'#fffdf7'}));svg.appendChild(make('text',{x:360,y:58,'text-anchor':'middle',class:'bigEq'})).textContent=t.e;drawStep(svg,105,'1','Исходное неравенство',t.e,true);drawStep(svg,180,'2','После переноса и упрощения',midChoice||'выберите строку справа',stage>1||midChoice===t.mid);drawStep(svg,255,'3','Ответ',ansChoice||'выберите ответ справа',checked&&ansChoice===t.ans);drawLine(svg,t,390,checked||stage>1);}
function drawStep(svg,y,n,label,text,done){let col=done?'#15803d':'#94a3b8';svg.appendChild(make('circle',{cx:78,cy:y,r:17,fill:col}));let num=make('text',{x:78,y:y+5,'text-anchor':'middle','font-size':14,'font-weight':'900',fill:'#fff'});num.textContent=n;svg.appendChild(num);let lab=make('text',{x:110,y:y-7,'font-size':13,'font-weight':'900',fill:'#64748b'});lab.textContent=label;svg.appendChild(lab);let tx=make('text',{x:110,y:y+20,'font-family':'Georgia,serif','font-size':22,'font-weight':'900',fill:'#111827'});tx.textContent=text;svg.appendChild(tx)}
function drawLine(svg,t,y,show){let l=70,r=650,min=Math.min(-10,t.b-4),max=Math.max(10,t.b+4),xp=v=>l+(v-min)/(max-min)*(r-l),p=xp(t.b);svg.appendChild(make('text',{x:360,y:y-50,'text-anchor':'middle','font-size':15,'font-weight':'900',fill:'#374151'})).textContent='Числовая прямая';svg.appendChild(make('line',{x1:l,y1:y,x2:r,y2:y,stroke:'#475569','stroke-width':3,'stroke-linecap':'round'}));svg.appendChild(make('polygon',{points:`${r},${y} ${r-12},${y-6} ${r-12},${y+6}`,fill:'#475569'}));for(let k=Math.ceil(min);k<=Math.floor(max);k++){let x=xp(k);svg.appendChild(make('line',{x1:x,y1:y-6,x2:x,y2:y+6,stroke:'#94a3b8','stroke-width':1}));if(k%2===0){let lab=make('text',{x:x,y:y+28,'text-anchor':'middle','font-size':10,fill:'#64748b'});lab.textContent=fmt(k);svg.appendChild(lab)}}if(show){let x1=t.dir==='left'?l:p,x2=t.dir==='left'?p:r;svg.appendChild(make('rect',{x:x1,y:y-20,width:x2-x1,height:40,rx:10,fill:'#16a34a',opacity:.42}))}svg.appendChild(make('circle',{cx:p,cy:y,r:8,fill:t.closed?'#111827':'#fff',stroke:'#111827','stroke-width':3}));let bl=make('text',{x:p,y:y+36,'text-anchor':'middle','font-family':'Georgia,serif','font-size':15,'font-weight':'900',fill:'#374151'});bl.textContent=t.lab;svg.appendChild(bl)}
function checkAnswer(){let t=cur();if(stage===1){if(midChoice===t.mid){stage=2;setTimeout(render,50)}else{setMsg('Пока ошибка в переносе или раскрытии скобок. Проверь знаки у слагаемых.','err');paintChoices()}return}let ok=ansChoice===t.ans;checked=true;record(ok);total++;if(ok){okCount++;setMsg('Верно. Ответ выбран правильно.','ok')}else setMsg(diag(t),'err');render()}
function setMsg(txt,cls){let m=$('msg');if(m){m.innerHTML=txt;m.className='msg '+cls}}function diag(t){if(t.mid.trim().startsWith('−'))return 'Проверь последний шаг: если делим на отрицательный коэффициент, знак неравенства меняется.';return 'Проверь направление луча и тип точки: строгий знак — пустая, нестрогий — закрашенная.'}
function paintChoices(){let t=cur();[...document.querySelectorAll('.choice')].forEach(b=>{let txt=b.textContent.trim();if(stage===1&&txt===t.mid)b.classList.add('goodC');else if(stage===1&&txt===midChoice)b.classList.add('badC');if(stage===2&&txt===t.ans)b.classList.add('goodC');else if(stage===2&&txt===ansChoice)b.classList.add('badC')})}
function toggleHint(){hint=!hint;let h=$('hintBox');if(h)h.className='hintBox '+(hint?'on':'')}function showSolution(){let t=cur();midChoice=t.mid;ansChoice=t.ans;stage=2;checked=true;record(false);setMsg('Показано решение. Разберите цепочку слева.','warn');render()}function nextTask(){idx++;if(idx>=tasks.length){screen='menu';render();return}stage=1;midChoice=null;ansChoice=null;checked=false;hint=false;render()}render();
</script>
</body>
</html>
