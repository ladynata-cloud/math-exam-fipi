<!doctype html>
<html lang="ru">
<head>

<title>Неравенства: читаем числовую прямую</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#e8e4db;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:#1f2937;padding:18px}.app{max-width:1080px;margin:auto;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 12px 36px #0002}.head{background:#1a1a2e;color:#fff;padding:16px 20px;display:flex;gap:12px;align-items:center;justify-content:space-between}.title{font-size:20px;font-weight:900}.sub{font-size:12px;opacity:.72;margin-top:2px}.back{color:#cbd5e1;text-decoration:none;font-weight:800;font-size:12px}.back:hover{color:#fff}.main{display:grid;grid-template-columns:minmax(0,1fr) 340px}.boardWrap{background:#faf8f2;padding:14px;border-right:1px solid #e5e2d9}.board{width:100%;height:auto;border:1px solid #d6d3ca;border-radius:14px;background:#fffdf7;display:block}.panel{padding:14px;display:flex;flex-direction:column;gap:10px}.card{border:1.5px solid #e5e7eb;border-radius:12px;padding:12px;background:#f9fafb}.card h2{margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:#64748b}.task{font-size:21px;font-weight:900;font-family:Georgia,serif;text-align:center;color:#111827;line-height:1.35;white-space:pre-line}.small{font-size:12px;color:#64748b;line-height:1.45}.msg{border-radius:12px;padding:12px;font-size:14px;font-weight:750;line-height:1.42}.info{background:#eff6ff;color:#1d4ed8}.ok{background:#f0fdf4;color:#15803d}.err{background:#fef2f2;color:#b91c1c}.warn{background:#fff7ed;color:#c2410c}.bar{display:flex;gap:8px;flex-wrap:wrap;padding:12px 14px;background:#f9fafb;border-top:1px solid #e5e7eb}button{border:1.5px solid #d1d5db;border-radius:9px;background:#fff;color:#374151;padding:8px 13px;font:800 13px system-ui;cursor:pointer}button:hover{background:#f3f4f6}.primary{background:#1a1a2e;color:white;border-color:#1a1a2e}.good{background:#15803d;color:white;border-color:#15803d}.warnBtn{background:#fff7ed;color:#c2410c;border-color:#fdba74}.danger{background:#fee2e2;color:#991b1b;border-color:#fecaca}.modes{display:grid;grid-template-columns:1fr 1fr;gap:8px}.mode{min-height:50px}.mode.on{background:#1a1a2e;color:white;border-color:#1a1a2e}.choices{display:grid;gap:8px}.choice{display:block;width:100%;text-align:left;border-radius:12px;padding:10px 12px;background:#fff;font-weight:850;line-height:1.35}.choice.on{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}.choice.goodC{background:#dcfce7;border-color:#16a34a;color:#166534}.choice.badC{background:#fee2e2;border-color:#dc2626;color:#991b1b}.hintBox{display:none;background:#fff7ed;color:#9a3412;border:1.5px solid #fed7aa;border-radius:12px;padding:12px;font-size:13px;line-height:1.5}.hintBox.on{display:block}.formula{font-family:Georgia,serif;font-weight:900;color:#111827}.statLine{font-size:12px;color:#64748b}.graphGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.miniChoice{padding:8px;border-radius:12px;border:2px solid #e5e7eb;background:#fff;cursor:pointer}.miniChoice:hover{background:#f3f4f6}.miniChoice.on{border-color:#2563eb;background:#eff6ff}.miniChoice.goodC{border-color:#16a34a;background:#f0fdf4}.miniChoice.badC{border-color:#dc2626;background:#fef2f2}.miniChoice svg{width:100%;height:auto;display:block}.miniLabel{font-weight:900;font-size:12px;color:#64748b;margin-bottom:4px}.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.lg{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#64748b}.dot{width:13px;height:13px;border-radius:50%;border:2px solid #111827;background:#fff;display:inline-block}.dot.closed{background:#111827}.sq{width:18px;height:8px;border-radius:99px;background:#16a34a;display:inline-block}.topline{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}.progress{height:7px;background:#e5e7eb;border-radius:99px;overflow:hidden}.progress span{display:block;height:100%;background:#1a1a2e}.menu{max-width:680px;margin:0 auto}.menu h2{text-align:center;font-size:28px;margin:0 0 8px}.menu p{text-align:center;color:#64748b;line-height:1.55}.menuGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}.menuBtn{padding:20px;border-radius:16px;text-align:center;background:#fff;border:2px solid #e5e7eb}.menuBtn:hover{border-color:#1a1a2e;background:#f8fafc}.menuIcon{font-size:30px}.menuName{font-size:18px;font-weight:950;margin-top:5px}.menuDesc{font-size:12px;color:#64748b;margin-top:4px;line-height:1.35}@media(max-width:860px){body{padding:8px}.main{grid-template-columns:1fr}.boardWrap{border-right:0;border-bottom:1px solid #e5e2d9}.head{flex-direction:column;align-items:flex-start}.task{font-size:19px}.modes,.menuGrid{grid-template-columns:1fr}.graphGrid{grid-template-columns:1fr}}
</style>

<body>
<div class="app">
  <div class="head"><div><div class="title">📏 Неравенства: читаем числовую прямую</div><div class="sub">лучи, промежутки, пустые и закрашенные точки</div></div><a class="back" href="../index.html">← к списку тренажёров</a></div>
  <div id="app"></div>
</div>
<script>
const KEY='mathExamCourseProgress.v1', TOPIC='inequalitiesNumberLineReader';
const MODES=[['read','По рисунку → запись'],['ineq','По рисунку → неравенство'],['drawByInterval','По записи → рисунок'],['drawByIneq','По неравенству → рисунок']];
const D={
read:[
{g:{kind:'single',a:3,label:'3',dir:'right',closed:false},ans:'(3; +∞)',opts:['(3; +∞)','[3; +∞)','(−∞; 3)','(−∞; 3]'],hint:'Пустая точка в 3, луч вправо: числа больше 3, но 3 не входит.'},
{g:{kind:'single',a:-2,label:'−2',dir:'right',closed:true},ans:'[−2; +∞)',opts:['(−∞; −2]','(−2; +∞)','[−2; +∞)','[−2; 2]'],hint:'Закрашенная точка входит в ответ. Луч вправо означает больше.'},
{g:{kind:'single',a:5,label:'5',dir:'left',closed:false},ans:'(−∞; 5)',opts:['(5; +∞)','(−∞; 5)','(−∞; 5]','[5; +∞)'],hint:'Луч влево: числа меньше 5. Пустая точка: 5 не входит.'},
{g:{kind:'two',a:-3,b:6,la:'−3',lb:'6',zones:[false,true,false],closedA:false,closedB:false},ans:'(−3; 6)',opts:['(−3; 6)','[−3; 6]','(−∞; −3) ∪ (6; +∞)','(−∞; 6)'],hint:'Заштриховано между двумя точками. Обе точки пустые.'},
{g:{kind:'two',a:-1,b:4,la:'−1',lb:'4',zones:[false,true,false],closedA:true,closedB:true},ans:'[−1; 4]',opts:['(−1; 4)','[−1; 4]','(−∞; −1] ∪ [4; +∞)','[4; +∞)'],hint:'Между точками, обе закрашены: закрытый промежуток.'},
{g:{kind:'two',a:-2,b:7,la:'−2',lb:'7',zones:[true,false,true],closedA:false,closedB:false},ans:'(−∞; −2) ∪ (7; +∞)',opts:['(−2; 7)','[−2; 7]','(−∞; −2) ∪ (7; +∞)','(−∞; −2] ∪ [7; +∞)'],hint:'Заштрихованы две внешние области: это объединение двух лучей.'},
{g:{kind:'two',a:0,b:5,la:'0',lb:'5',zones:[true,false,true],closedA:true,closedB:true},ans:'(−∞; 0] ∪ [5; +∞)',opts:['[0; 5]','(0; 5)','(−∞; 0] ∪ [5; +∞)','(−∞; 0) ∪ (5; +∞)'],hint:'Два внешних луча, точки закрашены: границы входят.'}
],
ineq:[
{g:{kind:'single',a:4,label:'4',dir:'right',closed:false},ans:'x > 4',opts:['x > 4','x ≥ 4','x < 4','x ≤ 4'],hint:'Луч вправо — больше. Пустая точка — строгий знак.'},
{g:{kind:'single',a:-3,label:'−3',dir:'left',closed:true},ans:'x ≤ −3',opts:['x < −3','x ≤ −3','x ≥ −3','x > −3'],hint:'Луч влево — меньше. Закрашенная точка — с равенством.'},
{g:{kind:'two',a:-5,b:2,la:'−5',lb:'2',zones:[false,true,false],closedA:false,closedB:true},ans:'−5 < x ≤ 2',opts:['−5 < x ≤ 2','−5 ≤ x < 2','x < −5 или x ≥ 2','x > −5 или x ≤ 2'],hint:'Один промежуток между точками: x больше левой границы и меньше правой.'},
{g:{kind:'two',a:-6,b:6,la:'−6',lb:'6',zones:[true,false,true],closedA:false,closedB:false},ans:'x < −6 или x > 6',opts:['−6 < x < 6','−6 ≤ x ≤ 6','x < −6 или x > 6','x ≤ −6 или x ≥ 6'],hint:'Две внешние области: меньше левой границы или больше правой.'},
{g:{kind:'two',a:-4,b:3,la:'−4',lb:'3',zones:[true,false,true],closedA:true,closedB:false},ans:'x ≤ −4 или x > 3',opts:['x < −4 или x ≥ 3','x ≤ −4 или x > 3','−4 ≤ x < 3','−4 < x ≤ 3'],hint:'Слева точка закрашена, справа пустая.'}
],
drawByInterval:[
{text:'[−2; +∞)',ans:0,gs:[{kind:'single',a:-2,label:'−2',dir:'right',closed:true},{kind:'single',a:-2,label:'−2',dir:'right',closed:false},{kind:'single',a:-2,label:'−2',dir:'left',closed:true},{kind:'two',a:-2,b:2,la:'−2',lb:'2',zones:[false,true,false],closedA:true,closedB:true}],hint:'Квадратная скобка у −2 означает закрашенную точку. +∞ — луч вправо.'},
{text:'(−∞; 5)',ans:1,gs:[{kind:'single',a:5,label:'5',dir:'right',closed:false},{kind:'single',a:5,label:'5',dir:'left',closed:false},{kind:'single',a:5,label:'5',dir:'left',closed:true},{kind:'two',a:-5,b:5,la:'−5',lb:'5',zones:[false,true,false],closedA:false,closedB:false}],hint:'От −∞ до 5 — луч влево. Круглая скобка у 5 — пустая точка.'},
{text:'(−3; 7)',ans:2,gs:[{kind:'two',a:-3,b:7,la:'−3',lb:'7',zones:[true,false,true],closedA:false,closedB:false},{kind:'two',a:-3,b:7,la:'−3',lb:'7',zones:[false,true,false],closedA:true,closedB:true},{kind:'two',a:-3,b:7,la:'−3',lb:'7',zones:[false,true,false],closedA:false,closedB:false},{kind:'single',a:-3,label:'−3',dir:'right',closed:false}],hint:'Один промежуток между −3 и 7, обе точки пустые.'},
{text:'(−∞; −1] ∪ [4; +∞)',ans:3,gs:[{kind:'two',a:-1,b:4,la:'−1',lb:'4',zones:[false,true,false],closedA:true,closedB:true},{kind:'two',a:-1,b:4,la:'−1',lb:'4',zones:[true,false,true],closedA:false,closedB:false},{kind:'single',a:4,label:'4',dir:'right',closed:true},{kind:'two',a:-1,b:4,la:'−1',lb:'4',zones:[true,false,true],closedA:true,closedB:true}],hint:'Символ ∪ означает объединение двух внешних лучей. Квадратные скобки — точки входят.'}
],
drawByIneq:[
{text:'x < 2',ans:1,gs:[{kind:'single',a:2,label:'2',dir:'right',closed:false},{kind:'single',a:2,label:'2',dir:'left',closed:false},{kind:'single',a:2,label:'2',dir:'left',closed:true},{kind:'single',a:2,label:'2',dir:'right',closed:true}],hint:'Знак < — меньше, значит луч влево. Строгий знак — пустая точка.'},
{text:'x ≥ −4',ans:0,gs:[{kind:'single',a:-4,label:'−4',dir:'right',closed:true},{kind:'single',a:-4,label:'−4',dir:'right',closed:false},{kind:'single',a:-4,label:'−4',dir:'left',closed:true},{kind:'single',a:-4,label:'−4',dir:'left',closed:false}],hint:'Больше или равно — вправо и точка закрашена.'},
{text:'−2 < x < 6',ans:2,gs:[{kind:'two',a:-2,b:6,la:'−2',lb:'6',zones:[true,false,true],closedA:false,closedB:false},{kind:'two',a:-2,b:6,la:'−2',lb:'6',zones:[false,true,false],closedA:true,closedB:true},{kind:'two',a:-2,b:6,la:'−2',lb:'6',zones:[false,true,false],closedA:false,closedB:false},{kind:'single',a:-2,label:'−2',dir:'right',closed:false}],hint:'Двойное неравенство задаёт промежуток между двумя числами.'},
{text:'x ≤ 0 или x ≥ 5',ans:3,gs:[{kind:'two',a:0,b:5,la:'0',lb:'5',zones:[false,true,false],closedA:true,closedB:true},{kind:'two',a:0,b:5,la:'0',lb:'5',zones:[true,false,true],closedA:false,closedB:false},{kind:'single',a:0,label:'0',dir:'left',closed:true},{kind:'two',a:0,b:5,la:'0',lb:'5',zones:[true,false,true],closedA:true,closedB:true}],hint:'Слово “или” здесь даёт объединение двух лучей.'}
]
};
let mode='read', screen='menu', tasks=[], idx=0, chosen=null, checked=false, hint=false, sessionOk=0, sessionTotal=0;
const $=id=>document.getElementById(id);
function loadStats(){try{let d=JSON.parse(localStorage.getItem(KEY)||'{}');return d[TOPIC]||{solved:0,correct:0,streak:0,bestStreak:0,history:[]}}catch{return{solved:0,correct:0,streak:0,bestStreak:0,history:[]}}}
function saveStats(s){let d={};try{d=JSON.parse(localStorage.getItem(KEY)||'{}')}catch{}d[TOPIC]=s;localStorage.setItem(KEY,JSON.stringify(d))}
function record(ok){let s=loadStats();s.solved++;if(ok){s.correct++;s.streak++;s.bestStreak=Math.max(s.bestStreak||0,s.streak)}else{s.streak=0}s.history=[ok?1:0,...(s.history||[])].slice(0,10);saveStats(s)}
function resetStats(){if(confirm('Сбросить статистику?')){let d=JSON.parse(localStorage.getItem(KEY)||'{}');d[TOPIC]={solved:0,correct:0,streak:0,bestStreak:0,history:[]};localStorage.setItem(KEY,JSON.stringify(d));render()}}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function start(kind){screen='task';mode=kind||mode;let base=[...D[mode]];tasks=shuffle(base).slice(0,mode==='read'||mode==='ineq'?6:4);idx=0;chosen=null;checked=false;hint=false;sessionOk=0;sessionTotal=0;render()}
function current(){return tasks[idx]}
function render(){let root=$('app');if(screen==='menu'){root.innerHTML=menuHTML();return}root.innerHTML=taskHTML();drawMain();renderStats();}
function menuHTML(){let s=loadStats(),pct=s.solved?Math.round(100*s.correct/s.solved):0;return `<div style="padding:28px"><div class="menu"><h2>Неравенства на числовой прямой</h2><p>Тренажёр учит читать рисунок: где луч, где промежуток, входит ли граница, как записать ответ.</p><div class="menuGrid">${MODES.map(([m,n],i)=>`<button class="menuBtn" onclick="start('${m}')"><div class="menuIcon">${['📍','🔎','🧩','✍️'][i]}</div><div class="menuName">${n}</div><div class="menuDesc">${['прочитать промежуток','выбрать неравенство','найти рисунок по промежутку','найти рисунок по неравенству'][i]}</div></button>`).join('')}</div>${s.solved?`<div class="card" style="margin-top:18px;text-align:center"><b>Статистика:</b> решено ${s.solved}, верно ${s.correct}, точность ${pct}%, серия ${s.streak}<br><button class="danger" style="margin-top:10px" onclick="resetStats()">Сбросить статистику</button></div>`:''}</div></div>`}
function taskHTML(){let t=current(),pct=Math.round(idx/tasks.length*100);let title=mode==='read'?'Как записать решение?':mode==='ineq'?'Какое неравенство изображено?':mode==='drawByInterval'?'Выбери рисунок по промежутку':'Выбери рисунок по неравенству';let prompt=(mode==='drawByInterval'||mode==='drawByIneq')?t.text:title;return `<div class="main"><div class="boardWrap"><div class="topline"><span class="small"><b>${idx+1}</b> / ${tasks.length}</span><span class="small">${MODES.find(x=>x[0]===mode)[1]}</span></div><div class="progress"><span style="width:${pct}%"></span></div><svg id="board" class="board" viewBox="0 0 720 430" xmlns="http://www.w3.org/2000/svg"></svg>${mode==='drawByInterval'||mode==='drawByIneq'?'<div id="miniArea" class="graphGrid" style="margin-top:12px"></div>':''}</div><aside class="panel"><div class="card"><h2>Режим</h2><div class="modes">${MODES.map(([m,n])=>`<button class="mode ${m===mode?'on':''}" onclick="mode='${m}';start('${m}')">${n}</button>`).join('')}</div></div><div class="card"><h2>Задание</h2><div class="task">${prompt}</div><p class="small">${mode==='read'||mode==='ineq'?'Смотри на направление штриховки и тип точки.':'Сравни направление луча, пустые и закрашенные точки.'}</p></div><div class="card"><h2>Варианты</h2><div id="choices" class="choices"></div></div><div id="msg" class="msg info">Выберите ответ и нажмите «Проверить».</div><div id="hintBox" class="hintBox ${hint?'on':''}">${t.hint}</div><div class="card"><h2>Статистика</h2><p class="statLine">Решено: <b id="solved">0</b> · верно: <b id="correct">0</b> · серия: <b id="streak">0</b></p><button class="danger" onclick="resetStats()">Сбросить статистику</button></div></aside></div><div class="bar"><button class="primary" onclick="checkAnswer()">Проверить</button><button class="warnBtn" onclick="toggleHint()">Подсказка</button><button onclick="showSolution()">Показать решение</button><button class="good" onclick="nextTask()">Следующее задание</button><button onclick="screen='menu';render()">В меню</button></div>`}
function renderStats(){let s=loadStats();$('solved').textContent=s.solved||0;$('correct').textContent=s.correct||0;$('streak').textContent=s.streak||0}
function svgGraph(g,w=680,h=190,mini=false){let l=50,r=w-50,y=Math.round(h/2),min=-10,max=10;if(g.kind==='single'){min=Math.min(-10,g.a-3);max=Math.max(10,g.a+3)}else{min=Math.min(-10,g.a-3);max=Math.max(10,g.b+3)}let xp=v=>l+(v-min)/(max-min)*(r-l);let out=`<rect x="0" y="0" width="${w}" height="${h}" rx="12" fill="#fffdf7"/><line x1="${l}" y1="${y}" x2="${r}" y2="${y}" stroke="#475569" stroke-width="3" stroke-linecap="round"/><polygon points="${r},${y} ${r-12},${y-6} ${r-12},${y+6}" fill="#475569"/>`;for(let k=Math.ceil(min);k<=Math.floor(max);k++){let p=xp(k);out+=`<line x1="${p}" y1="${y-6}" x2="${p}" y2="${y+6}" stroke="#94a3b8" stroke-width="1"/>`;if(!mini&&(k%2===0||k===0)){out+=`<text x="${p}" y="${y+28}" text-anchor="middle" font-size="11" fill="#64748b">${fmt(k)}</text>`}}function shade(x1,x2){out+=`<rect x="${x1}" y="${y-18}" width="${x2-x1}" height="36" rx="10" fill="#16a34a" opacity=".48"/>`}if(g.kind==='single'){let p=xp(g.a);if(g.dir==='right')shade(p,r);else shade(l,p);out+=point(p,y,g.closed);out+=label(p,y+34,g.label)}else{let p1=xp(g.a),p2=xp(g.b);if(g.zones[0])shade(l,p1);if(g.zones[1])shade(p1,p2);if(g.zones[2])shade(p2,r);out+=point(p1,y,g.closedA)+point(p2,y,g.closedB)+label(p1,y+34,g.la)+label(p2,y+34,g.lb)}return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${out}</svg>`}
function fmt(n){return String(n).replace('-', '−')}function point(x,y,closed){return `<circle cx="${x}" cy="${y}" r="8" fill="${closed?'#111827':'#fff'}" stroke="#111827" stroke-width="3"/>`}function label(x,y,t){return `<text x="${x}" y="${y}" text-anchor="middle" font-family="Georgia,serif" font-size="15" font-weight="900" fill="#374151">${t}</text>`}
function drawMain(){let t=current();let board=$('board');if(mode==='read'||mode==='ineq'){board.outerHTML=svgGraph(t.g,720,430).replace('<svg','<svg id="board" class="board"');renderChoicesText(t.options)}else{board.innerHTML=`<rect x="0" y="0" width="720" height="430" fill="#fffdf7"/><text x="360" y="72" text-anchor="middle" font-size="24" font-weight="900" fill="#1a1a2e">${mode==='drawByInterval'?'Промежуток':'Неравенство'}</text><text x="360" y="145" text-anchor="middle" font-family="Georgia,serif" font-size="34" font-weight="900" fill="#111827">${t.text}</text><text x="360" y="220" text-anchor="middle" font-size="16" fill="#64748b">Выберите подходящий рисунок ниже</text><text x="360" y="270" text-anchor="middle" font-size="14" fill="#64748b">Проверьте направление штриховки и тип граничных точек</text>`;renderMiniGraphs(t)}if(checked)paintAfterCheck()}
function renderChoicesText(opts){let box=$('choices');box.innerHTML='';opts.forEach((o,i)=>{let b=document.createElement('button');b.className='choice '+(chosen===o?'on':'');b.innerHTML=(i+1)+') <span class="formula">'+o+'</span>';b.onclick=()=>{if(!checked){chosen=o;render()}};box.appendChild(b)})}
function renderMiniGraphs(t){$('choices').innerHTML='<p class="small">Выберите один из рисунков слева внизу.</p>';let area=$('miniArea');area.innerHTML='';t.gs.forEach((g,i)=>{let d=document.createElement('div');d.className='miniChoice '+(chosen===i?'on':'');d.onclick=()=>{if(!checked){chosen=i;render()}};d.innerHTML=`<div class="miniLabel">${i+1})</div>${svgGraph(g,320,130,true)}`;area.appendChild(d)})}
function checkAnswer(){let t=current();let ok=(mode==='read'||mode==='ineq')?chosen===t.ans:chosen===t.ans;checked=true;record(ok);if(ok){sessionOk++;sessionTotal++;setMsg('Верно. Отлично читаешь числовую прямую.','ok')}else{sessionTotal++;setMsg(diagnostic(t),'err')}paintAfterCheck()}
function setMsg(txt,cls){let m=$('msg');m.innerHTML=txt;m.className='msg '+cls}
function diagnostic(t){if(mode==='read')return 'Пока ошибка. Проверь: луч вправо — больше, луч влево — меньше; пустая точка не входит, закрашенная входит.';if(mode==='ineq')return 'Пока ошибка. Сначала определи направление штриховки, затем посмотри на точку: пустая — строгий знак, закрашенная — нестрогий.';return 'Пока ошибка. Сравни свой рисунок с записью: где должна быть штриховка и входят ли границы.'}
function paintAfterCheck(){let t=current();if(mode==='read'||mode==='ineq'){[...document.querySelectorAll('.choice')].forEach(b=>{let txt=b.textContent.replace(/^\d+\)\s*/,'').trim();if(txt===t.ans)b.classList.add('goodC');else if(txt===chosen)b.classList.add('badC')})}else{[...document.querySelectorAll('.miniChoice')].forEach((d,i)=>{if(i===t.ans)d.classList.add('goodC');else if(i===chosen)d.classList.add('badC')})}}
function showSolution(){let t=current();checked=true;if(mode==='read'||mode==='ineq')chosen=t.ans;else chosen=t.ans;setMsg('Показано решение. Разбери, почему именно так.','warn');render()}
function toggleHint(){hint=!hint;let h=$('hintBox');if(h)h.className='hintBox '+(hint?'on':'')}
function nextTask(){idx++;if(idx>=tasks.length){screen='menu';render();return}chosen=null;checked=false;hint=false;render()}
render();
</script>
</body>
</html>
