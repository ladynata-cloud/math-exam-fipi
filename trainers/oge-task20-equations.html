<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Задание 20 ОГЭ — тренажёр</title>
<style>
:root{
  --bg:#eef1f7; --grid:#e3e8f2; --paper:#ffffff;
  --ink:#222b3d; --ink2:#5a6683; --line:#d8deec; --line2:#c6cee0;
  --primary:#3b57d6; --primary-d:#2c43ab; --primary-l:#eaeffc;
  --active:#3b6ef5; --active-bg:#eef4ff;
  --ok:#2b8a3e; --ok-bg:#eafaef; --ok-line:#b7e4c2;
  --amber:#b5730b; --amber-bg:#fff6e6; --amber-line:#f2d9a6;
  --err:#c0392b; --err-bg:#fdeeec; --err-line:#f2c4bd;
  --teal:#0b7285; --teal-bg:#e4f6f9;
  --shadow:0 1px 2px rgba(30,40,70,.05),0 6px 22px rgba(30,40,70,.07);
  --serif:Georgia,"Times New Roman",serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  font-family:var(--sans); color:var(--ink); background:var(--bg);
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:26px 26px; line-height:1.5; -webkit-text-size-adjust:100%;
}
.wrap{max-width:920px;margin:0 auto;padding:18px 16px 80px}
a{color:var(--primary);text-decoration:none}

/* ---- header ---- */
header{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:6px 2px 16px}
.brand{display:flex;flex-direction:column;gap:2px}
.brand .kick{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink2);font-weight:700}
.brand h1{font-family:var(--serif);font-weight:700;font-size:29px;margin:0;line-height:1.05;letter-spacing:-.01em}
.brand h1 b{color:var(--primary)}
.brand .site{font-size:12.5px;color:var(--ink2)}
.hbadge{font-size:12px;color:var(--ink2);border:1px solid var(--line2);background:var(--paper);border-radius:999px;padding:5px 11px;white-space:nowrap}

/* ---- module picker ---- */
.picker{display:grid;grid-template-columns:repeat(auto-fill,minmax(196px,1fr));gap:10px;margin-bottom:14px}
.mcard{position:relative;text-align:left;background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:12px 13px 12px 14px;cursor:pointer;box-shadow:var(--shadow);transition:transform .08s,border-color .12s,box-shadow .12s;overflow:hidden}
.mcard:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--mc,#8aa0e6)}
.mcard:hover{transform:translateY(-1px);border-color:var(--line2)}
.mcard.on{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-l),var(--shadow)}
.mcard .mnum{font-family:var(--serif);font-size:12px;color:var(--ink2);font-weight:700}
.mcard .mttl{font-weight:700;font-size:15px;margin:2px 0 3px;letter-spacing:-.01em}
.mcard .msub{font-size:12px;color:var(--ink2);line-height:1.35}
.mcard .mform{margin-top:7px;font-family:var(--serif);font-size:13px;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:4px 7px;display:inline-block}

/* ---- mode tabs ---- */
.stage{background:var(--paper);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
.stagehead{padding:15px 18px 0;border-bottom:1px solid var(--line)}
.stagehead .st-t{font-family:var(--serif);font-size:20px;font-weight:700;letter-spacing:-.01em}
.stagehead .st-s{font-size:13px;color:var(--ink2);margin:2px 0 12px}
.tabs{display:flex;gap:4px}
.tab{appearance:none;border:1px solid var(--line);border-bottom:none;background:var(--bg);color:var(--ink2);font-family:var(--sans);font-size:13.5px;font-weight:600;padding:9px 15px;border-radius:10px 10px 0 0;cursor:pointer;position:relative;top:1px}
.tab .tnum{font-family:var(--serif);opacity:.7;margin-right:6px}
.tab.on{background:var(--paper);color:var(--ink);border-color:var(--line)}
.tab.on:after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--paper)}
.body{padding:18px}

/* ---- teaching cards ---- */
.tcard{border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:12px;background:linear-gradient(180deg,#fcfdff,#fafbff)}
.tcard .tc-h{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.tc-h .tc-n{flex:none;width:24px;height:24px;border-radius:7px;background:var(--primary);color:#fff;font-family:var(--serif);font-weight:700;font-size:13px;display:grid;place-items:center}
.tc-h .tc-t{font-weight:700;font-size:15px}
.tcard p{margin:6px 0}
.muted{color:var(--ink2)}
.xref{font-size:12.5px;color:var(--primary);cursor:pointer;border-bottom:1px dashed var(--primary);display:inline-block}
.callout{border-left:3px solid var(--teal);background:var(--teal-bg);padding:8px 12px;border-radius:0 8px 8px 0;margin:8px 0;font-size:13.5px}
.pill{display:inline-block;font-size:11.5px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--primary-l);color:var(--primary-d);vertical-align:middle}

/* ---- math typography ---- */
.mathline{font-family:var(--serif);font-size:19px;line-height:1.9;color:var(--ink)}
.mathbig{font-family:var(--serif);font-size:22px}
.frac{display:inline-flex;flex-direction:column;text-align:center;vertical-align:middle;margin:0 .18em;position:relative;top:-.06em}
.frac .fnum{padding:0 .4em;line-height:1.15}
.frac .fden{padding:0 .4em;line-height:1.15;border-top:1.6px solid currentColor}
.rad{display:inline-flex;align-items:stretch;vertical-align:middle;margin:0 .06em}
.rad .radsvg{width:.62em;min-width:9px;align-self:stretch;height:auto;overflow:visible;margin-right:-1px}
.rad .radsvg path{fill:none;stroke:currentColor;stroke-width:1.35}
.rad .radb{border-top:1.6px solid currentColor;padding:.05em .28em 0 .18em}
.sys{display:inline-flex;align-items:stretch;vertical-align:middle}
.sys .sb{font-size:1em;display:flex;align-items:center;margin-right:.15em}
.sys .sb svg{height:100%;width:.5em}
.sys .sb svg path{fill:none;stroke:currentColor;stroke-width:1.3}
.sys .slines{display:flex;flex-direction:column;gap:.28em;justify-content:center}
sup{font-size:.72em}

/* ---- inputs / widgets ---- */
.qbox{border:1px solid var(--line);border-radius:12px;padding:14px 15px;background:var(--paper)}
.qhead{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink2);margin-bottom:7px}
.prompt{font-size:15px;margin:2px 0 12px}
.numin{font-family:var(--serif);font-size:18px;width:92px;padding:7px 9px;border:1.5px solid var(--line2);border-radius:9px;text-align:center;background:#fff;color:var(--ink)}
.numin:focus{outline:none;border-color:var(--active);box-shadow:0 0 0 3px var(--active-bg)}
.field{display:inline-flex;align-items:center;gap:6px;vertical-align:middle}
.fftoggle{appearance:none;border:1px solid var(--line2);background:var(--bg);color:var(--ink2);font-size:11px;font-weight:700;border-radius:7px;padding:5px 7px;cursor:pointer;line-height:1}
.fftoggle:hover{border-color:var(--primary);color:var(--primary)}
.fracin{display:inline-flex;flex-direction:column;align-items:stretch;width:70px}
.fracin input{font-family:var(--serif);font-size:16px;text-align:center;border:1.5px solid var(--line2);border-radius:8px;padding:4px;background:#fff;color:var(--ink);width:100%}
.fracin input:focus{outline:none;border-color:var(--active);box-shadow:0 0 0 3px var(--active-bg)}
.fracin .fbar{height:0;border-top:2px solid var(--ink);margin:3px 2px}
.rowset{display:flex;flex-direction:column;gap:9px;margin:2px 0 6px}
.rootrow,.pointrow{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.rootrow .rlab,.pointrow .rlab{font-family:var(--serif);font-size:16px;color:var(--ink2);min-width:26px}
.rmini{appearance:none;border:1px solid var(--line2);background:var(--bg);color:var(--ink2);width:28px;height:28px;border-radius:8px;font-size:16px;line-height:1;cursor:pointer}
.rmini:hover{border-color:var(--err);color:var(--err)}
.addbtn{appearance:none;border:1px dashed var(--line2);background:#fff;color:var(--primary);font-family:var(--sans);font-size:13px;font-weight:600;padding:6px 11px;border-radius:9px;cursor:pointer;align-self:flex-start}
.addbtn:hover{border-color:var(--primary);background:var(--primary-l)}
.ivfields{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.ivfields .num2{width:64px}
.ivpreview{font-family:var(--serif);font-size:18px;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:6px 12px;display:inline-block;margin-top:4px}

/* ---- buttons ---- */
.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:center}
.btn{appearance:none;border:none;font-family:var(--sans);font-size:14px;font-weight:650;padding:9px 16px;border-radius:10px;cursor:pointer;transition:filter .1s,background .1s}
.btn.primary{background:var(--primary);color:#fff}
.btn.primary:hover{filter:brightness(1.06)}
.btn.ghost{background:var(--bg);color:var(--ink);border:1px solid var(--line2)}
.btn.ghost:hover{border-color:var(--primary);color:var(--primary)}
.btn.amberbtn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-line)}
.btn.amberbtn:hover{filter:brightness(.98)}
.btn.next{background:var(--ok);color:#fff}
.btn.next:hover{filter:brightness(1.05)}
.btn:disabled{opacity:.5;cursor:default;filter:none}
.morebtn{margin-top:11px}

/* ---- feedback ---- */
.fb{margin-top:11px;border-radius:10px;padding:10px 13px;font-size:14px;display:none}
.fb.show{display:block}
.fb.ok{background:var(--ok-bg);border:1px solid var(--ok-line);color:var(--ok)}
.fb.no{background:var(--err-bg);border:1px solid var(--err-line);color:var(--err)}
.fb.peek{background:var(--amber-bg);border:1px solid var(--amber-line);color:var(--amber)}
.fb b{font-weight:700}
.solution{margin-top:12px;border:1px solid var(--amber-line);background:var(--amber-bg);border-radius:11px;padding:12px 15px}
.solution .sol-h{font-weight:700;color:var(--amber);font-size:13px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.solution .step{margin:5px 0;font-size:14px}
.ans-chip{display:inline-block;font-family:var(--serif);font-size:18px;background:#fff;border:1.5px solid var(--ok-line);color:var(--ink);border-radius:9px;padding:3px 12px;margin:2px 4px 2px 0}

/* ---- stepper ---- */
.steps{display:flex;flex-direction:column;gap:11px;margin-top:6px}
.sstep{border:1px solid var(--line);border-radius:11px;padding:12px 14px;background:#fff;position:relative;opacity:.55;transition:opacity .15s}
.sstep.active{opacity:1;border-color:var(--active);box-shadow:0 0 0 3px var(--active-bg)}
.sstep.done{opacity:1;border-color:var(--ok-line);background:var(--ok-bg)}
.sstep.peeked{opacity:1;border-color:var(--amber-line);background:var(--amber-bg)}
.sstep .snum{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.sstep .snum .dot{width:20px;height:20px;border-radius:6px;background:var(--line);color:var(--ink2);display:grid;place-items:center;font-family:var(--serif);font-size:12px}
.sstep.active .snum .dot{background:var(--active);color:#fff}
.sstep.done .snum .dot{background:var(--ok);color:#fff}
.sstep.peeked .snum .dot{background:var(--amber);color:#fff}
.yourturn{font-size:11px;font-weight:700;color:var(--active);background:var(--active-bg);border:1px solid #cddcff;border-radius:999px;padding:1px 8px;margin-left:auto;text-transform:none;letter-spacing:0}
.sstep .sq{font-size:14.5px;margin:3px 0 9px}
.stepfinal{margin-top:6px;border:1px solid var(--ok-line);background:var(--ok-bg);border-radius:11px;padding:13px 15px}
.stepfinal .sf-h{font-weight:700;color:var(--ok);text-transform:uppercase;font-size:12px;letter-spacing:.05em;margin-bottom:5px}

/* ---- marathon header ---- */
.mtop{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:12px}
.stat{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink2);background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:5px 12px}
.stat b{font-family:var(--serif);font-size:16px;color:var(--ink)}
.stat.streak b{color:var(--amber)}
.stat.solved b{color:var(--ok)}
.spacer{flex:1}
.probno{font-family:var(--serif);font-size:13px;color:var(--ink2)}

/* number line */
.nline{margin-top:12px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:6px 8px 2px}
.nline svg{display:block;width:100%;height:auto}

@media (max-width:560px){
  .brand h1{font-size:24px}
  .body{padding:14px}
  .mathline{font-size:17px}
  .numin{width:82px;font-size:17px}
  .tab{padding:8px 11px;font-size:12.5px}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="kick">ОГЭ · математика</div>
      <h1>Задание <b>20</b> — тренажёр</h1>
      <div class="site">Алгебраические выражения, уравнения и неравенства · mathexam.space</div>
    </div>
    <div class="hbadge">Часть 2 · развёрнутое решение</div>
  </header>

  <div class="picker" id="picker"></div>

  <section class="stage">
    <div class="stagehead">
      <div class="st-t" id="stageTitle"></div>
      <div class="st-s" id="stageSub"></div>
      <div class="tabs" id="tabs"></div>
    </div>
    <div class="body" id="body"></div>
  </section>
</div>

<script id="core-math">/* ============================================================================
   M20 — ядро математики тренажёра «Задание 20 ОГЭ».
   Полностью независимо от DOM. Точная арифметика через BigInt (класс Fr).
   Каждый генератор возвращает ДАННЫЕ задачи (без разметки); проверка ответов
   тоже здесь — чтобы всё это тестировалось в Node/jsdom.
   ============================================================================ */
(function (root) {
  'use strict';

  /* ---------- BigInt-дробь ---------- */
  function bgcd(a, b) { a = a < 0n ? -a : a; b = b < 0n ? -b : b; while (b) { [a, b] = [b, a % b]; } return a; }
  function Fr(n, d) {
    if (!(this instanceof Fr)) return new Fr(n, d);
    if (d === undefined) d = 1n;
    n = BigInt(n); d = BigInt(d);
    if (d === 0n) throw new Error('деление на ноль в Fr');
    if (d < 0n) { n = -n; d = -d; }
    var g = bgcd(n, d) || 1n;
    this.n = n / g; this.d = d / g;
  }
  Fr.prototype.add = function (o) { return new Fr(this.n * o.d + o.n * this.d, this.d * o.d); };
  Fr.prototype.sub = function (o) { return new Fr(this.n * o.d - o.n * this.d, this.d * o.d); };
  Fr.prototype.mul = function (o) { return new Fr(this.n * o.n, this.d * o.d); };
  Fr.prototype.div = function (o) { return new Fr(this.n * o.d, this.d * o.n); };
  Fr.prototype.eq = function (o) { return this.n === o.n && this.d === o.d; };
  Fr.prototype.lt = function (o) { return this.n * o.d < o.n * this.d; };
  Fr.prototype.isInt = function () { return this.d === 1n; };
  Fr.prototype.neg = function () { return new Fr(-this.n, this.d); };
  Fr.prototype.sign = function () { return this.n > 0n ? 1 : (this.n < 0n ? -1 : 0); };
  Fr.prototype.toNumber = function () { return Number(this.n) / Number(this.d); };
  Fr.fromInt = function (i) { return new Fr(BigInt(i), 1n); };

  /* ---------- утилиты ---------- */
  function isqrtExact(nBig) { // BigInt -> BigInt|null (точный корень)
    if (nBig < 0n) return null;
    if (nBig < 2n) return nBig;
    var x = nBig, y = (x + 1n) / 2n;
    while (y < x) { x = y; y = (x + nBig / x) / 2n; }
    return x * x === nBig ? x : null;
  }
  function ri(lo, hi) { return lo + Math.floor(Math.random() * (hi - lo + 1)); }
  function choice(a) { return a[Math.floor(Math.random() * a.length)]; }
  function rangeExcl(lo, hi, excl) { var r = []; for (var i = lo; i <= hi; i++) if (excl.indexOf(i) < 0) r.push(i); return r; }

  /* ============================ ГЕНЕРАТОРЫ ============================ */

  // Тип A: значение выражения
  // условие: (p a + q b + r)/((-q) a + (-p) b + r) = k ; цель: A a + B b + C
  function genA() {
    for (;;) {
      var p = ri(1, 9), q = -ri(1, 9), r = ri(2, 9), k = ri(2, 9);
      if (Math.abs(q) === p) continue;
      var ans = ri(-9, 12);
      var C = ans - r * (1 - k);            // = ans + r*(k-1)
      var A = k * (-q) - p, B = k * (-p) - q;
      if (A <= 0 || C <= 0) continue;
      return { type: 'A', p: p, q: q, r: r, k: k, C: C, A: A, B: B, ans: ans };
    }
  }

  // Тип B1: кубическое, группировка. x³+a x² + b x + c = 0, b=-m², c=a·b
  function genB1() {
    for (;;) {
      var a = choice(rangeExcl(-6, 6, [0]));
      var m = ri(1, 5);
      var b = -m * m, c = a * b;
      var set = {}; [-a, m, -m].forEach(function (x) { set[x] = 1; });
      var roots = Object.keys(set).map(Number).sort(function (u, v) { return u - v; });
      if (roots.length >= 2) return { type: 'B1', a: a, m: m, b: b, c: c, roots: roots };
    }
  }

  // Тип B2: уравнение с корнем. x² - c x + √(K - x) = √(K - x) + n
  function genB2() {
    for (;;) {
      var r1 = -ri(1, 7), r2 = ri(2, 9);
      if (r1 * r2 >= 0) continue;
      var c = r1 + r2, n = -(r1 * r2);
      if (n <= 0) continue;
      var lo = Math.max(r1, 0);
      if (lo > r2 - 1) continue;
      var K = ri(lo, r2 - 1);
      // проверяем: r1<=K<r2
      if (!(r1 <= K && K < r2)) continue;
      return { type: 'B2', r1: r1, r2: r2, K: K, c: c, n: n, kept: [r1] };
    }
  }

  // Тип B3: (x - a)(x² + 2m x + m²) = k(x + m)
  function genB3() {
    for (;;) {
      var m = ri(1, 5);
      var r = choice(rangeExcl(-7, 5, [0, -m]));
      var s = choice(rangeExcl(-7, 5, [0, -m, r]));
      var a = m + r + s, k = -(r * s + m * a);
      if (a < 1 || a > 5 || k < 2 || k > 12) continue;
      var set = {}; [-m, r, s].forEach(function (x) { set[x] = 1; });
      var roots = Object.keys(set).map(Number).sort(function (u, v) { return u - v; });
      if (roots.length === 3) return { type: 'B3', m: m, r: r, s: s, a: a, k: k, roots: roots };
    }
  }

  // Тип B4: (x² + c1)² + (x² + b2 x + c2)² = 0 ; c1=-c², b2=-(c+q), c2=c·q ; ответ c
  function genB4() {
    for (;;) {
      var c = choice(rangeExcl(-6, 6, [0]));
      var q = choice(rangeExcl(-7, 7, [0, c, -c]));
      var c1 = -(c * c), b2 = -(c + q), c2 = c * q;
      if (Math.abs(c2) > 42) continue;
      return { type: 'B4', c: c, q: q, c1: c1, b2: b2, c2: c2, ans: c };
    }
  }

  // Тип B5: 1/x² + p/x + q = 0 (или замена (x - shift))
  function genB5(opt) {
    var variant = opt && opt.variant;
    for (;;) {
      var t1 = choice(rangeExcl(-8, 8, [0]));
      var t2 = choice(rangeExcl(-8, 8, [0, t1]));
      var shift = variant ? ri(1, 5) : 0;
      var p = -(t1 + t2), q = t1 * t2;
      if (Math.abs(p) > 12 || Math.abs(q) > 30) continue;
      var xs = [Fr.fromInt(shift).add(new Fr(1n, BigInt(t1))), Fr.fromInt(shift).add(new Fr(1n, BigInt(t2)))];
      xs.sort(function (u, v) { return u.lt(v) ? -1 : 1; });
      return { type: 'B5', t1: t1, t2: t2, shift: shift, p: p, q: q, xs: xs };
    }
  }

  // Тип BIQ: (x² + b x)² + P (x² + b x) + Q = 0 ; замена u = x² + b x
  // Строим от двух пар корней с общей суммой -b: тогда дискриминанты (r-s)² — всегда полный квадрат.
  function genBIQ() {
    for (;;) {
      var b = choice(rangeExcl(-6, 6, [0]));
      var r1 = ri(-6, 6), s1 = -b - r1, u1 = -(r1 * s1);
      var r2 = ri(-6, 6), s2 = -b - r2, u2 = -(r2 * s2);
      if (u1 === u2 || u1 === 0 || u2 === 0) continue;
      var set = {}; [r1, s1, r2, s2].forEach(function (x) { set[x] = 1; });
      var roots = Object.keys(set).map(Number).sort(function (u, v) { return u - v; });
      if (roots.length < 3) continue;
      var P = -(u1 + u2), Q = u1 * u2;
      if (Math.abs(u1) > 50 || Math.abs(u2) > 50 || Math.abs(P) > 25 || Math.abs(Q) > 200) continue;
      var us = u1 < u2 ? [u1, u2] : [u2, u1];
      var pairFor = function (u) {
        var rr = [], seen = {};
        [r1, s1, r2, s2].forEach(function (x) { if (x * x + b * x - u === 0 && !seen[x]) { seen[x] = 1; rr.push(x); } });
        rr.sort(function (a2, c2) { return a2 - c2; });
        return rr;
      };
      return { type: 'BIQ', b: b, u1: us[0], u2: us[1], P: P, Q: Q, roots: roots, pair1: pairFor(us[0]), pair2: pairFor(us[1]) };
    }
  }

  // Тип SQ: x⁴ = (a x + b)²  <=>  (x² - a x - b)(x² + a x + b) = 0  (равенство квадратов: x² = ±(a x + b))
  function genSQ() {
    for (;;) {
      var a = choice(rangeExcl(-6, 6, [0]));
      var b = choice(rangeExcl(-8, 8, [0]));
      var dP = a * a + 4 * b, dN = a * a - 4 * b;
      if (dP <= 0) continue;                 // первый множитель — два действительных корня
      var sP = isqrtExact(BigInt(dP));
      if (sP === null) continue;
      if (dN === 0) continue;                // без кратных корней
      var rootsN = [];
      if (dN > 0) {
        var sN = isqrtExact(BigInt(dN));
        if (sN === null) continue;           // иначе рациональный набор был бы неполным
        rootsN = [new Fr(BigInt(-a + Number(sN)), 2n), new Fr(BigInt(-a - Number(sN)), 2n)];
      }
      var rootsP = [new Fr(BigInt(a + Number(sP)), 2n), new Fr(BigInt(a - Number(sP)), 2n)];
      var all = [];
      rootsP.concat(rootsN).forEach(function (x) { if (!all.some(function (g) { return g.eq(x); })) all.push(x); });
      if (all.some(function (x) { return !x.isInt(); })) continue;          // только целые ответы
      if (all.some(function (x) { return Math.abs(x.toNumber()) > 12; })) continue;
      var toN = function (arr) { return arr.map(function (f) { return Number(f.n); }).sort(function (u, v) { return u - v; }); };
      return { type: 'SQ', a: a, b: b, dN: dN, hasN: rootsN.length > 0, roots: toN(all), rootsP: toN(rootsP), rootsN: toN(rootsN) };
    }
  }

  // Тип POW: сократить дробь со степенями (b^{n+p} + s·b^{n+q})/(c·b^{n+r}); n сокращается, остаётся рациональное число
  function genPOW() {
    for (;;) {
      var b = choice([2, 3, 5, 6, 7, 10]);
      var q = ri(0, 1), e = ri(1, 2), p = q + e, s = choice([1, -1]), r = ri(0, q);
      var qr = q - r, t = Math.pow(b, e) + s;
      var Vnum = t * Math.pow(b, qr);                 // целое: b^{p-r} + s·b^{q-r}
      var c = choice([1, 2, 3, 4, 6]);
      var V = new Fr(BigInt(Vnum), BigInt(c));        // сокращённая дробь-значение
      var vn = V.toNumber();
      if (vn <= 0 || vn > 80) continue;
      if (V.isInt() && V.n === 1n) continue;          // тривиально (=1)
      if (V.d > 12n) continue;
      return { type: 'POW', b: b, p: p, q: q, r: r, s: s, c: c, e: e, qr: qr, t: t, V: V };
    }
  }

  // Тип DR: дробное неравенство -N/(x²+bx+c) ≥ 0, знаменатель раскладывается (рациональные корни) → метод интервалов
  function genDR() {
    var r1 = -ri(1, 9), r2 = ri(1, 5);        // r1 < 0 < r2 (произведение корней < 0, как в задачнике)
    var b = -(r1 + r2), c = r1 * r2, N = ri(10, 26);
    return { type: 'DR', r1: r1, r2: r2, b: b, c: c, N: N };
  }

  // Тип QI: квадратное неравенство (x-a)(b·x+c) [<|>] d → раскрыть → квадратное → метод интервалов
  function genQI() {
    for (;;) {
      var b = choice([1, 2, 3]), k = ri(-5, 5), m = ri(-9, 9);
      if (m === b * k) continue;
      var rk = Fr.fromInt(k), rm = new Fr(BigInt(m), BigInt(b));
      if (rk.eq(rm)) continue;
      var P = -(m + b * k), Q = k * m;
      var a = ri(-5, 5), c = P + a * b, d = -a * P - a * a * b - Q;
      if (Math.abs(c) > 15 || Math.abs(d) > 45 || c === 0) continue;
      var op = choice(['<', '>']);
      var r1, r2; if (rk.lt(rm)) { r1 = rk; r2 = rm; } else { r1 = rm; r2 = rk; }
      var kind = op === '<' ? 'between' : 'outside';
      return { type: 'QI', a: a, b: b, c: c, d: d, op: op, r1: r1, r2: r2, kind: kind };
    }
  }

  // Тип DS: неравенство-разность квадратов (a·x-b)² [<=|>=] (c·x-d)² → (A-B)(A+B) → метод интервалов
  function genDS() {
    for (;;) {
      var a = ri(1, 5), c = ri(1, 5);
      if (a === c) continue;
      var b = ri(1, 9), d = ri(1, 9);
      var A = a - c, B = -(b - d), C = a + c, D = -(b + d);
      if (A === 0 || C === 0) continue;
      var r1v = new Fr(BigInt(-B), BigInt(A)), r2v = new Fr(BigInt(-D), BigInt(C));
      if (r1v.eq(r2v) || r1v.d > 3n || r2v.d > 3n) continue;
      if (Math.abs(r1v.toNumber()) > 6 || Math.abs(r2v.toNumber()) > 6) continue;
      var op = choice(['<=', '>=']), lead = a * a - c * c;
      var r1, r2; if (r1v.lt(r2v)) { r1 = r1v; r2 = r2v; } else { r1 = r2v; r2 = r1v; }
      var kind;
      if (op === '<=') kind = lead > 0 ? 'between' : 'outside';
      else kind = lead > 0 ? 'outside' : 'between';
      return { type: 'DS', a: a, b: b, c: c, d: d, op: op, r1: r1, r2: r2, kind: kind, lead: lead };
    }
  }

  // Тип PROP: пропорциональная система {A x²+B y²=C, kA x²+kB y²=C x} → второе = k·(первое) → x=k, y=±y0
  function genPROP() {
    for (;;) {
      var A = ri(1, 4), B = ri(1, 4), k = ri(2, 5), y0 = ri(1, 5);
      var C = A * k * k + B * y0 * y0;
      if (C > 150 || k * A > 24 || k * B > 24) continue;
      return {
        type: 'PROP', A: A, B: B, k: k, y0: y0, C: C,
        sols: [[Fr.fromInt(k), Fr.fromInt(-y0)], [Fr.fromInt(k), Fr.fromInt(y0)]]
      };
    }
  }

  // Тип SYM: симметричная система {x²+y²=S, xy=P} → (x±y)²=S±2P → 4 решения
  function genSYM() {
    for (;;) {
      var p = ri(1, 6), q = ri(-6, 6);
      if (q === 0 || q === p || q === -p) continue;
      var S = p * p + q * q, P = p * q;
      if (S > 52) continue;
      return {
        type: 'SYM', p: p, q: q, S: S, P: P,
        sols: [[Fr.fromInt(p), Fr.fromInt(q)], [Fr.fromInt(q), Fr.fromInt(p)],
               [Fr.fromInt(-p), Fr.fromInt(-q)], [Fr.fromInt(-q), Fr.fromInt(-p)]]
      };
    }
  }

  // Тип C1: {a x² - h x = y, g x - d = y}  (подстановка)
  function genC1() {
    for (;;) {
      var a = ri(1, 5), h = ri(1, 9), g = ri(1, 9), d = ri(1, 9);
      var B = -(h + g), Cc = d;
      var disc = B * B - 4 * a * Cc;
      var rt = isqrtExact(BigInt(disc));
      if (rt === null) continue;
      var rN = Number(rt);
      var xs = [new Fr(BigInt(-B + rN), BigInt(2 * a)), new Fr(BigInt(-B - rN), BigInt(2 * a))];
      // уникальные, |x|<=12
      var uniq = [], seen = {};
      xs.forEach(function (x) { var key = x.n + '/' + x.d; if (!seen[key]) { seen[key] = 1; uniq.push(x); } });
      if (uniq.some(function (x) { return Math.abs(x.toNumber()) > 12; })) continue;
      uniq.sort(function (u, v) { return u.lt(v) ? -1 : 1; });
      var sols = uniq.map(function (x) { return [x, Fr.fromInt(g).mul(x).sub(Fr.fromInt(d))]; });
      return { type: 'C1', a: a, h: h, g: g, d: d, sols: sols };
    }
  }

  // Тип C2: {a x² + y = c, b x² - y = d}  (сложение)
  function genC2() {
    for (;;) {
      var a = ri(1, 9), b = ri(1, 9), m = ri(1, 4), y = ri(1, 15);
      var x2 = m * m;
      var c = y + a * x2;
      var d = (a + b) * x2 - c;
      if (d === 0) continue;
      var xs = [Fr.fromInt(m), Fr.fromInt(-m)];
      var sols = xs.map(function (x) { return [x, Fr.fromInt(c).sub(Fr.fromInt(a).mul(x).mul(x))]; });
      sols.sort(function (u, v) { return u[0].lt(v[0]) ? -1 : 1; });
      return { type: 'C2', a: a, b: b, c: c, d: d, sols: sols };
    }
  }

  // Тип D1: (x - a)² < √K (x - a)  → (a ; a+√K)
  function genD1() { return { type: 'D1', a: choice(rangeExcl(-8, 8, [])), K: choice([2, 3, 5, 6, 7, 10, 11]) }; }
  // Тип D2: -N/((x - a)² - M) ≥ 0  → (a-√M ; a+√M)
  function genD2() { return { type: 'D2', a: choice(rangeExcl(-8, 8, [])), M: choice([2, 3, 5, 6, 7, 10]), N: ri(10, 19) }; }

  /* ============================ ПРОВЕРКА ОТВЕТОВ ============================ */

  function parseFrac(str) {
    if (str === null || str === undefined) return null;
    var s = ('' + str).trim().replace(/^x\s*=\s*/i, '').replace(/^y\s*=\s*/i, '').replace(/\u2212/g, '-').replace(/\s+/g, '');
    if (s === '') return null;
    if (s.indexOf('/') >= 0) {
      var parts = s.split('/');
      if (parts.length !== 2) return null;
      if (!/^[+-]?\d+$/.test(parts[0]) || !/^[+-]?\d+$/.test(parts[1])) return null;
      if (parts[1] === '0' || parts[1] === '+0' || parts[1] === '-0') return null;
      try { return new Fr(BigInt(parts[0]), BigInt(parts[1])); } catch (e) { return null; }
    }
    s = s.replace(',', '.');
    if (/^[+-]?\d+$/.test(s)) { return new Fr(BigInt(s), 1n); }
    var mm = /^([+-]?)(\d*)\.(\d+)$/.exec(s);
    if (mm) {
      var sign = mm[1] === '-' ? -1n : 1n;
      var intp = mm[2] === '' ? '0' : mm[2];
      var frac = mm[3];
      var num = BigInt(intp + frac) * sign;
      var den = 10n ** BigInt(frac.length);
      return new Fr(num, den);
    }
    return null;
  }

  function checkInt(userStr, val) { var f = parseFrac(userStr); return !!f && f.eq(val); }

  // множество значений (корни) без учёта порядка, дубликаты в ответе игнорируются
  function checkRootset(userArr, valArr) {
    var user = [];
    for (var i = 0; i < userArr.length; i++) {
      var t = ('' + userArr[i]).trim();
      if (t === '') continue;
      var f = parseFrac(t);
      if (!f) return { ok: false, reason: 'parse' };
      user.push(f);
    }
    // уникализируем пользовательские
    var uu = [];
    user.forEach(function (f) { if (!uu.some(function (g) { return g.eq(f); })) uu.push(f); });
    var need = valArr.slice();
    if (uu.length !== need.length) {
      // диагностика: лишние/недостающие
      var missing = need.filter(function (v) { return !uu.some(function (u) { return u.eq(v); }); });
      var extra = uu.filter(function (u) { return !need.some(function (v) { return v.eq(u); }); });
      return { ok: false, reason: missing.length && !extra.length ? 'missing' : (extra.length && !missing.length ? 'extra' : 'mismatch'), missing: missing.length, extra: extra.length };
    }
    var okAll = need.every(function (v) { return uu.some(function (u) { return u.eq(v); }); });
    return okAll ? { ok: true } : { ok: false, reason: 'mismatch' };
  }

  // множество точек (x;y)
  function checkPointset(userArr, valArr) {
    var user = [];
    for (var i = 0; i < userArr.length; i++) {
      var pr = userArr[i];
      var xs = ('' + (pr.x !== undefined ? pr.x : '')).trim(), ys = ('' + (pr.y !== undefined ? pr.y : '')).trim();
      if (xs === '' && ys === '') continue;
      var fx = parseFrac(xs), fy = parseFrac(ys);
      if (!fx || !fy) return { ok: false, reason: 'parse' };
      user.push([fx, fy]);
    }
    var uu = [];
    user.forEach(function (p) { if (!uu.some(function (g) { return g[0].eq(p[0]) && g[1].eq(p[1]); })) uu.push(p); });
    var need = valArr.slice();
    if (uu.length !== need.length) return { ok: false, reason: 'count', have: uu.length, need: need.length };
    var okAll = need.every(function (v) { return uu.some(function (u) { return u[0].eq(v[0]) && u[1].eq(v[1]); }); });
    return okAll ? { ok: true } : { ok: false, reason: 'mismatch' };
  }

  // интервалы: пользователь вводит целые параметры
  function checkIntervalD1(aStr, kStr, data) {
    var a = parseFrac(aStr), k = parseFrac(kStr);
    if (!a || !k || !a.isInt() || !k.isInt()) return { ok: false, reason: 'parse' };
    return { ok: a.eq(Fr.fromInt(data.a)) && k.eq(Fr.fromInt(data.K)) };
  }
  function checkIntervalD2(aStr, mStr, data) {
    var a = parseFrac(aStr), m = parseFrac(mStr);
    if (!a || !m || !a.isInt() || !m.isInt()) return { ok: false, reason: 'parse' };
    return { ok: a.eq(Fr.fromInt(data.a)) && m.eq(Fr.fromInt(data.M)) };
  }

  var API = {
    Fr: Fr, isqrtExact: isqrtExact, parseFrac: parseFrac,
    gen: { A: genA, B1: genB1, B2: genB2, B3: genB3, B4: genB4, B5: genB5, BIQ: genBIQ, SQ: genSQ, POW: genPOW, DR: genDR, QI: genQI, DS: genDS, PROP: genPROP, SYM: genSYM, C1: genC1, C2: genC2, D1: genD1, D2: genD2 },
    checkInt: checkInt, checkRootset: checkRootset, checkPointset: checkPointset,
    checkIntervalD1: checkIntervalD1, checkIntervalD2: checkIntervalD2
  };
  if (typeof module !== 'undefined' && module.exports) module.exports = API;
  if (root) root.M20 = API;
})(typeof window !== 'undefined' ? window : (typeof globalThis !== 'undefined' ? globalThis : this));

<script>
/* ==========================================================================
   UI слой: рендер формул, виджеты ввода, компоненты (мини-задача, пошаговый
   решатель, марафон) и 7 модулей. Математика — в M20 (тестируется отдельно).
   ========================================================================== */
(function(){
'use strict';
var M=window.M20, Fr=M.Fr;
var $=function(s,r){return (r||document).querySelector(s);};
var _id=0; function uid(){return 'u'+(++_id);}
function el(html){var t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstChild;}
function clear(n){while(n.firstChild)n.removeChild(n.firstChild);}

/* ---------- формулы ---------- */
var S2='<sup>2</sup>', S3='<sup>3</sup>', S4='<sup>4</sup>';
function fmtPoly(parts){
  var out='';
  for(var i=0;i<parts.length;i++){
    var c=parts[i][0], v=parts[i][1];
    if(c===0) continue;
    var neg=c<0, a=Math.abs(c);
    var cs=(a===1&&v!=='')?'':String(a);
    if(out===''){ out+=(neg?'\u2212':'')+cs+v; }
    else { out+=(neg?' \u2212 ':' + ')+cs+v; }
  }
  return out===''?'0':out;
}
function frac(a,b){return '<span class="frac"><span class="fnum">'+a+'</span><span class="fden">'+b+'</span></span>';}
function rad(inner){
  return '<span class="rad"><svg class="radsvg" viewBox="0 0 12 20" preserveAspectRatio="none">'+
         '<path d="M0.6,12 L4,19 L8.5,1.2 L12,1.2" vector-effect="non-scaling-stroke"/></svg>'+
         '<span class="radb">'+inner+'</span></span>';
}
function brace(){ // фигурная скобка системы (масштабируется по высоте)
  return '<span class="sb"><svg viewBox="0 0 10 40" preserveAspectRatio="none">'+
    '<path d="M8,1 C4,1 6,18 2,20 C6,22 4,39 8,39" vector-effect="non-scaling-stroke"/></svg></span>';
}
function sys(lines){
  return '<span class="sys">'+brace()+'<span class="slines">'+
    lines.map(function(l){return '<span>'+l+'</span>';}).join('')+'</span></span>';
}
function P(n){ // "(x - a)" из корня-константы для линейного (x + n)
  return '('+fmtPoly([[1,'x'],[n,'']])+')';
}
// формат дроби Fr -> строка "n/d" или "n"
function frToStr(f){ return f.d===1n ? f.n.toString() : (f.n.toString()+'/'+f.d.toString()); }
function frToHTML(f){ // красивая стопка
  if(f.d===1n) return f.n.toString();
  var sign = f.n<0n?'\u2212':'';
  var n=(f.n<0n?-f.n:f.n).toString();
  return sign+frac(n, f.d.toString());
}

/* ---------- виджеты ввода ---------- */
// одиночное значение с переключателем десятичная⇄дробь
function fracField(host, opts){
  opts=opts||{};
  var mode='dec';
  var wrap=el('<span class="field"></span>');
  var dec=el('<input class="numin" inputmode="text" autocomplete="off" placeholder="'+(opts.ph||'')+'">');
  if(opts.width) dec.style.width=opts.width;
  var fr=el('<span class="fracin" style="display:none"><input class="fnumIn" inputmode="numeric" autocomplete="off"><span class="fbar"></span><input class="fdenIn" inputmode="numeric" autocomplete="off"></span>');
  var tg=el('<button type="button" class="fftoggle" title="переключить дробь / десятичную">a\u2044b</button>');
  wrap.appendChild(dec); wrap.appendChild(fr); if(!opts.noToggle) wrap.appendChild(tg);
  host.appendChild(wrap);
  tg.addEventListener('click',function(){
    if(mode==='dec'){mode='frac';dec.style.display='none';fr.style.display='inline-flex';tg.textContent='0.5';fr.querySelector('.fnumIn').focus();}
    else{mode='dec';fr.style.display='none';dec.style.display='inline-block';tg.textContent='a\u2044b';dec.focus();}
  });

    if(mode==='frac'){
      var n=fr.querySelector('.fnumIn').value.trim(), d=fr.querySelector('.fdenIn').value.trim();
      if(n===''&&d==='') return '';
      if(d==='') d='1';
      return n+'/'+d;
    }

  }
  return {read:read, focus:function(){(mode==='dec'?dec:fr.querySelector('.fnumIn')).focus();}};
}

// набор корней (множество), с переключателем дробей
function rootsetWidget(host, opts){
  opts=opts||{};
  var box=el('<div class="rowset"></div>');
  var add=el('<button type="button" class="addbtn">+ добавить корень</button>');
  host.appendChild(box); host.appendChild(add);
  var rows=[];
  function label(){ return 'x'+(opts.sub?'<sub>'+opts.sub+'</sub>':'')+' ='; }
  function addRow(){
    var row=el('<div class="rootrow"><span class="rlab">'+label()+'</span></div>');
    var slot=el('<span></span>'); row.appendChild(slot);
    var f=fracField(slot,{width:'78px'});
    var del=el('<button type="button" class="rmini" title="убрать">\u2212</button>');
    row.appendChild(del); box.appendChild(row);
    var rec={row:row,read:f.read};
    del.addEventListener('click',function(){
      if(rows.length<=1){f.read=function(){return '';}; slot.innerHTML='';var nf=fracField(slot,{width:'78px'});rec.read=nf.read;return;}

    });

  }

  add.addEventListener('click',function(){addRow().row.querySelector('input').focus();});

}

// набор точек (x;y)
function pointsetWidget(host, opts){
  opts=opts||{};
  var box=el('<div class="rowset"></div>');
  var add=el('<button type="button" class="addbtn">+ добавить решение</button>');
  host.appendChild(box); host.appendChild(add);
  var rows=[];
  function addRow(){
    var row=el('<div class="pointrow"><span class="rlab">(</span></div>');
    var sx=el('<span></span>'); row.appendChild(sx); var fx=fracField(sx,{width:'62px'});
    row.appendChild(el('<span class="rlab" style="min-width:auto">;</span>'));
    var sy=el('<span></span>'); row.appendChild(sy); var fy=fracField(sy,{width:'62px'});
    row.appendChild(el('<span class="rlab" style="min-width:auto">)</span>'));
    var del=el('<button type="button" class="rmini" title="убрать">\u2212</button>');
    row.appendChild(del); box.appendChild(row);
    var rec={row:row,read:function(){return {x:fx.read(),y:fy.read()};}};
    del.addEventListener('click',function(){ if(rows.length<=1)return; box.removeChild(row); rows=rows.filter(function(r){return r!==rec;}); });
    rows.push(rec); return rec;

// числовая прямая для решения-множества (между / два луча; концы открытые/закрытые)
function numLineSol(pts, kind, closed, subtitle, color){
  color=color||'#0891b2';
  var W=560,H=90,y=46,padL=48,padR=48;
  var xs=pts.map(function(p){return p.x;});
  var lo=Math.min.apply(null,xs),hi=Math.max.apply(null,xs);
  var span=Math.max(hi-lo,1); var vmin=lo-span*0.7, vmax=hi+span*0.7;
  function X(v){ return padL+(v-vmin)/(vmax-vmin)*(W-padL-padR); }
  var svg='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" role="img">';
  svg+='<line x1="12" y1="'+y+'" x2="'+(W-12)+'" y2="'+y+'" stroke="#9aa6c4" stroke-width="1.6"/>';
  svg+='<path d="M'+(W-18)+','+(y-4)+' L'+(W-10)+','+y+' L'+(W-18)+','+(y+4)+'" fill="none" stroke="#9aa6c4" stroke-width="1.6"/>';
  svg+='<path d="M18,'+(y-4)+' L10,'+y+' L18,'+(y+4)+'" fill="none" stroke="#9aa6c4" stroke-width="1.6"/>';
  svg+='<text x="'+(W-8)+'" y="'+(y+4)+'" font-family="Georgia" font-size="13" fill="#9aa6c4">x</text>';
  var xa=X(pts[0].x), xb=X(pts[1].x);
  function band(x1,x2){ return '<rect x="'+Math.min(x1,x2)+'" y="'+(y-9)+'" width="'+Math.abs(x2-x1)+'" height="18" fill="'+color+'22"/><line x1="'+Math.min(x1,x2)+'" y1="'+y+'" x2="'+Math.max(x1,x2)+'" y2="'+y+'" stroke="'+color+'" stroke-width="3"/>'; }
  if(kind==='between'){ svg+=band(xa,xb); } else { svg+=band(12,xa); svg+=band(xb,W-12); }
  pts.forEach(function(p){
    var px=X(p.x);
    svg+='<circle cx="'+px+'" cy="'+y+'" r="6.5" fill="'+(closed?color:'#fff')+'" stroke="'+color+'" stroke-width="2.4"/>';
    svg+='<text x="'+px+'" y="'+(y+26)+'" text-anchor="middle" font-family="Georgia" font-size="14" fill="#222b3d">'+p.label+'</text>';
  });
  var cap=subtitle?'<div class="muted" style="font-size:12.5px;text-align:center;margin-top:-2px">'+subtitle+'</div>':'';
  return '<div class="nline">'+svg+'</svg>'+cap+'</div>';
}

// steps: [{q:HTML, info?:bool, mount?(host)->{read}, check?(read)->{ok,..}, reveal?:HTML}]
// cfg: {problemHTML, steps, finalHTML, onNew}
function mountStepper(host, cfg){
  clear(host);
  var wrap=el('<div></div>');
  wrap.appendChild(el('<div class="qhead">Задача</div>'));
  wrap.appendChild(el('<div class="mathline" style="margin-bottom:6px">'+cfg.problemHTML+'</div>'));
  var list=el('<div class="steps"></div>'); wrap.appendChild(list);
  host.appendChild(wrap);
  var cur=0, nodes=[];
  function renderStep(i){
    var st=cfg.steps[i];
    var node=el('<div class="sstep"></div>');
    var head=el('<div class="snum"><span class="dot">'+(i+1)+'</span> Шаг '+(i+1)+'</div>');
    node.appendChild(head);
    node.appendChild(el('<div class="sq">'+st.q+'</div>'));
    var w=null, fb=null;
    if(!st.info && st.mount){
      var wslot=el('<div></div>'); node.appendChild(wslot); w=st.mount(wslot);
      var bt=el('<div class="btns"></div>');
      var ck=el('<button class="btn primary">Проверить</button>');
      var sh=el('<button class="btn amberbtn">Показать шаг</button>');
      bt.appendChild(ck);bt.appendChild(sh);node.appendChild(bt);
      fb=el('<div class="fb"></div>'); node.appendChild(fb);
      ck.addEventListener('click',function(){
        var r=st.check(w.read);
        if(r.ok){ node.classList.add('done'); advance(i); }
        else { fb.className='fb no show'; fb.innerHTML=st.reasonText?st.reasonText(r):'Не сходится — попробуй ещё раз.'; }
      });
      sh.addEventListener('click',function(){
        node.classList.add('peeked'); node.classList.remove('active');
        fb.className='fb peek show'; fb.innerHTML='Правильно: '+st.reveal; advance(i,true);
      });
    } else {
      var bt2=el('<div class="btns"></div>');
      var sh2=el('<button class="btn ghost">Понятно, дальше \u2192</button>');
      bt2.appendChild(sh2); node.appendChild(bt2);
      var rev=el('<div class="fb peek" style="margin-top:8px"></div>');
      if(st.reveal){ node.appendChild(rev); }
      sh2.addEventListener('click',function(){
        if(st.reveal){ rev.className='fb peek show'; rev.innerHTML=st.reveal; }
        node.classList.add('done'); advance(i);
      });
    }
    nodes[i]=node; list.appendChild(node);
    setActive();
  }
  function setActive(){
    nodes.forEach(function(n,idx){
      var isActive = (idx===cur && !n.classList.contains('done') && !n.classList.contains('peeked'));
      if(isActive){
        n.classList.add('active');
        if(!$('.yourturn',n)) n.querySelector('.snum').appendChild(el('<span class="yourturn">твой ход</span>'));
      } else {
        n.classList.remove('active');
        var yt=$('.yourturn',n); if(yt) yt.parentNode.removeChild(yt);
      }
    });
  }
  function advance(i, peeked){
    if(i!==cur) return;
    cur++;
    if(cur<cfg.steps.length){ renderStep(cur); }
    else { finalBlock(); }
  }
  function finalBlock(){
    var fin=el('<div class="stepfinal"><div class="sf-h">Ответ</div><div class="mathline" style="font-size:19px">'+cfg.finalHTML+'</div></div>');
    wrap.appendChild(fin);
    var m=el('<button class="btn ghost morebtn">Ещё пример этой темы \u2192</button>');
    m.addEventListener('click',function(){ cfg.onNew(host); });
    wrap.appendChild(m);
  }
  renderStep(0);
}

/* ---------- компонент: марафон ---------- */
// engine: {gen()->data, render(data)->{problemHTML, mount(host)->{read}, check(read)->{ok,reason?}, reasonText?, solutionHTML, stepper(data)->cfg}}
function mountMarathon(host, engine){
  clear(host);
  var state={streak:0, solved:0, n:0, lastSig:null};
  var top=el('<div class="mtop"><span class="stat solved">решено <b>0</b></span><span class="stat streak">серия <b>0</b></span><span class="spacer"></span><span class="probno"></span></div>');
  host.appendChild(top);
  var arena=el('<div></div>'); host.appendChild(arena);
  function refreshTop(){ top.querySelector('.solved b').textContent=state.solved; top.querySelector('.streak b').textContent=state.streak; top.querySelector('.probno').textContent='задача №'+state.n; }
  function fresh(){
    var data, sig, guard=0;
    do{ data=engine.gen(); sig=JSON.stringify(data,function(k,v){return typeof v==='bigint'?v.toString():v;}); guard++; }while(sig===state.lastSig && guard<40);
    state.lastSig=sig; state.n++; refreshTop();
    return data;
  }
  function round(data){
    clear(arena);
    var R=engine.render(data);
    var box=el('<div class="qbox"></div>');
    box.appendChild(el('<div class="qhead">Реши уравнение</div>'.replace('Реши уравнение', R.head||'Задача')));
    box.appendChild(el('<div class="mathline prompt" style="margin-bottom:14px">'+R.problemHTML+'</div>'));
    var wslot=el('<div></div>'); box.appendChild(wslot);
    var w=R.mount(wslot);
    var btns=el('<div class="btns"></div>');
    var ck=el('<button class="btn primary">Проверить</button>');
    var steps=el('<button class="btn ghost">Решить по шагам</button>');
    var sh=el('<button class="btn amberbtn">Показать ответ</button>');
    btns.appendChild(ck);btns.appendChild(steps);btns.appendChild(sh);box.appendChild(btns);
    var fb=el('<div class="fb"></div>'); box.appendChild(fb);
    arena.appendChild(box);
    var done=false;
    function nextBtn(cls){
      if($('.nextbtn',box))return;
      var nx=el('<button class="btn next nextbtn morebtn">Дальше \u2192</button>');
      nx.addEventListener('click',function(){ round(fresh()); });
      box.appendChild(nx);
    }
    ck.addEventListener('click',function(){
      if(done)return;
      var r=R.check(w.read, data);
      if(r.ok){ fb.className='fb ok show'; fb.innerHTML='<b>Верно!</b> '+(R.okNote||''); done=true; state.solved++; state.streak++; refreshTop(); ck.disabled=true; sh.disabled=true; nextBtn(); }
      else{ fb.className='fb no show'; fb.innerHTML=(R.reasonText?R.reasonText(r):'Пока неверно — посмотри решение по шагам, если застрял.'); if(state.streak){state.streak=0;refreshTop();} }
    });
    sh.addEventListener('click',function(){
      if(done)return; done=true; ck.disabled=true; sh.disabled=true;
      var sol=el('<div class="solution"><div class="sol-h">Разбор</div>'+R.solutionHTML+'</div>');
      arena.appendChild(sol); nextBtn();
    });
    steps.addEventListener('click',function(){
      steps.disabled=true;
      var sc=el('<div style="margin-top:14px;border-top:1px dashed var(--line);padding-top:12px"></div>');
      arena.appendChild(sc);
      var cfg=R.stepper(data);
      cfg.onNew=function(){ /* внутри марафона «ещё пример» = новая задача */ round(fresh()); };
      mountStepper(sc, cfg);
    });
  }
  round(fresh());
}

/* ---------- атомарное решение квадратного уравнения по дискриминанту ---------- */
/* Возвращает массив мелких шагов для a·v² + b·v + c = 0 (корни рациональные). */
function quadSteps(a,b,c,opts){
  opts=opts||{}; var v=opts.v||'x'; var D=b*b-4*a*c; var out=[];
  var sgn=function(n){ return n<0?('\u2212'+(-n)):(''+n); };
  if(!opts.noCoef){
    out.push({info:true, q:'Это квадратное уравнение вида a'+v+S2+' + b'+v+' + c = 0. Выпиши коэффициенты со знаками.',
      reveal:'a = '+a+',\u00a0 b = '+sgn(b)+',\u00a0 c = '+sgn(c)});
  }
  var Dsub='('+sgn(b)+')'+S2+' \u2212 4\u00b7'+a+'\u00b7('+sgn(c)+')';
  out.push({q:'Найди дискриминант: D = b'+S2+' \u2212 4ac = '+Dsub+' = ?',
    mount:function(h){return fracField(h,{noToggle:true});},
    check:function(r){return {ok:M.checkInt(r(),Fr.fromInt(D))};},
    reasonText:function(){return 'Следи за знаками при подстановке: D = '+Dsub+' = '+D+'.';},
    reveal:''+D});
  if(D>0){
    var sq=Math.round(Math.sqrt(D)), den=2*a;
    out.push({q:'D &gt; 0 — значит два корня. Найди \u221AD = \u221A'+D+' = ?',
      mount:function(h){return fracField(h,{noToggle:true});},
      check:function(r){return {ok:M.checkInt(r(),Fr.fromInt(sq))};},
      reveal:''+sq});
    var x1=new Fr(BigInt(-b+sq),BigInt(den)), x2=new Fr(BigInt(-b-sq),BigInt(den));
    out.push({q:v+'\u2081 = '+frac('\u2212b + \u221AD','2a')+' = '+frac(sgn(-b)+' + '+sq, ''+den)+' = ?',
      mount:function(h){return fracField(h, x1.isInt()?{noToggle:true}:{});},
      check:(function(x){return function(r){return {ok:M.checkInt(r(),x)};};})(x1),
      reveal:frToStr(x1)});
    out.push({q:v+'\u2082 = '+frac('\u2212b \u2212 \u221AD','2a')+' = '+frac(sgn(-b)+' \u2212 '+sq, ''+den)+' = ?',
      mount:function(h){return fracField(h, x2.isInt()?{noToggle:true}:{});},
      check:(function(x){return function(r){return {ok:M.checkInt(r(),x)};};})(x2),
      reveal:frToStr(x2)});
  } else if(D===0){
    var den0=2*a, x0=new Fr(BigInt(-b),BigInt(den0));

function numLine(pts, shade, subtitle){
  var W=560,H=88, y=46, padL=44, padR=44;
  var xs=pts.map(function(p){return p.x;});
  var lo=Math.min.apply(null,xs), hi=Math.max.apply(null,xs);
  var span=Math.max(hi-lo, 1); var vmin=lo-span*0.55, vmax=hi+span*0.55;
  function X(v){ return padL + (v-vmin)/(vmax-vmin)*(W-padL-padR); }
  var svg='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" role="img">';
  // axis
  svg+='<line x1="12" y1="'+y+'" x2="'+(W-12)+'" y2="'+y+'" stroke="#9aa6c4" stroke-width="1.6"/>';
  svg+='<path d="M'+(W-18)+','+(y-4)+' L'+(W-10)+','+y+' L'+(W-18)+','+(y+4)+'" fill="none" stroke="#9aa6c4" stroke-width="1.6"/>';
  svg+='<text x="'+(W-8)+'" y="'+(y+4)+'" font-family="Georgia" font-size="13" fill="#9aa6c4">x</text>';
  // shading
  if(shade){ var xa=X(shade.from), xb=X(shade.to);
    svg+='<rect x="'+Math.min(xa,xb)+'" y="'+(y-9)+'" width="'+Math.abs(xb-xa)+'" height="18" fill="rgba(59,87,214,.14)"/>';
    svg+='<line x1="'+Math.min(xa,xb)+'" y1="'+y+'" x2="'+Math.max(xa,xb)+'" y2="'+y+'" stroke="#3b57d6" stroke-width="3"/>';
  }
  pts.forEach(function(p){
    var px=X(p.x);
    svg+='<circle cx="'+px+'" cy="'+y+'" r="6.5" fill="'+(p.open?'#fff':'#3b57d6')+'" stroke="#3b57d6" stroke-width="2.4"/>';
    svg+='<text x="'+px+'" y="'+(y+26)+'" text-anchor="middle" font-family="Georgia" font-size="15" fill="#222b3d">'+p.label+'</text>';
  });
  var cap = subtitle? '<div class="muted" style="font-size:12.5px;text-align:center;margin-top:-2px">'+subtitle+'</div>' : '';
  return '<div class="nline">'+svg+'</svg>'+cap+'</div>';
}

function ineqAnsHTML(d, closed){
  var lo=closed?'[':'(', hi=closed?']':')';
  if(d.kind==='between') return lo+' '+frToHTML(d.r1)+' ; '+frToHTML(d.r2)+' '+hi;
  return '( \u2212\u221E ; '+frToHTML(d.r1)+' '+hi+' \u222A '+lo+' '+frToHTML(d.r2)+' ; +\u221E )';
}
function qiParts(d){
  var factored='('+fmtPoly([[1,'x'],[-d.a,'']])+')('+fmtPoly([[d.b,'x'],[d.c,'']])+')';
  var opSym=d.op==='<'?'&lt;':'&gt;';
  var P=d.c-d.a*d.b, Q=(-d.a*d.c)-d.d;
  var quad=fmtPoly([[d.b,'x'+S2],[P,'x'],[Q,'']]);
  var expandedLHS=fmtPoly([[d.b,'x'+S2],[P,'x'],[-d.a*d.c,'']]);
  return {factored:factored, opSym:opSym, quad:quad, P:P, Q:Q, expandedLHS:expandedLHS, body:factored+' '+opSym+' '+d.d};
}
function dsParts(d){
  var lhs='('+fmtPoly([[d.a,'x'],[-d.b,'']])+')'+S2, rhs='('+fmtPoly([[d.c,'x'],[-d.d,'']])+')'+S2;
  var opSym=d.op==='<='?'\u2264':'\u2265';
  var A=d.a-d.c, B=-(d.b-d.d), C=d.a+d.c, D2=-(d.b+d.d);
  var f1=fmtPoly([[A,'x'],[B,'']]), f2=fmtPoly([[C,'x'],[D2,'']]);
  return {lhs:lhs, rhs:rhs, opSym:opSym, body:lhs+' '+opSym+' '+rhs, A:A,B:B,C:C,D2:D2, f1:f1, f2:f2, factored:'('+f1+')('+f2+')'};
}

function rootsetReason(r){
  if(r.reason==='parse') return 'Один из корней записан непонятно. Используй целое, дробь (например 1/2) или переключатель дроби.';
  if(r.reason==='missing') return 'Найдены не все корни — есть ещё. Добавь недостающие.';
  if(r.reason==='extra') return 'Есть лишний корень, которого быть не должно. Проверь.';
  return 'Набор корней не совпал. Проверь и количество, и значения.';
}
function pointReason(r){
  if(r.reason==='parse') return 'Координата записана непонятно. Используй целое или дробь.';
  if(r.reason==='count') return 'Число решений не совпадает: у тебя '+r.have+', нужно '+r.need+'.';
  return 'Решения не совпали. Проверь пары (x; y).';
}

var STATE={module:'A', mode:'learn'};
var MODES=[['learn','Учимся','1'],['step','Пошагово','2'],['drill','Марафон','3']];

function renderPicker(){
  var p=$('#picker'); clear(p);
  ORDER.forEach(function(mid){
    var m=MODULES[mid];
    var c=el('<button class="mcard'+(mid===STATE.module?' on':'')+'" style="--mc:'+m.color+'">'+
      '<div class="mnum">Задание 20 · '+m.num.split('.')[1]+'</div>'+
      '<div class="mttl">'+m.title+'</div>'+
      '<div class="msub">'+m.sub+'</div>'+
      '<div class="mform">'+m.form+'</div></button>');
    c.addEventListener('click',function(){ STATE.module=mid; STATE.mode='learn'; render(); });
    p.appendChild(c);
  });
}
function renderTabs(){
  var t=$('#tabs'); clear(t);
  MODES.forEach(function(md){
    var b=el('<button class="tab'+(md[0]===STATE.mode?' on':'')+'"><span class="tnum">'+md[2]+'</span>'+md[1]+'</button>');
    b.addEventListener('click',function(){ STATE.mode=md[0]; render(); });
    t.appendChild(b);
  });
}
function renderBody(){
  var b=$('#body'); clear(b);
  var m=MODULES[STATE.module];
  if(STATE.mode==='learn'){
    m.theory.forEach(function(card,i){
      b.appendChild(el('<div class="tcard"><div class="tc-h"><span class="tc-n">'+(i+1)+'</span><span class="tc-t">'+card.t+'</span></div><p>'+card.h+'</p></div>'));
    });
    if(m.callout) b.appendChild(el('<div class="callout">'+m.callout+'</div>'));
    var miniHost=el('<div style="margin-top:6px"></div>'); b.appendChild(miniHost);
    mountMini(miniHost, m.mini());
    // хинт-переход к тренировке
    var jump=el('<div class="btns" style="margin-top:16px"><button class="btn primary">Перейти к пошаговому разбору \u2192</button><button class="btn ghost">Сразу в марафон</button></div>');
    jump.children[0].addEventListener('click',function(){STATE.mode='step';render();});
    jump.children[1].addEventListener('click',function(){STATE.mode='drill';render();});
    b.appendChild(jump);
    // активируем перекрёстные ссылки
    Array.prototype.forEach.call(b.querySelectorAll('[data-go]'),function(x){ x.addEventListener('click',function(){goTo(x.getAttribute('data-go'));}); });
  }
  else if(STATE.mode==='step'){
    b.appendChild(el('<p class="muted" style="margin:0 0 12px">Разбираем по шагам. На каждом шаге можно ответить самому или нажать «Показать шаг». Активный шаг подсвечен — <span style="color:var(--active);font-weight:600">твой ход</span>.</p>'));
    var sh=el('<div></div>'); b.appendChild(sh);
    mountStepper(sh, m.stepFactory());
  }
  else{
    b.appendChild(el('<p class="muted" style="margin:0 0 12px">Решай задачи одну за другой. Неправильный ответ не блокирует поле — пробуй снова. Застрял — жми «Решить по шагам» или «Показать ответ».</p>'));
    var mh=el('<div></div>'); b.appendChild(mh);
    mountMarathon(mh, m.engine());
  }
}
function render(){
  var m=MODULES[STATE.module];
  $('#stageTitle').innerHTML='Задание 20.'+m.num.split('.')[1]+' — '+m.title;
  $('#stageSub').textContent=m.tagline;
  renderPicker(); renderTabs(); renderBody();
  try{window.scrollTo({top:0,behavior:'smooth'});}catch(e){}
}
window.__T20={STATE:STATE, render:render, MODULES:MODULES, ORDER:ORDER, R:R, M:M,
  _test:{mountMini:mountMini,mountStepper:mountStepper,mountMarathon:mountMarathon,rootsetWidget:rootsetWidget,fracField:fracField,pointsetWidget:pointsetWidget,intervalWidget:intervalWidget,fmtPoly:fmtPoly}};
render();
})();
</script>
