name: TEMP Apply Board Author Layers Foundation

on:
  push:
    branches: [ ci/board-author-layers-apply ]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/board-author-layers-foundation
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply foundation patch
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          function replaceOnce(file, oldText, newText) {
            let source = fs.readFileSync(file, 'utf8');
            if (!source.includes(oldText)) {
              throw new Error(`Pattern not found in ${file}: ${oldText.slice(0, 120)}`);
            }
            source = source.replace(oldText, newText);
            fs.writeFileSync(file, source);
          }

          const server = 'board-server/index.js';
          replaceOnce(server,
`const ROOM_CLEANUP_INTERVAL_MS = parsePositiveInteger(
  process.env.ROOM_CLEANUP_INTERVAL_MS,
  DEFAULT_ROOM_CLEANUP_INTERVAL_MS
);
`,
`const ROOM_CLEANUP_INTERVAL_MS = parsePositiveInteger(
  process.env.ROOM_CLEANUP_INTERVAL_MS,
  DEFAULT_ROOM_CLEANUP_INTERVAL_MS
);
const AUTHOR_ROLES = new Set(['teacher', 'student', 'bot']);
`);

          replaceOnce(server,
`function findParticipant(room, role) {
  return (room.participants || []).find(participant => participant.role === role) || null;
}
`,
`function findParticipant(room, role) {
  return (room.participants || []).find(participant => participant.role === role) || null;
}

function roomOwner(room) {
  return findParticipant(room, 'teacher') || (room.participants || [])[0] || {
    id: 'room-owner',
    role: 'teacher',
    name: 'Учитель',
    color: '#172033',
    caps: {
      moderate: true,
      structure: true,
      draw: true,
      controlTrainer: true,
      view: true
    }
  };
}

function socketParticipant(room, socket) {
  return (room.participants || []).find(participant => participant.id === socket.data.participantId)
    || findParticipant(room, socket.data.role)
    || roomOwner(room);
}

function publicYou(participant, role) {
  if (!participant) return null;
  return {
    participantId: participant.id,
    role: participant.role || role,
    name: participant.name,
    color: participant.color,
    caps: { ...(participant.caps || {}) }
  };
}

function isValidObjectId(value) {
  return typeof value === 'string' && /^[A-Za-z0-9_-]{6,64}$/.test(value);
}

function isValidIsoDate(value) {
  return typeof value === 'string' && Number.isFinite(Date.parse(value));
}

function normalizeObjectMeta(room, object, author, options = {}) {
  if (!object || typeof object !== 'object') return object;
  const fallbackAuthor = author && AUTHOR_ROLES.has(author.role) ? author : roomOwner(room);
  const clientAuthor = (room.participants || []).find(participant => (
    participant.id === object.authorId
      && participant.role === object.authorRole
      && AUTHOR_ROLES.has(participant.role)
  ));
  const resolvedAuthor = clientAuthor || fallbackAuthor;
  object.objectId = isValidObjectId(object.objectId) ? object.objectId : makeId(9);
  object.authorId = resolvedAuthor.id;
  object.authorRole = AUTHOR_ROLES.has(resolvedAuthor.role) ? resolvedAuthor.role : 'teacher';
  if (clientAuthor && typeof object.layerId === 'string' && object.layerId.length <= 80) {
    object.layerId = object.layerId;
  } else {
    object.layerId = \`participant:\${object.authorId}\`;
  }
  object.createdAt = options.preserveCreatedAt && isValidIsoDate(object.createdAt) ? object.createdAt : nowIso();
  return object;
}
`);

          replaceOnce(server,
`function normalizeSnapshot(snapshot) {
  if (!snapshot || !Array.isArray(snapshot.pages) || snapshot.pages.length === 0) return null;
  return {
    currentPage: Math.max(0, Math.min(Number(snapshot.currentPage || 0), snapshot.pages.length - 1)),
    pages: snapshot.pages.map((page, index) => ({
      id: String(page.id || \`page-\${index + 1}\`),
      bg: ['grid', 'lined', 'blank'].includes(page.bg) ? page.bg : 'grid',
      strokes: Array.isArray(page.strokes) ? page.strokes : []
    })),
    trainerUrl: normalizeTrainerUrl(snapshot.trainerUrl) || 'negative-numbers-line.html'
  };
}

function applySnapshot(room, snapshot) {
  const next = normalizeSnapshot(snapshot);
`,
`function normalizeSnapshot(room, snapshot) {
  if (!snapshot || !Array.isArray(snapshot.pages) || snapshot.pages.length === 0) return null;
  const owner = roomOwner(room);
  return {
    currentPage: Math.max(0, Math.min(Number(snapshot.currentPage || 0), snapshot.pages.length - 1)),
    pages: snapshot.pages.map((page, index) => ({
      id: String(page.id || \`page-\${index + 1}\`),
      bg: ['grid', 'lined', 'blank'].includes(page.bg) ? page.bg : 'grid',
      strokes: Array.isArray(page.strokes)
        ? page.strokes.map(stroke => normalizeObjectMeta(room, { ...stroke }, owner, { preserveCreatedAt: true }))
        : []
    })),
    trainerUrl: normalizeTrainerUrl(snapshot.trainerUrl) || 'negative-numbers-line.html'
  };
}

function applySnapshot(room, snapshot) {
  const next = normalizeSnapshot(room, snapshot);
`);

          replaceOnce(server,
`    markParticipantConnected(auth.room, role, socket);
    socket.join(auth.room.roomId);
    socket.emit('room:state', { role, state: role === 'student' ? publicState(auth.room) : null });
`,
`    markParticipantConnected(auth.room, role, socket);
    const participant = findParticipant(auth.room, role);
    socket.join(auth.room.roomId);
    socket.emit('room:state', {
      role,
      state: role === 'student' ? publicState(auth.room) : null,
      you: publicYou(participant, role)
    });
`);

          replaceOnce(server,
`  socket.on('room:state', () => {
    const room = rooms.get(socket.data.roomId);
    if (room) socket.emit('room:state', { role: socket.data.role, state: publicState(room) });
  });
`,
`  socket.on('room:state', () => {
    const room = rooms.get(socket.data.roomId);
    if (room) {
      const role = socket.data.role;
      socket.emit('room:state', { role, state: publicState(room), you: publicYou(socketParticipant(room, socket), role) });
    }
  });
`);

          replaceOnce(server,
`      const room = requireTeacher(socket, payload);
      if (!room) return;
      touchRoom(room);
      socket.to(room.roomId).emit(eventName, payload);
`,
`      const room = requireTeacher(socket, payload);
      if (!room) return;
      const participant = socketParticipant(room, socket);
      if (eventName === 'board:stroke-start' || eventName === 'board:stroke-end') {
        normalizeObjectMeta(room, payload?.stroke, participant, { preserveCreatedAt: false });
      }
      if (eventName === 'board:text-add') {
        normalizeObjectMeta(room, payload?.stroke, participant, { preserveCreatedAt: false });
        normalizeObjectMeta(room, payload?.text, participant, { preserveCreatedAt: false });
        normalizeObjectMeta(room, payload?.object, participant, { preserveCreatedAt: false });
      }
      touchRoom(room);
      socket.to(room.roomId).emit(eventName, payload);
`);

          const client = 'trainers/trainer-board.html';
          replaceOnce(client,
`const shared={role:initialRole,roomId:params.get('room')||'',token:params.get('token')||'',server:normalizeServer(params.get('server')||localStorage.getItem(SERVER_KEY)||DEFAULT_SERVER),studentToken:'',studentLink:'',socket:null,connected:false,loadingClient:null,clientServer:'',participants:[]};`,
`const shared={role:initialRole,roomId:params.get('room')||'',token:params.get('token')||'',server:normalizeServer(params.get('server')||localStorage.getItem(SERVER_KEY)||DEFAULT_SERVER),studentToken:'',studentLink:'',socket:null,connected:false,loadingClient:null,clientServer:'',participants:[],me:null};`);

          replaceOnce(client,
`    function setParticipants(participants){shared.participants=Array.isArray(participants)?participants:[];renderParticipants()}
`,
`    function participantToMe(participant,role=participant?.role||shared.role){if(!participant?.id)return null;return{participantId:participant.id,role,name:participant.name,color:participant.color,caps:{...(participant.caps||{})}}}
    function setSharedMe(you){if(!you?.participantId)return;shared.me={participantId:you.participantId,role:you.role||shared.role,name:you.name,color:you.color,caps:{...(you.caps||{})}}}
    function fallbackSharedMe(){if(shared.me)return;const participant=(shared.participants||[]).find(item=>item?.role===shared.role);if(participant)shared.me=participantToMe(participant)}
    function setParticipants(participants){shared.participants=Array.isArray(participants)?participants:[];fallbackSharedMe();renderParticipants()}
    function genObjectId(){const alphabet='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789_-';const bytes=new Uint8Array(14);if(window.crypto?.getRandomValues){window.crypto.getRandomValues(bytes);return Array.from(bytes,b=>alphabet[b&63]).join('')}return \`obj-\${Date.now().toString(36)}-\${Math.random().toString(36).slice(2,9)}\`}
    function newObjectMeta(){const meta={objectId:genObjectId(),createdAt:new Date().toISOString()};if(shared.me?.participantId){meta.authorId=shared.me.participantId;meta.authorRole=shared.me.role;meta.layerId=\`participant:\${meta.authorId}\`}else if(shared.role==='teacher'){meta.authorId='local-teacher';meta.authorRole='teacher';meta.layerId='participant:local-teacher'}return meta}
`);

          replaceOnce(client,
`current=(tool==='pen'||tool==='marker'||tool==='eraser')?{kind:'path',tool,color:color.value,size:+size.value,points:[p]}:{kind:tool==='rect'?'rect':'line',tool,color:color.value,size:+size.value,start:p,end:p};`,
`current=(tool==='pen'||tool==='marker'||tool==='eraser')?{...newObjectMeta(),kind:'path',tool,color:color.value,size:+size.value,points:[p]}:{...newObjectMeta(),kind:tool==='rect'?'rect':'line',tool,color:color.value,size:+size.value,start:p,end:p};`);

          replaceOnce(client,
`if(text&&textPoint)addStroke({kind:'text',tool:'text',x:textPoint.x,y:textPoint.y,text,color:color.value,size:+size.value});`,
`if(text&&textPoint)addStroke({...newObjectMeta(),kind:'text',tool:'text',x:textPoint.x,y:textPoint.y,text,color:color.value,size:+size.value});`);

          replaceOnce(client,
`shared.socket.on('room:state',payload=>{if(payload?.state)applySnapshot(payload.state);else if(shared.role==='teacher'){emitSnapshot();frame.contentWindow?.postMessage({type:'mathexam:request-trainer-state'},'*')}setStatus('подключено','ok')});`,
`shared.socket.on('room:state',payload=>{setSharedMe(payload?.you);if(payload?.state)applySnapshot(payload.state);else if(shared.role==='teacher'){emitSnapshot();frame.contentWindow?.postMessage({type:'mathexam:request-trainer-state'},'*')}fallbackSharedMe();setStatus('подключено','ok')});`);

          const readme = 'board-server/README.md';
          replaceOnce(readme,
`## Ограничения MVP
`,
`## Метаданные объектов доски

Объекты доски могут содержать служебные поля:

- \`objectId\` — стабильный идентификатор объекта доски.
- \`authorId\` — историческая метка участника, создавшего объект.
- \`authorRole\` — историческая роль автора: \`teacher\`, \`student\` или \`bot\`.
- \`layerId\` — идентификатор слоя, сейчас по умолчанию \`participant:<authorId>\`.
- \`createdAt\` — ISO-время создания объекта.

Сервер не доверяет client-supplied \`authorId\`, \`authorRole\`, \`layerId\` и \`createdAt\` как источнику прав. Права по-прежнему определяются серверными проверками, токенами комнаты и \`requireTeacher\`: запись ученикам не открыта.

Объект без metadata считается legacy-объектом и при snapshot-нормализации штампуется владельцем комнаты. Snapshot-перезапись остаётся известным архитектурным долгом будущего server-owned state: текущий foundation только добавляет метки объектов и не превращает доску в открытую групповую модель.

Эти поля — фундамент для будущих слоёв, передачи хода, открытой доски и ИИ-участника.

## Ограничения MVP
`);
          NODE
      - name: Basic syntax checks
        run: |
          node --check board-server/index.js
          node <<'NODE'
          const fs = require('node:fs');
          const html = fs.readFileSync('trainers/trainer-board.html', 'utf8');
          const scripts = [...html.matchAll(/<script[^>]*>([\s\S]*?)<\/script>/gi)].map(match => match[1]);
          if (!scripts.length) throw new Error('No inline scripts found');
          for (const script of scripts) new Function(script);
          console.log(`Parsed ${scripts.length} inline script(s)`);
          NODE
      - name: Commit patch to feature branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff -- board-server/index.js trainers/trainer-board.html board-server/README.md
          git add board-server/index.js trainers/trainer-board.html board-server/README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add board object metadata foundation"
            git push origin HEAD:feature/board-author-layers-foundation
          fi
