 min-width:30px;height:30px;padding:0 8px;font:700 13px/26px system-ui;cursor:pointer;box-shadow:0 2px 8px rgba(26,26,46,.35)}

<div class="wrap">
<div class="head"><div><h1>ОГЭ №17 · Четырёхугольники</h1><div class="sub">квадрат · прямоугольник · ромб · параллелограмм · трапеция — архив задач и генераторы + генераторы</div></div><div class="badge" id="hdBadge">…</div></div>
<div class="app">
<div class="tabs">
<button class="tab on" id="tabR" data-tab="razbor">📖 Разбор</button>
<button class="tab" id="tabT" data-tab="train">✏️ Тренировка</button>
<button class="tab" id="tabQ" data-tab="quiz">🏁 Зачёт</button>
<button class="tab" id="tabS" data-tab="ref">📌 Справочник</button>
<button class="tab" id="tabL" data-tab="sheet">🗺 Лист ОГЭ</button>

<div class="main" id="main"></div>
</div>
<div class="stbox" id="stbox"></div>
<div class="note" style="text-align:center;margin-top:10px">Прогресс хранится на этом устройстве. Ответы: целые, десятичные (запятая или точка) и дроби вида 7/2.</div>
</div>
<script>
'use strict';
/* ================= ЯДРО: утилиты и честный SVG-слой ================= */
const RAD=d=>d*Math.PI/180, DEG=r=>r*180/Math.PI;
const dist=(p,q)=>Math.hypot(p.x-q.x,p.y-q.y);
const angAt=(V,P,Q)=>{ // угол при вершине V в градусах (0..180)
  const a1=Math.atan2(P.y-V.y,P.x-V.x), a2=Math.atan2(Q.y-V.y,Q.x-V.x);
  let d=Math.abs(a1-a2)%(2*Math.PI); if(d>Math.PI)d=2*Math.PI-d; return DEG(d);
};
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fnum=v=>{ // вывод числа: 3.5 → «3,5»; целые без хвоста
  if(typeof v==='string')return v;
  const r=Math.round(v*1e6)/1e6;
  return (Number.isInteger(r)? String(r) : String(r).replace('.',','));
};
const frac=(a,b)=>'<span class="frac"><span>'+a+'</span><span>'+b+'</span></span>';
const CLR={given:'#d97706',ask:'#2d70b3',c3:'#0d9488',c4:'#7c3aed',c5:'#db2777',ink:'#1a1a2e',good:'#16a34a'};

function Fig(W,H,pad){
  W=W||440;H=H||300;pad=pad||34;
  const parts=[], chk=[], tickGroups={};
  let T=p=>p;
  const F={W,H,chk,
    fit(pts){ // вписать: равномерный масштаб + переворот y
      let x0=1e9,x1=-1e9,y0=1e9,y1=-1e9;
      pts.forEach(p=>{x0=Math.min(x0,p.x);x1=Math.max(x1,p.x);y0=Math.min(y0,p.y);y1=Math.max(y1,p.y)});
      const s=Math.min((W-2*pad)/Math.max(x1-x0,1e-9),(H-2*pad)/Math.max(y1-y0,1e-9));
      const cx=(x0+x1)/2, cy=(y0+y1)/2;
      T=p=>({x:W/2+(p.x-cx)*s, y:H/2-(p.y-cy)*s});
      F.scale=s; return T;
    },
    seg(p,q,o){o=o||{};const a=T(p),b=T(q);
      parts.push('<line x1="'+a.x.toFixed(1)+'" y1="'+a.y.toFixed(1)+'" x2="'+b.x.toFixed(1)+'" y2="'+b.y.toFixed(1)+'" stroke="'+(o.c||CLR.ink)+'" stroke-width="'+(o.w||2.2)+'"'+(o.dash?' stroke-dasharray="7 5"':'')+' stroke-linecap="round"/>');},
    poly(ps,o){o=o||{};const d=ps.map((p,i)=>{const t=T(p);return (i?'L':'M')+t.x.toFixed(1)+' '+t.y.toFixed(1)}).join('');
      parts.push('<path d="'+d+(o.close?'Z':'')+'" fill="'+(o.fill||'none')+'" stroke="'+(o.c||CLR.ink)+'" stroke-width="'+(o.w||2.4)+'" stroke-linejoin="round"'+(o.dash?' stroke-dasharray="7 5"':'')+'/>');},
    dot(p,o){o=o||{};const t=T(p);parts.push('<circle cx="'+t.x.toFixed(1)+'" cy="'+t.y.toFixed(1)+'" r="'+(o.r||3.8)+'" fill="'+(o.c||CLR.ink)+'" stroke="#fffdf7" stroke-width="1.6"/>');},
    lab(txt,p,o){o=o||{};const t=T(p);
      parts.push('<text x="'+(t.x+(o.dx||0)).toFixed(1)+'" y="'+(t.y+(o.dy||0)).toFixed(1)+'" font-size="'+(o.fs||16)+'" font-weight="'+(o.fw||800)+'" fill="'+(o.c||CLR.ink)+'" text-anchor="'+(o.anchor||'middle')+'" style="paint-order:stroke;stroke:#fffdf7;stroke-width:4px;stroke-linejoin:round">'+esc(txt)+'</text>');},
    arc(V,P,Q,o){ // дуга угла полилинией; лейбл — число° => авто-chk 1.5°
      o=o||{}; const val=angAt(V,P,Q);
      if(o.lab){const m=String(o.lab).match(/^([\d.,]+)°/); if(m){const cl=parseFloat(m[1].replace(',','.'));
        chk.push({ok:Math.abs(cl-val)<=1.5, m:'дуга '+o.lab+' ≠ факт '+val.toFixed(1)+'°'});}}
      const v=T(V),p=T(P),q=T(Q);
      let a1=Math.atan2(p.y-v.y,p.x-v.x), a2=Math.atan2(q.y-v.y,q.x-v.x);
      let d=a2-a1; while(d>Math.PI)d-=2*Math.PI; while(d<-Math.PI)d+=2*Math.PI;
      const r=o.r||26, N=24, pts=[];
      for(let i=0;i<=N;i++){const a=a1+d*i/N;pts.push((v.x+r*Math.cos(a)).toFixed(1)+' '+(v.y+r*Math.sin(a)).toFixed(1));}
      parts.push('<polyline points="'+pts.join(' ')+'" fill="none" stroke="'+(o.c||CLR.given)+'" stroke-width="3.4" stroke-linecap="round"/>');
      if(o.lab!=null){const mid=a1+d/2, ext=(val>=140||val<=18)||o.out, rr=r+(ext?20:15);
        parts.push('<text x="'+(v.x+rr*Math.cos(mid)+(o.dx||0)).toFixed(1)+'" y="'+(v.y+rr*Math.sin(mid)+5+(o.dy||0)).toFixed(1)+'" font-size="15" font-weight="850" fill="'+(o.c||CLR.given)+'" text-anchor="middle" style="paint-order:stroke;stroke:#fffdf7;stroke-width:4px">'+esc(o.lab)+'</text>');}
    },
    rsq(V,P,Q,o){ // квадратик прямого угла + авто-chk 90°
      o=o||{}; chk.push({ok:Math.abs(angAt(V,P,Q)-90)<=1.5, m:'прямой угол при вершине нарушен: '+angAt(V,P,Q).toFixed(1)+'°'});
      const v=T(V),p=T(P),q=T(Q),s=o.s||11;
      const u1={x:p.x-v.x,y:p.y-v.y},u2={x:q.x-v.x,y:q.y-v.y};
      const n1=Math.hypot(u1.x,u1.y),n2=Math.hypot(u2.x,u2.y);
      const e1={x:u1.x/n1*s,y:u1.y/n1*s},e2={x:u2.x/n2*s,y:u2.y/n2*s};
      parts.push('<path d="M'+(v.x+e1.x).toFixed(1)+' '+(v.y+e1.y).toFixed(1)+'L'+(v.x+e1.x+e2.x).toFixed(1)+' '+(v.y+e1.y+e2.y).toFixed(1)+'L'+(v.x+e2.x).toFixed(1)+' '+(v.y+e2.y).toFixed(1)+'" fill="none" stroke="'+(o.c||CLR.good)+'" stroke-width="2.4"/>');},
    tick(P,Q,n,cls){ // засечки: класс равенства cls → авто-chk длин
      (tickGroups[cls]=tickGroups[cls]||[]).push(dist(P,Q));
      const p=T(P),q=T(Q),mx=(p.x+q.x)/2,my=(p.y+q.y)/2;
      const dx=q.x-p.x,dy=q.y-p.y,L=Math.hypot(dx,dy),nx=-dy/L,ny=dx/L,tx=dx/L,ty=dy/L;
      for(let i=0;i<n;i++){const off=(i-(n-1)/2)*6;
        parts.push('<line x1="'+(mx+tx*off-nx*6).toFixed(1)+'" y1="'+(my+ty*off-ny*6).toFixed(1)+'" x2="'+(mx+tx*off+nx*6).toFixed(1)+'" y2="'+(my+ty*off+ny*6).toFixed(1)+'" stroke="'+CLR.ink+'" stroke-width="2.2"/>');}},
    svg(){ for(const k in tickGroups){const g=tickGroups[k],m=g.reduce((a,b)=>a+b,0)/g.length;
        chk.push({ok:g.every(v=>Math.abs(v-m)/m<=0.005), m:'засечки класса '+k+' на неравных отрезках: '+g.map(v=>v.toFixed(2)).join(', ')});}
      return '<svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" xmlns="http://www.w3.org/2000/svg">'+parts.join('')+'</svg>';}
  };
  return F;
}
/* ================= ПОСТРОИТЕЛИ ЧЕСТНЫХ ЧЕРТЕЖЕЙ ================= */
/* Каждый строит фигуру ПО ЧИСЛАМ задачи; дуги/засечки/квадратики сами регистрируют chk */

function figSquare(p){ // p:{sideLab, showDiag, diagLab}
  const F=Fig(360,260), s=10;
  const A={x:0,y:0},B={x:s,y:0},C={x:s,y:s},D={x:0,y:s};
  F.fit([A,B,C,D]);
  F.poly([A,B,C,D],{close:1});
  if(p.showDiag){F.seg(A,C,{c:CLR.ask,w:2.4}); if(p.diagLab)F.lab(p.diagLab,{x:s*.5,y:s*.58},{c:CLR.ask,dx:14});}
  F.rsq(A,B,D,{c:'#8a8375'});
  F.lab(p.sideLab,{x:s/2,y:0},{dy:22});
  F.lab('A',A,{dx:-12,dy:14});F.lab('B',B,{dx:12,dy:14});F.lab('C',C,{dx:12,dy:-8});F.lab('D',D,{dx:-12,dy:-8});
  return F;
}

function figRect(p){ // p:{mode:'angle',alpha,askLab} | {mode:'bo',bo,ab,askLab}
  const F=Fig(440,290);
  let w,h;
  if(p.mode==='angle'){ // угол alpha между диагональю и одной из сторон — честный аспект
    const t=Math.tan(RAD(Math.min(p.alpha,90-p.alpha))); w=10; h=10*t;
  } else { const d=2*p.bo; h=p.ab; w=Math.sqrt(d*d-h*h); }
  const A={x:0,y:0},D={x:w,y:0},C={x:w,y:h},B={x:0,y:h},O={x:w/2,y:h/2};
  F.fit([A,B,C,D]);
  F.poly([A,B,C,D],{close:1});
  F.seg(A,C,{w:2});F.seg(B,D,{w:2});F.dot(O,{r:3.2});
  if(p.mode==='angle'){
    if(p.alpha<=45) F.arc(A,D,C,{lab:p.alpha+'°',r:30});
    else F.arc(A,B,C,{lab:p.alpha+'°',r:26});
    // острый угол между диагоналями при O
    const acute = angAt(O,A,B)<=90? [A,B]:[A,D];
    F.arc(O,acute[0],acute[1],{lab:p.askLab||'?',c:CLR.ask,r:20});
  } else {
    F.tick(O,{x:0,y:0},1,'полудиагонали');F.tick(O,C,1,'полудиагонали');F.tick(O,B,1,'полудиагонали');F.tick(O,D,1,'полудиагонали');
    F.lab('BO = '+fnum(p.bo),{x:w*0.25,y:h*0.75},{c:CLR.ink,dy:-6});
    F.lab('AB = '+fnum(p.ab),{x:0,y:h/2},{dx:-8,anchor:'end'});
    F.lab(p.askLab||'AC — ?',{x:w*0.75,y:h*0.25},{c:CLR.ask,dy:-6});
  }
  F.lab('A',A,{dx:-12,dy:12});F.lab('D',D,{dx:12,dy:12});F.lab('C',C,{dx:12,dy:-6});F.lab('B',B,{dx:-12,dy:-6});
  F.lab('O',O,{dx:14,dy:-8});
  return F;
}

function rhombPts(acuteA,s){ s=s||10; const a=RAD(acuteA);
  const A={x:0,y:0},B={x:s*Math.cos(a),y:s*Math.sin(a)},D={x:s,y:0},C={x:s+s*Math.cos(a),y:s*Math.sin(a)};
  return {A,B,C,D,s};
}
function rhombBase(F,P,ticks){ F.poly([P.A,P.B,P.C,P.D],{close:1});

function trapPts(a,b,theta,h){ // iso-трапеция: основания a(верх)<b(низ) или через угол theta при большем основании
  if(theta!=null){ h=h||( (b-a)/2*Math.tan(RAD(theta)) ); }
  const dx=(b-a)/2;
  return {A:{x:0,y:0},D:{x:b,y:0},B:{x:dx,y:h},C:{x:dx+a,y:h},h};
}

    const O={x:0,y:0}; // пересечение AC со средней линией: y=h/2 на AC

const TOPICS={sq:'Квадрат',rect:'Прямоугольник',rhomb:'Ромб',par:'Параллелограмм',trap:'Трапеция'};
const ri=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
const S17={};
function def(k,o){o.key=k;S17[k]=o;}

/* ---------- КВАДРАТ ---------- */

 law:'Диагональ квадрата: <b>d = a·√2</b>. Если сторона уже содержит √2, корни перемножаются: k√2·√2 = 2k.',
 ref:'sqf',refWhy:'Сторона дана в виде k√2 — по формуле d = a·√2 корень «схлопывается»: d = k·√2·√2 = 2k.',
 calc:p=>2*p.k, gen:()=>({k:ri(2,12)}), proto:{k:7},
 text:p=>'Сторона квадрата равна '+p.k+'√2. Найдите диагональ этого квадрата.',
 fig:p=>figSquare({sideLab:p.k+'√2',showDiag:true,diagLab:'?'}),
 sol:p=>['Диагональ квадрата равна стороне, умноженной на √2: d = a·√2.',
  'Подставляем: d = '+p.k+'√2 · √2 = '+p.k+' · 2 = <b>'+(2*p.k)+'</b>.'],
 diag:p=>[{v:p.k,m:'Вы разделили на √2 вместо умножения. Диагональ ДЛИННЕЕ стороны: d = a·√2.'},
  {v:2*p.k*Math.SQRT2,m:'√2·√2 = 2, а не 2√2 — корень исчезает.'}]});

/* ---------- ПРЯМОУГОЛЬНИК ---------- */
def('rectDiagAngle',{topic:'rect',name:'Острый угол между диагоналями',
 law:'Половины диагоналей равны (AO = BO) ⇒ треугольник у стороны равнобедренный: угол между диагоналями = <b>180° − 2α</b>. Если получилось больше 90° — острый угол смежный: 2α.',
 ref:'rectd',refWhy:'Равенство половин диагоналей и даёт равнобедренный треугольник AOB — без него ход не работает.',
 calc:p=>Math.min(2*p.alpha,180-2*p.alpha),
 gen:()=>({alpha:pick([ri(20,43),ri(47,75)])}), proto:{alpha:51},
 text:p=>'Диагональ прямоугольника образует угол '+p.alpha+'° с одной из его сторон. Найдите острый угол между диагоналями этого прямоугольника. Ответ дайте в градусах.',
 fig:p=>figRect({mode:'angle',alpha:p.alpha}),
 sol:p=>{const t=180-2*p.alpha;return ['Диагонали равны и делятся пополам: AO = BO ⇒ △AOB равнобедренный, углы при основании по '+p.alpha+'°.',
  'Угол AOB = 180° − 2·'+p.alpha+'° = '+t+'°.',
  t<=90?'Он острый (≤ 90°) — это и есть ответ: <b>'+t+'°</b>.':'Это '+t+'° — тупой. Острый угол между диагоналями — смежный: 180° − '+t+'° = <b>'+(180-t)+'°</b>.'];},
 diag:p=>[{v:180-2*p.alpha===Math.min(2*p.alpha,180-2*p.alpha)?2*p.alpha:180-2*p.alpha,m:'Вы нашли ТУПОЙ угол между диагоналями. Проверьте: острый ≤ 90°, возьмите смежный.'},
  {v:90-p.alpha,m:'90° − α — это второй угол диагонали со стороной, а не угол между диагоналями.'}]});

def('rectDiagBO',{topic:'rect',name:'Диагональ по её половине',
 law:'Диагонали прямоугольника равны и точкой пересечения делятся пополам: <b>AC = BD = 2·BO</b>. Длина стороны в этих задачах — отвлекающее данное.',
 ref:'rectd',refWhy:'Вся задача — одно свойство диагоналей: AC = 2·BO. Пифагор не нужен.',

 gen:()=>{const half=ri(5,16);return {half,side:ri(3,2*half-2),hn:'BO',sn:'AB',dn:'AC'};}, proto:{half:7,side:6,hn:'BO',sn:'AB',dn:'AC'},
 text:p=>'Диагонали AC и BD прямоугольника ABCD пересекаются в точке O, '+p.hn+' = '+p.half+', '+p.sn+' = '+p.side+'. Найдите '+p.dn+'.',
 fig:p=>figRect({mode:'bo',bo:p.half,ab:p.side,askLab:p.dn+' — ?'}),
 sol:p=>['Диагонали прямоугольника равны: AC = BD — значит, и половины равны.',
  p.dn+' = 2·'+p.hn+' = 2·'+p.half+' = <b>'+(2*p.half)+'</b>. Сторона '+p.sn+' = '+p.side+' для ответа не нужна — это проверка на понимание.'],
 diag:p=>[{v:Math.sqrt(p.half*p.half+p.side*p.side),m:'Пифагор здесь не нужен: '+p.hn+' и '+p.sn+' — не катеты одного прямоугольного треугольника.'},
  {v:p.half+p.side,m:'Диагональ — это ДВЕ её половины: 2·'+p.hn+'.'}]});

def('rhombHeight',{topic:'rhomb',name:'Высота ромба по стороне и углу',

function build(k,p,meta){
  const s=S17[k]; const ans=s.calc(p);
  const F=s.fig(p);
  const diag=(s.diag(p)||[]).filter(d=>typeof d.v==='number'&&isFinite(d.v)&&Math.abs(d.v-ans)>1e-9);
  const m={key:k,topic:s.topic,name:s.name,ans,ansFmt:s.ansFmt||'num',text:s.text(p),sol:s.sol(p),
    law:s.law,ref:s.ref,refWhy:s.refWhy,svg:F.svg(),chk:F.chk,diag,p};
  return Object.assign(m,meta||{});
}
/* ---- разбор ответа: целые, десятичные с запятой/точкой, дроби a/b ---- */
function parseAns(str){
  str=String(str||'').trim().replace(',','.').replace(/\s+/g,'');
  if(!str)return null;
  const fr=str.match(/^(-?\d+(?:\.\d+)?)\/(-?\d+(?:\.\d+)?)$/);
  if(fr){const d=parseFloat(fr[2]); if(!d)return null; return parseFloat(fr[1])/d;}
  const v=parseFloat(str);
  return (isFinite(v)&&/^-?\d*\.?\d+$/.test(str))?v:null;
}
function isRight(task,raw){
  if(task.ansFmt==='concat'){
    const u=String(raw||'').replace(/[^\d,.\u002c]/g,'').replace(/[.,]/g,',');
    const e=String(task.ans).replace(/[.,]/g,',');
    return u===e || u.replace(/,/g,'')===e.replace(/,/g,'');
  }
  const v=parseAns(raw); if(v==null)return false;
  const a=task.ans;
  return Math.abs(v-a)<=Math.max(1e-9,Math.abs(a)*1e-9)+1e-9;
}

function setTab(m){MODE=m;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===m));
  if(m==='razbor')renderRazbor(); else if(m==='train')renderTrain(true);
  else if(m==='quiz')renderQuizStart(); else if(m==='sheet')renderSheet(null); else renderRef(null);
}
function hdr(){const done=Object.keys(ST.razborDone).length;
  $('hdBadge').textContent='✔ '+ST.solved+' решено · разобрано '+done+'/'+SUBKEYS.length;}

function archOf(k){return ARCHIVE.filter(r=>r.sub===k);}
function taskHTML(t,opts){opts=opts||{};
  const pills='<span class="pill topic">'+TOPICS[t.topic]+'</span>'+
   (t.srcLab?'<span class="pill '+(t.gen?'gen':'src')+'">'+esc(t.srcLab)+'</span>':'')+
   (t.note?'<span class="pill">'+esc(t.note)+'</span>':'');
  return pills+'<div class="qtext">'+t.text+'</div><div class="fig">'+t.svg+'</div>';
}
/* ---------- РАЗБОР ---------- */
function renderRazbor(){hdr();
  const weak=weakStats();
  let h='<div class="stats">'+
   '<div class="stat"><b>'+ARCHIVE.length+'</b><span>задач в архиве</span></div>'+
   '<div class="stat"><b>'+SUBKEYS.length+'</b><span>типов + генераторы</span></div>'+
   '<div class="stat"><b>'+ST.solved+'</b><span>решено вами</span></div>'+
   '<div class="stat"><b>'+ST.best+'/10</b><span>лучший зачёт</span></div></div>'+
   '<div class="small">Выберите тип задачи — покажу закон, разберу прототип по шагам и отправлю тренироваться.</div>';
  for(const tp in TOPICS){
    h+='<div class="topicH">'+TOPICS[tp]+'</div><div class="grid">';
    SUBKEYS.filter(k=>S17[k].topic===tp).forEach(k=>{const s=S17[k];
      h+='<div class="tcard" data-k="'+k+'">'+(ST.razborDone[k]?'<span class="done">✔</span>':'')+
       '<h3>'+esc(s.name)+'</h3><div class="cnt">архив: '+archOf(k).length+' · генератор'+(s.quiz===false?' · вне зачёта':'')+'</div>'+
       ((weak[k]||0)>=2?'<span class="weak">⚠ ошибок: '+weak[k]+'</span>':'')+'</div>';});
    h+='</div>';}
  MAIN().innerHTML=h;
  MAIN().querySelectorAll('.tcard').forEach(c=>c.onclick=()=>renderRazborDetail(c.dataset.k));
}
function renderRazborDetail(k){hdr();const s=S17[k];
  const rec=archOf(k)[0];
  const t=build(k,s.proto,{gen:false,srcLab:rec?(rec.src+' №'+rec.nums[0]):'прототип'});
  CUR=t; logE('task_start',{kind:'razbor',sub:k});
  let h='<button class="btn ghost" id="bk">← Все типы</button>'+
   '<div class="task"><h2 style="margin:6px 0 10px;font-size:18px">'+esc(s.name)+'</h2>'+
   '<div class="law"><b>Закон:</b> '+s.law+'</div>'+taskHTML(t)+
   '<div class="refwhy">📌 <b>Почему эта формула:</b> '+s.refWhy+' <a class="reflink" id="toRef">→ блок в справочнике</a>'+
   (SUB2PIN[k]?' · <a class="reflink" id="toSheet">🗺 показать на листе ОГЭ</a>':'')+'</div>'+
   '<div class="sol" id="steps"></div><div class="row" style="margin-top:12px">'+
   '<button class="btn primary" id="stepB">Показать шаг 1 из '+t.sol.length+'</button>'+
   '<button class="btn soft" id="trainB" style="display:none">Тренировать этот тип →</button></div></div>';
  MAIN().innerHTML=h;
  $('bk').onclick=renderRazbor;
  $('toRef').onclick=()=>renderRef(s.ref);
  const tS=$('toSheet'); if(tS)tS.onclick=()=>renderSheet(SUB2PIN[k]);
  let i=0;
  $('stepB').onclick=()=>{if(i<t.sol.length){
    $('steps').insertAdjacentHTML('beforeend','<div class="step"><span class="no">'+(i+1)+'</span>'+t.sol[i]+'</div>');
    i++; logE('step',{sub:k,step:i});
    if(i<t.sol.length)$('stepB').textContent='Показать шаг '+(i+1)+' из '+t.sol.length;
    else{$('stepB').style.display='none';$('trainB').style.display='inline-block';
      ST.razborDone[k]=1;save();hdr();}}};
  $('trainB').onclick=()=>{FILT.topic=s.topic;FILT.sub=k;setTab('train');};
}
/* ---------- ТРЕНИРОВКА ---------- */
function pickTrainTask(){
  const pool=k=>FILT.sub? [FILT.sub] : SUBKEYS.filter(x=>FILT.topic==='all'||S17[x].topic===FILT.topic);
  const keys=pool();
  if(FILT.src!=='gen'){ // сперва нетронутый архив
    const fresh=ARCHIVE.filter(r=>keys.includes(r.sub)&&!ST.usedNums[r.nums[0]]);
    if(fresh.length){const r=fresh[Math.floor(Math.random()*fresh.length)];
      ST.usedNums[r.nums[0]]=1;save();
      return build(r.sub,r.p,{gen:false,srcLab:r.src+' №'+r.nums.join(', №'),note:S17[r.sub].note});}
    if(FILT.src==='arch')return null;
  }
  const k=keys[Math.floor(Math.random()*keys.length)];
  return build(k,S17[k].gen(),{gen:true,srcLab:'генератор',note:S17[k].note});
}
function renderTrain(newTask){hdr();
  let h='<div class="row" id="fchips">';
  h+='<button class="chip'+(FILT.topic==='all'&&!FILT.sub?' on':'')+'" data-t="all">Все темы</button>';
  for(const tp in TOPICS)h+='<button class="chip'+(FILT.topic===tp&&!FILT.sub?' on':'')+'" data-t="'+tp+'">'+TOPICS[tp]+'</button>';
  h+='</div><div class="row" style="margin-top:8px">'+
   ['all','Архив + генератор','arch','Только архив','gen','Только генератор'].map((v,i,ar)=>i%2?'':'<button class="chip'+(FILT.src===ar[i]?' on':'')+'" data-s="'+ar[i]+'">'+ar[i+1]+'</button>').join('')+
   (FILT.sub?'<span class="pill">тип: '+esc(S17[FILT.sub].name)+' <a class="reflink" id="clrSub">✕</a></span>':'')+'</div>'+
   '<div id="tzone"></div>';
  MAIN().innerHTML=h;
  MAIN().querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>{FILT.topic=b.dataset.t;delete FILT.sub;renderTrain(true);});
  MAIN().querySelectorAll('[data-s]').forEach(b=>b.onclick=()=>{FILT.src=b.dataset.s;renderTrain(true);});
  const cs=$('clrSub');if(cs)cs.onclick=()=>{delete FILT.sub;renderTrain(true);};
  if(newTask)CUR=pickTrainTask();
  const z=$('tzone');
  if(!CUR){z.innerHTML='<div class="msg info" style="display:block">Архив по этому фильтру пройден полностью 🎉 — переключитесь на генератор или смените тему.</div>';return;}
  const t=CUR;
  z.innerHTML='<div class="task">'+taskHTML(t)+
   '<div class="ansrow"><input id="ans" inputmode="decimal" autocomplete="off" placeholder="Ответ'+(t.ansFmt==='concat'?' (длины подряд)':'')+'"><button class="btn primary" id="chk">Проверить</button></div>'+
   '<div class="msg" id="fb"></div><div class="row" style="margin-top:10px">'+
   '<button class="btn ghost" id="hint">💡 Подсказка</button>'+
   '<button class="btn ghost" id="stepH">🪜 Шаг за шагом</button>'+
   '<button class="btn danger" id="give">Сдаюсь — решение</button>'+
   '<button class="btn soft" id="nxt" style="display:none">Следующая →</button></div>'+
   '<div class="sol" id="ssol"></div></div>';
  logE('task_start',{kind:'train',sub:t.key});
  const fb=$('fb');
  const finish=()=>{$('nxt').style.display='inline-block';$('chk').disabled=true;};
  $('chk').onclick=()=>{const raw=$('ans').value;
    if(isRight(t,raw)){fb.className='msg ok';fb.textContent='Верно! Ответ: '+fnum(t.ans)+'.';
      ST.solved++;save();hdr();logE('solved',{sub:t.key});finish();}
    else{const v=parseAns(raw);
      const d=t.diag.find(d=>v!=null&&Math.abs(v-d.v)<=Math.max(1e-9,Math.abs(d.v)*1e-9)+1e-9);
      fb.className='msg err';
      fb.innerHTML=d?'<b>Знакомая ловушка.</b> '+esc(d.m):'Пока неверно. Сверьтесь с законом (💡) — и попробуйте ещё раз.';
      logE('opt_wrong',{sub:t.key,pick:raw});}};
  $('ans').addEventListener('keydown',e=>{if(e.key==='Enter')$('chk').click();});
  $('hint').onclick=()=>{fb.className='msg info';fb.innerHTML='<b>Закон:</b> '+t.law+
    '<div class="refwhy" style="margin-top:8px">📌 '+t.refWhy+' <a class="reflink" id="toRef2">→ справочник</a>'+
    (SUB2PIN[t.key]?' · <a class="reflink" id="toSheet2">🗺 на листе ОГЭ</a>':'')+'</div>';
    logE('hint',{sub:t.key});
    const l=$('toRef2');if(l)l.onclick=()=>renderRef(t.ref);
    const l2=$('toSheet2');if(l2)l2.onclick=()=>renderSheet(SUB2PIN[t.key]);};
  let si=0;
  const showStep=()=>{$('ssol').insertAdjacentHTML('beforeend','<div class="step"><span class="no">'+(si+1)+'</span>'+t.sol[si]+'</div>');si++;};
  $('stepH').onclick=()=>{
    if(si>=t.sol.length)return;
    if(si<t.sol.length-1){showStep();logE('step_hint',{sub:t.key,step:si});
      fb.className='msg info';fb.textContent='Шаг '+si+' из '+t.sol.length+' открыт — попробуйте довести до ответа сами.';
      $('stepH').textContent='🪜 Ещё шаг ('+(si+1)+' из '+t.sol.length+')';}
    else{showStep(); // последний шаг содержит ответ — честно считаем как «сдаюсь»
      fb.className='msg warn';fb.textContent='Открыт последний шаг с ответом — решение засчитано как разобранное, а не решённое.';
      logE('giveup',{sub:t.key,via:'steps'});finish();$('stepH').disabled=true;}};
  $('give').onclick=()=>{$('ssol').innerHTML=t.sol.map((s,i)=>'<div class="step"><span class="no">'+(i+1)+'</span>'+s+'</div>').join('');
    fb.className='msg warn';fb.textContent='Разберите решение по шагам — этот тип ещё вернётся.';
    logE('giveup',{sub:t.key});finish();$('stepH').disabled=true;};
  $('nxt').onclick=()=>renderTrain(true);
}

function quizSet(){const set=[];
  for(const tp in QUOTA){
    const ks=SUBKEYS.filter(k=>S17[k].topic===tp&&S17[k].quiz!==false);
    for(let i=0;i<QUOTA[tp];i++){const k=ks[Math.floor(Math.random()*ks.length)];
      set.push(build(k,S17[k].gen(),{gen:true}));}}
  for(let i=set.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[set[i],set[j]]=[set[j],set[i]];}
  return set;
}
function renderQuizStart(){hdr();

   '<div class="small">Состав объявлен честно: квадрат — 1, прямоугольник — 1, ромб — 3, параллелограмм — 2, трапеция — 3. Без подсказок; числа — свежие, из генераторов.</div>'+

        QUIZ.res.push({m:mistakes});$('chk').disabled=true;$('nxt').style.display='inline-block';}
      else{fb.className='msg err';fb.textContent='Неверно — есть ещё одна попытка.';}}};

   '<div class="dots">'+QUIZ.res.map(r=>'<span class="dot '+(r.m===0?'g':(r.m===1?'y':'r'))+'"></span>').join('')+'</div>'+

/* ---------- СЕЛФТЕСТ (?selftest=1) ---------- */
function selftest(){const out=[];let bad=0;
  const say=s=>out.push(s), fail=s=>{bad++;out.push('✘ '+s)};
  // 1. архив: уникальность, существование подтипа, эталон
  const seen={};ARCHIVE.forEach(r=>{r.nums.forEach(n=>{if(seen[n])fail('дубль номера '+n);seen[n]=1;});
    const s=S17[r.sub];if(!s){fail('нет подтипа '+r.sub+' у №'+r.nums[0]);return;}
    const v=s.calc(r.p);
    const okv=(typeof r.exp==='string')?String(v)===r.exp:Math.abs(v-r.exp)<=Math.abs(r.exp)*1e-9+1e-9;
    if(!okv)fail('№'+r.nums[0]+' ('+r.sub+'): calc='+v+' ≠ эталон '+r.exp);
    if(typeof v==='number'&&!isFinite(v))fail('№'+r.nums[0]+': неконечный ответ');});
  say('архив: '+ARCHIVE.length+' задач, эталоны сверены');
  // 2. геоаудит архива: chk каждой фигуры
  let gch=0;ARCHIVE.forEach(r=>{if(!S17[r.sub])return;const t=build(r.sub,r.p,{});
    t.chk.forEach(c=>{gch++;if(!c.ok)fail('гео №'+r.nums[0]+' ('+r.sub+'): '+c.m);});
    if(t.svg.indexOf('NaN')>=0)fail('NaN в SVG №'+r.nums[0]);});
  say('геоаудит архива: '+gch+' ассертов');
  // 3. стресс генераторов
  let gen=0,gch2=0;SUBKEYS.forEach(k=>{for(let i=0;i<60;i++){const p=S17[k].gen(),t=build(k,p,{gen:true});gen++;
    if(t.ansFmt!=='concat'&&(typeof t.ans!=='number'||!isFinite(t.ans)))fail('генератор '+k+': плохой ответ '+t.ans+' p='+JSON.stringify(p));
    if(!t.text||t.text.indexOf('undefined')>=0)fail('генератор '+k+': текст с undefined');
    if(t.svg.indexOf('NaN')>=0)fail('NaN в SVG генератора '+k+' p='+JSON.stringify(p));
    t.chk.forEach(c=>{gch2++;if(!c.ok)fail('гео '+k+' p='+JSON.stringify(p)+': '+c.m);});
    t.diag.forEach(d=>{if(Math.abs(d.v-t.ans)<1e-9)fail('ловушка = ответу в '+k);});}});
  say('стресс: '+gen+' генераций, '+gch2+' гео-ассертов');
  // 4. зачёт: квоты и исключения
  let q=0;for(const tp in QUOTA){q+=QUOTA[tp];
    if(!SUBKEYS.some(k=>S17[k].topic===tp&&S17[k].quiz!==false))fail('в теме '+tp+' нет подтипов для зачёта');}
  if(q!==10)fail('сумма квот '+q+' ≠ 10'); else say('зачёт: квоты 1+1+3+2+3 = 10');
  // 5. справочник: id и ссылки
  const rid={};REF.forEach(r=>{if(rid[r.id])fail('дубль ref '+r.id);rid[r.id]=1;});
  SUBKEYS.forEach(k=>{if(!rid[S17[k].ref])fail(k+': ссылка на несуществующий блок '+S17[k].ref);
    if(!S17[k].refWhy)fail(k+': пустой refWhy');});
  say('справочник: '+REF.length+' блоков, все ссылки живые');
  // 6. карта листа: пины целостны
  const pid={};let pinned=0;
  PINS.forEach(p=>{if(pid[p.id])fail('дубль пина '+p.id);pid[p.id]=1;
    if(!(p.x>0&&p.x<100&&p.y>0&&p.y<100))fail('пин '+p.id+' вне листа');
    const[rx,ry,rw,rh]=p.rc;if(!(rx>=0&&ry>=0&&rx+rw<=100&&ry+rh<=100))fail('зона '+p.id+' вне листа');
    if(p.ref&&!rid[p.ref])fail('пин '+p.id+' ссылается на несуществующий блок '+p.ref);
    p.subs.forEach(su=>{const k=typeof su==='string'?su:su.k;pinned++;
      if(!S17[k])fail('пин '+p.id+': нет подтипа '+k);});});
  for(const k in SUB2PIN)if(!PINS.some(p=>p.id===SUB2PIN[k]))fail('SUB2PIN бьёт в пустоту: '+k);
  if(SHEET_IMG.indexOf('data:image/webp;base64,')!==0)fail('изображение листа не вшито');
  say('карта листа: '+PINS.length+' пинов, '+pinned+' прикреплений');
  out.unshift(bad? '✘ СЕЛФТЕСТ: '+bad+' ошибок':'✔ СЕЛФТЕСТ ПРОЙДЕН');
  return {ok:!bad,report:out.join('\n')};
}
