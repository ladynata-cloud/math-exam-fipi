<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ОГЭ · Задание 23 — Геометрические задачи на вычисление</title>
<style>
:root{
  --bg:#e8e4db; --canvas:#fffdf7; --ink:#1a1a2e; --blue:#2d70b3;
  --ok:#16a34a; --ang:#d97706; --err:#dc2626; --aux:#8b93a7;
  --line:#d9d3c6; --blsoft:rgba(45,112,179,.10);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:Georgia,'Times New Roman',serif;line-height:1.5;-webkit-text-size-adjust:100%}
.app{max-width:760px;margin:0 auto;padding:18px 16px 60px}
.head{text-align:center;padding:8px 0 4px}
.head h1{font-size:24px;margin:0 0 4px;letter-spacing:.2px}
.head .sub{color:#4a4a63;font-size:14.5px;margin:0 auto;max-width:560px}
#badge{display:inline-block;margin-top:10px;font-size:13px;background:var(--canvas);border:1px solid var(--line);border-radius:999px;padding:5px 14px;color:#3a3a52}
#badge b{color:var(--blue)}
.tabs{display:flex;gap:6px;margin:16px 0 14px;background:var(--canvas);border:1px solid var(--line);border-radius:14px;padding:5px}
.tab{flex:1;border:none;background:transparent;font-family:inherit;font-size:14.5px;color:#5a5a70;padding:9px 6px;border-radius:10px;cursor:pointer;transition:.15s;font-weight:600}
.tab:hover{background:var(--blsoft)}
.tab.active{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(45,112,179,.25)}
.main{min-height:300px}
.mode-intro{background:var(--canvas);border:1px solid var(--line);border-left:3px solid var(--blue);border-radius:10px;padding:12px 15px;font-size:15px;color:#40405a;margin-bottom:16px}

/* карточка задачи */
.card{background:var(--canvas);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px;box-shadow:0 1px 3px rgba(26,26,46,.04)}
.q-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.q-theme{font-size:13.5px;font-weight:700;color:var(--blue);letter-spacing:.3px;text-transform:uppercase}
.fig-wrap{display:flex;justify-content:center;margin:6px 0 12px}
.fig-wrap svg{max-width:100%;height:auto}
.q-text{font-size:17.5px;margin:6px 0 15px;line-height:1.55}
.q-text b{color:#12122a}

.ans-row{display:flex;gap:10px;align-items:center}
.ans-inp{flex:1;font-family:inherit;font-size:18px;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);outline:none;transition:.15s}
.ans-inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blsoft)}
.ans-inp:disabled{background:#f4f1ea;color:#8a8a9a}

.btn{font-family:inherit;font-size:15px;font-weight:600;border:1.5px solid transparent;border-radius:10px;padding:11px 18px;cursor:pointer;transition:.15s;white-space:nowrap}
.btn.primary{background:var(--blue);color:#fff}
.btn.primary:hover{background:#245e98}
.btn.primary:disabled{opacity:.5;cursor:default}
.btn.ghost{background:#fff;border-color:var(--line);color:#3a3a52}
.btn.ghost:hover{border-color:var(--blue);color:var(--blue)}
.btn.ghost:disabled{opacity:.45;cursor:default}
.btn.danger-ghost{background:#fff;border-color:#e6c4c0;color:var(--err)}
.btn.danger-ghost:hover{background:#fdf0ef}
.btn.wide{display:block;width:100%;margin-top:14px}
.btn.big{font-size:17px;padding:14px 32px}

.fb{margin-top:12px;font-size:16px;padding:10px 14px;border-radius:10px;display:none}
.fb.good,.fb.bad,.fb.warn{display:block}
.fb.good{background:#eaf7ee;color:#137a37;border:1px solid #b7e2c4}
.fb.bad{background:#fdeeee;color:#b3271f;border:1px solid #f0c9c5}
.fb.warn{background:#fdf4e6;color:#9a6410;border:1px solid #f0dcb4}

.tools{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.tools .btn{font-size:13.5px;padding:9px 13px;flex:1;min-width:120px}
.link-btn{background:none;border:none;color:var(--blue);font-family:inherit;font-size:13.5px;cursor:pointer;padding:2px 4px;text-decoration:underline;text-underline-offset:3px}
.link-btn:hover{color:#245e98}

.hintbox{margin-top:12px;background:var(--blsoft);border:1px solid #c3d6e8;border-radius:10px;padding:12px 14px;font-size:14px;color:#2a3a4a}
.hint-f{margin-top:8px;font-size:18px;text-align:center;color:var(--ink)}
.stepbox,.sol{margin-top:14px;background:#faf7f0;border:1px solid var(--line);border-radius:10px;padding:14px 16px}
.stepbox b{color:var(--blue)}
.sol-h,.sol-h{font-weight:700;font-size:14px;color:var(--blue);text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px}
.sol-step{font-size:16.5px;margin:8px 0;padding-left:2px}
.sol-step b{color:var(--blue)}
.sol-ans{margin-top:12px;padding-top:10px;border-top:1px dashed var(--line);font-size:17.5px}
.sol-ans b{color:var(--ok)}
.refbox{margin-top:12px}
.why{font-size:14.5px;color:#54546a;margin-top:8px;font-style:italic}
.notsheet-tag,.notsheet-tag{margin-top:10px;background:#fdeeee;border:1px solid #f0c9c5;border-radius:8px;padding:8px 12px;font-size:13px;color:var(--err)}
.center{text-align:center;margin:14px 0}

/* разбор — сетка типов */
.r-sec{margin-bottom:22px}
.r-theme{font-size:15px;font-weight:700;color:var(--ang);margin:0 0 10px;padding-bottom:6px;border-bottom:2px solid #f0e4d0}
.r-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.r-card{position:relative;text-align:left;background:var(--canvas);border:1px solid var(--line);border-radius:12px;padding:14px 15px;font-family:inherit;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:8px}
.r-card:hover{border-color:var(--blue);transform:translateY(-1px);box-shadow:0 3px 10px rgba(45,112,179,.12)}
.r-card.done{background:#f0f8f2;border-color:#bde3c8}
.r-name{font-size:14.5px;color:var(--ink);flex:1}
.r-chk{color:var(--ok);font-weight:700}
.r-err{background:var(--err);color:#fff;font-size:12px;font-weight:700;min-width:20px;height:20px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px}

/* тренировка */
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.fb-lbl{font-size:14px;color:#54546a;font-weight:600}
.sel{font-family:inherit;font-size:15.5px;padding:9px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);flex:1;min-width:180px}
.exhaust{font-size:13.5px;color:#9a6410;margin-top:6px;padding:0 4px;font-style:italic}
.exhaust:empty{display:none}

/* зачёт */
.quiz-intro{background:var(--canvas);border:1px solid var(--line);border-radius:12px;padding:15px 17px;font-size:15px;margin-bottom:14px}
.weakbox{background:#fdf4e6;border:1px solid #f0dcb4;border-radius:10px;padding:12px 15px;font-size:14px;margin-bottom:16px;color:#6a4a12}
.wn{background:var(--err);color:#fff;font-size:11px;font-weight:700;border-radius:999px;padding:1px 6px;margin-left:2px}
.quiz-prog{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:16px;padding:10px 0}
.dot{width:13px;height:13px;border-radius:999px;background:#ddd6c8;display:inline-block;transition:.2s}
.dot.g{background:var(--ok)} .dot.y{background:var(--ang)} .dot.r{background:var(--err)}
.dot.cur{box-shadow:0 0 0 3px var(--blsoft);background:var(--blue)}
.prog-txt{font-size:13px;color:#6a6a80;margin-left:6px}

.quiz-result{text-align:center;background:var(--canvas);border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:16px}
.score-big{font-size:42px;font-weight:700;color:var(--blue)}
.score-sub{font-size:15px;color:#44445c;margin-top:6px}
.route{background:var(--canvas);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
.route-h{font-weight:700;font-size:14px;color:var(--blue);text-transform:uppercase;letter-spacing:.3px;margin-bottom:12px}
.route-row{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid #efeade;flex-wrap:wrap}
.route-row:last-child{border-bottom:none}
.rr-dot{width:11px;height:11px;border-radius:999px;flex-shrink:0}
.rr-dot.g{background:var(--ok)} .rr-dot.r{background:var(--err)}
.rr-name{font-size:14.5px;flex:1;min-width:120px}
.rr-ans{font-size:13px;color:#6a6a80}
.route-cta{background:#fdf4e6;border:1px solid #f0dcb4;border-radius:10px;padding:12px 15px;font-size:14px;color:#6a4a12;margin-bottom:14px}

/* справочник */
.plaque{background:#fdeeee;border:1px solid #f0c9c5;border-radius:14px;padding:16px 18px;margin-bottom:18px}
.pl-h{font-weight:700;color:var(--err);font-size:15px;margin-bottom:10px}
.pl-body{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px}
.pl-item{background:#fff;border:1px solid #f0c9c5;border-radius:999px;padding:4px 12px;font-size:13px;color:#b3271f}
.pl-note{font-size:13px;color:#9a4a44;font-style:italic}
.ref-sec{margin-bottom:22px}
.ref-item{background:var(--canvas);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;transition:.3s}
.ref-item.flash{border-color:var(--blue);box-shadow:0 0 0 3px var(--blsoft);background:#fbfdff}
.ref-name{font-weight:700;font-size:15px;margin-bottom:8px}
.ns-badge{background:#fdeeee;color:var(--err);font-size:11px;font-weight:700;border:1px solid #f0c9c5;border-radius:999px;padding:1px 8px;margin-left:4px;vertical-align:middle}
.ref-f{font-size:18.5px;text-align:center;margin:8px 0;color:var(--ink)}

/* обучающий пошаговый режим */
.mode-toggle{display:flex;gap:6px;background:var(--canvas);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:10px}
.mt{flex:1;border:none;background:transparent;font-family:inherit;font-size:14px;font-weight:600;color:#5a5a70;padding:9px 6px;border-radius:9px;cursor:pointer;transition:.15s}
.mt:hover{background:var(--blsoft)}
.mt.active{background:var(--ok);color:#fff}
.mode-hint{font-size:14.5px;color:#54546a;margin-bottom:14px;padding:0 4px;font-style:italic}
.guide-lead{font-size:15.5px;font-weight:600;color:var(--blue);margin:6px 0 4px}
.ladder{margin-top:6px}
.step{background:#faf7f0;border:1px solid var(--line);border-left:3px solid var(--blue);border-radius:10px;padding:13px 15px;margin-bottom:11px;transition:.2s}
.step.done{border-left-color:var(--ok);background:#f3f9f4}
.step-num{font-size:12.5px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px}
.step.done .step-num{color:var(--ok)}
.step-q{font-size:17px;margin-bottom:11px;line-height:1.55}
.step-q b{color:#12122a}
.step-ok{font-size:15px;color:#137a37;margin-top:8px}
.step-res{font-size:16.5px;font-weight:700;color:var(--ink);margin-top:4px;background:#fff;border:1px solid var(--line);border-radius:7px;padding:5px 10px;display:inline-block}
.choices{display:flex;flex-direction:column;gap:8px}
.choice-btn{text-align:left;font-family:inherit;font-size:16px;color:var(--ink);background:#fff;border:1.5px solid var(--line);border-radius:9px;padding:11px 14px;cursor:pointer;transition:.13s}
.choice-btn:hover{border-color:var(--blue);background:#fbfdff}
.choice-btn.ok{border-color:var(--ok);background:#eaf7ee;color:#137a37;font-weight:600}
.choice-btn.no{border-color:#f0c9c5;background:#fdeeee;color:#b3271f}
.guide-done{text-align:center;background:#eaf7ee;border:1px solid #b7e2c4;border-radius:12px;padding:16px;margin-top:14px}
.gd-h{font-size:16px;font-weight:700;color:#137a37}
.gd-ans{font-size:18.5px;margin-top:6px}
.gd-ans b{color:var(--ok)}

.step.step-recog{border-left-color:var(--ang);background:#fdf7ee}
.step.step-recog .step-num{color:var(--ang)}
.cue-box{background:#fdf7ee;border:1px solid #f0dcb4;border-radius:10px;padding:12px 15px;font-size:15px;color:#5a4a2a;margin-bottom:12px}
.cue-key{margin-top:6px;font-size:14.5px;color:#8a5a1a;font-weight:600}
.ref-cue{font-size:14px;color:#8a6a3a;background:#fdf7ee;border-radius:6px;padding:4px 9px;margin:6px 0;display:inline-block}

.solo-nudge{margin-top:14px;background:#fdf7ee;border:1px solid #f0dcb4;border-radius:10px;padding:12px 15px;font-size:14px;color:#6a4a12;display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:space-between}
.r-mast{font-size:11px;font-weight:700;border-radius:999px;padding:2px 8px}
.r-mast.m-mid{background:#fdf4e6;color:#9a6410;border:1px solid #f0dcb4}
.r-mast.m-ok{background:#eaf7ee;color:#137a37;border:1px solid #b7e2c4}

.construct-step{border-left-color:var(--blue)}
.constr-holder{display:flex;flex-direction:column;align-items:center;margin:8px 0 4px}
.constr-holder svg{max-width:100%;height:auto;cursor:default;user-select:none}
.construct-step .link-btn{margin-top:4px}

/* карта листа справочных материалов */
.sheet-page{margin-bottom:20px}
.sheet-title{font-size:15px;font-weight:700;color:var(--ang);margin:0 0 12px;padding-bottom:6px;border-bottom:2px solid #f0e4d0;font-style:italic}
.sheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.sheet-blk{background:var(--canvas);border:1px solid var(--line);border-radius:12px;padding:13px 15px;transition:.3s;min-width:0}
.sheet-blk.used{border-color:#bcd3ea}
.sheet-blk.muted{opacity:.6;background:#f6f3ec}
.sheet-blk.flash{border-color:var(--blue);box-shadow:0 0 0 3px var(--blsoft);background:#fbfdff;opacity:1}
.blk-t{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.blk-pin{background:var(--blue);color:#fff;font-size:12px;font-weight:700;min-width:20px;height:20px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px}
.blk-f{font-size:17px;color:var(--ink);margin:6px 0;line-height:1.7;overflow-x:auto}
.blk-note{font-size:13px;color:#54546a;font-style:italic;margin-top:6px}
.blk-na{font-size:12.5px;color:#9a9aa8;margin-top:6px;font-style:italic}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.type-chip{font-family:inherit;font-size:12.5px;font-weight:600;color:var(--blue);background:#eef4fb;border:1px solid #cfe0f0;border-radius:12px;padding:4px 11px;cursor:pointer;transition:.13s;text-align:left;max-width:100%;white-space:normal}
.type-chip:hover{background:var(--blue);color:#fff}
.trig{border-collapse:collapse;font-size:14px;margin-top:4px}
.trig th,.trig td{border:1px solid var(--line);padding:4px 8px;text-align:center}
.trig th{background:#f2ede3;font-weight:700}
.trig td:first-child,.trig th:first-child{font-weight:700;background:#faf7f0}
.ns-wrap{background:#fdeeee;border:1px solid #f0c9c5;border-radius:14px;padding:15px 16px;margin-top:8px}
.ns-h{font-weight:700;color:var(--err);font-size:15px;margin-bottom:12px}
.ns-card{background:#fff;border:1px solid #f0c9c5;border-radius:10px;padding:11px 14px;margin-bottom:9px;transition:.3s}
.ns-card.flash{box-shadow:0 0 0 3px rgba(220,38,38,.18);border-color:var(--err)}
.ns-t{font-size:14px;color:#b3271f;font-weight:600;margin-bottom:8px}
.ns-badge.sheet-yes{background:#eaf7ee;color:#137a37;border-color:#b7e2c4}

/* стопочные дроби */
.frac{display:inline-flex;flex-direction:column;vertical-align:middle;text-align:center;margin:0 .18em}
.frac .up{border-bottom:1.6px solid currentColor;padding:0 .34em;line-height:1.2}
.frac .dn{padding:0 .34em;line-height:1.2}

/* селфтест */
.st-ok,.st-fail{white-space:pre-wrap;font-family:ui-monospace,Menlo,monospace;font-size:12.5px;padding:14px;border-radius:10px;margin:0 0 16px;line-height:1.5}
.st-ok{background:#eaf7ee;color:#137a37;border:1px solid #b7e2c4}
.st-fail{background:#fdeeee;color:#b3271f;border:1px solid #f0c9c5}

@media(max-width:560px){
  .app{padding:14px 11px 50px}
  .head h1{font-size:20px}
  .tab{font-size:13px;padding:8px 3px}
  .r-grid{grid-template-columns:1fr}
  .sheet-grid{grid-template-columns:1fr}
  .trig{font-size:11.5px}
  .trig th,.trig td{padding:2px 5px}
  .blk-f{font-size:16px}
  .ans-row{flex-direction:column;align-items:stretch}
  .btn.primary{width:100%}
  .tools .btn{min-width:0}
  .q-text{font-size:16.5px}
}
</style>
</head>
<body>
<div class="app">
  <div class="head">
    <h1>Задание 23 · Геометрические задачи на вычисление</h1>
    <p class="sub">Все 20 типов ОГЭ: треугольники, четырёхугольники, окружности. Разбирай, тренируйся, сдавай зачёт.</p>
    <div id="badge"></div>
  </div>
  <div class="tabs">
    <button class="tab" data-tab="razbor">Разбор</button>
    <button class="tab" data-tab="train">Тренировка</button>
    <button class="tab" data-tab="quiz">Зачёт</button>
    <button class="tab" data-tab="ref">Справочник</button>
  </div>
  <div class="main" id="main"></div>
</div>
<script>
'use strict';
/* ================= ОГЭ №23 · Геометрические задачи на вычисление =================
   Каркас серии (как oge15–18): SUBS (реестр подтипов) + ARCHIVE (эталоны) + build()
   + режимы Разбор/Тренировка/Зачёт/Справочник + селфтест ?selftest=1.
   Хранилище: mathExamCourseProgress.v1, TID='oge23-vychisleniya'.
   SVG-каноны Конституции: дуги — полилинии по реальным границам сектора; засечки = РАВЕНСТВО;
   стопочные дроби; квадратик прямого угла; НИКАКИХ стрелок; подписи тупых/острых углов наружу дуги. */

const TID='oge23-vychisleniya';

/* ---------- базовые утилиты ---------- */
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=a=>a[Math.floor(Math.random()*a.length)];
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
const near=(a,b,e)=>Math.abs(a-b)<=(e==null?1e-6:e);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt=n=>{const r=Math.round(n*1000)/1000;return String(r).replace('.',',');};
const frac=(u,d)=>'<span class="frac"><span class="up">'+u+'</span><span class="dn">'+d+'</span></span>';

/* парсер ответа: целое / десятичное (запятая) / дробь a/b / радикал k√m */
function parseAns(s){
  s=String(s==null?'':s).trim().toLowerCase().replace(/\s+/g,'');
  if(!s)return NaN;
  s=s.replace(/,/g,'.').replace(/√/g,'sqrt').replace(/корень/g,'sqrt');
  let m=s.match(/^(-?\d+(?:\.\d+)?)?sqrt\(?(\d+(?:\.\d+)?)\)?$/);
  if(m){const k=m[1]===undefined?1:parseFloat(m[1]);return k*Math.sqrt(parseFloat(m[2]));}
  m=s.match(/^(-?\d+(?:\.\d+)?)\/(\d+(?:\.\d+)?)$/);
  if(m){const d=parseFloat(m[2]);return d?parseFloat(m[1])/d:NaN;}
  return /^-?\d+(?:\.\d+)?$/.test(s)?parseFloat(s):NaN;
}
/* сравнение ответа с эталоном: относительный допуск (радикалы можно вводить десятичным приближением) */
function ansEq(val,exp){if(!isFinite(val)||!isFinite(exp))return false;return Math.abs(val-exp)<=Math.max(0.02,Math.abs(exp)*0.012);}

/* упрощение k·√(rad)/den  →  {k,m}  (результат целочисленный коэффициент, m — радиканд) */
function simpRad(coef,den,rad){
  let out=1,r=rad;
  for(let f=2;f*f<=r;f++){while(r%(f*f)===0){out*=f;r/=f*f;}}
  // coef*out/den должно быть целым в наших задачах
  const kNum=coef*out; const k=kNum/den;
  return {k, m:r, num:kNum, den, ok:Math.abs(k-Math.round(k*1e6)/1e6)<1e-9};
}
function radStr(k,m){ if(m===1)return String(k); return (k===1?'':k)+'√'+m; }

/* ---------- векторная геометрия (координаты матем.: y вверх) ---------- */
const V={
  sub:(a,b)=>({x:a.x-b.x,y:a.y-b.y}),
  add:(a,b)=>({x:a.x+b.x,y:a.y+b.y}),
  mul:(a,k)=>({x:a.x*k,y:a.y*k}),
  len:a=>Math.hypot(a.x,a.y),
  unit:a=>{const l=Math.hypot(a.x,a.y)||1;return{x:a.x/l,y:a.y/l};},
  dist:(a,b)=>Math.hypot(a.x-b.x,a.y-b.y),
  mid:(a,b)=>({x:(a.x+b.x)/2,y:(a.y+b.y)/2}),
  rot:(a,deg)=>{const r=deg*Math.PI/180,c=Math.cos(r),s=Math.sin(r);return{x:a.x*c-a.y*s,y:a.x*s+a.y*c};},
  fromAng:(deg,len)=>{const r=deg*Math.PI/180;return{x:Math.cos(r)*len,y:Math.sin(r)*len};},
  angDeg:(v,p1,p2)=>{const a=V.sub(p1,v),b=V.sub(p2,v);const d=(a.x*b.x+a.y*b.y)/((V.len(a)||1)*(V.len(b)||1));return Math.acos(Math.max(-1,Math.min(1,d)))*180/Math.PI;},
  foot:(p,a,b)=>{const ab=V.sub(b,a),t=((p.x-a.x)*ab.x+(p.y-a.y)*ab.y)/(ab.x*ab.x+ab.y*ab.y);return{x:a.x+ab.x*t,y:a.y+ab.y*t};}
};

/* ---------- цвета (палитра Конституции) ---------- */
const CO={ink:'#1a1a2e',blue:'#2d70b3',bluefill:'rgba(45,112,179,.15)',ok:'#16a34a',ang:'#d97706',aux:'#8b93a7',red:'#dc2626',cream:'#fffdf7'};

/* ---------- построитель фигуры ----------
   Методы копят операции в матем.координатах + список точек для авто-фита.
   Дуги/засечки/прямые углы рисуются в ЭКРАННЫХ пикселях (единый вид независимо от масштаба).
   chk — ассерты геометрии, рождаются вместе с фигурой (браузер-фри геоаудит).            */
function mkFig(W,H,pad){
  W=W||380;H=H||300;pad=pad==null?30:pad;
  const ops=[],pts=[],chk=[];
  const reg=p=>{if(p&&isFinite(p.x)&&isFinite(p.y))pts.push(p);};
  const api={W,H,pad,ops,chk,
    seg(a,b,o){reg(a);reg(b);ops.push({t:'seg',a,b,o:o||{}});return api;},
    poly(P,o){P.forEach(reg);ops.push({t:'poly',P,o:o||{}});return api;},
    circ(c,r,o){reg({x:c.x-r,y:c.y-r});reg({x:c.x+r,y:c.y+r});ops.push({t:'circ',c,r,o:o||{}});return api;},
    dot(p,o){reg(p);ops.push({t:'dot',p,o:o||{}});return api;},
    ang(v,p1,p2,o){ops.push({t:'ang',v,p1,p2,o:o||{}});return api;},
    rt(v,p1,p2,o){ops.push({t:'rt',v,p1,p2,o:o||{}});return api;},
    tick(a,b,n,o){ops.push({t:'tick',a,b,n:n||1,o:o||{}});return api;},
    par(a,b,n,o){ops.push({t:'par',a,b,n:n||1,o:o||{}});return api;},
    slbl(a,b,txt,o){reg(a);reg(b);ops.push({t:'slbl',a,b,txt,o:o||{}});return api;},
    lbl(p,txt,o){reg(p);ops.push({t:'lbl',p,txt,o:o||{}});return api;},
    padPt(p){reg(p);return api;},
    assert(msg,cond){chk.push({msg,ok:!!cond});return api;},
    nearAssert(msg,a,b,eps){chk.push({msg:msg+' ('+a.toFixed(3)+'≈'+b.toFixed(3)+')',ok:Math.abs(a-b)<=(eps==null?0.5:eps)});return api;},
    svg(){return render();}
  };
  function esc2(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function render(){
    let minx=1e9,maxx=-1e9,miny=1e9,maxy=-1e9;
    pts.forEach(p=>{minx=Math.min(minx,p.x);maxx=Math.max(maxx,p.x);miny=Math.min(miny,p.y);maxy=Math.max(maxy,p.y);});
    if(!isFinite(minx)){minx=0;maxx=1;miny=0;maxy=1;}
    const bw=Math.max(maxx-minx,1e-6),bh=Math.max(maxy-miny,1e-6);
    const s=Math.min((W-2*pad)/bw,(H-2*pad)/bh);
    const ox=(W-s*bw)/2,oy=(H-s*bh)/2;
    const TX=p=>({x:ox+(p.x-minx)*s,y:H-(oy+(p.y-miny)*s)});
    const A=[];
    A.push('<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" class="fig" font-family="Georgia,\'Times New Roman\',serif">');
    A.push('<rect x="0" y="0" width="'+W+'" height="'+H+'" fill="'+CO.cream+'" rx="10"/>');
    const num=v=>Math.round(v*100)/100;
    function line(a,b,col,w,dash){A.push('<line x1="'+num(a.x)+'" y1="'+num(a.y)+'" x2="'+num(b.x)+'" y2="'+num(b.y)+'" stroke="'+col+'" stroke-width="'+w+'"'+(dash?' stroke-dasharray="'+dash+'"':'')+' stroke-linecap="round"/>');}
    function txt(p,t,col,fs,anchor){A.push('<text x="'+num(p.x)+'" y="'+num(p.y)+'" font-size="'+fs+'" font-weight="700" text-anchor="'+(anchor||'middle')+'" dominant-baseline="middle" fill="'+col+'" stroke="'+CO.cream+'" stroke-width="3" paint-order="stroke" stroke-linejoin="round">'+esc2(t)+'</text>');}
    for(const op of ops){
      if(op.t==='seg'){const a=TX(op.a),b=TX(op.b),o=op.o;line(a,b,o.col||CO.ink,o.w||2,o.dash);}
      else if(op.t==='poly'){const P=op.P.map(TX);let d=P.map((p,i)=>(i?'L':'M')+num(p.x)+' '+num(p.y)).join(' ');if(op.o.close!==false)d+=' Z';A.push('<path d="'+d+'" fill="'+(op.o.fill||'none')+'" stroke="'+(op.o.col||CO.ink)+'" stroke-width="'+(op.o.w||2)+'" stroke-linejoin="round"/>');}
      else if(op.t==='circ'){const c=TX(op.c);A.push('<circle cx="'+num(c.x)+'" cy="'+num(c.y)+'" r="'+num(op.r*s)+'" fill="'+(op.o.fill||'none')+'" stroke="'+(op.o.col||CO.ink)+'" stroke-width="'+(op.o.w||2)+'"'+(op.o.dash?' stroke-dasharray="'+op.o.dash+'"':'')+'/>');}
      else if(op.t==='dot'){const p=TX(op.p),o=op.o,r=o.r||3.3;A.push('<circle cx="'+num(p.x)+'" cy="'+num(p.y)+'" r="'+r+'" fill="'+(o.col||CO.ink)+'" stroke="'+CO.cream+'" stroke-width="1.4"/>');}
      else if(op.t==='ang'){
        const Vv=TX(op.v),r1=TX(op.p1),r2=TX(op.p2),o=op.o;
        let a1=Math.atan2(r1.y-Vv.y,r1.x-Vv.x),a2=Math.atan2(r2.y-Vv.y,r2.x-Vv.x);
        let d=a2-a1;while(d<=-Math.PI)d+=2*Math.PI;while(d>Math.PI)d-=2*Math.PI; // короткая (внутренняя) сторона
        const Rpx=o.r||22,nn=o.n||1;const col=o.col||CO.ang;
        for(let k=0;k<nn;k++){const rr=Rpx-k*5;const N=Math.max(6,Math.round(Math.abs(d)/0.12));let dd='';for(let i=0;i<=N;i++){const ang=a1+d*i/N;const x=Vv.x+rr*Math.cos(ang),y=Vv.y+rr*Math.sin(ang);dd+=(i?'L':'M')+num(x)+' '+num(y)+' ';}A.push('<path d="'+dd+'" fill="none" stroke="'+col+'" stroke-width="'+(o.w||2.2)+'" stroke-linecap="round"/>');}
        if(o.txt!==undefined){const degAbs=Math.abs(d)*180/Math.PI;const off=(degAbs<30||degAbs>150)?Rpx+17:Rpx+13;const am=a1+d/2;const lp={x:Vv.x+off*Math.cos(am),y:Vv.y+off*Math.sin(am)};txt(lp,o.txt,o.tcol||col,o.fs||14);}
      }
      else if(op.t==='rt'){const Vv=TX(op.v),u1=V.unit(V.sub(TX(op.p1),Vv)),u2=V.unit(V.sub(TX(op.p2),Vv)),sq=op.o.s||11;const pa={x:Vv.x+sq*u1.x,y:Vv.y+sq*u1.y},pc={x:Vv.x+sq*u2.x,y:Vv.y+sq*u2.y},pb={x:pa.x+sq*u2.x,y:pa.y+sq*u2.y};A.push('<path d="M'+num(pa.x)+' '+num(pa.y)+' L'+num(pb.x)+' '+num(pb.y)+' L'+num(pc.x)+' '+num(pc.y)+'" fill="none" stroke="'+(op.o.col||CO.ink)+'" stroke-width="1.5"/>');}
      else if(op.t==='tick'){const a=TX(op.a),b=TX(op.b),dir=V.unit(V.sub(b,a)),perp=V.rot(dir,90),M=V.mid(a,b),n=op.n,col=op.o.col||CO.ink;for(let i=0;i<n;i++){const off=(i-(n-1)/2)*5.2;const c={x:M.x+dir.x*off,y:M.y+dir.y*off};const t1={x:c.x-perp.x*6,y:c.y-perp.y*6},t2={x:c.x+perp.x*6,y:c.y+perp.y*6};line(t1,t2,col,2.1);}}
      else if(op.t==='par'){const a=TX(op.a),b=TX(op.b),dir=V.unit(V.sub(b,a)),M=V.mid(a,b),col=op.o.col||CO.ink,n=op.n,sd=V.rot(dir,52);for(let i=0;i<n;i++){const off=(i-(n-1)/2)*4.6;const c={x:M.x+dir.x*off,y:M.y+dir.y*off};line({x:c.x-sd.x*6.5,y:c.y-sd.y*6.5},{x:c.x+sd.x*6.5,y:c.y+sd.y*6.5},col,2);}}
      else if(op.t==='slbl'){const a=TX(op.a),b=TX(op.b),dir=V.unit(V.sub(b,a));let perp=V.rot(dir,90);const side=op.o.side||1;const off=op.o.off||16;const M=V.mid(a,b);const lp={x:M.x+perp.x*off*side+dir.x*(op.o.along||0),y:M.y+perp.y*off*side+dir.y*(op.o.along||0)};txt(lp,op.txt,op.o.col||CO.ink,op.o.fs||14);}
      else if(op.t==='lbl'){const p=TX(op.p),o=op.o;const lp={x:p.x+(o.dx||0),y:p.y+(o.dy||0)};txt(lp,op.txt,o.col||CO.ink,o.fs||14,o.anchor);}
    }
    A.push('</svg>');
    return A.join('');
  }
  return api;
}

/* апекс треугольника: A=(0,0),C=(AC,0); вершина B с |BC|=sideCB, x≈fx·AC (иначе клампим), y>0 */
function triApex(AC,sideCB,fx){
  let Bx=fx*AC, dx=Bx-AC, r2=sideCB*sideCB-dx*dx;

}

  sol(p){const c=SUBS.trapBis.calc(p);return [

/* 6. trapEF — отрезок EF ∥ основаниям; E на AB, F на CD, CF:DF=m:n */
SUBS.trapEF={theme:'quad',name:'Отрезок, параллельный основаниям',notSheet:false,

    f.lbl(A,'A',{dx:-12,dy:9}); f.lbl(B,'B',{dx:-6,dy:-12}); f.lbl(C,'C',{dx:8,dy:-11}); f.lbl(D,'D',{dx:12,dy:9}); f.lbl(E,'E',{dx:-13,dy:2}); f.lbl(F,'F',{dx:12,dy:2});

  sol(p){const c=Math.hypot(p.a,p.b),h=SUBS.hAB.calc(p);return [

/* 10. projAB — катет AB через проекцию; AB=√(AH·AC) */
SUBS.projAB={theme:'tri',name:'Катет через проекцию на гипотенузу',notSheet:true,

  fig(p){const AC=p.AC,AH=p.AH,hB=Math.sqrt(AH*(AC-AH));const A={x:0,y:0},Cc={x:AC,y:0},H={x:AH,y:0},B={x:AH,y:hB};

  refWhy:'Высота из вершины прямого угла образует два треугольника, подобных исходному. Из подобия катет AB — среднее пропорциональное между гипотенузой AC и прилежащим отрезком AH: AB² = AH·AC.'};

SUBS.paraBN={theme:'tri',name:'Подобие: отрезок при MN∥AC',notSheet:true,

/* 12. paraMC — отрезок диагонали при AB∥DC; MC=AC·DC/(AB+DC) */
SUBS.paraMC={theme:'tri',name:'Подобие: диагонали трапеции',notSheet:true,
  gen(){const pr=pick([[1,2],[1,3],[2,3],[1,4],[3,4],[2,5],[3,5],[1,5],[4,5],[5,6]]);const P=pr[0],Q=pr[1];let w=rnd(2,6),r=rnd(3,9);

  sol(p){const R=Math.sqrt((p.AB/2)*(p.AB/2)+p.dAB*p.dAB);const dCD=SUBS.chordDist.calc(p);return [

/* общая фигура для rectPK/rectBH */
function rectFig(val,lblBH,lblPK,unk){
  const BA=4.2,BC=3.1;const B={x:0,y:0},A={x:0,y:BA},Cc={x:BC,y:0};
  const H=V.foot(B,A,Cc);const P={x:0,y:H.y},K={x:H.x,y:0};
  const f=mkFig(380,300,36);
  f.poly([A,B,Cc],{fill:'none',col:CO.ink,w:2.1});
  f.seg(B,H,{col:CO.aux,w:1.7,dash:'5 4'}); f.rt(B,A,Cc);
  f.circ(V.mid(B,H),V.dist(B,H)/2,{col:CO.aux,w:1.6});
  f.poly([B,P,H,K],{fill:CO.bluefill,col:CO.blue,w:1.8});
  f.seg(P,K,{col:CO.blue,w:2.4});
  f.dot(P,{r:2.8}); f.dot(K,{r:2.8}); f.dot(H,{r:2.6});
  f.slbl(B,H,lblBH===('?')?'?':(lblBH+'='+val),{side:-1,off:13,col:lblBH==='?'?CO.blue:CO.aux,fs:lblBH==='?'?15:12});
  f.slbl(P,K,lblPK==='?'?'?':(lblPK+'='+val),{side:1,off:13,col:lblPK==='?'?CO.blue:CO.aux,fs:lblPK==='?'?15:12});
  f.lbl(A,'A',{dx:-11,dy:-4}); f.lbl(B,'B',{dx:-11,dy:8}); f.lbl(Cc,'C',{dx:11,dy:8}); f.lbl(H,'H',{dx:9,dy:8}); f.lbl(P,'P',{dx:-12,dy:0}); f.lbl(K,'K',{dx:2,dy:13});
  f.nearAssert('∠B=90°',V.angDeg(B,A,Cc),90,0.5);
  f.nearAssert('BPHK прямоугольник',V.dist(P,K),V.dist(B,H),1e-6);
  f.nearAssert('∠BPH=90°',V.angDeg(P,B,H),90,0.5);
  return f;
}

    if(near2(v,Math.sqrt(p.AB*p.AB+p.D*p.D)))return 'Здесь не теорема Пифагора. Работает свойство касательной: AB² = AC·(AC − D).';

  refWhy:'По свойству касательной и секущей AB² = AC·(AC − D). Выразив внешнюю часть AC − D = AB²/AC, получаем диаметр D = AC − AB²/AC.'};

/* общая фигура для tanSecAC/tanSecD */
function tanFig(AC,D,AB,unk){
  const r=D/2,d=AC-r,L=Math.sqrt(Math.max(d*d-r*r,1e-6));
  const A={x:0,y:0},Cc={x:AC,y:0},O={x:AC-r,y:0},N={x:AC-2*r,y:0};
  const B={x:L*L/d,y:L*r/d};
  const f=mkFig(410,300,36);
  f.circ(O,r,{col:CO.ink,w:2});
  f.seg(A,B,{col:CO.ink,w:2.2}); f.seg(A,Cc,{col:CO.ink,w:2.2});
  f.seg(O,B,{col:CO.aux,w:1.6,dash:'4 3'}); f.rt(B,A,O,{col:CO.red});
  f.dot(O,{r:2.4}); f.dot(B,{r:2.8}); f.dot(N,{r:2.4});
  f.slbl(A,B,unk==='ac'?String(AB):String(AB),{side:1,off:13});   // AB всегда дано
  f.slbl(N,Cc,unk==='d'?'?':('D='+fmt(D)),{side:-1,off:14,col:unk==='d'?CO.blue:CO.aux,fs:unk==='d'?15:12});
  f.slbl(A,Cc,unk==='ac'?'?':('AC='+fmt(AC)),{side:-1,off:(unk==='ac'?28:26),col:unk==='ac'?CO.blue:CO.aux,fs:unk==='ac'?15:12});
  f.lbl(A,'A',{dx:-12,dy:2}); f.lbl(B,'B',{dx:2,dy:-13}); f.lbl(Cc,'C',{dx:12,dy:6}); f.lbl(O,'O',{dx:0,dy:13}); f.lbl(N,'N',{dx:-6,dy:12});
  f.nearAssert('C на окр.',V.dist(O,Cc),r,1e-6); f.nearAssert('B на окр.',V.dist(O,B),r,1e-6);
  f.nearAssert('OB⊥AB',(O.x-B.x)*(A.x-B.x)+(O.y-B.y)*(A.y-B.y),0,1e-6);
  f.nearAssert('AB касательная=√(AC(AC−D))',V.dist(A,B),Math.sqrt(AC*(AC-D)),1e-6);
  return f;
}

/* геом-утилиты для окружностей */
function circum(a,b,c){const d=2*(a.x*(b.y-c.y)+b.x*(c.y-a.y)+c.x*(a.y-b.y));
  const ux=((a.x*a.x+a.y*a.y)*(b.y-c.y)+(b.x*b.x+b.y*b.y)*(c.y-a.y)+(c.x*c.x+c.y*c.y)*(a.y-b.y))/d;
  const uy=((a.x*a.x+a.y*a.y)*(c.x-b.x)+(b.x*b.x+b.y*b.y)*(a.x-c.x)+(c.x*c.x+c.y*c.y)*(b.x-a.x))/d;
  return {x:ux,y:uy};}
function lineCircle2nd(P0,P1,O,R,known){    // 2-е пересечение прямой P0P1 с окружностью, не равное known
  const dx=P1.x-P0.x,dy=P1.y-P0.y;
  const a=dx*dx+dy*dy,b=2*(dx*(P0.x-O.x)+dy*(P0.y-O.y)),c=(P0.x-O.x)**2+(P0.y-O.y)**2-R*R;
  const disc=Math.sqrt(Math.max(b*b-4*a*c,0));const t1=(-b+disc)/(2*a),t2=(-b-disc)/(2*a);
  const q1={x:P0.x+t1*dx,y:P0.y+t1*dy},q2={x:P0.x+t2*dx,y:P0.y+t2*dy};
  return V.dist(q1,known)<V.dist(q2,known)?q2:q1;}

   q:'AB — касательная, AC — секущая, проходящая через центр (её внешняя часть = AC − D). Какое свойство связывает касательную и секущую?',
   ok:'Верно: касательная² = вся секущая × её внешняя часть, т.е. AB² = AC·(AC − D).',res:'AB² = AC·(AC − D)'},
  {t:'num',ans:AC,q:'Получаем квадратное уравнение AC² − '+fmt(p.D)+'·AC − '+(p.AB*p.AB)+' = 0. Его положительный корень <b>AC = (D + √(D² + 4·AB²)) / 2</b>. Найди AC.',
   tip:'('+fmt(p.D)+' + √('+fmt(p.D*p.D)+' + '+(4*p.AB*p.AB)+')) / 2.',ok:'Отлично!',res:'AC = '+fmt(AC)}];};

GUIDE.tanSecD=p=>{const D=(p.AC*p.AC-p.AB*p.AB)/p.AC;return [
  {t:'choice',ci:0,opts:['AB² = AC·(AC − D)','AB² = AC² − D²','AB = AC − D'],

   ok:'Верно: AB² = AC·(AC − D).',res:'AB² = AC·(AC − D)'},
  {t:'num',ans:D,accept:v=>ansEq(v,D),q:'Внешняя часть секущей: AC − D = AB²/AC = '+(p.AB*p.AB)+'/'+p.AC+'. Значит <b>D = (AC² − AB²) / AC</b> = ('+(p.AC*p.AC)+' − '+(p.AB*p.AB)+') / '+p.AC+'. Найди диаметр D.',
   tip:((p.AC*p.AC-p.AB*p.AB))+' / '+p.AC+'.',ok:'Готово!',res:'D = '+fmt(D)}];};

/* варианты для дрилла распознавания: верный приём + похожие из той же темы (дедуп по key) */
function recogOptions(sub){
  const theme=SUBS[sub].theme, correct=RECOG[sub].key;
  const seen={}; seen[correct]=1;
  const same=[],other=[];
  Object.keys(RECOG).forEach(s=>{const k=RECOG[s].key;if(seen[k])return;seen[k]=1;(SUBS[s].theme===theme?same:other).push(k);});
  const pool=shuffle(same).concat(shuffle(other));
  const opts=[correct].concat(pool.slice(0,3));
  return shuffle(opts).map(k=>({t:k,ok:k===correct}));
}

const ORDER=['rhombH','pgramBis','trapBis','trapLeg','rhombAng','trapEF','circR','hAB','hAC','projAB','paraBN','paraMC','chordDist','chordLen','secKP1','secKP2','rectPK','rectBH','tanSecAC','tanSecD'];

function keyNum(k){return typeof k==='number'?k:(function(){const m=String(k).match(/^(\d+)?√(\d+)$/);return m?(m[1]?+m[1]:1)*Math.sqrt(+m[2]):parseFloat(k);})();}

const ARCHIVE=[];
let _id=1;
for(const sub of ORDER){const R=RAW[sub];for(const row of R.rows){
  const p={};R.keys.forEach((k,i)=>p[k]=row[i]);
  const keyRaw=row[R.keys.length];
  ARCHIVE.push({id:'q'+String(_id++).padStart(3,'0'),sub,theme:SUBS[sub].theme,p,exp:keyNum(keyRaw),key:keyRaw});
}}

/* ---------- независимый мат-аудит: формулы написаны ЗАНОВО ---------- */
const IND={
  rhombH:p=>Math.sqrt((p.DH+p.CH)**2-p.DH**2),
  pgramBis:p=>2*p.BK+2*(p.BK+p.CK),
  trapBis:p=>Math.sqrt(p.AF**2+p.BF**2),
  trapLeg:p=>{const S={30:0.5,45:Math.SQRT1_2,60:Math.sqrt(3)/2,90:1,120:Math.sqrt(3)/2,135:Math.SQRT1_2,150:0.5};return p.CD*S[p.be]/S[p.al];},
  rhombAng:p=>2*Math.round(Math.asin(2*p.d/p.D)*180/Math.PI),
  trapEF:p=>p.BC+(p.AD-p.BC)*(p.m/(p.m+p.n)),
  circR:p=>2*p.R*Math.sin((180-p.be-p.ga)*Math.PI/180),
  hAB:p=>p.a*p.b/Math.sqrt(p.a*p.a+p.b*p.b),
  hAC:p=>p.a*Math.sqrt(p.c*p.c-p.a*p.a)/p.c,
  projAB:p=>Math.sqrt(p.AH*p.AC),
  paraBN:p=>p.MN*p.NC/(p.AC-p.MN),
  paraMC:p=>p.AC*p.DC/(p.AB+p.DC),
  chordDist:p=>{const R2=(p.AB/2)**2+p.dAB**2;return Math.sqrt(R2-(p.CD/2)**2);},
  chordLen:p=>{const R2=(p.AB/2)**2+p.dAB**2;return 2*Math.sqrt(R2-p.dCD**2);},
  secKP1:p=>p.AK/p.k,
  secKP2:p=>p.AP/p.m,
  rectPK:p=>p.BH,
  rectBH:p=>p.PK,
  tanSecAC:p=>(p.D+Math.sqrt(p.D*p.D+4*p.AB*p.AB))/2,
  tanSecD:p=>(p.AC*p.AC-p.AB*p.AB)/p.AC
};

function auditArchive(){
  let bad=0,n=0;const eps=(a,b)=>Math.abs(a-b)<=Math.max(1e-6,Math.abs(b)*1e-4);
  for(const it of ARCHIVE){n++;
    const ind=IND[it.sub](it.p);          // независимая формула
    const cal=SUBS[it.sub].calc(it.p);     // реализация подтипа
    if(!eps(ind,it.exp)){bad++;console.log('KEY≠IND',it.id,it.sub,JSON.stringify(it.p),'key=',it.exp,'ind=',ind);}
    if(!eps(cal,it.exp)){bad++;console.log('KEY≠CALC',it.id,it.sub,JSON.stringify(it.p),'key=',it.exp,'calc=',cal);}
    if(!eps(cal,ind)){bad++;console.log('CALC≠IND',it.id,it.sub);}
  }
  return {n,bad};
}



'use strict';
/* ============ Интерактив: хранилище + 3 режима + справочник + селфтест ============ */

/* ---------- хранилище ---------- */
const NS='mathExamCourseProgress.v1';
function _load(){try{return JSON.parse(localStorage.getItem(NS))||{};}catch(e){return {};}}
function _persist(all){try{localStorage.setItem(NS,JSON.stringify(all));}catch(e){}}
let ALL=_load();
let ST=ALL[TID]||{runs:0,best:0,events:[],razbor:{},seenArch:{},passed:false};
if(!ST.events)ST.events=[];if(!ST.razbor)ST.razbor={};if(!ST.seenArch)ST.seenArch={};if(!ST.mastery)ST.mastery={};
function save(){ALL[TID]=ST;_persist(ALL);}
function ev(t,d){ST.events.push(Object.assign({t,ts:Date.now()},d||{}));if(ST.events.length>300)ST.events=ST.events.slice(-300);save();}
function weakStats(){const c={};ST.events.forEach(e=>{if((e.t==='opt_wrong'||e.t==='quiz_wrong'||e.t==='gaveup')&&e.sub)c[e.sub]=(c[e.sub]||0)+1;});
  return Object.keys(c).map(s=>({sub:s,n:c[s]})).sort((a,b)=>b.n-a.n);}
function subErr(sub){return ST.events.filter(e=>(e.t==='opt_wrong'||e.t==='quiz_wrong'||e.t==='gaveup'||e.t==='recog_wrong')&&e.sub===sub).length;}
function masteryOf(sub){return ST.mastery[sub]||0;}
function recordClean(sub){ST.mastery[sub]=(ST.mastery[sub]||0)+1;save();}
function masteryLabel(sub){const m=masteryOf(sub);return m>=3?{t:'уверенно',c:'m-ok'}:(m>=1?{t:'закрепляю',c:'m-mid'}:null);}
/* адаптивный вес: больше ошибок и меньше освоенности → тип выпадает чаще */
function subWeight(sub){return Math.max(0.3, Math.min(5, 1 + 1.5*subErr(sub) - 0.7*masteryOf(sub)));}
function weightedSub(list){let tot=0;const w=list.map(s=>{const x=subWeight(s);tot+=x;return x;});let r=Math.random()*tot;for(let i=0;i<list.length;i++){r-=w[i];if(r<=0)return list[i];}return list[list.length-1];}

/* ---------- утилиты DOM ---------- */
function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}
function $(id){return document.getElementById(id);}
function clear(n){while(n&&n.firstChild)n.removeChild(n.firstChild);}

/* ---------- отображение ответа ---------- */
function ansDisplay(sub,p){const S=SUBS[sub];
  if(sub==='trapLeg')return S.ansStr(p);
  if(sub==='rhombAng'){const a=S.calc(p);return fmt(a)+'° и '+fmt(180-a)+'°';}
  return fmt(S.calc(p));}

/* ---------- пул задач для тренировки: сначала банк (реальные), потом генерация ---------- */
function archivePool(filter){return ARCHIVE.filter(it=>filter==='all'?true:(filter.startsWith('t:')?it.theme===filter.slice(2):it.sub===filter));}
function nextTask(filter){
  const pool=archivePool(filter);
  const unseen=pool.filter(it=>!ST.seenArch[it.id]);
  if(unseen.length){
    let it;
    if(filter==='all'||filter.indexOf('t:')===0){
      const subsAvail=[...new Set(unseen.map(u=>u.sub))];
      const sub=weightedSub(subsAvail);
      it=pick(unseen.filter(u=>u.sub===sub));
    } else it=pick(unseen);
    ST.seenArch[it.id]=1;save();return {sub:it.sub,p:it.p,id:it.id,fromArch:true,justExhausted:unseen.length===1};
  }
  // банк исчерпан для фильтра → генерация (подтип по весу)
  let sub;
  if(filter==='all')sub=weightedSub(ORDER.slice());
  else if(filter.indexOf('t:')===0)sub=weightedSub(ORDER.filter(s=>SUBS[s].theme===filter.slice(2)));
  else sub=filter;
  return {sub,p:SUBS[sub].gen(),fromArch:false};
}

/* ================= ЯДРО: карточка задачи (тренировка / зачёт) ================= */
function buildTask(mount,task,mode,onDone){
  clear(mount);
  const S=SUBS[task.sub];
  const card=el('div','card');
  const showType=mode!=='quiz';
  const head=el('div','q-head');
  head.appendChild(el('span','q-theme',THEME_NAME[S.theme]+(showType?' · '+S.name:'')));
  if(showType){const b=el('button','link-btn','📋 формула');b.onclick=()=>gotoRef(task.sub);head.appendChild(b);}
  card.appendChild(head);
  card.appendChild(el('div','fig-wrap',S.fig(task.p).svg()));
  card.appendChild(el('div','q-text',S.text(task.p)));

  const row=el('div','ans-row');
  const inp=el('input','ans-inp');inp.type='text';inp.setAttribute('inputmode','decimal');inp.placeholder='ответ';
  const btn=el('button','btn primary','Проверить');
  row.appendChild(inp);row.appendChild(btn);card.appendChild(row);
  const fb=el('div','fb');card.appendChild(fb);

  let tries=0,resolved=false,gaveHint=false,stepIdx=0;
  ev('task_start',{sub:task.sub,mode});

  function finishCard(status){ // status: 'ok'|'okhint'|'fail'
    resolved=true;inp.disabled=true;btn.disabled=true;
    if(tools)tools.querySelectorAll('button').forEach(b=>b.disabled=true);
    if(mode==='train'&&status==='fail'){
      const back=el('div','solo-nudge');
      back.innerHTML='Не вышло сходу — это нормально. Разберём этот тип по шагам?';
      const g=el('button','btn ghost','Разобрать по шагам →');g.onclick=()=>{trainMode='guided';curFilter=task.sub;setTab('train');};
      back.appendChild(g);card.appendChild(back);
    }
    const next=el('button','btn primary wide','Следующая задача →');
    next.onclick=()=>onDone&&onDone(status);
    card.appendChild(next);
    if(mode==='quiz')onDone&&onDone(status);   // зачёт сам ведёт поток
  }
  function revealSolution(){
    const box=el('div','sol');box.appendChild(el('div','sol-h','Решение'));
    S.sol(task.p).forEach((s,i)=>box.appendChild(el('div','sol-step','<b>'+(i+1)+'.</b> '+s)));
    box.appendChild(el('div','sol-ans','Ответ: <b>'+ansDisplay(task.sub,task.p)+'</b>'));
    card.appendChild(box);
  }
  function check(){
    if(resolved)return;
    const raw=inp.value;const val=parseAns(raw);
    const ok=S.ansEqCustom?S.ansEqCustom(val,task.p):ansEq(val,task.exp!=null?task.exp:S.calc(task.p));
    tries++;
    if(ok){fb.className='fb good';fb.innerHTML='✓ Верно!'+(gaveHint?' (с подсказкой)':'');
      ev(gaveHint?'solved_hint':'solved',{sub:task.sub,mode});finishCard(gaveHint?'okhint':'ok');return;}
    if(mode==='quiz'){fb.className='fb bad';fb.innerHTML='✗ Неверно. Правильный ответ: <b>'+ansDisplay(task.sub,task.p)+'</b>';
      ev('quiz_wrong',{sub:task.sub});finishCard('fail');return;}
    // тренировка: диагностика по введённому
    ev('opt_wrong',{sub:task.sub});
    const hint=isFinite(val)?S.diag(val,task.p):null;
    if(tries>=2){fb.className='fb bad';fb.innerHTML=(hint?hint+'<br>':'')+'Разберём решение ниже.';revealSolution();ev('gaveup',{sub:task.sub});finishCard('fail');}
    else{fb.className='fb warn';fb.innerHTML=(hint||'Не совсем. Попробуй ещё раз — осталась одна попытка.');}
  }
  btn.onclick=check;
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')check();});

  let tools=null;
  if(mode!=='quiz'){
    tools=el('div','tools');
    const bHint=el('button','btn ghost','💡 Подсказка');
    bHint.onclick=()=>{gaveHint=true;ev('hint',{sub:task.sub});
      let h=$('hintbox-'+task.sub);
      if(!card.querySelector('.hintbox')){const hb=el('div','hintbox');hb.innerHTML='<b>Как подступиться.</b> '+S.refWhy+'<div class="hint-f">'+S.ref+'</div>';card.insertBefore(hb,fb);}
      bHint.disabled=true;};
    const bStep=el('button','btn ghost','🪜 Шаг за шагом');
    const steps=S.sol(task.p);
    bStep.onclick=()=>{gaveHint=true;
      if(stepIdx===0){card.insertBefore(el('div','stepbox','<b>Пошагово</b>'),fb);}
      const sb=card.querySelector('.stepbox');
      const isLast=stepIdx===steps.length-1;
      sb.appendChild(el('div','sol-step','<b>'+(stepIdx+1)+'.</b> '+steps[stepIdx]));
      ev('step_hint',{sub:task.sub,step:stepIdx});
      stepIdx++;
      if(isLast){ // последний шаг = ответ = засчитывается как «сдалась»
        sb.appendChild(el('div','sol-ans','Ответ: <b>'+ansDisplay(task.sub,task.p)+'</b>'));
        bStep.disabled=true;ev('gaveup',{sub:task.sub});finishCard('fail');
      } else if(stepIdx>=steps.length){bStep.disabled=true;}
    };
    const bGive=el('button','btn danger-ghost','Сдаюсь — решение');
    bGive.onclick=()=>{if(resolved)return;fb.className='fb bad';fb.innerHTML='Правильный ответ: <b>'+ansDisplay(task.sub,task.p)+'</b>';
      revealSolution();ev('gaveup',{sub:task.sub});finishCard('fail');};
    tools.appendChild(bHint);tools.appendChild(bStep);tools.appendChild(bGive);
    card.appendChild(tools);
  }
  mount.appendChild(card);
  inp.focus();
}

const CONSTRUCT={};
/* trapLeg: перетащить перпендикуляр из вершины C на основание AD (или его продолжение) */
CONSTRUCT.trapLeg=function(holder,p,onDone){
  const al=p.al,be=p.be,CD=p.CD,h=CD*Math.sin(be*Math.PI/180),AB=h/Math.sin(al*Math.PI/180);
  const BC=Math.max(h*0.9,(AB*Math.cos(al*Math.PI/180)+CD*Math.cos(be*Math.PI/180))*0.55+h*0.3);
  const B={x:0,y:h},C={x:BC,y:h},D={x:C.x-CD*Math.cos(be*Math.PI/180),y:0},A={x:B.x+AB*Math.cos(al*Math.PI/180),y:0};
  const W=380,H=300,pad=46,pts=[A,B,C,D];
  let mnx=1e9,mxx=-1e9,mny=1e9,mxy=-1e9;pts.forEach(q=>{mnx=Math.min(mnx,q.x);mxx=Math.max(mxx,q.x);mny=Math.min(mny,q.y);mxy=Math.max(mxy,q.y);});
  const s=Math.min((W-2*pad)/(mxx-mnx),(H-2*pad)/(mxy-mny)),ox=(W-s*(mxx-mnx))/2,oy=(H-s*(mxy-mny))/2;
  const TX=q=>({x:ox+(q.x-mnx)*s,y:H-(oy+(q.y-mny)*s)});
  const SA=TX(A),SB=TX(B),SC=TX(C),SD=TX(D),baseY=TX({x:0,y:0}).y,footX=SC.x;
  const NS='http://www.w3.org/2000/svg';
  function eln(t,at){const e=document.createElementNS(NS,t);for(const k in at)e.setAttribute(k,at[k]);return e;}
  const svg=eln('svg',{viewBox:'0 0 '+W+' '+H,class:'fig'});svg.style.touchAction='none';svg.style.maxWidth='100%';
  svg.appendChild(eln('rect',{x:0,y:0,width:W,height:H,fill:CO.cream,rx:10}));
  svg.appendChild(eln('line',{x1:14,y1:baseY,x2:W-14,y2:baseY,stroke:CO.aux,'stroke-width':1.4,'stroke-dasharray':'6 5'}));
  svg.appendChild(eln('path',{d:'M'+SB.x+' '+SB.y+' L'+SC.x+' '+SC.y+' L'+SD.x+' '+SD.y+' L'+SA.x+' '+SA.y+' Z',fill:CO.bluefill,stroke:CO.ink,'stroke-width':2.2,'stroke-linejoin':'round'}));
  function txt(pt,t,dx,dy){const e=eln('text',{x:pt.x+(dx||0),y:pt.y+(dy||0),'font-size':14,'font-weight':700,'text-anchor':'middle','dominant-baseline':'middle',fill:CO.ink,stroke:CO.cream,'stroke-width':3,'paint-order':'stroke'});e.textContent=t;svg.appendChild(e);}
  txt(SB,'B',-12,-6);txt(SC,'C',12,-8);txt(SD,'D',7,13);txt(SA,'A',-7,13);
  const hline=eln('line',{x1:SC.x,y1:SC.y,x2:SC.x,y2:SC.y,stroke:CO.blue,'stroke-width':2.8,'stroke-linecap':'round'});svg.appendChild(hline);
  const ra=eln('path',{d:'',fill:'none',stroke:CO.red,'stroke-width':1.8,opacity:0});svg.appendChild(ra);
  const foot=eln('circle',{cx:SC.x,cy:SC.y,r:0,fill:CO.blue});svg.appendChild(foot);
  const pulse=eln('circle',{cx:SC.x,cy:SC.y,r:10,fill:'none',stroke:CO.blue,'stroke-width':2.5,'pointer-events':'none'});
  pulse.appendChild(eln('animate',{attributeName:'r',values:'10;19;10',dur:'1.3s',repeatCount:'indefinite'}));
  pulse.appendChild(eln('animate',{attributeName:'opacity',values:'0.7;0;0.7',dur:'1.3s',repeatCount:'indefinite'}));
  svg.appendChild(pulse);
  const handle=eln('circle',{cx:SC.x,cy:SC.y,r:10,fill:CO.blue,stroke:'#fff','stroke-width':2.5,cursor:'grab'});svg.appendChild(handle);
  holder.appendChild(svg);
  const fb=el('div','fb');holder.appendChild(fb);
  let hx=SC.x,hy=SC.y,dragging=false,solved=false;
  function raPath(){const sq=11;return 'M'+footX+' '+(baseY-sq)+' L'+(footX-sq)+' '+(baseY-sq)+' L'+(footX-sq)+' '+baseY;}
  function update(){hline.setAttribute('x2',hx);hline.setAttribute('y2',hy);foot.setAttribute('cx',hx);foot.setAttribute('cy',hy);foot.setAttribute('r',dragging||solved?3.2:0);handle.setAttribute('cx',hx);handle.setAttribute('cy',hy);
    const onBase=Math.abs(hy-baseY)<0.5,perp=onBase&&Math.abs(hx-footX)<0.5;
    hline.setAttribute('stroke',perp?CO.ok:(onBase?CO.ang:CO.blue));
    if(perp){ra.setAttribute('d',raPath());ra.setAttribute('opacity',1);}else ra.setAttribute('opacity',0);}
  function toSvg(ev){const r=svg.getBoundingClientRect();return {x:(ev.clientX-r.left)/r.width*W,y:(ev.clientY-r.top)/r.height*H};}
  function down(ev){if(solved)return;dragging=true;pulse.style.display='none';handle.setAttribute('cursor','grabbing');fb.className='fb';fb.innerHTML='';try{handle.setPointerCapture(ev.pointerId);}catch(e){}ev.preventDefault();}
  function move(ev){if(!dragging)return;const q=toSvg(ev);hx=Math.max(14,Math.min(W-14,q.x));hy=Math.max(14,Math.min(H-14,q.y));
    if(Math.abs(hy-baseY)<26)hy=baseY;                 // прилипание к линии основания
    if(hy===baseY&&Math.abs(hx-footX)<20)hx=footX;     // прилипание к перпендикуляру
    update();ev.preventDefault();}
  function up(){if(!dragging)return;dragging=false;handle.setAttribute('cursor','grab');
    const onBase=Math.abs(hy-baseY)<0.5,perp=onBase&&Math.abs(hx-footX)<0.5;
    if(perp)succeed();
    else if(onBase){fb.className='fb warn';fb.innerHTML='Почти! Сдвинь основание перпендикуляра точно под вершину C — тогда угол станет прямым.';}
    else{fb.className='fb warn';fb.innerHTML='Веди из C прямо вниз до пунктирной линии основания.';}}
  function succeed(){if(solved)return;solved=true;hx=footX;hy=baseY;update();handle.setAttribute('fill',CO.ok);handle.setAttribute('r',6);pulse.style.display='none';
    const onSeg=footX>=Math.min(SA.x,SD.x)&&footX<=Math.max(SA.x,SD.x);
    fb.className='fb good';fb.innerHTML='✓ Высота построена — перпендикуляр из C на основание'+(onSeg?' AD':' (на продолжении AD)')+'. Дальше: h = CD·sin C.';
    setTimeout(()=>onDone&&onDone(),750);}
  handle.addEventListener('pointerdown',down);handle.addEventListener('pointermove',move);
  handle.addEventListener('pointerup',up);handle.addEventListener('pointercancel',up);
  return {showAnswer:succeed};
};

/* ---- обучающая карточка: ученик проходит каждый шаг рассуждения ---- */
function buildGuided(mount,task,onDone,opts){
  opts=opts||{};clear(mount);
  const S=SUBS[task.sub];const steps=GUIDE[task.sub](task.p);
  const card=el('div','card');
  const head=el('div','q-head');
  const themeSpan=el('span','q-theme',opts.recognize?THEME_NAME[S.theme]+' · определи тип':THEME_NAME[S.theme]+' · '+S.name);
  head.appendChild(themeSpan);
  const bf=el('button','link-btn','📋 формула');bf.onclick=()=>gotoRef(task.sub);
  if(!opts.recognize)head.appendChild(bf);
  card.appendChild(head);
  card.appendChild(el('div','fig-wrap',S.fig(task.p).svg()));
  card.appendChild(el('div','q-text',S.text(task.p)));
  card.appendChild(el('div','guide-lead',opts.recognize?'Сначала пойми, какой это тип, потом реши по шагам:':'Реши задачу по шагам — каждый шаг сам:'));
  const ladder=el('div','ladder');card.appendChild(ladder);
  mount.appendChild(card);
  ev('task_start',{sub:task.sub,mode:'guided',recog:!!opts.recognize});
  let idx=0,anyReveal=false,finalRevealed=false;
  function revealType(){themeSpan.textContent=THEME_NAME[S.theme]+' · '+S.name;if(!head.querySelector('.link-btn'))head.appendChild(bf);}
  function renderRecog(){
    const box=el('div','step step-recog');
    box.appendChild(el('div','step-num','Определи приём'));
    box.appendChild(el('div','step-q','Не решай сразу. Прочитай, что дано и что ищут, и выбери: <b>какой приём здесь работает?</b>'));
    const fb=el('div','fb');let tries=0;
    const os=recogOptions(task.sub);const wrap=el('div','choices');
    os.forEach((o,k)=>{const b=el('button','choice-btn',o.t);
      b.onclick=()=>{if(box.classList.contains('done'))return;
        if(o.ok){b.classList.add('ok');box.classList.add('done');fb.className='fb good';fb.innerHTML='✓ Верно. <b>Как узнать:</b> '+RECOG[task.sub].cue;revealType();ev('recog_ok',{sub:task.sub});startSolve();}
        else{b.classList.add('no');tries++;ev('recog_wrong',{sub:task.sub});
          if(tries>=2){os.forEach((oo,j)=>{if(oo.ok)wrap.children[j].classList.add('ok');});box.classList.add('done');fb.className='fb bad';fb.innerHTML='Верный приём отмечен. <b>Как узнать:</b> '+RECOG[task.sub].cue;revealType();startSolve();}
          else{fb.className='fb warn';fb.innerHTML='Не этот. Перечитай, что дано и что требуется найти.';}}};
      wrap.appendChild(b);});
    box.appendChild(wrap);box.appendChild(fb);ladder.appendChild(box);
  }
  function done(){
    const clean=!anyReveal&&!finalRevealed;
    if(clean)recordClean(task.sub);
    const fin=el('div','guide-done');
    fin.innerHTML='<div class="gd-h">'+(finalRevealed?'Решение разобрано — в следующий раз получится самому.':(anyReveal?'Решение собрано — метод закреплён.':'✓ Ты прошёл всё решение сам!'))+'</div><div class="gd-ans">Ответ: <b>'+ansDisplay(task.sub,task.p)+'</b></div>';
    card.appendChild(fin);
    ev(finalRevealed?'gaveup':'solved',{sub:task.sub,mode:'guided'});
    if(clean&&masteryOf(task.sub)>=3&&!nudgedSolo.has(task.sub)){
      nudgedSolo.add(task.sub);
      const nud=el('div','solo-nudge');
      nud.innerHTML='🎓 Ты уверенно решаешь этот тип по шагам. Готов решать <b>без подсказок</b>?';
      const yes=el('button','btn ghost','Решать самому →');yes.onclick=()=>{trainMode='solo';curFilter=task.sub;setTab('train');};
      nud.appendChild(yes);card.appendChild(nud);
    }
    const nx=el('button','btn primary wide','Следующая задача →');nx.onclick=()=>onDone&&onDone();card.appendChild(nx);
  }
  function startSolve(){ if(CONSTRUCT[task.sub]) renderConstruct(); else renderStep(); }
  function renderConstruct(){
    const box=el('div','step construct-step');
    box.appendChild(el('div','step-num','Построй высоту'));
    box.appendChild(el('div','step-q','Ключевой ход — <b>достроить высоту</b>. Перетащи синюю точку из вершины <b>C</b> вниз до линии основания <b>AD</b> так, чтобы получился прямой угол (перпендикуляр).'));
    const holder=el('div','constr-holder');box.appendChild(holder);
    const skip=el('button','link-btn','не получается — показать построение');box.appendChild(skip);
    ladder.appendChild(box);
    let done2=false;
    function fin(){ if(done2)return; done2=true; box.classList.add('done'); skip.remove();
      box.appendChild(el('div','step-ok','Высота построена: перпендикуляр из C на основание. Теперь посчитаем её по шагам.'));
      ev('construct_ok',{sub:task.sub}); renderStep(); }
    const api=CONSTRUCT[task.sub](holder,task.p,fin);
    skip.onclick=()=>{ ev('construct_shown',{sub:task.sub}); api.showAnswer(); };
  }
  function renderStep(){
    if(idx>=steps.length){done();return;}
    const st=steps[idx];const isLast=idx===steps.length-1;
    const box=el('div','step');
    box.appendChild(el('div','step-num','Шаг '+(idx+1)+' из '+steps.length));
    box.appendChild(el('div','step-q',st.q));
    const fb=el('div','fb');let tries=0;
    function advance(revealed){box.classList.add('done');
      box.appendChild(el('div','step-ok',(revealed?'':'✓ ')+st.ok));
      if(st.res)box.appendChild(el('div','step-res',st.res));
      if(revealed&&isLast)finalRevealed=true;if(revealed)anyReveal=true;
      idx++;renderStep();}
    if(st.t==='num'){
      const row=el('div','ans-row');
      const inp=el('input','ans-inp');inp.type='text';inp.setAttribute('inputmode','decimal');inp.placeholder='ответ этого шага';
      const b=el('button','btn primary','Проверить');
      row.appendChild(inp);row.appendChild(b);box.appendChild(row);box.appendChild(fb);
      function chk(){if(box.classList.contains('done'))return;
        const val=parseAns(inp.value);const ok=st.accept?st.accept(val):ansEq(val,st.ans);
        if(ok){fb.className='fb good';fb.innerHTML='✓ Верно';inp.disabled=true;b.disabled=true;ev('step_ok',{sub:task.sub,step:idx});advance(false);return;}
        tries++;ev('opt_wrong',{sub:task.sub,mode:'guided',step:idx});
        if(tries>=2){fb.className='fb bad';fb.innerHTML='Правильно: <b>'+(st.res||fmt(st.ans))+'</b>';inp.disabled=true;b.disabled=true;advance(true);}
        else{fb.className='fb warn';fb.innerHTML=st.tip||'Не совсем — попробуй ещё раз.';}}
      b.onclick=chk;inp.addEventListener('keydown',e=>{if(e.key==='Enter')chk();});
      ladder.appendChild(box);inp.focus();
    } else {
      const opts=shuffle(st.opts.map((t,i)=>({t,ok:i===st.ci})));
      const wrap=el('div','choices');
      opts.forEach((o,k)=>{const b=el('button','choice-btn',o.t);
        b.onclick=()=>{if(box.classList.contains('done'))return;
          if(o.ok){b.classList.add('ok');fb.className='fb good';fb.innerHTML='✓ '+st.ok;ev('step_ok',{sub:task.sub,step:idx});advance(false);}
          else{b.classList.add('no');tries++;ev('opt_wrong',{sub:task.sub,mode:'guided',step:idx});
            if(tries>=2){opts.forEach((oo,j)=>{if(oo.ok)wrap.children[j].classList.add('ok');});fb.className='fb bad';fb.innerHTML=st.ok;advance(true);}
            else{fb.className='fb warn';fb.innerHTML=st.tip||'Не то — подумай ещё.';}}};
        wrap.appendChild(b);});
      box.appendChild(wrap);box.appendChild(fb);ladder.appendChild(box);
    }
  }
  if(opts.recognize)renderRecog();else startSolve();
}

/* ================= РЕЖИМ: ЗАЧЁТ ================= */
const QUOTA={tri:3,quad:3,circ:4};
function pickQuiz(){
  const chosen=[];const usedSub={};
  ['tri','quad','circ'].forEach(theme=>{
    let pool=ARCHIVE.filter(it=>it.theme===theme);
    for(let k=0;k<QUOTA[theme];k++){
      // предпочитаем разнообразие подтипов
      let cand=pool.filter(it=>!chosen.includes(it)&&(usedSub[it.sub]||0)<1);
      if(!cand.length)cand=pool.filter(it=>!chosen.includes(it));
      const it=pick(cand);chosen.push(it);usedSub[it.sub]=(usedSub[it.sub]||0)+1;
    }
  });
  return shuffle(chosen);
}
function renderQuiz(main){
  clear(main);
  const weak=weakStats().slice(0,3);
  const intro=el('div','quiz-intro');
  intro.innerHTML='<b>Зачёт.</b> 10 задач: 3 на треугольники, 3 на четырёхугольники, 4 на окружности. Одна попытка на задачу, тип скрыт, подсказок нет — как на экзамене.';
  main.appendChild(intro);
  if(weak.length){const w=el('div','weakbox');w.innerHTML='<b>Твои слабые места</b> (стоит повторить перед стартом): '+weak.map(x=>SUBS[x.sub].name+' <span class="wn">'+x.n+'</span>').join(', ');main.appendChild(w);}
  const startWrap=el('div','center');
  const start=el('button','btn primary big','Начать зачёт');
  startWrap.appendChild(start);main.appendChild(startWrap);
  start.onclick=()=>runQuiz(main);
}
function runQuiz(main){
  clear(main);
  const quiz=pickQuiz();let idx=0;const res=[];
  const prog=el('div','quiz-prog');main.appendChild(prog);
  const host=el('div');main.appendChild(host);
  function drawDots(){clear(prog);quiz.forEach((q,i)=>{let cls='dot';if(i<res.length)cls+=res[i]==='ok'?' g':(res[i]==='okhint'?' y':' r');else if(i===idx)cls+=' cur';prog.appendChild(el('span',cls));});
    prog.appendChild(el('span','prog-txt','Задача '+Math.min(idx+1,quiz.length)+' из '+quiz.length));}
  function step(){
    if(idx>=quiz.length){return finishQuiz(main,quiz,res);}
    drawDots();
    const q=quiz[idx];q.exp=SUBS[q.sub].calc(q.p);
    buildTask(host,q,'quiz',(status)=>{res.push(status);idx++;drawDots();setTimeout(()=>step(),650);});
  }
  step();
}
function finishQuiz(main,quiz,res){
  clear(main);
  const ok=res.filter(r=>r==='ok').length;const okh=res.filter(r=>r==='okhint').length;
  const score=ok+okh;
  ST.runs++;if(score>ST.best)ST.best=score;if(score>=8)ST.passed=true;ev('finish',{score});save();updateBadge();
  const head=el('div','quiz-result');
  head.innerHTML='<div class="score-big">'+score+' / 10</div><div class="score-sub">'+(score>=8?'Отличный результат! Так держать.':score>=6?'Неплохо — ещё чуть-чуть до уверенного зачёта.':'Есть над чем поработать. Разбери ошибки ниже.')+'</div>';
  main.appendChild(head);
  // маршрут повторения — по ошибкам этого зачёта
  const wrongSubs={};quiz.forEach((q,i)=>{if(res[i]==='r'||res[i]==='fail')wrongSubs[q.sub]=(wrongSubs[q.sub]||0)+1;});
  const route=Object.keys(wrongSubs);
  const list=el('div','route');
  list.appendChild(el('div','route-h','Разбор задач зачёта'));
  quiz.forEach((q,i)=>{const S=SUBS[q.sub];const rr=res[i];const good=rr==='ok'||rr==='okhint';
    const row=el('div','route-row'+(good?'':' bad'));
    row.innerHTML='<span class="rr-dot '+(good?'g':'r')+'"></span><span class="rr-name">'+S.name+'</span><span class="rr-ans">ответ: '+ansDisplay(q.sub,q.p)+'</span>';
    if(!good){const b=el('button','link-btn','тренировать →');b.onclick=()=>{curFilter=q.sub;setTab('train');};row.appendChild(b);}
    list.appendChild(row);});
  main.appendChild(list);
  if(route.length){const rc=el('div','route-cta');rc.innerHTML='<b>Что повторить:</b> '+route.map(s=>SUBS[s].name).join(', ')+'.';main.appendChild(rc);}
  const again=el('button','btn primary wide','Пройти ещё раз');again.onclick=()=>renderQuiz(main);main.appendChild(again);
}

 {page:'Площади и тригонометрия',blocks:[

 {k:'cyclic',t:'Вписанный четырёхугольник → подобие (∠AKP = ∠ACB)',subs:['secKP1','secKP2']},

];
const SHEETREF={circR:'sine',rhombH:'pyth',hAC:'pyth',chordDist:'pyth',chordLen:'pyth',

 trapBis:'ns:bis-trap',pgramBis:'ns:bis-pgram',projAB:'ns:geommean',paraBN:'ns:similar',paraMC:'ns:similar',

function typeChip(sub){const b=el('button','type-chip','→ '+SUBS[sub].name);b.onclick=()=>{curFilter=sub;setTab('train');};return b;}
function renderSheetMap(main){
  main.appendChild(el('div','mode-intro','Официальный лист справочных материалов ОГЭ. Кликни по формуле — увидишь, в каких задачах №23 она нужна, и перейдёшь к тренировке. Формулы без пометки в №23 не нужны, а красные приёмы на листе отсутствуют — их надо помнить.'));
  SHEET.forEach(pg=>{
    const sec=el('div','sheet-page');
    sec.appendChild(el('div','sheet-title',pg.page));
    const grid=el('div','sheet-grid');
    pg.blocks.forEach(bl=>{
      const used=bl.uses.length>0;
      const card=el('div','sheet-blk'+(used?' used':' muted'));card.id='sheet-'+bl.id;
      card.innerHTML='<div class="blk-t">'+bl.t+(used?'<span class="blk-pin">'+bl.uses.length+'</span>':'')+'</div><div class="blk-f">'+bl.f+'</div>';
      if(bl.note)card.appendChild(el('div','blk-note',bl.note));

  NOTSHEET.forEach(g=>{
    const c=el('div','ns-card');c.id='sheet-ns:'+g.k;
    c.appendChild(el('div','ns-t',g.t));
    const chips=el('div','chips');g.subs.forEach(s=>chips.appendChild(typeChip(s)));c.appendChild(chips);
    nsWrap.appendChild(c);
  });
  main.appendChild(nsWrap);
  if(sheetHi){const t=$('sheet-'+sheetHi);if(t){t.classList.add('flash');t.scrollIntoView({behavior:'smooth',block:'center'});setTimeout(()=>t.classList.remove('flash'),2400);}sheetHi=null;}
}

function renderRef(main){

  const b2=el('button','mt'+(refView==='types'?' active':''),'🔧 Приёмы по типам');

/* ================= СЕЛФТЕСТ (?selftest=1) ================= */
function selftest(){
  const out=[];let fail=0;
  function A(cond,msg){if(!cond){fail++;out.push('FAIL: '+msg);}}
  // 1) банк 150, темы, квоты
  A(ARCHIVE.length===150,'ARCHIVE=150 (got '+ARCHIVE.length+')');
  const th={};ARCHIVE.forEach(it=>th[it.theme]=(th[it.theme]||0)+1);
  A(th.quad===60&&th.tri===50&&th.circ===40,'темы 60/50/40');
  // 2) мат-аудит
  const au=auditArchive();A(au.bad===0,'мат-аудит расхождений='+au.bad);
  // 3) геоаудит всех фигур банка + генераций
  let cf=0;for(const it of ARCHIVE){SUBS[it.sub].fig(it.p).chk.forEach(c=>{if(!c.ok)cf++;});}
  for(const s of ORDER)for(let i=0;i<25;i++){SUBS[s].fig(SUBS[s].gen()).chk.forEach(c=>{if(!c.ok)cf++;});}
  A(cf===0,'геоаудит chk-провалов='+cf);
  // 4) проверка ответов
  let ab=0;ARCHIVE.forEach(it=>{const S=SUBS[it.sub];const v=S.calc(it.p);const ok=S.ansEqCustom?S.ansEqCustom(v,it.p):ansEq(v,it.exp);if(!ok)ab++;});
  A(ab===0,'самопроверка ответов провалов='+ab);
  // 5) sol/diag/ref у всех
  ORDER.forEach(s=>{const S=SUBS[s];const p=S.gen();A(Array.isArray(S.sol(p))&&S.sol(p).length>=2,'sol '+s);A(typeof S.ref==='string'&&S.ref.length>0,'ref '+s);A(typeof S.refWhy==='string','refWhy '+s);});
  // 6b) GUIDE: обучающая цепочка у каждого типа, финальный шаг = ответ
  ORDER.forEach(s=>{const p=SUBS[s].gen();const steps=GUIDE[s](p);const num=steps.filter(x=>x.t==='num');const last=num[num.length-1];const fin=SUBS[s].calc(p);
    A(steps.length>=2&&last&&(last.accept?last.accept(fin):ansEq(last.ans,fin)),'GUIDE-цепочка '+s);});
  // 6c) распознавание типа: признак+приём у каждого, дрилл даёт 4 варианта с одним верным
  ORDER.forEach(s=>{A(RECOG[s]&&RECOG[s].cue&&RECOG[s].key,'RECOG '+s);const o=recogOptions(s);A(o.length===4&&o.filter(x=>x.ok).length===1&&new Set(o.map(x=>x.t)).size===4,'дрилл-распознавания '+s);});
  // 6) зачёт: квоты
  const q=pickQuiz();const qt={};q.forEach(it=>qt[it.theme]=(qt[it.theme]||0)+1);
  A(q.length===10&&qt.tri===3&&qt.quad===3&&qt.circ===4,'квоты зачёта 3/3/4');
  // 7) адаптивный подбор: вес положителен, выбор в пределах списка (без побочных эффектов)
  A(ORDER.every(s=>subWeight(s)>0),'subWeight положителен');
  A(ORDER.indexOf(weightedSub(ORDER.slice()))>=0,'weightedSub возвращает тип из списка');
  // 8) карта листа: каждый тип привязан (к формуле листа или к «надо помнить»), SHEETREF валиден
  const inSheet=new Set();SHEET.forEach(pg=>pg.blocks.forEach(b=>b.uses.forEach(s=>inSheet.add(s))));
  const inNS=new Set();NOTSHEET.forEach(g=>g.subs.forEach(s=>inNS.add(s)));
  ORDER.forEach(s=>{A(inSheet.has(s)||inNS.has(s),'тип на карте: '+s);A(!!SHEETREF[s],'SHEETREF есть: '+s);
    const tgt=SHEETREF[s],ok=tgt.indexOf('ns:')===0?NOTSHEET.some(g=>'ns:'+g.k===tgt):SHEET.some(pg=>pg.blocks.some(b=>b.id===tgt));
    A(ok,'SHEETREF цель валидна: '+s);});
  const box=document.body?el('pre',fail?'st-fail':'st-ok',(fail?('СЕЛФТЕСТ: '+fail+' провал(ов)\n'):'СЕЛФТЕСТ ПРОЙДЕН ✓ ('+ (ARCHIVE.length)+' задач, мат-аудит и геоаудит чисты)\n')+out.join('\n')):null;
  if(box){document.body.insertBefore(box,document.body.firstChild);}
  return {fail,out};
}


document.addEventListener('DOMContentLoaded',function(){
  try{
    var qs=new URLSearchParams(location.search);
    if(qs.get('selftest')==='1'){selftest();}
  }catch(e){}
  initApp();
});
